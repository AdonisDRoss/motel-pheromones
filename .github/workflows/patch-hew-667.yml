name: Patch Hew 667
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/patch-hew-667.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('index.html')
          s=p.read_text()
          s=re.sub(r'const VERSION\s*=\s*\d+\s*;','const VERSION = 667;',s,1)
          if 'const HEW_MOVE_FRAME_W' not in s:
              s=s.replace('const MOVE_FRAME_H = 170;\n','const MOVE_FRAME_H = 170;\nconst HEW_MOVE_FRAME_W = 227;\nconst HEW_MOVE_FRAME_H = 188;\nconst HEW_MOVE_SCALE = 0.31;\nconst HEW_MOVE_Y_OFFSET = 6;\n',1)
          s=s.replace('/movement .png?v=','/movement.png?v=')
          s=s.replace('scene.load.spritesheet("hew_movement",HEW_BASE + "/movement.png?v=" + VERSION,{\n    frameWidth:MOVE_FRAME_W,\n    frameHeight:MOVE_FRAME_H,','scene.load.spritesheet("hew_movement",HEW_BASE + "/movement.png?v=" + VERSION,{\n    frameWidth:HEW_MOVE_FRAME_W,\n    frameHeight:HEW_MOVE_FRAME_H,',1)
          s=s.replace('''getPlayerMoveScale(){
    return this.playerUsesHewStatic() ? HEW_STATIC_SCALE : PLAYER_MOVE_SCALE;
  }''','''getPlayerMoveScale(){
    if(this.playerUsesHewStatic()) return HEW_STATIC_SCALE;
    if(selectedFighter==="HEW") return HEW_MOVE_SCALE;
    return PLAYER_MOVE_SCALE;
  }
  getPlayerYOffset(){
    if(selectedFighter==="HEW" && !this.playerUsesHewStatic()) return HEW_MOVE_Y_OFFSET;
    return 0;
  }''',1)
          s=s.replace('''this.player=this.add.sprite(470,390,this.getPlayerMoveSheet());
    this.player.setOrigin(0.5,1);
    this.player.setScale(this.getPlayerMoveScale());
    this.player.setDepth(200);''','''this.player=this.add.sprite(470,390 + this.getPlayerYOffset(),this.getPlayerMoveSheet());
    this.player.setOrigin(0.5,1);
    this.player.setScale(this.getPlayerMoveScale());
    this.player.setDepth(200);''',1)
          p.write_text(s)
          PY
      - run: |
          if git diff --quiet -- index.html; then exit 0; fi
          git config user.name bot
          git config user.email bot@example.com
          git add index.html
          git commit -m "Fix Hew movement"
          git push
