name: Patch Hew file 671
on:
  workflow_dispatch:
  push:
    paths:
      - .github/trigger-hew-file-671.txt
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('index.html')
          s = p.read_text()
          s = re.sub(r'const VERSION\s*=\s*\d+\s*;', 'const VERSION = 671;', s, count=1)
          s = s.replace('/movement .png?v=', '/hew_movement.png?v=')
          s = s.replace('/movement.png?v=', '/movement.png?v=')
          s = re.sub(
              r'scene\.load\.spritesheet\("hew_movement",HEW_BASE \+ "/[^"]+\?v=" \+ VERSION,\{\n\s*frameWidth:[^,]+,\n\s*frameHeight:[^,]+,',
              'scene.load.spritesheet("hew_movement",HEW_BASE + "/hew_movement.png?v=" + VERSION,{\n    frameWidth:MOVE_FRAME_W,\n    frameHeight:MOVE_FRAME_H,',
              s,
              count=1
          )
          s = re.sub(r'const HEW_MOVE_FRAME_W\s*=\s*[^;]+;', 'const HEW_MOVE_FRAME_W = MOVE_FRAME_W;', s)
          s = re.sub(r'const HEW_MOVE_FRAME_H\s*=\s*[^;]+;', 'const HEW_MOVE_FRAME_H = MOVE_FRAME_H;', s)
          s = re.sub(r'const HEW_MOVE_SCALE\s*=\s*[^;]+;', 'const HEW_MOVE_SCALE = PLAYER_MOVE_SCALE;', s)
          s = re.sub(r'const HEW_MOVE_Y_OFFSET\s*=\s*[^;]+;', 'const HEW_MOVE_Y_OFFSET = 0;', s)
          s = re.sub(
              r'getPlayerMoveScale\(\)\{\n\s*if\(this\.playerUsesHewStatic\(\)\) return HEW_STATIC_SCALE;\n\s*if\(selectedFighter==="HEW"\) return HEW_MOVE_SCALE;\n\s*return PLAYER_MOVE_SCALE;\n\s*\}',
              'getPlayerMoveScale(){\n    return this.playerUsesHewStatic() ? HEW_STATIC_SCALE : PLAYER_MOVE_SCALE;\n  }',
              s
          )
          s = re.sub(r'getPlayerYOffset\(\)\{\n\s*return 0;\n\s*\}', '', s)
          s = re.sub(r'getPlayerYOffset\(\)\{\n\s*if\(selectedFighter==="HEW" && !this\.playerUsesHewStatic\(\)\) return HEW_MOVE_Y_OFFSET;\n\s*return 0;\n\s*\}', '', s)
          s = s.replace('this.player=this.add.sprite(470,390 + this.getPlayerYOffset(),this.getPlayerMoveSheet());', 'this.player=this.add.sprite(470,390,this.getPlayerMoveSheet());')
          s = re.sub(
              r'function makeHewMovementAnims\(scene\)\{.*?\n\}\n\nfunction makePlayerAnimSet\(scene,prefix\)\{\n\s*if\(prefix==="hew"\)\{.*?\n\s*return;\n\s*\}\n\s*makeAnim\(scene,prefix\+"_idle_down",prefix\+"_movement",0,4,6,-1\);',
              'function makePlayerAnimSet(scene,prefix){\n  makeAnim(scene,prefix+"_idle_down",prefix+"_movement",0,4,6,-1);',
              s,
              flags=re.S
          )
          p.write_text(s)
          PY
      - run: |
          if git diff --quiet -- index.html; then exit 0; fi
          git config user.name bot
          git config user.email bot@example.com
          git add index.html
          git commit -m "Point Hew to hew_movement sheet"
          git push
