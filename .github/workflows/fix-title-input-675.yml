name: Fix title input 675
on:
  workflow_dispatch:
  push:
    paths:
      - .github/trigger-title-input-675.txt
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('index.html')
          s=p.read_text()
          s=re.sub(r'const VERSION\s*=\s*\d+\s*;','const VERSION = 675;',s,count=1)

          safe_music='''let titleMusicInstance=null;
let titleMusicStarted=false;
function startTitleMusic(scene){
  if(titleMusicStarted) return;
  if(!scene || !scene.sound) return;
  try{
    if(!scene.cache || !scene.cache.audio || !scene.cache.audio.exists("title_music")) return;
    titleMusicInstance=scene.sound.add("title_music",{loop:true,volume:0.55});
    titleMusicInstance.play();
    titleMusicStarted=true;
  }catch(e){
    console.warn("Title music skipped:",e);
  }
}
function stopTitleMusic(){
  try{
    if(titleMusicInstance){ titleMusicInstance.stop(); titleMusicInstance=null; }
  }catch(e){}
  titleMusicStarted=false;
}
function toggleTitleMusic(scene){
  if(titleMusicStarted) stopTitleMusic();
  else startTitleMusic(scene);
}
function goFromTitle(scene){
  try{ startTitleMusic(scene); }catch(e){}
  scene.scene.start("CharacterSelect");
}
'''
          s=re.sub(r'let titleMusicInstance=null;\nlet titleMusicStarted=false;\nfunction startTitleMusic\(scene\)\{.*?\nfunction toggleTitleMusic\(scene\)\{\n  if\(titleMusicStarted\) stopTitleMusic\(\);\n  else startTitleMusic\(scene\);\n\}',safe_music,s,flags=re.S,count=1)

          # If the old block was not found, add safe helpers before asset constants.
          if 'function goFromTitle(scene)' not in s:
              s=s.replace('const JT_BASE = "assets/sprites/player/jt";',safe_music+'\nconst JT_BASE = "assets/sprites/player/jt";',1)

          # Make title input use the safe helper.
          s=s.replace('this.input.once("pointerdown",()=>{ startTitleMusic(this); this.scene.start("CharacterSelect"); });','this.input.once("pointerdown",()=>goFromTitle(this));')
          s=s.replace('this.input.keyboard.once("keydown-ENTER",()=>{ startTitleMusic(this); this.scene.start("CharacterSelect"); });','this.input.keyboard.once("keydown-ENTER",()=>goFromTitle(this));')
          s=s.replace('this.input.once("pointerdown",()=>this.scene.start("CharacterSelect"));','this.input.once("pointerdown",()=>goFromTitle(this));')
          s=s.replace('this.input.keyboard.once("keydown-ENTER",()=>this.scene.start("CharacterSelect"));','this.input.keyboard.once("keydown-ENTER",()=>goFromTitle(this));')

          # If an old O key listener still points to missing midi code, route it safely.
          s=s.replace('this.input.keyboard.on("keydown-O",()=>toggleMidiLoop());','this.input.keyboard.on("keydown-O",()=>toggleTitleMusic(this));')
          p.write_text(s)
          PY
      - run: |
          if git diff --quiet -- index.html; then exit 0; fi
          git config user.name bot
          git config user.email bot@example.com
          git add index.html
          git commit -m "Fix title tap and safe music start"
          git push
