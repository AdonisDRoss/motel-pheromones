name: Patch Hew movement upload 665

on:
  push:
    paths:
      - ".github/workflows/patch-hew-movement-upload-665.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch index for uploaded Hew movement sheet
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          # Cache bust for GitHub Pages / browser cache.
          s = re.sub(r'const VERSION\s*=\s*\d+\s*;', 'const VERSION = 665;', s, count=1)

          # This uploaded Hew movement sheet is 5 columns x 5 rows at about 1136x944.
          # Phaser slices cleanly enough as 227x188 and ignores the extra edge pixels.
          insert = (
              'const MOVE_FRAME_H = 170;\n'
              'const HEW_MOVE_FRAME_W = 227;\n'
              'const HEW_MOVE_FRAME_H = 188;\n'
              'const HEW_MOVE_SCALE = 0.31;\n'
              'const HEW_MOVE_Y_OFFSET = 6;\n'
          )
          if 'const HEW_MOVE_FRAME_W' not in s:
              s = s.replace('const MOVE_FRAME_H = 170;\n', insert, 1)
          else:
              s = re.sub(r'const HEW_MOVE_FRAME_W\s*=\s*[^;]+;', 'const HEW_MOVE_FRAME_W = 227;', s, count=1)
              s = re.sub(r'const HEW_MOVE_FRAME_H\s*=\s*[^;]+;', 'const HEW_MOVE_FRAME_H = 188;', s, count=1)
              s = re.sub(r'const HEW_MOVE_SCALE\s*=\s*[^;]+;', 'const HEW_MOVE_SCALE = 0.31;', s, count=1)
              if 'const HEW_MOVE_Y_OFFSET' not in s:
                  s = s.replace('const HEW_MOVE_SCALE = 0.31;\n', 'const HEW_MOVE_SCALE = 0.31;\nconst HEW_MOVE_Y_OFFSET = 6;\n', 1)
              else:
                  s = re.sub(r'const HEW_MOVE_Y_OFFSET\s*=\s*[^;]+;', 'const HEW_MOVE_Y_OFFSET = 6;', s, count=1)

          # Make only Hew use the new uploaded movement frame size. JT stays 204x170.
          s = s.replace(
              'scene.load.spritesheet("hew_movement",HEW_BASE + "/movement.png?v=" + VERSION,{\n'
              '    frameWidth:MOVE_FRAME_W,\n'
              '    frameHeight:MOVE_FRAME_H,',
              'scene.load.spritesheet("hew_movement",HEW_BASE + "/movement.png?v=" + VERSION,{\n'
              '    frameWidth:HEW_MOVE_FRAME_W,\n'
              '    frameHeight:HEW_MOVE_FRAME_H,',
              1
          )

          old_scale = '''getPlayerMoveScale(){
    return this.playerUsesHewStatic() ? HEW_STATIC_SCALE : PLAYER_MOVE_SCALE;
  }'''
          new_scale = '''getPlayerMoveScale(){
    if(this.playerUsesHewStatic()) return HEW_STATIC_SCALE;
    if(selectedFighter==="HEW") return HEW_MOVE_SCALE;
    return PLAYER_MOVE_SCALE;
  }'''
          if old_scale in s:
              s = s.replace(old_scale, new_scale, 1)

          if 'getPlayerYOffset(){' not in s:
              s = s.replace(
                  '''getPlayerMoveScale(){
    if(this.playerUsesHewStatic()) return HEW_STATIC_SCALE;
    if(selectedFighter==="HEW") return HEW_MOVE_SCALE;
    return PLAYER_MOVE_SCALE;
  }''',
                  '''getPlayerMoveScale(){
    if(this.playerUsesHewStatic()) return HEW_STATIC_SCALE;
    if(selectedFighter==="HEW") return HEW_MOVE_SCALE;
    return PLAYER_MOVE_SCALE;
  }
  getPlayerYOffset(){
    if(selectedFighter==="HEW" && !this.playerUsesHewStatic()) return HEW_MOVE_Y_OFFSET;
    return 0;
  }''',
                  1
              )

          s = s.replace(
              '''this.player=this.add.sprite(470,390,this.getPlayerMoveSheet());
    this.player.setOrigin(0.5,1);
    this.player.setScale(this.getPlayerMoveScale());
    this.player.setDepth(200);''',
              '''this.player=this.add.sprite(470,390 + this.getPlayerYOffset(),this.getPlayerMoveSheet());
    this.player.setOrigin(0.5,1);
    this.player.setScale(this.getPlayerMoveScale());
    this.player.setDepth(200);''',
              1
          )

          p.write_text(s, encoding='utf-8')
          PY

      - name: Commit index patch
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes needed"
            exit 0
          fi
          git config user.name "ChatGPT Fix Bot"
          git config user.email "chatgpt-fix-bot@users.noreply.github.com"
          git add index.html
          git commit -m "Use uploaded Hew movement sheet sizing"
          git push
