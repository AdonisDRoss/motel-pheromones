name: music674
on:
  workflow_dispatch:
  push:
    paths:
      - .github/trigger-music674.txt
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          p=Path('index.html')
          s=p.read_text()
          s=re.sub(r'const VERSION\s*=\s*\d+\s*;','const VERSION = 674;',s,1)
          if 'scene.load.audio("title_music"' not in s:
              s=s.replace('scene.load.image("outdoor_barricade_front","assets/levels/outdoor_barricade_front.png?v="+VERSION);','scene.load.image("outdoor_barricade_front","assets/levels/outdoor_barricade_front.png?v="+VERSION);\n  scene.load.audio("title_music","assets/audio/title-theme.mp3?v="+VERSION);',1)
          code='''\nlet titleMusicInstance=null;\nlet titleMusicStarted=false;\nfunction startTitleMusic(scene){\n  if(titleMusicStarted) return;\n  if(!scene || !scene.sound) return;\n  if(!scene.cache.audio.exists("title_music")){ startMidiLoop(); return; }\n  titleMusicInstance=scene.sound.add("title_music",{loop:true,volume:0.55});\n  titleMusicInstance.play();\n  titleMusicStarted=true;\n  stopMidiLoop();\n}\nfunction stopTitleMusic(){\n  if(titleMusicInstance){ titleMusicInstance.stop(); titleMusicInstance=null; }\n  titleMusicStarted=false;\n}\nfunction toggleTitleMusic(scene){\n  if(titleMusicStarted) stopTitleMusic();\n  else startTitleMusic(scene);\n}\n'''
          if 'function startTitleMusic(scene)' not in s:
              s=s.replace('const JT_BASE = "assets/sprites/player/jt";',code+'\nconst JT_BASE = "assets/sprites/player/jt";',1)
          s=s.replace('this.input.once("pointerdown",()=>{ startMidiLoop(); this.scene.start("CharacterSelect"); });','this.input.once("pointerdown",()=>{ startTitleMusic(this); this.scene.start("CharacterSelect"); });')
          s=s.replace('this.input.keyboard.once("keydown-ENTER",()=>{ startMidiLoop(); this.scene.start("CharacterSelect"); });','this.input.keyboard.once("keydown-ENTER",()=>{ startTitleMusic(this); this.scene.start("CharacterSelect"); });')
          s=s.replace('this.input.once("pointerdown",()=>this.scene.start("CharacterSelect"));','this.input.once("pointerdown",()=>{ startTitleMusic(this); this.scene.start("CharacterSelect"); });')
          s=s.replace('this.input.keyboard.once("keydown-ENTER",()=>this.scene.start("CharacterSelect"));','this.input.keyboard.once("keydown-ENTER",()=>{ startTitleMusic(this); this.scene.start("CharacterSelect"); });')
          s=s.replace('this.input.keyboard.on("keydown-O",()=>toggleMidiLoop());','this.input.keyboard.on("keydown-O",()=>toggleTitleMusic(this));')
          p.write_text(s)
          PY
      - run: |
          if git diff --quiet -- index.html; then exit 0; fi
          git config user.name bot
          git config user.email bot@example.com
          git add index.html
          git commit -m "Add title music support"
          git push
