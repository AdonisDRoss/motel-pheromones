name: Patch Hew movement 660

on:
  push:
    paths:
      - ".github/workflows/patch-hew-movement-659.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Patch Hew movement sizing for uploaded 5x5 sheet
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          # Bump cache version.
          s = re.sub(r'const VERSION\s*=\s*\d+\s*;', 'const VERSION = 660;', s, count=1)

          # New uploaded Hew movement image is about 1136x944, 5 columns x 5 rows.
          # 1136/5 ~= 227 and 944/5 ~= 188, so use a Hew-only slice size.
          constants = (
              'const MOVE_FRAME_H = 170;\n'
              'const HEW_MOVE_FRAME_W = 227;\n'
              'const HEW_MOVE_FRAME_H = 188;\n'
              'const HEW_MOVE_SCALE = 0.36;\n'
          )

          if 'const HEW_MOVE_FRAME_W' not in s:
              s = s.replace('const MOVE_FRAME_H = 170;\n', constants, 1)
          else:
              s = re.sub(r'const HEW_MOVE_FRAME_W\s*=\s*\d+\s*;', 'const HEW_MOVE_FRAME_W = 227;', s, count=1)
              s = re.sub(r'const HEW_MOVE_FRAME_H\s*=\s*\d+\s*;', 'const HEW_MOVE_FRAME_H = 188;', s, count=1)
              s = re.sub(r'const HEW_MOVE_SCALE\s*=\s*[^;]+;', 'const HEW_MOVE_SCALE = 0.36;', s, count=1)

          # Make Hew movement.png use Hew-only frame dimensions.
          s = s.replace(
              'scene.load.spritesheet("hew_movement",HEW_BASE + "/movement.png?v=" + VERSION,{\n'
              '    frameWidth:MOVE_FRAME_W,\n'
              '    frameHeight:MOVE_FRAME_H,',
              'scene.load.spritesheet("hew_movement",HEW_BASE + "/movement.png?v=" + VERSION,{\n'
              '    frameWidth:HEW_MOVE_FRAME_W,\n'
              '    frameHeight:HEW_MOVE_FRAME_H,',
              1
          )

          # If already patched once, make sure the Hew loader uses the new values.
          s = s.replace(
              'scene.load.spritesheet("hew_movement",HEW_BASE + "/movement.png?v=" + VERSION,{\n'
              '    frameWidth:HEW_MOVE_FRAME_W,\n'
              '    frameHeight:HEW_MOVE_FRAME_H,',
              'scene.load.spritesheet("hew_movement",HEW_BASE + "/movement.png?v=" + VERSION,{\n'
              '    frameWidth:HEW_MOVE_FRAME_W,\n'
              '    frameHeight:HEW_MOVE_FRAME_H,',
              1
          )

          # Make Hew movement display scale separate from JT.
          old = '''getPlayerMoveScale(){
    return this.playerUsesHewStatic() ? HEW_STATIC_SCALE : PLAYER_MOVE_SCALE;
  }'''
          new = '''getPlayerMoveScale(){
    if(this.playerUsesHewStatic()) return HEW_STATIC_SCALE;
    if(selectedFighter==="HEW") return HEW_MOVE_SCALE;
    return PLAYER_MOVE_SCALE;
  }'''
          if old in s:
              s = s.replace(old, new, 1)

          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet -- index.html; then
            echo "No index.html changes needed"
            exit 0
          fi
          git config user.name "ChatGPT Fix Bot"
          git config user.email "chatgpt-fix-bot@users.noreply.github.com"
          git add index.html
          git commit -m "Tune Hew uploaded movement sheet slicing"
          git push

# trigger-660
