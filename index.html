 /* =========================================================
   FOOD + WEAPON SHARED INVENTORY — LIGHT USE / HEAVY STORE
   - Light attack near food = consume immediately
   - Heavy attack near food = store food in inventory
   - Inventory max = 3
   - Inventory A / ENTER = use food or equip weapon
   - Inventory B = drop selected item
   - Dropped food/weapons return to ground for teammate pickup
========================================================= */

const MP_SHARED_INVENTORY_MAX = 3;

function mpGetSharedInventoryMax(){
  return MP_SHARED_INVENTORY_MAX;
}

function mpIsFoodInventoryItem(item){
  return item && item.itemKind === "food";
}

function mpIsWeaponInventoryItem(item){
  return item && item.itemKind !== "food";
}

function mpMixedInventoryScreenKey(scene){
  if(scene && scene.getCurrentWeaponScreenKey){
    return scene.getCurrentWeaponScreenKey();
  }

  if(scene && scene.isLeftyLowerScreen && scene.isLeftyLowerScreen()){
    return "lefty_lower";
  }

  if(scene && scene.isLeftyOutdoorLevel && scene.isLeftyOutdoorLevel()){
    return "lefty_main";
  }

  return selectedLevel || "default";
}

function mpMixedFoodGroundY(scene, platform){
  if(typeof mpHealthGroundY === "function"){
    return mpHealthGroundY(scene, platform);
  }

  if(
    scene &&
    scene.isLeftyLowerScreen &&
    scene.isLeftyLowerScreen() &&
    typeof getLeftyLowerPlatformY === "function"
  ){
    return getLeftyLowerPlatformY(platform);
  }

  return getPlatformY(platform);
}

function mpMixedWeaponGroundY(scene, platform){
  if(typeof mpwGetGroundY === "function"){
    return mpwGetGroundY(scene, platform);
  }

  if(
    scene &&
    scene.isLeftyLowerScreen &&
    scene.isLeftyLowerScreen() &&
    typeof getLeftyLowerPlatformY === "function"
  ){
    return getLeftyLowerPlatformY(platform);
  }

  return getPlatformY(platform);
}

/* =========================================================
   FOOD: USE NOW OR STORE
========================================================= */

Game.prototype.useFoodPickupNow = function(pickup){
  if(!pickup || pickup.pickedUp) return false;

  pickup.pickedUp = true;

  if(pickup.obj) pickup.obj.setVisible(false);
  if(pickup.label) pickup.label.setVisible(false);

  if(this.consumeHealthItemPickup){
    // Re-open consumed flag for existing consume function.
    pickup.pickedUp = false;
    return this.consumeHealthItemPickup(pickup);
  }

  const def = pickup.def;
  const heal = def.heal || 0;
  const maxHp = this.playerMaxHealth || 100;

  this.playerHealth = Phaser.Math.Clamp(
    (this.playerHealth || 0) + heal,
    0,
    maxHp
  );

  if(this.applyHealthItemBuff){
    this.applyHealthItemBuff(def);
  }

  if(this.zoneText){
    this.zoneText.setText(def.label + " +" + heal + " HP");
  }

  return true;
};

Game.prototype.pickupFoodToInventory = function(pickup){
  if(!pickup || pickup.pickedUp) return false;

  if(!this.inventory){
    this.inventory = [];
  }

  if(this.inventory.length >= mpGetSharedInventoryMax()){
    if(this.zoneText){
      this.zoneText.setText("INVENTORY FULL");
    }
    return false;
  }

  pickup.pickedUp = true;

  if(pickup.obj) pickup.obj.setVisible(false);
  if(pickup.label) pickup.label.setVisible(false);

  this.inventory.push({
    id: Date.now() + "_" + Phaser.Math.Between(1000, 9999),
    itemKind: "food",
    type: pickup.type,
    label: pickup.def.label,
    def: pickup.def
  });

  if(this.zoneText){
    this.zoneText.setText("STORED: " + pickup.def.label);
  }

  return true;
};

/* =========================================================
   WEAPONS: STORE IN SAME INVENTORY
========================================================= */

Game.prototype.pickupWeapon = function(pickup){
  if(!pickup || pickup.pickedUp) return false;

  if(!this.inventory){
    this.inventory = [];
  }

  if(this.inventory.length >= mpGetSharedInventoryMax()){
    if(this.zoneText){
      this.zoneText.setText("INVENTORY FULL");
    }
    return false;
  }

  pickup.pickedUp = true;

  if(pickup.obj) pickup.obj.setVisible(false);
  if(pickup.label) pickup.label.setVisible(false);

  const item = {
    id: Date.now() + "_" + Phaser.Math.Between(1000,9999),
    itemKind: "weapon",
    type: pickup.type,
    label: pickup.def.label,
    def: pickup.def
  };

  this.inventory.push(item);
  this.equipWeaponIndex(this.inventory.length - 1);

  if(this.zoneText){
    this.zoneText.setText("PICKED UP: " + pickup.def.label);
  }

  return true;
};

/* =========================================================
   GROUND CONTROLS
   - Light attack near food = use immediately
   - Heavy attack near food = put in inventory
========================================================= */

const MP_ORIGINAL_START_ATTACK_MIXED_INV = Game.prototype.startAttack;

Game.prototype.startAttack = function(type){
  if(
    !this.inventoryOpen &&
    type === "light" &&
    this.getNearestHealthItemPickup &&
    !this.pauseMenuOpen &&
    this.matchStarted &&
    !this.matchOver
  ){
    const food = this.getNearestHealthItemPickup();

    if(food){
      this.useFoodPickupNow(food);
      return;
    }
  }

  MP_ORIGINAL_START_ATTACK_MIXED_INV.call(this, type);
};

const MP_ORIGINAL_START_CONTEXT_Y_MIXED_INV = Game.prototype.startContextY;

Game.prototype.startContextY = function(){
  if(this.inventoryOpen){
    this.useOrEquipSelectedInventoryItem();
    return;
  }

  if(
    this.getNearestHealthItemPickup &&
    !this.pauseMenuOpen &&
    this.matchStarted &&
    !this.matchOver
  ){
    const food = this.getNearestHealthItemPickup();

    if(food){
      this.pickupFoodToInventory(food);
      return;
    }
  }

  MP_ORIGINAL_START_CONTEXT_Y_MIXED_INV.call(this);
};

/* Optional: E/G near food also stores it, so pickup still works */
const MP_ORIGINAL_START_GRAB_MIXED_INV = Game.prototype.startGrab;

Game.prototype.startGrab = function(){
  if(this.inventoryOpen){
    return;
  }

  const food = this.getNearestHealthItemPickup
    ? this.getNearestHealthItemPickup()
    : null;

  if(food){
    this.pickupFoodToInventory(food);
    return;
  }

  MP_ORIGINAL_START_GRAB_MIXED_INV.call(this);
};

/* =========================================================
   EQUIP / REMOVE WEAPONS
========================================================= */

Game.prototype.equipWeaponIndex = function(index){
  if(!this.inventory || index < 0 || index >= this.inventory.length){
    this.currentWeaponIndex = -1;
    this.currentWeapon = null;

    if(this.destroyHeldWeaponSprite){
      this.destroyHeldWeaponSprite();
    }

    return;
  }

  const item = this.inventory[index];

  if(mpIsFoodInventoryItem(item)){
    if(this.zoneText){
      this.zoneText.setText("FOOD CAN'T EQUIP — USE IT");
    }
    return;
  }

  this.currentWeaponIndex = index;
  this.currentWeapon = item;

  if(this.destroyHeldWeaponSprite){
    this.destroyHeldWeaponSprite();
  }

  if(this.makeWeaponObject){
    this.weaponSprite = this.makeWeaponObject(
      item.type,
      this.player.x,
      this.player.y - 60,
      true
    );
  }

  if(this.weaponSprite){
    this.weaponSprite.setDepth(12000);

    if(this.weaponSprite.setRotation){
      this.weaponSprite.setRotation(item.def.rotation || 0);
    }
  }

  if(this.zoneText){
    this.zoneText.setText("EQUIPPED: " + item.def.label);
  }
};

Game.prototype.removeCurrentWeaponFromInventory = function(){
  if(!this.inventory) return null;
  if(this.currentWeaponIndex < 0) return null;
  if(this.currentWeaponIndex >= this.inventory.length) return null;

  const item = this.inventory[this.currentWeaponIndex];

  if(mpIsFoodInventoryItem(item)){
    return null;
  }

  const removed = this.inventory.splice(this.currentWeaponIndex, 1)[0];

  this.currentWeaponIndex = -1;
  this.currentWeapon = null;

  if(this.destroyHeldWeaponSprite){
    this.destroyHeldWeaponSprite();
  }

  for(let i = 0; i < this.inventory.length; i++){
    if(mpIsWeaponInventoryItem(this.inventory[i])){
      this.equipWeaponIndex(i);
      break;
    }
  }

  return removed;
};

/* =========================================================
   USE FOOD FROM INVENTORY
========================================================= */

Game.prototype.useFoodInventoryItem = function(index){
  if(!this.inventory) return;
  if(index < 0 || index >= this.inventory.length) return;

  const item = this.inventory[index];
  if(!mpIsFoodInventoryItem(item)) return;

  const def = item.def;
  const heal = def.heal || 0;
  const maxHp = this.playerMaxHealth || 100;

  this.playerHealth = Phaser.Math.Clamp(
    (this.playerHealth || 0) + heal,
    0,
    maxHp
  );

  if(this.applyHealthItemBuff){
    this.applyHealthItemBuff(def);
  }

  if(this.showHealthItemFX){
    this.showHealthItemFX({
      def,
      x: this.player.x,
      y: this.player.y,
      pickedUp: true
    });
  }else{
    const txt = this.add.text(this.player.x, this.player.y - 90, "+" + heal + " HP", {
      font: "18px monospace",
      fill: "#7CFF6B",
      stroke: "#000000",
      strokeThickness: 4
    }).setOrigin(0.5).setDepth(15000);

    this.tweens.add({
      targets: txt,
      y: txt.y - 30,
      alpha: 0,
      duration: 600,
      onComplete: ()=>txt.destroy()
    });
  }

  this.inventory.splice(index, 1);

  if(index < this.currentWeaponIndex){
    this.currentWeaponIndex--;
  }

  if(this.zoneText){
    this.zoneText.setText(def.label + " +" + heal + " HP");
  }
};

/* =========================================================
   DROP FOOD OR WEAPON FOR TEAMMATE
========================================================= */

Game.prototype.dropInventoryItem = function(index){
  if(!this.inventory) return;
  if(index < 0 || index >= this.inventory.length) return;
  if(!this.player) return;

  const item = this.inventory[index];
  const screenKey = mpMixedInventoryScreenKey(this);

  this.inventory.splice(index, 1);

  if(index === this.currentWeaponIndex){
    this.currentWeaponIndex = -1;
    this.currentWeapon = null;

    if(this.destroyHeldWeaponSprite){
      this.destroyHeldWeaponSprite();
    }
  }else if(index < this.currentWeaponIndex){
    this.currentWeaponIndex--;
  }

  const x = Phaser.Math.Clamp(
    this.player.x + this.getFacingDir() * 42,
    80,
    W - 80
  );

  if(mpIsFoodInventoryItem(item)){
    const y = mpMixedFoodGroundY(this, this.platform);

    if(this.spawnHealthItemPickup){
      this.spawnHealthItemPickup(
        item.type,
        x,
        y,
        this.platform,
        screenKey
      );
    }
  }else{
    const y = mpMixedWeaponGroundY(this, this.platform);

    if(this.spawnWeaponPickup){
      this.spawnWeaponPickup(
        item.type,
        x,
        y,
        this.platform,
        screenKey
      );
    }
  }

  this.selectedInventoryIndex = Phaser.Math.Clamp(
    this.selectedInventoryIndex || 0,
    0,
    Math.max(0, this.inventory.length - 1)
  );

  if(this.zoneText){
    this.zoneText.setText("DROPPED: " + item.label);
  }
};

Game.prototype.dropSelectedInventoryItem = function(){
  if(!this.inventoryOpen) return;
  if(!this.inventory || this.inventory.length <= 0) return;

  const index = Phaser.Math.Clamp(
    this.selectedInventoryIndex || 0,
    0,
    this.inventory.length - 1
  );

  this.dropInventoryItem(index);
  this.openInventoryMenu();
};

Game.prototype.useOrEquipSelectedInventoryItem = function(){
  if(!this.inventoryOpen) return;
  if(!this.inventory || this.inventory.length <= 0) return;

  const index = Phaser.Math.Clamp(
    this.selectedInventoryIndex || 0,
    0,
    this.inventory.length - 1
  );

  const item = this.inventory[index];

  if(mpIsFoodInventoryItem(item)){
    this.useFoodInventoryItem(index);
  }else{
    this.equipWeaponIndex(index);
  }

  this.openInventoryMenu();
};

Game.prototype.moveInventorySelection = function(dir){
  if(!this.inventoryOpen) return;
  if(!this.inventory || this.inventory.length <= 0) return;

  const len = this.inventory.length;

  this.selectedInventoryIndex =
    ((this.selectedInventoryIndex || 0) + dir + len) % len;

  this.openInventoryMenu();

Game.prototype.openInventoryMenu = function(){
  this.clearInventoryUI();
  this.inventoryOpen = true;

  if(!this.inventory){
    this.inventory = [];
  }

  if(this.inventory.length <= 0){
    this.selectedInventoryIndex = 0;
  }else{
    this.selectedInventoryIndex = Phaser.Math.Clamp(
      this.selectedInventoryIndex || 0,
      0,
      this.inventory.length - 1
    );
  }

  const shade = this.add.rectangle(CX, CY, W, H, 0x000000, 0.72)
    .setDepth(40000)
    .setScrollFactor(0);

  const panel = this.add.rectangle(CX, CY, 610, 410, 0x111111, 0.96)
    .setStrokeStyle(4, 0xff4fc3)
    .setDepth(40001)
    .setScrollFactor(0);

  const title = this.add.text(CX, 88, "INVENTORY", {
    font: "38px monospace",
    fill: "#fff45c",
    stroke: "#000000",
    strokeThickness: 6
  }).setOrigin(0.5).setDepth(40002).setScrollFactor(0);

  const count = this.add.text(CX, 124, this.inventory.length + " / " + mpGetSharedInventoryMax(), {
    font: "16px monospace",
    fill: "#7CFF6B",
    stroke: "#000000",
    strokeThickness: 3
  }).setOrigin(0.5).setDepth(40002).setScrollFactor(0);

  const help = this.add.text(CX, 455, "A = USE / EQUIP     B = DROP     UP/DOWN = SELECT", {
    font: "13px monospace",
    fill: "#ffffff",
    stroke: "#000000",
    strokeThickness: 3
  }).setOrigin(0.5).setDepth(40002).setScrollFactor(0);

  this.inventoryItems.push(shade, panel, title, count, help);

  if(this.inventory.length <= 0){
    const empty = this.add.text(CX, 260, "NO ITEMS", {
      font: "24px monospace",
      fill: "#ffffff",
      stroke: "#000000",
      strokeThickness: 4
    }).setOrigin(0.5).setDepth(40002).setScrollFactor(0);

    this.inventoryItems.push(empty);
  }else{
    this.inventory.forEach((item, index)=>{
      const y = 170 + index * 54;
      const isFood = mpIsFoodInventoryItem(item);
      const equipped = !isFood && index === this.currentWeaponIndex;
      const selected = index === this.selectedInventoryIndex;

      const rowColor = selected ? 0x2b1028 : 0x000000;
      const strokeColor = selected
        ? 0xfff45c
        : equipped
          ? 0x00eaff
          : isFood
            ? 0x7CFF6B
            : 0xff4fc3;

      const row = this.add.rectangle(CX, y, 530, 42, rowColor, 0.92)
        .setStrokeStyle(selected ? 4 : 2, strokeColor)
        .setDepth(40002)
        .setScrollFactor(0)
        .setInteractive();

      const typeText = isFood ? "FOOD" : "WEAPON";
      const heldText = equipped ? " HELD" : "";
      const arrow = selected ? "> " : "  ";

      const name = this.add.text(CX - 245, y, arrow + (index + 1) + ". " + item.label + " [" + typeText + "]" + heldText, {
        font: "15px monospace",
        fill: selected ? "#fff45c" : "#ffffff",
        stroke: "#000000",
        strokeThickness: 3
      }).setOrigin(0, 0.5).setDepth(40003).setScrollFactor(0);

      const actionLabel = isFood ? "A USE" : equipped ? "HELD" : "A EQUIP";

      const actionBtn = this.add.text(CX + 100, y, actionLabel, {
        font: "14px monospace",
        fill: isFood ? "#7CFF6B" : "#00eaff",
        stroke: "#000000",
        strokeThickness: 3,
        backgroundColor: "#101022"
      }).setOrigin(0.5).setDepth(40004).setScrollFactor(0).setInteractive();

      actionBtn.on("pointerdown", ()=>{
        this.selectedInventoryIndex = index;
        this.useOrEquipSelectedInventoryItem();
      });

      const dropBtn = this.add.text(CX + 205, y, "B DROP", {
        font: "14px monospace",
        fill: "#ffffff",
        stroke: "#000000",
        strokeThickness: 3,
        backgroundColor: "#220018"
      }).setOrigin(0.5).setDepth(40004).setScrollFactor(0).setInteractive();

      dropBtn.on("pointerdown", ()=>{
        this.selectedInventoryIndex = index;
        this.dropSelectedInventoryItem();
      });

      row.on("pointerdown", ()=>{
        this.selectedInventoryIndex = index;
        this.openInventoryMenu();
      });

      this.inventoryRows.push(row);
      this.inventoryItems.push(row, name, actionBtn, dropBtn);
    });
  }

  const backBtn = this.add.text(CX, 498, "BACK", {
    font: "20px monospace",
    fill: "#ffffff",
    stroke: "#000000",
    strokeThickness: 4,
    backgroundColor: "#220018"
  }).setOrigin(0.5).setDepth(40003).setScrollFactor(0).setInteractive();

  backBtn.on("pointerdown", ()=>{
    this.clearInventoryUI();
    this.openPauseMenu();
  });

  this.inventoryItems.push(backBtn);
};

function mpEnsurePickupArrays(scene){
  if(!scene) return;

  if(!scene.weaponPickups){

  if(!scene.inventory){

  if(!scene.healthItemPopulatedScreens){
    scene.healthItemPopulatedScreens = {};

  if(!scene.weaponPopulatedScreens){
    scene.weaponPopulatedScreens = {};
  }
}

/* =========================================================
   FOOD FOUR-ITEM SHEET FIX
   - Crops food images that are showing 4 items at once
   - Forces small food display size
   - Also fixes the test pizza if it exists
========================================================= */

const MP_FIXED_FOOD_W = 22;
const MP_FIXED_FOOD_H = 22;
const MP_FIXED_BIG_FOOD_W = 28;
const MP_FIXED_BIG_FOOD_H = 28;

function mpFixFoodPickupImage(obj, type){
  if(!obj || !obj.texture) return obj;

  const key = obj.texture.key || "";

  if(key.indexOf("item_") !== 0) return obj;

  try{
    const tex = obj.scene.textures.get(key);
    const src = tex && tex.source && tex.source[0];

    if(src && src.width > 80 && src.height > 80){
      // Most of your bad food images are 2x2 sheets.
      const cropW = Math.floor(src.width / 2);
      const cropH = Math.floor(src.height / 2);

      obj.setCrop(0, 0, cropW, cropH);
    }
  }catch(e){}

  const big =
    type === "pizza" ||
    type === "chicken" ||
    type === "first_aid";

  if(obj.setDisplaySize){
    obj.setDisplaySize(
      big ? MP_FIXED_BIG_FOOD_W : MP_FIXED_FOOD_W,
      big ? MP_FIXED_BIG_FOOD_H : MP_FIXED_FOOD_H
    );
  }

  return obj;
}

if(typeof Game !== "undefined"){
  Game.prototype.makeHealthItemSprite = function(type, x, y){
    const def = MP_HEALTH_ITEM_DEFS[type];
    if(!def) return null;

    let obj;

    if(hasTex(this, def.key)){
      obj = this.add.image(x, y, def.key)
        .setOrigin(0.5, 0.5);

      return mpFixFoodPickupImage(obj, type);
    }

    // Fallback placeholders.
    if(type === "pizza"){
      return this.add.triangle(x, y, -10, 8, 10, 8, 0, -9, 0xffcc55, 1)
        .setStrokeStyle(2, 0x000000);
    }

    if(type === "chicken"){
      return this.add.circle(x, y, 10, 0xd28a3c, 1)
        .setStrokeStyle(2, 0x000000);
    }

    if(type === "soda" || type === "energy_drink" || type === "water"){
      return this.add.rectangle(x, y, 11, 19, 0x55ccff, 1)
        .setStrokeStyle(2, 0x000000);
    }

    if(type === "spliff"){
      return this.add.rectangle(x, y, 20, 5, 0xe8e0c8, 1)
        .setStrokeStyle(2, 0x000000)
        .setRotation(-0.25);
    }

    return this.add.circle(x, y, 10, 0xffd35a, 1)
      .setStrokeStyle(2, 0x000000);
  };

  // Fix any test food image already made inside Game.create().
  const MP_ORIGINAL_CREATE_FOOD_FOUR_FIX = Game.prototype.create;

  Game.prototype.create = function(){
    MP_ORIGINAL_CREATE_FOOD_FOUR_FIX.call(this);

    this.children.list.forEach(obj=>{
      if(obj && obj.texture && obj.texture.key && obj.texture.key.indexOf("item_") === 0){
        mpFixFoodPickupImage(obj, obj.texture.key.replace("item_", ""));
      }
    });
  };
}

  /* =========================================================
   PLAYER + ENEMY SPEED TUNING PATCH
   - Player slower
   - Enemies slower
   - Enemies wait slightly longer between attacks
========================================================= */

const MP_PLAYER_SPEED_MULT = 0.72;
const MP_ENEMY_SPEED_MULT = 0.68;
const MP_ENEMY_ATTACK_WAIT_MULT = 1.35;

if(typeof Game !== "undefined"){
  const MP_ORIGINAL_GET_PLAYER_SPEED_MOD = Game.prototype.getPlayerSpeedMod;

  Game.prototype.getPlayerSpeedMod = function(){
    const base = MP_ORIGINAL_GET_PLAYER_SPEED_MOD
      ? MP_ORIGINAL_GET_PLAYER_SPEED_MOD.call(this)
      : 1;

    return base * MP_PLAYER_SPEED_MULT;
  };

  function mpTuneEnemySpeed(e){
    if(!e || e.mpSpeedTuned) return e;

    e.mpSpeedTuned = true;

    if(e.chaseSpeed) e.chaseSpeed *= MP_ENEMY_SPEED_MULT;

    if(e.attackCooldownMin){
      e.attackCooldownMin = Math.floor(e.attackCooldownMin * MP_ENEMY_ATTACK_WAIT_MULT);
    }

    if(e.attackCooldownMax){
      e.attackCooldownMax = Math.floor(e.attackCooldownMax * MP_ENEMY_ATTACK_WAIT_MULT);
    }

    // Slightly closer hit range.
    if(e.attackRange) e.attackRange *= 0.82;
    if(e.stopRange) e.stopRange *= 0.88;

    return e;
  }

  const MP_ORIGINAL_SPAWN_ENEMY_TYPE_SPEED =
    Game.prototype.spawnEnemyType;

  Game.prototype.spawnEnemyType = function(type, x, y, platform){
    const e = MP_ORIGINAL_SPAWN_ENEMY_TYPE_SPEED.call(this, type, x, y, platform);
    mpTuneEnemySpeed(e);
    return e;
  };

  const MP_ORIGINAL_FINISH_ENEMY_MOVE_SPEED =
    Game.prototype.finishEnemyMove;

  Game.prototype.finishEnemyMove = function(e, dt){
    if(e && !e.dead && e.state !== "thrown"){
      e.vx = (e.vx || 0) * MP_ENEMY_SPEED_MULT;
    }

    return MP_ORIGINAL_FINISH_ENEMY_MOVE_SPEED.call(this, e, dt);
  };
}

  /* =========================================================

      const btn = MP_ORIGINAL_MOBILE_BUTTON_MENU_BACKOUT.call(
        this,
        x,
        y,
        label,
        color,
        down,
        up
      );

      if(!this.mobileButtons){
        this.mobileButtons = [];
      }

      this.mobileButtons.push(btn);

      return btn;
    };
  }

  /* -----------------------------
     Controller depth helper
  ----------------------------- */

  Game.prototype.mpSetControllerDepth = function(baseDepth){
    if(this.mobileUI){
      Object.keys(this.mobileUI).forEach(key=>{
        const obj = this.mobileUI[key];

        if(obj && obj.setDepth){
          obj.setDepth(baseDepth + 10);
        }
      });
    }

    if(this.mobileButtons){
      this.mobileButtons.forEach(btn=>{
        if(!btn) return;

        if(btn.hit) btn.hit.setDepth(baseDepth + 20);
        if(btn.shadow) btn.shadow.setDepth(baseDepth + 21);
        if(btn.face) btn.face.setDepth(baseDepth + 22);
        if(btn.shine) btn.shine.setDepth(baseDepth + 23);
        if(btn.text) btn.text.setDepth(baseDepth + 24);
      });
    }
  };

  /* -----------------------------
     Open pause: controller visible
  ----------------------------- */

  const MP_ORIGINAL_OPEN_PAUSE_MENU_BACKOUT =
    Game.prototype.openPauseMenu;

  Game.prototype.openPauseMenu = function(){
    MP_ORIGINAL_OPEN_PAUSE_MENU_BACKOUT.call(this);

    this.mpSetControllerDepth(50000);

    if(this.zoneText){
      this.zoneText.setText("PAUSED - MENU TO RETURN");

  /* -----------------------------

  ----------------------------- */

  const MP_ORIGINAL_OPEN_INVENTORY_MENU_BACKOUT =
    Game.prototype.openInventoryMenu;

  Game.prototype.openInventoryMenu = function(){

    if(this.clearInventoryUI){

    MP_ORIGINAL_CLOSE_PAUSE_MENU_BACKOUT.call(this);

    this.inventoryOpen = false;
    this.pauseMenuOpen = false;

  ----------------------------- */

  const MP_ORIGINAL_TOGGLE_PAUSE_MENU_BACKOUT =

    if(this.inventoryOpen || this.pauseMenuOpen){

  /* -----------------------------
     B button behavior

  const MP_ORIGINAL_CONTEXT_B_MENU_BACKOUT =

  const MP_ORIGINAL_MAKE_KEYBOARD_MENU_BACKOUT =

  function mpForceSingleFoodFrame(obj, type){
    if(!obj || !obj.texture) return obj;

    const key = obj.texture.key || "";

    if(key.indexOf("item_") !== 0){
      return obj;
    }

    try{
      const tex = obj.scene.textures.get(key);
      const src = tex && tex.source && tex.source[0];

      if(src && src.width && src.height){
        const w = src.width;
        const h = src.height;
        const ratio = w / h;

        let cropX = 0;
        let cropY = 0;
        let cropW = w;
        let cropH = h;

        // 4 frames in one horizontal row.
        if(ratio > 2.8){
          cropW = Math.floor(w / 4);
          cropH = h;
        }
        // 2 frames in one horizontal row.
        else if(ratio > 1.45){
          cropW = Math.floor(w / 2);
          cropH = h;
        }
        // 4 frames vertical.
        else if(ratio < 0.36){
          cropW = w;
          cropH = Math.floor(h / 4);
        }
        // 2x2 sheet.
        else{
          cropW = Math.floor(w / 2);
          cropH = Math.floor(h / 2);
        }

        obj.setCrop(cropX, cropY, cropW, cropH);
      }
    }catch(e){}

    const big =
      type === "pizza" ||
      type === "chicken" ||

const MP_HUD_SAFE_X = 44;

function mpMoveHudIntoFrame(scene){
  if(!scene || !scene.children) return;

  scene.children.list.forEach(obj=>{
    if(!obj || typeof obj.text !== "string") return;

    const txt = obj.text.toUpperCase();

    const isHud =
      txt.indexOf("CHAR:") === 0 ||
      txt.indexOf("LEVEL:") === 0 ||
      txt.indexOf("COMBO:") === 0 ||
      txt.indexOf("HP:") === 0 ||
      txt.indexOf("THM:") >= 0 ||
      txt.indexOf("RHYTHM") >= 0 ||
      txt.indexOf("GROOVE") >= 0;

    if(!isHud) return;

    if(obj.x < MP_HUD_SAFE_X){
      obj.x = MP_HUD_SAFE_X;
    }

    if(obj.y < MP_HUD_SAFE_TOP){
      obj.y = MP_HUD_SAFE_TOP;
    }

    if(obj.setScrollFactor){
      obj.setScrollFactor(0);
    }

    if(obj.setDepth){

const MP_CAR_TOP_ZONE = {

};

function mpIsPlayerAirborne(scene){
  if(!scene || !scene.player) return false;

  if(scene.isJumping) return true;
  if(scene.playerJumping) return true;
  if(scene.jumpCount && scene.jumpCount > 0) return true;

  if(scene.player.body && Math.abs(scene.player.body.velocity.y) > 4){
    return true;
  }

  return false;
}

function mpTrySnapToLandingZone(scene, zone){
  if(!scene || !scene.player || !zone) return false;

  const p = scene.player;
  const px = p.x;
  const py = p.y;

  if(px < zone.minX || px > zone.maxX) return false;
  if(py < zone.y - zone.snapUp) return false;
  if(py > zone.y + zone.snapDown) return false;

  if(p.body && p.body.velocity && p.body.velocity.y < -15){
    return false;
  }

  p.y = zone.y;

  if(p.body && p.body.velocity){
    p.body.velocity.y = 0;
  }

  scene.isJumping = false;
  scene.playerJumping = false;
  scene.jumpCount = 0;
  scene.doubleJumpUsed = false;
  scene.platform = zone.platform;
  scene.currentPlatform = zone.platform;
  scene.lastPlatform = zone.platform;
  scene.playerGroundY = zone.y;

  if(scene.shadow){
    scene.shadow.x = p.x;
    scene.shadow.y = zone.y + 4;
  }

  if(scene.zoneText){
    scene.zoneText.setText(String(zone.platform).toUpperCase());
  }

  if(scene.forcePlayerReady){
    scene.forcePlayerReady();
  }

  return true;
}

/* =========================================================
   4) FORCE FOOD TO SHOW ONLY ONE FRAME
   - Crops to the first cell
   - Makes pickups tiny
========================================================= */

const MP_SMALL_FOOD_SIZE = 14;
const MP_BIG_FOOD_SIZE = 16;

const MP_FOOD_FRAME_CROP = {
  taco:         { w: 16, h: 16 },
  pizza:        { w: 16, h: 16 },
  chicken:      { w: 16, h: 16 },
  water:        { w: 16, h: 16 },
  soda:         { w: 16, h: 16 },
  energy:       { w: 16, h: 16 },
  energy_drink: { w: 16, h: 16 },
  spliff:       { w: 16, h: 16 },
  first_aid:    { w: 16, h: 16 },
  medkit:       { w: 16, h: 16 },
  hot_sauce:    { w: 16, h: 16 }
};

function mpApplySingleFrameCrop(obj, cropW, cropH, sizeW, sizeH){
  if(!obj) return obj;

  if(obj.setCrop){
    obj.setCrop(0, 0, cropW, cropH);
  }

  if(obj.setDisplaySize){
    obj.setDisplaySize(sizeW, sizeH);
  }

  return obj;
}

function mpFixExistingFoodObjects(scene){
  if(!scene || !scene.children) return;

  scene.children.list.forEach(obj=>{
    if(!obj || !obj.texture || !obj.texture.key) return;

    const key = obj.texture.key;

    if(key.indexOf("item_") !== 0) return;

    const type = key.replace("item_", "");
    const crop = MP_FOOD_FRAME_CROP[type] || { w: 16, h: 16 };

    const isBig =
      type === "pizza" ||
      type === "chicken" ||
      type === "first_aid" ||
      type === "medkit";

    const size = isBig ? MP_BIG_FOOD_SIZE : MP_SMALL_FOOD_SIZE;

    mpApplySingleFrameCrop(obj, crop.w, crop.h, size, size);
  });

  if(scene.healthItemPickups){
    scene.healthItemPickups.forEach(p=>{
      if(!p || !p.obj) return;

      const type = p.type || "";
      const crop = MP_FOOD_FRAME_CROP[type] || { w: 16, h: 16 };

      const isBig =
        type === "pizza" ||
        type === "chicken" ||
        type === "first_aid" ||
        type === "medkit";

      const size = isBig ? MP_BIG_FOOD_SIZE : MP_SMALL_FOOD_SIZE;

      mpApplySingleFrameCrop(p.obj, crop.w, crop.h, size, size);

      if(p.label){
        p.label.y = p.obj.y - 18;
      }
    });
  }
}

if(typeof Game !== "undefined"){
  Game.prototype.makeHealthItemSprite = function(type, x, y){
    if(typeof MP_HEALTH_ITEM_DEFS === "undefined") return null;

    const def = MP_HEALTH_ITEM_DEFS[type];
    if(!def) return null;

    const key = def.key;
    const crop = MP_FOOD_FRAME_CROP[type] || { w: 16, h: 16 };

    const isBig =
      type === "pizza" ||
      type === "chicken" ||
      type === "first_aid" ||
      type === "medkit";

    const size = isBig ? MP_BIG_FOOD_SIZE : MP_SMALL_FOOD_SIZE;

    if(typeof hasTex === "function" && hasTex(this, key)){
      const obj = this.add.image(x, y, key).setOrigin(0.5, 0.5);

      mpApplySingleFrameCrop(
        obj,
        crop.w,
        crop.h,
        size,
        size
      );

      return obj;
    }

    return this.add.circle(x, y, 5, 0xffd35a, 1)
      .setStrokeStyle(1, 0x000000);
  };
}

/* =========================================================
   5) ARROW BUS SIZE / POSITION FIX
   - Preserves image aspect ratio
   - Stops stretched skinny bus
   - Pushes bus farther back onto road
========================================================= */

const MP_ARROW_BUS_TARGET_W = 270;
const MP_ARROW_BUS_ROAD_Y = 285;
const MP_ARROW_BUS_DEPTH = 420;

function mpNormalizeArrowBus(bus){
  if(!bus || !bus.texture || bus.texture.key !== "arrow_bus") return;

  try{
    const tex = bus.scene.textures.get("arrow_bus");
    const src = tex && tex.source && tex.source[0];

    if(src && src.width){
      const scale = MP_ARROW_BUS_TARGET_W / src.width;
      bus.setScale(scale);
    }else{
      bus.setDisplaySize(MP_ARROW_BUS_TARGET_W, 82);
    }
  }catch(e){
    if(bus.setDisplaySize){
      bus.setDisplaySize(MP_ARROW_BUS_TARGET_W, 82);
    }
  }

  bus.y = MP_ARROW_BUS_ROAD_Y;
  bus.setOrigin(0.5, 0.75);
  bus.setDepth(MP_ARROW_BUS_DEPTH);
}

/* If your bus patch uses spawnArrowBusHazard(), normalize it there. */
if(typeof Game !== "undefined" && Game.prototype.spawnArrowBusHazard && !Game.prototype.mpArrowBusSpawnWrapped){
  Game.prototype.mpArrowBusSpawnWrapped = true;

  const MP_OLD_SPAWN_ARROW_BUS = Game.prototype.spawnArrowBusHazard;

  Game.prototype.spawnArrowBusHazard = function(){
    const result = MP_OLD_SPAWN_ARROW_BUS.apply(this, arguments);

    this.children.list.forEach(obj=>{
      mpNormalizeArrowBus(obj);
    });

    return result;
  };
}

/* If your bus patch uses createArrowBus(), normalize it there too. */
if(typeof Game !== "undefined" && Game.prototype.createArrowBus && !Game.prototype.mpCreateArrowBusWrapped){
  Game.prototype.mpCreateArrowBusWrapped = true;

  const MP_OLD_CREATE_ARROW_BUS = Game.prototype.createArrowBus;

  Game.prototype.createArrowBus = function(){
    const bus = MP_OLD_CREATE_ARROW_BUS.apply(this, arguments);

  };
}

function mpOutdoorIsActiveLevel(scene){
  return typeof selectedLevel !== "undefined" && selectedLevel === "outdoor";
}

function mpGetOutdoorScreenKey(scene){
  if(!scene) return MP_SCREEN_LEFTYS;
  return scene.mpOutdoorScreen || MP_SCREEN_LEFTYS;
}

function mpGetOutdoorScreenDef(screenKey){
  return MP_OUTDOOR_SCREENS[screenKey] || MP_OUTDOOR_SCREENS[MP_SCREEN_LEFTYS];
}

function mpGetOutdoorBounds(scene){
  var def = mpGetOutdoorScreenDef(mpGetOutdoorScreenKey(scene));
  return def && def.customBounds ? def.bounds : null;
}

function mpEnsureOutdoorBg(scene){
  if(!scene || !mpOutdoorIsActiveLevel(scene)) return;

  if(scene.mpOutdoorBg && !scene.mpOutdoorBg.destroyed){
    return;
  }

  var baseKey = hasTex(scene, "outdoor") ? "outdoor" : selectedLevel;

  scene.mpOutdoorBg = scene.add.image(CX, CY, baseKey)
    .setDisplaySize(W, H)
    .setDepth(1);
}

function mpSetOutdoorBg(scene, screenKey){
  if(!scene || !mpOutdoorIsActiveLevel(scene)) return;

  mpEnsureOutdoorBg(scene);

  var def = mpGetOutdoorScreenDef(screenKey);
  var assetKey = def.asset;

  if(scene.mpOutdoorBg){
    if(hasTex(scene, assetKey)){
      scene.mpOutdoorBg.setTexture(assetKey);
    }else{
      scene.mpOutdoorBg.setTexture(hasTex(scene, "outdoor") ? "outdoor" : selectedLevel);
    }

    scene.mpOutdoorBg
      .setDisplaySize(W, H)
      .setDepth(1);
  }
}

function mpSetVisibleDeep(obj, visible){
  if(!obj) return;

  if(obj.setVisible){
    obj.setVisible(visible);
  }

  if(obj.children && obj.children.each){
    obj.children.each(function(child){
      if(child && child.setVisible){
        child.setVisible(visible);
      }
    });
  }
}

function mpUpdateScreenObjects(scene){
  if(!scene) return;

  var screenKey = mpGetOutdoorScreenKey(scene);
  var onLeftys = screenKey === MP_SCREEN_LEFTYS;

  // Hide Lefty's-specific foreground objects on side maps.
  if(scene.barricadeFront){
    mpSetVisibleDeep(scene.barricadeFront, onLeftys);
  }

  // Screen-specific food/drink pickups.
  if(scene.healthItemPickups){
    scene.healthItemPickups.forEach(function(p){
      if(!p) return;

      var visible =
        !p.pickedUp &&
        (!p.screenKey || p.screenKey === screenKey);

      if(p.obj) p.obj.setVisible(visible);
      if(p.label) p.label.setVisible(visible);
    });
  }

  // Screen-specific weapons.
  if(scene.weaponPickups){
    scene.weaponPickups.forEach(function(p){
      if(!p) return;

      var visible =
        !p.pickedUp &&
        (!p.screenKey || p.screenKey === screenKey);

      if(p.obj) p.obj.setVisible(visible);
      if(p.label) p.label.setVisible(visible);
    });
  }
}

function mpMoveEnemiesToOutdoorScreen(scene, screenKey, spawn){
  if(!scene || !scene.enemies || !spawn) return;

  var def = mpGetOutdoorScreenDef(screenKey);
  var bounds = def.bounds || {minX:120,maxX:860,minY:390,maxY:390};

  scene.enemies.forEach(function(e){
    if(!e || e.dead || e.state === "dead") return;

    var enemyY = def.customBounds
      ? Phaser.Math.Clamp(spawn.y + Phaser.Math.Between(-35, 35), bounds.minY + 15, bounds.maxY - 15)
      : spawn.y;

    e.platform = def.platform;
    e.homeY = enemyY;
    e.y = enemyY;

    e.x = Phaser.Math.Clamp(
      spawn.x + Phaser.Math.Between(-260, 260),
      bounds.minX + 40,
      bounds.maxX - 40
    );

    e.vx = 0;
    e.busy = false;
    e.transitioning = false;
    e.attackCooldown = Phaser.Math.Between(450, 1100);

    if(scene.safeEnemyPlay){
      scene.safeEnemyPlay(e, "idle");
    }

    if(scene.updateEnemyVisuals){
      scene.updateEnemyVisuals(e);
    }
  });
}

function mpSwitchOutdoorScreen(scene, screenKey, spawnOverride){
  if(!scene || !mpOutdoorIsActiveLevel(scene)) return;

  var def = mpGetOutdoorScreenDef(screenKey);
  var spawn = spawnOverride || def.spawn || {x:470,y:390};

  scene.mpOutdoorScreen = def.key;
  scene.platform = def.platform;

  mpSetOutdoorBg(scene, def.key);

  if(scene.player){
    scene.player.x = spawn.x;
    scene.player.y = spawn.y;
  }

  if(scene.shadow){
    scene.shadow.x = spawn.x;
    scene.shadow.y = spawn.y + 5;
  }

  mpMoveEnemiesToOutdoorScreen(scene, def.key, spawn);

  if(scene.zoneText){
    scene.zoneText.setText(def.label);
  }

  if(scene.populateHealthItemsForScreen){
    scene.populateHealthItemsForScreen(def.key);
  }

  if(scene.populateRandomWeaponsForScreen){
    scene.populateRandomWeaponsForScreen(def.key);
  }

  if(scene.forcePlayerReady){
    scene.forcePlayerReady();
  }

  mpUpdateScreenObjects(scene);
}

if(typeof Game !== "undefined" && !Game.prototype.mpOutdoorChainWrapped){
  Game.prototype.mpOutdoorChainWrapped = true;

  var MP_OLD_GAME_CREATE_OUTDOOR_CHAIN = Game.prototype.create;

  Game.prototype.create = function(){
    MP_OLD_GAME_CREATE_OUTDOOR_CHAIN.call(this);

    if(mpOutdoorIsActiveLevel(this)){
      this.mpOutdoorScreen = MP_SCREEN_LEFTYS;
      mpEnsureOutdoorBg(this);
      mpSetOutdoorBg(this, MP_SCREEN_LEFTYS);
      mpUpdateScreenObjects(this);
    }
  };

  var MP_OLD_APPLY_BOUNDS_OUTDOOR_CHAIN = Game.prototype.applyPlatformBounds;

  Game.prototype.applyPlatformBounds = function(){
    if(mpOutdoorIsActiveLevel(this) && this.player){
      var bounds = mpGetOutdoorBounds(this);

      if(bounds){
        this.player.x = Phaser.Math.Clamp(this.player.x, bounds.minX, bounds.maxX);
        this.player.y = Phaser.Math.Clamp(this.player.y, bounds.minY, bounds.maxY);
        return;
      }
    }

    if(MP_OLD_APPLY_BOUNDS_OUTDOOR_CHAIN){
      MP_OLD_APPLY_BOUNDS_OUTDOOR_CHAIN.call(this);
    }
  };

  var MP_OLD_GAME_UPDATE_OUTDOOR_CHAIN = Game.prototype.update;

  Game.prototype.update = function(time, delta){
    if(MP_OLD_GAME_UPDATE_OUTDOOR_CHAIN){
      MP_OLD_GAME_UPDATE_OUTDOOR_CHAIN.call(this, time, delta);
    }

    if(!mpOutdoorIsActiveLevel(this) || !this.player) return;

    var screenKey = mpGetOutdoorScreenKey(this);
    var def = mpGetOutdoorScreenDef(screenKey);
    var bounds = def.customBounds ? def.bounds : null;

    if(this.playerBusy || this.isJumping || this.isClimbing){
      mpUpdateScreenObjects(this);
      return;
    }

    // LEFT transition.
    if(this.moveX < -0.35){
      if(screenKey === MP_SCREEN_LEFTYS && this.player.x <= 123 && def.leftTo){
        mpSwitchOutdoorScreen(this, def.leftTo);
        return;
      }

      if(bounds && this.player.x <= bounds.minX + 2 && def.leftTo){
        mpSwitchOutdoorScreen(this, def.leftTo);
        return;
      }
    }

    // RIGHT transition.
    if(this.moveX > 0.35 && def.rightTo){
      if(screenKey !== MP_SCREEN_LEFTYS && bounds && this.player.x >= bounds.maxX - 4){
        var targetDef = mpGetOutdoorScreenDef(def.rightTo);
        var returnSpawn = targetDef.returnRight || targetDef.spawn || {x:120,y:390};

        mpSwitchOutdoorScreen(this, def.rightTo, returnSpawn);
        return;
      }
    }

    mpUpdateScreenObjects(this);
  };

  var MP_OLD_HEALTH_POINTS_OUTDOOR_CHAIN =
    Game.prototype.getHealthItemSpawnPoints;

  Game.prototype.getHealthItemSpawnPoints = function(screenKey){
    if(MP_HEALTH_POINTS_BY_SCREEN[screenKey]){
      return MP_HEALTH_POINTS_BY_SCREEN[screenKey];
    }

    if(MP_OLD_HEALTH_POINTS_OUTDOOR_CHAIN){
      return MP_OLD_HEALTH_POINTS_OUTDOOR_CHAIN.call(this, screenKey);
    }

    return [];
  };

  var MP_OLD_WEAPON_POINTS_OUTDOOR_CHAIN =

      return MP_OLD_WEAPON_POINTS_OUTDOOR_CHAIN.call(this, screenKey);
    }

    return [];
  };

  if(Game.prototype.spawnHealthItemPickup && !Game.prototype.mpOutdoorChainHealthSpawnWrapped){
    Game.prototype.mpOutdoorChainHealthSpawnWrapped = true;

    var MP_OLD_SPAWN_HEALTH_OUTDOOR_CHAIN =
      Game.prototype.spawnHealthItemPickup;

    Game.prototype.spawnHealthItemPickup = function(type, x, y, platform, screenKey){
      if(!screenKey && this.mpOutdoorScreen){
        screenKey = this.mpOutdoorScreen;
      }

      return MP_OLD_SPAWN_HEALTH_OUTDOOR_CHAIN.call(this, type, x, y, platform, screenKey);
    };
  }

  if(Game.prototype.spawnWeaponPickup && !Game.prototype.mpOutdoorChainWeaponSpawnWrapped){
    Game.prototype.mpOutdoorChainWeaponSpawnWrapped = true;

    var MP_OLD_SPAWN_WEAPON_OUTDOOR_CHAIN =

    Game.prototype.spawnWeaponPickup = function(type, x, y, platform, screenKey){
      if(!screenKey && this.mpOutdoorScreen){
        screenKey = this.mpOutdoorScreen;
      }

      return MP_OLD_SPAWN_WEAPON_OUTDOOR_CHAIN.call(this, type, x, y, platform, screenKey);
    };
  }

   - Adds STICK button near left controls
   - FIXED = normal joystick
   - FLOAT = joystick appears where you touch on left side
========================================================= */

if(typeof window.MP_STICK_FLOATING === "undefined"){
  try{
    window.MP_STICK_FLOATING =
      localStorage.getItem("MP_STICK_FLOATING") === "1";
  }catch(e){
    window.MP_STICK_FLOATING = false;
  }
}

if(typeof Game !== "undefined" && !Game.prototype.mpToggleStickWrapped){
  Game.prototype.mpToggleStickWrapped = true;

  var MP_OLD_MAKE_MOBILE_CONTROLS_TOGGLE_STICK =
    Game.prototype.makeMobileControls;

  Game.prototype.makeMobileControls = function(){
    MP_OLD_MAKE_MOBILE_CONTROLS_TOGGLE_STICK.call(this);

    var scene = this;
    var toggleX = 105;
    var toggleY = H - 245;

    var box = this.add.rectangle(toggleX, toggleY, 112, 32, 0x000000, 0.42)
      .setStrokeStyle(2, 0xffffff, 0.35)
      .setDepth(9600)
      .setScrollFactor(0)
      .setInteractive();

    var label = this.add.text(toggleX, toggleY, "", {
      font:"12px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:3
    })
      .setOrigin(0.5)
      .setDepth(9601)
      .setScrollFactor(0);

    function refreshStickLabel(){
      label.setText(window.MP_STICK_FLOATING ? "STICK: FLOAT" : "STICK: FIX");
    }

    refreshStickLabel();

    box.on("pointerdown", function(p){
      if(p && p.event && p.event.preventDefault){
        p.event.preventDefault();
      }

      window.MP_STICK_FLOATING = !window.MP_STICK_FLOATING;

      try{
        localStorage.setItem("MP_STICK_FLOATING", window.MP_STICK_FLOATING ? "1" : "0");
      }catch(e){}

      refreshStickLabel();
    });

    if(!this.mobileUI){
      this.mobileUI = {};
    }

    this.mobileUI.stickToggleBox = box;
    this.mobileUI.stickToggleLabel = label;

    var floatDragging = false;

    function moveFloatingStick(p){
      if(!scene.mobileUI || !scene.mobileUI.stickBase || !scene.mobileUI.stickKnob) return;

      var base = scene.mobileUI.stickBase;
      var knob = scene.mobileUI.stickKnob;

      var dx = p.x - base.x;
      var dy = p.y - base.y;

      var max = 44 * (typeof CONTROL_ZOOM !== "undefined" ? CONTROL_ZOOM : 1);
      var d = Math.sqrt(dx * dx + dy * dy);

      if(d > max){
        dx = (dx / d) * max;
        dy = (dy / d) * max;
      }

      knob.x = base.x + dx;
      knob.y = base.y + dy;

      scene.stickX = dx / max;
      scene.stickY = dy / max;
    }

    this.input.on("pointerdown", function(p){
      if(!window.MP_STICK_FLOATING) return;
      if(!p) return;

      // Only use floating stick on left half of screen.
      if(p.x > W * 0.42) return;

      // Ignore tap directly on toggle button.
      if(Math.abs(p.x - toggleX) < 75 && Math.abs(p.y - toggleY) < 45) return;

      if(!scene.mobileUI || !scene.mobileUI.stickBase || !scene.mobileUI.stickKnob) return;

      floatDragging = true;

      scene.mobileUI.stickBase.x = p.x;
      scene.mobileUI.stickBase.y = p.y;
      scene.mobileUI.stickKnob.x = p.x;
      scene.mobileUI.stickKnob.y = p.y;

      scene.stickX = 0;
      scene.stickY = 0;
    });

    this.input.on("pointermove", function(p){
      if(!window.MP_STICK_FLOATING) return;
      if(!floatDragging) return;

      moveFloatingStick(p);
    });

    this.input.on("pointerup", function(){
      if(!window.MP_STICK_FLOATING) return;

      floatDragging = false;

      if(scene.mobileUI && scene.mobileUI.stickBase && scene.mobileUI.stickKnob){
        scene.mobileUI.stickKnob.x = scene.mobileUI.stickBase.x;
        scene.mobileUI.stickKnob.y = scene.mobileUI.stickBase.y;
      }

      scene.stickX = 0;
      scene.stickY = 0;
    });

    this.input.on("pointerupoutside", function(){
      if(!window.MP_STICK_FLOATING) return;

      floatDragging = false;

      if(scene.mobileUI && scene.mobileUI.stickBase && scene.mobileUI.stickKnob){
        scene.mobileUI.stickKnob.x = scene.mobileUI.stickBase.x;
        scene.mobileUI.stickKnob.y = scene.mobileUI.stickBase.y;
      }

      scene.stickX = 0;
      scene.stickY = 0;
    });
  };
}

    Game.prototype.mpBusRouteWrapped = true;

    var MP_OLD_SPAWN_ARROW_BUS_ROUTE = Game.prototype.spawnArrowBusHazard;

    Game.prototype.spawnArrowBusHazard = function(){
      var result = MP_OLD_SPAWN_ARROW_BUS_ROUTE.apply(this, arguments);

      mpFixAllArrowBuses(this);

      return result;
    };
  }

  /* =======================================================
     3) ENEMY WEAPON / HEALTH PICKUP AI
  ======================================================= */

  var MP_ENEMY_LOOT_CHECK_MS = 220;
  var MP_ENEMY_LOOT_SPEED = 1.55;
  var MP_ENEMY_PICKUP_DIST = 30;
  var MP_ENEMY_WEAPON_SEARCH_DIST = 260;
  var MP_ENEMY_HEALTH_SEARCH_DIST = 360;
  var MP_ENEMY_LOW_HEALTH_RATIO = 0.48;

  function mpEnemySprite(e){
    if(!e) return null;
    return e.sprite || e.body || e.obj || e;
  }

  function mpEnemyX(e){
    var s = mpEnemySprite(e);
    return s && typeof s.x === "number" ? s.x : (e.x || 0);
  }

  function mpEnemyY(e){
    var s = mpEnemySprite(e);
    return s && typeof s.y === "number" ? s.y : (e.y || 0);
  }

  function mpSetEnemyPos(e, x, y){
    var s = mpEnemySprite(e);

    if(s){
      s.x = x;
      s.y = y;
    }

    e.x = x;
    e.y = y;

    if(e.label){
      e.label.x = x;
      e.label.y = y - 78;
    }

    if(e.healthBar){
      e.healthBar.x = x;
      e.healthBar.y = y - 60;
    }

    if(e.nameText){
      e.nameText.x = x;
      e.nameText.y = y - 88;
    }
  }

  function mpDist(a, b){
    var dx = a.x - b.x;
    var dy = a.y - b.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function mpEnemyMaxHp(e){
    return Number(e.maxHp || e.maxHealth || e.baseHp || 100);
  }

  function mpEnemyHp(e){
    return Number(e.hp || e.health || e.maxHp || e.maxHealth || 100);
  }

  function mpSetEnemyHp(e, hp){
    var max = mpEnemyMaxHp(e);
    var fixed = Phaser.Math.Clamp(hp, 0, max);

    if(typeof e.hp !== "undefined") e.hp = fixed;
    if(typeof e.health !== "undefined") e.health = fixed;

    if(typeof e.hp === "undefined" && typeof e.health === "undefined"){
      e.hp = fixed;
    }
  }

  function mpEnemyNeedsHealth(e){
    var max = mpEnemyMaxHp(e);
    var hp = mpEnemyHp(e);

    return max > 0 && hp / max <= MP_ENEMY_LOW_HEALTH_RATIO;
  }

  function mpPickupPoint(p){
    var obj = p && (p.obj || p.sprite || p.body);
    if(!obj) return null;

    if(p.pickedUp) return null;
    if(obj.visible === false) return null;

    return {
      x: obj.x,
      y: obj.y,
      obj: obj,
      pickup: p
    };
  }

  function mpCurrentScreenMatches(scene, p){
    if(!scene || !p) return true;

    var current = scene.mpOutdoorScreen || "leftys_outdoor";

    if(!p.screenKey) return true;

    return p.screenKey === current;
  }

  function mpNearestHealthPickup(scene, e){
    if(!scene || !scene.healthItemPickups) return null;

    var ex = mpEnemyX(e);
    var ey = mpEnemyY(e);
    var best = null;
    var bestD = 999999;

    scene.healthItemPickups.forEach(function(p){
      if(!mpCurrentScreenMatches(scene, p)) return;

      var pt = mpPickupPoint(p);
      if(!pt) return;

      var d = mpDist({x:ex, y:ey}, pt);

      if(d < bestD && d <= MP_ENEMY_HEALTH_SEARCH_DIST){
        bestD = d;
        best = pt;
      }
    });

    return best;
  }

  function mpNearestWeaponPickup(scene, e){
    if(!scene || !scene.weaponPickups) return null;

    var ex = mpEnemyX(e);
    var ey = mpEnemyY(e);
    var best = null;
    var bestD = 999999;

    scene.weaponPickups.forEach(function(p){
      if(!mpCurrentScreenMatches(scene, p)) return;

      var pt = mpPickupPoint(p);
      if(!pt) return;

      var d = mpDist({x:ex, y:ey}, pt);

      if(d < bestD && d <= MP_ENEMY_WEAPON_SEARCH_DIST){
        bestD = d;
        best = pt;
      }
    });

    return best;
  }

  function mpGetHealthAmount(type){
    if(typeof MP_HEALTH_ITEM_DEFS !== "undefined" && MP_HEALTH_ITEM_DEFS[type]){
      var def = MP_HEALTH_ITEM_DEFS[type];

      return Number(
        def.heal ||
        def.hp ||
        def.amount ||
        def.value ||
        10
      );
    }

    if(type === "pizza") return 22;
    if(type === "chicken") return 35;
    if(type === "taco") return 12;
    if(type === "water") return 6;
    if(type === "soda") return 8;
    if(type === "energy_drink" || type === "energy") return 5;
    if(type === "first_aid") return 45;

    return 10;
  }

  function mpEnemyUseHealthPickup(scene, e, p){
    if(!scene || !e || !p) return;

    var type = p.type || "food";
    var heal = mpGetHealthAmount(type);

    mpSetEnemyHp(e, mpEnemyHp(e) + heal);

    p.pickedUp = true;

    if(p.obj) p.obj.setVisible(false);
    if(p.label) p.label.setVisible(false);

    if(scene.add){
      scene.add.text(mpEnemyX(e), mpEnemyY(e) - 70, "+" + heal + " " + String(type).toUpperCase(), {
        font: "13px monospace",
        fill: "#7CFF6B",
        stroke: "#000000",
        strokeThickness: 4
      })
        .setOrigin(0.5)
        .setDepth(30000)
        .setScrollFactor(0);
    }
  }

  function mpGetWeaponDef(type){
    if(typeof MPW_DEFS !== "undefined" && MPW_DEFS[type]) return MPW_DEFS[type];
    if(typeof MP_WEAPON_DEFS !== "undefined" && MP_WEAPON_DEFS[type]) return MP_WEAPON_DEFS[type];
    return null;
  }

  function mpEnemyAttachWeaponVisual(scene, e, type){
    if(!scene || !e) return;

    var def = mpGetWeaponDef(type);
    if(!def || !def.key || !hasTex(scene, def.key)) return;

    if(e.mpWeaponObj && e.mpWeaponObj.destroy){
      e.mpWeaponObj.destroy();
    }

    var obj = scene.add.image(mpEnemyX(e) + 18, mpEnemyY(e) - 43, def.key)
      .setOrigin(0.5)
      .setDepth(mpEnemyY(e) + 45);

    var longWeapon =
      type === "bat" ||
      type === "pipe" ||
      type === "bottle" ||
      type === "chain";

    obj.setDisplaySize(longWeapon ? 42 : 28, longWeapon ? 28 : 24);
    obj.setRotation(def.rotation || -0.25);

    e.mpWeaponObj = obj;
  }

  function mpEnemyPickupWeapon(scene, e, p){
    if(!scene || !e || !p) return;

    var type = p.type || "pipe";
    var def = mpGetWeaponDef(type) || {};

    e.mpWeaponType = type;
    e.mpWeaponDamageBonus = Number(def.damage || 8);

    if(!e.mpBaseDamageSaved){
      e.mpBaseDamageSaved = true;

      if(typeof e.damage !== "undefined") e.mpBaseDamage = e.damage;
      if(typeof e.attackDamage !== "undefined") e.mpBaseAttackDamage = e.attackDamage;
      if(typeof e.hitDamage !== "undefined") e.mpBaseHitDamage = e.hitDamage;
    }

    if(typeof e.damage !== "undefined"){
      e.damage = Number(e.mpBaseDamage || e.damage || 8) + e.mpWeaponDamageBonus;
    }

    if(typeof e.attackDamage !== "undefined"){
      e.attackDamage = Number(e.mpBaseAttackDamage || e.attackDamage || 8) + e.mpWeaponDamageBonus;
    }

    if(typeof e.hitDamage !== "undefined"){
      e.hitDamage = Number(e.mpBaseHitDamage || e.hitDamage || 8) + e.mpWeaponDamageBonus;
    }

    // If your enemy attacks read attackRange/stopRange, do not make it huge.
    if(e.attackRange && !e.mpWeaponRangeTuned){
      e.mpWeaponRangeTuned = true;
      e.attackRange = Math.min(e.attackRange + 10, 62);
    }

    p.pickedUp = true;

    if(p.obj) p.obj.setVisible(false);
    if(p.label) p.label.setVisible(false);

    mpEnemyAttachWeaponVisual(scene, e, type);
  }

  function mpUpdateEnemyWeaponVisual(e){
    if(!e || !e.mpWeaponObj) return;

    var x = mpEnemyX(e);
    var y = mpEnemyY(e);

    var facing = e.facing || e.dir || e.lastDir || "right";
    var sx = String(facing).indexOf("left") >= 0 ? -1 : 1;

    e.mpWeaponObj.x = x + (sx * 19);
    e.mpWeaponObj.y = y - 43;
    e.mpWeaponObj.setDepth(y + 45);

    if(e.mpWeaponObj.setFlipX){
      e.mpWeaponObj.setFlipX(sx < 0);
    }
  }

  function mpEnemyWalkTowardPickup(scene, e, pt, dt){
    if(!scene || !e || !pt) return false;

    var ex = mpEnemyX(e);
    var ey = mpEnemyY(e);
    var dx = pt.x - ex;
    var dy = pt.y - ey;
    var d = Math.sqrt(dx * dx + dy * dy);

    if(d <= MP_ENEMY_PICKUP_DIST){
      return true;
    }

    var step = MP_ENEMY_LOOT_SPEED * Math.max(1, dt / 16.67);

    var nx = ex + (dx / d) * step;
    var ny = ey + (dy / d) * step;

    mpSetEnemyPos(e, nx, ny);

    e.busy = false;
    e.state = "chase";

    return false;
  }

  function mpTuneEnemyAggression(e){
    if(!e || e.mpAggroTuned) return;

    e.mpAggroTuned = true;

    if(typeof e.chaseSpeed === "number"){
      e.chaseSpeed *= 1.08;
    }

    if(typeof e.speed === "number"){
      e.speed *= 1.06;
    }

    if(typeof e.attackCooldownMin === "number"){
      e.attackCooldownMin = Math.max(260, Math.floor(e.attackCooldownMin * 0.82));
    }

    if(typeof e.attackCooldownMax === "number"){
      e.attackCooldownMax = Math.max(520, Math.floor(e.attackCooldownMax * 0.86));
    }

    if(typeof e.thinkDelay === "number"){
      e.thinkDelay = Math.max(160, Math.floor(e.thinkDelay * 0.75));
    }

    if(typeof e.reactionDelay === "number"){
      e.reactionDelay = Math.max(120, Math.floor(e.reactionDelay * 0.75));
    }

    // Slightly closer/faster pressure, not huge long-range hits.
    if(typeof e.stopRange === "number"){
      e.stopRange = Math.max(28, Math.floor(e.stopRange * 0.92));
    }
  }

  function mpUpdateEnemyPickupAI(scene, time, dt){
    if(!scene || !scene.enemies) return;

    scene.enemies.forEach(function(e){
      if(!e || e.dead || e.state === "dead") return;

      mpTuneEnemyAggression(e);
      mpUpdateEnemyWeaponVisual(e);

      if(!e.mpNextLootCheck || time >= e.mpNextLootCheck){
        e.mpNextLootCheck = time + MP_ENEMY_LOOT_CHECK_MS + Phaser.Math.Between(0, 160);

        e.mpLootTarget = null;
        e.mpLootTargetKind = null;

        // Low-health enemies prioritize food/health.
        if(mpEnemyNeedsHealth(e)){
          var hpTarget = mpNearestHealthPickup(scene, e);

          if(hpTarget){
            e.mpLootTarget = hpTarget;
            e.mpLootTargetKind = "health";
          }
        }

        // Weaponless enemies look for nearby weapons.
        if(!e.mpLootTarget && !e.mpWeaponType){
          var weaponTarget = mpNearestWeaponPickup(scene, e);

          if(weaponTarget){
            e.mpLootTarget = weaponTarget;
            e.mpLootTargetKind = "weapon";
          }
        }
      }

      if(e.mpLootTarget && e.mpLootTarget.pickup && !e.mpLootTarget.pickup.pickedUp){
        var reached = mpEnemyWalkTowardPickup(scene, e, e.mpLootTarget, dt);

        if(reached){
          if(e.mpLootTargetKind === "health"){
            mpEnemyUseHealthPickup(scene, e, e.mpLootTarget.pickup);
          }else if(e.mpLootTargetKind === "weapon"){
            mpEnemyPickupWeapon(scene, e, e.mpLootTarget.pickup);
          }

          e.mpLootTarget = null;
          e.mpLootTargetKind = null;
        }
      }
    });
  }

  if(Game.prototype.spawnEnemyType && !Game.prototype.mpAggroSpawnWrapped){
    Game.prototype.mpAggroSpawnWrapped = true;

    var MP_OLD_SPAWN_ENEMY_AGGRO = Game.prototype.spawnEnemyType;

    Game.prototype.spawnEnemyType = function(type, x, y, platform){
      var e = MP_OLD_SPAWN_ENEMY_AGGRO.call(this, type, x, y, platform);
      mpTuneEnemyAggression(e);
      return e;
    };
  }

  /* =======================================================
     4) WRAP CREATE / UPDATE
  ======================================================= */

  var MP_OLD_CREATE_JT_BUS_ENEMY_AI = Game.prototype.create;

  Game.prototype.create = function(){
    MP_OLD_CREATE_JT_BUS_ENEMY_AI.call(this);

    mpApplyJTSize(this);
    mpFixAllArrowBuses(this);

    if(this.time){
      this.time.delayedCall(120, ()=>{
        mpApplyJTSize(this);
        mpFixAllArrowBuses(this);

        if(this.enemies){
          this.enemies.forEach(mpTuneEnemyAggression);
        }
      });
    }
  };

  var MP_OLD_UPDATE_JT_BUS_ENEMY_AI = Game.prototype.update;

  Game.prototype.update = function(time, delta){
    if(MP_OLD_UPDATE_JT_BUS_ENEMY_AI){
      MP_OLD_UPDATE_JT_BUS_ENEMY_AI.call(this, time, delta);
    }

    mpApplyJTSize(this);
    mpFixAllArrowBuses(this);
    mpUpdateEnemyPickupAI(this, time || 0, delta || 16.67);
  };

})();

 /* =========================================================

(function(){
  if(window.MP_FOOD_VISIBLE_TOGGLE_STICK_PATCH_V1) return;

     1) FOOD SIZE OVERRIDE

       MP_FORCE_FOOD_CROP = false;
  ======================================================= */

  var MP_FORCE_FOOD_CROP = true;

  var MP_FOOD_VISIBLE_SIZE = 32;
  var MP_BIG_FOOD_VISIBLE_SIZE = 36;

  function mpFoodTypeFromKey(key){
    return String(key || "").replace("item_", "");
  }

  function mpIsBigFood(type){
    return (
      type === "pizza" ||
      type === "chicken" ||
      type === "first_aid" ||
      type === "medkit"
    );
  }

  function mpFixFoodVisible(obj, type){
    if(!obj || !obj.texture) return obj;

    var key = obj.texture.key || "";
    if(key.indexOf("item_") !== 0) return obj;

    type = type || mpFoodTypeFromKey(key);

    if(MP_FORCE_FOOD_CROP && obj.setCrop){
      try{
        var tex = obj.scene.textures.get(key);
        var src = tex && tex.source && tex.source[0];

        if(src && src.width && src.height){
          var w = src.width;
          var h = src.height;
          var cropW = w;
          var cropH = h;
          var ratio = w / h;

          // 4 horizontal frames
          if(ratio > 2.8){
            cropW = Math.floor(w / 4);
            cropH = h;
          }
          // 2 horizontal frames
          else if(ratio > 1.35){
            cropW = Math.floor(w / 2);
            cropH = h;
          }
          // 4 vertical frames
          else if(ratio < 0.38){
            cropW = w;
            cropH = Math.floor(h / 4);
          }
          // 2x2 sheet
          else{
            cropW = Math.floor(w / 2);
            cropH = Math.floor(h / 2);
          }

          obj.setCrop(0, 0, cropW, cropH);
        }
      }catch(e){}
    }

    if(obj.setDisplaySize){
      var size = mpIsBigFood(type)
        ? MP_BIG_FOOD_VISIBLE_SIZE
        : MP_FOOD_VISIBLE_SIZE;

      obj.setDisplaySize(size, size);
    }

    return obj;
  }

  if(Game.prototype.makeHealthItemSprite && !Game.prototype.mpFoodVisibleWrapped){

    Game.prototype.makeHealthItemSprite = function(type, x, y){
      var obj = MP_OLD_MAKE_HEALTH_VISIBLE.call(this, type, x, y);
      return mpFixFoodVisible(obj, type);
    };
  }

  function mpFixAllFoodVisible(scene){
    if(!scene || !scene.children) return;

    scene.children.list.forEach(function(obj){
      if(obj && obj.texture && obj.texture.key && obj.texture.key.indexOf("item_") === 0){
        mpFixFoodVisible(obj, mpFoodTypeFromKey(obj.texture.key));
      }

    if(scene.healthItemPickups){
      scene.healthItemPickups.forEach(function(p){
        if(!p || !p.obj) return;

        mpFixFoodVisible(p.obj, p.type);

          p.label.setDepth(30000);

  if(typeof window.MP_STICK_FLOATING === "undefined"){

      window.MP_STICK_FLOATING =
        localStorage.getItem("MP_STICK_FLOATING") === "1";
    }catch(e){
      window.MP_STICK_FLOATING = false;
    }
  }

  function mpFindButtonDiamondCenter(scene){
    var found = [];

    if(scene.mobileButtons){
      scene.mobileButtons.forEach(function(btn){
        if(!btn || !btn.text) return;

        var label = String(btn.text.text || "").toUpperCase();

        if(label === "A" || label === "B" || label === "X" || label === "Y"){
          found.push(btn.text);
        }
      });
    }

    if(found.length > 0){
      var sx = 0;
      var sy = 0;

      found.forEach(function(t){
        sx += t.x;
        sy += t.y;
      });

      return {
        x: sx / found.length,
        y: sy / found.length
      };
    }

    // Fallback: approximate center of right button diamond.
    return {
      x: W - 135,
      y: H - 125
    };
  }

  function mpCreateOrMoveStickToggle(scene){

    var diamond = mpFindButtonDiamondCenter(scene);

    // Exact mirror opposite of button diamond.
    var toggleX = W - diamond.x;
    var toggleY = diamond.y;

    // Keep it safely inside the left side.
    toggleX = Phaser.Math.Clamp(toggleX, 82, 180);
    toggleY = Phaser.Math.Clamp(toggleY, H - 190, H - 78);

      )
        .setStrokeStyle(2, 0xffffff, 0.45)
        .setDepth(97000)
        .setScrollFactor(0)
        .setInteractive();

      })
        .setOrigin(0.5)

        if(p && p.event && p.event.preventDefault){
          p.event.preventDefault();
        }

        window.MP_STICK_FLOATING = !window.MP_STICK_FLOATING;

        try{
          localStorage.setItem(
            "MP_STICK_FLOATING",
            window.MP_STICK_FLOATING ? "1" : "0"
          );
        }catch(e){}

        mpRefreshStickToggle(scene);
      });
    }

    scene.mobileUI.stickToggleBox.x = toggleX;
    scene.mobileUI.stickToggleBox.y = toggleY;
    scene.mobileUI.stickToggleBox.setVisible(true);
    scene.mobileUI.stickToggleBox.setDepth(97000);

    if(scene.mobileUI.stickToggleLabel){
      scene.mobileUI.stickToggleLabel.x = toggleX;
      scene.mobileUI.stickToggleLabel.y = toggleY;
      scene.mobileUI.stickToggleLabel.setVisible(true);
      scene.mobileUI.stickToggleLabel.setDepth(97001);

  }

  function mpRefreshStickToggle(scene){
    if(!scene || !scene.mobileUI || !scene.mobileUI.stickToggleLabel) return;

    scene.mobileUI.stickToggleLabel.setText(
      window.MP_STICK_FLOATING ? "STICK: FLOAT" : "STICK: FIX"
    );

     3) FLOATING STICK INPUT SAFETY

  if(Game.prototype.makeMobileControls && !Game.prototype.mpMirrorStickInputWrapped){

        mpCreateOrMoveStickToggle(scene);
      });

      function moveFloatingStick(p){
        if(!scene.mobileUI || !scene.mobileUI.stickBase || !scene.mobileUI.stickKnob) return;

        var base = scene.mobileUI.stickBase;
        var knob = scene.mobileUI.stickKnob;

        var dx = p.x - base.x;
        var dy = p.y - base.y;

        var max = 44 * (typeof CONTROL_ZOOM !== "undefined" ? CONTROL_ZOOM : 1);
        var d = Math.sqrt(dx * dx + dy * dy);

        if(d > max){
          dx = (dx / d) * max;
          dy = (dy / d) * max;
        }

        scene.stickX = 0;

      this.input.on("pointermove", function(p){

      });

      this.input.on("pointerup", function(){

/* =========================================================
   LEFTY'S DOWN-TO-LOWER + X-JUMP PATCH V3
   - Does NOT break ladders/stairs
   - DOWN goes to lower Lefty's only when NOT near ladder/stairs
   - JUMP at X sends player to third/top platform
   - Walking in front of X does nothing
   Paste ABOVE: const config = {
========================================================= */

(function(){
  if(window.MP_LEFTYS_DOWN_AND_X_JUMP_PATCH_V3) return;
  window.MP_LEFTYS_DOWN_AND_X_JUMP_PATCH_V3 = true;

  if(typeof Game === "undefined") return;

  /* =======================================================
     LOWER SCREEN TRIGGER
     This is the normal lower fight lane.
     DOWN works here unless near ladder/stairs.
  ======================================================= */

  var MP_LEFTYS_DOWN_TO_LOWER_ZONE = {
    minX: 80,
    maxX: 900,
    minY: 390,
    maxY: 520
  };

  /* =======================================================
     X JUMP ZONE
     Press JUMP at the X to go to third/top platform.
  ======================================================= */

  var MP_LEFTYS_X_JUMP_ZONE = {
    minX: 500,
    maxX: 625,
    minY: 145,
    maxY: 265
  };

  var MP_LEFTYS_THIRD_PLATFORM_SNAP = {
    x: 560,
    y: 182,
    platform: "top"
  };

  var MP_LEFTYS_LOWER_SPAWN = {
    x: 820,
    y: 390,
    platform: "lower"
  };

  function mpIsLeftysOutdoorScreenV3(scene){
    if(!scene) return false;

    var isOutdoor =
      typeof selectedLevel !== "undefined" &&
      selectedLevel === "outdoor";

    var screen =
      scene.mpOutdoorScreen ||
      "leftys_outdoor";

    return isOutdoor && screen === "leftys_outdoor";
  }

  function mpPlayerInZoneV3(scene, zone){
    if(!scene || !scene.player || !zone) return false;

    return (
      scene.player.x >= zone.minX &&
      scene.player.x <= zone.maxX &&
      scene.player.y >= zone.minY &&
      scene.player.y <= zone.maxY
    );
  }

  function mpInputDownV3(scene){
    return (
      scene.moveY > 0.55 ||
      scene.stickY > 0.55 ||
      (scene.keys && scene.keys.down && scene.keys.down.isDown)
    );
  }

  function mpJumpPressedV3(scene){
    return (
      scene.jumpPressed ||
      scene.jumpJustPressed ||
      scene.mobileJumpPressed ||
      scene.wantJump ||
      (scene.keys && scene.keys.jump && scene.keys.jump.isDown) ||
      (scene.keys && scene.keys.space && scene.keys.space.isDown)
    );
  }

  /* =======================================================
     LADDER / STAIR SAFETY
     If player is near a ladder/stair, DOWN belongs to that,
     not to the lower-screen transition.
  ======================================================= */

  function mpNearAnyZoneV3(scene, list, padX, padY){
    if(!scene || !scene.player || !list) return false;

    var px = scene.player.x;
    var py = scene.player.y;

    for(var i = 0; i < list.length; i++){
      var z = list[i];
      if(!z) continue;

      var x = z.x || z.centerX || z.left || z.minX || 0;
      var y = z.y || z.centerY || z.top || z.minY || 0;

      var w =
        z.w ||
        z.width ||
        ((typeof z.maxX === "number" && typeof z.minX === "number") ? z.maxX - z.minX : 80);

      var h =
        z.h ||
        z.height ||
        ((typeof z.maxY === "number" && typeof z.minY === "number") ? z.maxY - z.minY : 160);

      var minX = typeof z.minX === "number" ? z.minX : x - w * 0.5;
      var maxX = typeof z.maxX === "number" ? z.maxX : x + w * 0.5;
      var minY = typeof z.minY === "number" ? z.minY : y - h * 0.5;
      var maxY = typeof z.maxY === "number" ? z.maxY : y + h * 0.5;

      if(
        px >= minX - padX &&
        px <= maxX + padX &&
        py >= minY - padY &&
        py <= maxY + padY
      ){
        return true;
      }
    }

    return false;
  }

  function mpNearLadderOrStairsV3(scene){
    if(!scene || !scene.player) return false;

    // Current state flags.
    if(scene.isClimbing) return true;
    if(scene.climbing) return true;
    if(scene.onLadder) return true;
    if(scene.nearLadder) return true;
    if(scene.nearStairs) return true;
    if(scene.usingStairs) return true;
    if(scene.stairTraveling) return true;
    if(scene.onStairs) return true;

    // Known possible zone arrays.
    var possibleLists = [
      scene.ladders,
      scene.ladderZones,
      scene.climbZones,
      scene.stairs,
      scene.stairZones,
      scene.stairTriggers,
      scene.platformStairs
    ];

    for(var i = 0; i < possibleLists.length; i++){
      if(mpNearAnyZoneV3(scene, possibleLists[i], 28, 34)){
        return true;
      }
    }

    // Manual Lefty's ladder positions as backup.
    // Main visible ladders in your Lefty's outdoor screen.
    var px = scene.player.x;
    var py = scene.player.y;

    var manualZones = [
      // left roof ladder
      { minX: 205, maxX: 255, minY: 150, maxY: 405 },

      // middle ladder
      { minX: 505, maxX: 555, minY: 160, maxY: 405 },

      // right ladder
      { minX: 805, maxX: 855, minY: 170, maxY: 405 },

      // lower-left stairs
      { minX: 80, maxX: 180, minY: 355, maxY: 520 },

      // lower-right stairs / stop sign area
      { minX: 805, maxX: 930, minY: 355, maxY: 520 }
    ];

    return mpNearAnyZoneV3(scene, manualZones, 8, 8);
  }

  function mpSnapToThirdPlatformV3(scene){
    if(!scene || !scene.player) return;

    scene.player.x = MP_LEFTYS_THIRD_PLATFORM_SNAP.x;
    scene.player.y = MP_LEFTYS_THIRD_PLATFORM_SNAP.y;

    scene.platform = MP_LEFTYS_THIRD_PLATFORM_SNAP.platform;
    scene.currentPlatform = MP_LEFTYS_THIRD_PLATFORM_SNAP.platform;
    scene.lastPlatform = MP_LEFTYS_THIRD_PLATFORM_SNAP.platform;
    scene.playerGroundY = MP_LEFTYS_THIRD_PLATFORM_SNAP.y;

    scene.isJumping = false;
    scene.playerJumping = false;
    scene.jumpCount = 0;
    scene.doubleJumpUsed = false;

    if(scene.player.body && scene.player.body.velocity){
      scene.player.body.velocity.x = 0;
      scene.player.body.velocity.y = 0;
    }

    if(scene.shadow){
      scene.shadow.x = scene.player.x;
      scene.shadow.y = scene.player.y + 5;
    }

    if(scene.forcePlayerReady){
      scene.forcePlayerReady();
    }

    if(scene.zoneText){
      scene.zoneText.setText("THIRD PLATFORM");
    }
  }

  function mpGoToLeftysLowerV3(scene){
    if(!scene || !scene.player) return;

    scene.mpOutdoorScreen = "leftys_lower";
    scene.platform = "lower";
    scene.currentPlatform = "lower";
    scene.lastPlatform = "lower";

    if(typeof mpSetOutdoorBg === "function" && hasTex(scene, "leftys_lower")){
      mpSetOutdoorBg(scene, "leftys_lower");
    }else if(scene.mpOutdoorBg && hasTex(scene, "leftys_lower")){
      scene.mpOutdoorBg.setTexture("leftys_lower").setDisplaySize(W, H).setDepth(1);
    }else if(scene.bg && hasTex(scene, "leftys_lower")){
      scene.bg.setTexture("leftys_lower").setDisplaySize(W, H);
    }

    scene.player.x = MP_LEFTYS_LOWER_SPAWN.x;
    scene.player.y = MP_LEFTYS_LOWER_SPAWN.y;
    scene.playerGroundY = MP_LEFTYS_LOWER_SPAWN.y;

    if(scene.shadow){
      scene.shadow.x = scene.player.x;
      scene.shadow.y = scene.player.y + 5;
    }

    if(scene.zoneText){
      scene.zoneText.setText("LOWER LEFTY'S");
    }

    if(scene.populateHealthItemsForScreen){
      scene.populateHealthItemsForScreen("leftys_lower");
    }

    if(scene.populateRandomWeaponsForScreen){
      scene.populateRandomWeaponsForScreen("leftys_lower");
    }

    if(scene.forcePlayerReady){
      scene.forcePlayerReady();
    }
  }

  /* =======================================================
     Main update wrapper
  ======================================================= */

  var MP_OLD_UPDATE_LEFTYS_DOWN_X_JUMP_V3 = Game.prototype.update;

  Game.prototype.update = function(time, delta){
    if(MP_OLD_UPDATE_LEFTYS_DOWN_X_JUMP_V3){
      MP_OLD_UPDATE_LEFTYS_DOWN_X_JUMP_V3.call(this, time, delta);
    }

    if(!mpIsLeftysOutdoorScreenV3(this)) return;
    if(!this.player) return;
    if(this.playerBusy) return;

    // JUMP at the X = third/top platform.
    // This should not affect ladders/stairs.
    if(mpPlayerInZoneV3(this, MP_LEFTYS_X_JUMP_ZONE) && mpJumpPressedV3(this)){
      mpSnapToThirdPlatformV3(this);
      return;
    }

    // DOWN in lower fight lane = lower Lefty's screen,
    // BUT NOT near ladders or stairs.
    if(
      mpPlayerInZoneV3(this, MP_LEFTYS_DOWN_TO_LOWER_ZONE) &&
      mpInputDownV3(this) &&
      !mpNearLadderOrStairsV3(this)
    ){
      mpGoToLeftysLowerV3(this);
      return;
    }

    if(mpPlayerInZoneV3(this, MP_LEFTYS_X_JUMP_ZONE) && this.zoneText){
      this.zoneText.setText("PRESS JUMP: THIRD PLATFORM");
    }
  };

})();

var ModeSelect = class ModeSelect extends Phaser.Scene{
  constructor(){
    super("ModeSelect");

    this.selectedIndex = 0;
    this.cards = [];
    this.cardBorders = [];
    this.cardLabels = [];
  }

  preload(){
    const v = typeof VERSION !== "undefined" ? VERSION : Date.now();

    if(!this.textures.exists("modeSelectBg")){
      this.load.image("modeSelectBg", "assets/levels/mode-select.png?v=" + v);
    }

    if(!this.textures.exists("mode_story")){
      this.load.image("mode_story", "assets/ui/modes/story_mode.png?v=" + v);
    }

    if(!this.textures.exists("mode_rumble")){
      this.load.image("mode_rumble", "assets/ui/modes/rumble_mode.png?v=" + v);
    }

    if(!this.textures.exists("mode_versus")){
      this.load.image("mode_versus", "assets/ui/modes/versus_mode.png?v=" + v);
    }

    if(!this.textures.exists("mode_coop")){
      this.load.image("mode_coop", "assets/ui/modes/coop_mode.png?v=" + v);
    }
  }

  create(){
    this.selectedIndex = 0;
    this.cards = [];
    this.cardBorders = [];
    this.cardLabels = [];

    this.modes = [
      { id:"story",  name:"STORY",  key:"mode_story"  },
      { id:"rumble", name:"RUMBLE", key:"mode_rumble" },
      { id:"versus", name:"VERSUS", key:"mode_versus" },
      { id:"coop",   name:"CO-OP",  key:"mode_coop"   }
    ];

    this.add.rectangle(CX, CY, W, H, 0x000000, 1).setDepth(0);

    if(hasTex(this, "modeSelectBg")){
      this.add.image(CX, CY, "modeSelectBg")
        .setDisplaySize(W, H)
        .setDepth(1);
    }else{
      this.add.text(CX, 60, "MODE SELECT", {
        font:"36px monospace",
        fill:"#00ffff",
        stroke:"#000000",
        strokeThickness:6
      }).setOrigin(0.5).setDepth(2);
    }

    this.buildCards();
    this.buildBackButton();
    this.buildInput();
    this.updateSelection();
  }

  sx(x){
    return x * (W / 960);
  }

  sy(y){
    return y * (H / 540);
  }

  buildCards(){
    /*
      These positions match the 4 numbered slots on mode-select.png.
      Only adjust these if the cards need tiny alignment changes.
    */
    const slots = [
      { x:166, y:286 },
      { x:381, y:286 },
      { x:596, y:286 },
      { x:811, y:286 }
    ];

    const cardW = 190 * (W / 960);
    const cardH = 300 * (H / 540);

    this.modes.forEach((mode, index)=>{
      const s = slots[index];
      const x = this.sx(s.x);
      const y = this.sy(s.y);

      let card;

      if(hasTex(this, mode.key)){
        card = this.add.image(x, y, mode.key)
          .setDisplaySize(cardW, cardH)
          .setDepth(20)
          .setInteractive({ useHandCursor:true });
      }else{
        card = this.add.rectangle(x, y, cardW, cardH, 0x080808, 0.86)
          .setStrokeStyle(3, 0x00ffff, 0.65)
          .setDepth(20)
          .setInteractive({ useHandCursor:true });

        const fallbackLabel = this.add.text(x, y, mode.name, {
          font:"24px monospace",
          fill:"#fff45c",
          stroke:"#000000",
          strokeThickness:5
        })
          .setOrigin(0.5)
          .setDepth(22);

        this.cardLabels.push(fallbackLabel);
      }

      const border = this.add.rectangle(x, y, cardW + 10, cardH + 10, 0x000000, 0)
        .setStrokeStyle(4, 0x00ffff, 0.55)
        .setDepth(30);

      card.on("pointerdown", ()=>{
        if(this.selectedIndex === index){
          this.selectMode();
        }else{
          this.selectedIndex = index;
          this.updateSelection();
        }
      });

      this.cards.push(card);
      this.cardBorders.push(border);
    });
  }

  buildBackButton(){
    const bx = this.sx(138);
    const by = this.sy(486);

    this.backButtonBox = this.add.rectangle(bx, by, this.sx(205), this.sy(48), 0x000000, 0.72)
      .setStrokeStyle(3, 0x00ffff, 0.75)
      .setDepth(60)
      .setInteractive({ useHandCursor:true });

    this.backButtonText = this.add.text(bx, by, "B  BACK", {
      font:"20px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5
    })
      .setOrigin(0.5)
      .setDepth(61);

    this.backButtonBox.on("pointerdown", ()=>{
      this.scene.start("Title");
    });
  }

  buildInput(){
    this.input.keyboard.on("keydown-LEFT", ()=>this.moveSelection(-1));
    this.input.keyboard.on("keydown-RIGHT", ()=>this.moveSelection(1));
    this.input.keyboard.on("keydown-UP", ()=>this.moveSelection(-1));
    this.input.keyboard.on("keydown-DOWN", ()=>this.moveSelection(1));

    this.input.keyboard.on("keydown-ENTER", ()=>this.selectMode());
    this.input.keyboard.on("keydown-SPACE", ()=>this.selectMode());
    this.input.keyboard.on("keydown-A", ()=>this.selectMode());

    this.input.keyboard.on("keydown-B", ()=>this.scene.start("Title"));
    this.input.keyboard.on("keydown-ESC", ()=>this.scene.start("Title"));
  }

  moveSelection(dir){
    this.selectedIndex += dir;

    if(this.selectedIndex < 0){
      this.selectedIndex = this.modes.length - 1;
    }

    if(this.selectedIndex >= this.modes.length){
      this.selectedIndex = 0;
    }

    this.updateSelection();
  }

  updateSelection(){
    const normalW = 190 * (W / 960);
    const normalH = 300 * (H / 540);
    const selectedW = 198 * (W / 960);
    const selectedH = 310 * (H / 540);

    this.cardBorders.forEach((border, index)=>{
      const selected = index === this.selectedIndex;

      border.setStrokeStyle(
        selected ? 7 : 4,
        selected ? 0xfff45c : 0x00ffff,
        selected ? 1 : 0.55
      );

      border.setSize(
        selected ? selectedW + 12 : normalW + 10,
        selected ? selectedH + 12 : normalH + 10
      );
    });

    this.cards.forEach((card, index)=>{
      const selected = index === this.selectedIndex;

      if(card.setAlpha){
        card.setAlpha(selected ? 1 : 0.72);
      }

      /*
        DO NOT use setScale() here.
        setScale(1) makes image cards jump back to original PNG size.
      */
      if(card.setDisplaySize){
        card.setDisplaySize(
          selected ? selectedW : normalW,
          selected ? selectedH : normalH
        );
      }
    });
  }

  selectMode(){
    const mode = this.modes[this.selectedIndex];

    window.selectedGameMode = mode.id;
    window.selectedGameModeName = mode.name;

    this.scene.start("CharacterSelect");
  }
};

    }

    if(!Array.isArray(window.selectedP2Team)){
      window.selectedP2Team = [];
    }

    if(!window.MP_VERSUS_SELECT_SIDE){
      window.MP_VERSUS_SELECT_SIDE = "p1";
    }
  }

  function mpvResetTeamState(){
    window.selectedP1Team = [];
    window.selectedP2Team = [];
    window.MP_VERSUS_SELECT_SIDE = "p1";
  }

  function mpvMakeTeamMember(id){
    id = mpvCleanId(id);

    return {
      id:id,
      name:mpvName(id),
      hp:MPV_MAX_HP,
      maxHp:MPV_MAX_HP,
      alive:true
    };
  }

  function mpvBuildP1Team(){
    const ids = Array.isArray(window.selectedP1Team) && window.selectedP1Team.length
      ? window.selectedP1Team
      : [window.selectedFighter || "DONNY","JT","HEW"];

    return ids.slice(0,MPV_TEAM_SIZE).map(mpvMakeTeamMember);
  }

  function mpvBuildP2Team(){
    const ids = Array.isArray(window.selectedP2Team) && window.selectedP2Team.length
      ? window.selectedP2Team
      : ["JACKSON","HEW","JT"];

    return ids.slice(0,MPV_TEAM_SIZE).map(id=>{
      id = mpvCleanId(id);

      return {
        id:id,
        name:"P2 " + mpvName(id),
        fighterId:id,
        enemyType:mpvEnemyTypeForFighter(id),
        hp:MPV_MAX_HP,
        maxHp:MPV_MAX_HP,
        alive:true
      };
    });
  }

  function mpvNextAliveIndex(team,currentIndex){
    if(!team || !team.length) return -1;

    for(let i = 1; i <= team.length; i++){
      const idx = (currentIndex + i) % team.length;
      const member = team[idx];

      if(member && member.alive && member.hp > 0){
        return idx;
      }
    }

    return -1;
  }

  function mpvTeamTotalHp(team){
    if(!team) return 0;

    return team.reduce((sum,m)=>{
      if(!m || !m.alive) return sum;
      return sum + Math.max(0,m.hp || 0);
    },0);
  }

  function mpvFormatTime(seconds){
    seconds = Math.max(0,Math.floor(seconds || 0));

    const m = Math.floor(seconds / 60);
    const s = seconds % 60;

    return String(m) + ":" + String(s).padStart(2,"0");
  }

  function mpvDestroyList(list){
    if(!list) return;

    list.forEach(obj=>{
      if(obj && obj.destroy){
        obj.destroy();
      }
    });
  }

    function mpvUpdateHud(scene){
      if(!scene || !scene.mpvHud || !scene.mpvP1Team || !scene.mpvP2Team) return;

        );
