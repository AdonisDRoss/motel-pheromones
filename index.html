<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Motel Pheromones - JT Test</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    canvas {
      display: block;
      margin: 0 auto;
      image-rendering: pixelated;
    }
  </style>
</head>

<body>
<script>
class GameScene extends Phaser.Scene {
  constructor() {
    super("GameScene");
  }

  preload() {
    // PLACE YOUR SPRITES HERE:
    // assets/sprites/jt/jt_idle.png
    // assets/sprites/jt/jt_walk_down.png
    // assets/sprites/jt/jt_walk_up.png
    // assets/sprites/jt/jt_walk_left.png
    // assets/sprites/jt/jt_walk_right.png
    // assets/sprites/jt/jt_attack_light.png
    // assets/sprites/jt/jt_attack_heavy.png
    // assets/sprites/jt/jt_hurt.png
    // assets/sprites/jt/jt_ko.png
    // assets/sprites/jt/jt_taunt.png

    this.load.spritesheet("jt_idle", "assets/sprites/jt/jt_idle.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_walk_down", "assets/sprites/jt/jt_walk_down.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_walk_up", "assets/sprites/jt/jt_walk_up.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_walk_left", "assets/sprites/jt/jt_walk_left.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_walk_right", "assets/sprites/jt/jt_walk_right.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_attack_light", "assets/sprites/jt/jt_attack_light.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_attack_heavy", "assets/sprites/jt/jt_attack_heavy.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_hurt", "assets/sprites/jt/jt_hurt.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_ko", "assets/sprites/jt/jt_ko.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_taunt", "assets/sprites/jt/jt_taunt.png", {
      frameWidth: 128,
      frameHeight: 128
    });
  }

  create() {
    this.cameras.main.setBackgroundColor("#1b1b1b");

    this.ground = this.add.rectangle(640, 500, 1280, 220, 0x333333);
    this.add.text(30, 30, "JT Sprite Test", {
      fontSize: "28px",
      color: "#ffaa00",
      fontFamily: "monospace"
    });

    this.add.text(30, 65, "Move: WASD / Arrows | J: Light | K: Heavy | T: Taunt", {
      fontSize: "18px",
      color: "#ffffff",
      fontFamily: "monospace"
    });

    this.createAnimations();

    this.player = this.physics.add.sprite(300, 420, "jt_idle");
    this.player.setScale(2);
    this.player.setCollideWorldBounds(true);
    this.player.play("jt-idle");

    this.keys = this.input.keyboard.addKeys({
      up: Phaser.Input.Keyboard.KeyCodes.UP,
      down: Phaser.Input.Keyboard.KeyCodes.DOWN,
      left: Phaser.Input.Keyboard.KeyCodes.LEFT,
      right: Phaser.Input.Keyboard.KeyCodes.RIGHT,
      w: Phaser.Input.Keyboard.KeyCodes.W,
      a: Phaser.Input.Keyboard.KeyCodes.A,
      s: Phaser.Input.Keyboard.KeyCodes.S,
      d: Phaser.Input.Keyboard.KeyCodes.D,
      light: Phaser.Input.Keyboard.KeyCodes.J,
      heavy: Phaser.Input.Keyboard.KeyCodes.K,
      taunt: Phaser.Input.Keyboard.KeyCodes.T
    });

    this.isAttacking = false;
    this.facing = "down";
  }

  createAnimations() {
    this.anims.create({
      key: "jt-idle",
      frames: this.anims.generateFrameNumbers("jt_idle", { start: 0, end: 3 }),
      frameRate: 5,
      repeat: -1
    });

    this.anims.create({
      key: "jt-walk-down",
      frames: this.anims.generateFrameNumbers("jt_walk_down", { start: 0, end: 7 }),
      frameRate: 10,
      repeat: -1
    });

    this.anims.create({
      key: "jt-walk-up",
      frames: this.anims.generateFrameNumbers("jt_walk_up", { start: 0, end: 7 }),
      frameRate: 10,
      repeat: -1
    });

    this.anims.create({
      key: "jt-walk-left",
      frames: this.anims.generateFrameNumbers("jt_walk_left", { start: 0, end: 7 }),
      frameRate: 10,
      repeat: -1
    });

    this.anims.create({
      key: "jt-walk-right",
      frames: this.anims.generateFrameNumbers("jt_walk_right", { start: 0, end: 7 }),
      frameRate: 10,
      repeat: -1
    });

    this.anims.create({
      key: "jt-attack-light",
      frames: this.anims.generateFrameNumbers("jt_attack_light", { start: 0, end: 3 }),
      frameRate: 12,
      repeat: 0
    });

    this.anims.create({
      key: "jt-attack-heavy",
      frames: this.anims.generateFrameNumbers("jt_attack_heavy", { start: 0, end: 5 }),
      frameRate: 10,
      repeat: 0
    });

    this.anims.create({
      key: "jt-hurt",
      frames: this.anims.generateFrameNumbers("jt_hurt", { start: 0, end: 2 }),
      frameRate: 8,
      repeat: 0
    });

    this.anims.create({
      key: "jt-ko",
      frames: this.anims.generateFrameNumbers("jt_ko", { start: 0, end: 2 }),
      frameRate: 6,
      repeat: 0
    });

    this.anims.create({
      key: "jt-taunt",
      frames: this.anims.generateFrameNumbers("jt_taunt", { start: 0, end: 2 }),
      frameRate: 6,
      repeat: 0
    });
  }

  update() {
    if (this.isAttacking) return;

    const speed = 220;
    let vx = 0;
    let vy = 0;

    const up = this.keys.up.isDown || this.keys.w.isDown;
    const down = this.keys.down.isDown || this.keys.s.isDown;
    const left = this.keys.left.isDown || this.keys.a.isDown;
    const right = this.keys.right.isDown || this.keys.d.isDown;

    if (left) {
      vx = -speed;
      this.facing = "left";
    } else if (right) {
      vx = speed;
      this.facing = "right";
    }

    if (up) {
      vy = -speed;
      this.facing = "up";
    } else if (down) {
      vy = speed;
      this.facing = "down";
    }

    this.player.setVelocity(vx, vy);

    if (Phaser.Input.Keyboard.JustDown(this.keys.light)) {
      this.playAction("jt-attack-light");
      return;
    }

    if (Phaser.Input.Keyboard.JustDown(this.keys.heavy)) {
      this.playAction("jt-attack-heavy");
      return;
    }

    if (Phaser.Input.Keyboard.JustDown(this.keys.taunt)) {
      this.playAction("jt-taunt");
      return;
    }

    if (vx !== 0 || vy !== 0) {
      this.player.play("jt-walk-" + this.facing, true);
    } else {
      this.player.play("jt-idle", true);
    }
  }

  playAction(animKey) {
    this.isAttacking = true;
    this.player.setVelocity(0, 0);
    this.player.play(animKey);

    this.player.once("animationcomplete", () => {
      this.isAttacking = false;
      this.player.play("jt-idle", true);
    });
  }
}

const config = {
  type: Phaser.AUTO,
  width: 1280,
  height: 720,
  backgroundColor: "#000000",
  pixelArt: true,
  physics: {
    default: "arcade",
    arcade: {
      debug: false
    }
  },
  scene: GameScene,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  }
};

new Phaser.Game(config);
</script>
</body>
</html>
