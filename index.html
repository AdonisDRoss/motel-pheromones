  qty(id){ return this.inv[id] || 0; },
  buy(id){
    const it = this.items.find(x=>x.id===id); if(!it) return;
    if(this.credits < it.buy){ shopLog.textContent = "Not enough credits."; return; }
    this.credits -= it.buy; this.inv[id] = this.qty(id)+1; this.save(); renderShop(); shopLog.textContent = "Bought: " + it.name;
  },
  sell(id){
    const it = this.items.find(x=>x.id===id); if(!it) return;
    if(this.qty(id) <= 0){ shopLog.textContent = "You do not have that."; return; }
    this.inv[id] = this.qty(id)-1; this.credits += it.sell; this.save(); renderShop(); shopLog.textContent = "Sold: " + it.name;
  }
};
function renderShop(){
  ShopState.load();
  creditLine.textContent = "Credits: " + ShopState.credits;
  shopBuyList.innerHTML = ""; shopSellList.innerHTML = "";
  ShopState.items.forEach(it=>{
    const buy = document.createElement("div");
    buy.className = "shopItem";
    buy.innerHTML = `<span>${it.name} // ${it.buy}cr</span>`;
    const bb = document.createElement("button"); bb.textContent = "BUY"; bb.onclick = ()=>ShopState.buy(it.id); buy.appendChild(bb);
    shopBuyList.appendChild(buy);

    const sell = document.createElement("div");
    sell.className = "shopItem";
    sell.innerHTML = `<span>${it.name} x${ShopState.qty(it.id)} // ${it.sell}cr</span>`;
    const sb = document.createElement("button"); sb.textContent = "SELL"; sb.onclick = ()=>ShopState.sell(it.id); sell.appendChild(sb);
    shopSellList.appendChild(sell);
  });
}

function getMusicVolume(){
  const saved = localStorage.getItem("cf_music_volume");
  return saved === null ? 0.60 : Math.max(0, Math.min(1, parseFloat(saved)));
}
function setMusicVolume(v){
  v = Math.max(0, Math.min(1, v));
  localStorage.setItem("cf_music_volume", String(v));
  if(currentMusic) currentMusic.setVolume(v);
  if(musicVolume) musicVolume.value = Math.round(v*100);
  if(volumeReadout) volumeReadout.textContent = Math.round(v*100) + "%";
}

class GameScene extends Phaser.Scene {
 


loadMaskAsync(){
  this.maskReady=false;
  const img=new Image();
  img.crossOrigin="anonymous";
  img.onload=()=>{
    const c=document.createElement("canvas");
    c.width=img.naturalWidth||img.width; c.height=img.naturalHeight||img.height;
    const ctx=c.getContext("2d",{willReadFrequently:true});
    ctx.drawImage(img,0,0);
    this.maskCanvas=c; this.maskCtx=ctx; this.maskReady=true;
    showToast("COLLISION MASK READY");
  };
  img.onerror=()=>{this.maskReady=false; showToast("MASK LOAD FAILED");};
  img.src=mapCfg.mask+"?v=66";
}
createFallbackMap(){
  if(this.textures.exists("map") && !FAILED_ASSETS.has("map")) return;
  const w=1448, h=1086;
  const c=document.createElement("canvas");
  c.width=w; c.height=h;
  const ctx=c.getContext("2d");
  ctx.fillStyle="#101827"; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle="#5de7ff"; ctx.lineWidth=8; ctx.strokeRect(90,90,w-180,h-180);
  ctx.fillStyle="#1b2230"; ctx.fillRect(160,160,w-320,h-320);
  ctx.fillStyle="#9eefff"; ctx.font="42px monospace"; ctx.fillText("MAP PATH FAILED",120,150);
  ctx.font="22px monospace"; ctx.fillText(mapCfg.base,120,190);
  if(this.textures.exists("map")) this.textures.remove("map");
  this.textures.addCanvas("map",c);
}

createFallbackSheet(key, frameW=128, frameH=128, cols=8, rows=4, color="#2bd7ff"){
  if(this.textures.exists(key) && !FAILED_ASSETS.has(key)) return;
  const c=document.createElement("canvas");
  c.width=frameW*cols; c.height=frameH*rows;
  const ctx=c.getContext("2d");
  for(let r=0;r<rows;r++){
    for(let col=0;col<cols;col++){
      const x=col*frameW, y=r*frameH;
      ctx.save();
      ctx.translate(x+frameW/2,y+frameH/2);
      ctx.fillStyle="rgba(0,0,0,.0)";
      ctx.fillRect(-frameW/2,-frameH/2,frameW,frameH);
      ctx.fillStyle="#111";
      ctx.strokeStyle=color;
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(-18,-28,36,52,8); ctx.fill(); ctx.stroke();
      ctx.fillStyle="#222"; ctx.fillRect(-20,-40,40,10);
      ctx.fillStyle="#111"; ctx.fillRect(-14,-54,28,18);
      ctx.fillStyle=color; ctx.fillRect(-4,-50,8,7);
      ctx.fillStyle="#6b3b1e"; ctx.fillRect(-10,-34,20,16);
      ctx.fillStyle="#0e1720"; ctx.fillRect(-14,-4,10,32); ctx.fillRect(4,-4,10,32);
      ctx.fillStyle="#eee"; ctx.fillRect(-16,28,12,4); ctx.fillRect(4,28,12,4);
      ctx.restore();
    }
  }
  if(this.textures.exists(key)) this.textures.remove(key);
  this.textures.addCanvas(key,c);
}
ensureFallbackTextures(){
  this.createFallbackSheet("donny_idle_down",128,128,8,1,"#ff8a2b");
  this.createFallbackSheet("donny_idle_left",128,128,8,1,"#ff8a2b");
  this.createFallbackSheet("donny_idle_right",128,128,8,1,"#ff8a2b");
  this.createFallbackSheet("donny_idle_up",128,128,8,1,"#ff8a2b");
  this.createFallbackSheet("donny_walk",128,128,8,4,"#ff8a2b");
  this.createFallbackSheet("donny_run_down",128,128,8,1,"#ff8a2b");
  this.createFallbackSheet("donny_run_left",128,128,8,1,"#ff8a2b");
  this.createFallbackSheet("donny_run_right",128,128,8,1,"#ff8a2b");
  this.createFallbackSheet("donny_run_up",128,128,8,1,"#ff8a2b");
  ["blacklight_kid_idle","neon_vendor_idle","blacklight_bouncer_idle","blacklight_runner_idle","kira_volt_idle"].forEach(k=>this.createFallbackSheet(k,128,128,4,4,"#70eaff"));
  if(!this.textures.exists("vendor_stall") || FAILED_ASSETS.has("vendor_stall")){
    const c=document.createElement("canvas"); c.width=1024; c.height=256; const ctx=c.getContext("2d");
    for(let i=0;i<4;i++){const x=i*256;ctx.fillStyle="rgba(0,0,0,0)";ctx.fillRect(x,0,256,256);ctx.fillStyle="#1b1322";ctx.fillRect(x+38,92,180,90);ctx.strokeStyle="#8f4cff";ctx.lineWidth=4;ctx.strokeRect(x+38,92,180,90);ctx.fillStyle="#54e7ff";ctx.fillRect(x+60,112,28,40);ctx.fillStyle="#b76cff";ctx.fillRect(x+98,118,80,10);}
    if(this.textures.exists("vendor_stall")) this.textures.remove("vendor_stall");
    this.textures.addCanvas("vendor_stall",c);
  }
}

createDoorMarkerTexture(){
  // v56: single marker texture only. Older version made an 8-frame-wide canvas,
  // which displayed as a row of repeated arrows.
  if(this.textures.exists("door_marker")) this.textures.remove("door_marker");
  const c=document.createElement("canvas");
  c.width=128; c.height=128;
  const ctx=c.getContext("2d");
  ctx.clearRect(0,0,128,128);
  ctx.save();
  ctx.translate(64,64);
  ctx.strokeStyle="#5de7ff";
  ctx.fillStyle="rgba(122,54,255,.28)";
  ctx.lineWidth=5;
  ctx.shadowColor="#8d5cff";
  ctx.shadowBlur=10;
  ctx.beginPath();
  ctx.moveTo(0,-38);
  ctx.lineTo(30,10);
  ctx.lineTo(12,10);
  ctx.lineTo(12,34);
  ctx.lineTo(-12,34);
  ctx.lineTo(-12,10);
  ctx.lineTo(-30,10);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
  this.textures.addCanvas("door_marker",c);
}

 }

ensureEngineAudio(){
  // v75 procedural fallback engine audio: no external sound file required.
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    if(!this.engineCtx) this.engineCtx = new AC();
    if(this.engineCtx.state === "suspended") this.engineCtx.resume();
    if(this.engineOsc) return;
    const ctx=this.engineCtx;
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    const filter=ctx.createBiquadFilter();
    osc.type="sawtooth";
    osc.frequency.value=46;
    filter.type="lowpass";
    filter.frequency.value=160;
    gain.gain.value=0.0001;
    osc.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    this.engineOsc=osc;
    this.engineGain=gain;
    this.engineFilter=filter;
  }catch(e){ console.warn("engine audio unavailable", e); }
}
setEngineVolume(active=false){
  if(!this.engineGain || !this.engineOsc) return;
  const ctx=this.engineCtx;
  const sp=Math.abs(this.vehicleSpeed||0);
  const target=active ? Math.min(0.12,0.035+sp*0.012) : 0.0001;
  const freq=active ? Math.min(135,48+sp*15) : 46;
  this.engineGain.gain.cancelScheduledValues(ctx.currentTime);
  this.engineGain.gain.linearRampToValueAtTime(target, ctx.currentTime+0.08);
  this.engineOsc.frequency.cancelScheduledValues(ctx.currentTime);
  this.engineOsc.frequency.linearRampToValueAtTime(freq, ctx.currentTime+0.08);
}
nearCarForEntry(){

        showDialogue("BLACKLIGHT RUNNER", "Passphrase is: static drinks water. Tell the bouncer and keep moving.", [
          {label:"Memorized.", onClick:()=>{setFlag("talked_runner"); refreshMission(); showToast("PASS PHRASE LEARNED\nTalk to Club Bouncer"); closeDialogue();}},
          {label:"Close", onClick:closeDialogue}
        ]);
      }
      return;
    }

    if(near.npc.name==="CLUB BOUNCER"){
      if(!hasItem("signal_charm")){
        showDialogue("CLUB BOUNCER", "No charm, no door.", [{label:"Close",onClick:closeDialogue}]);
      } else if(!hasFlag("talked_runner")){
        showDialogue("CLUB BOUNCER", "Charm checks out. Passphrase is still missing.", [{label:"Close",onClick:closeDialogue}]);
      } else {
        showDialogue("CLUB BOUNCER", "Static drinks water. Good. Door’s yours.", [
          {label:"Open Door", onClick:()=>{setFlag("talked_bouncer"); setFlag("club_access"); setObjective("Enter Blacklight Club"); if(this.clubDoorMarker) this.clubDoorMarker.setVisible(true); showToast("CLUB ACCESS CLEARED\nDoor active"); closeDialogue();}},
          {label:"Enter Now", onClick:()=>{setFlag("talked_bouncer"); setFlag("club_access"); location.href=location.pathname+"?v=westgate-v90&area=club&collision=mask";}},
          {label:"Close", onClick:()=>{setFlag("talked_bouncer"); setFlag("club_access"); setObjective("Enter Blacklight Club"); if(this.clubDoorMarker) this.clubDoorMarker.setVisible(true); closeDialogue();}}
        ]);
      }
      return;
    }

    showDialogue(near.npc.name, near.npc.line, [{label:"Ask about signal",onClick:()=>{setObjective(near.npc.mission);showDialogue(near.npc.name,near.npc.mission,[{label:"Close",onClick:closeDialogue}]);}},{label:"Leave",onClick:closeDialogue}]);return;}
  if(this.clubDoorZone && Phaser.Geom.Rectangle.Contains(this.clubDoorZone,this.player.x,this.player.y)){
    if(!hasItem("signal_charm")){
      showDialogue("CLUB BOUNCER", "No charm, no door. Buy a Hacked Signal Charm from the Neon Vendor.", [{label:"Close",onClick:closeDialogue}]);
    } else if(!hasFlag("talked_runner")){
      showDialogue("CLUB BOUNCER", "Charm checks out. Passphrase is still missing. Talk to the Blacklight Runner.", [{label:"Close",onClick:closeDialogue}]);
    } else if(!hasFlag("club_access") && !hasFlag("talked_bouncer")){
      showDialogue("BLACKLIGHT CLUB", "The bouncer has not cleared you yet.", [{label:"Close",onClick:closeDialogue}]);
    } else {
      showDialogue("BLACKLIGHT CLUB", "Enter Blacklight Club?", [
        {label:"YES",onClick:()=>location.href=location.pathname+"?v=westgate-v90&area=club&collision=mask"},
        {label:"NO",onClick:closeDialogue}
      ]);
    }
    return;
  }
  if(Phaser.Geom.Rectangle.Contains(this.exitZone,this.player.x,this.player.y)){
    if(AREA==="club") showDialogue("BLACKLIGHT EXIT","Return to Blacklight A1?",[{label:"YES",onClick:()=>location.href=location.pathname+"?v=westgate-v90&area=a1&collision=mask"},{label:"NO",onClick:closeDialogue}]);
    else if(AREA==="a1") showDialogue("WESTGATE ROUTE","Return to Westgate Connector?",[{label:"YES",onClick:()=>location.href=location.pathname+"?v=westgate-v90&area=westgate&collision=mask"},{label:"NO",onClick:closeDialogue}]);
    else showDialogue("BLACKLIGHT DISTRICT","Enter Blacklight District A1?",[{label:"YES",onClick:()=>location.href=location.pathname+"?v=westgate-v90&area=a1&collision=mask"},{label:"NO",onClick:closeDialogue}]);
  }
 }
}



function hardStartMusic(){
  try{
    if(window.__cfScene && typeof window.__cfScene.startAreaMusic === "function"){
      window.__cfScene.startAreaMusic();
    }
  }catch(e){}
}

function setupControls(){
  const stick=document.getElementById("stick");
  const nub=document.getElementById("nub");
  const buttons=document.querySelector(".buttons");

  if(buttons){
    buttons.style.pointerEvents="auto";
    buttons.style.opacity="1";
    buttons.style.zIndex=9999;
  }
  if(stick){
    stick.style.pointerEvents="auto";
    stick.style.touchAction="none";
    stick.style.zIndex=9999;
  }
  document.querySelectorAll(".btn").forEach(btn=>{
    btn.style.pointerEvents="auto";
    btn.style.touchAction="none";
  });

  let dragging=false;
  let lastDir="down";

  function resetStick(){
    dragging=false;
    input.x=0;
    input.y=0;
    if(nub) nub.style.transform="translate(0px,0px)";
  }

  function point(e){
    if(e.touches && e.touches.length) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
    return {x:e.clientX, y:e.clientY};
  }

  function moveStick(clientX, clientY){
    if(!stick || !nub) return;
    const r=stick.getBoundingClientRect();
    const cx=r.left+r.width/2;
    const cy=r.top+r.height/2;
    let dx=clientX-cx;
    let dy=clientY-cy;
    const max=42;
    const len=Math.hypot(dx,dy) || 1;
    if(len>max){
      dx=dx/len*max;
      dy=dy/len*max;
    }
    input.x=dx/max;
    input.y=dy/max;
    nub.style.transform=`translate(${dx}px,${dy}px)`;
  }

  function directMoveTick(){
    const sc=window.__cfScene;
    if(dragging && sc && !dialogueOpen && !shopOpen && !pauseOpen){
      const vx=input.x, vy=input.y;
      const len=Math.hypot(vx,vy);
      if(len>.12){
        if(sc.vehicleMode && sc.vehicle){
          // v86: car uses the same toggle/stick movement path as Donny.
          const speed=input.r ? 5.2 : 3.8; // pixels per frame, direct fallback
          sc.vehicle.x += vx*speed;
          sc.vehicle.y += vy*speed;
          sc.vehicle.x = Phaser.Math.Clamp(sc.vehicle.x,12,sc.mapW-12);
          sc.vehicle.y = Phaser.Math.Clamp(sc.vehicle.y,12,sc.mapH-12);
          sc.vehicle.angle = Phaser.Math.RadToDeg(Math.atan2(vy, vx)) + 90;
          sc.vehicleSpeed = speed;
          if(sc.vehicleLabel) sc.vehicleLabel.setPosition(sc.vehicle.x, sc.vehicle.y-58);
          if(sc.cameras && sc.cameras.main) sc.cameras.main.centerOn(sc.vehicle.x, sc.vehicle.y);
          if(typeof sc.setEngineVolume === "function") sc.setEngineVolume(true);
          if(coordLine) coordLine.innerHTML=`<span class="tag">XY:</span> ${Math.round(sc.vehicle.x)},${Math.round(sc.vehicle.y)} <span class="tag">CAR:</span> WALK-STICK <span class="tag">JOY:</span> ${input.x.toFixed(1)},${input.y.toFixed(1)}`;
        } else if(sc.player){
          const speed=input.r ? 4.1 : 2.75; // pixels per frame, direct fallback
          sc.tryMove(vx*speed, vy*speed);
          const dir=Math.abs(vx)>Math.abs(vy)?(vx>0?"right":"left"):(vy>0?"down":"up");
          lastDir=dir;
          sc.player.dir=dir;
          const sideMove = (dir==="left" || dir==="right");
          const animDir = sideMove ? "left" : dir;
          const key=`donny_${input.r?"run":"walk"}_${animDir}`;
          if(sc.anims && sc.anims.exists(key)) sc.player.play(key,true);
          sc.player.setFlipX(dir==="right");
        }
      }
    }
    requestAnimationFrame(directMoveTick);
  }
  requestAnimationFrame(directMoveTick);

  if(stick){
    ["pointerdown","touchstart","mousedown"].forEach(type=>{
      stick.addEventListener(type,e=>{
        e.preventDefault();
        e.stopPropagation();
        hardStartMusic();
        dragging=true;
        const p=point(e);
        moveStick(p.x,p.y);
      }, {passive:false});
    });

    ["pointermove","touchmove","mousemove"].forEach(type=>{
      window.addEventListener(type,e=>{
        if(!dragging) return;
        e.preventDefault();
        e.stopPropagation();
        const p=point(e);
        moveStick(p.x,p.y);
      }, {passive:false});
    });

    ["pointerup","touchend","mouseup","touchcancel","pointercancel","blur"].forEach(type=>{
      window.addEventListener(type,resetStick, {passive:false});
    });
  }

  function useNow(){
    input.usePressed=true;
    const sc=window.__cfScene;
    if(sc && typeof sc.handleUse === "function" && !dialogueOpen && !shopOpen && !pauseOpen){
      try{ sc.handleUse(); }catch(e){ console.warn("direct use failed", e); }
    }
  }

  document.querySelectorAll(".btn").forEach(btn=>{
    function down(e){
      e.preventDefault();
      e.stopPropagation();
      hardStartMusic();
      const name=btn.dataset.btn;
      btn.classList.add("down");
      if(name==="x"){ input.xbtn=true; input.usePressed=true; useNow(); }
      if(name==="r") input.r=true;
      if(name==="a"){ input.a=true; if(window.__cfScene?.vehicleMode && window.__cfScene.vehicleSpeed<0.9) window.__cfScene.vehicleSpeed=0.9; showToast(window.__cfScene?.vehicleMode ? "GAS ON" : "GAS / action slot ready"); }
      if(name==="b"){ input.b=true; showToast(window.__cfScene?.vehicleMode ? "BRAKE ON" : "BRK / action slot ready"); }
      if(name==="y") showToast("LTS / action slot ready");
    }
    function up(e){
      e.preventDefault();
      e.stopPropagation();
      btn.classList.remove("down");
      if(btn.dataset.btn==="r") input.r=false;
      if(btn.dataset.btn==="a") input.a=false;
      if(btn.dataset.btn==="b") input.b=false;
      if(btn.dataset.btn==="x"){ input.xbtn=false; input.usePressed=false; }
    }
    ["pointerdown","touchstart","mousedown"].forEach(type=>btn.addEventListener(type,down,{passive:false}));
    ["pointerup","touchend","mouseup","touchcancel","pointercancel"].forEach(type=>btn.addEventListener(type,up,{passive:false}));
  });

  // Emergency keyboard/mouse click fallback:
  document.addEventListener("keydown", e=>{
    if(e.key==="x" || e.key==="X" || e.key==="e" || e.key==="E") useNow();
  });
}


function installHardVehicleButtons(){
  if(window.__hardVehicleButtonsInstalled) return;
  window.__hardVehicleButtonsInstalled = true;

  function setBtn(el, down){
    const name = el && el.dataset ? el.dataset.btn : null;
    if(!name) return;
    if(down) el.classList.add("down"); else el.classList.remove("down");

    if(name==="a"){
      input.a = down;
      if(down && window.__cfScene && window.__cfScene.vehicleMode){
        window.__cfScene.vehicleSpeed = Math.max(window.__cfScene.vehicleSpeed || 0, 0.85);
        window.__cfScene.setEngineVolume(true);
      }
    }
    if(name==="b") input.b = down;
    if(name==="r") input.r = down;
    if(name==="x"){
      input.xbtn = down;
      if(down){
        input.usePressed = true;
        const sc = window.__cfScene;
        if(sc && AREA==="highway" && sc.vehicle){
          if(sc.vehicleMode) sc.exitVehicle();
          else sc.enterVehicle();
        } else if(sc && typeof sc.handleUse === "function"){
          sc.handleUse();
        }
      } else {
        input.usePressed = false;
      }
    }
  }

  ["pointerdown","touchstart","mousedown"].forEach(type=>{
    document.addEventListener(type,e=>{
      const btn=e.target && e.target.closest ? e.target.closest(".btn") : null;
      if(!btn) return;
      e.preventDefault();
      e.stopPropagation();
      setBtn(btn,true);
    }, {passive:false, capture:true});
  });

  ["pointerup","pointercancel","touchend","touchcancel","mouseup","mouseleave"].forEach(type=>{
    document.addEventListener(type,e=>{
      document.querySelectorAll(".btn.down").forEach(btn=>setBtn(btn,false));
    }, {passive:false, capture:true});
  });

  document.addEventListener("keydown", e=>{
    const k=e.key.toLowerCase();
    if(k===" " || k==="a") input.a=true;
    if(k==="b") input.b=true;
    if(k==="x" || k==="e"){
      input.xbtn=true; input.usePressed=true;
      const sc=window.__cfScene;
      if(sc && AREA==="highway" && sc.vehicle){
        if(sc.vehicleMode) sc.exitVehicle(); else sc.enterVehicle();
      } else if(sc && typeof sc.handleUse==="function") sc.handleUse();
    }
  }, true);

  document.addEventListener("keyup", e=>{
    const k=e.key.toLowerCase();
    if(k===" " || k==="a") input.a=false;
    if(k==="b") input.b=false;
    if(k==="x" || k==="e"){ input.xbtn=false; input.usePressed=false; }
  }, true);
}


function installDedicatedVehicleControls(){
  if(window.__dedicatedVehicleControlsInstalled) return;
  window.__dedicatedVehicleControlsInstalled = true;

  function stopCar(sc){
    input.a=false; input.b=false; input.vgas=false; input.vbrake=false;
    if(sc){
      sc.carCruise=false;
      sc.autoDrive=false;
      sc.vehicleSpeed=0;
      sc.setEngineVolume(false);
      showToast("CAR STOPPED");
    }
  }

  if(driveGas){
    ["pointerdown","touchstart","mousedown","click"].forEach(t=>{
      driveGas.addEventListener(t,e=>{
        e.preventDefault(); e.stopPropagation();
        const sc=window.__cfScene;
        input.a=true; input.vgas=true;
        if(sc && sc.vehicleMode){
          sc.carCruise = true;
          sc.autoDrive = true;
          sc.vehicleSpeed = Math.max(sc.vehicleSpeed||0, 6.0);
          sc.setEngineVolume(true);
          showToast("BOOST ON");
        }
      },{passive:false});
    });
  }

  if(driveBrake){
    ["pointerdown","touchstart","mousedown","click"].forEach(t=>{
      driveBrake.addEventListener(t,e=>{
        e.preventDefault(); e.stopPropagation();
        stopCar(window.__cfScene);
      },{passive:false});
    });
  }

  if(driveExit){
    ["pointerdown","touchstart","mousedown","click"].forEach(t=>{
      driveExit.addEventListener(t,e=>{
        e.preventDefault(); e.stopPropagation();
        const sc=window.__cfScene;
        if(sc && sc.vehicleMode) sc.exitVehicle();
      },{passive:false});
    });
  }
}

setupControls();
installDedicatedVehicleControls();
installHardVehicleButtons();
function viewportW(){return Math.max(320,Math.floor(window.visualViewport?window.visualViewport.width:innerWidth));} function viewportH(){return Math.max(240,Math.floor(window.visualViewport?window.visualViewport.height:innerHeight));}
const game=new Phaser.Game({type:Phaser.AUTO,parent:"game",backgroundColor:"#05070b",scale:{mode:Phaser.Scale.RESIZE,autoCenter:Phaser.Scale.NO_CENTER,width:viewportW(),height:viewportH()},physics:{default:"arcade",arcade:{debug:false}}, pixelArt:true, roundPixels:true,scene:[GameScene],render:{pixelArt:false,antialias:true}});
function forceResize(){const w=viewportW(),h=viewportH();document.getElementById("game").style.width=w+"px";document.getElementById("game").style.height=h+"px";if(game&&game.scale)game.scale.resize(w,h);}
addEventListener("resize",forceResize);addEventListener("orientationchange",()=>setTimeout(forceResize,250));if(visualViewport)visualViewport.addEventListener("resize",forceResize);setTimeout(forceResize,100);
})();
</script>
