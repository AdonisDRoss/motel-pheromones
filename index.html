<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
body { margin:0; background:black; overflow:hidden; }
canvas {
  width:100vw !important;
  height:100vh !important;
  image-rendering:pixelated;
}
</style>
</head>

<body>
<script>

const VERSION = 300;

let selectedFighter = "gigi";
let selectedLevel = "outdoor";

class Boot extends Phaser.Scene {
  constructor(){ super("Boot"); }

  preload(){

    // UI
    this.load.image("title","assets/levels/title-screen.png?v="+VERSION);
    this.load.image("charSelect","assets/levels/character-select.png?v="+VERSION);
    this.load.image("levelSelect","assets/levels/level-select.png?v="+VERSION);

    // LEVELS
    this.load.image("outdoor","assets/levels/outdoor.png?v="+VERSION);
    this.load.image("house","assets/levels/house-party.png?v="+VERSION);
    this.load.image("indoor","assets/levels/leftys-indoor.png?v="+VERSION);
    this.load.image("lmnop","assets/levels/Lmnop.png?v="+VERSION);
    this.load.image("chicken","assets/levels/Chicken-coupe.png?v="+VERSION);

    // PLAYER
    this.load.image("jtSingle","assets/player/jt/jt-single.png?v="+VERSION);
  }

  create(){
    this.scene.start("Title");
  }
}

class Title extends Phaser.Scene {
  constructor(){ super("Title"); }

  create(){
    this.add.image(480,270,"title");
    this.add.text(350,450,"TAP TO START",{font:"24px monospace",fill:"#fff"});

    this.input.once("pointerdown",()=>{
      this.scene.start("CharacterSelect");
    });
  }
}

class CharacterSelect extends Phaser.Scene {
  constructor(){ super("CharacterSelect"); }

  create(){
    this.add.image(480,270,"charSelect");

    this.add.text(20,20,"SELECT FIGHTER",{font:"18px monospace",fill:"#fff"});

    this.input.on("pointerdown",(p)=>{
      selectedFighter = (p.x < 480) ? "gigi" : "donny";
      this.scene.start("LevelSelect");
    });
  }
}

class LevelSelect extends Phaser.Scene {
  constructor(){ super("LevelSelect"); }

  create(){
    this.add.image(480,270,"levelSelect");

    this.add.text(20,20,"SELECT LEVEL",{font:"18px monospace",fill:"#fff"});

    this.input.on("pointerdown",(p)=>{
      if(p.x < 200) selectedLevel = "house";
      else if(p.x < 400) selectedLevel = "indoor";
      else if(p.x < 600) selectedLevel = "outdoor";
      else if(p.x < 800) selectedLevel = "lmnop";
      else selectedLevel = "chicken";

      this.scene.start("Game");
    });
  }
}

class Game extends Phaser.Scene {
  constructor(){ super("Game"); }

  create(){

    // BACKGROUND
    this.bg = this.add.image(480,270,selectedLevel).setDepth(0);

    // RAIN
    this.rain = this.add.group();
    for(let i=0;i<120;i++){
      let drop = this.add.rectangle(
        Phaser.Math.Between(0,960),
        Phaser.Math.Between(0,540),
        2,10,0x77aaff,0.4
      ).setDepth(90);
      this.rain.add(drop);
    }

    // FOG
    this.fog = this.add.rectangle(480,500,960,200,0x000000,0.2)
      .setDepth(95);

    // SHADOW
    this.shadow = this.add.ellipse(450,500,50,14,0x000000,0.4)
      .setDepth(99);

    // PLAYER (FIXED)
    this.player = this.physics.add.sprite(450,460,"jtSingle");

    this.player.setOrigin(0.5,1);
    this.player.setDisplaySize(96,144);
    this.player.setDepth(200);
    this.player.setCollideWorldBounds(true);
    this.player.body.setAllowGravity(false);
    this.player.body.setVelocity(0,0);

    // IDLE BOUNCE
    this.tweens.add({
      targets: this.player,
      y: this.player.y - 4,
      duration: 800,
      yoyo: true,
      repeat: -1,
      ease: "sine.inOut"
    });

    // BREATH SCALE
    this.tweens.add({
      targets: this.player,
      scaleX: 1.02,
      scaleY: 1.02,
      duration: 900,
      yoyo: true,
      repeat: -1
    });

    this.moveX = 0;
    this.moveY = 0;

    this.makeControls();
  }

  update(){

    // RAIN LOOP
    this.rain.children.iterate((drop)=>{
      drop.y += 8;

      if(drop.y > 540){
        drop.y = 0;
        drop.x = Phaser.Math.Between(0,960);

        // SPLASH
        let splash = this.add.circle(drop.x,500,2,0x77aaff,0.3)
          .setDepth(85);

        this.tweens.add({
          targets: splash,
          alpha: 0,
          scale: 2,
          duration: 200
        });
      }
    });

    // SMOOTH MOVEMENT
    this.player.body.velocity.x = Phaser.Math.Linear(
      this.player.body.velocity.x,
      this.moveX * 200,
      0.2
    );

    this.player.body.velocity.y = Phaser.Math.Linear(
      this.player.body.velocity.y,
      this.moveY * 200,
      0.2
    );

    // GROUND LOCK
    this.player.y = Phaser.Math.Clamp(this.player.y,360,500);

    // SHADOW FOLLOW
    this.shadow.x = this.player.x;
    this.shadow.y = this.player.y + 5;

    // FLIP
    if(this.moveX < 0) this.player.setFlipX(true);
    if(this.moveX > 0) this.player.setFlipX(false);
  }

  makeControls(){

    const baseX = 120;
    const baseY = 420;

    this.add.circle(baseX,baseY,60,0xffffff,0.1);

    let dragging = false;

    this.input.on("pointerdown",(p)=>{
      if(Phaser.Math.Distance.Between(p.x,p.y,baseX,baseY)<80){
        dragging = true;
      }
    });

    this.input.on("pointermove",(p)=>{
      if(!dragging) return;

      let dx = p.x - baseX;
      let dy = p.y - baseY;

      const len = Math.sqrt(dx*dx+dy*dy);
      if(len>60){
        dx/=len; dy/=len;
        dx*=60; dy*=60;
      }

      this.moveX = dx/60;
      this.moveY = dy/60;
    });

    this.input.on("pointerup",()=>{
      dragging=false;
      this.moveX=0;
      this.moveY=0;
    });

    this.makeBtn(860,380,"X",()=>{});
    this.makeBtn(800,450,"Y",()=>{});
    this.makeBtn(920,450,"A",()=>{});
    this.makeBtn(860,520,"B",()=>{});
  }

  makeBtn(x,y,label,fn){
    this.add.circle(x,y,30,0xffffff,0.2)
      .setInteractive()
      .on("pointerdown",fn);

    this.add.text(x,y,label,{font:"18px monospace",fill:"#fff"})
      .setOrigin(0.5);
  }
}

const config = {
  type: Phaser.AUTO,
  width:960,
  height:540,
  physics:{ default:"arcade" },
  scene:[Boot,Title,CharacterSelect,LevelSelect,Game]
};

new Phaser.Game(config);

</script>
</body>
</html>
