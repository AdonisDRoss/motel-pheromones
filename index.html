<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Motel Pheromones - JT Test</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }
    canvas {
      display: block;
      margin: 0 auto;
      image-rendering: pixelated;
    }
  </style>
</head>

<body>
<script>
class GameScene extends Phaser.Scene {
  constructor() {
    super("GameScene");
  }

  preload() {
    this.load.image("level_bg", "assets/levels/leftys.png");

    this.load.spritesheet("jt_idle", "assets/sprites/jt/jt_idle.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_walk_down", "assets/sprites/jt/jt_walk_down.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_walk_up", "assets/sprites/jt/jt_walk_up.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_walk_left", "assets/sprites/jt/jt_walk_left.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_walk_right", "assets/sprites/jt/jt_walk_right.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_attack_light", "assets/sprites/jt/jt_attack_light.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_attack_heavy", "assets/sprites/jt/jt_attack_heavy.png", {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_taunt", "assets/sprites/jt/jt_taunt.png", {
      frameWidth: 128,
      frameHeight: 128
    });
  }

  create() {
    this.cameras.main.setBackgroundColor("#000000");

    this.bg = this.add.image(640, 360, "level_bg");
    this.bg.setDisplaySize(1280, 720);

    this.createAnimations();

    this.player = this.physics.add.sprite(640, 555, "jt_idle");
    this.player.setOrigin(0.5, 1);
    this.player.setScale(0.65);
    this.player.setCollideWorldBounds(true);
    this.player.play("jt-idle");

    this.player.setSize(50, 90);
    this.player.setOffset(39, 30);

    this.keys = this.input.keyboard.addKeys({
      up: Phaser.Input.Keyboard.KeyCodes.UP,
      down: Phaser.Input.Keyboard.KeyCodes.DOWN,
      left: Phaser.Input.Keyboard.KeyCodes.LEFT,
      right: Phaser.Input.Keyboard.KeyCodes.RIGHT,
      w: Phaser.Input.Keyboard.KeyCodes.W,
      a: Phaser.Input.Keyboard.KeyCodes.A,
      s: Phaser.Input.Keyboard.KeyCodes.S,
      d: Phaser.Input.Keyboard.KeyCodes.D,
      light: Phaser.Input.Keyboard.KeyCodes.J,
      heavy: Phaser.Input.Keyboard.KeyCodes.K,
      taunt: Phaser.Input.Keyboard.KeyCodes.T
    });

    this.isAttacking = false;
    this.facing = "down";

    this.makeTouchControls();
  }

  createAnimations() {
    this.anims.create({
      key: "jt-idle",
      frames: this.anims.generateFrameNumbers("jt_idle", { start: 0, end: 3 }),
      frameRate: 5,
      repeat: -1
    });

    this.anims.create({
      key: "jt-walk-down",
      frames: this.anims.generateFrameNumbers("jt_walk_down", { start: 0, end: 7 }),
      frameRate: 10,
      repeat: -1
    });

    this.anims.create({
      key: "jt-walk-up",
      frames: this.anims.generateFrameNumbers("jt_walk_up", { start: 0, end: 7 }),
      frameRate: 10,
      repeat: -1
    });

    this.anims.create({
      key: "jt-walk-left",
      frames: this.anims.generateFrameNumbers("jt_walk_left", { start: 0, end: 7 }),
      frameRate: 10,
      repeat: -1
    });

    this.anims.create({
      key: "jt-walk-right",
      frames: this.anims.generateFrameNumbers("jt_walk_right", { start: 0, end: 7 }),
      frameRate: 10,
      repeat: -1
    });

    this.anims.create({
      key: "jt-attack-light",
      frames: this.anims.generateFrameNumbers("jt_attack_light", { start: 0, end: 3 }),
      frameRate: 12,
      repeat: 0
    });

    this.anims.create({
      key: "jt-attack-heavy",
      frames: this.anims.generateFrameNumbers("jt_attack_heavy", { start: 0, end: 5 }),
      frameRate: 10,
      repeat: 0
    });

    this.anims.create({
      key: "jt-taunt",
      frames: this.anims.generateFrameNumbers("jt_taunt", { start: 0, end: 2 }),
      frameRate: 6,
      repeat: 0
    });
  }

  update() {
    if (this.isAttacking) return;

    const speed = 180;
    let vx = 0;
    let vy = 0;

    const up = this.keys.up.isDown || this.keys.w.isDown || this.touchUp;
    const down = this.keys.down.isDown || this.keys.s.isDown || this.touchDown;
    const left = this.keys.left.isDown || this.keys.a.isDown || this.touchLeft;
    const right = this.keys.right.isDown || this.keys.d.isDown || this.touchRight;

    if (left) {
      vx = -speed;
      this.facing = "left";
    } else if (right) {
      vx = speed;
      this.facing = "right";
    }

    if (up) {
      vy = -speed;
      this.facing = "up";
    } else if (down) {
      vy = speed;
      this.facing = "down";
    }

    this.player.setVelocity(vx, vy);

    if (Phaser.Input.Keyboard.JustDown(this.keys.light) || this.touchLight) {
      this.touchLight = false;
      this.playAction("jt-attack-light");
      return;
    }

    if (Phaser.Input.Keyboard.JustDown(this.keys.heavy) || this.touchHeavy) {
      this.touchHeavy = false;
      this.playAction("jt-attack-heavy");
      return;
    }

    if (Phaser.Input.Keyboard.JustDown(this.keys.taunt) || this.touchTaunt) {
      this.touchTaunt = false;
      this.playAction("jt-taunt");
      return;
    }

    if (vx !== 0 || vy !== 0) {
      this.player.play("jt-walk-" + this.facing, true);
    } else {
      this.player.play("jt-idle", true);
    }
  }

  playAction(animKey) {
    this.isAttacking = true;
    this.player.setVelocity(0, 0);
    this.player.play(animKey);

    this.player.once("animationcomplete", () => {
      this.isAttacking = false;
      this.player.play("jt-idle", true);
    });
  }

  makeTouchControls() {
    this.touchUp = false;
    this.touchDown = false;
    this.touchLeft = false;
    this.touchRight = false;
    this.touchLight = false;
    this.touchHeavy = false;
    this.touchTaunt = false;

    const makeBtn = (x, y, label, callback) => {
      const btn = this.add.circle(x, y, 38, 0xffffff, 0.18);
      const text = this.add.text(x, y, label, {
        fontSize: "22px",
        color: "#ffffff",
        fontFamily: "monospace"
      }).setOrigin(0.5);

      btn.setInteractive();

      btn.on("pointerdown", callback);
      text.setInteractive();
      text.on("pointerdown", callback);

      return btn;
    };

    const holdBtn = (x, y, label, prop) => {
      const btn = this.add.circle(x, y, 34, 0xffffff, 0.12);
      const text = this.add.text(x, y, label, {
        fontSize: "20px",
        color: "#ffffff",
        fontFamily: "monospace"
      }).setOrigin(0.5);

      btn.setInteractive();
      text.setInteractive();

      const down = () => this[prop] = true;
      const up = () => this[prop] = false;

      btn.on("pointerdown", down);
      btn.on("pointerup", up);
      btn.on("pointerout", up);

      text.on("pointerdown", down);
      text.on("pointerup", up);
      text.on("pointerout", up);
    };

    holdBtn(95, 585, "←", "touchLeft");
    holdBtn(185, 585, "→", "touchRight");
    holdBtn(140, 540, "↑", "touchUp");
    holdBtn(140, 635, "↓", "touchDown");

    makeBtn(1130, 560, "X", () => this.touchLight = true);
    makeBtn(1210, 610, "A", () => this.touchHeavy = true);
    makeBtn(1050, 610, "Y", () => this.touchTaunt = true);
    makeBtn(1130, 670, "B", () => this.touchLight = true);
  }
}

const config = {
  type: Phaser.AUTO,
  width: 1280,
  height: 720,
  backgroundColor: "#000000",
  pixelArt: true,
  physics: {
    default: "arcade",
    arcade: {
      debug: false
    }
  },
  scene: GameScene,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  }
};

new Phaser.Game(config);
</script>
</body>
</html>
