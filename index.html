<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Motel Pheromones Brawler</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <style>
    body { margin:0; background:#000; overflow:hidden; }
    canvas { display:block; margin:0 auto; image-rendering: pixelated; }
    #rotate {
      display:none;
      position:fixed;
      inset:0;
      background:#000;
      color:white;
      z-index:99;
      font-family:monospace;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
    }
    @media (orientation: portrait) {
      #rotate { display:flex; }
    }
  </style>
</head>
<body>
<div id="rotate">Turn phone sideways for landscape mode</div>

<script>
const config = {
  type: Phaser.AUTO,
  width: 960,
  height: 540,
  backgroundColor: "#111",
  physics: {
    default: "arcade",
    arcade: { gravity: { y: 0 }, debug: false }
  },
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: { preload, create, update }
};

let game = new Phaser.Game(config);
let player, enemies, cursors, keys;
let playerHP = 100;
let touch = { left:false, right:false, up:false, down:false };

function preload(){}

function create() {
  // Street background
  this.add.rectangle(480, 270, 960, 540, 0x1a1a1a);
  this.add.rectangle(480, 360, 960, 180, 0x333333);
  this.add.rectangle(480, 255, 960, 15, 0x555555);
  this.add.text(30, 30, "MOTEL PHEROMONES - TEST BUILD", {
    fontFamily:"monospace", fontSize:"22px", color:"#ffffff"
  });

  // Player placeholder
  player = this.physics.add.rectangle(180, 330, 42, 70, 0x00ffcc);
  player.body.setCollideWorldBounds(true);
  player.hp = 100;

  enemies = this.physics.add.group();

  for (let i = 0; i < 5; i++) {
    let e = this.physics.add.rectangle(540 + i * 70, 330 + Phaser.Math.Between(-45,45), 42, 66, 0xff3355);
    e.hp = 30;
    e.speed = 55;
    e.body.setCollideWorldBounds(true);
    enemies.add(e);
  }

  cursors = this.input.keyboard.createCursorKeys();
  keys = this.input.keyboard.addKeys({
    W:"W", A:"A", S:"S", D:"D",
    J:"J", K:"K"
  });

  this.input.keyboard.on("keydown-J", () => attack(this, 70, 10, 250));
  this.input.keyboard.on("keydown-K", () => attack(this, 105, 20, 400));

  makeMobileControls(this);
}

function update() {
  let speed = 180;
  player.body.setVelocity(0);

  if (cursors.left.isDown || keys.A.isDown || touch.left) player.body.setVelocityX(-speed);
  if (cursors.right.isDown || keys.D.isDown || touch.right) player.body.setVelocityX(speed);
  if (cursors.up.isDown || keys.W.isDown || touch.up) player.body.setVelocityY(-speed);
  if (cursors.down.isDown || keys.S.isDown || touch.down) player.body.setVelocityY(speed);

  player.depth = player.y;

  enemies.children.iterate(e => {
    if (!e || e.hp <= 0) return;

    e.depth = e.y;
    moveEnemyTowardPlayer(e);

    if (Phaser.Math.Distance.Between(player.x, player.y, e.x, e.y) < 45) {
      playerHP -= 0.08;
    }
  });
}

function moveEnemyTowardPlayer(e) {
  let dx = player.x - e.x;
  let dy = player.y - e.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  if (dist > 45) {
    e.body.setVelocity((dx / dist) * e.speed, (dy / dist) * e.speed);
  } else {
    e.body.setVelocity(0);
  }
}

function attack(scene, range, damage, knockback) {
  let hitbox = scene.add.rectangle(player.x + 45, player.y, range, 50, 0xffff00, 0.25);
  scene.time.delayedCall(90, () => hitbox.destroy());

  enemies.children.iterate(e => {
    if (!e || e.hp <= 0) return;

    let dist = Phaser.Math.Distance.Between(player.x, player.y, e.x, e.y);

    if (dist < range) {
      e.hp -= damage;
      e.setFillStyle(0xffff00);

      let dir = e.x > player.x ? 1 : -1;
      e.body.setVelocityX(dir * knockback);

      scene.time.delayedCall(120, () => {
        if (e.hp > 0) e.setFillStyle(0xff3355);
      });

      if (e.hp <= 0) {
        e.setFillStyle(0x555555);
        e.body.setVelocity(0);
        e.body.enable = false;
      }
    }
  });
}

function makeMobileControls(scene) {
  const makeButton = (x,y,label,callback) => {
    let b = scene.add.circle(x,y,34,0xffffff,0.18).setInteractive().setDepth(999);
    let t = scene.add.text(x-10,y-12,label,{fontSize:"22px",color:"#fff"}).setDepth(1000);
    b.on("pointerdown", callback);
    return b;
  };

  makeButton(805, 410, "J", () => attack(scene, 70, 10, 250));
  makeButton(875, 360, "K", () => attack(scene, 105, 20, 400));

  const dpad = [
    [80,410,"←","left"],
    [150,410,"→","right"],
    [115,360,"↑","up"],
    [115,465,"↓","down"]
  ];

  dpad.forEach(([x,y,label,dir]) => {
    let b = scene.add.circle(x,y,32,0xffffff,0.15).setInteractive().setDepth(999);
    scene.add.text(x-10,y-12,label,{fontSize:"22px",color:"#fff"}).setDepth(1000);
    b.on("pointerdown", () => touch[dir] = true);
    b.on("pointerup", () => touch[dir] = false);
    b.on("pointerout", () => touch[dir] = false);
  });
}
</script>
</body>
</html>
