function startTitleMusic(){
  if(titleMusicStarted) return;

  try{
    if(!titleMusicInstance){
      titleMusicInstance = new Audio("assets/audio/title-theme.mp3?v=" + VERSION);
      titleMusicInstance.loop = true;
      titleMusicInstance.volume = 0.65;
      titleMusicInstance.preload = "auto";

      // Helps iPhone/mobile browsers
      titleMusicInstance.setAttribute("playsinline", "true");
      titleMusicInstance.setAttribute("webkit-playsinline", "true");
    }

    const playPromise = titleMusicInstance.play();

    if(playPromise && playPromise.then){
      playPromise.then(function(){
        titleMusicStarted = true;
        console.log("TITLE MUSIC PLAYING");
      }).catch(function(err){
        console.warn("TITLE MUSIC BLOCKED OR FAILED:", err);
      });
    }else{
      titleMusicStarted = true;
    }

  }catch(e){
    console.warn("TITLE MUSIC ERROR:", e);
  }
}

function stopTitleMusic(){
  try{
    if(titleMusicInstance){
      titleMusicInstance.pause();
      titleMusicInstance.currentTime = 0;
    }
  }catch(e){}

  titleMusicStarted = false;
}

function toggleTitleMusic(){
  if(titleMusicStarted){
    stopTitleMusic();
  }else{
    startTitleMusic();
  }
}

function goFromTitle(scene){

function hasTex(scene,key){
  return scene.textures.exists(key);
}
function hasAnim(scene,key){
  return scene.anims.exists(key);
}
function safePlay(sprite,key){
  if(!sprite || !sprite.scene) return;
  if(!hasAnim(sprite.scene,key)) return;
  if(sprite.anims.currentAnim && sprite.anims.currentAnim.key === key && sprite.anims.isPlaying){
    return;
  }
  sprite.play(key,true);
}
function textureHasFrame(scene,sheet,frameIndex){
  if(!sheet) return false;
  if(!hasTex(scene,sheet)) return false;
  try{
    const tex = scene.textures.get(sheet);
    return !!tex.get(frameIndex);
  }catch(e){
    return false;
  }
}function makeAnim(scene,key,sheet,start,end,rate,repeat){
  if(!hasTex(scene,sheet)) return;
  if(hasAnim(scene,key)) return;

  const frames=[];

  for(let i=start;i<=end;i++){
    if(textureHasFrame(scene,sheet,i)){
      frames.push({key:sheet,frame:i});
    }
  }

  if(frames.length<=0) return;

  scene.anims.create({
    key:key,
    frames:frames,
    frameRate:rate,
    repeat:repeat
  });
}

function makeAnimFromFrames(scene,key,sheet,frameList,rate,repeat){
  if(!hasTex(scene,sheet)) return;
  if(hasAnim(scene,key)) return;
  const frames=[];
  (frameList || []).forEach(function(i){
    if(textureHasFrame(scene,sheet,i)){
      frames.push({key:sheet,frame:i});
    }
  });
  if(frames.length<=0) return;
  scene.anims.create({
    key:key,
    frames:frames,
    frameRate:rate,
    repeat:repeat
  });
}

function getJsonAnimData(scene, cacheKey, animName){
  try{
    const data = scene && scene.cache && scene.cache.json ? scene.cache.json.get(cacheKey) : null;
    if(!data || !data.animations || !data.animations[animName]) return null;
    return data.animations[animName];
  }catch(e){
    return null;
  }
}

function registerEvenRowFrames(scene, textureKey, frameCount, leftTrim, topTrim, bottomTrim){
  if(!scene || !scene.textures || !scene.textures.exists(textureKey)) return;

  const tex = scene.textures.get(textureKey);
  if(!tex) return;

  let img = null;

  try{
    img = tex.getSourceImage();
  }catch(e){
    img = null;
  }

  if(!img || !img.width || !img.height) return;

  const startX = Math.max(0, leftTrim || 0);
  const startY = Math.max(0, topTrim || 0);
  const usableW = Math.max(1, img.width - startX);
  const usableH = Math.max(1, img.height - startY - (bottomTrim || 0));
  const count = Math.max(1, frameCount || 1);

  for(let i = 0; i < count; i++){
    const frameName = "f" + i;
    const x1 = Math.round(startX + (usableW * i) / count);
    const x2 = Math.round(startX + (usableW * (i + 1)) / count);
    const w = Math.max(1, x2 - x1);

    try{
      if(tex.has && tex.has(frameName)) continue;
      tex.add(frameName, 0, x1, startY, w, usableH);
    }catch(e){
      console.warn("Could not register cutout frame", textureKey, frameName, e);
    }
  }
}

function makeCutoutRowAnim(scene,key,sheet,count,rate,repeat){
  if(!hasTex(scene,sheet)) return;
  if(hasAnim(scene,key)) return;

  const frames=[];
  const tex = scene.textures.get(sheet);

  for(let i=0;i<count;i++){
    const frameName = "f" + i;
    try{
      tex.get(frameName);
      frames.push({key:sheet,frame:frameName});
    }catch(e){}
  }

  if(frames.length<=0) return;

  scene.anims.create({
    key:key,
    frames:frames,
    frameRate:rate,
    repeat:repeat
  });
}

function makeCutoutSingleFrameAnim(scene,key,sheet,frameName){
  if(!hasTex(scene,sheet)) return;
  if(hasAnim(scene,key)) return;

  const tex = scene.textures.get(sheet);
  try{
    tex.get(frameName);
  }catch(e){
    return;
  }

  scene.anims.create({
    key:key,
    frames:[{key:sheet,frame:frameName}],
    frameRate:1,
    repeat:-1
  });
}

function mpvApplyDonnyCutoutFrame0(sprite){
  if(!sprite) return;
  if(typeof getSelectedFighterId !== "function") return;
  if(getSelectedFighterId() !== "DONNY") return;

  try{
    if(typeof DONNY_USE_CLEAN_CUTOUT_SHEET !== "undefined" && DONNY_USE_CLEAN_CUTOUT_SHEET){
      sprite.setFrame(0);
      return;
    }

    if(typeof DONNY_USE_CUTOUT_MOVEMENT !== "undefined" && DONNY_USE_CUTOUT_MOVEMENT){
      sprite.setFrame("f0");
    }
  }catch(e){}
}

function registerDonnyCutoutMovementFrames(scene){
  if(!DONNY_USE_CUTOUT_MOVEMENT) return;
  if(!DONNY_CUTOUT_ROWS) return;

  Object.keys(DONNY_CUTOUT_ROWS).forEach(function(rowName){
    const row = DONNY_CUTOUT_ROWS[rowName];
    registerEvenRowFrames(scene, row.key, row.frames, row.leftTrim, row.topTrim, row.bottomTrim);
  });
}

function makeJsonMovementAnimSet(scene,prefix,sheetKey,jsonCacheKey){
  if(!hasTex(scene,sheetKey)) return false;

  const getData = function(name,fallback){
    return getJsonAnimData(scene,jsonCacheKey,name) || fallback;
  };

  const idle = getData("idle", {frames:[0], frameRate:1, repeat:-1});
  const walk = getData("walk", {frames:[6,7,8,9,10,11], frameRate:8, repeat:-1});
  const run = getData("run", {frames:[12,13,14,15,16,17], frameRate:12, repeat:-1});
  const jump = getData("jump", getData("double_jump", {frames:[18,19,20,21,22,23], frameRate:10, repeat:0}));
  const doubleJump = getData("double_jump", jump);
  const crouch = getData("crouch", {frames:[30,31,32,33,34,35], frameRate:6, repeat:0});
  const roll = getData("roll", null);
  const turn = getData("turn", null);

  const idleFrame = (idle.frames && idle.frames.length) ? idle.frames[0] : 0;
  makeSingleFrameAnim(scene,prefix + "_idle_down",sheetKey,idleFrame);
  makeSingleFrameAnim(scene,prefix + "_idle_up",sheetKey,idleFrame);
  makeSingleFrameAnim(scene,prefix + "_idle_side",sheetKey,idleFrame);

  makeAnimFromFrames(scene,prefix + "_walk_down",sheetKey,walk.frames,walk.frameRate,walk.repeat);
  makeAnimFromFrames(scene,prefix + "_walk_up",sheetKey,walk.frames,walk.frameRate,walk.repeat);
  makeAnimFromFrames(scene,prefix + "_walk_side",sheetKey,walk.frames,walk.frameRate,walk.repeat);

  makeAnimFromFrames(scene,prefix + "_run_down",sheetKey,run.frames,run.frameRate,run.repeat);
  makeAnimFromFrames(scene,prefix + "_run_up",sheetKey,run.frames,run.frameRate,run.repeat);
  makeAnimFromFrames(scene,prefix + "_run_side",sheetKey,run.frames,run.frameRate,run.repeat);

  makeAnimFromFrames(scene,prefix + "_jump",sheetKey,jump.frames,jump.frameRate,0);
  makeAnimFromFrames(scene,prefix + "_double_jump",sheetKey,doubleJump.frames,doubleJump.frameRate,0);
  makeAnimFromFrames(scene,prefix + "_crouch",sheetKey,crouch.frames,crouch.frameRate,crouch.repeat);

  if(roll && roll.frames){
    makeAnimFromFrames(scene,prefix + "_roll",sheetKey,roll.frames,roll.frameRate,roll.repeat);
  }

  if(turn && turn.frames){
    makeAnimFromFrames(scene,prefix + "_turn",sheetKey,turn.frames,turn.frameRate,turn.repeat);
  }

  return true;
}

  buildBackground() {
    if (this.textures.exists("character_select_bg")) {
      this.add.image(480, 270, "character_select_bg")
        .setDisplaySize(960, 540)
        .setDepth(0);
      return;
    }

    // Fallback to the background loaded in Boot.
    if (this.textures.exists("charSelect")) {
      this.add.image(480, 270, "charSelect")
        .setDisplaySize(960, 540)
        .setDepth(0);
      return;
    }

    // Emergency fallback.
    this.add.rectangle(480, 270, 960, 540, 0x030006).setDepth(0);
    this.add.rectangle(480, 270, 910, 500, 0x120014, 0.92).setDepth(1);

  }

  buildTitle() {
    this.add.text(480, 34, "CHARACTER SELECT", {
      fontFamily: "monospace",
      fontSize: "34px",
      color: "#ffffff",
      stroke: "#ff1493",
      strokeThickness: 5
    }).setOrigin(0.5).setDepth(100);

    this.add.text(480, 70, "CHOOSE YOUR FIGHTER", {
      fontFamily: "monospace",
      fontSize: "15px",
      color: "#ff4fc3",
      stroke: "#000000",
      strokeThickness: 3
    }).setOrigin(0.5).setDepth(100);
  }

  buildCards() {
    const startX = 135;
    const y = 255;
    const gap = 145;
    const cardW = 122;
    const cardH = 260;

    this.cardFrames = [];
    this.cardImages = [];
    this.nameTexts = [];

    this.fighters.forEach((fighter, index) => {
      const x = startX + index * gap;

      const frame = this.add.rectangle(x, y, cardW, cardH, 0x090009, 0.82)
        .setStrokeStyle(2, fighter.unlocked ? 0x7a225a : 0x444444)
        .setDepth(50)
        .setInteractive({ useHandCursor: true });

      this.cardFrames.push(frame);

      let cardObj;

      if (fighter.cardKey && this.textures.exists(fighter.cardKey)) {
        cardObj = this.add.image(x, y, fighter.cardKey)
          .setDisplaySize(cardW - 10, cardH - 10)
          .setDepth(51);
      } else {
        cardObj = this.makePlaceholderCard(x, y, cardW, cardH, fighter, index);
      }

      this.cardImages.push(cardObj);

      const nameText = this.add.text(x, y - 148, fighter.displayName, {
        fontFamily: "monospace",
        fontSize: fighter.displayName.length > 7 ? "12px" : "17px",
        color: fighter.unlocked ? "#ffffff" : "#777777",
        stroke: "#000000",
        strokeThickness: 3
      }).setOrigin(0.5).setDepth(60);

      this.nameTexts.push(nameText);

      frame.on("pointerdown", () => {
        if (!fighter.unlocked) return;

        if (this.selectedIndex === index) {
          this.selectFighter();
        } else {
          this.selectedIndex = index;
          this.updateSelection();
        }
      });
    });
  }

  makePlaceholderCard(x, y, w, h, fighter, index) {
    const group = this.add.container(x, y).setDepth(51);

    const bg = this.add.rectangle(
      0,
      0,
      w - 10,
      h - 10,
      fighter.unlocked ? 0x18001d : 0x111111,

  moveSelection(direction) {
    let next = this.selectedIndex;

    for (let i = 0; i < this.fighters.length; i++) {
      next += direction;

      if (next < 0) next = this.fighters.length - 1;
      if (next >= this.fighters.length) next = 0;

      if (this.fighters[next].unlocked) {
        this.selectedIndex = next;
        this.updateSelection();
        return;
      }
    }
  }

  updateSelection() {
  const fighter = this.fighters[this.selectedIndex];

  this.cardFrames.forEach((frame, index) => {
    const selected = index === this.selectedIndex;
    const unlocked = this.fighters[index].unlocked;

    frame.setStrokeStyle(
      selected ? 5 : 2,
      selected ? 0xff1493 : unlocked ? 0x7a225a : 0x444444
    );

    frame.setScale(selected ? 1.08 : 1.0);

    frame.setFillStyle(
      unlocked ? 0x090009 : 0x111111,
      selected ? 0.98 : 0.82
    );
  });

  this.cardImages.forEach((obj, index) => {
    const selected = index === this.selectedIndex;
    const unlocked = this.fighters[index].unlocked;

    if (!obj) return;

    obj.setAlpha(unlocked ? 1 : 0.45);

    // IMPORTANT:
    // Do not use setScale() on real card PNGs after setDisplaySize().
    // It destroys the intended card size.
    if (obj.texture && obj.texture.key) {
      const bigW = 122 - 4;
      const bigH = 260 - 4;
      const normalW = 122 - 10;
      const normalH = 260 - 10;

      obj.setDisplaySize(
        selected ? bigW : normalW,
        selected ? bigH : normalH
      );
    } else if (obj.setScale) {
      // Placeholder containers can still use scale safely.
      obj.setScale(selected ? 1.05 : 1.0);
    }
  });

  this.nameTexts.forEach((text, index) => {
    const selected = index === this.selectedIndex;
    const unlocked = this.fighters[index].unlocked;

    text.setColor(selected ? "#ff4fc3" : unlocked ? "#ffffff" : "#777777");
  });

  this.infoName.setText(fighter.displayName);
  this.infoFaction.setText("FACTION: " + (fighter.faction || "LOCKED"));
  this.infoRole.setText("ROLE: " + fighter.role);
  this.infoWeapon.setText("WEAPON: " + fighter.weapon);
}

  selectFighter() {
    const fighter = this.fighters[this.selectedIndex];

    if (!fighter || !fighter.unlocked) return;

    window.selectedFighter = fighter.id.toUpperCase();

    try {
      selectedFighter = fighter.id.toUpperCase();
    } catch (e) {}

    console.log("Selected fighter:", window.selectedFighter);

    this.scene.start("LevelSelect");
  }

    goBack() {
    this.scene.start("Title");
  }
}

  safeUpdate(time,delta){
    delta=Math.min(delta || 16.67,33.33);
    this.frameDelta=delta;
    this.updateRain();
    this.updateBottomFog();
    this.readInput();
    this.actionFailsafe();
    if(this.playerInvuln>0){
      this.playerInvuln-=delta;
      if(this.playerInvuln<0) this.playerInvuln=0;
    }
    if(!this.pauseMenuOpen && this.matchStarted && !this.matchOver){
      this.updateThrownEnemies(delta);
      this.checkDoubleUpJump();
      this.checkDirectCrouch();
    }
    if(this.matchStarted && !this.matchOver && !this.pauseMenuOpen){
      if(this.isClimbing){
        this.updateClimbing();
      }else{
        this.updateMovement();
      }
      this.updateGrabbedEnemy();
      this.updateEnemyAI(delta);
      this.resolvePlayerEnemyContact();
      this.checkVictory();
    }
    if(this.comboText){

  readInput(){
    let keyX=0;
    let keyY=0;
    if(this.keys){
      if(this.keys.left.isDown || this.keys.a.isDown) keyX=-1;
      if(this.keys.right.isDown || this.keys.d.isDown) keyX=1;
      if(this.keys.up.isDown || this.keys.w.isDown) keyY=-1;
      if(this.keys.down.isDown || this.keys.s.isDown) keyY=1;
    }
    this.moveX=Math.abs(this.stickX)>0.05 ? this.stickX : keyX;
    this.moveY=Math.abs(this.stickY)>0.05 ? this.stickY : keyY;
  }
  getLiveInputX(){
    let x=this.stickX;
    if(this.keys){
      if(this.keys.left.isDown || this.keys.a.isDown) x=-1;
      if(this.keys.right.isDown || this.keys.d.isDown) x=1;
    }
    return x;
  }
  getLiveInputY(){
    let y=this.stickY;
    if(this.keys){
      if(this.keys.up.isDown || this.keys.w.isDown) y=-1;
      if(this.keys.down.isDown || this.keys.s.isDown) y=1;
    }
    return y;
  }
  getFacingDir(){
    return this.player && this.player.flipX ? -1 : 1;
  }
  isForwardHeld(){
    const facing=this.getFacingDir();
    return this.getLiveInputX()*facing>ACTION_DEADZONE;
  }
  isUpHeld(){
    return this.getLiveInputY()<-ACTION_DEADZONE;
  }
  isDownHeld(){
    return this.getLiveInputY()>ACTION_DEADZONE;
  }
  actionFailsafe(){
    if(!this.playerBusy) return;
    if(this.playerHealth<=0) return;
    if(this.isClimbing) return;
    if(this.isJumping) return;
    if(this.grabbedEnemy) return;
    if(!this.busyUntil){
      this.forcePlayerReady();
      return;
    }
    if(this.time.now > this.busyUntil){
      this.forcePlayerReady();
    }
  }
  recoverActionInput(){
    if(this.playerHealth<=0) return;
    if(this.isClimbing) return;
    if(this.isJumping) return;
    if(this.grabbedEnemy) return;
    if(this.playerBusy && (!this.busyUntil || this.time.now > this.busyUntil)){
      this.forcePlayerReady();
    }
  }
  checkDoubleUpJump(){
    if(!this.isJumping){
      this.upTapHeld=false;
      return;
    }
    const keyUpHeld=this.keys && (this.keys.up.isDown || this.keys.w.isDown);
    const stickUpHeld=this.stickY < -0.65;
    const upHeld=keyUpHeld || stickUpHeld;
    if(!upHeld){
      this.upTapHeld=false;
    }
  }
  checkDirectCrouch(){
    if(this.pauseMenuOpen) return;
    if(!this.matchStarted || this.matchOver) return;
    const downHeld=this.isDownHeld();
    if(!downHeld){
      this.downCrouchHeld=false;
    }
  }
  updateMovement(){
    if(this.playerBusy || this.playerHealth<=0){
      return;
    }
    const dt=(this.frameDelta || 16.67)/1000;
    const stickPower=Math.min(1,Math.hypot(this.stickX,this.stickY));
    const usingStick=stickPower>STICK_DEADZONE;
    const keyboardRunning=(this.keys && this.keys.shift.isDown);
    let vx=this.moveX;
    let vy=this.moveY;
    if(Math.abs(vx)<STICK_DEADZONE) vx=0;
    if(Math.abs(vy)<STICK_DEADZONE) vy=0;
    if(vx!==0 && vy!==0){
      vx*=0.707;
      vy*=0.707;
    }
    let speed=WALK_SPEED;
    if(usingStick){
      const runPressure=Phaser.Math.Clamp(
        (stickPower-RUN_STICK_THRESHOLD)/(1-RUN_STICK_THRESHOLD),
        0,
        1
      );
      speed=Phaser.Math.Linear(WALK_SPEED,RUN_SPEED,runPressure);
    }
    if(keyboardRunning){
      speed=RUN_SPEED;
    }
    speed*=this.getPlayerSpeedMod();
    const running=keyboardRunning || stickPower>=RUN_STICK_THRESHOLD;
    this.player.x += vx * speed * dt;
    this.player.y += vy * speed * 0.55 * dt;
    if(Math.abs(vx)>0.1){
      this.lastDir="side";
      this.player.setFlipX(vx<0);
    }else if(vy<-0.1){
      this.lastDir="up";
    }else if(vy>0.1){
      this.lastDir="down";
    }
    this.handlePlatformTransitions();
    this.applyPlatformBounds();
    const moving=Math.abs(vx)>0.05 || Math.abs(vy)>0.05;
    if(!Number.isFinite(this.player.x) || !Number.isFinite(this.player.y)){
      this.player.x=470;
      this.player.y=390;
    }
    this.playMoveAnim(moving,running);
  }
  playMoveAnim(moving,running){
  if(this.playerBusy) return;

  if(this.poseSprite && this.poseSprite.visible && !this.grabbedEnemy){
    this.poseSprite.stop();
    this.poseSprite.setVisible(false);
    this.player.setVisible(true);
  }
    if(this.grabbedEnemy && this.grabMode==="carry"){
      this.showCarryPose();
      return;
    }
    this.player.setScale(this.getPlayerMoveScale());
    if(!moving){
      if(this.lastDir==="up") safePlay(this.player,this.getPlayerAnim("idle_up"));
      else if(this.lastDir==="side") safePlay(this.player,this.getPlayerAnim("idle_side"));
      else safePlay(this.player,this.getPlayerAnim("idle_down"));
      return;
    }
    if(this.lastDir==="up") safePlay(this.player,this.getPlayerAnim(running ? "run_up" : "walk_up"));
    else if(this.lastDir==="side") safePlay(this.player,this.getPlayerAnim(running ? "run_side" : "walk_side"));
    else safePlay(this.player,this.getPlayerAnim(running ? "run_down" : "walk_down"));
  }

    this.ladders=[
{

},

  }
];
    this.stairs=[

  isPlayerInZone(zone,padX=0,padY=0){
    const b=zone.getBounds();
    const r=new Phaser.Geom.Rectangle(
      b.x-padX,
      b.y-padY,
      b.width+padX*2,
      b.height+padY*2
    );
    return Phaser.Geom.Rectangle.Contains(r,this.player.x,this.player.y);
  }
  handlePlatformTransitions(){
  if(this.playerBusy || this.isClimbing || this.isJumping){
    return;
  }

  const specialLadder = this.getNearestSpecialLadder();

  if(specialLadder && Math.abs(this.moveY) > LADDER_VERTICAL_INPUT){
    if(this.platform === specialLadder.topPlatform && this.moveY > 0){
      this.startClimbing(specialLadder,"down");
      return;
    }

    if(this.platform === specialLadder.bottomPlatform && this.moveY < 0){
      this.startClimbing(specialLadder,"up");
      return;
    }
  }

  const nearLadder=this.ladders.find(l=>this.isPlayerInZone(l.zone,8,8));

  if(nearLadder && Math.abs(this.moveX)<=0.35){
    if(this.platform==="middle" && this.moveY < -LADDER_VERTICAL_INPUT){
      this.startClimbing(nearLadder,"up");
      return;
    }

    if(this.platform==="top" && this.moveY > LADDER_VERTICAL_INPUT){
      this.startClimbing(nearLadder,"down");
      return;
    }
  }

  const activeStairs=this.stairs.find(s=>this.isPlayerInZone(s.zone,8,8));

  if(activeStairs && Math.abs(this.moveX)<=0.45){
    if(this.platform==="middle" && this.moveY > STAIR_VERTICAL_INPUT){
      this.startStairTravel(activeStairs,"down");
      return;
    }

    if(this.platform==="bottom" && this.moveY < -STAIR_VERTICAL_INPUT){
      this.startStairTravel(activeStairs,"up");
      return;
    }
  }
}
  startClimbing(ladder,direction="up"){
    this.isClimbing=true;
    this.currentLadder=ladder;
    this.playerBusy=false;
    this.busyUntil=0;
    this.player.x=ladder.x;
if(direction==="down"){
  this.player.y = ladder.topY || getPlatformY(ladder.topPlatform || "top");
}else{
  this.player.y = ladder.middleY || getPlatformY(ladder.bottomPlatform || "middle");
}
    const climbAnim=this.getPlayerAnim("climb");
    const canShowClimbPose=hasAnim(this,climbAnim);
    this.player.setVisible(!canShowClimbPose);
    this.poseSprite.setTexture(this.getPlayerActionSheet());
    this.poseSprite.x=this.player.x;
    this.poseSprite.y=this.player.y;
    this.poseSprite.flipX=false;
    this.poseSprite.setOrigin(0.5,1);
    
this.poseSprite.setScale(this.getPlayerActionScale());
    this.poseSprite.setVisible(canShowClimbPose);
    if(canShowClimbPose){
      safePlay(this.poseSprite,climbAnim);
    }else{
      this.poseSprite.setVisible(false);
      safePlay(this.player,this.getPlayerAnim("idle_up"));
    }
    this.zoneText.setText("CLIMBING LADDER");
  }
  updateClimbing(){
  const l=this.currentLadder;
  if(!l) return;

  const dt=(this.frameDelta || 16.67)/1000;

  this.player.x=Phaser.Math.Linear(this.player.x,l.x,0.45);
  this.player.y+=this.moveY*this.climbSpeed*dt;
  this.player.y=Phaser.Math.Clamp(this.player.y,l.topY,l.middleY);

  this.poseSprite.x=this.player.x;
  this.poseSprite.y=this.player.y;
  this.poseSprite.flipX=false;

  if(this.poseSprite.visible){
    safePlay(this.poseSprite,this.getPlayerAnim("climb"));
  }

  if(this.player.y<=l.topY+2 && this.moveY<0){
    const exitPlatform = l.topPlatform || "top";

    this.isClimbing=false;
    this.platform=exitPlatform;
    this.player.y=getPlatformY(exitPlatform);
    this.player.x=l.topX || l.x;
    this.currentLadder=null;

    if(this.zoneText){
      this.zoneText.setText(exitPlatform.toUpperCase()+" PLATFORM");
    }

    this.forcePlayerReady();
    return;
  }

  if(this.player.y>=l.middleY-2 && this.moveY>0){
    const exitPlatform = l.bottomPlatform || "middle";

    this.isClimbing=false;
    this.platform=exitPlatform;
    this.player.y=getPlatformY(exitPlatform);
    this.player.x=l.bottomX || l.x;
    this.currentLadder=null;

    if(this.zoneText){
      this.zoneText.setText(exitPlatform.toUpperCase()+" PLATFORM");
    }

    this.forcePlayerReady();
    return;
  }
}

cleanupIdlePoseSprite(){
  if(!this.player || !this.poseSprite) return;

  const shouldHidePose =
    !this.playerBusy &&
    !this.isClimbing &&
    !this.isJumping &&
    !this.isBlocking &&
    !this.isCrouching &&
    !this.grabbedEnemy &&
    this.playerHealth > 0;

  if(shouldHidePose){
    this.poseSprite.stop();
    this.poseSprite.setVisible(false);
    this.player.setVisible(true);
    this.player.setScale(this.getPlayerMoveScale());
  }
}
startStairTravel(stair,direction="down"){
    if(this.pauseMenuOpen) return;
    if(!this.matchStarted || this.matchOver) return;
    if(this.playerBusy || this.isClimbing || this.playerHealth<=0) return;
    this.playerBusy=true;
    this.busyUntil=this.time.now+STAIR_TRAVEL_DURATION+250;
    const fromX=this.player.x;
    const fromY=this.player.y;
    const toX=direction==="down" ? stair.bottomX : stair.middleX;
    const toY=direction==="down" ? stair.bottomY : stair.middleY;
    this.lastDir="side";
    if(stair.name==="leftStairs"){
      this.player.setFlipX(direction==="down");
    }else{
      this.player.setFlipX(direction!=="down");
    }
    safePlay(this.player,this.getPlayerAnim("walk_side"));
    this.tweens.addCounter({
      from:0,
      to:1,
      duration:STAIR_TRAVEL_DURATION,
      ease:"Sine.easeInOut",
      onUpdate:tween=>{
        const t=tween.getValue();
        this.player.x=Phaser.Math.Linear(fromX,toX,t);
        this.player.y=Phaser.Math.Linear(fromY,toY,t);
      },
      onComplete:()=>{
        this.player.x=toX;
        this.player.y=toY;
        if(direction==="down"){
          this.platform="bottom";
          this.zoneText.setText("BOTTOM LEVEL");
        }else{
          this.platform="middle";
          this.zoneText.setText("MIDDLE PLATFORM");
        }
        this.forcePlayerReady();
      }
    });
  }
  getCurrentPlatformBounds(){
    return PLATFORM_BOUNDS[this.platform] || PLATFORM_BOUNDS.middle;
  }
  applyPlatformBounds(){
  const bounds = PLATFORM_BOUNDS[this.platform] || PLATFORM_BOUNDS.middle;

  this.player.x = Phaser.Math.Clamp(
    this.player.x,
    bounds.minX,
    bounds.maxX
  );

  this.player.y = getPlatformY(this.platform);
}


  ensureRoundActive(){
    if(!this.matchStarted && !this.matchOver){
      this.unlockPlayerControl();
    }
    return this.matchStarted && !this.matchOver && this.playerHealth>0;
  }
  startContextB(){
    if(!this.ensureRoundActive()) return;
    this.recoverActionInput();
    if(this.pauseMenuOpen) return;
    if(this.isClimbing || this.playerHealth<=0) return;
    this.readInput();
    if(this.isJumping){
      this.startJump(true);
      return;
    }
    if(this.isUpHeld()){
      this.startJump(true);
      return;
    }
    this.quickBlock();
  }
  startContextY(){
    if(!this.ensureRoundActive()) return;
    this.recoverActionInput();
    if(this.grabbedEnemy){
      this.throwGrabbedEnemy();
      return;
    }
    this.startAttack("heavy");
  }
  startContextKick(){
    if(!this.ensureRoundActive()) return;
    this.recoverActionInput();
    if(this.grabbedEnemy){
      this.startCarryEnemy();
      return;
    }
    if(this.pauseMenuOpen) return;
    if(this.isClimbing || this.playerHealth<=0) return;
    const cHeld=this.keys && this.keys.c && this.keys.c.isDown;
    const crouchKick=this.isDownHeld() || cHeld || this.isCrouching;
    if(crouchKick){
      if(this.playerBusy && this.isCrouching){
        this.forcePlayerReady();
      }
      this.startSweep();
      return;
    }
    this.startAttack("kick");
  }

    this.recoverActionInput();
    const alreadyJumping=this.isJumping;

   // SPECIAL JUMP LINK: middle platfor -> small upper-left roof
for(const link of JUMP_LINKS){

}
    if(alreadyJumping && this.jumpCount>=this.maxJumps) return;
    if(this.playerBusy && !this.isJumping && !this.isCrouching && !force) return;
    if(this.playerBusy && !this.isJumping && force){

      this.jumpCount=0;

    this.jumpCount++;

   const peakY=this.player.y-height;

  startCrouch(force=false){
    if(!this.ensureRoundActive()) return;
    if(this.pauseMenuOpen) return;
    if(this.isClimbing || this.playerHealth<=0) return;
    this.recoverActionInput();
    if(this.playerBusy && !force) return;
    if(this.playerBusy && force){
      if(this.crouchBaseY){
        this.player.y=this.crouchBaseY;
        this.crouchBaseY=null;
      }
      this.forcePlayerReady();
    }
    this.playerBusy=true;
    this.busyUntil=this.time.now+850;
    this.isCrouching=true;
    this.isBlocking=false;
    vibrate(VIBE.crouch);
    let played=false;
    if(!FORCE_CROUCH_FALLBACK){
      const crouchAnim=this.getPlayerAnim("crouch");
      const actionSheet=this.getPlayerActionSheet();
      if(hasAnim(this,crouchAnim) && hasTex(this,actionSheet)){
        this.poseSprite.setTexture(actionSheet);
        played=this.showPose(crouchAnim,this.getPlayerActionScale());
      }
    }
    if(!played){
      if(this.poseSprite){
        this.poseSprite.stop();
        this.poseSprite.setVisible(false);
      }
      this.player.setVisible(true);
      this.crouchBaseY=this.player.y;
      const baseScale=this.getPlayerMoveScale();
      this.player.setScale(baseScale * 1.02, baseScale * 0.58);
      this.player.y=this.crouchBaseY+18;
      this.player.setTint(0x66ccff);
    }
    if(this.crouchEvent){
      this.crouchEvent.remove(false);
    }
    this.crouchEvent=this.time.delayedCall(650,()=>{
      if(this.isCrouching && !this.isJumping){
        this.isCrouching=false;
        if(this.crouchBaseY){
          this.player.y=this.crouchBaseY;
          this.crouchBaseY=null;
        }
        this.player.setScale(this.getPlayerMoveScale());
        this.player.clearTint();
        this.forcePlayerReady();
      }
    });
  }
  startSweep(){
    if(this.pauseMenuOpen) return;
    if(!this.matchStarted || this.matchOver) return;
    if(this.playerBusy || this.isClimbing || this.playerHealth<=0) return;
    this.playerBusy=true;
    this.busyUntil=this.time.now+700;
    this.isCrouching=false;
    vibrate(VIBE.sweep);
    const kickAnim=this.getPlayerAnim("kick");

      this.positionAttackSprite("kick");

  this.lockHewPoseScale && this.lockHewPoseScale();
      this.player.setVisible(false);

    }else{
      this.player.setVisible(true);

    }));

  startGrab(){
    if(!this.ensureRoundActive()) return;
    if(this.pauseMenuOpen) return;
    if(this.playerBusy || this.isClimbing || this.playerHealth<=0) return;
    if(this.grabbedEnemy) return;
    let target=null;
    let bestDist=9999;
    const facing=this.getFacingDir();
    this.enemies.forEach(e=>{
      if(!e || e.dead || e.state==="dead") return;
      if(e.canBeGrabbed===false || e.enemyType==="doorman") return;
      if(e.platform!==this.platform) return;
      if(e.grabbed || e.thrownTime>0) return;
      const dx=e.x-this.player.x;
      const dy=Math.abs(this.player.y-e.y);
      const inFront=dx*facing>0;
      const dist=Math.abs(dx);
      if(inFront && dist<75 && dy<45 && dist<bestDist){
        target=e;
        bestDist=dist;
      }
    });
    if(!target){
      this.enemies.forEach(e=>{
        if(!e || e.dead || e.state==="dead") return;
        if(e.canBeGrabbed===false || e.enemyType==="doorman") return;
        if(e.platform!==this.platform) return;
        if(e.grabbed || e.thrownTime>0) return;
        const dx=Math.abs(this.player.x-e.x);
        const dy=Math.abs(this.player.y-e.y);
        if(dx<55 && dy<45 && dx<bestDist){
          target=e;
          bestDist=dx;
        }
      });
    }
    if(!target) return;
    this.clearGrabTimers();
    this.grabbedEnemy=target;
    this.grabMode="hold";
    this.playerBusy=true;
    this.busyUntil=this.time.now+GRAB_HOLD_TIME+250;
    this.isBlocking=false;
    this.isCrouching=false;
    this.isJumping=false;
    target.grabbed=true;
    target.busy=true;
    target.state="grabbed";
    target.knockbackTime=0;
    target.attackCooldown=9999;
    target.vx=0;
    this.safeEnemyPlay(target,"ko");
    this.showCarryPose();
    this.updateGrabbedEnemy();
    this.grabHoldEvent=this.time.delayedCall(GRAB_HOLD_TIME,()=>{
      if(this.grabbedEnemy && this.grabMode==="hold"){
        this.enemyBreakGrab();
      }
    });
  }
  showCarryPose(){
    if(!this.player || !this.poseSprite) return;
    this.poseSprite.setTexture(this.getPlayerActionSheet());
    this.poseSprite.x=this.player.x;
    this.poseSprite.y=this.player.y;
    this.poseSprite.flipX=this.player.flipX;
    this.poseSprite.setOrigin(0.5,1);
    this.poseSprite.setScale(this.getPlayerActionScale());
    this.poseSprite.setVisible(true);
  this.lockHewPoseScale && this.lockHewPoseScale();
    this.player.setVisible(false);
    safePlay(this.poseSprite,this.getPlayerAnim("carry"));
  }
  clearGrabTimers(){
    if(this.grabHoldEvent){
      this.grabHoldEvent.remove(false);
      this.grabHoldEvent=null;
    }
    if(this.carryBreakEvent){
      this.carryBreakEvent.remove(false);
      this.carryBreakEvent=null;
    }
  }
  updateGrabbedEnemy(){
    if(!this.grabbedEnemy || !this.player) return;
    const e=this.grabbedEnemy;
    if(e.dead || e.state==="dead"){
      this.clearGrabTimers();
      this.grabbedEnemy=null;
      this.grabMode="none";
      return;
    }
    const dir=this.getFacingDir();
    const offset=this.grabMode==="carry" ? CARRY_OFFSET_X : GRAB_OFFSET_X;
    e.x=this.player.x+dir*offset;
    e.y=this.player.y;
    e.homeY=this.player.y;
    e.platform=this.platform;
    e.vx=0;
    e.sprite.setFlipX(dir<0);
    this.safeEnemyPlay(e,"ko");
    this.showCarryPose();
    this.updateEnemyVisuals(e);
  }
  startCarryEnemy(){
    if(this.pauseMenuOpen) return;
    if(!this.matchStarted || this.matchOver) return;
    if(!this.grabbedEnemy) return;
    if(this.grabMode==="carry") return;
    this.clearGrabTimers();
    this.grabMode="carry";
    this.playerBusy=false;
    this.busyUntil=0;
    this.showCarryPose();
    this.carryBreakEvent=this.time.delayedCall(CARRY_BREAK_TIME,()=>{
      if(this.grabbedEnemy && this.grabMode==="carry"){
        this.enemyBreakGrab();
      }
    });
  }
  throwGrabbedEnemy(){
    if(this.pauseMenuOpen) return;
    if(!this.matchStarted || this.matchOver) return;
    if(!this.grabbedEnemy) return;
    const e=this.grabbedEnemy;
    const dir=this.getFacingDir();
    this.clearGrabTimers();
    this.grabbedEnemy=null;
    this.grabMode="none";
    this.playerBusy=false;
    this.busyUntil=0;
    this.isBlocking=false;
    this.isCrouching=false;
    this.isJumping=false;
    if(this.poseSprite){
      this.poseSprite.stop();
      this.poseSprite.setVisible(false);
    }
    if(this.player){
      this.player.setVisible(true);
      this.player.setScale(this.getPlayerMoveScale());
      safePlay(this.player,this.getPlayerAnim("idle_side"));
    }
    e.grabbed=false;
    e.busy=true;
    e.state="thrown";
    e.thrownTime=850;
    e.thrownHit=new Set();
    e.knockbackTime=850;
    e.attackCooldown=1200;
    e.platform=this.platform;
    e.homeY=this.player.y;
    e.health-=THROW_DAMAGE;
    this.createHitFX(e.x,e.y-55,"hit",THROW_DAMAGE);
    e.vx=dir*THROW_SPEED;
    this.safeEnemyPlay(e,"hurt");
    this.updateEnemyHealthBar(e);
    if(e.health<=0){
      this.killEnemy(e);
      e.thrownTime=0;
      return;
    }
    this.time.delayedCall(850,()=>{
      if(!e.dead && e.state==="thrown"){
        e.busy=false;
        e.state="idle";
        e.thrownTime=0;
        e.vx=0;
        this.safeEnemyPlay(e,"idle");
      }
    });

  enemyBreakGrab(){
    if(!this.grabbedEnemy) return;
    const e=this.grabbedEnemy;
    const dir=this.getFacingDir();
    this.clearGrabTimers();
    this.grabbedEnemy=null;
    this.grabMode="none";
    e.grabbed=false;
    e.busy=false;
    e.state="idle";
    e.attackCooldown=900;
    e.knockbackTime=250;
    e.vx=dir*90;
    this.safeEnemyPlay(e,"idle");
    this.playerBusy=false;
    this.busyUntil=0;
    if(this.poseSprite){
      this.poseSprite.stop();
      this.poseSprite.setVisible(false);
    }
    if(this.player){
      this.player.setVisible(true);
      this.player.setScale(this.getPlayerMoveScale());
      safePlay(this.player,this.getPlayerAnim("idle_side"));
    }
  }
  updateThrownEnemies(delta){
    const dt=delta/1000;
    this.enemies.forEach(e=>{
      if(!e || e.dead) return;
      if(!e.thrownTime || e.thrownTime<=0) return;
      e.thrownTime-=delta;
      if(e.thrownTime<0) e.thrownTime=0;
      e.x+=e.vx*dt;
      e.y=e.homeY;
      this.enemies.forEach(other=>{
        if(!other || other===e) return;
        if(other.dead || other.state==="dead") return;
        if(other.platform!==e.platform) return;
        if(other.grabbed) return;
        if(!e.thrownHit){
          e.thrownHit=new Set();
        }
        if(e.thrownHit.has(other)) return;
        const dx=Math.abs(e.x-other.x);
        const dy=Math.abs(e.y-other.y);
        if(dx<70 && dy<45){
          e.thrownHit.add(other);
          this.damageEnemy(other,THROW_COLLISION_DAMAGE,true);
        }
      });
      if(e.thrownTime<=0 && !e.dead && e.state==="thrown"){
        e.busy=false;
        e.state="idle";
        e.thrownTime=0;
        e.vx=0;
        this.safeEnemyPlay(e,"idle");
      }
      this.updateEnemyVisuals(e);
    });
  }
  getEnemyDef(type){
    return ENEMY_TYPES[type] || ENEMY_TYPES.corpo_sellout;
  }
  getEnemyAnim(e,action){
    const def=this.getEnemyDef(e.enemyType);
    const prefix=def.prefix;
    const map={
      idle:prefix+"_idle",
      walk:prefix+"_walk",
      punch:prefix+"_punch",
      kick:prefix+"_kick",
      hurt:prefix+"_hurt",
      knockback:prefix+"_knockback",
      ko:prefix+"_ko",
      taunt:prefix+"_taunt",
      special:prefix+"_special"
    };
    return map[action] || map.idle;
  }

  getPlatformCenterY(platform){
  return getPlatformY(platform);
}
  getNearestLadder(x){
    if(!this.ladders || !this.ladders.length) return null;
    let best=this.ladders[0];
    let bestDist=Math.abs(x-best.x);
    this.ladders.forEach(l=>{
      const d=Math.abs(x-l.x);
      if(d<bestDist){
        best=l;
        bestDist=d;
      }
    });
    return best;
  }
getNearestSpecialLadder(){
  if(!SPECIAL_LADDERS || !SPECIAL_LADDERS.length) return null;

  return SPECIAL_LADDERS.find(ladder=>{
    const closeX = Math.abs(this.player.x - ladder.x) < 36;
    const onTop = this.platform === ladder.topPlatform;
    const onBottom = this.platform === ladder.bottomPlatform;

    return closeX && (onTop || onBottom);
  });
}
  getNearestStair(x){
    if(!this.stairs || !this.stairs.length) return null;
    let best=this.stairs[0];
    let bestDist=Math.abs(x-best.x);
    this.stairs.forEach(s=>{
      const d=Math.abs(x-s.x);
      if(d<bestDist){
        best=s;
        bestDist=d;
      }
    });
    return best;
  }
  getEnemyRoute(e){
    if(!e || e.platform===this.platform) return null;
    if(e.platform==="top"){
      const ladder=this.getNearestLadder(e.x);
      if(!ladder) return null;
      return {
        kind:"ladder",
        x:ladder.x,
        to:"middle",
        destY:this.getPlatformCenterY("middle")
      };
    }
    if(e.platform==="middle"){
      if(this.platform==="top"){
        const ladder=this.getNearestLadder(e.x);
        if(!ladder) return null;
        return {
          kind:"ladder",
          x:ladder.x,
          to:"top",
          destY:this.getPlatformCenterY("top")
        };
      }
      if(this.platform==="bottom"){
        const stair=this.getNearestStair(e.x);
        if(!stair) return null;
        return {
          kind:"stair",
          x:stair.x,
          to:"bottom",
          destY:this.getPlatformCenterY("bottom")
        };
      }
    }
    if(e.platform==="bottom"){
      const stair=this.getNearestStair(e.x);
      if(!stair) return null;
      return {
        kind:"stair",
        x:stair.x,
        to:"middle",
        destY:this.getPlatformCenterY("middle")
      };
    }
    return null;
  }
  updateEnemyNavigation(e,delta){
    if(!e || e.dead || e.transitioning) return false;
    const route=this.getEnemyRoute(e);
    if(!route) return false;
    const dx=route.x-e.x;
    const dist=Math.abs(dx);
    const speed=e.enemyType==="feral" ? 135 : 90;
    if(dist>8){
      e.vx=(dx>0 ? 1 : -1)*speed;
      this.safeEnemyPlay(e,"walk");
      return true;
    }
    e.x=route.x;
    e.vx=0;
    this.startEnemyPlatformTransition(e,route);
    return true;
  }
  startEnemyPlatformTransition(e,route){
    if(!e || !route || e.transitioning) return;
    e.transitioning=true;
    e.busy=true;
    e.vx=0;
    e.attackCooldown=Math.max(e.attackCooldown || 0,700);
    this.safeEnemyPlay(e,"walk");
    const duration=route.kind==="ladder" ? 850 : 650;
    this.tweens.add({
      targets:e,
      y:route.destY,
      homeY:route.destY,
      duration:duration,
      ease:"Sine.easeInOut",
      onUpdate:()=>{
        this.updateEnemyVisuals(e);
      },
      onComplete:()=>{
        e.platform=route.to;
        e.homeY=route.destY;
        e.y=route.destY;
        e.transitioning=false;
        e.busy=false;
        e.vx=0;
        e.attackCooldown=Phaser.Math.Between(250,650);
        this.safeEnemyPlay(e,"idle");
        this.updateEnemyVisuals(e);
      }
    });
  }
  syncEnemyLane(e,delta){
    if(!e || !this.player) return;
    const bounds=PLATFORM_BOUNDS[e.platform] || PLATFORM_BOUNDS.middle;
    const targetY=Phaser.Math.Clamp(
      this.player.y+(e.laneOffset || 0),
      bounds.minY,
      bounds.maxY
    );
    const follow=e.enemyType==="corpo_sellout" ? 0.045 : 0.035;
    e.homeY=Phaser.Math.Linear(e.homeY,targetY,follow);
    e.y=e.homeY;
  }
  finishEnemyMove(e,dt){
    if(!e) return;
    e.vx=Phaser.Math.Clamp(e.vx || 0,-260,260);
    e.x+=e.vx*dt;
    if(e.platform==="top"){
      e.x=Phaser.Math.Clamp(e.x,190,820);
    }else{
      e.x=Phaser.Math.Clamp(e.x,120,860);
    }
    this.updateEnemyVisuals(e);
  }
  updateFeralAI(e,delta){
    if(!e || e.dead || e.busy) return false;
    const dx=this.player.x-e.x;
    const dy=Math.abs(this.player.y-e.y);
    const dist=Math.abs(dx);
    const dir=dx>0 ? 1 : -1;
    e.sprite.setFlipX(dx<0);
    if(dy>60){
      e.vx=0;
      this.safeEnemyPlay(e,"idle");
      return true;
    }
    if(e.attackCooldown<=0 && dist<=230){
      this.startFeralRush(e);
      return true;
    }
    if(dist>82){
      e.vx=dir*170;
      this.safeEnemyPlay(e,"walk");
    }else{
      e.vx=0;
      this.safeEnemyPlay(e,"idle");
    }
    return true;
  }
  startFeralRush(e){
    if(!e || e.dead || e.busy) return;
    const dx=this.player.x-e.x;
    const dir=dx>0 ? 1 : -1;
    e.state="rush";
    e.busy=true;
    e.vx=dir*245;
    e.attackCooldown=Phaser.Math.Between(750,1200);
    e.sprite.setFlipX(dx<0);
    this.safeEnemyPlay(e,"walk");
    this.time.delayedCall(220,()=>{
      if(!e || e.dead || e.state!=="rush") return;
      const hitDx=Math.abs(this.player.x-e.x);
      const hitDy=Math.abs(this.player.y-e.y);
      if(hitDx<=130 && hitDy<=58){
        this.damagePlayer(e.attackDamage || 7,dir);
      }
    });
    this.time.delayedCall(460,()=>{
      if(!e || e.dead) return;
      e.busy=false;
      e.state="idle";
      e.vx=0;
      this.safeEnemyPlay(e,"idle");
    });
  }
  updateCorpoSelloutAI(e,delta){
    if(!e || e.dead || e.busy) return false;
    const dx=this.player.x-e.x;
    const dy=Math.abs(this.player.y-e.y);
    const dist=Math.abs(dx);
    const dir=dx>0 ? 1 : -1;
    e.sprite.setFlipX(dx<0);
    if(this.time.now>e.smartSwitchTime){
      e.smartSide*=-1;
      e.smartSwitchTime=this.time.now+Phaser.Math.Between(900,1800);
      e.laneOffset=Phaser.Math.Between(-24,24);
    }
    if(dy>62){
      e.vx=dir*75;
      this.safeEnemyPlay(e,"walk");
      return true;
    }
    if(e.attackCooldown<=0 && dist<=130){
      this.startSmartEnemyAttack(e);
      return true;
    }
    if(dist<78){
      e.vx=-dir*115;
      this.safeEnemyPlay(e,"walk");
      return true;
    }
    if(dist>145){
      e.vx=dir*e.chaseSpeed;
      this.safeEnemyPlay(e,"walk");
      return true;
    }
    e.vx=e.smartSide*42;
    this.safeEnemyPlay(e,"walk");
    return true;
  }
  startSmartEnemyAttack(e){
    if(!e || e.dead || e.busy) return;
    const dx=this.player.x-e.x;
    const dir=dx>0 ? 1 : -1;
    const useKick=Phaser.Math.Between(0,1)===1;
    e.state="attack";
    e.busy=true;
    e.vx=0;
    e.attackCooldown=Phaser.Math.Between(850,1350);
    e.sprite.setFlipX(dx<0);
    this.safeEnemyPlay(e,useKick ? "kick" : "punch");
    this.time.delayedCall(300,()=>{
      if(!e || e.dead || e.state!=="attack") return;
      const hitDx=Math.abs(this.player.x-e.x);
      const hitDy=Math.abs(this.player.y-e.y);
      if(hitDx<=132 && hitDy<=60){
        this.damagePlayer((e.attackDamage || 8)+(useKick ? 2 : 0),dir);
      }
    });
    this.time.delayedCall(620,()=>{
      if(!e || e.dead) return;
      e.busy=false;
      e.state="idle";
      e.vx=0;
      this.safeEnemyPlay(e,"idle");
    });
  }
  safeEnemyPlay(e,action){
    if(!e || !e.sprite) return;
    if(e.dead && action!=="ko") return;
    const animKey=this.getEnemyAnim(e,action);
    if(hasAnim(this,animKey)){
      if(action==="ko"){
        e.sprite.stop();
        e.sprite.play(animKey,false);
        e.sprite.once("animationcomplete",()=>{
          this.lockEnemyKOFrame(e);
        });
        return;
      }
      safePlay(e.sprite,animKey);
      return;
    }
    this.forceEnemyActionFrame(e,action);
  }
  forceEnemyActionFrame(e,action){
    if(!e || !e.sprite) return false;
    const texKey=e.sprite.texture && e.sprite.texture.key;
    const frameMap={
      idle:[0,1,2,3,4],
      walk:[5,6,7,8,9],
      punch:[10,11,12,13,14],
      kick:[15,16,17,18,19],
      hurt:[20,21,22,23,24],
      knockback:[25,26,27,28,29],
      ko:[34,33,32,31,30],
      taunt:[35,36,37,38,39],
      special:[35,36,37,38,39]
    };
    const frames=frameMap[action] || [0];
    for(let i=0;i<frames.length;i++){
      const frame=frames[i];
      if(textureHasFrame(this,texKey,frame)){
        e.sprite.setFrame(frame);
        return true;
      }
    }
    return false;
    
  }
  lockEnemyKOFrame(e){
    if(!e || !e.sprite) return;
    e.koLocked=true;
    e.dead=true;
    e.state="dead";
    e.busy=true;
    e.vx=0;
    e.knockbackTime=0;
    e.attackCooldown=999999;
    e.sprite.stop();
    e.sprite.clearTint();
    e.sprite.setRotation(0);
    e.sprite.setOrigin(0.5,1);
    e.koYOffset=0;
    const foundKOFrame=this.forceEnemyActionFrame(e,"ko");
    if(!foundKOFrame){
      e.sprite.setFrame(0);
      e.sprite.setRotation(-Math.PI/2);
      e.sprite.setOrigin(0.5,0.5);
      e.koYOffset=-28;
    }
    if(e.shadow){
      e.shadow.setScale(1.35,0.75);
      e.shadow.setAlpha(0.3);
    }
    this.updateEnemyVisuals(e);
  }

spawnEnemyWave(index){
  if(!this.enemyWaves || index >= this.enemyWaves.length){
    return false;
  }

  this.enemyWaveIndex = index;
  this.waveSpawning = true;

  const wave = this.enemyWaves[index];
  const useHelicopter = index % 2 === 1;

  if(this.zoneText){
    this.zoneText.setText((useHelicopter ? "HELICOPTER" : "VAN") + " WAVE " + (index + 1));
  }

  if(useHelicopter){
    this.spawnWaveFromHelicopter(wave,index,()=>{
      this.waveSpawning = false;
    });
  }else{
    this.spawnWaveFromVan(wave,index,()=>{

    });
  }

  return true;
}

spawnIntroEnemy(sourceX,sourceY,spawn,delay,sourceKind){
  this.time.delayedCall(delay,()=>{
    const e = this.spawnEnemyType(
      spawn.type,
      sourceX,
      sourceY,
      spawn.platform
    );

    e.busy = true;
    e.transitioning = true;
    e.invulnerable = true;
    e.state = "intro";
    e.vx = 0;
    e.attackCooldown = 999999;
    e.homeY = sourceY;

    this.safeEnemyPlay(e,"knockback");

    const startX = sourceX;
    const startY = sourceY;
    const endX = spawn.x;
    const endY = spawn.y;

    const jumpHeight = sourceKind === "helicopter" ? 35 : 70;
    const duration = sourceKind === "helicopter" ? 760 : 560;

    this.tweens.addCounter({
      from:0,
      to:1,
      duration:duration,
      ease:"Linear",
      onUpdate:tween=>{
        const t = tween.getValue();

        e.x = Phaser.Math.Linear(startX,endX,t);
        e.y = Phaser.Math.Linear(startY,endY,t) - Math.sin(t * Math.PI) * jumpHeight;
        e.homeY = e.y;

        this.updateEnemyVisuals(e);
      },
      onComplete:()=>{
        e.x = endX;
        e.y = endY;
        e.homeY = endY;
        e.platform = spawn.platform;
        e.vx = 0;
        e.busy = false;
        e.transitioning = false;
        e.invulnerable = false;
        e.state = "idle";
        e.attackCooldown = Phaser.Math.Between(
          e.attackCooldownMin || 500,
          e.attackCooldownMax || 950
        );

        this.safeEnemyPlay(e,"idle");
        this.updateEnemyVisuals(e);
        this.createHitFX(e.x,e.y - 50,"jump",5);
      }
    });
  });
}

getAliveNormalEnemyCount(){
  if(!this.enemies) return 0;

  return this.enemies.filter(e=>{
    if(!e) return false;
    if(e.enemyType === "doorman") return false;
    if(e.dead || e.state === "dead") return false;
    if(e.health <= 0) return false;
    return true;
  }).length;
}

getAliveDoormanCount(){
  if(!this.enemies) return 0;

  return this.enemies.filter(e=>{
    if(!e) return false;
    if(e.enemyType !== "doorman") return false;
    if(e.dead || e.state === "dead") return false;
    if(e.health <= 0) return false;
    return true;
  }).length;
}

advanceEnemyWaveOrBoss(){
  if(this.waveSpawning) return;

  const aliveNormalEnemies = this.getAliveNormalEnemyCount();

  if(aliveNormalEnemies > 0){
    return;
  }

  const nextWave = this.enemyWaveIndex + 1;

  if(this.enemyWaves && nextWave < this.enemyWaves.length){
    this.waveSpawning = true;

    if(this.zoneText){
      this.zoneText.setText("WAVE " + (nextWave + 1) + " INCOMING");
    }

    this.time.delayedCall(1000,()=>{
      this.spawnEnemyWave(nextWave);
    });

    return;
  }

  if(!this.doormanSpawned){
    if(DISABLE_DOORMAN_FOR_TEST){
      this.showVictory();
    }else{
      this.spawnDoormanIntro();
    }
  }
}

  damageEnemy(e,damage,stagger=false){

    if(e.health<=0){
      this.killEnemy(e);
      return;
    }
    this.safeEnemyPlay(e,stagger ? "knockback" : "hurt");
    this.updateEnemyHealthBar(e);
    this.time.delayedCall(stagger ? 650 : 300,()=>{

  updateEnemyAI(delta){
    const dt=delta/1000;
    this.enemies.forEach(e=>{
      if(!e) return;
      if(e.grabbed || e.thrownTime>0){
        this.updateEnemyVisuals(e);
        return;
      }
      if(e.attackCooldown>0){
        e.attackCooldown-=delta;
        if(e.attackCooldown<0) e.attackCooldown=0;
      }
      if(e.knockbackTime>0){
        e.knockbackTime-=delta;
        if(e.knockbackTime<0) e.knockbackTime=0;
      }
      if(e.specialCooldown>0){
        e.specialCooldown-=delta;
        if(e.specialCooldown<0) e.specialCooldown=0;
      }
      if(e.dead || e.state==="dead"){
        e.dead=true;
        e.state="dead";
        e.vx=0;
        this.updateEnemyVisuals(e);
        return;
      }
      if(e.transitioning){
        this.updateEnemyVisuals(e);
        return;
      }
      if(e.knockbackTime>0){
        e.y=e.homeY;
        this.finishEnemyMove(e,dt);
        return;
      }
      if(e.platform!==this.platform){
        e.y=e.homeY;
        this.updateEnemyNavigation(e,delta);
        this.finishEnemyMove(e,dt);
        return;
      }
      this.syncEnemyLane(e,delta);
      if(e.busy){
        this.finishEnemyMove(e,dt);
        return;
      }
      if(e.enemyType==="doorman"){
        this.updateDoormanAI(e,delta);
        this.finishEnemyMove(e,dt);
        return;
      }
      if(this.playerHealth<=0){
        e.state="idle";
        e.vx=0;
        this.safeEnemyPlay(e,"idle");
        this.finishEnemyMove(e,dt);
        return;
      }
      const dx=this.player.x-e.x;
      const dy=this.player.y-e.y;
      const dist=Math.abs(dx);
      const absDy=Math.abs(dy);
      const dir=dx>0 ? 1 : -1;
      e.sprite.setFlipX(dx<0);
      if(e.enemyType==="feral"){
        this.updateFeralAI(e,delta);
        this.finishEnemyMove(e,dt);
        return;
      }
      if(e.enemyType==="corpo_sellout"){
        this.updateCorpoSelloutAI(e,delta);
        this.finishEnemyMove(e,dt);
        return;
      }
      const effectiveAttackRange=Math.max(e.attackRange || 80,108);
      if(absDy<=60 && dist<=effectiveAttackRange && e.attackCooldown<=0){
        this.startEnemyAttack(e);
        this.finishEnemyMove(e,dt);
        return;
      }
      if(absDy>65){
        e.vx=dir*65;
        this.safeEnemyPlay(e,"walk");
        this.finishEnemyMove(e,dt);
        return;
      }
      if(dist>effectiveAttackRange*0.92){
        e.state="chase";
        e.vx=dir*(e.chaseSpeed || 70);
        this.safeEnemyPlay(e,"walk");
      }else{
        e.state="idle";
        e.vx=0;
        this.safeEnemyPlay(e,"idle");
      }
      this.applyEnemySeparation(e);
      this.finishEnemyMove(e,dt);
    });
  }
  repelEnemyFromPlayer(e){
    if(!e || e.dead || !this.player) return;
    if(e.platform!==this.platform) return;
    if(e.grabbed || e.thrownTime>0) return;
    if(e.enemyType==="doorman") return;
    const dx=e.x-this.player.x;
    const dy=e.y-this.player.y;
    if(Math.abs(dy)>42) return;
    const minGap=62;
    if(Math.abs(dx)>=minGap) return;
    let pushDir=dx>=0 ? 1 : -1;
    if(Math.abs(dx)<4){
      if(Math.abs(this.moveX)>0.1){
        pushDir=this.moveX>0 ? 1 : -1;
      }else{
        pushDir=this.getFacingDir();
      }
    }
    e.x=this.player.x+(pushDir*minGap);
    e.vx=pushDir*65;
    e.attackCooldown=Math.max(e.attackCooldown || 0,180);
    if(e.platform==="top"){
      e.x=Phaser.Math.Clamp(e.x,190,820);
    }else{
      e.x=Phaser.Math.Clamp(e.x,120,860);
    }
    this.safeEnemyPlay(e,"walk");
    this.updateEnemyVisuals(e);
  }
  resolvePlayerEnemyContact(){
    if(!this.player || !this.enemies) return;
    this.enemies.forEach(e=>{
      if(!e || e.dead || e.state==="dead") return;
      if(e.platform!==this.platform) return;
      if(e.grabbed || e.thrownTime>0) return;
      if(e.busy || e.state==="attack" || e.state==="rush") return;
      const dx=e.x-this.player.x;
      const dy=e.y-this.player.y;
      if(Math.abs(dy)>45) return;
      const minGap=e.enemyType==="doorman" ? 92 : 62;
      if(Math.abs(dx)>=minGap) return;
      let pushDir=dx>=0 ? 1 : -1;
      if(Math.abs(dx)<4){
        if(Math.abs(this.moveX)>0.1){
          pushDir=this.moveX>0 ? 1 : -1;
        }else{
          pushDir=this.getFacingDir();
        }
      }
      e.x=this.player.x+(pushDir*minGap);
      e.vx=pushDir*55;
      e.attackCooldown=Math.max(e.attackCooldown || 0,160);
      if(e.platform==="top"){
        e.x=Phaser.Math.Clamp(e.x,190,820);
      }else{
        e.x=Phaser.Math.Clamp(e.x,120,860);
      }
      this.updateEnemyVisuals(e);
    });
  }
  applyEnemySeparation(e){
    if(!e || e.dead) return;
    this.enemies.forEach(other=>{
      if(!other || other===e || other.dead) return;
      if(other.platform!==e.platform) return;
      if(other.grabbed || other.thrownTime>0) return;
      const gap=e.x-other.x;
      const absGap=Math.abs(gap);
      const sameLane=Math.abs(e.y-other.y)<35;
      if(!sameLane) return;
      if(absGap>0 && absGap<72){
        e.x+=gap>0 ? 3.5 : -3.5;
        e.vx+=gap>0 ? 35 : -35;
      }
      if(absGap===0){
        e.x+=Phaser.Math.Between(-8,8);
      }
    });
    e.vx=Phaser.Math.Clamp(e.vx,-160,160);
    if(e.platform==="top"){
      e.x=Phaser.Math.Clamp(e.x,190,820);
    }else{
      e.x=Phaser.Math.Clamp(e.x,120,860);
    }
  }
  startEnemyAttack(e){
    if(!e || e.dead || e.busy) return;
    if(e.grabbed || e.thrownTime>0) return;
    const dx=this.player.x-e.x;
    const dir=dx>0 ? 1 : -1;
    const useKick=Phaser.Math.Between(0,3)===0;
    e.state="attack";
    e.busy=true;
    e.attackCooldown=Phaser.Math.Between(e.attackCooldownMin || 500,e.attackCooldownMax || 950);
    e.vx=0;
    e.sprite.setFlipX(dx<0);
    this.safeEnemyPlay(e,useKick ? "kick" : "punch");
    this.time.delayedCall(260,()=>{
      if(!e || e.dead || e.state!=="attack") return;
      const hitDx=Math.abs(this.player.x-e.x);
      const hitDy=Math.abs(this.player.y-e.y);
      const range=Math.max(e.attackRange || 80,112);
      if(hitDx<=range && hitDy<=60){
        this.damagePlayer((e.attackDamage || 8)+(useKick ? 1 : 0),dir);
      }
    });
    this.time.delayedCall(560,()=>{
      if(!e || e.dead) return;
      e.busy=false;
      e.state="idle";
      e.vx=0;
      this.safeEnemyPlay(e,"idle");
    });
  }
  updateDoormanAI(e,delta){
    if(!e || e.dead) return;
    if(e.bossIntro || !e.bossActive || e.invulnerable){
      e.vx=0;
      return;
    }
    if(this.platform!==e.platform || this.playerHealth<=0){
      e.vx=0;
      this.safeEnemyPlay(e,"idle");
      return;
    }
    if(e.knockbackTime>0) return;
    if(e.busy) return;
    const dx=this.player.x-e.x;
    const dy=this.player.y-e.y;
    const dist=Math.abs(dx);
    const dir=dx>0 ? 1 : -1;
    e.sprite.setFlipX(dx<0);
    if(Math.abs(dy)>50){
      e.vx=0;
      this.safeEnemyPlay(e,"idle");
      return;
    }
    if(e.specialCooldown<=0 && dist<=e.specialRange && dist>65){
      this.startDoormanSpecial(e);
      return;
    }
    if(dist<=e.attackRange && e.attackCooldown<=0){
      this.startDoormanPunch(e);
      return;
    }
    if(dist>e.stopRange){
      e.vx=dir*e.chaseSpeed;
      this.safeEnemyPlay(e,"walk");
    }else{
      e.vx=0;
      this.safeEnemyPlay(e,"idle");
    }
  }
  startDoormanPunch(e){
    if(!e || e.dead || e.busy) return;
    e.state="attack";
    e.busy=true;
    e.attackCooldown=Phaser.Math.Between(850,1250);
    e.vx=0;
    this.safeEnemyPlay(e,"punch");
    this.time.delayedCall(320,()=>{
      if(!e || e.dead || e.state!=="attack") return;
      const dx=Math.abs(this.player.x-e.x);
      const dy=Math.abs(this.player.y-e.y);
      if(dx<=e.attackRange+12 && dy<=50){
        const dir=e.x<this.player.x ? 1 : -1;
        this.damagePlayer(e.attackDamage || 15,dir);
      }
    });
    this.time.delayedCall(760,()=>{
      if(!e || e.dead) return;
      e.busy=false;
      e.state="idle";
      e.vx=0;
      this.safeEnemyPlay(e,"idle");
    });
  }
  startDoormanSpecial(e){
    if(!e || e.dead || e.busy) return;
    e.state="special";
    e.busy=true;
    e.vx=0;
    e.specialCooldown=Phaser.Math.Between(3000,4200);
    e.attackCooldown=1200;
    this.safeEnemyPlay(e,"special");
    this.sayDoorman(e,"Fire punch.",1100);
    this.time.delayedCall(260,()=>{
      if(!e || e.dead || e.state!=="special") return;
      this.createDoormanFireTaunt(e);
    });
    this.time.delayedCall(430,()=>{
      if(!e || e.dead || e.state!=="special") return;
      const dx=Math.abs(this.player.x-e.x);
      const dy=Math.abs(this.player.y-e.y);
      const dir=e.x<this.player.x ? 1 : -1;
      const fxX=e.x + dir*70;
      const fxY=e.y - 65;
      this.createHitFX(fxX,fxY,"hit",e.specialDamage || 20);
      if(dx<=e.specialRange && dy<=55){
        this.damagePlayer(e.specialDamage || 20,dir);
      }
    });
    this.time.delayedCall(950,()=>{
      if(!e || e.dead) return;
      e.busy=false;
      e.state="idle";
      e.vx=0;
      this.safeEnemyPlay(e,"idle");
    });
  }

  damagePlayer(amount,dir){
    if(this.playerHealth<=0) return;
    if(this.playerInvuln>0) return;
    let finalDamage=amount;
    if(this.isBlocking){
      finalDamage=2;
    }
    this.playerHealth=Math.max(0,this.playerHealth-finalDamage);
    this.playerInvuln=900;
    this.createHitFX(this.player.x,this.player.y-60,this.isBlocking ? "block" : "hit",finalDamage);
    vibrate(this.isBlocking ? VIBE.blockedHit : VIBE.playerDamage);
    if(this.playerHealth<=0){
      this.playerHealth=0;
      this.playerBusy=true;
      this.busyUntil=0;
      if(!this.showReaction("ko",9999)){
        this.player.setTint(0xff4444);
      }
      return;
    }
    this.playerBusy=false;
    this.busyUntil=0;
    this.isBlocking=false;
    this.isCrouching=false;
    if(this.poseSprite){
      this.poseSprite.stop();
      this.poseSprite.setVisible(false);
    }
    this.player.setVisible(true);
    this.player.setScale(this.getPlayerMoveScale());
    this.player.x+=dir*18;
    this.applyPlatformBounds();
    this.player.setTint(0xff4444);
    this.time.delayedCall(120,()=>{
      if(this.player){
        this.player.clearTint();
      }
    });
    this.time.delayedCall(40,()=>{
      this.resolvePlayerEnemyContact();
    });
  }
  positionAttackSprite(type="light"){

    this.poseSprite.setTexture(this.getPlayerAttackSheet());
    this.poseSprite.x=this.player.x+(-6*dir);
    this.poseSprite.y=this.player.y;
    this.poseSprite.flipX=this.player.flipX;
    this.poseSprite.setOrigin(0.5,1);
    this.poseSprite.setScale(this.getPlayerAttackScale());
  }
  forcePlayerReady(){
    if(this.playerHealth<=0) return;
    if(this.crouchBaseY){
      this.player.y=this.crouchBaseY;
      this.crouchBaseY=null;
    }
    if(this.grabbedEnemy && this.grabMode==="carry"){
      this.playerBusy=false;
      this.busyUntil=0;
      this.isBlocking=false;
      this.isJumping=false;
      this.isCrouching=false;
      this.showCarryPose();
      return;
    }
    this.isJumping=false;
    this.isCrouching=false;
    this.playerBusy=false;
    this.busyUntil=0;
    this.isBlocking=false;
    this.jumpCount=0;
    if(this.poseSprite){
      this.poseSprite.stop();
      this.poseSprite.setVisible(false);
    }
    if(this.player){
      this.player.setVisible(true);
      this.player.setScale(this.getPlayerMoveScale());
      this.player.clearTint();
      if(this.lastDir==="up") safePlay(this.player,this.getPlayerAnim("idle_up"));
      else if(this.lastDir==="side") safePlay(this.player,this.getPlayerAnim("idle_side"));
      else safePlay(this.player,this.getPlayerAnim("idle_down"));

  startAttack(type){
    if(!this.ensureRoundActive()) return;
    this.recoverActionInput();
    if(this.grabbedEnemy) return;
    if(this.pauseMenuOpen) return;
    if(!this.matchStarted || this.matchOver) return;
    if(this.playerBusy || this.isClimbing || this.playerHealth<=0) return;
    const data=this.getAttackData(type);
    if(!data) return;
    this.playerBusy=true;
    this.busyUntil=this.time.now+700;
    if(type==="heavy"){
      vibrate(VIBE.heavy);
    }else if(type==="kick"){
      vibrate(VIBE.kick);
    }else{
      vibrate(VIBE.attack);
    }
    const attackAnimExists=hasAnim(this,data.anim);
    const attackSheet=this.getPlayerAttackSheet();
    const attackSheetExists=hasTex(this,attackSheet);
    if(!attackAnimExists || !attackSheetExists){
      this.player.setVisible(true);
      this.player.setScale(this.getPlayerMoveScale());
      this.player.setTint(0xffff66);
      this.time.delayedCall(80,()=>{
        this.applyPlayerHit(data);
      });
      this.time.delayedCall(180,()=>{
        if(this.player){
          this.player.clearTint();
        }
        this.forcePlayerReady();
      });
      return;
    }
    this.positionAttackSprite(type);
    this.poseSprite.setVisible(true);
  this.lockHewPoseScale && this.lockHewPoseScale();
    this.player.setVisible(false);
    safePlay(this.poseSprite,data.anim);
    this.time.delayedCall(100,()=>{
      this.applyPlayerHit(data);
    });
    this.time.delayedCall(420,()=>{
      this.forcePlayerReady();
    });
    this.time.delayedCall(700,()=>{
      if(this.playerBusy){
        this.forcePlayerReady();
      }
    });
  }
  applyPlayerHit(data){
    const dir=this.getFacingDir();
    const hitX=this.player.x+dir*52;
    const hitY=this.player.y-42;
    const box=this.add.rectangle(hitX,hitY,data.range || 86,54,0xff0000,0).setDepth(999);
    const hitSet=new Set();
    this.enemies.forEach(e=>{
      if(hitSet.has(e) || e.dead || e.state==="dead") return;
      if(e.platform!==this.platform) return;
      if(e.grabbed || e.thrownTime>0) return;
      if(e.invulnerable) return;
      const dx=Math.abs(e.x-hitX);
      const dy=Math.abs((e.y-45)-hitY);
      if(dx<(data.range || 86)/2+28 && dy<48){
        hitSet.add(e);
        this.damageEnemy(e,data.damage,data.stagger);
      }
    });
    this.time.delayedCall(120,()=>{
      if(box && box.destroy) box.destroy();
    });
  }

    const sub=this.makeArcadeText(480,330,"GET SET",30,"#00eaff");
    const steps=[
      {main:"READY",sub:"GET SET",color:"#ff4fc3",size:62},
      {main:"3",sub:"",color:"#fff45c",size:96},
      {main:"2",sub:"",color:"#00eaff",size:96},
      {main:"1",sub:"",color:"#ff4fc3",size:96},

  const bx = 108;
  const by = H - 116;
  const baseR = size(50);
  const knobR = size(22);
  const touchR = size(86);

  const stickTouch = this.add.circle(bx, by, touchR, 0xffffff, 0.001)
    .setInteractive()
    .setDepth(8999)
    .setScrollFactor(0);

  const stickBase = this.add.circle(bx, by, baseR, 0x000000, 0.34)
    .setStrokeStyle(5, 0xffffff, 0.56)
    .setDepth(9000)
    .setScrollFactor(0);

  const stickMid = this.add.circle(bx, by, size(31), 0xffffff, 0.10)
    .setStrokeStyle(2, 0xffffff, 0.28)
    .setDepth(9001)
    .setScrollFactor(0);

  const knob = this.add.circle(bx, by, knobR, 0xffffff, 0.46)
    .setStrokeStyle(3, 0xffffff, 0.62)
    .setDepth(9002)
    .setScrollFactor(0);

  this.mobileUI.stickTouch = stickTouch;
  this.mobileUI.stickBase = stickBase;
  this.mobileUI.stickMid = stickMid;
  this.mobileUI.stickKnob = knob;

  let dragging = false;

  const resetStick = () => {
    dragging = false;
    knob.x = stickBase.x;
    knob.y = stickBase.y;
    this.stickX = 0;
    this.stickY = 0;
  };

  const moveStick = p => {
    let dx = p.x - stickBase.x;
    let dy = p.y - stickBase.y;
    const d = Math.sqrt(dx * dx + dy * dy);

    if(d > baseR){
      dx = (dx / d) * baseR;
      dy = (dy / d) * baseR;
    }

    knob.x = stickBase.x + dx;
    knob.y = stickBase.y + dy;

    this.stickX = dx / baseR;
    this.stickY = dy / baseR;
  };

  const startVirtualStick = p => {
    if(p && p.event && p.event.preventDefault){
      p.event.preventDefault();
    }
    dragging = true;
    moveStick(p);
  };

  stickTouch.on("pointerdown", startVirtualStick);

  this.input.on("pointerdown", p => {
    if(Phaser.Math.Distance.Between(p.x, p.y, stickBase.x, stickBase.y) <= touchR){
      startVirtualStick(p);
    }
  });

  this.input.on("pointermove", p => {
    if(dragging){
      moveStick(p);
    }
  });

  this.input.on("pointerup", resetStick);
  this.input.on("pointerupoutside", resetStick);

  this.mobileButton(diamondX, diamondY + gap, "B", 0xffd84d, () => this.startContextB());

  this.mobileButton(W - 270, H - 183, "SP", 0x8f72ff, () => this.playPlayerPose(this.getPlayerAnim("special"),750,this.getPlayerActionScale()));

  this.mobileButton(W - 420, H - 92, "CR", 0x8a8a8a, () => {
    this.recoverActionInput();
    this.startCrouch(true);
  });

  const menuX = CX;

mobileButton(x, y, label, color, down, up = null){

    .setDepth(9503)

  };

    const oldKillEnemy = Game.prototype.killEnemy;
    if(oldKillEnemy){
      Game.prototype.killEnemy = function(enemy){
        const r = oldKillEnemy.call(this,enemy);

        if(mpIsTraining(this)){
          this.time.delayedCall(650,()=>mpResetTrainingDummy(this));
        }

        return r;
      };
    }

    const oldSafeUpdate = Game.prototype.safeUpdate;
    if(oldSafeUpdate){
      Game.prototype.safeUpdate = function(time,delta){
        const r = oldSafeUpdate.call(this,time,delta);

        if(mpIsTraining(this)){
          this.mpInitTrainingCoach && this.mpInitTrainingCoach();

          const enemy = mpBestTrainingEnemy(this);
          if(enemy && (enemy.dead || enemy.health <= 0 || enemy.state === "dead")){
            if(!this.mpTrainingResetQueued){
              this.mpTrainingResetQueued = true;
              this.time.delayedCall(650,()=>{
                this.mpTrainingResetQueued = false;
                mpResetTrainingDummy(this);
              });
            }
          }
        }

        return r;
      };
    }
  }
})();


/* =========================================================
   JT COMBO TRIGGER PATCH V755
   Uses existing loaded assets:
   - jt_combo_1        = Hi-Hat Havoc
   - jt_combo_2        = Pink Slip Kick
   - jt_combo_finisher = Yellowline Rush
   - jt_air_combo      = Stick Rocket
   - jt_special        = JT Special
========================================================= */
(function(){
  if(window.MP_JT_COMBO_TRIGGER_V755) return;
  window.MP_JT_COMBO_TRIGGER_V755 = true;

  if(typeof Game === "undefined" || !Game.prototype) return;

  const JT_COMBO_WINDOW = 760;
  const JT_COMBO_COST = 0;

  function mpSelectedFighter(){
    try{
      if(typeof getSelectedFighterId === "function"){
        return String(getSelectedFighterId()).toUpperCase();
      }
    }catch(e){}
    try{
      return String(selectedFighter || window.selectedFighter || "").toUpperCase();
    }catch(e){}
    return "";
  }

  function mpIsJT(){
    const id = mpSelectedFighter();
    return id === "JT" || id.indexOf("JT") >= 0;
  }

  function mpClamp(v,min,max){
    return Math.max(min, Math.min(max, v));
  }

  function mpNearestEnemy(scene,range){
    if(!scene || !scene.enemies || !scene.player) return null;
    let best = null;
    let bestD = 999999;

    scene.enemies.forEach(e=>{
      if(!e || e.dead || e.state === "dead") return;
      if(e.platform && scene.platform && e.platform !== scene.platform) return;

      const dx = Math.abs(e.x - scene.player.x);
      const dy = Math.abs(e.y - scene.player.y);
      const d = dx + dy * 1.3;

      if(d < bestD && d <= (range || 300)){
        best = e;
        bestD = d;
      }
    });

    return best;
  }

  function mpText(scene,x,y,text,color=0xffff66){
    if(!scene || !scene.add) return;

    const t = scene.add.text(x,y,text,{
      font:"16px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5,
      backgroundColor:"#000000",
      align:"center"
    }).setOrigin(0.5).setDepth(90000);

    t.setTint(color);

    scene.tweens.add({
      targets:t,
      y:y-30,
      alpha:0,
      duration:650,
      ease:"Sine.easeOut",
      onComplete:()=>t.destroy()
    });
  }

  const JT_COMBOS = [
    {
      id:"hi_hat_havoc",
      name:"HI-HAT HAVOC",
      seq:["light","light","heavy"],
      anim:"jt_combo_1",
      damage:13,
      stun:620,
      knockback:230,
      shake:0.005,
      label:"Y Y X"
    },
    {
      id:"pink_slip_kick",
      name:"PINK SLIP KICK",
      seq:["heavy","heavy"],
      anim:"jt_combo_2",
      damage:16,
      stun:700,
      knockback:320,
      shake:0.008,
      label:"X X"
    },
    {
      id:"yellowline_rush",
      name:"YELLOWLINE RUSH",
      seq:["light","heavy","kick"],
      anim:"jt_combo_finisher",
      damage:18,
      stun:760,
      knockback:390,
      shake:0.010,
      label:"Y X A"
    },
    {
      id:"stick_rocket",
      name:"STICK ROCKET",
      seq:["jump","heavy"],
      anim:"jt_air_combo",
      damage:20,
      stun:820,
      knockback:430,
      shake:0.012,
      label:"JUMP X",
      projectile:true
    }
  ];

  function mpSeqIsPrefix(seq,target){
    if(seq.length > target.length) return false;
    for(let i=0;i<seq.length;i++){
      if(seq[i] !== target[i]) return false;
    }
    return true;
  }

  function mpHasPrefix(seq){
    return JT_COMBOS.some(c=>mpSeqIsPrefix(seq,c.seq));
  }

  function mpCompleteCombo(seq){
    return JT_COMBOS.find(c=>c.seq.length === seq.length && mpSeqIsPrefix(seq,c.seq));
  }

  Game.prototype.mpEnsureJTComboState = function(){
    if(!this.mpJTComboSeq) this.mpJTComboSeq = [];
    if(typeof this.mpJTLastComboTime !== "number") this.mpJTLastComboTime = 0;
    if(typeof this.mpJTPendingAttack !== "string") this.mpJTPendingAttack = "";
  };

  Game.prototype.mpPlayJTComboPose = function(combo){
    if(!this.player || !this.poseSprite || !combo) return false;
    if(!hasAnim(this, combo.anim)) return false;
    if(!hasTex(this, "jt_combos")) return false;

    this.playerBusy = true;
    this.busyUntil = Math.max(this.busyUntil || 0, (this.time ? this.time.now : Date.now()) + 760);

    this.poseSprite.setTexture("jt_combos");
    this.poseSprite.setOrigin(0.5,1);
    this.poseSprite.setScale(typeof JT_COMBO_SCALE !== "undefined" ? JT_COMBO_SCALE : 0.86);
    this.poseSprite.setPosition(this.player.x, this.player.y);
    this.poseSprite.setFlipX(this.player.flipX);
    this.poseSprite.setDepth((this.player.depth || 200) + 2);
    this.poseSprite.setVisible(true);
    this.player.setVisible(false);

    safePlay(this.poseSprite, combo.anim);

    this.time.delayedCall(combo.projectile ? 860 : 720, ()=>{
      if(this.poseSprite){
        this.poseSprite.stop();
        this.poseSprite.setVisible(false);
      }

      if(this.player){
        this.player.setVisible(true);
        this.player.setScale(this.getPlayerMoveScale ? this.getPlayerMoveScale() : PLAYER_MOVE_SCALE);
      }

      this.playerBusy = false;
      this.busyUntil = 0;
    });

    return true;
  };

  Game.prototype.mpApplyJTCombo = function(combo,enemy){
    if(!mpIsJT() || !combo) return false;

    if(JT_COMBO_COST > 0){
      if(typeof this.mpComboMeter !== "number") this.mpComboMeter = 100;
      if(this.mpComboMeter < JT_COMBO_COST){
        mpText(this,this.player.x,this.player.y-112,"NEED COMBO METER",0xff4fc3);
        return false;
      }
      this.mpComboMeter = mpClamp(this.mpComboMeter - JT_COMBO_COST,0,100);
    }

    enemy = enemy || mpNearestEnemy(this,330);
    if(!enemy || enemy.dead) return false;

    this.mpPlayJTComboPose(combo);

    if(this.cameras && this.cameras.main){
      this.cameras.main.shake(160,combo.shake || 0.006);
    }

    try{ vibrate(combo.projectile ? [25,20,55] : [18,20,32]); }catch(e){}

    const dir = enemy.x < this.player.x ? -1 : 1;
    const resist = typeof enemy.knockbackResist === "number" ? enemy.knockbackResist : 1;

    enemy.health -= combo.damage;
    enemy.busy = true;
    enemy.state = "jt_combo_stun";
    enemy.knockbackTime = combo.stun || 700;
    enemy.attackCooldown = Math.max(enemy.attackCooldown || 0, combo.stun || 700);
    enemy.vx = dir * (combo.knockback || 260) * resist;
    enemy.vy = 0;

    if(this.safeEnemyPlay) this.safeEnemyPlay(enemy,"knockback");
    if(this.updateEnemyHealthBar) this.updateEnemyHealthBar(enemy);
    if(this.createHitFX) this.createHitFX(enemy.x,enemy.y-70,combo.name,combo.damage);

    if(combo.projectile){
      this.mpSpawnJTStickProjectile(enemy,dir);
    }

    if(typeof this.mpGrooveValue !== "number") this.mpGrooveValue = 0;
    this.mpGrooveValue = mpClamp(this.mpGrooveValue + 0.45,0,10);
    this.rhythm = Math.max(this.rhythm || 0, Math.round(this.mpGrooveValue * 10));

    mpText(this,this.player.x,this.player.y-124,combo.name + "  " + combo.label,0xffdd55);

    if(this.mpRecordTrainingAction){
      this.mpRecordTrainingAction(combo.id);
    }

    if(enemy.health <= 0 && this.killEnemy){
      this.killEnemy(enemy);
      return true;
    }

    this.time.delayedCall(combo.stun || 700,()=>{
      if(enemy && !enemy.dead){
        enemy.busy = false;
        enemy.state = "idle";
        enemy.vx = 0;
        if(this.safeEnemyPlay) this.safeEnemyPlay(enemy,"idle");
      }
    });

    return true;
  };

  Game.prototype.mpSpawnJTStickProjectile = function(enemy,dir){
    if(!this.player) return;

    const startX = this.player.x + dir * 45;
    const startY = this.player.y - 76;
    const endX = enemy ? enemy.x : startX + dir * 250;
    const endY = enemy ? enemy.y - 70 : startY;

    let stick;

    if(this.add){
      stick = this.add.rectangle(startX,startY,46,8,0xfff45c,1)
        .setStrokeStyle(2,0x000000,0.85)
        .setDepth(15000);
      stick.rotation = dir > 0 ? 0.2 : -0.2;
    }

    if(!stick) return;

    this.tweens.add({
      targets:stick,
      x:endX,
      y:endY,
      rotation:stick.rotation + dir * Math.PI * 3,
      duration:220,
      ease:"Quad.easeOut",
      onComplete:()=>{
        if(this.createHitFX) this.createHitFX(endX,endY,"hit",8);
        stick.destroy();
      }
    });
  };

  Game.prototype.mpRecordJTComboInput = function(action,enemy=null){
    if(!mpIsJT() || !action) return;
    this.mpEnsureJTComboState();

    const now = this.time ? this.time.now : Date.now();

    if(this.mpJTLastComboTime && now - this.mpJTLastComboTime > JT_COMBO_WINDOW){
      this.mpJTComboSeq = [];
    }

    this.mpJTLastComboTime = now;
    this.mpJTComboSeq.push(action);

    if(!mpHasPrefix(this.mpJTComboSeq)){
      this.mpJTComboSeq = mpHasPrefix([action]) ? [action] : [];
    }

    const combo = mpCompleteCombo(this.mpJTComboSeq);

    if(combo){
      this.mpApplyJTCombo(combo,enemy);
      this.mpJTComboSeq = [];
      this.mpJTLastComboTime = 0;
    }
  };

  Game.prototype.mpActivateJTSpecial = function(){
    if(!mpIsJT()) return false;
    if(this.pauseMenuOpen || !this.matchStarted || this.matchOver) return false;

    const now = this.time ? this.time.now : Date.now();
    if(this.mpJTSpecialLock && now < this.mpJTSpecialLock) return false;
    this.mpJTSpecialLock = now + 900;

    if(hasAnim(this,"jt_special")){
      this.playPlayerPose("jt_special",750,this.getPlayerActionScale ? this.getPlayerActionScale() : JT_ACTION_SCALE);

    const enemy = mpNearestEnemy(this,320);
