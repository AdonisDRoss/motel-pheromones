<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
html,body{margin:0;padding:0;background:#000;width:100%;height:100%;overflow:hidden;touch-action:none;}
#game{position:fixed;inset:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;}
canvas{display:block!important;image-rendering:pixelated;max-width:100%!important;max-height:100%!important;}
</style>
</head>
<body>
<div id="game"></div>
<script>
const VERSION=677;
const W=960,H=540;
const MOVE_FRAME_W=204,MOVE_FRAME_H=170;
const JT_BASE="assets/sprites/player/jt";
const HEW_BASE="assets/sprites/player/hew";
let selectedFighter="JT";
let selectedLevel="outdoor";
let selectedLevelName="OUTDOOR";
let titleMusic=null;
let musicStarted=false;
function hasTex(scene,key){return scene.textures.exists(key);}
function hasAnim(scene,key){return scene.anims.exists(key);}
function safePlay(sprite,key){if(sprite&&sprite.scene&&hasAnim(sprite.scene,key)) sprite.play(key,true);}
function startTitleMusic(scene){
  if(musicStarted) return;
  try{
    if(!scene||!scene.sound||!scene.cache.audio.exists("title_music")) return;
    titleMusic=scene.sound.add("title_music",{loop:true,volume:0.55});
    titleMusic.play();
    musicStarted=true;
  }catch(e){console.warn("music skipped",e);}
}
function go(scene){try{startTitleMusic(scene);}catch(e){} scene.scene.start("CharacterSelect");}
function makeAnim(scene,key,sheet,start,end,rate,repeat){
  if(!hasTex(scene,sheet)||hasAnim(scene,key)) return;
  const frames=[];
  for(let i=start;i<=end;i++) frames.push({key:sheet,frame:i});
  scene.anims.create({key,frames,frameRate:rate,repeat});
}
function makePlayerAnims(scene,prefix){
  makeAnim(scene,prefix+"_idle_down",prefix+"_movement",0,4,6,-1);
  makeAnim(scene,prefix+"_idle_up",prefix+"_movement",5,9,6,-1);
  makeAnim(scene,prefix+"_idle_side",prefix+"_movement",10,14,6,-1);
  makeAnim(scene,prefix+"_walk_down",prefix+"_movement",15,19,8,-1);
  makeAnim(scene,prefix+"_walk_up",prefix+"_movement",15,19,8,-1);
  makeAnim(scene,prefix+"_walk_side",prefix+"_movement",15,19,8,-1);
  makeAnim(scene,prefix+"_run_down",prefix+"_movement",20,24,12,-1);
  makeAnim(scene,prefix+"_run_up",prefix+"_movement",20,24,12,-1);
  makeAnim(scene,prefix+"_run_side",prefix+"_movement",20,24,12,-1);
}
function loadAssets(scene){
  scene.load.image("title","assets/levels/title-screen.png?v="+VERSION);
  scene.load.image("charSelect","assets/levels/character-select.png?v="+VERSION);
  scene.load.image("levelSelect","assets/levels/level-select.png?v="+VERSION);
  scene.load.image("outdoor","assets/levels/outdoor.png?v="+VERSION);
  scene.load.image("indoor","assets/levels/leftys-indoor.png?v="+VERSION);
  scene.load.image("house","assets/levels/house-party.png?v="+VERSION);
  scene.load.image("lmnop","assets/levels/Lmnop.png?v="+VERSION);
  scene.load.image("chicken","assets/levels/Chicken-coupe.png?v="+VERSION);
  scene.load.audio("title_music","assets/audio/title-theme.mp3?v="+VERSION);
  scene.load.spritesheet("jt_movement",JT_BASE+"/movement.png?v="+VERSION,{frameWidth:MOVE_FRAME_W,frameHeight:MOVE_FRAME_H,margin:0,spacing:0});
  scene.load.spritesheet("hew_movement",HEW_BASE+"/movement.png?v="+VERSION,{frameWidth:MOVE_FRAME_W,frameHeight:MOVE_FRAME_H,margin:0,spacing:0});
}
class Boot extends Phaser.Scene{
  constructor(){super("Boot");}
  preload(){loadAssets(this);}
  create(){makePlayerAnims(this,"jt");makePlayerAnims(this,"hew");this.scene.start("Title");}
}
class Title extends Phaser.Scene{
  constructor(){super("Title");}
  create(){
    if(hasTex(this,"title")) this.add.image(480,270,"title").setDisplaySize(960,540);
    else this.add.rectangle(480,270,960,540,0x000000,1);
    this.add.text(480,485,"TAP TO START",{font:"24px monospace",fill:"#fff",backgroundColor:"#000"}).setOrigin(0.5).setDepth(9999);
    const hit=this.add.rectangle(480,270,960,540,0xffffff,0.001).setInteractive().setDepth(9998);
    hit.on("pointerdown",()=>go(this));
    this.input.keyboard.on("keydown-ENTER",()=>go(this));
  }
}
class CharacterSelect extends Phaser.Scene{
  constructor(){super("CharacterSelect");}
  create(){
    if(hasTex(this,"charSelect")) this.add.image(480,270,"charSelect").setDisplaySize(960,540);
    else {this.add.rectangle(480,270,960,540,0x120012,1);this.add.text(480,80,"CHARACTER SELECT",{font:"30px monospace",fill:"#ff4fc3"}).setOrigin(0.5);}
    const choices=[{n:"JT",x:390},{n:"HEW",x:610}];
    choices.forEach(c=>{
      this.add.rectangle(c.x,300,190,300,0xffffff,0.01).setInteractive().on("pointerdown",()=>{selectedFighter=c.n;this.scene.start("LevelSelect");});
      this.add.text(c.x,500,c.n,{font:"24px monospace",fill:"#fff",backgroundColor:"#000"}).setOrigin(0.5);
    });
  }
}
class LevelSelect extends Phaser.Scene{
  constructor(){super("LevelSelect");}
  create(){
    if(hasTex(this,"levelSelect")) this.add.image(480,270,"levelSelect").setDisplaySize(960,540);
    else {this.add.rectangle(480,270,960,540,0x001111,1);this.add.text(480,80,"LEVEL SELECT",{font:"30px monospace",fill:"#00eaff"}).setOrigin(0.5);}
    const levels=[
      {name:"HOUSE PARTY",key:"house",x:190},{name:"INDOOR",key:"indoor",x:360},{name:"OUTDOOR",key:"outdoor",x:520},{name:"LMNOP",key:"lmnop",x:690},{name:"CHICKEN",key:"chicken",x:840}
    ];
    levels.forEach(l=>{
      this.add.rectangle(l.x,300,150,300,0xffffff,0.01).setInteractive().on("pointerdown",()=>{selectedLevel=l.key;selectedLevelName=l.name;this.scene.start("Game");});
    });
    this.add.text(480,505,"TAP A LEVEL",{font:"20px monospace",fill:"#ff4fc3",backgroundColor:"#000"}).setOrigin(0.5);
  }
}
class Game extends Phaser.Scene{
  constructor(){super("Game");}
  create(){
    this.add.image(480,270,hasTex(this,selectedLevel)?selectedLevel:"outdoor").setDisplaySize(960,540);
    this.add.text(20,20,"CHAR: "+selectedFighter,{font:"16px monospace",fill:"#fff",backgroundColor:"#000"}).setDepth(1000);
    this.add.text(20,45,"LEVEL: "+selectedLevelName,{font:"16px monospace",fill:"#ff4fc3",backgroundColor:"#000"}).setDepth(1000);
    this.prefix=selectedFighter==="HEW"?"hew":"jt";
    this.player=this.add.sprite(470,390,this.prefix+"_movement").setOrigin(0.5,1).setScale(0.44).setDepth(200);
    safePlay(this.player,this.prefix+"_idle_down");
    this.keys=this.input.keyboard.addKeys("W,A,S,D,UP,DOWN,LEFT,RIGHT");
    this.stickX=0;this.stickY=0;
    this.makeTouch();
  }
  makeTouch(){
    const base=this.add.circle(95,445,45,0xffffff,0.22).setDepth(1000);
    const knob=this.add.circle(95,445,25,0xffffff,0.30).setDepth(1001);
    base.setInteractive();
    base.on("pointermove",p=>{let dx=Phaser.Math.Clamp(p.x-95,-45,45);let dy=Phaser.Math.Clamp(p.y-445,-45,45);knob.setPosition(95+dx,445+dy);this.stickX=dx/45;this.stickY=dy/45;});
    base.on("pointerout",()=>{knob.setPosition(95,445);this.stickX=0;this.stickY=0;});
    base.on("pointerup",()=>{knob.setPosition(95,445);this.stickX=0;this.stickY=0;});
    this.add.circle(780,445,34,0xffffff,0.22).setDepth(1000);this.add.text(780,445,"A",{font:"20px monospace",fill:"#fff"}).setOrigin(0.5).setDepth(1001);
    this.add.circle(840,395,34,0xffffff,0.22).setDepth(1000);this.add.text(840,395,"X",{font:"20px monospace",fill:"#fff"}).setOrigin(0.5).setDepth(1001);
  }
  update(){
    let x=0,y=0;
    if(this.keys.A.isDown||this.keys.LEFT.isDown)x=-1;
    if(this.keys.D.isDown||this.keys.RIGHT.isDown)x=1;
    if(this.keys.W.isDown||this.keys.UP.isDown)y=-1;
    if(this.keys.S.isDown||this.keys.DOWN.isDown)y=1;
    if(Math.abs(this.stickX)>0.1)x=this.stickX;
    if(Math.abs(this.stickY)>0.1)y=this.stickY;
    this.player.x=Phaser.Math.Clamp(this.player.x+x*3,120,860);
    this.player.y=Phaser.Math.Clamp(this.player.y+y*2,250,500);
    if(Math.abs(x)>0.1||Math.abs(y)>0.1){
      if(Math.abs(x)>0.1){this.player.setFlipX(x<0);safePlay(this.player,this.prefix+"_walk_side");}
      else if(y<0) safePlay(this.player,this.prefix+"_walk_up");
      else safePlay(this.player,this.prefix+"_walk_down");
    }else safePlay(this.player,this.prefix+"_idle_down");
  }
}
const config={type:Phaser.AUTO,parent:"game",width:W,height:H,backgroundColor:"#000",scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},scene:[Boot,Title,CharacterSelect,LevelSelect,Game],audio:{disableWebAudio:false}};
new Phaser.Game(config);
</script>
</body>
</html>
