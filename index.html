    return { id, sheet, scale, anim };
  }

  function mpFinalApplyCpuAction(scene,e,action){
    if(!scene || !e || !e.sprite || !e.mpvCpuOpponent) return false;

    const member = e.mpvCpuMember || {};
    const id = member.id || member.fighterId || e.fighterId || "JACKSON";
    const cfg = mpFinalFighterVisual(id, action || "idle");

    if(scene.textures && scene.textures.exists(cfg.sheet)){
      if(e.sprite.texture && e.sprite.texture.key !== cfg.sheet){
        e.sprite.setTexture(cfg.sheet);
      }
    }

    e.sprite.setOrigin(0.5,1);
    e.sprite.setScale(cfg.scale);
    e.sprite.clearTint();

    if(scene.anims && scene.anims.exists(cfg.anim)){
      if(action === "ko"){
        if(!e.mpFinalKoAnimStarted){
          e.mpFinalKoAnimStarted = true;
          e.sprite.stop();
          e.sprite.play(cfg.anim,false);
          e.sprite.once("animationcomplete",()=>{
            if(scene.lockEnemyKOFrame){
              scene.lockEnemyKOFrame(e);
            }
          });
        }
      }else{
        safePlay(e.sprite,cfg.anim);
      }
    }else{
      try{ e.sprite.setFrame(0); }catch(err){}
    }

    e.mpFinalSkinId = cfg.id;
    e.mpFinalSkinAction = action || "idle";
    return true;
  }

  const MP_FINAL_OLD_SAFE_ENEMY_PLAY = Game.prototype.safeEnemyPlay;
  Game.prototype.safeEnemyPlay = function(e,action){
    if(e && e.mpvCpuOpponent){
      if(mpFinalApplyCpuAction(this,e,action || "idle")) return;
    }

    if(MP_FINAL_OLD_SAFE_ENEMY_PLAY){
      return MP_FINAL_OLD_SAFE_ENEMY_PLAY.call(this,e,action);
    }
  };

  const MP_FINAL_OLD_FORCE_ENEMY_FRAME = Game.prototype.forceEnemyActionFrame;
  Game.prototype.forceEnemyActionFrame = function(e,action){
    if(e && e.mpvCpuOpponent){
      return mpFinalApplyCpuAction(this,e,action || "idle");
    }

    if(MP_FINAL_OLD_FORCE_ENEMY_FRAME){
      return MP_FINAL_OLD_FORCE_ENEMY_FRAME.call(this,e,action);
    }

    return false;
  };

  function mpFinalRefreshCpuSkin(scene){
    if(!scene || !scene.mpvCpu || !scene.mpvCpu.mpvCpuOpponent) return;

    const e = scene.mpvCpu;
    let action = "idle";

    if(e.dead || e.state === "dead") action = "ko";
    else if(e.state === "hurt") action = "hurt";
    else if(e.state === "knockback" || e.knockbackTime > 0) action = "knockback";
    else if(e.busy && e.state === "attack") action = "punch";
    else if(Math.abs(e.vx || 0) > 4) action = "walk";

    mpFinalApplyCpuAction(scene,e,action);
  }

  Game.prototype.mobileButton = function(x, y, label, color, down, up = null){
    const size = v => v * CONTROL_ZOOM;
    const font = v => Math.round(v * CONTROL_ZOOM) + "px monospace";

    const hitR = size(42);
    const faceR = size(25);

    const hit = this.add.circle(x, y, hitR, 0xffffff, 0.01)
      .setInteractive({ useHandCursor:true })
      .setDepth(95000)
      .setScrollFactor(0);

    const shadow = this.add.circle(x + 2, y + 3, faceR, 0x000000, 0.22)
      .setDepth(95001)
      .setScrollFactor(0);

    const face = this.add.circle(x, y, faceR, color, 0.82)
      .setStrokeStyle(2, 0xffffff, 0.50)
      .setDepth(95002)
      .setScrollFactor(0);

    const shine = this.add.circle(x - 5, y - 5, size(8), 0xffffff, 0.16)
      .setDepth(95003)
      .setScrollFactor(0);

    const text = this.add.text(x, y, label, {
      font: font(label.length > 1 ? 12 : 15),
      fill: "#ffffff",
      stroke: "#000000",
      strokeThickness: 3
    })
      .setOrigin(0.5)
      .setDepth(95004)
      .setScrollFactor(0);

    hit.on("pointerdown", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      this.ensureRoundActive();
      this.readInput();
      this.recoverActionInput();
      vibrate(VIBE.button);
      if(down) down();
    });

    hit.on("pointerup", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      if(up) up();
    });

    hit.on("pointerout", () => {
      if(up) up();
    });

    const btn = { hit, shadow, face, shine, text, label };

    if(!this.mobileButtons) this.mobileButtons = [];
    this.mobileButtons.push(btn);

    return btn;
  };

  Game.prototype.makeMobileControls = function(){
    const size = v => v * CONTROL_ZOOM;
    const font = v => Math.round(v * CONTROL_ZOOM) + "px monospace";

    this.mobileUI = {};
    this.mobileButtons = [];
    this.input.topOnly = false;

    const bx = 105;
    const by = H - 145;
    const baseR = size(44);
    const knobR = size(18);

    const stickBase = this.add.circle(bx, by, baseR, 0xffffff, 0.10)
      .setStrokeStyle(2, 0xffffff, 0.18)
      .setDepth(94000)
      .setScrollFactor(0);

    const knob = this.add.circle(bx, by, knobR, 0xffffff, 0.28)
      .setStrokeStyle(2, 0xffffff, 0.25)
      .setDepth(94001)
      .setScrollFactor(0);

    this.mobileUI.stickBase = stickBase;
    this.mobileUI.stickKnob = knob;

    let dragging = false;

    const moveStick = p => {
      let dx = p.x - stickBase.x;
      let dy = p.y - stickBase.y;
      const d = Math.sqrt(dx * dx + dy * dy);

      if(d > baseR){
        dx = (dx / d) * baseR;
        dy = (dy / d) * baseR;
      }

      knob.x = stickBase.x + dx;
      knob.y = stickBase.y + dy;

      this.stickX = dx / baseR;
      this.stickY = dy / baseR;
    };

    this.input.on("pointerdown", p => {
      if(Phaser.Math.Distance.Between(p.x, p.y, stickBase.x, stickBase.y) < size(78)){
        dragging = true;
        moveStick(p);
      }
    });

    this.input.on("pointermove", p => {
      if(dragging) moveStick(p);
    });

    const releaseStick = () => {
      dragging = false;
      knob.x = stickBase.x;
      knob.y = stickBase.y;
      this.stickX = 0;
      this.stickY = 0;
    };

    this.input.on("pointerup", releaseStick);
    this.input.on("pointerupoutside", releaseStick);

    // Lower-right placement from the marked X.
    const diamondX = W - 155;
    const diamondY = H - 90;
    const gap = 42;

    this.mobileButton(diamondX, diamondY - gap, "X", 0x4d7cff, () => this.startAttack("light"));
    this.mobileButton(diamondX - gap, diamondY, "Y", 0x4fd35d, () => this.startContextY());
    this.mobileButton(diamondX + gap, diamondY, "A", 0xff5a5a, () => this.startContextKick());
    this.mobileButton(diamondX, diamondY + gap, "B", 0xffd84d, () => this.startContextB());

    this.mobileButton(diamondX - 70, diamondY - 70, "SP", 0x8f72ff, () => this.startAttack("heavy"));

    this.mobileButton(diamondX - 145, diamondY + 4, "CR", 0x8a8a8a, () => {
      this.recoverActionInput();
      this.startCrouch(true);
    });

    const menuX = CX;
    const menuY = H - 105;

    const menuHit = this.add.rectangle(menuX, menuY, size(96), size(30), 0x000000, 0.28)
      .setInteractive({ useHandCursor:true })
      .setDepth(95000)
      .setScrollFactor(0);

    const menuFace = this.add.rectangle(menuX, menuY, size(96), size(30), 0xffffff, 0.10)
      .setStrokeStyle(2, 0xffffff, 0.30)
      .setDepth(95001)
      .setScrollFactor(0);

    const menuText = this.add.text(menuX, menuY, "MENU", {
      font: font(13),
      fill: "#fff"
    })
      .setOrigin(0.5)
      .setDepth(95002)
      .setScrollFactor(0);

    this.mobileUI.menuHit = menuHit;
    this.mobileUI.menuFace = menuFace;
    this.mobileUI.menuText = menuText;

    menuHit.on("pointerdown", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      this.togglePauseMenu();
    });
  };

  function mpFinalMoveTextHud(scene){
    if(!scene || !scene.children) return;

    const rows = {
      "CHAR:": {x:20,y:104},
      "LEVEL:": {x:20,y:128},
      "COMBO:": {x:20,y:152},
      "HP:": {x:20,y:176}
    };

    scene.children.list.forEach(obj=>{
      if(!obj || typeof obj.text !== "string") return;

      const txt = obj.text.toUpperCase();
      Object.keys(rows).forEach(prefix=>{
        if(txt.indexOf(prefix) === 0){
          obj.x = rows[prefix].x;
          obj.y = rows[prefix].y;
          if(obj.setScrollFactor) obj.setScrollFactor(0);
          if(obj.setDepth) obj.setDepth(65010);
        }
      });
    });
  }

  function mpFinalLayoutHud(scene){
    if(!scene || !mpFinalIsVersus()) return;

    mpFinalMoveTextHud(scene);

    const hud = scene.mpvHud;
    if(!hud) return;

    const topDepth = 96000;

    if(hud.timer){
      hud.timer.setText(hud.timer.text || "TIME 10:00");
      hud.timer.setPosition(CX, 38);
      hud.timer.setOrigin(0.5,0);
      hud.timer.setDepth(topDepth);
      hud.timer.setScrollFactor(0);
    }

    if(hud.title){
      hud.title.setPosition(CX, 74);
      hud.title.setOrigin(0.5,0);
      hud.title.setDepth(topDepth);
      hud.title.setScrollFactor(0);
    }

    if(hud.p1Name){
      hud.p1Name.setPosition(150, 42);
      hud.p1Name.setOrigin(0,0);
      hud.p1Name.setDepth(topDepth);
      hud.p1Name.setScrollFactor(0);
    }

    const items = scene.mpvHudItems || [];
    const hpBack = items[3];
    const hpFill = hud.hpFill || items[4];
    const grooveBack = items[5];
    const grooveFill = hud.grooveFill || items[6];

    if(hpBack && hpBack.setPosition){
      hpBack.setPosition(150, 67);
      hpBack.setOrigin(0,0.5);
      hpBack.setDepth(topDepth);
      hpBack.setScrollFactor(0);
    }

    if(hpFill && hpFill.setPosition){
      hpFill.setPosition(152, 67);
      hpFill.setOrigin(0,0.5);
      hpFill.setDepth(topDepth + 1);
      hpFill.setScrollFactor(0);
    }

    if(grooveBack && grooveBack.setPosition){
      grooveBack.setPosition(150, 82);
      grooveBack.setOrigin(0,0.5);
      grooveBack.setDepth(topDepth);
      grooveBack.setScrollFactor(0);
    }

    if(grooveFill && grooveFill.setPosition){
      grooveFill.setPosition(152, 82);
      grooveFill.setOrigin(0,0.5);
      grooveFill.setDepth(topDepth + 1);
      grooveFill.setScrollFactor(0);
    }

    // Left C-mark tag button.
    const tagX = 88;
    const tagY = 230;

    if(hud.tagBox){
      hud.tagBox.setPosition(tagX, tagY);
      hud.tagBox.setDepth(97000);
      hud.tagBox.setScrollFactor(0);
      hud.tagBox.setInteractive({ useHandCursor:true });
    }

    if(hud.tagText){
      hud.tagText.setPosition(tagX + 20, tagY - 8);
      hud.tagText.setOrigin(0.5);
      hud.tagText.setDepth(97002);
      hud.tagText.setScrollFactor(0);
    }

    if(hud.tagNextText){
      hud.tagNextText.setPosition(tagX + 20, tagY + 14);
      hud.tagNextText.setOrigin(0.5);
      hud.tagNextText.setDepth(97002);
      hud.tagNextText.setScrollFactor(0);
    }

    if(hud.tagFaceBack){
      hud.tagFaceBack.setPosition(tagX - 52, tagY);
      hud.tagFaceBack.setDepth(97001);
      hud.tagFaceBack.setScrollFactor(0);
    }

    if(hud.tagFace){
      hud.tagFace.setPosition(tagX - 52, tagY + 11);
      hud.tagFace.setDepth(97003);
      hud.tagFace.setScrollFactor(0);
    }

    if(hud.p2Text){
      hud.p2Text.setPosition(W - 310, 210);
      hud.p2Text.setDepth(65020);
      hud.p2Text.setScrollFactor(0);
    }
  }

  const MP_FINAL_OLD_CREATE = Game.prototype.create;
  Game.prototype.create = function(){
    MP_FINAL_OLD_CREATE.call(this);

    if(mpFinalIsVersus()){
      this.time.delayedCall(120,()=>{
        mpFinalLayoutHud(this);
        mpFinalRefreshCpuSkin(this);
      });
    }
  };

  const MP_FINAL_OLD_UPDATE = Game.prototype.update;
  Game.prototype.update = function(time,delta){
    if(MP_FINAL_OLD_UPDATE){
      MP_FINAL_OLD_UPDATE.call(this,time,delta);
    }

    if(mpFinalIsVersus()){
      mpFinalLayoutHud(this);
      mpFinalRefreshCpuSkin(this);
    }
  };

  if(Game.prototype.safeUpdate){
    const MP_FINAL_OLD_SAFE_UPDATE = Game.prototype.safeUpdate;
    Game.prototype.safeUpdate = function(time,delta){
      MP_FINAL_OLD_SAFE_UPDATE.call(this,time,delta);

      if(mpFinalIsVersus()){
        mpFinalLayoutHud(this);
        mpFinalRefreshCpuSkin(this);
      }
    };
  }
})();

  function mpLoadControlsTexture(scene){
    if(!scene || !scene.load || !scene.textures) return;
    if(scene.textures.exists("mp_controls_popup")) return;
    scene.load.image("mp_controls_popup", window.MP_CONTROLS_POPUP_DATA);
  }

  function mpDestroyControls(scene){
    if(!scene) return;

    if(scene.mpControlsKeyHandlers && scene.input && scene.input.keyboard){
      Object.keys(scene.mpControlsKeyHandlers).forEach(function(key){
        scene.input.keyboard.off(key, scene.mpControlsKeyHandlers[key]);
      });
    }

    scene.mpControlsKeyHandlers = null;

    if(scene.mpControlsItems && scene.mpControlsItems.length){
      scene.mpControlsItems.forEach(function(item){
        if(item && item.destroy) item.destroy();
      });
    }

    scene.mpControlsItems = [];
    scene.mpControlsOpen = false;
  }

  function mpShowControls(scene){
    if(!scene || !scene.add) return;

    if(scene.mpControlsOpen){
      mpDestroyControls(scene);
      return;
    }

    const depth = 250000;
    const items = [];

    const shade = scene.add.rectangle(CX, CY, W, H, 0x000000, 0.82)
      .setDepth(depth)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor:true });
    items.push(shade);

    let panel;

    if(scene.textures && scene.textures.exists("mp_controls_popup")){
      const maxW = Math.min(W * 0.94, 900);
      const maxH = Math.min(H * 0.92, 506);
      panel = scene.add.image(CX, CY, "mp_controls_popup")
        .setDisplaySize(maxW, maxH)
        .setDepth(depth + 1)
        .setScrollFactor(0);
    }else{
      panel = scene.add.rectangle(CX, CY, W * 0.92, H * 0.86, 0x080510, 0.96)
        .setStrokeStyle(4, 0xff2da8)
        .setDepth(depth + 1)
        .setScrollFactor(0);

      const fallback = scene.add.text(CX, CY, "CONTROLS\n\nMOBILE: stick + X/Y/A/B/SP/CR/TAG\nGAMEPAD: stick + A/B/X/Y + START\nKEYBOARD: WASD/ARROWS, J/K/U/L, SPACE, C, Q\n\nB / ESC / TAP TO CLOSE", {
        font:"22px monospace",
        fill:"#ffffff",
        align:"center",
        stroke:"#000000",
        strokeThickness:5
      }).setOrigin(0.5).setDepth(depth + 2).setScrollFactor(0);
      items.push(fallback);
    }

    items.push(panel);

    const closeBg = scene.add.rectangle(CX, H - 34, 360, 34, 0x140014, 0.92)
      .setStrokeStyle(2, 0xff2da8)
      .setDepth(depth + 3)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor:true });

    const closeText = scene.add.text(CX, H - 34, "B / ESC / TAP CLOSE", {
      font:"18px monospace",
      fill:"#fff45c",
      stroke:"#000000",
      strokeThickness:4
    }).setOrigin(0.5).setDepth(depth + 4).setScrollFactor(0);

    items.push(closeBg, closeText);

    const close = function(){ mpDestroyControls(scene); };

    shade.on("pointerdown", close);
    closeBg.on("pointerdown", close);
    closeText.on("pointerdown", close);

    scene.mpControlsKeyHandlers = {
      "keydown-B": close,
      "keydown-ESC": close,
      "keydown-ENTER": close,
      "keydown-SPACE": close
    };

    if(scene.input && scene.input.keyboard){
      Object.keys(scene.mpControlsKeyHandlers).forEach(function(key){
        scene.input.keyboard.on(key, scene.mpControlsKeyHandlers[key]);
      });
    }

    scene.mpControlsItems = items;
    scene.mpControlsOpen = true;
  }

  window.mpShowControlsOverlay = mpShowControls;
  window.mpDestroyControlsOverlay = mpDestroyControls;

  function mpAddOptionsButton(scene){
    if(!scene || !scene.add || scene.mpOptionsButtonBuilt) return;
    scene.mpOptionsButtonBuilt = true;

    const x = W - 112;
    const y = H - 48;

    const hit = scene.add.rectangle(x, y, 180, 56, 0x000000, 0.01)
      .setDepth(240000)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor:true });

    const label = scene.add.text(x, y, "☰  OPTIONS", {
      font:"17px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5
    }).setOrigin(0.5).setDepth(240001).setScrollFactor(0);

    hit.on("pointerdown", function(){ mpShowControls(scene); });
    label.setInteractive({ useHandCursor:true }).on("pointerdown", function(){ mpShowControls(scene); });

    scene.mpOptionsButtonItems = [hit,label];
  }

  function mpAddBackButton(scene, targetScene){
    if(!scene || !scene.add || scene.mpBackButtonBuilt) return;
    scene.mpBackButtonBuilt = true;

    const x = 104;
    const y = H - 48;

    const hit = scene.add.rectangle(x, y, 170, 56, 0x000000, 0.01)
      .setDepth(240000)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor:true });

    const label = scene.add.text(x, y, "B  BACK", {
      font:"17px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5
    }).setOrigin(0.5).setDepth(240001).setScrollFactor(0);

    const goBack = function(){
      if(scene.mpControlsOpen){
        mpDestroyControls(scene);
        return;
      }
      scene.scene.start(targetScene);
    };

    hit.on("pointerdown", goBack);
    label.setInteractive({ useHandCursor:true }).on("pointerdown", goBack);

    if(scene.input && scene.input.keyboard){
      scene.input.keyboard.on("keydown-B", goBack);
      scene.input.keyboard.on("keydown-ESC", goBack);
    }

    scene.mpBackButtonItems = [hit,label];
  }

  function mpPatchSceneCreate(SceneClass, targetBackScene, includeBack){
    if(!SceneClass || !SceneClass.prototype || SceneClass.prototype.mpControlsBackNavPatched) return;
    SceneClass.prototype.mpControlsBackNavPatched = true;

    const oldPreload = SceneClass.prototype.preload;
    SceneClass.prototype.preload = function(){
      if(oldPreload) oldPreload.apply(this, arguments);
      mpLoadControlsTexture(this);
    };

    const oldCreate = SceneClass.prototype.create;
    SceneClass.prototype.create = function(){
      if(oldCreate) oldCreate.apply(this, arguments);

      if(includeBack && targetBackScene){
        mpAddBackButton(this, targetBackScene);
      }

      mpAddOptionsButton(this);

      if(this.input && this.input.keyboard){
        this.input.keyboard.on("keydown-M", ()=>mpShowControls(this));
        this.input.keyboard.on("keydown-O", ()=>mpShowControls(this));
        this.input.keyboard.on("keydown-TAB", ()=>mpShowControls(this));
      }
    };
  }

  if(typeof Boot !== "undefined" && Boot.prototype && !Boot.prototype.mpControlsTexturePatched){
    Boot.prototype.mpControlsTexturePatched = true;
    const oldBootPreload = Boot.prototype.preload;
    Boot.prototype.preload = function(){
      if(oldBootPreload) oldBootPreload.apply(this, arguments);
      mpLoadControlsTexture(this);
    };
  }

  // Title: options works, but B/ESC does not leave the title.
  mpPatchSceneCreate(typeof Title !== "undefined" ? Title : null, null, false);

  // Back chain: LevelSelect -> CharacterSelect -> ModeSelect -> Title.
  mpPatchSceneCreate(typeof ModeSelect !== "undefined" ? ModeSelect : null, "Title", true);
  mpPatchSceneCreate(typeof CharacterSelect !== "undefined" ? CharacterSelect : null, "ModeSelect", true);
  mpPatchSceneCreate(typeof LevelSelect !== "undefined" ? LevelSelect : null, "CharacterSelect", true);

  if(typeof CharacterSelect !== "undefined" && CharacterSelect.prototype){
    CharacterSelect.prototype.goBack = function(){
      if(this.mpControlsOpen){
        mpDestroyControls(this);
        return;
      }
      this.scene.start("ModeSelect");
    };
  }

  if(typeof LevelSelect !== "undefined" && LevelSelect.prototype){
    LevelSelect.prototype.goBack = function(){
      if(this.mpControlsOpen){
        mpDestroyControls(this);
        return;
      }
      this.scene.start("CharacterSelect");
    };
  }

  if(typeof Game !== "undefined" && Game.prototype && !Game.prototype.mpControlsMenuPatched){
    Game.prototype.mpControlsMenuPatched = true;

    Game.prototype.openControlsMenu = function(){
      mpShowControls(this);
    };

    Game.prototype.togglePauseMenu = function(){
      mpShowControls(this);
    };
  }
})();

/* =========================================================
   END CONTROLS IMAGE + BACK NAVIGATION PATCH V1
========================================================= */


/* =========================================================
   VERSUS SPRITE SIZE + SINGLE-SCREEN LOCK PATCH V1
   - Makes player and P2 CPU larger only in Versus mode
   - Keeps Story/Rumble/Co-op sprite scale unchanged
   - Locks Versus to the selected arena screen; no outdoor screen exploration
========================================================= */
(function(){
  if(window.MP_VERSUS_BIG_SPRITES_SCREEN_LOCK_V1) return;
  window.MP_VERSUS_BIG_SPRITES_SCREEN_LOCK_V1 = true;

  if(typeof Game === "undefined" || !Game.prototype) return;

  const MP_VERSUS_SPRITE_MULT = 1.45;

  function mpVsIsVersus(){
    return String(window.selectedGameMode || "").toLowerCase() === "versus";
  }

  function mpVsCleanId(id){
    id = String(id || "DONNY").toUpperCase();
    if(id === "DONNY") return "DONNY";
    if(id === "JT") return "JT";
    if(id === "HEW") return "HEW";
    if(id === "JACKSON") return "JACKSON";
    return "DONNY";
  }

  function mpVsBaseScaleFor(id, textureKey){
    id = mpVsCleanId(id);
    textureKey = String(textureKey || "").toLowerCase();

    const base = {
      DONNY:{ move:DONNY_SCALE, attack:DONNY_SCALE, action:DONNY_SCALE, reaction:DONNY_SCALE },
      JT:{ move:PLAYER_MOVE_SCALE, attack:PLAYER_ATTACK_SCALE, action:JT_ACTION_SCALE, reaction:JT_ACTION_SCALE },
      HEW:{ move:HEW_MOVE_SCALE, attack:HEW_ATTACK_SCALE, action:HEW_ACTION_SCALE, reaction:HEW_REACTION_SCALE },
      JACKSON:{ move:JACKSON_MOVE_SCALE, attack:JACKSON_ATTACK_SCALE, action:JACKSON_ACTION_SCALE, reaction:JACKSON_REACTION_SCALE }
    }[id];

    if(textureKey.indexOf("attacks") >= 0) return base.attack;
    if(textureKey.indexOf("actions") >= 0) return base.action;
    if(textureKey.indexOf("reactions") >= 0) return base.reaction;
    return base.move;
  }

  function mpVsScaleSprite(sprite, id){
    if(!sprite || !sprite.setScale) return;

    const textureKey = sprite.texture && sprite.texture.key ? sprite.texture.key : "";
    const baseScale = mpVsBaseScaleFor(id, textureKey);
    sprite.setScale(baseScale * MP_VERSUS_SPRITE_MULT);
  }

  function mpVsApplyBigSprites(scene){
    if(!scene || !mpVsIsVersus()) return;

    const p1Id = mpVsCleanId(window.selectedFighter || selectedFighter || "DONNY");

    if(scene.player){
      mpVsScaleSprite(scene.player, p1Id);
      scene.player.setOrigin(0.5,1);
    }

    if(scene.poseSprite && scene.poseSprite.visible){
      mpVsScaleSprite(scene.poseSprite, p1Id);
      scene.poseSprite.setOrigin(0.5,1);
    }

    if(scene.shadow && scene.shadow.setScale){
      scene.shadow.setScale(1.18,1.08);
    }

    if(scene.mpvCpu && scene.mpvCpu.sprite){
      const member = scene.mpvCpu.mpvCpuMember || {};
      const cpuId = mpVsCleanId(member.id || member.fighterId || scene.mpvCpu.fighterId || "JACKSON");
      mpVsScaleSprite(scene.mpvCpu.sprite, cpuId);
      scene.mpvCpu.sprite.setOrigin(0.5,1);

      if(scene.mpvCpu.shadow && scene.mpvCpu.shadow.setScale){
        scene.mpvCpu.shadow.setScale(1.18,1.08);
      }
    }
  }

  /* Scale getters only multiply in Versus. Story/Rumble/Co-op stay original. */
  [
    "getPlayerMoveScale",
    "getPlayerAttackScale",
    "getPlayerActionScale",
    "getPlayerReactionScale"
  ].forEach(function(methodName){
    const oldMethod = Game.prototype[methodName];
    if(!oldMethod || oldMethod.mpVsBigSpriteWrapped) return;

    const wrapped = function(){
      const scale = oldMethod.apply(this, arguments);
      return mpVsIsVersus() ? scale * MP_VERSUS_SPRITE_MULT : scale;
    };

    wrapped.mpVsBigSpriteWrapped = true;
    Game.prototype[methodName] = wrapped;
  });

  function mpVsLockArenaScreen(scene){
    if(!scene || !mpVsIsVersus()) return;
    if(typeof selectedLevel === "undefined" || selectedLevel !== "outdoor") return;

    // Lock both outdoor-chain systems to the main Lefty's arena.
    scene.mpOutdoorScreen = (typeof MP_SCREEN_LEFTYS !== "undefined")
      ? MP_SCREEN_LEFTYS
      : "leftys_outdoor";

    if(typeof LEFTY_SCREEN_MAIN_V2 !== "undefined"){
      scene.leftyScreen = LEFTY_SCREEN_MAIN_V2;
    }

    if(scene.leftyScreenPrompt && scene.leftyScreenPrompt.setText){
      scene.leftyScreenPrompt.setText("");
    }

    if(scene.leftyScreenBg){
      if(scene.textures && scene.textures.exists("outdoor")){
        scene.leftyScreenBg.setTexture("outdoor");
      }
      scene.leftyScreenBg.setDisplaySize(W,H).setDepth(1).setVisible(true);
    }

    if(scene.mpOutdoorBg){
      if(scene.textures && scene.textures.exists("outdoor")){
        scene.mpOutdoorBg.setTexture("outdoor");
      }
      scene.mpOutdoorBg.setDisplaySize(W,H).setDepth(1).setVisible(true);
    }

    if(scene.barricadeFront && scene.barricadeFront.setVisible){
      scene.barricadeFront.setVisible(true);
    }

    const validPlatforms = {
      topLeft:true,
      top:true,
      middle:true,
      behindCar:true,
      bottom:true
    };

    if(!validPlatforms[scene.platform]){
      scene.platform = "middle";
      if(scene.player){
        scene.player.y = getPlatformY("middle");
      }
    }

    if(scene.player){
      const bounds = PLATFORM_BOUNDS[scene.platform] || PLATFORM_BOUNDS.middle;
      scene.player.x = Phaser.Math.Clamp(scene.player.x, bounds.minX, bounds.maxX);
      scene.player.y = getPlatformY(scene.platform);
    }

    if(scene.shadow && scene.player){
      scene.shadow.x = scene.player.x;
      scene.shadow.y = scene.player.y + 5;
    }

    if(scene.mpvCpu){
      scene.mpvCpu.platform = scene.platform || "middle";
      scene.mpvCpu.homeY = scene.player ? scene.player.y : getPlatformY(scene.platform || "middle");
      scene.mpvCpu.y = scene.mpvCpu.homeY;

      if(scene.mpvCpu.sprite){
        scene.mpvCpu.sprite.y = scene.mpvCpu.homeY;
      }

      if(scene.mpvCpu.shadow && scene.mpvCpu.sprite){
        scene.mpvCpu.shadow.x = scene.mpvCpu.sprite.x;
        scene.mpvCpu.shadow.y = scene.mpvCpu.sprite.y + 5;
      }
    }
  }

  /* Block explicit transition helpers in Versus. */
  if(Game.prototype.checkLeftyScreenTransition){
    const oldCheckLefty = Game.prototype.checkLeftyScreenTransition;
    Game.prototype.checkLeftyScreenTransition = function(){
      if(mpVsIsVersus()) return;
      return oldCheckLefty.apply(this, arguments);
    };
  }

  if(Game.prototype.startLeftyScreenTransition){
    const oldStartLefty = Game.prototype.startLeftyScreenTransition;
    Game.prototype.startLeftyScreenTransition = function(){
      if(mpVsIsVersus()) return;
      return oldStartLefty.apply(this, arguments);
    };
  }

  if(Game.prototype.updateLeftyScreenPrompt){
    const oldPrompt = Game.prototype.updateLeftyScreenPrompt;
    Game.prototype.updateLeftyScreenPrompt = function(){
      if(mpVsIsVersus()){
        if(this.leftyScreenPrompt) this.leftyScreenPrompt.setText("");
        return;
      }
      return oldPrompt.apply(this, arguments);
    };
  }

  if(typeof mpSwitchOutdoorScreen === "function"){
    const oldMpSwitchOutdoorScreen = mpSwitchOutdoorScreen;
    mpSwitchOutdoorScreen = function(scene, screenKey, spawnOverride){
      if(mpVsIsVersus()){
        mpVsLockArenaScreen(scene);
        return;
      }
      return oldMpSwitchOutdoorScreen(scene, screenKey, spawnOverride);
    };
  }

  const oldGameCreate = Game.prototype.create;
  Game.prototype.create = function(){
    oldGameCreate.apply(this, arguments);

    if(mpVsIsVersus()){
      mpVsLockArenaScreen(this);
      mpVsApplyBigSprites(this);

      if(this.time && this.time.delayedCall){
        this.time.delayedCall(120, ()=>{
          mpVsLockArenaScreen(this);
          mpVsApplyBigSprites(this);
        });
      }
    }
  };

  const oldGameUpdate = Game.prototype.update;
  Game.prototype.update = function(time, delta){
    if(mpVsIsVersus()){
      mpVsLockArenaScreen(this);
    }

    if(oldGameUpdate){
      oldGameUpdate.call(this, time, delta);
    }

    if(mpVsIsVersus()){
      mpVsLockArenaScreen(this);
      mpVsApplyBigSprites(this);
    }
  };

  if(Game.prototype.safeUpdate){
    const oldSafeUpdate = Game.prototype.safeUpdate;
    Game.prototype.safeUpdate = function(time, delta){
      if(mpVsIsVersus()){
        mpVsLockArenaScreen(this);
      }

      oldSafeUpdate.call(this, time, delta);

      if(mpVsIsVersus()){
        mpVsLockArenaScreen(this);
        mpVsApplyBigSprites(this);
      }
    };
  }
})();

/* =========================================================
   END VERSUS SPRITE SIZE + SINGLE-SCREEN LOCK PATCH V1
========================================================= */

new Phaser.Game(config);
  </script>
