<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Motel Pheromones</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

  <style>
    body { margin:0; background:#000; overflow:hidden; }
    canvas { display:block; margin:0 auto; image-rendering: pixelated; }
  </style>
</head>

<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: 960,
  height: 540,
  backgroundColor: "#000",
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: [TitleScene, GameScene]
};

new Phaser.Game(config);

// =====================
// TITLE SCENE
// =====================
class TitleScene extends Phaser.Scene {
  constructor() {
    super("TitleScene");
  }

  preload() {
    this.load.image("title", "assets/title-screen.png");
  }

  create() {
    // Background image
    this.bg = this.add.image(480, 270, "title").setDisplaySize(960, 540);

    // Glow overlay
    this.glow = this.add.rectangle(480, 270, 960, 540, 0xff0088, 0.08);

    // PRESS START (animated)
    this.pressStart = this.add.text(480, 470, "PRESS START", {
      fontFamily: "monospace",
      fontSize: "28px",
      color: "#ff4fc3"
    }).setOrigin(0.5);

    this.tweens.add({
      targets: this.pressStart,
      alpha: 0.2,
      duration: 800,
      yoyo: true,
      repeat: -1
    });

    // Menu
    this.menuItems = ["START GAME", "OPTIONS", "CREDITS"];
    this.menuText = [];
    this.selected = 0;

    this.createMenu();

    // Input
    this.input.keyboard.on("keydown-UP", () => this.move(-1));
    this.input.keyboard.on("keydown-DOWN", () => this.move(1));
    this.input.keyboard.on("keydown-ENTER", () => this.select());

    this.input.on("pointerdown", () => this.select());
  }

  createMenu() {
    this.menuText.forEach(t => t.destroy());
    this.menuText = [];

    for (let i = 0; i < this.menuItems.length; i++) {
      let color = i === this.selected ? "#ffffff" : "#888888";

      let text = this.add.text(80, 300 + i * 40, this.menuItems[i], {
        fontFamily: "monospace",
        fontSize: "22px",
        color: color
      });

      if (i === this.selected) {
        this.add.text(60, 300 + i * 40, ">", {
          fontSize: "22px",
          color: "#ff4fc3"
        });
      }

      this.menuText.push(text);
    }
  }

  move(dir) {
    this.selected = (this.selected + dir + this.menuItems.length) % this.menuItems.length;
    this.createMenu();
  }

  select() {
    if (this.selected === 0) {
      this.cameras.main.fadeOut(300);

      this.time.delayedCall(300, () => {
        this.scene.start("GameScene");
      });
    }
  }
}

// =====================
// GAME SCENE
// =====================
class GameScene extends Phaser.Scene {
  constructor() {
    super("GameScene");
  }

  create() {
    this.add.rectangle(480, 270, 960, 540, 0x151515);

    this.add.text(30, 30, "GAME STARTED", {
      fontFamily: "monospace",
      fontSize: "22px",
      color: "#ffffff"
    });

    this.player = this.add.rectangle(200, 300, 50, 70, 0x00ffcc);
  }
}
</script>

</body>
</html>
