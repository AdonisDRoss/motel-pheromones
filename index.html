<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones v1.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  width:100vw;
  height:100vh;
  overflow:hidden;
}
canvas {
  width:100vw !important;
  height:100vh !important;
  object-fit:contain;
  image-rendering:pixelated;
}
</style>
</head>

<body>
<script>

// ================= TITLE =================
class TitleScene extends Phaser.Scene {
  constructor(){ super("TitleScene"); }

  preload(){
    this.load.image("title","assets/title-screen.png");
    this.load.image("characterSelect","assets/character-select.png");
    this.load.image("levelSelect","assets/level-select.png");

    this.load.spritesheet("jt","assets/player/jt/jt-master.png",{
      frameWidth:128,
      frameHeight:128
    });
  }

  create(){
    this.add.image(480,270,"title").setDisplaySize(960,540);

    let start=this.add.text(480,470,"TAP TO START",{fontSize:"28px",color:"#ff4fc3"})
      .setOrigin(0.5).setInteractive();

    this.tweens.add({targets:start,alpha:0.2,duration:700,yoyo:true,repeat:-1});
    start.on("pointerdown",()=>this.scene.start("CharacterSelectScene"));
  }
}

// ================= CHARACTER SELECT =================
class CharacterSelectScene extends Phaser.Scene {
  constructor(){ super("CharacterSelectScene"); }

  create(){
    this.add.image(480,270,"characterSelect").setDisplaySize(960,540);

    const spots=[
      {x:300,y:270,w:210,h:340,name:"DONNY"},
      {x:480,y:270,w:240,h:360,name:"JT"},
      {x:690,y:270,w:210,h:340,name:"HEW"}
    ];

    this.outline=this.add.rectangle(480,270,240,360,0xff4fc3,0)
      .setStrokeStyle(4,0xff4fc3);

    spots.forEach((s)=>{
      this.add.rectangle(s.x,s.y,s.w,s.h,0xff0000,0)
        .setInteractive()
        .on("pointerdown",()=>{
          this.outline.setPosition(s.x,s.y);
          this.outline.setSize(s.w,s.h);

          this.time.delayedCall(150,()=>{
            this.scene.start("LevelSelectScene",{character:s.name});
          });
        });
    });
  }
}

// ================= LEVEL SELECT (FIXED) =================
class LevelSelectScene extends Phaser.Scene {
  constructor(){ super("LevelSelectScene"); }

  create(data){
    this.selectedCharacter=data.character || "JT";

    this.add.image(480,270,"levelSelect").setDisplaySize(960,540);

    this.confirmText=this.add.text(480,500,"TAP A LEVEL",{
      fontFamily:"monospace",
      fontSize:"22px",
      color:"#ff4fc3"
    }).setOrigin(0.5).setDepth(100);

    this.levels=[
      {x:190,y:305,w:165,h:300,name:"HOUSE PARTY"},
      {x:355,y:305,w:165,h:300,name:"LEFTY'S INDOOR"},
      {x:520,y:305,w:190,h:330,name:"LEFTY'S OUTDOOR"},
      {x:690,y:305,w:165,h:300,name:"LMNOP"},
      {x:845,y:305,w:165,h:300,name:"CHICKEN COUPE"}
    ];

    this.outline=this.add.rectangle(520,305,190,330,0xff4fc3,0)
      .setStrokeStyle(5,0xff4fc3)
      .setDepth(90);

    this.levels.forEach(level=>{
      this.add.rectangle(level.x,level.y,level.w,level.h,0xff0000,0)
        .setInteractive()
        .setDepth(99)
        .on("pointerdown",()=>this.confirmLevel(level));
    });
  }

  confirmLevel(level){
    this.outline.setPosition(level.x,level.y);
    this.outline.setSize(level.w,level.h);

    this.confirmText.setText("LOADING: " + level.name);

    this.cameras.main.flash(120,255,0,150);

    this.time.delayedCall(300,()=>{
      this.scene.start("GameScene",{
        character:this.selectedCharacter,
        level:level.name
      });
    });
  }
}

// ================= GAME =================
class GameScene extends Phaser.Scene {
  constructor(){ super("GameScene"); }

  create(data){
    this.add.rectangle(480,270,960,540,0x111111);

    this.add.text(20,20,"CHAR: "+data.character,{color:"#fff"});
    this.add.text(20,50,"LEVEL: "+data.level,{color:"#ff4fc3"});

    this.depthMin=210;
    this.depthMax=430;

    this.comboStep=0;
    this.comboTimer=null;

    this.facing=1;
    this.isAttacking=false;

    this.moveX=0;
    this.moveY=0;

    this.createAnimations();

    this.shadow=this.add.ellipse(200,330,52,14,0x000000,0.35);

    this.player=this.physics.add.sprite(200,320,"jt");
    this.player.setScale(1.4);
    this.player.play("idle");

    this.enemies=this.physics.add.group();

    for(let i=0;i<5;i++){
      let e=this.physics.add.rectangle(
        500+i*70,
        320+Phaser.Math.Between(-40,40),
        40,60,0xff3355
      );
      e.hp=30;
      e.speed=70;
      this.enemies.add(e);
    }

    this.makeControls();
  }

  update(){
    const speed=200;

    if(!this.isAttacking){
      this.player.body.setVelocity(this.moveX*speed,this.moveY*speed);

      this.player.y = Phaser.Math.Clamp(this.player.y,this.depthMin,this.depthMax);

      if(this.moveX!==0 || this.moveY!==0){
        this.player.play("walk",true);
      } else {
        this.player.play("idle",true);
      }

      if(this.moveX<0){
        this.player.setFlipX(true);
        this.facing=-1;
      }

      if(this.moveX>0){
        this.player.setFlipX(false);
        this.facing=1;
      }
    }

    this.shadow.x=this.player.x;
    this.shadow.y=this.player.y+40;

    this.updateEnemies();
  }

  updateEnemies(){
    this.enemies.children.iterate(e=>{
      if(!e||e.hp<=0)return;

      let dx=this.player.x-e.x;
      let dy=this.player.y-e.y;

      if(Math.abs(dy)>12){
        e.body.setVelocityY(Math.sign(dy)*e.speed);
      } else {
        e.body.setVelocityY(0);
      }

      if(Math.abs(dx)>50){
        e.body.setVelocityX(Math.sign(dx)*e.speed);
      } else {
        e.body.setVelocityX(0);
      }
    });
  }

  createAnimations(){
    const make=(k,s,e,r,rep=0)=>{
      this.anims.create({
        key:k,
        frames:this.anims.generateFrameNumbers("jt",{start:s,end:e}),
        frameRate:r,
        repeat:rep
      });
    };

    make("idle",0,3,6,-1);
    make("walk",16,21,10,-1);
    make("light",96,99,14);
    make("heavy",112,116,10);
  }

  comboAttack(){
    if(this.isAttacking) return;

    this.comboStep++;
    if(this.comboStep>3) this.comboStep=1;

    let anim="light";
    let dmg=10;

    if(this.comboStep===3){
      anim="heavy";
      dmg=20;
    }

    this.playAttack(anim,90,dmg,250);

    if(this.comboTimer) this.comboTimer.remove();

    this.comboTimer=this.time.delayedCall(500,()=>{
      this.comboStep=0;
    });
  }

  playAttack(anim,range,damage,knock){
    this.isAttacking=true;

    this.player.play(anim,true);

    this.time.delayedCall(120,()=>{
      this.attack(range,damage,knock);
    });

    this.player.once("animationcomplete",()=>{
      this.isAttacking=false;
      this.player.play("idle");
    });
  }

  attack(range,damage,knock){
    this.enemies.children.iterate(e=>{
      if(!e||e.hp<=0)return;

      let x=Math.abs(this.player.x-e.x);
      let y=Math.abs(this.player.y-e.y);

      if(x<range && y<40){
        e.hp-=damage;
        e.setFillStyle(0xffff00);

        let dir=e.x>this.player.x?1:-1;
        e.body.setVelocityX(dir*knock);

        this.time.delayedCall(120,()=>{
          if(e.hp>0)e.setFillStyle(0xff3355);
        });

        if(e.hp<=0){
          e.setFillStyle(0x555555);
          e.body.enable=false;
        }
      }
    });
  }

  makeControls(){
    const baseX=120, baseY=420, r=60;

    let stick=this.add.circle(baseX,baseY,30,0xffffff,0.4);

    let dragging=false;

    this.input.on("pointerdown",p=>{
      if(Phaser.Math.Distance.Between(p.x,p.y,baseX,baseY)<r){
        dragging=true;
      }

      if(p.x>700){
        this.comboAttack();
      }
    });

    this.input.on("pointermove",p=>{
      if(!dragging)return;

      let dx=p.x-baseX;
      let dy=p.y-baseY;

      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist>r){
        dx=dx/dist*r;
        dy=dy/dist*r;
      }

      stick.x=baseX+dx;
      stick.y=baseY+dy;

      this.moveX=dx/r;
      this.moveY=dy/r;
    });

    this.input.on("pointerup",()=>{
      dragging=false;
      stick.x=baseX;
      stick.y=baseY;
      this.moveX=0;
      this.moveY=0;
    });
  }
}

const config={
  type:Phaser.AUTO,
  width:960,
  height:540,
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{default:"arcade"},
  scene:[TitleScene,CharacterSelectScene,LevelSelectScene,GameScene]
};

new Phaser.Game(config);

</script>
</body>
</html>
