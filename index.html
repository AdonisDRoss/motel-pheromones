/* =========================================================
   FULLSCREEN MOBILE UI SAFE AREA PATCH V739
   - Fills the browser canvas to the visible viewport.
   - Moves controls into left/right black side gutters.
   - Shrinks controls so they do not clip.
   - Keeps HUD/mobile controls screen-locked during camera zoom/punch.
   - Leaves gameplay, combo timing, and power mode logic unchanged.
========================================================= */
(function(){
  if(window.MP_FULLSCREEN_MOBILE_UI_SAFE_PATCH_V739) return;
  window.MP_FULLSCREEN_MOBILE_UI_SAFE_PATCH_V739 = true;

  // Keep Phaser's internal game coordinates, but force the canvas to fill the visible browser space.
  function mpForceCanvasFullscreen(){
    try{
      const gameEl = document.getElementById("game");
      if(gameEl){
        gameEl.style.position = "fixed";
        gameEl.style.inset = "0";
        gameEl.style.width = "100vw";
        gameEl.style.height = "100dvh";
        gameEl.style.overflow = "hidden";
        gameEl.style.background = "#000";
      }

      const canvas = document.querySelector("canvas");
      if(canvas){
        canvas.style.width = "auto";
        canvas.style.height = "auto";
        canvas.style.maxWidth = "100vw";
        canvas.style.maxHeight = "100dvh";
        canvas.style.margin = "0";
        canvas.style.left = "0";
        canvas.style.top = "0";
        canvas.style.objectFit = "contain";
      }
    }catch(e){}
  }

  window.addEventListener("resize", mpForceCanvasFullscreen);
  window.addEventListener("orientationchange", function(){
    setTimeout(mpForceCanvasFullscreen,80);
    setTimeout(mpForceCanvasFullscreen,300);
  });
  setTimeout(mpForceCanvasFullscreen,50);
  setTimeout(mpForceCanvasFullscreen,350);

  if(typeof Game === "undefined" || !Game.prototype) return;

  function mpTrackFixed(scene,obj,screenX,screenY,baseScaleX,baseScaleY){
    if(!scene || !obj) return obj;

    obj.__mpFixedScreenX = screenX;
    obj.__mpFixedScreenY = screenY;
    obj.__mpFixedBaseScaleX = Number.isFinite(baseScaleX) ? baseScaleX : (obj.scaleX || 1);
    obj.__mpFixedBaseScaleY = Number.isFinite(baseScaleY) ? baseScaleY : (obj.scaleY || 1);

    if(!scene.mpFixedUiObjects) scene.mpFixedUiObjects = [];
    if(!scene.mpFixedUiObjects.includes(obj)){
      scene.mpFixedUiObjects.push(obj);
    }

    return obj;
  }

  function mpApplyFixedScreen(scene,obj){
    if(!scene || !obj || obj.__mpFixedScreenX === undefined) return;

    const cam = scene.cameras && scene.cameras.main;
    if(!cam || !cam.getWorldPoint) return;

    const p = cam.getWorldPoint(obj.__mpFixedScreenX, obj.__mpFixedScreenY);
    obj.x = p.x;
    obj.y = p.y;

    // Counter-scale against camera zoom so controls stay the same screen size during punches.
    const z = cam.zoom || 1;
    if(obj.setScale){
      obj.setScale(
        (obj.__mpFixedBaseScaleX || 1) / z,
        (obj.__mpFixedBaseScaleY || 1) / z
      );
    }

    if(obj.setScrollFactor) obj.setScrollFactor(0);
  }

  Game.prototype.mpFixUiToScreen = function(){
    if(!this.mpFixedUiObjects) return;

    for(let i=0;i<this.mpFixedUiObjects.length;i++){
      const obj = this.mpFixedUiObjects[i];
      if(!obj || obj.destroyed) continue;

      // Stop the old camera-punch UI tween from dragging fixed controls inward.
      try{ if(this.tweens) this.tweens.killTweensOf(obj); }catch(e){}

      mpApplyFixedScreen(this,obj);
    }
  };

  const MP_OLD_SAFE_UPDATE_FIXED_UI_V739 = Game.prototype.safeUpdate;
  Game.prototype.safeUpdate = function(time,delta){
    const ret = MP_OLD_SAFE_UPDATE_FIXED_UI_V739 ? MP_OLD_SAFE_UPDATE_FIXED_UI_V739.call(this,time,delta) : undefined;
    this.mpFixUiToScreen();
    return ret;
  };

  const MP_OLD_CREATE_FIXED_UI_V739 = Game.prototype.create;
  Game.prototype.create = function(){
    const ret = MP_OLD_CREATE_FIXED_UI_V739 ? MP_OLD_CREATE_FIXED_UI_V739.call(this) : undefined;
    mpForceCanvasFullscreen();
    this.time.delayedCall(50,()=>this.mpFixUiToScreen());
    this.time.delayedCall(250,()=>this.mpFixUiToScreen());
    return ret;
  };

  // Replace the final mobile button builder with a smaller, fixed-screen version.
  Game.prototype.mobileButton = function(x, y, label, color, down, up = null){
    const UI_ZOOM = 0.66;
    const size = v => v * UI_ZOOM;
    const font = v => Math.round(v * UI_ZOOM) + "px monospace";

    const hitR = size(42);
    const faceR = size(25);

    const hit = this.add.circle(x, y, hitR, 0xffffff, 0.01)
      .setInteractive({ useHandCursor:true })
      .setDepth(95000)
      .setScrollFactor(0);

    const shadow = this.add.circle(x + size(2), y + size(3), faceR, 0x000000, 0.22)
      .setDepth(95001)
      .setScrollFactor(0);

    const face = this.add.circle(x, y, faceR, color, 0.82)
      .setStrokeStyle(2, 0xffffff, 0.50)
      .setDepth(95002)
      .setScrollFactor(0);

    const shine = this.add.circle(x - size(5), y - size(5), size(8), 0xffffff, 0.16)
      .setDepth(95003)
      .setScrollFactor(0);

    const text = this.add.text(x, y, label, {
      font: font(label.length > 1 ? 12 : 15),
      fill: "#ffffff",
      stroke: "#000000",
      strokeThickness: 3
    })
      .setOrigin(0.5)
      .setDepth(95004)
      .setScrollFactor(0);

    mpTrackFixed(this,hit,x,y,hit.scaleX,hit.scaleY);
    mpTrackFixed(this,shadow,x + size(2),y + size(3),shadow.scaleX,shadow.scaleY);
    mpTrackFixed(this,face,x,y,face.scaleX,face.scaleY);
    mpTrackFixed(this,shine,x - size(5),y - size(5),shine.scaleX,shine.scaleY);
    mpTrackFixed(this,text,x,y,text.scaleX,text.scaleY);

    hit.on("pointerdown", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      this.ensureRoundActive();
      this.readInput();
      this.recoverActionInput();
      vibrate(VIBE.button);
      if(down) down();
    });

    hit.on("pointerup", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      if(up) up();
    });

    hit.on("pointerout", () => {
      if(up) up();
    });

    const btn = { hit, shadow, face, shine, text, label };

    if(!this.mobileButtons) this.mobileButtons = [];
    this.mobileButtons.push(btn);

    return btn;
  };

  // Replace control placement so the left stick sits in the left gutter and buttons sit in the right gutter.
  Game.prototype.makeMobileControls = function(){
    const UI_ZOOM = 0.66;
    const size = v => v * UI_ZOOM;
    const font = v => Math.round(v * UI_ZOOM) + "px monospace";

    this.mobileUI = {};
    this.mobileButtons = [];
    this.mpFixedUiObjects = [];
    this.input.topOnly = false;

    const bx = 68;
    const by = H - 92;
    const baseR = size(50);
    const knobR = size(22);
    const touchR = size(88);

    const stickTouch = this.add.circle(bx, by, touchR, 0xffffff, 0.001)
      .setInteractive()
      .setDepth(94990)
      .setScrollFactor(0);

    const stickBase = this.add.circle(bx, by, baseR, 0x000000, 0.34)
      .setStrokeStyle(5, 0xffffff, 0.56)
      .setDepth(94991)
      .setScrollFactor(0);

    const stickMid = this.add.circle(bx, by, size(31), 0xffffff, 0.10)
      .setStrokeStyle(2, 0xffffff, 0.28)
      .setDepth(94992)
      .setScrollFactor(0);

    const knob = this.add.circle(bx, by, knobR, 0xffffff, 0.46)
      .setStrokeStyle(3, 0xffffff, 0.62)
      .setDepth(94993)
      .setScrollFactor(0);

    this.mobileUI.stickTouch = stickTouch;
    this.mobileUI.stickBase = stickBase;
    this.mobileUI.stickMid = stickMid;
    this.mobileUI.stickKnob = knob;

    mpTrackFixed(this,stickTouch,bx,by,stickTouch.scaleX,stickTouch.scaleY);
    mpTrackFixed(this,stickBase,bx,by,stickBase.scaleX,stickBase.scaleY);
    mpTrackFixed(this,stickMid,bx,by,stickMid.scaleX,stickMid.scaleY);
    mpTrackFixed(this,knob,bx,by,knob.scaleX,knob.scaleY);

    let dragging = false;

    const resetStick = () => {
      dragging = false;
      knob.__mpFixedScreenX = stickBase.__mpFixedScreenX;
      knob.__mpFixedScreenY = stickBase.__mpFixedScreenY;
      this.stickX = 0;
      this.stickY = 0;
      this.mpFixUiToScreen();
    };

    const moveStick = p => {
      const cam = this.cameras.main;
      const baseScreen = cam.worldView ? {
        x:(stickBase.x - cam.worldView.x) * (cam.zoom || 1),
        y:(stickBase.y - cam.worldView.y) * (cam.zoom || 1)
      } : {x:bx,y:by};

      let dx = p.x - baseScreen.x;
      let dy = p.y - baseScreen.y;
      const d = Math.sqrt(dx * dx + dy * dy);

      if(d > baseR){
        dx = (dx / d) * baseR;
        dy = (dy / d) * baseR;
      }

      knob.__mpFixedScreenX = stickBase.__mpFixedScreenX + dx;
      knob.__mpFixedScreenY = stickBase.__mpFixedScreenY + dy;

      this.stickX = dx / baseR;
      this.stickY = dy / baseR;
      this.mpFixUiToScreen();
    };

    const startVirtualStick = p => {
      if(p && p.event && p.event.preventDefault){
        p.event.preventDefault();
      }
      dragging = true;
      moveStick(p);
    };

    stickTouch.on("pointerdown", startVirtualStick);

    this.input.on("pointerdown", p => {
      if(Phaser.Math.Distance.Between(p.x, p.y, bx, by) <= touchR){
        startVirtualStick(p);
      }
    });

    this.input.on("pointermove", p => {
      if(dragging){
        moveStick(p);
      }
    });

    this.input.on("pointerup", resetStick);
    this.input.on("pointerupoutside", resetStick);

    // Smaller right-side buttons, pushed into the open side space.
    const diamondX = W - 72;
    const diamondY = H - 92;
    const gap = 38;

    this.mobileButton(diamondX, diamondY - gap, "X", 0x4d7cff, () => this.startAttack("light"));
    this.mobileButton(diamondX - gap, diamondY, "Y", 0x4fd35d, () => this.startContextY());
    this.mobileButton(diamondX + gap, diamondY, "A", 0xff5a5a, () => this.startContextKick());
    this.mobileButton(diamondX, diamondY + gap, "B", 0xffd84d, () => this.startContextB());

    this.mobileButton(diamondX - 57, diamondY - 57, "SP", 0x8f72ff, () => this.startAttack("heavy"));

    this.mobileButton(diamondX - 104, diamondY + 2, "CR", 0x8a8a8a, () => {
      this.recoverActionInput();
      this.startCrouch(true);
    });

    const menuX = CX;
    const menuY = H - 54;

    const menuHit = this.add.rectangle(menuX, menuY, size(96), size(30), 0x000000, 0.28)
      .setInteractive({ useHandCursor:true })
      .setDepth(95000)
      .setScrollFactor(0);

    const menuFace = this.add.rectangle(menuX, menuY, size(96), size(30), 0xffffff, 0.10)
      .setStrokeStyle(2, 0xffffff, 0.30)
      .setDepth(95001)
      .setScrollFactor(0);

    const menuText = this.add.text(menuX, menuY, "MENU", {
      font: font(13),
      fill: "#fff"
    })
      .setOrigin(0.5)
      .setDepth(95002)
      .setScrollFactor(0);

    this.mobileUI.menuHit = menuHit;
    this.mobileUI.menuFace = menuFace;
    this.mobileUI.menuText = menuText;

    mpTrackFixed(this,menuHit,menuX,menuY,menuHit.scaleX,menuHit.scaleY);
    mpTrackFixed(this,menuFace,menuX,menuY,menuFace.scaleX,menuFace.scaleY);
    mpTrackFixed(this,menuText,menuX,menuY,menuText.scaleX,menuText.scaleY);

    menuHit.on("pointerdown", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      this.togglePauseMenu();
    });

    this.mpFixUiToScreen();
  };
})();


/* =========================================================
   V741 BREAKABLE CRATES
   - 3 hits to break
   - B near crate = pick up
   - B while carrying crate = throw
   - thrown crate breaks on impact
   - crates drop food / bonus pickups
========================================================= */
(function(){
  const MP_CRATE_VERSION = 741;
  const CRATE_MAX_HP = 3;
  const CRATE_W = 42;
  const CRATE_H = 36;
  const CRATE_PICKUP_RANGE = 62;
  const CRATE_THROW_SPEED = 430;
  const CRATE_THROW_LIFE = 520;
  const CRATE_HIT_DAMAGE = 18;

  function mpCrateScreenKey(scene){
    if(typeof mpHealthScreenKey === "function"){
      return mpHealthScreenKey(scene);
    }
    return selectedLevel || "default";
  }

  function mpCratePlatformY(scene, platform){
    if(typeof mpHealthGroundY === "function"){
      return mpHealthGroundY(scene, platform || "middle");
    }
    if(typeof getPlatformY === "function"){
      return getPlatformY(platform || "middle");
    }
    return 390;
  }

  function mpCratePickItem(scene){
    if(scene && scene.pickWeightedHealthItemType){
      return scene.pickWeightedHealthItemType();
    }
    const fallback = ["pizza","taco","chicken","soda","energy_drink","water","spliff","hot_sauce","first_aid"];
    return fallback[Phaser.Math.Between(0, fallback.length - 1)];
  }

  Game.prototype.setupBreakableCrates = function(){
    this.breakableCrates = [];
    this.thrownCrates = [];
    this.carriedCrate = null;
    this.populateBreakableCratesForScreen(mpCrateScreenKey(this));
  };

  Game.prototype.getCrateSpawnPoints = function(screenKey){
    // Training / indoor floor: keep crates in the main fight lane.
    if(selectedLevel === "indoor" || selectedLevelName === "TRAINING FLOOR" || selectedLevelName === "TRAINING DOJO"){
      const y = mpCratePlatformY(this,"middle");
      return [
        {x:250,y,platform:"middle"},
        {x:505,y,platform:"middle"},
        {x:745,y,platform:"middle"}
      ];
    }

    if(screenKey === "lefty_lower"){
      return [
        {x:250,y:mpCratePlatformY(this,"middle"),platform:"middle"},
        {x:520,y:mpCratePlatformY(this,"middle"),platform:"middle"},
        {x:780,y:mpCratePlatformY(this,"middle"),platform:"middle"},
        {x:390,y:mpCratePlatformY(this,"bottom"),platform:"bottom"},
        {x:710,y:mpCratePlatformY(this,"bottom"),platform:"bottom"}
      ];
    }

    if(screenKey === "lefty_main"){
      return [
        {x:260,y:mpCratePlatformY(this,"middle"),platform:"middle"},
        {x:560,y:mpCratePlatformY(this,"middle"),platform:"middle"},
        {x:790,y:mpCratePlatformY(this,"middle"),platform:"middle"},
        {x:390,y:mpCratePlatformY(this,"bottom"),platform:"bottom"},
        {x:700,y:mpCratePlatformY(this,"bottom"),platform:"bottom"}
      ];
    }

    const y = mpCratePlatformY(this,"middle");
    return [
      {x:295,y,platform:"middle"},
      {x:520,y,platform:"middle"},
      {x:750,y,platform:"middle"}
    ];
  };

  Game.prototype.makeCrateVisual = function(crate){
    const x = crate.x;
    const y = crate.y - 20;

    const back = this.add.rectangle(x, y, CRATE_W, CRATE_H, 0x5a3518, 1)
      .setStrokeStyle(3, 0x1a0d04)
      .setDepth(crate.y + 24);

    const plank1 = this.add.rectangle(x, y - 8, CRATE_W - 4, 5, 0x8a552a, 1)
      .setStrokeStyle(1, 0x1a0d04)
      .setDepth(crate.y + 25);

    const plank2 = this.add.rectangle(x, y + 7, CRATE_W - 4, 5, 0x8a552a, 1)
      .setStrokeStyle(1, 0x1a0d04)
      .setDepth(crate.y + 25);

    const crossA = this.add.rectangle(x, y, 46, 5, 0x9a6330, 1)
      .setRotation(0.65)
      .setStrokeStyle(1, 0x1a0d04)
      .setDepth(crate.y + 26);

    const crossB = this.add.rectangle(x, y, 46, 5, 0x9a6330, 1)
      .setRotation(-0.65)
      .setStrokeStyle(1, 0x1a0d04)
      .setDepth(crate.y + 26);

    const hp = this.add.text(x, y - 31, "CRATE 3/3", {
      font:"10px monospace",
      fill:"#ffd35a",
      stroke:"#000000",
      strokeThickness:3
    }).setOrigin(0.5).setDepth(crate.y + 27);

    crate.parts = [back, plank1, plank2, crossA, crossB, hp];
    crate.hpText = hp;
  };

  Game.prototype.spawnBreakableCrate = function(x, y, platform="middle", screenKey=null){
    if(!this.breakableCrates) this.breakableCrates = [];

    const crate = {
      x, y,
      platform,
      screenKey: screenKey || mpCrateScreenKey(this),
      hp: CRATE_MAX_HP,
      maxHp: CRATE_MAX_HP,
      broken: false,
      carried: false,
      thrown: false,
      parts: [],
      hpText: null
    };

    this.makeCrateVisual(crate);
    this.breakableCrates.push(crate);
    this.updateCrateVisibility(crate);
    return crate;
  };

  Game.prototype.populateBreakableCratesForScreen = function(screenKey){
    if(!screenKey) screenKey = mpCrateScreenKey(this);
    if(!this.cratePopulatedScreens) this.cratePopulatedScreens = {};
    if(this.cratePopulatedScreens[screenKey]) return;

    this.cratePopulatedScreens[screenKey] = true;
    const points = this.getCrateSpawnPoints(screenKey);
    points.forEach(p=>this.spawnBreakableCrate(p.x,p.y,p.platform,screenKey));
  };

  Game.prototype.updateCrateVisibility = function(crate){
    if(!crate || !crate.parts) return;
    const visible = !crate.broken && !crate.carried && crate.screenKey === mpCrateScreenKey(this);
    crate.parts.forEach(p=>{ if(p && p.setVisible) p.setVisible(visible); });
  };

  Game.prototype.updateAllCrateVisibility = function(){
    if(!this.breakableCrates) return;
    this.breakableCrates.forEach(c=>this.updateCrateVisibility(c));
  };

  Game.prototype.moveCrateVisual = function(crate, x, y){
    if(!crate || !crate.parts) return;
    crate.x = x;
    crate.y = y;
    const cy = y - 20;
    const [back, plank1, plank2, crossA, crossB, hp] = crate.parts;
    if(back){ back.x = x; back.y = cy; back.setDepth(y + 24); }
    if(plank1){ plank1.x = x; plank1.y = cy - 8; plank1.setDepth(y + 25); }
    if(plank2){ plank2.x = x; plank2.y = cy + 7; plank2.setDepth(y + 25); }
    if(crossA){ crossA.x = x; crossA.y = cy; crossA.setDepth(y + 26); }
    if(crossB){ crossB.x = x; crossB.y = cy; crossB.setDepth(y + 26); }
    if(hp){ hp.x = x; hp.y = cy - 31; hp.setDepth(y + 27); }
  };

  Game.prototype.damageCrate = function(crate, amount=1, dir=1, forceBreak=false){
    if(!crate || crate.broken || crate.carried) return false;
    crate.hp -= forceBreak ? crate.maxHp : amount;

    if(crate.hpText){
      crate.hpText.setText("CRATE " + Math.max(0,crate.hp) + "/" + crate.maxHp);
    }

    crate.parts.forEach(p=>{
      if(!p || !p.setTint) return;
      p.setTint(0xffdd88);
      this.time.delayedCall(70,()=>{ if(p && p.clearTint) p.clearTint(); });
    });

    this.cameras.main.shake(65,0.003);

    if(crate.hp <= 0){
      this.breakCrate(crate, dir);
    }

    return true;
  };

  Game.prototype.breakCrate = function(crate, dir=1){
    if(!crate || crate.broken) return;
    crate.broken = true;
    crate.carried = false;
    crate.thrown = false;

    const x = crate.x;
    const y = crate.y;

    crate.parts.forEach(p=>{
      if(!p || !p.destroy) return;
      this.tweens.add({
        targets:p,
        x:p.x + Phaser.Math.Between(-18,18) + dir * 18,
        y:p.y + Phaser.Math.Between(-22,12),
        alpha:0,
        duration:180,
        onComplete:()=>p.destroy()
      });
    });

    for(let i=0;i<6;i++){
      const splinter=this.add.rectangle(x,y-22,Phaser.Math.Between(8,16),3,0xb87536,1)
        .setRotation(Phaser.Math.FloatBetween(-1.2,1.2))
        .setDepth(y+80);
      this.tweens.add({
        targets:splinter,
        x:x + Phaser.Math.Between(-35,35),
        y:y - Phaser.Math.Between(12,55),
        alpha:0,
        duration:260,
        onComplete:()=>splinter.destroy()
      });
    }

    const itemType = mpCratePickItem(this);
    if(this.spawnHealthItemPickup){
      this.spawnHealthItemPickup(itemType, x + Phaser.Math.Between(-8,8), y, crate.platform, crate.screenKey);
    }

    if(this.zoneText){
      this.zoneText.setText("CRATE BROKEN: ITEM FOUND");
    }
  };

  Game.prototype.hitCratesInBox = function(hitX, hitY, width, height, dir, damageType="light"){
    if(!this.breakableCrates) return false;
    let hitAny = false;
    const amount = damageType === "heavy" ? 2 : 1;

    this.breakableCrates.forEach(crate=>{
      if(!crate || crate.broken || crate.carried) return;
      if(crate.platform !== this.platform) return;
      if(crate.screenKey !== mpCrateScreenKey(this)) return;

      const cx = crate.x;
      const cy = crate.y - 22;
      const dx = Math.abs(cx - hitX);
      const dy = Math.abs(cy - hitY);

      if(dx < width/2 + CRATE_W/2 && dy < height/2 + CRATE_H/2){
        hitAny = true;
        this.damageCrate(crate, amount, dir, false);
      }
    });

    return hitAny;
  };

  Game.prototype.findNearestCrate = function(){
    if(!this.breakableCrates || !this.player) return null;
    let best = null;
    let bestDist = 9999;
    const facing = this.getFacingDir ? this.getFacingDir() : 1;

    this.breakableCrates.forEach(crate=>{
      if(!crate || crate.broken || crate.carried) return;
      if(crate.platform !== this.platform) return;
      if(crate.screenKey !== mpCrateScreenKey(this)) return;
      const dx = crate.x - this.player.x;
      const dy = Math.abs(crate.y - this.player.y);
      const dist = Math.abs(dx);
      if(dist <= CRATE_PICKUP_RANGE && dy <= 45 && dx * facing > -12 && dist < bestDist){
        best = crate;
        bestDist = dist;
      }
    });

    return best;
  };

  Game.prototype.pickupNearestCrate = function(){
    if(this.carriedCrate) return true;
    const crate = this.findNearestCrate();
    if(!crate) return false;

    crate.carried = true;
    this.carriedCrate = crate;
    crate.parts.forEach(p=>{ if(p && p.setVisible) p.setVisible(true); });
    if(crate.hpText) crate.hpText.setVisible(false);

    if(this.zoneText) this.zoneText.setText("PICKED UP: CRATE");
    return true;
  };

  Game.prototype.throwCarriedCrate = function(){
    const crate = this.carriedCrate;
    if(!crate || !this.player) return false;

    const dir = this.getFacingDir ? this.getFacingDir() : 1;
    crate.carried = false;
    crate.thrown = true;
    crate.platform = this.platform;
    crate.x = this.player.x + dir * 44;
    crate.y = this.player.y;

    this.carriedCrate = null;

    const thrown = {
      crate,
      x:crate.x,
      y:crate.y - 42,
      startY:crate.y - 42,
      platform:crate.platform,
      screenKey:crate.screenKey,
      dir,
      vx:CRATE_THROW_SPEED * dir,
      life:CRATE_THROW_LIFE,
      hitEnemies:new Set(),
      done:false
    };

    if(!this.thrownCrates) this.thrownCrates = [];
    this.thrownCrates.push(thrown);

    crate.parts.forEach(p=>{ if(p && p.setVisible) p.setVisible(true); });
    if(crate.hpText) crate.hpText.setVisible(false);

    if(this.zoneText) this.zoneText.setText("THREW: CRATE");
    return true;
  };

  Game.prototype.updateCarriedCrate = function(){
    if(!this.carriedCrate || !this.player) return;
    const dir = this.getFacingDir ? this.getFacingDir() : 1;
    this.moveCrateVisual(this.carriedCrate, this.player.x + dir * 34, this.player.y - 46);
  };

  Game.prototype.updateThrownCrates = function(delta){
    if(!this.thrownCrates || this.thrownCrates.length <= 0) return;
    const dt = delta / 1000;

    this.thrownCrates.forEach(t=>{
      if(!t || t.done || !t.crate || t.crate.broken) return;
      t.life -= delta;
      t.x += t.vx * dt;
      t.y = t.startY + Math.sin(this.time.now / 65) * 8;
      this.moveCrateVisual(t.crate, t.x, t.y + 42);

      if(this.enemies){
        this.enemies.forEach(e=>{
          if(!e || e.dead || e.state === "dead") return;
          if(e.platform !== t.platform) return;
          if(t.hitEnemies && t.hitEnemies.has(e)) return;
          const dx = Math.abs(e.x - t.x);
          const dy = Math.abs((e.y - 45) - t.y);
          if(dx <= 58 && dy <= 60){
            t.hitEnemies.add(e);
            if(this.damageEnemy) this.damageEnemy(e, CRATE_HIT_DAMAGE, true);
            this.breakCrate(t.crate, t.dir);
            t.done = true;
          }
        });
      }

      if(!t.done && (t.life <= 0 || t.x < -80 || t.x > W + 80)){
        this.breakCrate(t.crate, t.dir);
        t.done = true;
      }
    });

    this.thrownCrates = this.thrownCrates.filter(t=>t && !t.done);
  };

  const MP_CRATE_OLD_CREATE = Game.prototype.create;
  Game.prototype.create = function(){
    MP_CRATE_OLD_CREATE.call(this);
    this.setupBreakableCrates();
  };

  const MP_CRATE_OLD_SAFE_UPDATE = Game.prototype.safeUpdate;
  Game.prototype.safeUpdate = function(time,delta){
    MP_CRATE_OLD_SAFE_UPDATE.call(this,time,delta);
    this.populateBreakableCratesForScreen(mpCrateScreenKey(this));
    this.updateAllCrateVisibility();
    this.updateCarriedCrate();
    this.updateThrownCrates(delta || 16.67);
  };

  const MP_CRATE_OLD_APPLY_HIT = Game.prototype.applyPlayerHit;
  Game.prototype.applyPlayerHit = function(data){
    const dir = this.getFacingDir ? this.getFacingDir() : 1;
    const offsetX = data && data.offsetX !== undefined ? data.offsetX : 52;
    const offsetY = data && data.offsetY !== undefined ? data.offsetY : -42;
    const width = data && data.range ? data.range : 86;
    const height = data && data.height ? data.height : 54;
    const hitX = this.player.x + dir * offsetX;
    const hitY = this.player.y + offsetY;

    if(MP_CRATE_OLD_APPLY_HIT){
      MP_CRATE_OLD_APPLY_HIT.call(this,data);
    }

    const type = data && data.damage >= 14 ? "heavy" : "light";
    this.hitCratesInBox(hitX,hitY,width,height,dir,type);
  };

  const MP_CRATE_OLD_START_GRAB = Game.prototype.startGrab;
  Game.prototype.startGrab = function(){
    if(this.pickupNearestCrate && this.pickupNearestCrate()) return;
    return MP_CRATE_OLD_START_GRAB.call(this);
  };

  const MP_CRATE_OLD_CONTEXT_B = Game.prototype.startContextB;
  Game.prototype.startContextB = function(){
    if(this.carriedCrate && this.throwCarriedCrate()) return;
    if(this.pickupNearestCrate && this.pickupNearestCrate()) return;
    return MP_CRATE_OLD_CONTEXT_B.call(this);
  };

  const MP_CRATE_OLD_THROWN_WEAPON_HITS = Game.prototype.checkThrownWeaponEnemyHits;
  Game.prototype.checkThrownWeaponEnemyHits = function(t){
    if(MP_CRATE_OLD_THROWN_WEAPON_HITS){
      MP_CRATE_OLD_THROWN_WEAPON_HITS.call(this,t);
    }

    if(!t || t.done || !this.breakableCrates) return;
    this.breakableCrates.forEach(crate=>{
      if(!crate || crate.broken || crate.carried) return;
      if(crate.platform !== t.platform) return;
      if(crate.screenKey !== mpCrateScreenKey(this)) return;
      const dx = Math.abs(crate.x - t.x);
      const dy = Math.abs((crate.y - 22) - t.y);
      if(dx <= 50 && dy <= 56){
        this.breakCrate(crate, t.dir || 1);
        t.done = true;
      }
    });
  };
})();



/* =========================================================
   NO CAMERA ZOOM / SAFE CONTROLS PATCH V743
   - Removes gameplay camera zoom entirely.
   - Keeps Phaser canvas aspect-safe instead of stretched.
   - Prevents mobile controls from being pushed offscreen by zoom logic.
========================================================= */
(function(){
  if(window.MP_NO_ZOOM_SAFE_CONTROLS_V743) return;
  window.MP_NO_ZOOM_SAFE_CONTROLS_V743 = true;

  function mpNoZoomCanvasSafe(){
    try{
      const gameEl = document.getElementById("game");
      if(gameEl){
        gameEl.style.position = "fixed";
        gameEl.style.inset = "0";
        gameEl.style.width = "100vw";
        gameEl.style.height = "100dvh";
        gameEl.style.display = "flex";
        gameEl.style.alignItems = "center";
        gameEl.style.justifyContent = "center";
        gameEl.style.overflow = "hidden";
        gameEl.style.background = "#000";
      }

      document.querySelectorAll("canvas").forEach(canvas=>{
        canvas.style.width = "auto";
        canvas.style.height = "auto";
        canvas.style.maxWidth = "100vw";
        canvas.style.maxHeight = "100dvh";
        canvas.style.objectFit = "contain";
        canvas.style.margin = "0";
      });
    }catch(e){}
  }

  window.addEventListener("resize", mpNoZoomCanvasSafe);
  window.addEventListener("orientationchange", ()=>{
    setTimeout(mpNoZoomCanvasSafe,80);
    setTimeout(mpNoZoomCanvasSafe,300);
  });
  setTimeout(mpNoZoomCanvasSafe,60);
  setTimeout(mpNoZoomCanvasSafe,360);

  if(typeof Game !== "undefined" && Game.prototype){
    Game.prototype.setupCameraFollow = function(){
      const cam = this.cameras.main;
      cam.setZoom(1);
      cam.setBounds(0,0,W,H);
      cam.startFollow(this.player,true,0.12,0.12);
      cam.roundPixels = true;
    };

    const MP_OLD_SAFE_UPDATE_NO_ZOOM_V743 = Game.prototype.safeUpdate;
    Game.prototype.safeUpdate = function(time,delta){
      const ret = MP_OLD_SAFE_UPDATE_NO_ZOOM_V743.call(this,time,delta);
      if(this.cameras && this.cameras.main && this.cameras.main.zoom !== 1){
        this.cameras.main.setZoom(1);
      }
      return ret;
    };
  }
})();


/* =========================================================
   V744 POWER MODE INPUT PATCH
   - Removes P-key activation path.
   - Power Mode activates only by holding A + X + Y + B together.
   - When Groove is full, A/X/Y/B buttons light up to show Power is available.
   - Uses existing Groove meter: mpGrooveValue 0-10.
========================================================= */
(function(){
  if(window.MP_AXYB_POWER_MODE_V744) return;
  window.MP_AXYB_POWER_MODE_V744 = true;

  const POWER_GROOVE_REQUIRED = 10;
  const POWER_DURATION = 8500;
  const POWER_SPEED_MULT = 1.25;
  const POWER_DAMAGE_MULT = 1.25;
  const POWER_BUTTONS = ["A","X","Y","B"];

  function mpPowerReady(scene){
    return !!scene && !scene.mpPowerModeActive && (scene.mpGrooveValue || 0) >= POWER_GROOVE_REQUIRED;
  }

  function mpNormalizePowerHeld(scene){
    if(!scene.mpPowerHeld) scene.mpPowerHeld = {A:false,X:false,Y:false,B:false};
    return scene.mpPowerHeld;
  }

  function mpAllPowerHeld(scene){
    const held = mpNormalizePowerHeld(scene);
    return POWER_BUTTONS.every(k=>!!held[k]);
  }

  function mpSetBtnLit(btn,lit){
    if(!btn) return;
    try{
      if(btn.face){
        btn.face.setAlpha(lit ? 1 : 0.82);
        btn.face.setStrokeStyle(lit ? 4 : 2, lit ? 0xffff66 : 0xffffff, lit ? 1 : 0.50);
      }
      if(btn.shine){
        btn.shine.setAlpha(lit ? 0.55 : 0.16);
        btn.shine.setFillStyle(lit ? 0xffff66 : 0xffffff, lit ? 0.55 : 0.16);
      }
      if(btn.text){
        btn.text.setFill(lit ? "#ffff66" : "#ffffff");
      }
    }catch(e){}
  }

  Game.prototype.mpRefreshPowerButtons = function(){
    const ready = mpPowerReady(this);
    if(!this.mpPowerButtons) return;
    POWER_BUTTONS.forEach(k=>mpSetBtnLit(this.mpPowerButtons[k],ready));
  };

  Game.prototype.mpTryAXYBPowerMode = function(){
    if(!mpPowerReady(this)) return false;
    if(!mpAllPowerHeld(this)) return false;
    return this.activatePowerMode();
  };

  Game.prototype.activatePowerMode = function(){
    if(this.mpPowerModeActive) return false;
    if((this.mpGrooveValue || 0) < POWER_GROOVE_REQUIRED) return false;

    this.mpGrooveValue = 0;
    this.mpPowerModeActive = true;
    this.mpPowerModeTimer = POWER_DURATION;

    if(this.mpPowerAura){
      this.mpPowerAura.setVisible(true);
    }

    if(this.cameras && this.cameras.main){
      this.cameras.main.flash(90,255,220,80,false);
      this.cameras.main.shake(130,0.004);
    }

    this.time.timeScale = 0.88;
    this.time.delayedCall(110,()=>{ this.time.timeScale = 1; });

    vibrate([25,18,45]);
    this.mpRefreshPowerButtons();
    return true;
  };

  const MP_OLD_MOBILE_BUTTON_POWER_V744 = Game.prototype.mobileButton;
  Game.prototype.mobileButton = function(x,y,label,color,down,up=null){
    const btn = MP_OLD_MOBILE_BUTTON_POWER_V744.call(this,x,y,label,color,down,up);

    if(POWER_BUTTONS.includes(label)){
      if(!this.mpPowerButtons) this.mpPowerButtons = {};
      this.mpPowerButtons[label] = btn;
      mpNormalizePowerHeld(this);

      btn.hit.on("pointerdown", p=>{
        if(p && p.event && p.event.preventDefault) p.event.preventDefault();
        this.mpPowerHeld[label] = true;
        this.mpTryAXYBPowerMode();
      });

      btn.hit.on("pointerup", ()=>{
        this.mpPowerHeld[label] = false;
      });

      btn.hit.on("pointerout", ()=>{
        this.mpPowerHeld[label] = false;
      });

      mpSetBtnLit(btn,mpPowerReady(this));
    }

    return btn;
  };

  const MP_OLD_CREATE_POWER_V744 = Game.prototype.create;
  Game.prototype.create = function(){
    const ret = MP_OLD_CREATE_POWER_V744.call(this);

    this.mpPowerHeld = {A:false,X:false,Y:false,B:false};
    this.mpPowerModeActive = false;
    this.mpPowerModeTimer = 0;

    // Placeholder aura until final FX sprites are ready.
    this.mpPowerAura = this.add.circle(this.player.x,this.player.y-62,44,0xff44cc,0.18)
      .setDepth(198)
      .setVisible(false);

    this.input.keyboard.on("keydown-A",()=>{ this.mpPowerHeld.A = true; this.mpTryAXYBPowerMode(); });
    this.input.keyboard.on("keydown-X",()=>{ this.mpPowerHeld.X = true; this.mpTryAXYBPowerMode(); });
    this.input.keyboard.on("keydown-Y",()=>{ this.mpPowerHeld.Y = true; this.mpTryAXYBPowerMode(); });
    this.input.keyboard.on("keydown-B",()=>{ this.mpPowerHeld.B = true; this.mpTryAXYBPowerMode(); });

    this.input.keyboard.on("keyup-A",()=>{ this.mpPowerHeld.A = false; });
    this.input.keyboard.on("keyup-X",()=>{ this.mpPowerHeld.X = false; });
    this.input.keyboard.on("keyup-Y",()=>{ this.mpPowerHeld.Y = false; });
    this.input.keyboard.on("keyup-B",()=>{ this.mpPowerHeld.B = false; });

    this.time.delayedCall(80,()=>this.mpRefreshPowerButtons());
    return ret;
  };

  const MP_OLD_SAFE_UPDATE_POWER_V744 = Game.prototype.safeUpdate;
  Game.prototype.safeUpdate = function(time,delta){
    const ret = MP_OLD_SAFE_UPDATE_POWER_V744.call(this,time,delta);

    const dt = Math.min(delta || 16.67,33.33);

    if(this.mpPowerModeActive){
      this.mpPowerModeTimer -= dt;
      if(this.mpPowerModeTimer <= 0){
        this.mpPowerModeActive = false;
        this.mpPowerModeTimer = 0;
      }
    }

    if(this.mpPowerAura && this.player){
      this.mpPowerAura.x = this.player.x;
      this.mpPowerAura.y = this.player.y - 62;
      this.mpPowerAura.setVisible(!!this.mpPowerModeActive);
      if(this.mpPowerModeActive){
        const pulse = 0.15 + Math.sin((time || 0) * 0.018) * 0.07;
        this.mpPowerAura.setFillStyle(0xff44cc,pulse);
        this.mpPowerAura.setRadius(40 + Math.sin((time || 0) * 0.022) * 6);

        if(Math.abs(this.player.body?.velocity?.x || 0) > 40 && (!this.mpLastPowerGhost || time - this.mpLastPowerGhost > 90)){
          this.mpLastPowerGhost = time;
          const ghost = this.add.sprite(this.player.x,this.player.y,this.player.texture.key,this.player.frame.name)
            .setOrigin(this.player.originX,this.player.originY)
            .setScale(this.player.scaleX,this.player.scaleY)
            .setFlipX(this.player.flipX)
            .setAlpha(0.22)
            .setTint(0xff66cc)
            .setDepth((this.player.depth || 200) - 1);
          this.tweens.add({targets:ghost,alpha:0,duration:210,onComplete:()=>ghost.destroy()});
        }
      }
    }

    this.mpRefreshPowerButtons();
    return ret;
  };

  const MP_OLD_SPEED_POWER_V744 = Game.prototype.getPlayerSpeedMod;
  Game.prototype.getPlayerSpeedMod = function(){
    const base = MP_OLD_SPEED_POWER_V744 ? MP_OLD_SPEED_POWER_V744.call(this) : 1;
    return base * (this.mpPowerModeActive ? POWER_SPEED_MULT : 1);
  };

  const MP_OLD_DAMAGE_POWER_V744 = Game.prototype.getPlayerDamageMod;
  Game.prototype.getPlayerDamageMod = function(){
    const base = MP_OLD_DAMAGE_POWER_V744 ? MP_OLD_DAMAGE_POWER_V744.call(this) : 1;
    return base * (this.mpPowerModeActive ? POWER_DAMAGE_MULT : 1);
  };
})();



/* =========================================================
   HEW POWER / WALL BOUNCE / IMPACT IDENTITY PATCH V745
   - Adds Hew power FX asset paths.
   - Replaces placeholder power aura with real FX when available.
   - Adds Hew-only armor during power mode.
   - Adds wall bounce damage, rebound, stun, and crack FX.

(function(){

  const HEW_WALL_RIGHT = 852;

  function mpIsHew(scene){

  }

  function mpPowerReady(scene){
    return !!scene && mpIsHew(scene) && !scene.mpPowerModeActive && (scene.mpGrooveValue || 0) >= 10;
  }

  function mpTexture(scene,key){
    return !!scene && scene.textures && scene.textures.exists(key);
  }

  function mpSpawnImageFX(scene,key,x,y,depth,scale=1,alpha=1,duration=360){
    if(!scene || !mpTexture(scene,key)) return null;

    });

  function mpSetPowerButtonsLit(scene){

      const btn = scene.mpPowerButtons[k];

      });
      if(btn.bg){
        if(ready && btn.bg.setStrokeStyle) btn.bg.setStrokeStyle(4,0xfff36b,1);
        else if(btn.bg.setStrokeStyle) btn.bg.setStrokeStyle(2,0xffffff,0.75);
        if(btn.bg.setScale) btn.bg.setScale(scale);
      }
      if(btn.label && btn.label.setScale) btn.label.setScale(scale);
    });
  }

  const MP_HEW_OLD_CREATE_V745 = Game.prototype.create;
  Game.prototype.create = function(){
    const ret = MP_HEW_OLD_CREATE_V745.call(this);

    this.mpHewLastAttackType = null;
    this.mpHewLastHitDir = 1;
    this.mpHewLastPowerStep = 0;

    if(mpIsHew(this)){
      this.mpPowerModeActive = false;
      this.mpPowerModeTimer = 0;
      this.mpPowerAuraImage = null;
      this.time.delayedCall(120,()=>mpSetPowerButtonsLit(this));
    }

    return ret;

  const MP_HEW_OLD_TRY_POWER_V745 = Game.prototype.mpTryAXYBPowerMode;
  Game.prototype.mpTryAXYBPowerMode = function(){

      return MP_HEW_OLD_TRY_POWER_V745 ? MP_HEW_OLD_TRY_POWER_V745.call(this) : false;
    }

    if(!mpPowerReady(this)) return false;
    if(!this.mpPowerHeld) return false;
    if(!(this.mpPowerHeld.A && this.mpPowerHeld.X && this.mpPowerHeld.Y && this.mpPowerHeld.B)) return false;

    this.mpGrooveValue = 0;
    this.mpPowerModeActive = true;
    this.mpPowerModeTimer = HEW_POWER_DURATION;

    vibrate([90,40,90,40,140]);
    this.cameras.main.shake(260,0.012);

    if(this.mpPowerAura){
      this.mpPowerAura.setVisible(false);
    }

    mpSpawnImageFX(this,"hew_power_burst",this.player.x,this.player.y - 62,(this.player.depth || 200) - 2,0.72,0.95,520);

    if(mpTexture(this,"hew_power_aura")){
      if(this.mpPowerAuraImage) this.mpPowerAuraImage.destroy();
      this.mpPowerAuraImage = this.add.image(this.player.x,this.player.y - 66,"hew_power_aura")
        .setDepth((this.player.depth || 200) - 2)
        .setScale(0.72)
        .setAlpha(0.72);
    }

    mpSetPowerButtonsLit(this);
    return true;
  };

  const MP_HEW_OLD_START_ATTACK_V745 = Game.prototype.startAttack;
  Game.prototype.startAttack = function(type){
    this.mpHewLastAttackType = type;
    this.mpHewLastHitDir = this.player && this.player.flipX ? -1 : 1;
    return MP_HEW_OLD_START_ATTACK_V745.call(this,type);
  };

  Game.prototype.mpHewWallBounceEnemy = function(e,dir){
    if(!mpIsHew(this)) return false;
    if(!e || e.dead) return false;

    const hitWall = e.x <= HEW_WALL_LEFT || e.x >= HEW_WALL_RIGHT;
    if(!hitWall) return false;

    const bounceDir = e.x <= HEW_WALL_LEFT ? 1 : -1;

    e.x = Phaser.Math.Clamp(e.x,HEW_WALL_LEFT,HEW_WALL_RIGHT);
    e.vx = bounceDir * HEW_WALL_REBOUND * (e.knockbackResist || 1);
    e.knockbackTime = Math.max(e.knockbackTime || 0,820);
    e.attackCooldown = Math.max(e.attackCooldown || 0,1150);
    e.busy = true;
    e.state = "wall_bounce";
    e.health -= HEW_WALL_DAMAGE;

    this.cameras.main.shake(180,0.014);
    vibrate([45,25,70]);

    mpSpawnImageFX(this,"heavy_impact_ring",e.x,e.y - 38,500,0.42,0.9,360);
    mpSpawnImageFX(this,"ground_crack_small",e.x,e.y + 4,185,0.34,0.85,520);

    if(e.sprite){
      e.sprite.setTint(0xfff06a);
      this.time.delayedCall(120,()=>{ if(e && e.sprite && !e.dead) e.sprite.clearTint(); });
    }

    if(e.health <= 0){
      this.killEnemy(e);
      return true;
    }

    if(this.safeEnemyPlay) this.safeEnemyPlay(e,"knockback");
    if(this.updateEnemyHealthBar) this.updateEnemyHealthBar(e);

    this.time.delayedCall(820,()=>{
      if(!e || e.dead) return;
      e.busy = false;
      e.state = "idle";
      e.vx = 0;
      if(this.safeEnemyPlay) this.safeEnemyPlay(e,"idle");
    });

    return true;
  };

  const MP_HEW_OLD_DAMAGE_ENEMY_V745 = Game.prototype.damageEnemy;
  Game.prototype.damageEnemy = function(e,damage,stagger=false){
    const beforeHealth = e ? e.health : 0;
    const ret = MP_HEW_OLD_DAMAGE_ENEMY_V745.call(this,e,damage,stagger);

    if(mpIsHew(this) && e && !e.dead && beforeHealth > e.health){
      const isHeavyLike = stagger || this.mpHewLastAttackType === "heavy" || this.mpPowerModeActive;
      if(isHeavyLike){
        const dir = this.mpHewLastHitDir || (this.player && e.x < this.player.x ? -1 : 1);
        e.vx = (e.vx || 0) + dir * (this.mpPowerModeActive ? 145 : 90);
        e.knockbackTime = Math.max(e.knockbackTime || 0,this.mpPowerModeActive ? 820 : 560);
        this.mpHewWallBounceEnemy(e,dir);
      }
    }

    return ret;
  };

  const MP_HEW_OLD_DAMAGE_PLAYER_V745 = Game.prototype.damagePlayer;
  Game.prototype.damagePlayer = function(amount,dir){
    if(mpIsHew(this) && this.mpPowerModeActive){
      amount = Math.max(1,Math.round((amount || 0) * HEW_POWER_ARMOR_MULT));
      this.cameras.main.shake(60,0.004);
      if(this.player){
        this.player.setTint(0xffd36b);
        this.time.delayedCall(70,()=>{ if(this.player) this.player.clearTint(); });
      }
    }
    return MP_HEW_OLD_DAMAGE_PLAYER_V745.call(this,amount,dir);
  };

  const MP_HEW_OLD_SPEED_V745 = Game.prototype.getPlayerSpeedMod;
  Game.prototype.getPlayerSpeedMod = function(){
    const base = MP_HEW_OLD_SPEED_V745 ? MP_HEW_OLD_SPEED_V745.call(this) : 1;
    if(mpIsHew(this) && this.mpPowerModeActive) return base * HEW_POWER_SPEED_MULT;
    return base;
  };

  const MP_HEW_OLD_DAMAGE_MOD_V745 = Game.prototype.getPlayerDamageMod;
  Game.prototype.getPlayerDamageMod = function(){
    const base = MP_HEW_OLD_DAMAGE_MOD_V745 ? MP_HEW_OLD_DAMAGE_MOD_V745.call(this) : 1;
    if(mpIsHew(this) && this.mpPowerModeActive) return base * HEW_POWER_DAMAGE_MULT;
    return base;
  };

  const MP_HEW_OLD_SAFE_UPDATE_V745 = Game.prototype.safeUpdate;
  Game.prototype.safeUpdate = function(time,delta){
    const ret = MP_HEW_OLD_SAFE_UPDATE_V745.call(this,time,delta);

    if(mpIsHew(this)){
      const dt = Math.min(delta || 16.67,33.33);

      if(this.mpPowerModeActive){
        this.mpPowerModeTimer -= dt;

        if(this.mpPowerAuraImage && this.player){
          this.mpPowerAuraImage.x = this.player.x;
          this.mpPowerAuraImage.y = this.player.y - 66;
          this.mpPowerAuraImage.setVisible(true);
          this.mpPowerAuraImage.setAlpha(0.58 + Math.sin((time || 0) * 0.018) * 0.16);
          this.mpPowerAuraImage.setScale(0.70 + Math.sin((time || 0) * 0.014) * 0.045);
        }

        const moving = Math.abs(this.moveX || 0) > 0.18 || Math.abs(this.stickX || 0) > 0.18;
        if(moving && time > (this.mpHewLastPowerStep || 0)){
          this.mpHewLastPowerStep = time + 180;
          mpSpawnImageFX(this,"hew_power_step_fx",this.player.x,this.player.y + 8,(this.player.depth || 200) - 3,0.34,0.75,260);
        }

        if(this.mpPowerModeTimer <= 0){
          this.mpPowerModeActive = false;
          this.mpPowerModeTimer = 0;
          if(this.mpPowerAuraImage){
            this.mpPowerAuraImage.destroy();
            this.mpPowerAuraImage = null;
          }
        }
      }else if(this.mpPowerAuraImage){
        this.mpPowerAuraImage.destroy();
        this.mpPowerAuraImage = null;
      }

      mpSetPowerButtonsLit(this);
    }

    return ret;
  };
})();

/* =========================================================
   HEW SP + COMBO + POWER INPUT PATCH V747
   - SP button now triggers Hew specials.
   - Hew combo engine works from landed hits.
   - Power Mode trigger changed from A+X+Y+B to SP+X.
   - Existing A+X+Y+B trigger is disabled.
========================================================= */
(function(){
  if(window.MP_HEW_SP_COMBO_POWER_V747) return;
  window.MP_HEW_SP_COMBO_POWER_V747 = true;

  if(typeof Game === "undefined" || !Game.prototype) return;

  const HEW_COMBO_WINDOW = 700;
  const HEW_COMBO_COST = 50;
  const HEW_POWER_REQUIRED = 10;

  function mpIsHew(){
    try{
      return String(getSelectedFighterId ? getSelectedFighterId() : window.selectedFighter || "").toUpperCase() === "HEW";
    }catch(e){
      return String(window.selectedFighter || "").toUpperCase() === "HEW";
    }
  }

  function mpClamp(v,min,max){
    return Math.max(min,Math.min(max,v));
  }

  function mpNearestEnemy(scene,range){
    if(!scene || !scene.enemies || !scene.player) return null;
    let best = null;
    let bestD = 999999;
    scene.enemies.forEach(e=>{
      if(!e || e.dead || e.state === "dead") return;
      if(e.platform && scene.platform && e.platform !== scene.platform) return;
      const dx = Math.abs(e.x - scene.player.x);
      const dy = Math.abs(e.y - scene.player.y);
      const d = dx + dy * 1.35;
      if(d < bestD && d <= (range || 260)){
        best = e;
        bestD = d;
      }
    });
    return best;
  }

  function mpAllEnemiesInRange(scene,range){
    if(!scene || !scene.enemies || !scene.player) return [];
    return scene.enemies.filter(e=>{
      if(!e || e.dead || e.state === "dead") return false;
      if(e.platform && scene.platform && e.platform !== scene.platform) return false;
      return Phaser.Math.Distance.Between(scene.player.x,scene.player.y,e.x,e.y) <= range;
    });
  }

  function mpShowFloatingText(scene,x,y,text,color){
    if(!scene || !scene.add) return;
    const t = scene.add.text(x,y,text,{
      font:"18px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5,
      backgroundColor:"#000000"
    }).setOrigin(0.5).setDepth(90000);
    if(color) t.setTint(color);
    scene.tweens.add({
      targets:t,
      y:y-26,
      alpha:0,
      duration:650,
      ease:"Sine.easeOut",
      onComplete:()=>{ if(t && t.destroy) t.destroy(); }
    });
  }

  function mpSpendCombo(scene){
    if(!scene) return false;
    if(typeof scene.mpComboMeter !== "number") scene.mpComboMeter = 0;
    if(scene.mpComboMeter < HEW_COMBO_COST){
      mpShowFloatingText(scene,scene.player.x,scene.player.y-110,"NEED 50% COMBO",0xff4fc3);
      return false;
    }
    scene.mpComboMeter = mpClamp(scene.mpComboMeter - HEW_COMBO_COST,0,100);
    if(scene.refreshPlayerTrainingHUD) scene.refreshPlayerTrainingHUD();
    return true;
  }

  function mpEnsureHewState(scene){
    if(!scene.mpHewComboSeq) scene.mpHewComboSeq = [];
    if(typeof scene.mpHewLastComboTime !== "number") scene.mpHewLastComboTime = 0;
    if(!scene.mpHewHeld) scene.mpHewHeld = {SP:false,X:false};
  }

  const HEW_COMBOS = [
    {
      id:"low_end_theory",
      name:"LOW END THEORY",
      seq:["light","light","heavy"],
      anim:"hew_attack_heavy",
      damage:14,
      stun:760,
      knockback:270,
      shake:0.006,
      label:"Y Y X"
    },
    {
      id:"speaker_breaker",
      name:"SPEAKER BREAKER",
      seq:["heavy","heavy"],
      anim:"hew_attack_heavy",
      damage:18,
      stun:880,
      knockback:390,
      shake:0.010,
      label:"X X"
    },
    {
      id:"feedback_loop",
      name:"FEEDBACK LOOP",
      seq:["light","heavy","kick"],
      anim:"hew_kick",
      damage:16,
      stun:800,
      knockback:330,
      shake:0.008,
      label:"Y X A"
    },
    {
      id:"brown_note_route",
      name:"BROWN NOTE ROUTE",
      seq:["light","light","special"],
      anim:"hew_special",
      damage:12,
      stun:1000,
      knockback:430,
      shake:0.011,
      label:"Y Y SP",
      special:true
    }
  ];

  function mpSeqIsPrefix(prefix,full){
    if(prefix.length > full.length) return false;
    for(let i=0;i<prefix.length;i++){
      if(prefix[i] !== full[i]) return false;
    }
    return true;
  }

  function mpHasPrefix(seq){
    return HEW_COMBOS.some(c=>mpSeqIsPrefix(seq,c.seq));
  }

  function mpCompleteCombo(seq){
    return HEW_COMBOS.find(c=>c.seq.length === seq.length && mpSeqIsPrefix(seq,c.seq));
  }

  function mpPlayHewComboPose(scene,combo){
    if(!scene || !combo || !scene.poseSprite || !scene.player) return;

    const anim = combo.anim || "hew_attack_heavy";
    if(!hasAnim(scene,anim)) return;

    scene.playerBusy = true;
    scene.busyUntil = Math.max(scene.busyUntil || 0,(scene.time ? scene.time.now : Date.now()) + 650);

    const sheet = anim.indexOf("kick") >= 0 || anim.indexOf("attack") >= 0
      ? scene.getPlayerAttackSheet()
      : scene.getPlayerActionSheet();

    scene.poseSprite.setTexture(sheet);
    scene.poseSprite.setOrigin(0.5,1);
    scene.poseSprite.setScale(HEW_MOVE_SCALE);
    scene.poseSprite.setPosition(scene.player.x,scene.player.y);
    scene.poseSprite.setFlipX(scene.player.flipX);
    scene.poseSprite.setDepth((scene.player.depth || 200) + 1);
    scene.poseSprite.setVisible(true);
    scene.player.setVisible(false);
    safePlay(scene.poseSprite,anim);

    scene.time.delayedCall(combo.special ? 900 : 650,()=>{
      if(scene.poseSprite){
        scene.poseSprite.stop();
        scene.poseSprite.setVisible(false);
      }
      if(scene.player){
        scene.player.setVisible(true);
        scene.player.setScale(scene.getPlayerMoveScale ? scene.getPlayerMoveScale() : HEW_MOVE_SCALE);
      }
      scene.playerBusy = false;
    });
  }

  function mpApplyHewCombo(scene,combo,enemy){
    if(!scene || !combo) return;
    if(!mpSpendCombo(scene)) return;

    enemy = enemy || mpNearestEnemy(scene,320);
    if(!enemy || enemy.dead) return;

    mpPlayHewComboPose(scene,combo);

    try{ scene.time.timeScale = 0.55; }catch(e){}
    try{ scene.tweens.timeScale = 0.65; }catch(e){}
    window.setTimeout(()=>{
      try{ scene.time.timeScale = 1; }catch(e){}
      try{ scene.tweens.timeScale = 1; }catch(e){}
    },240);

    if(scene.cameras && scene.cameras.main){
      scene.cameras.main.shake(160,combo.shake || 0.006);
    }

    enemy.health -= combo.damage;
    enemy.busy = true;
    enemy.state = "hew_combo_stun";
    enemy.knockbackTime = combo.stun || 700;
    enemy.attackCooldown = Math.max(enemy.attackCooldown || 0,combo.stun || 700);

    const dir = enemy.x < scene.player.x ? -1 : 1;
    const resist = typeof enemy.knockbackResist === "number" ? enemy.knockbackResist : 1;
    enemy.vx = dir * (combo.knockback || 260) * resist;
    enemy.vy = 0;

    if(scene.createHitFX) scene.createHitFX(enemy.x,enemy.y-70,combo.name,combo.damage);
    if(scene.safeEnemyPlay) scene.safeEnemyPlay(enemy,"knockback");
    if(scene.updateEnemyHealthBar) scene.updateEnemyHealthBar(enemy);

    if(typeof scene.mpGrooveValue !== "number") scene.mpGrooveValue = 0;
    scene.mpGrooveValue = mpClamp(scene.mpGrooveValue + 0.55,0,10);

    mpShowFloatingText(scene,scene.player.x,scene.player.y-124,combo.name+"  "+combo.label,0xffdd55);

    if(enemy.health <= 0 && scene.killEnemy){
      scene.killEnemy(enemy);
    }

    scene.time.delayedCall(combo.stun || 700,()=>{
      if(enemy && !enemy.dead){
        enemy.busy = false;
        enemy.state = "idle";
        enemy.vx = 0;
        if(scene.safeEnemyPlay) scene.safeEnemyPlay(enemy,"idle");
      }
    });

    if(combo.special){
      scene.mpActivateHewSpecial(true);
    }
  }

  Game.prototype.mpRecordHewComboInput = function(action,enemy){
    if(!mpIsHew() || !action) return;
    mpEnsureHewState(this);

    const now = this.time ? this.time.now : Date.now();
    if(this.mpHewLastComboTime && now - this.mpHewLastComboTime > HEW_COMBO_WINDOW){
      this.mpHewComboSeq = [];
    }

    this.mpHewLastComboTime = now;
    this.mpHewComboSeq.push(action);

    if(!mpHasPrefix(this.mpHewComboSeq)){
      this.mpHewComboSeq = mpHasPrefix([action]) ? [action] : [];
    }

    const combo = mpCompleteCombo(this.mpHewComboSeq);
    if(combo){
      mpApplyHewCombo(this,combo,enemy);
      this.mpHewComboSeq = [];
      this.mpHewLastComboTime = 0;
    }
  };

  Game.prototype.mpActivateHewSpecial = function(fromCombo){
    if(!mpIsHew()) return false;
    if(this.pauseMenuOpen || !this.matchStarted || this.matchOver) return false;

    const now = this.time ? this.time.now : Date.now();
    if(this.mpHewSpecialLock && now < this.mpHewSpecialLock) return false;
    this.mpHewSpecialLock = now + 950;

    // Brown Note: SP without power trigger.
    const anim = this.getPlayerAnim ? this.getPlayerAnim("special") : "hew_special";
    if(hasAnim(this,anim)){
      this.playPlayerPose(anim,820,this.getPlayerActionScale ? this.getPlayerActionScale() : HEW_MOVE_SCALE);
    }

    const x = this.player.x;
    const y = this.player.y;

    if(hasTex(this,"bass_shockwave")){
      const wave = this.add.image(x,y-38,"bass_shockwave")
        .setDepth((this.player.depth || 200)-1)
        .setAlpha(0.9)
        .setScale(0.55);
      this.tweens.add({
        targets:wave,
        alpha:0,
        scaleX:2.6,
        scaleY:1.45,
        duration:520,
        ease:"Quad.easeOut",
        onComplete:()=>wave.destroy()
      });
    }else{
      const wave = this.add.ellipse(x,y-38,48,16,0x7a3f19,0.68).setDepth((this.player.depth || 200)-1);
      this.tweens.add({
        targets:wave,
        alpha:0,
        scaleX:7,
        scaleY:3,
        duration:520,
        onComplete:()=>wave.destroy()
      });
    }

    if(hasTex(this,"brown_note_wave")){
      const note = this.add.image(x,y-44,"brown_note_wave").setDepth((this.player.depth || 200)-1).setScale(0.55);
      this.tweens.add({targets:note,alpha:0,scale:1.8,duration:520,onComplete:()=>note.destroy()});
    }

    if(this.cameras && this.cameras.main){
      this.cameras.main.shake(220,0.009);
    }
    vibrate([30,25,60]);

    const enemies = mpAllEnemiesInRange(this,360);
    enemies.forEach(e=>{
      const dir = e.x < this.player.x ? -1 : 1;
      e.health -= fromCombo ? 8 : 10;
      e.busy = true;
      e.state = "brown_noted";
      e.attackCooldown = 5000;
      e.knockbackTime = 900;
      e.vx = dir * 430 * (typeof e.knockbackResist === "number" ? e.knockbackResist : 1);
      e.mudSlow = true;
      e.mudSlowTimer = 5000;
      e.chaseSpeedBase = e.chaseSpeedBase || e.chaseSpeed || 90;
      e.chaseSpeed = Math.max(28,e.chaseSpeedBase * 0.55);

      if(hasTex(this,"mud_puddle")){
        const mud = this.add.image(e.x,e.y+2,"mud_puddle").setDepth((e.sprite ? e.sprite.depth : 200)-2).setScale(0.55).setAlpha(0.85);
        this.tweens.add({targets:mud,alpha:0,duration:5000,onComplete:()=>mud.destroy()});
      }

      if(hasTex(this,"stink_fx")){
        const stink = this.add.image(e.x,e.y-62,"stink_fx").setDepth((e.sprite ? e.sprite.depth : 200)+2).setScale(0.45);
        this.tweens.add({targets:stink,alpha:0,y:e.y-82,duration:1200,onComplete:()=>stink.destroy()});
      }

      if(this.safeEnemyPlay) this.safeEnemyPlay(e,"knockback");
      if(this.updateEnemyHealthBar) this.updateEnemyHealthBar(e);
      if(this.createHitFX) this.createHitFX(e.x,e.y-70,"BROWN NOTE",fromCombo ? 8 : 10);

      if(e.health <= 0 && this.killEnemy){
        this.killEnemy(e);
        return;
      }

      this.time.delayedCall(950,()=>{
        if(!e || e.dead) return;
        e.state = "crouch_recover";
        e.busy = true;
        if(this.safeEnemyPlay) this.safeEnemyPlay(e,"hurt");
      });

      this.time.delayedCall(1700,()=>{
        if(!e || e.dead) return;
        e.busy = false;
        e.state = "idle";
        e.vx = 0;
        if(this.safeEnemyPlay) this.safeEnemyPlay(e,"idle");
      });

      this.time.delayedCall(5000,()=>{
        if(!e || e.dead) return;
        e.mudSlow = false;
        if(e.chaseSpeedBase) e.chaseSpeed = e.chaseSpeedBase;
      });
    });

    if(typeof this.mpGrooveValue !== "number") this.mpGrooveValue = 0;
    this.mpGrooveValue = mpClamp(this.mpGrooveValue + 0.25,0,10);

    this.mpRecordHewComboInput("special",mpNearestEnemy(this,360));
    return true;
  };

  Game.prototype.mpTrySPXPowerMode = function(){
    mpEnsureHewState(this);
    if(!mpIsHew()) return false;
    if(this.mpPowerModeActive) return false;
    if((this.mpGrooveValue || 0) < HEW_POWER_REQUIRED) return false;
    if(!this.mpHewHeld.SP || !this.mpHewHeld.X) return false;

    if(typeof this.activatePowerMode === "function"){
      return this.activatePowerMode();
    }
    return false;
  };

  // Disable old A+X+Y+B power trigger. Power is now SP+X only.
  Game.prototype.mpTryAXYBPowerMode = function(){
    return false;
  };

  const MP_OLD_LOAD_ASSETS_HEW_V747 = window.loadAssets || loadAssets;
  window.loadAssets = loadAssets = function(scene){
    MP_OLD_LOAD_ASSETS_HEW_V747(scene);
    scene.load.image("brown_note_wave", HEW_BASE + "/fx/brown_note_wave.png?v=" + VERSION);
    scene.load.image("mud_puddle", HEW_BASE + "/fx/mud_puddle.png?v=" + VERSION);
    scene.load.image("stink_fx", HEW_BASE + "/fx/stink_fx.png?v=" + VERSION);
    scene.load.image("bass_distortion_ring", HEW_BASE + "/fx/bass_distortion_ring.png?v=" + VERSION);
    scene.load.image("bass_shockwave", HEW_BASE + "/fx/bass_shockwave.png?v=" + VERSION);
  };

  const MP_OLD_CREATE_HEW_V747 = Game.prototype.create;
  Game.prototype.create = function(){
    const ret = MP_OLD_CREATE_HEW_V747 ? MP_OLD_CREATE_HEW_V747.call(this) : undefined;
    mpEnsureHewState(this);

    if(this.input && this.input.keyboard){
      this.input.keyboard.on("keydown-X",()=>{
        this.mpHewHeld.X = true;
        if(!this.mpTrySPXPowerMode()) this.startAttack("heavy");
      });
      this.input.keyboard.on("keyup-X",()=>{ this.mpHewHeld.X = false; });

      this.input.keyboard.on("keydown-V",()=>{
        this.mpHewHeld.SP = true;
        if(!this.mpTrySPXPowerMode()) this.mpActivateHewSpecial(false);
      });
      this.input.keyboard.on("keyup-V",()=>{ this.mpHewHeld.SP = false; });
    }

    return ret;
  };

  const MP_OLD_MOBILE_BUTTON_HEW_V747 = Game.prototype.mobileButton;
  Game.prototype.mobileButton = function(x,y,label,color,down,up=null){
    const btn = MP_OLD_MOBILE_BUTTON_HEW_V747.call(this,x,y,label,color,down,up);
    mpEnsureHewState(this);

    if(label === "SP" || label === "X"){
      if(!this.mpHewPowerButtons) this.mpHewPowerButtons = {};
      this.mpHewPowerButtons[label] = btn;

      btn.hit.on("pointerdown", p=>{
        if(p && p.event && p.event.preventDefault) p.event.preventDefault();
        this.mpHewHeld[label] = true;

        // If SP+X are both held and groove is ready, activate power instead of special.
        if(this.mpTrySPXPowerMode()) return;

        if(label === "SP"){
          this.mpActivateHewSpecial(false);
        }
      });

      btn.hit.on("pointerup", ()=>{
        this.mpHewHeld[label] = false;
      });

      btn.hit.on("pointerout", ()=>{
        this.mpHewHeld[label] = false;
      });
    }

    return btn;
  };

  const MP_OLD_START_ATTACK_HEW_V747 = Game.prototype.startAttack;
  Game.prototype.startAttack = function(type){
    this.mpPendingHewAttack = type;
    const ret = MP_OLD_START_ATTACK_HEW_V747 ? MP_OLD_START_ATTACK_HEW_V747.call(this,type) : undefined;
    return ret;
  };

  const MP_OLD_DAMAGE_ENEMY_HEW_V747 = Game.prototype.damageEnemy;
  Game.prototype.damageEnemy = function(e,damage,stagger){
    const before = e ? e.health : null;
    const ret = MP_OLD_DAMAGE_ENEMY_HEW_V747 ? MP_OLD_DAMAGE_ENEMY_HEW_V747.call(this,e,damage,stagger) : undefined;

    if(mpIsHew() && e && before !== null && before > (e.health || 0)){
      const action = this.mpPendingHewAttack || null;
      if(action){
        this.mpRecordHewComboInput(action,e);
      }
    }

    return ret;
  };

  const MP_OLD_SAFE_UPDATE_HEW_V747 = Game.prototype.safeUpdate;
  Game.prototype.safeUpdate = function(time,delta){
    const ret = MP_OLD_SAFE_UPDATE_HEW_V747 ? MP_OLD_SAFE_UPDATE_HEW_V747.call(this,time,delta) : undefined;

    if(this.mpHewPowerButtons){
      const ready = mpIsHew() && !this.mpPowerModeActive && (this.mpGrooveValue || 0) >= HEW_POWER_REQUIRED;
      ["SP","X"].forEach(k=>{
        const btn = this.mpHewPowerButtons[k];
        if(!btn) return;
        try{
          if(btn.face){
            btn.face.setStrokeStyle(ready ? 4 : 2, ready ? 0xffff66 : 0xffffff, ready ? 1 : 0.42);
            btn.face.setAlpha(ready ? 1 : 0.78);
          }
          if(btn.shine){
            btn.shine.setAlpha(ready ? 0.58 : 0.14);
            btn.shine.setFillStyle(ready ? 0xffff66 : 0xffffff, ready ? 0.58 : 0.14);
          }
          if(btn.text){
            btn.text.setFill(ready ? "#ffff66" : "#ffffff");
          }
        }catch(e){}
      });
    }

    return ret;
  };

})();

</script>
