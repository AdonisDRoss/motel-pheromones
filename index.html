<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    width: 100%;
    height: 100%;
    touch-action: none;
  }

  canvas {
    display: block;
    margin: 0 auto;
    image-rendering: pixelated;
  }

  #rotate-warning {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    color: #ff4fc3;
    font-family: monospace;
    font-size: 24px;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 9999;
  }

  @media (orientation: portrait) {
    #rotate-warning {
      display: flex;
    }
  }
</style>
</head>

<body>

<div id="rotate-warning">
  TURN PHONE SIDEWAYS<br>
  LANDSCAPE REQUIRED
</div>

<script>

// =========================
// TITLE
// =========================
class TitleScene extends Phaser.Scene {
  constructor() { super("TitleScene"); }

  preload() {
    this.load.image("title", "assets/title-screen.png");
    this.load.image("characterSelect", "assets/character-select.png");
    this.load.image("levelSelect", "assets/level-select.png");
  }

  create() {
    this.add.image(480, 270, "title").setDisplaySize(960, 540);

    const start = this.add.text(480, 470, "PRESS START", {
      fontFamily: "monospace",
      fontSize: "28px",
      color: "#ff4fc3"
    }).setOrigin(0.5).setInteractive();

    this.tweens.add({
      targets: start,
      alpha: 0.2,
      duration: 700,
      yoyo: true,
      repeat: -1
    });

    start.on("pointerdown", () => this.scene.start("CharacterSelectScene"));
    this.input.keyboard.on("keydown-ENTER", () => this.scene.start("CharacterSelectScene"));
  }
}

// =========================
// CHARACTER SELECT
// =========================
class CharacterSelectScene extends Phaser.Scene {
  constructor() { super("CharacterSelectScene"); }

  create() {
    this.add.image(480, 270, "characterSelect").setDisplaySize(960, 540);

    this.characters = ["DONNY", "JT", "HEW"];
    this.index = 1;

    this.text = this.add.text(480, 420, "", {
      fontFamily: "monospace",
      fontSize: "36px",
      color: "#fff"
    }).setOrigin(0.5);

    this.updateChar();

    this.add.text(100, 270, "◀", { fontSize: "70px", color: "#ff4fc3" })
      .setInteractive().on("pointerdown", () => this.move(-1));

    this.add.text(860, 270, "▶", { fontSize: "70px", color: "#ff4fc3" })
      .setInteractive().on("pointerdown", () => this.move(1));

    this.add.text(480, 485, "TAP SELECT", {
      fontSize: "24px",
      color: "#ff4fc3"
    }).setOrigin(0.5).setInteractive()
      .on("pointerdown", () => this.select());

    this.input.keyboard.on("keydown-LEFT", () => this.move(-1));
    this.input.keyboard.on("keydown-RIGHT", () => this.move(1));
    this.input.keyboard.on("keydown-ENTER", () => this.select());
  }

  move(dir) {
    this.index = (this.index + dir + this.characters.length) % this.characters.length;
    this.updateChar();
  }

  updateChar() {
    this.text.setText(this.characters[this.index]);
  }

  select() {
    this.scene.start("LevelSelectScene", {
      character: this.characters[this.index]
    });
  }
}

// =========================
// LEVEL SELECT (GRAPHIC)
// =========================
class LevelSelectScene extends Phaser.Scene {
  constructor() { super("LevelSelectScene"); }

  create(data) {
    this.selectedCharacter = data.character;

    this.add.image(480, 270, "levelSelect").setDisplaySize(960, 540);

    this.add.text(480, 490, "TAP TO START / PRESS ENTER", {
      fontFamily: "monospace",
      fontSize: "24px",
      color: "#ff4fc3"
    }).setOrigin(0.5).setInteractive()
      .on("pointerdown", () => this.start());

    this.input.keyboard.on("keydown-ENTER", () => this.start());
  }

  start() {
    this.scene.start("GameScene", {
      character: this.selectedCharacter,
      level: "SELECTED LEVEL"
    });
  }
}

// =========================
// GAME
// =========================
class GameScene extends Phaser.Scene {
  constructor() { super("GameScene"); }

  create(data) {
    this.add.rectangle(480, 270, 960, 540, 0x111111);

    this.add.text(30, 30, "GAME STARTED", {
      fontFamily: "monospace",
      fontSize: "22px",
      color: "#fff"
    });

    this.add.text(30, 70, "CHAR: " + data.character, {
      fontSize: "20px",
      color: "#ff4fc3"
    });

    this.add.text(30, 100, "LEVEL: " + data.level, {
      fontSize: "20px",
      color: "#fff"
    });

    // Player placeholder
    this.player = this.physics.add.rectangle(200, 300, 50, 70, 0x00ffcc);

    this.makeControls();
  }

  makeControls() {
    const baseX = 120;
    const baseY = 420;
    const radius = 60;

    let stick = this.add.circle(baseX, baseY, 30, 0xffffff, 0.4);
    this.add.circle(baseX, baseY, radius, 0xffffff, 0.1);

    let dragging = false;

    this.input.on("pointerdown", p => {
      if (Phaser.Math.Distance.Between(p.x, p.y, baseX, baseY) < radius + 20) {
        dragging = true;
      }
    });

    this.input.on("pointermove", p => {
      if (!dragging) return;

      let dx = p.x - baseX;
      let dy = p.y - baseY;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if (dist > radius) {
        dx = dx/dist * radius;
        dy = dy/dist * radius;
      }

      stick.x = baseX + dx;
      stick.y = baseY + dy;

      this.player.body.setVelocity(dx*3, dy*3);
    });

    this.input.on("pointerup", () => {
      dragging = false;
      stick.x = baseX;
      stick.y = baseY;
      this.player.body.setVelocity(0,0);
    });

    // SNES buttons
    this.add.circle(860, 360, 30, 0xffffff, 0.2);
    this.add.circle(800, 420, 30, 0xffffff, 0.2);
    this.add.circle(920, 420, 30, 0xffffff, 0.2);
    this.add.circle(860, 480, 30, 0xffffff, 0.2);

    this.add.text(850,350,"X");
    this.add.text(790,410,"Y");
    this.add.text(910,410,"A");
    this.add.text(850,470,"B");

    this.add.rectangle(480,500,100,30,0xffffff,0.2);
    this.add.text(450,490,"START");
  }
}

// =========================
// CONFIG
// =========================
const config = {
  type: Phaser.AUTO,
  width: 960,
  height: 540,
  backgroundColor: "#000",
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  physics: {
    default: "arcade",
    arcade: { gravity: { y: 0 }, debug: false }
  },
  scene: [TitleScene, CharacterSelectScene, LevelSelectScene, GameScene]
};

new Phaser.Game(config);

</script>

</body>
</html>
