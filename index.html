<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones v1.2 DEBUG</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
html, body {
  margin:0;
  background:#000;
  width:100vw;
  height:100vh;
  overflow:hidden;
}
canvas {
  width:100vw !important;
  height:100vh !important;
}
</style>
</head>

<body>
<script>

// ================= TITLE =================
class TitleScene extends Phaser.Scene {
  constructor(){ super("TitleScene"); }

  preload(){
    this.load.image("title","assets/title-screen.png");
    this.load.image("characterSelect","assets/character-select.png");
    this.load.image("levelSelect","assets/level-select.png");

    this.load.spritesheet("jt","assets/player/jt/jt-master.png",{
      frameWidth:128,
      frameHeight:128
    });
  }

  create(){
    this.add.image(480,270,"title").setDisplaySize(960,540);

    let start=this.add.text(480,470,"TAP TO START",{fontSize:"28px",color:"#ff4fc3"})
      .setOrigin(0.5).setInteractive();

    start.on("pointerdown",()=>{
      console.log("Title → Character Select");
      this.scene.start("CharacterSelectScene");
    });
  }
}

// ================= CHARACTER SELECT =================
class CharacterSelectScene extends Phaser.Scene {
  constructor(){ super("CharacterSelectScene"); }

  create(){
    this.add.image(480,270,"characterSelect").setDisplaySize(960,540);

    const spots=[
      {x:300,y:270,w:210,h:340,name:"DONNY"},
      {x:480,y:270,w:240,h:360,name:"JT"},
      {x:690,y:270,w:210,h:340,name:"HEW"}
    ];

    spots.forEach((s)=>{
      this.add.rectangle(s.x,s.y,s.w,s.h,0x00ff00,0.25) // visible debug
        .setInteractive()
        .on("pointerdown",()=>{
          console.log("Selected:", s.name);
          this.scene.start("LevelSelectScene",{character:s.name});
        });
    });
  }
}

// ================= LEVEL SELECT =================
class LevelSelectScene extends Phaser.Scene {
  constructor(){ super("LevelSelectScene"); }

  create(data){
    this.selectedCharacter = data.character || "JT";

    this.add.image(480,270,"levelSelect").setDisplaySize(960,540);

    this.levels=[
      {x:190,y:305,w:165,h:300,name:"HOUSE PARTY"},
      {x:355,y:305,w:165,h:300,name:"INDOOR"},
      {x:520,y:305,w:190,h:330,name:"OUTDOOR"},
      {x:690,y:305,w:165,h:300,name:"LMNOP"},
      {x:845,y:305,w:165,h:300,name:"CHICKEN"}
    ];

    this.levels.forEach(l=>{
      this.add.rectangle(l.x,l.y,l.w,l.h,0xff0000,0.3) // visible debug
        .setInteractive()
        .on("pointerdown",()=>{
          console.log("LEVEL CLICKED:", l.name);

          this.scene.start("GameScene",{
            character:this.selectedCharacter,
            level:l.name
          });
        });
    });
  }
}

// ================= GAME =================
class GameScene extends Phaser.Scene {
  constructor(){ super("GameScene"); }

  create(data){

    console.log("ENTERED GAME SCENE", data);

    this.add.rectangle(480,270,960,540,0x111111);

    this.add.text(20,20,"CHAR: "+data.character,{color:"#fff"});
    this.add.text(20,50,"LEVEL: "+data.level,{color:"#ff4fc3"});

    // SAFE PLAYER LOAD
    if (this.textures.exists("jt")) {
      this.player=this.physics.add.sprite(300,300,"jt");
      this.player.setScale(1.4);
    } else {
      console.log("JT sprite missing → using fallback");
      this.player=this.physics.add.rectangle(300,300,50,70,0x00ffcc);
    }

    // simple movement test
    this.input.on("pointermove",p=>{
      this.player.x = p.x;
      this.player.y = p.y;
    });
  }
}

// ================= CONFIG =================
const config={
  type:Phaser.AUTO,
  width:960,
  height:540,
  physics:{default:"arcade"},
  scene:[TitleScene,CharacterSelectScene,LevelSelectScene,GameScene]
};

new Phaser.Game(config);

</script>
</body>
</html>
