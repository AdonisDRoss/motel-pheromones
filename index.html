<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
html,body{margin:0;padding:0;background:#000;width:100vw;height:100vh;overflow:hidden;}
canvas{width:100vw!important;height:100vh!important;object-fit:contain;image-rendering:pixelated;}
</style>
</head>

<body>
<script>

const W = 960;
const H = 540;

const MOVE_W = 204;
const MOVE_H = 170;

const ATTACK_W = 128;
const ATTACK_H = 128;

const SCALE = 0.55;

let selectedLevel = "outdoor";

class Boot extends Phaser.Scene{
  constructor(){ super("Boot"); }

  preload(){
    this.load.image("title","assets/levels/title-screen.png");
    this.load.image("char","assets/levels/character-select.png");
    this.load.image("level","assets/levels/level-select.png");

    this.load.image("outdoor","assets/levels/outdoor.png");

    this.load.spritesheet("move","assets/sprites/player/jt/movement.png",{
      frameWidth: MOVE_W,
      frameHeight: MOVE_H
    });

    this.load.spritesheet("atk","assets/sprites/player/jt/attacks/jt_attacks.png",{
      frameWidth: ATTACK_W,
      frameHeight: ATTACK_H
    });
  }

  create(){
    this.scene.start("Title");
  }
}

class Title extends Phaser.Scene{
  constructor(){ super("Title"); }

  create(){
    this.add.image(480,270,"title").setDisplaySize(960,540);
    this.input.once("pointerdown",()=>this.scene.start("Char"));
  }
}

class Char extends Phaser.Scene{
  constructor(){ super("Char"); }

  create(){
    this.add.image(480,270,"char").setDisplaySize(960,540);
    this.input.once("pointerdown",()=>this.scene.start("Level"));
  }
}

class Level extends Phaser.Scene{
  constructor(){ super("Level"); }

  create(){
    this.add.image(480,270,"level").setDisplaySize(960,540);
    this.input.once("pointerdown",()=>this.scene.start("Game"));
  }
}

class Game extends Phaser.Scene{
  constructor(){ super("Game"); }

  create(){
    this.add.image(480,270,"outdoor").setDisplaySize(960,540);

    this.player = this.physics.add.sprite(470,390,"move");
    this.player.setScale(SCALE);
    this.player.setOrigin(0.5,1);

    this.player.body.setAllowGravity(false);

    this.createAnims();
    this.player.play("idle");

    this.makeControls();

    this.input.keyboard.on("keydown-J",()=>this.attack());
  }

  createAnims(){

    this.anims.create({
      key:"idle",
      frames:this.anims.generateFrameNumbers("move",{start:0,end:4}),
      frameRate:6,
      repeat:-1
    });

    this.anims.create({
      key:"walk",
      frames:this.anims.generateFrameNumbers("move",{start:15,end:19}),
      frameRate:10,
      repeat:-1
    });

    this.anims.create({
      key:"attack",
      frames:this.anims.generateFrameNumbers("atk",{start:1,end:3}),
      frameRate:14,
      repeat:0
    });
  }

  update(){

    let moving = false;

    if(this.left){
      this.player.x -= 2;
      this.player.flipX = true;
      moving = true;
    }

    if(this.right){
      this.player.x += 2;
      this.player.flipX = false;
      moving = true;
    }

    if(!this.attacking){
      if(moving) this.player.play("walk",true);
      else this.player.play("idle",true);
    }
  }

  attack(){
    if(this.attacking) return;

    this.attacking = true;

    this.player.setTexture("atk");
    this.player.play("attack");

    this.time.delayedCall(350,()=>{
      this.player.setTexture("move");
      this.player.setScale(SCALE);
      this.attacking = false;
    });
  }

  makeControls(){

    const bx = 120;
    const by = 420;

    const knob = this.add.circle(bx,by,25,0xffffff,0.4).setDepth(1000);

    this.input.on("pointermove",p=>{
      this.left = p.x < bx;
      this.right = p.x > bx;
    });

    this.input.on("pointerup",()=>{
      this.left = false;
      this.right = false;
    });

    this.add.circle(860,350,30,0xffffff,0.3)
      .setInteractive()
      .setDepth(1000)
      .on("pointerdown",()=>this.attack());
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: W,
  height: H,
  pixelArt:true,
  physics:{default:"arcade"},
  scene:[Boot,Title,Char,Level,Game]
});

</script>
</body>
</html>
