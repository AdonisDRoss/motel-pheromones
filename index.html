<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones v0.9</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  background:#000;
  width:100vw;
  height:100dvh;
  overflow:hidden;
  touch-action:none;
}
canvas {
  width:100vw !important;
  height:100dvh !important;
  object-fit:contain;
  image-rendering:pixelated;
}
</style>
</head>

<body>
<script>

class TitleScene extends Phaser.Scene {
  constructor(){ super("TitleScene"); }

  preload(){
    this.load.image("title","assets/title-screen.png");
    this.load.image("characterSelect","assets/character-select.png");
    this.load.image("levelSelect","assets/level-select.png");

    this.load.spritesheet("jt","assets/player/jt/jt-master.png",{
      frameWidth:128,
      frameHeight:128
    });
  }

  create(){
    this.add.image(480,270,"title").setDisplaySize(960,540);

    this.rain=[];
    for(let i=0;i<120;i++){
      let d=this.add.rectangle(
        Phaser.Math.Between(0,960),
        Phaser.Math.Between(0,540),
        2,12,0x66ccff,0.5
      );
      d.speed=Phaser.Math.Between(300,500);
      this.rain.push(d);
    }

    this.fog=[];
    for(let i=0;i<3;i++){
      let f=this.add.rectangle(480,Phaser.Math.Between(200,500),1000,120,0xff0088,0.08);
      f.speed=Phaser.Math.FloatBetween(0.2,0.6);
      f.dir=Math.random()>0.5?1:-1;
      this.fog.push(f);
    }

    this.flash=this.add.rectangle(480,270,960,540,0xffffff,0);

    let start=this.add.text(480,470,"TAP TO START",{
      fontFamily:"monospace",
      fontSize:"28px",
      color:"#ff4fc3"
    }).setOrigin(0.5).setInteractive();

    this.tweens.add({targets:start,alpha:0.2,duration:700,yoyo:true,repeat:-1});
    start.on("pointerdown",()=>this.scene.start("CharacterSelectScene"));
  }

  update(){
    this.rain.forEach(d=>{
      d.y+=d.speed*0.016;
      if(d.y>540){ d.y=0; d.x=Phaser.Math.Between(0,960); }
    });

    this.fog.forEach(f=>{
      f.x+=f.speed*f.dir;
      if(f.x>1100)f.x=-100;
      if(f.x<-100)f.x=1100;
    });

    if(Phaser.Math.Between(0,1000)>995){
      this.flash.setAlpha(0.7);
      this.time.delayedCall(60,()=>this.flash.setAlpha(0));
      this.time.delayedCall(120,()=>{
        this.flash.setAlpha(0.4);
        this.time.delayedCall(40,()=>this.flash.setAlpha(0));
      });
    }
  }
}

class CharacterSelectScene extends Phaser.Scene {
  constructor(){ super("CharacterSelectScene"); }

  create(){
    this.add.image(480,270,"characterSelect").setDisplaySize(960,540);

    const spots=[
      {x:300,y:270,w:210,h:340,name:"DONNY"},
      {x:480,y:270,w:240,h:360,name:"JT"},
      {x:690,y:270,w:210,h:340,name:"HEW"}
    ];

    this.outline=this.add.rectangle(480,270,240,360,0xff4fc3,0)
      .setStrokeStyle(4,0xff4fc3);

    spots.forEach((s)=>{
      this.add.rectangle(s.x,s.y,s.w,s.h,0xff0000,0)
        .setInteractive()
        .on("pointerdown",()=>{
          this.outline.setPosition(s.x,s.y);
          this.outline.setSize(s.w,s.h);

          let glow=this.add.rectangle(s.x,s.y,s.w+20,s.h+20,0xff4fc3,0.25);
          this.tweens.add({
            targets:glow,
            alpha:0,
            scaleX:1.1,
            scaleY:1.1,
            duration:180,
            onComplete:()=>glow.destroy()
          });

          this.time.delayedCall(180,()=>{
            this.scene.start("LevelSelectScene",{character:s.name});
          });
        });
    });
  }
}

class LevelSelectScene extends Phaser.Scene {
  constructor(){ super("LevelSelectScene"); }

  create(data){
    this.selectedCharacter=data.character || "JT";

    this.add.image(480,270,"levelSelect").setDisplaySize(960,540);

    this.confirmText=this.add.text(480,500,"TAP A LEVEL",{
      fontFamily:"monospace",
      fontSize:"22px",
      color:"#ff4fc3"
    }).setOrigin(0.5);

    this.levels=[
      {x:180,y:270,w:160,h:300,name:"HOUSE PARTY"},
      {x:340,y:270,w:160,h:300,name:"LEFTY'S INDOOR"},
      {x:500,y:270,w:180,h:320,name:"LEFTY'S OUTDOOR"},
      {x:660,y:270,w:160,h:300,name:"LMNOP"},
      {x:820,y:270,w:160,h:300,name:"CHICKEN COUPE"}
    ];

    this.outline=this.add.rectangle(180,270,160,300,0xff4fc3,0)
      .setStrokeStyle(5,0xff4fc3);

    this.levels.forEach((l)=>{
      this.add.rectangle(l.x,l.y,l.w,l.h,0xff0000,0)
        .setInteractive()
        .on("pointerdown",()=>this.confirmLevel(l));
    });
  }

  confirmLevel(level){
    this.outline.setPosition(level.x,level.y);
    this.outline.setSize(level.w,level.h);

    this.confirmText.setText("SELECTED: " + level.name);

    let glow=this.add.rectangle(level.x,level.y,level.w+24,level.h+24,0xff4fc3,0.25);
    this.tweens.add({
      targets:glow,
      alpha:0,
      scaleX:1.08,
      scaleY:1.08,
      duration:250,
      onComplete:()=>glow.destroy()
    });

    this.time.delayedCall(650,()=>{
      this.scene.start("GameScene",{
        character:this.selectedCharacter,
        level:level.name
      });
    });
  }
}

class GameScene extends Phaser.Scene {
  constructor(){ super("GameScene"); }

  create(data){
    this.add.rectangle(480,270,960,540,0x111111);

    this.add.text(20,20,"CHAR: "+data.character,{color:"#fff"});
    this.add.text(20,50,"LEVEL: "+data.level,{color:"#ff4fc3"});

    this.depthMin=210;
    this.depthMax=430;

    this.facing=1;
    this.isAttacking=false;
    this.moveX=0;
    this.moveY=0;

    this.createJTAnimations();

    this.shadow=this.add.ellipse(200,330,52,14,0x000000,0.35);

    this.player=this.physics.add.sprite(200,320,"jt");
    this.player.setScale(1.4);
    this.player.setCollideWorldBounds(true);
    this.player.play("jt_idle");

    this.enemies=this.physics.add.group();

    for(let i=0;i<5;i++){
      let e=this.physics.add.rectangle(
        520+i*70,
        320+Phaser.Math.Between(-40,40),
        40,60,0xff3355
      );
      e.hp=30;
      e.speed=70;
      this.enemies.add(e);
    }

    this.makeControls();
  }

  update(){
    const speed=200;

    if(!this.isAttacking){
      this.player.body.setVelocity(this.moveX*speed,this.moveY*speed);

      this.player.y=Phaser.Math.Clamp(this.player.y,this.depthMin,this.depthMax);

      if(this.moveX!==0 || this.moveY!==0){
        this.player.play("jt_walk",true);
      } else {
        this.player.play("jt_idle",true);
      }

      if(this.moveX<0){
        this.facing=-1;
        this.player.setFlipX(true);
      }

      if(this.moveX>0){
        this.facing=1;
        this.player.setFlipX(false);
      }
    }

    this.shadow.x=this.player.x;
    this.shadow.y=this.player.y+42;
    this.shadow.depth=this.player.y-1;
    this.player.depth=this.player.y;

    this.updateEnemies();
  }

  updateEnemies(){
    this.enemies.children.iterate(e=>{
      if(!e || e.hp<=0) return;

      e.y=Phaser.Math.Clamp(e.y,this.depthMin,this.depthMax);
      e.depth=e.y;

      let dx=this.player.x-e.x;
      let dy=this.player.y-e.y;

      if(Math.abs(dy)>12){
        e.body.setVelocityY(Math.sign(dy)*e.speed);
      } else {
        e.body.setVelocityY(0);
      }

      if(Math.abs(dx)>55){
        e.body.setVelocityX(Math.sign(dx)*e.speed);
      } else {
        e.body.setVelocityX(0);
      }
    });
  }

  createJTAnimations(){
    const makeAnim=(key,start,end,rate,repeat=0)=>{
      if(this.anims.exists(key)) return;
      this.anims.create({
        key:key,
        frames:this.anims.generateFrameNumbers("jt",{start:start,end:end}),
        frameRate:rate,
        repeat:repeat
      });
    };

    makeAnim("jt_idle",0,3,6,-1);
    makeAnim("jt_walk",16,21,10,-1);
    makeAnim("jt_light",96,99,14,0);
    makeAnim("jt_heavy",112,116,10,0);
    makeAnim("jt_kick",128,131,10,0);
    makeAnim("jt_missile",192,194,8,0);
  }

  playAttack(anim,range,damage,knockback){
    if(this.isAttacking) return;

    this.isAttacking=true;
    this.player.body.setVelocity(0,0);
    this.player.play(anim,true);

    this.time.delayedCall(120,()=>{
      this.attack(range,damage,knockback);
    });

    this.player.once("animationcomplete",()=>{
      this.isAttacking=false;
      this.player.play("jt_idle",true);
    });
  }

  attack(range,damage,knockback){
    this.enemies.children.iterate(e=>{
      if(!e || e.hp<=0) return;

      let xDist=Math.abs(this.player.x-e.x);
      let yDist=Math.abs(this.player.y-e.y);

      if(xDist<range && yDist<42){
        e.hp-=damage;

        let dir=e.x>this.player.x ? 1 : -1;
        e.body.setVelocityX(dir*knockback);

        e.setFillStyle(0xffff00);

        this.time.delayedCall(120,()=>{
          if(e.hp>0) e.setFillStyle(0xff3355);
        });

        if(e.hp<=0){
          e.setFillStyle(0x555555);
          e.body.enable=false;
        }
      }
    });
  }

  throwMissile(){
    if(this.isAttacking) return;

    this.isAttacking=true;
    this.player.play("jt_missile",true);

    this.time.delayedCall(220,()=>{
      let stick=this.physics.add.rectangle(
        this.player.x+this.facing*55,
        this.player.y-10,
        28,8,
        0xffffff
      );

      stick.body.setVelocityX(this.facing*420);
      let glow=this.add.circle(stick.x,stick.y,14,0xffffff,0.35);

      let timer=this.time.addEvent({
        delay:16,
        repeat:75,
        callback:()=>{
          if(!stick.body) return;

          glow.setPosition(stick.x,stick.y);

          this.enemies.children.iterate(e=>{
            if(!e || e.hp<=0 || !stick.body) return;

            let xDist=Math.abs(stick.x-e.x);
            let yDist=Math.abs(stick.y-e.y);

            if(xDist<45 && yDist<45){
              e.hp-=15;
              e.setFillStyle(0xffff00);
              e.body.setVelocityX(this.facing*300);

              stick.destroy();
              glow.destroy();

              this.time.delayedCall(120,()=>{
                if(e.hp>0) e.setFillStyle(0xff3355);
              });

              if(e.hp<=0){
                e.setFillStyle(0x555555);
                e.body.enable=false;
              }
            }
          });
        }
      });

      this.time.delayedCall(1200,()=>{
        if(stick.body) stick.destroy();
        if(glow) glow.destroy();
        timer.remove();
      });
    });

    this.player.once("animationcomplete",()=>{
      this.isAttacking=false;
      this.player.play("jt_idle",true);
    });
  }

  makeControls(){
    const baseX=120, baseY=420, r=60;

    const stick=this.add.circle(baseX,baseY,30,0xffffff,0.4).setDepth(1000);
    this.add.circle(baseX,baseY,r,0xffffff,0.12).setDepth(999);

    let dragging=false;

    this.input.on("pointerdown",p=>{
      if(Phaser.Math.Distance.Between(p.x,p.y,baseX,baseY)<r+20){
        dragging=true;
        updateStick(p);
      }
    });

    this.input.on("pointermove",p=>{
      if(dragging) updateStick(p);
    });

    this.input.on("pointerup",()=>{
      dragging=false;
      stick.x=baseX;
      stick.y=baseY;
      this.moveX=0;
      this.moveY=0;
      this.player.body.setVelocity(0,0);
    });

    const updateStick=(p)=>{
      let dx=p.x-baseX;
      let dy=p.y-baseY;
      let dist=Math.sqrt(dx*dx+dy*dy);

      if(dist>r){
        dx=dx/dist*r;
        dy=dy/dist*r;
      }

      stick.x=baseX+dx;
      stick.y=baseY+dy;

      this.moveX=dx/r;
      this.moveY=dy/r;
    };

    this.makeButton(860,360,"X",()=>this.playAttack("jt_heavy",120,20,400));
    this.makeButton(800,420,"Y",()=>this.playAttack("jt_light",80,10,200));
    this.makeButton(920,420,"A",()=>this.throwMissile());
    this.makeButton(860,480,"B",()=>this.playAttack("jt_kick",90,12,250));

    this.add.rectangle(480,500,100,30,0xffffff,0.18).setDepth(999);
    this.add.text(450,490,"START",{color:"#fff"}).setDepth(1000);
  }

  makeButton(x,y,label,callback){
    this.add.circle(x,y,32,0xffffff,0.2)
      .setInteractive()
      .setDepth(999)
      .on("pointerdown",callback);

    this.add.text(x-9,y-13,label,{
      fontFamily:"monospace",
      fontSize:"24px",
      color:"#fff"
    }).setDepth(1000);
  }
}

const config={
  type:Phaser.AUTO,
  width:960,
  height:540,
  backgroundColor:"#000",
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{default:"arcade",arcade:{gravity:{y:0},debug:false}},
  scene:[TitleScene,CharacterSelectScene,LevelSelectScene,GameScene]
};

new Phaser.Game(config);

</script>
</body>
</html>
