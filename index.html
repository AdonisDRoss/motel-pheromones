<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
body { margin:0; background:black; overflow:hidden; }
canvas { width:100vw !important; height:100vh !important; image-rendering:pixelated; }
</style>
</head>

<body>
<script>

const VERSION = 101;

class GameScene extends Phaser.Scene {
  constructor(){ super("GameScene"); }

  preload(){
    this.load.spritesheet("jt","assets/player/jt/jt-master.png?v="+VERSION,{
      frameWidth:128,
      frameHeight:128
    });
  }

  create(){

    // SAFE BACKGROUND (prevents freeze)
    this.add.rectangle(480,270,960,540,0x222222);

    // DEBUG TEXT
    this.add.text(20,20,"JT TEST BUILD",{font:"16px monospace",fill:"#fff"});

    this.createSafeAnimations();

    this.player = this.physics.add.sprite(200,400,"jt",0);
    this.player.setOrigin(0.5,1);
    this.player.setScale(2);

    if(this.anims.exists("idle")){
      this.player.play("idle");
    }

    this.player.setCollideWorldBounds(true);

    this.moveX = 0;
    this.moveY = 0;

    this.makeControls();
  }

  createSafeAnimations(){
    const tex = this.textures.get("jt");

    if(!tex){
      console.log("JT texture missing");
      return;
    }

    console.log("JT frames:", tex.frameTotal);

    const safe = (key,start,end,rate,repeat=0)=>{
      if(tex.frameTotal <= end) return;
      if(this.anims.exists(key)) return;

      this.anims.create({
        key:key,
        frames:this.anims.generateFrameNumbers("jt",{start,end}),
        frameRate:rate,
        repeat:repeat
      });
    };

    safe("idle",0,3,6,-1);
    safe("walk",16,21,10,-1);
    safe("light",96,99,12,0);
    safe("heavy",112,116,10,0);
    safe("kick",128,131,10,0);
    safe("spin",176,181,12,0);
  }

  update(){
    const speed = 200;

    this.player.setVelocity(this.moveX*speed,this.moveY*speed);

    if(this.moveX !== 0 || this.moveY !== 0){
      if(this.anims.exists("walk")){
        this.player.play("walk",true);
      }
    } else {
      if(this.anims.exists("idle")){
        this.player.play("idle",true);
      }
    }

    if(this.moveX < 0) this.player.setFlipX(true);
    if(this.moveX > 0) this.player.setFlipX(false);
  }

  makeControls(){

    const baseX = 120;
    const baseY = 420;

    this.add.circle(baseX,baseY,60,0xffffff,0.1);

    let dragging = false;

    this.input.on("pointerdown",(p)=>{
      if(Phaser.Math.Distance.Between(p.x,p.y,baseX,baseY)<80){
        dragging = true;
      }
    });

    this.input.on("pointermove",(p)=>{
      if(!dragging) return;

      let dx = p.x - baseX;
      let dy = p.y - baseY;

      const len = Math.sqrt(dx*dx+dy*dy);
      if(len>60){
        dx/=len; dy/=len;
        dx*=60; dy*=60;
      }

      this.moveX = dx/60;
      this.moveY = dy/60;
    });

    this.input.on("pointerup",()=>{
      dragging=false;
      this.moveX=0;
      this.moveY=0;
    });

    // ATTACK BUTTONS
    this.makeBtn(860,380,"X",()=>this.playAnim("heavy"));
    this.makeBtn(800,450,"Y",()=>this.playAnim("light"));
    this.makeBtn(920,450,"A",()=>this.playAnim("kick"));
    this.makeBtn(860,520,"B",()=>this.playAnim("spin"));
  }

  makeBtn(x,y,label,fn){
    this.add.circle(x,y,30,0xffffff,0.2)
      .setInteractive()
      .on("pointerdown",fn);

    this.add.text(x,y,label,{font:"18px monospace",fill:"#fff"})
      .setOrigin(0.5);
  }

  playAnim(key){
    if(this.anims.exists(key)){
      this.player.play(key,true);
    }
  }
}

const config = {
  type: Phaser.AUTO,
  width:960,
  height:540,
  physics:{ default:"arcade" },
  scene:[GameScene]
};

new Phaser.Game(config);

</script>
</body>
</html>
