<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  width:100vw;
  height:100vh;
  overflow:hidden;
}
canvas{
  width:100vw!important;
  height:100vh!important;
  image-rendering:pixelated;
}
</style>
</head>

<body>
<script>

const VERSION = 516;

const MOVE_FRAME_W = 204;
const MOVE_FRAME_H = 170;

const ATTACK_FRAME_W = 170;
const ATTACK_FRAME_H = 170;

const JT_BASE = "assets/sprites/player/jt";

function hasAnim(scene,key){ return scene.anims.exists(key); }

function loadAssets(scene){
  scene.load.spritesheet("jt_move", JT_BASE+"/movement.png?v="+VERSION,{
    frameWidth: MOVE_FRAME_W,
    frameHeight: MOVE_FRAME_H
  });

  scene.load.spritesheet("jt_attack", JT_BASE+"/attacks/jt_attacks.png?v="+VERSION,{
    frameWidth: ATTACK_FRAME_W,
    frameHeight: ATTACK_FRAME_H
  });

  scene.load.image("bg","assets/levels/outdoor.png?v="+VERSION);
}

function makeAnim(scene,key,sheet,start,end,rate,repeat){
  if(hasAnim(scene,key)) return;

  scene.anims.create({
    key,
    frames: scene.anims.generateFrameNumbers(sheet,{start,end}),
    frameRate:rate,
    repeat
  });
}

function createAnims(scene){
  makeAnim(scene,"idle","jt_move",0,4,6,-1);
  makeAnim(scene,"walk","jt_move",15,19,8,-1);

  makeAnim(scene,"light","jt_attack",1,3,16,0);
  makeAnim(scene,"heavy","jt_attack",5,8,13,0);
  makeAnim(scene,"kick","jt_attack",10,12,14,0);
}

class Game extends Phaser.Scene{
  constructor(){ super("Game"); }

  preload(){
    loadAssets(this);
  }

  create(){
    this.add.image(480,270,"bg").setDisplaySize(960,540);

    this.player=this.physics.add.sprite(480,390,"jt_move");
    this.player.setOrigin(0.5,1);
    this.player.setScale(1);
    this.player.body.setAllowGravity(false);

    this.player.play("idle");

    this.keys=this.input.keyboard.addKeys({
      left:"LEFT",
      right:"RIGHT",
      j:"J",
      k:"K",
      u:"U"
    });

    this.playerBusy=false;
  }

  update(){
    if(this.playerBusy) return;

    if(this.keys.left.isDown){
      this.player.setVelocityX(-200);
      this.player.flipX=true;
      this.player.play("walk",true);
    }
    else if(this.keys.right.isDown){
      this.player.setVelocityX(200);
      this.player.flipX=false;
      this.player.play("walk",true);
    }
    else{
      this.player.setVelocityX(0);
      this.player.play("idle",true);
    }

    if(Phaser.Input.Keyboard.JustDown(this.keys.j)){
      this.attack("light");
    }

    if(Phaser.Input.Keyboard.JustDown(this.keys.k)){
      this.attack("heavy");
    }

    if(Phaser.Input.Keyboard.JustDown(this.keys.u)){
      this.attack("kick");
    }
  }

  attack(type){
    if(this.playerBusy) return;

    this.playerBusy=true;

    const anim = {
      light:"light",
      heavy:"heavy",
      kick:"kick"
    }[type];

    // switch to attack sheet
    this.player.setTexture("jt_attack");
    this.player.setScale(0.82);

    this.player.play(anim);

    this.player.once("animationcomplete",()=>{
      // switch back
      this.player.setTexture("jt_move");
      this.player.setScale(1);
      this.player.play("idle");
      this.playerBusy=false;
    });
  }
}

const config={
  type:Phaser.AUTO,
  width:960,
  height:540,
  pixelArt:true,
  physics:{
    default:"arcade",
    arcade:{gravity:{y:0}}
  },
  scene:[Game]
};

new Phaser.Game(config);

</script>
</body>
</html>
