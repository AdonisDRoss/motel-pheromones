<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JT Heavy Attacks v837</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
  html,body { margin:0; padding:0; background:#111; color:#fff; font-family:Arial,sans-serif; }
  #game { width:100vw; height:100vh; }
  .note { position:fixed; left:12px; top:12px; background:rgba(0,0,0,.6); padding:10px 12px; border-radius:8px; z-index:2; line-height:1.4; }
</style>
</head>
<body>
<div class="note">
  <strong>JT Heavy Attacks v837</strong><br>
  Sprite sheet: jt_heavy_attacks_v837_phaser_ready.png<br>
  Frame size: 209 x 209<br>
  Keys 1-6 play each heavy animation.
</div>
<div id="game"></div>
<script>
const SHEET = '/mnt/data/jt_heavy_attacks_v837_phaser_ready.png';
const config = {
  type: Phaser.AUTO,
  parent: 'game',
  width: 960,
  height: 540,
  backgroundColor: '#111111',
  pixelArt: true,
  scene: {
    preload,
    create
  }
};
new Phaser.Game(config);
function preload() {
  this.load.spritesheet('jt_heavy', SHEET, { frameWidth: 209, frameHeight: 209 });
}
function create() {
  const anims = [
    ['heavy_double_stick_combo', 0, 5],
    ['heavy_overhead_slam', 6, 11],
    ['jumping_kick_to_axe_kick', 12, 17],
    ['low_followup', 18, 23],
    ['crouch_stick_thrust', 24, 29],
    ['standing_heavy_finish', 30, 35]
  ];
  anims.forEach(([key, start, end]) => {
    this.anims.create({
      key,
      frames: this.anims.generateFrameNumbers('jt_heavy', { start, end }),
      frameRate: 12,
      repeat: 0
    });
  });
  const sprite = this.add.sprite(480, 310, 'jt_heavy', 0).setScale(2);
  const label = this.add.text(20, 70, 'Current: heavy_double_stick_combo', { fontFamily:'Arial', fontSize:'20px', color:'#ffffff' });
  function play(key) { sprite.play(key); label.setText('Current: ' + key); }
  play('heavy_double_stick_combo');
  this.input.keyboard.on('keydown-ONE', ()=>play('heavy_double_stick_combo'));
  this.input.keyboard.on('keydown-TWO', ()=>play('heavy_overhead_slam'));
  this.input.keyboard.on('keydown-THREE', ()=>play('jumping_kick_to_axe_kick'));
  this.input.keyboard.on('keydown-FOUR', ()=>play('low_followup'));
  this.input.keyboard.on('keydown-FIVE', ()=>play('crouch_stick_thrust'));
  this.input.keyboard.on('keydown-SIX', ()=>play('standing_heavy_finish'));
}

/* =========================================================

   Donny + Hew + JT
   Current fighter stays active.
   Other two flip/jump in, attack, then exit.
   Also loads JT FX v843.
========================================================= */
(function(){
  if(window.MP_TEAM_ULTIMATE_MOTEL_MELTDOWN_V844) return;
  window.MP_TEAM_ULTIMATE_MOTEL_MELTDOWN_V844 = true;

  const MP_MOTEL_TEAM_V844 = ["donny", "hew", "jt"];
  const MP_JT_FX_BASE_V844 = "assets/sprites/player/jt/fx";
  const MP_COMBAT_BASES_V844 = {
    donny: "assets/sprites/player/donny/combat",
    hew: "assets/sprites/player/hew/combat",
    jt: "assets/sprites/player/jt/combat"
  };

  const MP_TEAM_ULT_CONFIG_V844 = {
    name: "Motel Meltdown",
    durationMs: 2600,
    timing: {
      spawnReserve1: 180,
      spawnReserve2: 260,
      starterHit: 620,
      reserve1Hit: 900,
      reserve2Hit: 1180,
      finaleWindup: 1500,
      finaleHit: 1780,
      reservesExit: 2100,
      cleanup: 2600
    },
    damage: {
      starter: 65,
      reserve1: 75,
      reserve2: 75,
      finale: 185
    }
  };

  const MP_TEAM_ULT_ANIMS_V844 = {
    donny: {
      entry: ["donny_roll", "donny_double_jump", "donny_jump"],
      starter: ["donny_special", "donny_attack_heavy", "donny_attack_light"],
      followup: ["donny_feedback_scream", "donny_special", "donny_attack_heavy"],
      finale: ["donny_ultimate", "donny_special", "donny_attack_heavy"],
      exit: ["donny_roll", "donny_double_jump", "donny_jump"],
      idle: ["donny_idle_side", "donny_idle_down", "donny_idle"]
    },
    hew: {
      entry: ["hew_roll", "hew_double_jump", "hew_jump"],
      starter: ["hew_bass_sound", "hew_heavy_bass_hit", "hew_attack_heavy"],
      followup: ["hew_heavy_bass_hit", "hew_heavy_bass_slam", "hew_attack_heavy"],
      finale: ["hew_ultimate_wall_of_sound", "hew_crowd_control_bass_roar", "hew_special"],
      exit: ["hew_roll", "hew_double_jump", "hew_jump"],
      idle: ["hew_idle_side", "hew_idle_down", "hew_idle"]
    },
    jt: {
      entry: ["jt_roll", "jt_air_spin", "jt_double_jump", "jt_jump"],
      starter: ["jt_drum_rush_special", "jt_attack_combo", "jt_attack_light"],
      followup: ["jt_stick_barrage_special", "jt_attack_combo", "jt_attack_heavy"],
      finale: ["jt_ultimate_double_stick_slam", "jt_attack_finisher", "jt_attack_heavy"],
      exit: ["jt_roll", "jt_air_spin", "jt_double_jump", "jt_jump"],
      idle: ["jt_idle_side", "jt_idle_down", "jt_idle"]
    }
  };

  function mpPathV844(base, file){
    return base + "/" + file + "?v=" + VERSION;
  }

  function mpLowerCharV844(value){
    return String(value || "").toLowerCase().replace(/[^a-z0-9_]/g, "");
  }

  function mpGetSelectedTeamKeyV844(){
    try{
      if(typeof getSelectedFighterId === "function"){
        const v = mpLowerCharV844(getSelectedFighterId());
        if(MP_MOTEL_TEAM_V844.includes(v)) return v;
      }
    }catch(e){}

    try{
      const v = mpLowerCharV844(window.selectedFighter || selectedFighter);
      if(MP_MOTEL_TEAM_V844.includes(v)) return v;
    }catch(e){}

    return "jt";
  }

  function mpGetPlayerSpriteV844(scene){
    if(!scene) return null;
    return scene.player || scene.playerSprite || scene.hero || scene.activePlayer || scene.currentPlayer || null;
  }

  function mpAnimExistsV844(scene, key){
    return !!(scene && scene.anims && key && scene.anims.exists(key));
  }

  function mpPlayFirstV844(sprite, keys){
    if(!sprite || !sprite.scene) return null;
    const scene = sprite.scene;
    const list = Array.isArray(keys) ? keys : [keys];
    for(let i = 0; i < list.length; i++){
      const key = list[i];
      if(mpAnimExistsV844(scene, key)){
        try{ sprite.play(key, true); }catch(e){}
        return key;
      }
    }
    return null;
  }

  function mpGetAnimSetV844(charKey, type){
    const cfg = MP_TEAM_ULT_ANIMS_V844[charKey];
    return cfg ? cfg[type] : null;
  }

  function mpGetReservesV844(activeKey){
    return MP_MOTEL_TEAM_V844.filter(function(key){ return key !== activeKey; });
  }

  function mpFindTargetV844(scene, lead){
    if(!scene || !lead) return null;

    let candidates = [];
    const possibleGroups = [scene.enemies, scene.enemyGroup, scene.enemySprites, scene.enemiesGroup];

    possibleGroups.forEach(function(group){
      if(!group) return;
      if(group.getChildren) candidates = candidates.concat(group.getChildren());
      else if(Array.isArray(group)) candidates = candidates.concat(group);
    });

    if(scene.children && scene.children.list){
      scene.children.list.forEach(function(obj){
        if(obj && (obj.isEnemy || obj.enemyType || obj.type === "enemy")) candidates.push(obj);
      });
    }

    candidates = candidates.filter(function(enemy){
      return enemy && enemy !== lead && enemy.active !== false && enemy.visible !== false && typeof enemy.x === "number";
    });

    if(!candidates.length) return null;

    candidates.sort(function(a,b){
      const da = Phaser.Math.Distance.Between(lead.x, lead.y, a.x, a.y);
      const db = Phaser.Math.Distance.Between(lead.x, lead.y, b.x, b.y);
      return da - db;
    });

    return candidates[0];
  }

  function mpFreezeEnemyV844(enemy){
    if(!enemy) return;
    enemy._mpTeamUltWasStunned = enemy.isStunned;
    enemy.isFrozenByTeamUlt = true;
    enemy.isStunned = true;

    if(enemy.body){
      enemy._mpTeamUltOldMoves = enemy.body.moves;
      enemy._mpTeamUltOldVelocity = { x: enemy.body.velocity.x, y: enemy.body.velocity.y };
      try{ enemy.body.setVelocity(0, 0); }catch(e){}
      enemy.body.moves = false;
    }
  }

  function mpUnfreezeEnemyV844(enemy){
    if(!enemy) return;
    enemy.isFrozenByTeamUlt = false;
    enemy.isStunned = !!enemy._mpTeamUltWasStunned;

    if(enemy.body){
      enemy.body.moves = enemy._mpTeamUltOldMoves !== undefined ? enemy._mpTeamUltOldMoves : true;
      try{ enemy.body.setVelocity(0, 0); }catch(e){}
    }
  }

  function mpSpawnFallbackReserveV844(scene, charKey, x, y){
    const color = charKey === "donny" ? 0xffd34a : (charKey === "hew" ? 0x7ad1ff : 0xffffff);
    const box = scene.add.rectangle(x, y - 62, 42, 92, color, 0.9);
    box.characterKey = charKey;
    box.isTeamUltReserve = true;
    box.setDepth && box.setDepth(999);
    return box;
  }

  function mpSpawnReserveV844(scene, charKey, x, y, faceRight){
    let sprite = null;

    const possibleTextures = [
      charKey + "_movement_clean",
      charKey + "_movement",
      charKey + "_actions",
      charKey + "_attacks",
      charKey
    ];

    for(let i = 0; i < possibleTextures.length; i++){
      const key = possibleTextures[i];
      if(scene.textures && scene.textures.exists(key)){
        sprite = scene.add.sprite(x, y, key, 0);
        break;
      }
    }

    if(!sprite) sprite = mpSpawnFallbackReserveV844(scene, charKey, x, y);

    sprite.characterKey = charKey;
    sprite.isTeamUltReserve = true;

    if(sprite.setDepth) sprite.setDepth(999);
    if(sprite.setScale) sprite.setScale(charKey === "hew" ? 0.54 : 0.62);
    if(sprite.setFlipX) sprite.setFlipX(!faceRight);

    return sprite;
  }

  function mpDamageEnemyV844(scene, enemy, amount, vx, vy){
    if(!enemy) return;

    if(typeof enemy.takeDamage === "function"){
      try{ enemy.takeDamage(amount); }catch(e){}
    }else if(typeof damageEnemy === "function"){
      try{ damageEnemy(scene, enemy, amount); }catch(e){}
    }else if(typeof enemy.hp === "number"){
      enemy.hp -= amount;
    }else if(typeof enemy.health === "number"){
      enemy.health -= amount;
    }

    if(enemy.body){
      const oldMoves = enemy.body.moves;
      enemy.body.moves = true;
      try{ enemy.body.setVelocity(vx || 0, vy || 0); }catch(e){}
      if(scene && scene.time){
        scene.time.delayedCall(120, function(){
          if(enemy && enemy.body){
            try{ enemy.body.setVelocity(0, 0); }catch(e){}
            enemy.body.moves = oldMoves;
          }
        });
      }
    }

    try{
      if(enemy.play && scene.anims.exists("enemy_hurt")) enemy.play("enemy_hurt", true);
    }catch(e){}
  }

  function mpSpawnJtFxV844(scene, animKey, x, y, scale){
    if(!scene || !scene.add || !scene.textures || !scene.textures.exists("jt_fx")) return null;
    if(!scene.anims || !scene.anims.exists(animKey)) return null;

    const fx = scene.add.sprite(x, y, "jt_fx", 0);
    fx.setDepth && fx.setDepth(1200);
    fx.setScale && fx.setScale(scale || 1);
    fx.play(animKey, true);
    fx.once && fx.once(Phaser.Animations.Events.ANIMATION_COMPLETE, function(){ fx.destroy(); });
    scene.time.delayedCall(900, function(){ if(fx && fx.active) fx.destroy(); });
    return fx;
  }

  function mpCreateTeamUltTextV844(scene, x, y){
    if(!scene || !scene.add || !scene.add.text) return null;
    const t = scene.add.text(x, y, "MOTEL MELTDOWN", {
      fontFamily: "Arial",
      fontSize: "28px",
      color: "#ffd86b",
      stroke: "#000000",
      strokeThickness: 5
    }).setOrigin(0.5).setDepth(1300);
    scene.tweens.add({ targets: t, alpha: 0, y: y - 34, duration: 1100, delay: 650, onComplete: function(){ t.destroy(); } });
    return t;
  }

  window.mpStartMotelMeltdown = function(scene, activePlayer){
    scene = scene || (activePlayer && activePlayer.scene) || null;
    activePlayer = activePlayer || mpGetPlayerSpriteV844(scene);

    if(!scene || !activePlayer) return false;
    if(scene.isTeamUltimateActive) return false;

    const activeKey = mpGetSelectedTeamKeyV844();
    if(!MP_MOTEL_TEAM_V844.includes(activeKey)) return false;

    const target = mpFindTargetV844(scene, activePlayer);
    if(!target){
      console.warn("Motel Meltdown: no valid target.");
      return false;
    }

    const reserves = mpGetReservesV844(activeKey);
    const reserveAKey = reserves[0];
    const reserveBKey = reserves[1];

    scene.isTeamUltimateActive = true;
    scene.inputLocked = true;
    scene.teamUltimateActive = true;

    const lead = activePlayer;
    const targetX = target.x;
    const targetY = target.y || lead.y || 380;
    const faceRight = !lead.flipX;

    mpFreezeEnemyV844(target);

    if(scene.cameras && scene.cameras.main){
      try{
        scene.cameras.main.shake(80, 0.002);
        if(scene.cameras.main.zoomTo) scene.cameras.main.zoomTo(1.12, 180);
      }catch(e){}
    }

    mpCreateTeamUltTextV844(scene, targetX, Math.max(60, targetY - 160));

    const reserveA = mpSpawnReserveV844(scene, reserveAKey, targetX - 420, targetY - 170, true);
    const reserveB = mpSpawnReserveV844(scene, reserveBKey, targetX + 420, targetY - 170, false);

    mpPlayFirstV844(reserveA, mpGetAnimSetV844(reserveAKey, "entry"));
    mpPlayFirstV844(reserveB, mpGetAnimSetV844(reserveBKey, "entry"));

    if(scene.tweens){
      scene.tweens.add({ targets: lead, x: targetX - 76, y: targetY, duration: 160, ease: "Sine.easeOut" });
      scene.tweens.add({ targets: reserveA, x: targetX - 150, y: targetY, duration: 440, ease: "Quad.easeOut" });
      scene.tweens.add({ targets: reserveB, x: targetX + 150, y: targetY, duration: 440, ease: "Quad.easeOut" });
    }

    scene.time.delayedCall(MP_TEAM_ULT_CONFIG_V844.timing.starterHit, function(){
      mpPlayFirstV844(lead, mpGetAnimSetV844(activeKey, "starter"));
      mpDamageEnemyV844(scene, target, MP_TEAM_ULT_CONFIG_V844.damage.starter, 0, -80);
      mpSpawnJtFxV844(scene, "jt_holy_spark_small_fx", target.x, target.y - 70, 0.85);
    });

    scene.time.delayedCall(MP_TEAM_ULT_CONFIG_V844.timing.reserve1Hit, function(){
      mpPlayFirstV844(reserveA, mpGetAnimSetV844(reserveAKey, "followup"));
      mpDamageEnemyV844(scene, target, MP_TEAM_ULT_CONFIG_V844.damage.reserve1, 80, -90);
      mpSpawnJtFxV844(scene, "jt_holy_hit_burst_fx", target.x, target.y - 70, 0.95);
    });

    scene.time.delayedCall(MP_TEAM_ULT_CONFIG_V844.timing.reserve2Hit, function(){
      mpPlayFirstV844(reserveB, mpGetAnimSetV844(reserveBKey, "followup"));
      mpDamageEnemyV844(scene, target, MP_TEAM_ULT_CONFIG_V844.damage.reserve2, -80, -90);
      mpSpawnJtFxV844(scene, "jt_holy_hit_burst_fx", target.x, target.y - 70, 0.95);
    });

    scene.time.delayedCall(MP_TEAM_ULT_CONFIG_V844.timing.finaleWindup, function(){
      mpPlayFirstV844(lead, mpGetAnimSetV844(activeKey, "finale"));
      mpPlayFirstV844(reserveA, mpGetAnimSetV844(reserveAKey, "finale"));
      mpPlayFirstV844(reserveB, mpGetAnimSetV844(reserveBKey, "finale"));

      if(scene.cameras && scene.cameras.main) scene.cameras.main.shake(160, 0.004);
      mpSpawnJtFxV844(scene, "jt_holy_light_pillar_fx", target.x, target.y - 80, 1.05);
    });

    scene.time.delayedCall(MP_TEAM_ULT_CONFIG_V844.timing.finaleHit, function(){
      mpDamageEnemyV844(scene, target, MP_TEAM_ULT_CONFIG_V844.damage.finale, faceRight ? 360 : -360, -260);

      if(scene.cameras && scene.cameras.main){
        try{
          scene.cameras.main.shake(260, 0.01);
          scene.cameras.main.flash(130, 255, 230, 120);
        }catch(e){}
      }

      mpSpawnJtFxV844(scene, "jt_holy_ultimate_seal_fx", target.x, target.y - 75, 1.3);
      mpSpawnJtFxV844(scene, "jt_holy_ground_burst_fx", target.x, target.y, 1.15);
    });

    scene.time.delayedCall(MP_TEAM_ULT_CONFIG_V844.timing.reservesExit, function(){
      mpPlayFirstV844(reserveA, mpGetAnimSetV844(reserveAKey, "exit"));
      mpPlayFirstV844(reserveB, mpGetAnimSetV844(reserveBKey, "exit"));

      if(scene.tweens){
        scene.tweens.add({ targets: reserveA, x: targetX - 460, y: targetY - 160, alpha: 0, duration: 360, ease: "Quad.easeIn" });
        scene.tweens.add({ targets: reserveB, x: targetX + 460, y: targetY - 160, alpha: 0, duration: 360, ease: "Quad.easeIn" });
      }
    });

    scene.time.delayedCall(MP_TEAM_ULT_CONFIG_V844.timing.cleanup, function(){
      mpUnfreezeEnemyV844(target);

      if(reserveA && reserveA.destroy) reserveA.destroy();
      if(reserveB && reserveB.destroy) reserveB.destroy();

      mpPlayFirstV844(lead, mpGetAnimSetV844(activeKey, "idle"));

      scene.inputLocked = false;
      scene.isTeamUltimateActive = false;
      scene.teamUltimateActive = false;

      if(scene.cameras && scene.cameras.main && scene.cameras.main.zoomTo){
        scene.cameras.main.zoomTo(1, 180);
      }
    });

    return true;
  };

  function mpLoadTeamUltAssetsV844(scene){
    if(!scene || !scene.load) return;

    scene.load.spritesheet("jt_fx", mpPathV844(MP_JT_FX_BASE_V844, "jt_fx_v843_transparent_phaser_ready.png"), {
      frameWidth: 209,
      frameHeight: 209,
      margin: 0,
      spacing: 0
    });
    scene.load.json("jt_fx_data", mpPathV844(MP_JT_FX_BASE_V844, "jt_fx_v843.json"));
  }

  const oldLoadAssetsTeamUltV844 = typeof loadAssets === "function" ? loadAssets : null;
  if(oldLoadAssetsTeamUltV844 && !oldLoadAssetsTeamUltV844.__mp_team_ult_v844){
    loadAssets = function(scene){
      oldLoadAssetsTeamUltV844.call(this, scene);
      mpLoadTeamUltAssetsV844(scene);
    };
    loadAssets.__mp_team_ult_v844 = true;
    window.loadAssets = loadAssets;
  }

  function mpMakeFxAnimV844(scene, key, frames, rate, repeat){
    if(!scene || !scene.anims || !scene.textures || !scene.textures.exists("jt_fx")) return;
    if(scene.anims.exists(key)) scene.anims.remove(key);
    scene.anims.create({
      key: key,
      frames: scene.anims.generateFrameNumbers("jt_fx", { frames: frames }),
      frameRate: rate,
      repeat: repeat
    });
  }

  function mpCreateTeamUltAnimsV844(scene){
    mpMakeFxAnimV844(scene, "jt_holy_drumstick_projectile_fx", [0,1,2,3,4,5], 14, 0);
    mpMakeFxAnimV844(scene, "jt_holy_spark_small_fx", [6,7,8,9,10,11], 14, 0);
    mpMakeFxAnimV844(scene, "jt_holy_hit_burst_fx", [12,13,14,15,16,17], 16, 0);
    mpMakeFxAnimV844(scene, "jt_holy_light_pillar_fx", [18,19,20,21,22,23], 12, 0);
    mpMakeFxAnimV844(scene, "jt_holy_ground_burst_fx", [24,25,26,27,28,29], 12, 0);
    mpMakeFxAnimV844(scene, "jt_holy_ultimate_seal_fx", [30,31,32,33,34,35], 10, 0);
  }

  const oldCreateAllAnimsTeamUltV844 = typeof createAllAnims === "function" ? createAllAnims : null;
  if(oldCreateAllAnimsTeamUltV844 && !oldCreateAllAnimsTeamUltV844.__mp_team_ult_v844){
    createAllAnims = function(scene){
      const result = oldCreateAllAnimsTeamUltV844.call(this, scene);
      mpCreateTeamUltAnimsV844(scene);
      return result;
    };
    createAllAnims.__mp_team_ult_v844 = true;
    window.createAllAnims = createAllAnims;
  }

  function mpInstallTeamUltHotkeyV844(scene){
    if(!scene || scene.__mpTeamUltHotkeyV844) return;
    scene.__mpTeamUltHotkeyV844 = true;

    if(scene.input && scene.input.keyboard){
      scene.input.keyboard.on("keydown-U", function(){
        if(scene.grooveMeter !== undefined && scene.grooveMeter < 100){
          console.warn("Motel Meltdown needs full Groove.");
          return;
        }
        const ok = window.mpStartMotelMeltdown(scene, mpGetPlayerSpriteV844(scene));
        if(ok && scene.grooveMeter !== undefined) scene.grooveMeter = 0;
      });
    }
  }

  const oldGameSceneCreateV844 = window.GameScene && window.GameScene.prototype && window.GameScene.prototype.create;
  if(oldGameSceneCreateV844 && !oldGameSceneCreateV844.__mp_team_ult_v844){
    window.GameScene.prototype.create = function(){
      const result = oldGameSceneCreateV844.apply(this, arguments);
      mpInstallTeamUltHotkeyV844(this);
      return result;
    };
    window.GameScene.prototype.create.__mp_team_ult_v844 = true;
  }

  // Fallback: install from any scene that calls createAllAnims.
  const oldCreateAllAnimsInstallV844 = typeof createAllAnims === "function" ? createAllAnims : null;
  if(oldCreateAllAnimsInstallV844 && !oldCreateAllAnimsInstallV844.__mp_team_ult_hotkey_v844){
    createAllAnims = function(scene){
      const result = oldCreateAllAnimsInstallV844.call(this, scene);
      mpInstallTeamUltHotkeyV844(scene);
      return result;
    };
    createAllAnims.__mp_team_ult_hotkey_v844 = true;
    window.createAllAnims = createAllAnims;
  }

  window.onTeamUltimatePressed = function(scene){
    if(!scene) return false;
    if(scene.grooveMeter !== undefined && scene.grooveMeter < 100) return false;

    const ok = window.mpStartMotelMeltdown(scene, mpGetPlayerSpriteV844(scene));
    if(ok && scene.grooveMeter !== undefined) scene.grooveMeter = 0;
    return ok;
  };
})();

</script>
