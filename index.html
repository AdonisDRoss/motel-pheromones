<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Motel Pheromones</title>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; margin: 0 auto; image-rendering: pixelated; }
  </style>
</head>

<body>

<script>

// =========================
// TITLE SCENE
// =========================
class TitleScene extends Phaser.Scene {
  constructor() {
    super("TitleScene");
  }

  preload() {
    this.load.image("title", "assets/title-screen.png");
    this.load.image("characterSelect", "assets/character-select.png");
  }

  create() {
    this.add.image(480, 270, "title").setDisplaySize(960, 540);

    this.glow = this.add.rectangle(480, 270, 960, 540, 0xff0088, 0.06);

    this.tweens.add({
      targets: this.glow,
      alpha: 0.12,
      duration: 1200,
      yoyo: true,
      repeat: -1
    });

    // RAIN
    this.rain = [];
    for (let i = 0; i < 120; i++) {
      let drop = this.add.rectangle(
        Phaser.Math.Between(0, 960),
        Phaser.Math.Between(0, 540),
        2,
        12,
        0x66ccff,
        0.5
      );
      drop.speed = Phaser.Math.Between(300, 500);
      this.rain.push(drop);
    }

    // FOG
    this.fogLayers = [];
    for (let i = 0; i < 3; i++) {
      let fog = this.add.rectangle(
        480,
        Phaser.Math.Between(200, 500),
        1000,
        120,
        0xff0088,
        0.08
      );

      fog.speed = Phaser.Math.FloatBetween(0.2, 0.6);
      fog.direction = Math.random() > 0.5 ? 1 : -1;

      this.fogLayers.push(fog);
    }

    const pressStart = this.add.text(480, 470, "PRESS START", {
      fontFamily: "monospace",
      fontSize: "28px",
      color: "#ff4fc3"
    }).setOrigin(0.5);

    this.tweens.add({
      targets: pressStart,
      alpha: 0.2,
      duration: 700,
      yoyo: true,
      repeat: -1
    });

    const menuItems = ["START GAME", "OPTIONS", "CREDITS"];
    let selected = 0;
    let menuTexts = [];
    let selector;

    const drawMenu = () => {
      menuTexts.forEach(t => t.destroy());
      if (selector) selector.destroy();
      menuTexts = [];

      for (let i = 0; i < menuItems.length; i++) {
        let color = i === selected ? "#ffffff" : "#888888";

        let text = this.add.text(120, 300 + i * 40, menuItems[i], {
          fontFamily: "monospace",
          fontSize: "24px",
          color: color
        }).setInteractive();

        text.on("pointerdown", () => {
          selected = i;
          drawMenu();

          if (selected === 0) startGame.call(this);
        });

        menuTexts.push(text);
      }

      selector = this.add.text(90, 300 + selected * 40, "▶", {
        fontSize: "24px",
        color: "#ff4fc3"
      });
    };

    drawMenu();

    this.input.keyboard.on("keydown-UP", () => {
      selected = (selected - 1 + menuItems.length) % menuItems.length;
      drawMenu();
    });

    this.input.keyboard.on("keydown-DOWN", () => {
      selected = (selected + 1) % menuItems.length;
      drawMenu();
    });

    this.input.keyboard.on("keydown-ENTER", () => {
      if (selected === 0) startGame.call(this);
    });

    pressStart.setInteractive();
    pressStart.on("pointerdown", () => startGame.call(this));

    const startGame = () => {
      this.cameras.main.fadeOut(300);
      this.time.delayedCall(300, () => {
        this.scene.start("CharacterSelectScene");
      });
    };
  }

  update() {
    this.rain.forEach(drop => {
      drop.y += drop.speed * 0.016;
      if (drop.y > 540) {
        drop.y = 0;
        drop.x = Phaser.Math.Between(0, 960);
      }
    });

    this.fogLayers.forEach(fog => {
      fog.x += fog.speed * fog.direction;
      if (fog.x > 1100) fog.x = -100;
      if (fog.x < -100) fog.x = 1100;
    });
  }
}

// =========================
// CHARACTER SELECT
// =========================
class CharacterSelectScene extends Phaser.Scene {
  constructor() {
    super("CharacterSelectScene");
  }

  create() {
    this.add.image(480, 270, "characterSelect").setDisplaySize(960, 540);

    this.add.text(480, 500, "TAP TO SELECT", {
      fontFamily: "monospace",
      fontSize: "24px",
      color: "#ff4fc3"
    }).setOrigin(0.5);

    this.input.on("pointerdown", () => {
      this.scene.start("GameScene");
    });

    this.input.keyboard.on("keydown-ENTER", () => {
      this.scene.start("GameScene");
    });
  }
}

// =========================
// GAME SCENE
// =========================
class GameScene extends Phaser.Scene {
  constructor() {
    super("GameScene");
  }

  create() {
    this.add.rectangle(480, 270, 960, 540, 0x151515);

    this.add.text(30, 30, "GAME STARTED", {
      fontFamily: "monospace",
      fontSize: "22px",
      color: "#ffffff"
    });
  }
}

// =========================
// CONFIG (LAST)
// =========================
const config = {
  type: Phaser.AUTO,
  width: 960,
  height: 540,
  backgroundColor: "#000",

  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },

  physics: {
    default: "arcade",
    arcade: {
      gravity: { y: 0 },
      debug: false
    }
  },

  scene: [TitleScene, CharacterSelectScene, GameScene]
};

new Phaser.Game(config);

</script>

</body>
</html>
