<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JT Heavy Attacks v837</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
  html,body { margin:0; padding:0; background:#111; color:#fff; font-family:Arial,sans-serif; }
  #game { width:100vw; height:100vh; }
  .note { position:fixed; left:12px; top:12px; background:rgba(0,0,0,.6); padding:10px 12px; border-radius:8px; z-index:2; line-height:1.4; }
</style>
</head>
<body>
<div class="note">
  <strong>JT Heavy Attacks v837</strong><br>
  Sprite sheet: jt_heavy_attacks_v837_phaser_ready.png<br>
  Frame size: 209 x 209<br>
  Keys 1-6 play each heavy animation.
</div>
<div id="game"></div>
<script>
const SHEET = '/mnt/data/jt_heavy_attacks_v837_phaser_ready.png';
const config = {
  type: Phaser.AUTO,
  parent: 'game',
  width: 960,
  height: 540,
  backgroundColor: '#111111',
  pixelArt: true,
  scene: {
    preload,
    create
  }
};
new Phaser.Game(config);
function preload() {
  this.load.spritesheet('jt_heavy', SHEET, { frameWidth: 209, frameHeight: 209 });
}
function create() {
  const anims = [
    ['heavy_double_stick_combo', 0, 5],
    ['heavy_overhead_slam', 6, 11],
    ['jumping_kick_to_axe_kick', 12, 17],
    ['low_followup', 18, 23],
    ['crouch_stick_thrust', 24, 29],
    ['standing_heavy_finish', 30, 35]
  ];
  anims.forEach(([key, start, end]) => {
    this.anims.create({
      key,
      frames: this.anims.generateFrameNumbers('jt_heavy', { start, end }),
      frameRate: 12,
      repeat: 0
    });
  });
  const sprite = this.add.sprite(480, 310, 'jt_heavy', 0).setScale(2);
  const label = this.add.text(20, 70, 'Current: heavy_double_stick_combo', { fontFamily:'Arial', fontSize:'20px', color:'#ffffff' });
  function play(key) { sprite.play(key); label.setText('Current: ' + key); }
  play('heavy_double_stick_combo');
  this.input.keyboard.on('keydown-ONE', ()=>play('heavy_double_stick_combo'));
  this.input.keyboard.on('keydown-TWO', ()=>play('heavy_overhead_slam'));
  this.input.keyboard.on('keydown-THREE', ()=>play('jumping_kick_to_axe_kick'));
  this.input.keyboard.on('keydown-FOUR', ()=>play('low_followup'));
  this.input.keyboard.on('keydown-FIVE', ()=>play('crouch_stick_thrust'));
  this.input.keyboard.on('keydown-SIX', ()=>play('standing_heavy_finish'));
}

/* =========================================================

   Donny + Hew + JT
   Current fighter stays active.
   Other two flip/jump in, attack, then exit.
   Also loads JT FX v843.
========================================================= */
(function(){
  if(window.MP_TEAM_ULTIMATE_MOTEL_MELTDOWN_V844) return;
  window.MP_TEAM_ULTIMATE_MOTEL_MELTDOWN_V844 = true;

  const MP_MOTEL_TEAM_V844 = ["donny", "hew", "jt"];
  const MP_JT_FX_BASE_V844 = "assets/sprites/player/jt/fx";
  const MP_COMBAT_BASES_V844 = {
    donny: "assets/sprites/player/donny/combat",
    hew: "assets/sprites/player/hew/combat",
    jt: "assets/sprites/player/jt/combat"
  };

  const MP_TEAM_ULT_CONFIG_V844 = {
    name: "Motel Meltdown",
    durationMs: 2600,
    timing: {
      spawnReserve1: 180,
      spawnReserve2: 260,
      starterHit: 620,
      reserve1Hit: 900,
      reserve2Hit: 1180,
      finaleWindup: 1500,
      finaleHit: 1780,
      reservesExit: 2100,
      cleanup: 2600
    },
    damage: {
      starter: 65,
      reserve1: 75,
      reserve2: 75,
      finale: 185
    }
  };

  const MP_TEAM_ULT_ANIMS_V844 = {
    donny: {
      entry: ["donny_roll", "donny_double_jump", "donny_jump"],
      starter: ["donny_special", "donny_attack_heavy", "donny_attack_light"],
      followup: ["donny_feedback_scream", "donny_special", "donny_attack_heavy"],
      finale: ["donny_ultimate", "donny_special", "donny_attack_heavy"],
      exit: ["donny_roll", "donny_double_jump", "donny_jump"],
      idle: ["donny_idle_side", "donny_idle_down", "donny_idle"]
    },
    hew: {
      entry: ["hew_roll", "hew_double_jump", "hew_jump"],
      starter: ["hew_bass_sound", "hew_heavy_bass_hit", "hew_attack_heavy"],
      followup: ["hew_heavy_bass_hit", "hew_heavy_bass_slam", "hew_attack_heavy"],
      finale: ["hew_ultimate_wall_of_sound", "hew_crowd_control_bass_roar", "hew_special"],
      exit: ["hew_roll", "hew_double_jump", "hew_jump"],
      idle: ["hew_idle_side", "hew_idle_down", "hew_idle"]
    },
    jt: {
      entry: ["jt_roll", "jt_air_spin", "jt_double_jump", "jt_jump"],
      starter: ["jt_drum_rush_special", "jt_attack_combo", "jt_attack_light"],
      followup: ["jt_stick_barrage_special", "jt_attack_combo", "jt_attack_heavy"],
      finale: ["jt_ultimate_double_stick_slam", "jt_attack_finisher", "jt_attack_heavy"],
      exit: ["jt_roll", "jt_air_spin", "jt_double_jump", "jt_jump"],
      idle: ["jt_idle_side", "jt_idle_down", "jt_idle"]
    }
  };

  function mpPathV844(base, file){
    return base + "/" + file + "?v=" + VERSION;
  }

  function mpLowerCharV844(value){
    return String(value || "").toLowerCase().replace(/[^a-z0-9_]/g, "");
  }

  function mpGetSelectedTeamKeyV844(){
    try{
      if(typeof getSelectedFighterId === "function"){
        const v = mpLowerCharV844(getSelectedFighterId());
        if(MP_MOTEL_TEAM_V844.includes(v)) return v;
      }
    }catch(e){}

    try{
      const v = mpLowerCharV844(window.selectedFighter || selectedFighter);
      if(MP_MOTEL_TEAM_V844.includes(v)) return v;
    }catch(e){}

    return "jt";
  }

  function mpGetPlayerSpriteV844(scene){
    if(!scene) return null;
    return scene.player || scene.playerSprite || scene.hero || scene.activePlayer || scene.currentPlayer || null;
  }

  function mpAnimExistsV844(scene, key){
    return !!(scene && scene.anims && key && scene.anims.exists(key));
  }

  function mpPlayFirstV844(sprite, keys){
    if(!sprite || !sprite.scene) return null;
    const scene = sprite.scene;
    const list = Array.isArray(keys) ? keys : [keys];
    for(let i = 0; i < list.length; i++){
      const key = list[i];
      if(mpAnimExistsV844(scene, key)){
        try{ sprite.play(key, true); }catch(e){}
        return key;
      }
    }
    return null;
  }

  function mpGetAnimSetV844(charKey, type){
    const cfg = MP_TEAM_ULT_ANIMS_V844[charKey];
    return cfg ? cfg[type] : null;
  }

  function mpGetReservesV844(activeKey){
    return MP_MOTEL_TEAM_V844.filter(function(key){ return key !== activeKey; });
  }

  function mpFindTargetV844(scene, lead){
    if(!scene || !lead) return null;

    let candidates = [];
    const possibleGroups = [scene.enemies, scene.enemyGroup, scene.enemySprites, scene.enemiesGroup];

    possibleGroups.forEach(function(group){
      if(!group) return;
      if(group.getChildren) candidates = candidates.concat(group.getChildren());
      else if(Array.isArray(group)) candidates = candidates.concat(group);
    });

    if(scene.children && scene.children.list){
      scene.children.list.forEach(function(obj){
        if(obj && (obj.isEnemy || obj.enemyType || obj.type === "enemy")) candidates.push(obj);
      });
    }

    candidates = candidates.filter(function(enemy){
      return enemy && enemy !== lead && enemy.active !== false && enemy.visible !== false && typeof enemy.x === "number";
    });

    if(!candidates.length) return null;

    candidates.sort(function(a,b){
      const da = Phaser.Math.Distance.Between(lead.x, lead.y, a.x, a.y);
      const db = Phaser.Math.Distance.Between(lead.x, lead.y, b.x, b.y);
      return da - db;
    });

    return candidates[0];
  }

  function mpFreezeEnemyV844(enemy){
    if(!enemy) return;
    enemy._mpTeamUltWasStunned = enemy.isStunned;
    enemy.isFrozenByTeamUlt = true;
    enemy.isStunned = true;

    if(enemy.body){
      enemy._mpTeamUltOldMoves = enemy.body.moves;
      enemy._mpTeamUltOldVelocity = { x: enemy.body.velocity.x, y: enemy.body.velocity.y };
      try{ enemy.body.setVelocity(0, 0); }catch(e){}
      enemy.body.moves = false;
    }
  }

  function mpUnfreezeEnemyV844(enemy){
    if(!enemy) return;
    enemy.isFrozenByTeamUlt = false;
    enemy.isStunned = !!enemy._mpTeamUltWasStunned;

    if(enemy.body){
      enemy.body.moves = enemy._mpTeamUltOldMoves !== undefined ? enemy._mpTeamUltOldMoves : true;
      try{ enemy.body.setVelocity(0, 0); }catch(e){}
    }
  }

  function mpSpawnFallbackReserveV844(scene, charKey, x, y){
    const color = charKey === "donny" ? 0xffd34a : (charKey === "hew" ? 0x7ad1ff : 0xffffff);
    const box = scene.add.rectangle(x, y - 62, 42, 92, color, 0.9);
    box.characterKey = charKey;
    box.isTeamUltReserve = true;
    box.setDepth && box.setDepth(999);
    return box;
  }

  function mpSpawnReserveV844(scene, charKey, x, y, faceRight){
    let sprite = null;

    const possibleTextures = [
      charKey + "_movement_clean",
      charKey + "_movement",
      charKey + "_actions",
      charKey + "_attacks",
      charKey
    ];

    for(let i = 0; i < possibleTextures.length; i++){
      const key = possibleTextures[i];
      if(scene.textures && scene.textures.exists(key)){
        sprite = scene.add.sprite(x, y, key, 0);
        break;
      }
    }

    if(!sprite) sprite = mpSpawnFallbackReserveV844(scene, charKey, x, y);

    sprite.characterKey = charKey;
    sprite.isTeamUltReserve = true;

    if(sprite.setDepth) sprite.setDepth(999);
    if(sprite.setScale) sprite.setScale(charKey === "hew" ? 0.54 : 0.62);
    if(sprite.setFlipX) sprite.setFlipX(!faceRight);

    return sprite;
  }

  function mpDamageEnemyV844(scene, enemy, amount, vx, vy){
    if(!enemy) return;

    if(typeof enemy.takeDamage === "function"){
      try{ enemy.takeDamage(amount); }catch(e){}
    }else if(typeof damageEnemy === "function"){
      try{ damageEnemy(scene, enemy, amount); }catch(e){}
    }else if(typeof enemy.hp === "number"){

      ["keydown-LEFT", "left", true], ["keyup-LEFT", "left", false],
      ["keydown-RIGHT", "right", true], ["keyup-RIGHT", "right", false],
      ["keydown-UP", "up", true], ["keyup-UP", "up", false],
      ["keydown-DOWN", "down", true], ["keyup-DOWN", "down", false],
      ["keydown-A", "left", true], ["keyup-A", "left", false],
      ["keydown-D", "right", true], ["keyup-D", "right", false],
      ["keydown-W", "up", true], ["keyup-W", "up", false],
      ["keydown-S", "down", true], ["keyup-S", "down", false],
      ["keydown-B", "jump", true], ["keyup-B", "jump", false],
      ["keydown-Y", "light", true], ["keyup-Y", "light", false],
      ["keydown-X", "heavy", true], ["keyup-X", "heavy", false],
      ["keydown-K", "kick", true], ["keyup-K", "kick", false],
      ["keydown-L", "block", true], ["keyup-L", "block", false],
      ["keydown-R", "special", true], ["keyup-R", "special", false],
      ["keydown-U", "ultimate", true], ["keyup-U", "ultimate", false],
      ["keydown-T", "taunt", true], ["keyup-T", "taunt", false],
      ["keydown-E", "context", true], ["keyup-E", "context", false]
    ];

    keyMap.forEach(function(row){
      scene.input.keyboard.on(row[0], function(){
        window.MPInput[row[1]] = row[2];
        if(row[2]) window.mpHandleUniversalCombatInput(scene);
      });
    });
  }

  function mpSetBtnStateV845(name, pressed){
    window.MPInput[name] = pressed;
    const btn = document.querySelector('[data-mp-btn="' + name + '"]');
    if(btn) btn.classList.toggle("mpPressed", !!pressed);
    const scene = window.__MP_ACTIVE_GAME_SCENE;
    if(pressed && scene) window.mpHandleUniversalCombatInput(scene);
  }

  function mpMakeBtnV845(label, name, cls){
    const b = document.createElement("button");
    b.className = "mpPadBtn " + (cls || "");
    b.textContent = label;
    b.setAttribute("data-mp-btn", name);
    b.setAttribute("type", "button");

    const down = function(e){
      e.preventDefault();
      e.stopPropagation();
      mpSetBtnStateV845(name, true);
    };
    const up = function(e){
      e.preventDefault();
      e.stopPropagation();
      mpSetBtnStateV845(name, false);
    };

    b.addEventListener("pointerdown", down, {passive:false});
    b.addEventListener("pointerup", up, {passive:false});
    b.addEventListener("pointercancel", up, {passive:false});
    b.addEventListener("pointerleave", up, {passive:false});
    b.addEventListener("touchstart", down, {passive:false});
    b.addEventListener("touchend", up, {passive:false});

    return b;
  }

  function mpUpdateStaticHudV845(scene){
    const charKey = window.mpGetCurrentCharacterKey(scene).toUpperCase();
    const nameEl = document.getElementById("mpPlayerNameV845");
    if(nameEl) nameEl.textContent = charKey;

    const player = mpGetPlayerV845(scene);
    let hp = 100;
    let maxHp = 100;

    if(player){
      hp = typeof player.hp === "number" ? player.hp : (typeof player.health === "number" ? player.health : 100);
      maxHp = typeof player.maxHp === "number" ? player.maxHp : (typeof player.maxHealth === "number" ? player.maxHealth : 100);
    }

    const hpPct = Math.max(0, Math.min(100, (hp / Math.max(1, maxHp)) * 100));
    const hpBar = document.getElementById("mpHpBarV845");
    if(hpBar) hpBar.style.width = hpPct + "%";

    const groove = Math.max(0, Math.min(100, scene && scene.grooveMeter !== undefined ? scene.grooveMeter : (window.MPGroove || 0)));
    const grooveBar = document.getElementById("mpGrooveBarV845");
    if(grooveBar) grooveBar.style.width = groove + "%";

    const combo = scene && (scene.comboCount || scene.currentCombo || window.MPCombo || 0);
    const dot1 = document.getElementById("mpComboDot1V845");
    const dot2 = document.getElementById("mpComboDot2V845");
    if(dot1) dot1.classList.toggle("on", combo >= 5 || scene.comboPip1);
    if(dot2) dot2.classList.toggle("on", combo >= 10 || scene.comboPip2);
  }

  function mpSetUiSceneModeV845(scene){
    const key = scene && scene.scene && scene.scene.key ? String(scene.scene.key).toLowerCase() : "";
    const inGame = key.includes("game") || key.includes("fight") || key.includes("level");
    document.body.classList.toggle("mpInGame", inGame);
    if(inGame) window.__MP_ACTIVE_GAME_SCENE = scene;
  }

  function mpInstallSceneHooksV845(scene){
    if(!scene || scene.__mpUniversalUiHooksV845) return;
    scene.__mpUniversalUiHooksV845 = true;

    mpSetUiSceneModeV845(scene);
    mpInstallUniversalKeyboardV845(scene);

    if(scene.events){
      scene.events.on("update", function(){
        if(window.__MP_ACTIVE_GAME_SCENE === scene){
          mpUpdateStaticHudV845(scene);
        }
      });
      scene.events.once("shutdown", function(){
        if(window.__MP_ACTIVE_GAME_SCENE === scene) window.__MP_ACTIVE_GAME_SCENE = null;
        document.body.classList.remove("mpInGame");
      });
    }
  }

  // Create DOM UI now.
  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", mpCreateStaticUiV845);
  }else{
    mpCreateStaticUiV845();
  }

  // Hook Phaser scene lifecycle globally without breaking existing scenes.
  const oldSceneCreateV845 = Phaser.Scene.prototype.create;
  if(!Phaser.Scene.prototype.create.__mpUniversalUiV845){
    Phaser.Scene.prototype.create = function(){
      const result = oldSceneCreateV845 ? oldSceneCreateV845.apply(this, arguments) : undefined;
      mpInstallSceneHooksV845(this);
      return result;
    };
    Phaser.Scene.prototype.create.__mpUniversalUiV845 = true;
  }

  // Also hook common project helper, if used.
  const oldCreateAllAnimsUniversalV845 = typeof createAllAnims === "function" ? createAllAnims : null;
  if(oldCreateAllAnimsUniversalV845 && !oldCreateAllAnimsUniversalV845.__mpUniversalUiV845){

      mpInstallSceneHooksV845(scene);
      return result;
    };

    window.createAllAnims = createAllAnims;
  }

  // Manual init fallback for current running scene.
  window.mpInstallUniversalControlsAndUi = function(scene){
    mpCreateStaticUiV845();
    mpInstallSceneHooksV845(scene);
  };
})();
