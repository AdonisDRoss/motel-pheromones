/* =========================================================
   VERSUS SPRITE SIZE + SINGLE-SCREEN LOCK PATCH V1
   - Makes player and P2 CPU larger only in Versus mode
   - Keeps Story/Rumble/Co-op sprite scale unchanged
   - Locks Versus to the selected arena screen; no outdoor screen exploration
========================================================= */
(function(){
  if(window.MP_VERSUS_BIG_SPRITES_SCREEN_LOCK_V1) return;
  window.MP_VERSUS_BIG_SPRITES_SCREEN_LOCK_V1 = true;

  if(typeof Game === "undefined" || !Game.prototype) return;

  const MP_VERSUS_SPRITE_MULT = 1.45;

  function mpVsIsVersus(){
    return String(window.selectedGameMode || "").toLowerCase() === "versus";
  }

  function mpVsCleanId(id){
    id = String(id || "DONNY").toUpperCase();
    if(id === "DONNY") return "DONNY";
    if(id === "JT") return "JT";
    if(id === "HEW") return "HEW";
    if(id === "JACKSON") return "JACKSON";
    return "DONNY";
  }

  function mpVsBaseScaleFor(id, textureKey){
    id = mpVsCleanId(id);
    textureKey = String(textureKey || "").toLowerCase();

    const base = {
      DONNY:{ move:DONNY_SCALE, attack:DONNY_SCALE, action:DONNY_SCALE, reaction:DONNY_SCALE },
      JT:{ move:PLAYER_MOVE_SCALE, attack:PLAYER_ATTACK_SCALE, action:JT_ACTION_SCALE, reaction:JT_ACTION_SCALE },
      HEW:{ move:HEW_MOVE_SCALE, attack:HEW_ATTACK_SCALE, action:HEW_ACTION_SCALE, reaction:HEW_REACTION_SCALE },
      JACKSON:{ move:JACKSON_MOVE_SCALE, attack:JACKSON_ATTACK_SCALE, action:JACKSON_ACTION_SCALE, reaction:JACKSON_REACTION_SCALE }
    }[id];

    if(textureKey.indexOf("attacks") >= 0) return base.attack;
    if(textureKey.indexOf("actions") >= 0) return base.action;
    if(textureKey.indexOf("reactions") >= 0) return base.reaction;
    return base.move;
  }

  function mpVsScaleSprite(sprite, id){
    if(!sprite || !sprite.setScale) return;

    const textureKey = sprite.texture && sprite.texture.key ? sprite.texture.key : "";
    const baseScale = mpVsBaseScaleFor(id, textureKey);
    sprite.setScale(baseScale * MP_VERSUS_SPRITE_MULT);
  }

  function mpVsApplyBigSprites(scene){
    if(!scene || !mpVsIsVersus()) return;

    const p1Id = mpVsCleanId(window.selectedFighter || selectedFighter || "DONNY");

    if(scene.player){
      mpVsScaleSprite(scene.player, p1Id);
      scene.player.setOrigin(0.5,1);
    }

    if(scene.poseSprite && scene.poseSprite.visible){
      mpVsScaleSprite(scene.poseSprite, p1Id);
      scene.poseSprite.setOrigin(0.5,1);
    }

    if(scene.shadow && scene.shadow.setScale){
      scene.shadow.setScale(1.18,1.08);
    }

    if(scene.mpvCpu && scene.mpvCpu.sprite){
      const member = scene.mpvCpu.mpvCpuMember || {};
      const cpuId = mpVsCleanId(member.id || member.fighterId || scene.mpvCpu.fighterId || "JACKSON");
      mpVsScaleSprite(scene.mpvCpu.sprite, cpuId);
      scene.mpvCpu.sprite.setOrigin(0.5,1);

      if(scene.mpvCpu.shadow && scene.mpvCpu.shadow.setScale){
        scene.mpvCpu.shadow.setScale(1.18,1.08);
      }
    }
  }

  /* Scale getters only multiply in Versus. Story/Rumble/Co-op stay original. */
  [
    "getPlayerMoveScale",
    "getPlayerAttackScale",
    "getPlayerActionScale",
    "getPlayerReactionScale"
  ].forEach(function(methodName){
    const oldMethod = Game.prototype[methodName];
    if(!oldMethod || oldMethod.mpVsBigSpriteWrapped) return;

    const wrapped = function(){
      const scale = oldMethod.apply(this, arguments);
      return mpVsIsVersus() ? scale * MP_VERSUS_SPRITE_MULT : scale;
    };

    wrapped.mpVsBigSpriteWrapped = true;
    Game.prototype[methodName] = wrapped;
  });

  function mpVsLockArenaScreen(scene){
    if(!scene || !mpVsIsVersus()) return;
    if(typeof selectedLevel === "undefined" || selectedLevel !== "outdoor") return;

    // Lock the outdoor chain to the current Lefty's arena image only.
    // Do NOT flatten player movement while climbing, jumping, or using stairs.
    scene.mpOutdoorScreen = (typeof MP_SCREEN_LEFTYS !== "undefined")
      ? MP_SCREEN_LEFTYS
      : "leftys_outdoor";

    if(typeof LEFTY_SCREEN_MAIN_V2 !== "undefined"){
      scene.leftyScreen = LEFTY_SCREEN_MAIN_V2;
    }

    if(scene.leftyScreenPrompt && scene.leftyScreenPrompt.setText){
      scene.leftyScreenPrompt.setText("");
    }

    if(scene.leftyScreenBg){
      if(scene.textures && scene.textures.exists("outdoor")){
        scene.leftyScreenBg.setTexture("outdoor");
      }
      scene.leftyScreenBg.setDisplaySize(W,H).setDepth(1).setVisible(true);
    }

    if(scene.mpOutdoorBg){
      if(scene.textures && scene.textures.exists("outdoor")){
        scene.mpOutdoorBg.setTexture("outdoor");
      }
      scene.mpOutdoorBg.setDisplaySize(W,H).setDepth(1).setVisible(true);
    }

    if(scene.barricadeFront && scene.barricadeFront.setVisible){
      scene.barricadeFront.setVisible(true);
    }

    const validPlatforms = {
      topLeft:true,
      top:true,
      middle:true,
      behindCar:true,
      bottom:true
    };

    if(!validPlatforms[scene.platform]){
      scene.platform = "middle";
      if(scene.player && !scene.isClimbing && !scene.isJumping && !scene.playerBusy){
        scene.player.y = getPlatformY("middle");
      }
    }

    const playerIsInTransition = !!(
      scene.isClimbing ||
      scene.isJumping ||
      scene.playerBusy ||
      scene.activeJumpTween ||
      scene.currentLadder
    );

    if(scene.player && !playerIsInTransition){
      const bounds = PLATFORM_BOUNDS[scene.platform] || PLATFORM_BOUNDS.middle;
      scene.player.x = Phaser.Math.Clamp(scene.player.x, bounds.minX, bounds.maxX);
      scene.player.y = getPlatformY(scene.platform);
    }

    if(scene.shadow && scene.player && !playerIsInTransition){
      scene.shadow.x = scene.player.x;
      scene.shadow.y = scene.player.y + 5;
    }

    // Keep the CPU on the same arena screen, but do not interrupt player climbs/jumps/stairs.
    // After the player finishes a tier change, the CPU is allowed to snap/follow onto that tier for fighting.
    if(scene.mpvCpu){
      if(!playerIsInTransition && !scene.mpvCpu.transitioning && !scene.mpvCpu.grabbed && !scene.mpvCpu.thrownTime){
        scene.mpvCpu.platform = scene.platform || "middle";
        scene.mpvCpu.homeY = scene.player ? scene.player.y : getPlatformY(scene.platform || "middle");
        scene.mpvCpu.y = scene.mpvCpu.homeY;

        const cpuBounds = PLATFORM_BOUNDS[scene.mpvCpu.platform] || PLATFORM_BOUNDS.middle;
        scene.mpvCpu.x = Phaser.Math.Clamp(scene.mpvCpu.x || cpuBounds.maxX - 90, cpuBounds.minX, cpuBounds.maxX);
      }

      if(scene.mpvCpu.sprite){
        scene.mpvCpu.sprite.y = scene.mpvCpu.y || scene.mpvCpu.homeY || getPlatformY(scene.mpvCpu.platform || "middle");
      }

      if(scene.mpvCpu.shadow && scene.mpvCpu.sprite){
        scene.mpvCpu.shadow.x = scene.mpvCpu.sprite.x;
        scene.mpvCpu.shadow.y = scene.mpvCpu.sprite.y + 5;
      }
    }
  }

  /* Block explicit transition helpers in Versus. */
  if(Game.prototype.checkLeftyScreenTransition){
    const oldCheckLefty = Game.prototype.checkLeftyScreenTransition;
    Game.prototype.checkLeftyScreenTransition = function(){
      if(mpVsIsVersus()) return;
      return oldCheckLefty.apply(this, arguments);
    };
  }

  if(Game.prototype.startLeftyScreenTransition){
    const oldStartLefty = Game.prototype.startLeftyScreenTransition;
    Game.prototype.startLeftyScreenTransition = function(){
      if(mpVsIsVersus()) return;
      return oldStartLefty.apply(this, arguments);
    };
  }

  if(Game.prototype.updateLeftyScreenPrompt){
    const oldPrompt = Game.prototype.updateLeftyScreenPrompt;
    Game.prototype.updateLeftyScreenPrompt = function(){
      if(mpVsIsVersus()){
        if(this.leftyScreenPrompt) this.leftyScreenPrompt.setText("");
        return;
      }
      return oldPrompt.apply(this, arguments);
    };
  }

  if(typeof mpSwitchOutdoorScreen === "function"){
    const oldMpSwitchOutdoorScreen = mpSwitchOutdoorScreen;
    mpSwitchOutdoorScreen = function(scene, screenKey, spawnOverride){
      if(mpVsIsVersus()){
        mpVsLockArenaScreen(scene);
        return;
      }
      return oldMpSwitchOutdoorScreen(scene, screenKey, spawnOverride);
    };
  }

  const oldGameCreate = Game.prototype.create;
  Game.prototype.create = function(){
    oldGameCreate.apply(this, arguments);

    if(mpVsIsVersus()){
      mpVsLockArenaScreen(this);
      mpVsApplyBigSprites(this);

      if(this.time && this.time.delayedCall){
        this.time.delayedCall(120, ()=>{
          mpVsLockArenaScreen(this);
          mpVsApplyBigSprites(this);
        });
      }
    }
  };

  const oldGameUpdate = Game.prototype.update;
  Game.prototype.update = function(time, delta){
    if(mpVsIsVersus()){
      mpVsLockArenaScreen(this);
    }

    if(oldGameUpdate){
      oldGameUpdate.call(this, time, delta);
    }

    if(mpVsIsVersus()){
      mpVsLockArenaScreen(this);
      mpVsApplyBigSprites(this);
    }
  };

  if(Game.prototype.safeUpdate){
    const oldSafeUpdate = Game.prototype.safeUpdate;
    Game.prototype.safeUpdate = function(time, delta){
      if(mpVsIsVersus()){
        mpVsLockArenaScreen(this);
      }

      oldSafeUpdate.call(this, time, delta);

      if(mpVsIsVersus()){
        mpVsLockArenaScreen(this);
        mpVsApplyBigSprites(this);
      }
    };
  }
})();

   END VERSUS SPRITE SIZE + SINGLE-SCREEN LOCK PATCH V1

/* =========================================================
   VERSUS LEFTY ARENA TIER FIX V2
   - Keeps Versus on one screen but re-enables tier movement
   - Bottom lane, second tier, ladders, both side stairs remain usable
   - Jump near the fan roof area from the upper tier to land on the small third tier

(function(){
  if(window.MP_VERSUS_LEFTY_ARENA_TIER_FIX_V2) return;
  window.MP_VERSUS_LEFTY_ARENA_TIER_FIX_V2 = true;

  if(typeof Game === "undefined" || !Game.prototype) return;

  function mpArenaIsVersus(){
    return String(window.selectedGameMode || "").toLowerCase() === "versus";
  }

  function mpArenaIsOutdoorVersus(){
    return mpArenaIsVersus() && typeof selectedLevel !== "undefined" && selectedLevel === "outdoor";
  }

  function mpApplyVersusArenaBounds(){
    // Same-screen arena lanes from the marked white-line areas.
    // bottom = street/front lane
    PLATFORM_BOUNDS.bottom.minX = 118;
    PLATFORM_BOUNDS.bottom.maxX = 878;
    PLATFORM_BOUNDS.bottom.minY = 505;
    PLATFORM_BOUNDS.bottom.maxY = 505;

    // middle = main fighting walkway / second tier
    PLATFORM_BOUNDS.middle.minX = 118;
    PLATFORM_BOUNDS.middle.maxX = 878;
    PLATFORM_BOUNDS.middle.minY = 392;
    PLATFORM_BOUNDS.middle.maxY = 392;

    // top = upper roof walkway reachable by ladders
    PLATFORM_BOUNDS.top.minX = 300;
    PLATFORM_BOUNDS.top.maxX = 860;
    PLATFORM_BOUNDS.top.minY = 253;
    PLATFORM_BOUNDS.top.maxY = 253;

    // topLeft = small third-tier fan roof only
    PLATFORM_BOUNDS.topLeft.minX = 300;
    PLATFORM_BOUNDS.topLeft.maxX = 475;
    PLATFORM_BOUNDS.topLeft.minY = 218;
    PLATFORM_BOUNDS.topLeft.maxY = 218;

    // behind car remains a small lower-left strip.
    PLATFORM_BOUNDS.behindCar.minX = 118;
    PLATFORM_BOUNDS.behindCar.maxX = 300;
    PLATFORM_BOUNDS.behindCar.minY = 443;
    PLATFORM_BOUNDS.behindCar.maxY = 443;
  }

  mpApplyVersusArenaBounds();

  // Jump link from upper roof walkway to the small fan-roof tier.
  if(Array.isArray(JUMP_LINKS) && !JUMP_LINKS.some(l=>l && l.name === "versus_fan_roof_jump")){
    JUMP_LINKS.push({
      name:"versus_fan_roof_jump",
      from:"top",
      to:"topLeft",
      minX:300,
      maxX:500,
      landX:370,
      landY:218
    });
  }

  const MP_ARENA_OLD_CREATE_ZONES = Game.prototype.createPlatformZones;
  Game.prototype.createPlatformZones = function(){
    MP_ARENA_OLD_CREATE_ZONES.call(this);

    if(!mpArenaIsOutdoorVersus()) return;

    mpApplyVersusArenaBounds();

    // Make the two visible ladders more forgiving on touch controls.
    if(Array.isArray(this.ladders)){
      this.ladders.forEach(l=>{
        if(!l) return;
        l.topPlatform = "top";
        l.bottomPlatform = "middle";
        l.topY = getPlatformY("top");
        l.middleY = getPlatformY("middle");
        l.w = Math.max(l.w || 70, 96);
        l.h = Math.max(l.h || 190, 245);

        if(l.zone && l.zone.setSize){
          l.zone.setSize(l.w,l.h);
        }
      });
    }

    // Make both side stairs easier to trigger without changing single-player behavior.
    if(Array.isArray(this.stairs)){
      this.stairs.forEach(s=>{
        if(!s) return;
        if(s.name === "leftStairs"){
          s.x = 116; s.y = 452; s.w = 150; s.h = 135;
          s.middleX = 150; s.middleY = getPlatformY("middle");
          s.bottomX = 122; s.bottomY = getPlatformY("bottom");
        }else if(s.name === "rightStairs"){
          s.x = 846; s.y = 452; s.w = 150; s.h = 135;
          s.middleX = 816; s.middleY = getPlatformY("middle");
          s.bottomX = 872; s.bottomY = getPlatformY("bottom");
        }

        if(s.zone){
          s.zone.setPosition(s.x,s.y);
          if(s.zone.setSize) s.zone.setSize(s.w,s.h);
        }
      });
    }
  };

  const MP_ARENA_OLD_HANDLE_TRANSITIONS = Game.prototype.handlePlatformTransitions;
  Game.prototype.handlePlatformTransitions = function(){
    if(mpArenaIsOutdoorVersus()){
      mpApplyVersusArenaBounds();

      // Let player drop back from fan roof to the upper roof walkway by holding down.
      if(
        this.platform === "topLeft" &&
        !this.playerBusy &&
        !this.isClimbing &&
        !this.isJumping &&
        this.moveY > 0.65
      ){
        this.platform = "top";
        this.player.y = getPlatformY("top");
        this.player.x = Phaser.Math.Clamp(this.player.x, PLATFORM_BOUNDS.top.minX, PLATFORM_BOUNDS.top.maxX);
        if(this.zoneText) this.zoneText.setText("UPPER ROOF");
        return;
      }
    }

    return MP_ARENA_OLD_HANDLE_TRANSITIONS.call(this);
  };

  const MP_ARENA_OLD_GET_BOUNDS = Game.prototype.getCurrentPlatformBounds;
  Game.prototype.getCurrentPlatformBounds = function(){
    if(mpArenaIsOutdoorVersus()){
      mpApplyVersusArenaBounds();
      return PLATFORM_BOUNDS[this.platform] || PLATFORM_BOUNDS.middle;
    }

    return MP_ARENA_OLD_GET_BOUNDS.call(this);
  };

  const MP_ARENA_OLD_APPLY_BOUNDS = Game.prototype.applyPlatformBounds;
  Game.prototype.applyPlatformBounds = function(){
    if(mpArenaIsOutdoorVersus()){
      mpApplyVersusArenaBounds();
      const bounds = PLATFORM_BOUNDS[this.platform] || PLATFORM_BOUNDS.middle;
      this.player.x = Phaser.Math.Clamp(this.player.x, bounds.minX, bounds.maxX);
      this.player.y = getPlatformY(this.platform);
      return;
    }

    return MP_ARENA_OLD_APPLY_BOUNDS.call(this);
  };

  const MP_ARENA_OLD_GET_ROUTE = Game.prototype.getEnemyRoute;
  Game.prototype.getEnemyRoute = function(e){
    if(mpArenaIsOutdoorVersus()){
      if(!e || e.platform === this.platform) return null;

      if(this.platform === "topLeft"){
        return {
          kind:"jump",
          x:Phaser.Math.Clamp(this.player ? this.player.x : 370, PLATFORM_BOUNDS.topLeft.minX, PLATFORM_BOUNDS.topLeft.maxX),
          to:"topLeft",
          destY:getPlatformY("topLeft")
        };
      }

      if(e.platform === "topLeft"){
        return {
          kind:"jump",
          x:Phaser.Math.Clamp(e.x || 370, PLATFORM_BOUNDS.top.minX, PLATFORM_BOUNDS.top.maxX),
          to:"top",
          destY:getPlatformY("top")
        };
      }
    }

    return MP_ARENA_OLD_GET_ROUTE.call(this,e);
  };

  const MP_ARENA_OLD_FINISH_ENEMY_MOVE = Game.prototype.finishEnemyMove;
  Game.prototype.finishEnemyMove = function(e,dt){
    const out = MP_ARENA_OLD_FINISH_ENEMY_MOVE.call(this,e,dt);

    if(mpArenaIsOutdoorVersus() && e && e.platform){
      const bounds = PLATFORM_BOUNDS[e.platform] || PLATFORM_BOUNDS.middle;
      e.x = Phaser.Math.Clamp(e.x, bounds.minX, bounds.maxX);
      e.homeY = getPlatformY(e.platform);
      e.y = e.homeY;
      if(this.updateEnemyVisuals) this.updateEnemyVisuals(e);
    }

    return out;
  };

})();

/* =========================================================
   PICKUP / THROW / GRAB / ENEMY BARK PATCH V1
   - Down + B picks up nearby item or weapon
   - X uses held item or attacks with held weapon
   - A/Y throws held item or weapon
   - B grabs enemies; B throws carried enemies
   - X carries grabbed enemy; X puts carried enemy down
   - Thrown weapons deal 2x weapon damage and knock forward
   - Thrown enemies KO-stun after landing
   - Enemies bark random lines after being hit
========================================================= */
(function(){
  if(window.MP_PICKUP_THROW_GRAB_BARKS_V1) return;
  window.MP_PICKUP_THROW_GRAB_BARKS_V1 = true;

  if(typeof Game === "undefined" || !Game.prototype) return;

  const MP_CARRY_STUN_MS = 3000;
  const MP_THROWN_ENEMY_STUN_MS = 3000;
  const MP_HELD_ITEM_THROW_SPEED = 430;
  const MP_HELD_ITEM_THROW_LIFE = 820;
  const MP_HELD_ITEM_HIT_RANGE = 44;

  const MP_ENEMY_BARKS = [
    "HEY!",
    "OW!",
    "BACK OFF!",
    "YOU'LL PAY!",
    "CHEAP SHOT!",
    "THAT ALL?",
    "WATCH IT!",
    "NOT COOL!",
    "I FELT THAT!",
    "YOU MISSED PRACTICE!"
  ];

  function mpIsPlaying(scene){
    return !!(scene && scene.matchStarted && !scene.matchOver && scene.playerHealth > 0 && !scene.pauseMenuOpen);
  }

  function mpDownHeld(scene){
    return !!(scene && scene.isDownHeld && scene.isDownHeld());
  }

  function mpClearHeldHealthItem(scene){
    if(!scene) return;
    if(scene.heldHealthItemSprite && scene.heldHealthItemSprite.destroy){
      scene.heldHealthItemSprite.destroy();
    }
    scene.heldHealthItemSprite = null;
    scene.heldHealthItem = null;
  }

  function mpHealthThrowDamage(def){
    const heal = def && Number(def.heal || 0);
    return Math.max(7, Math.min(18, Math.round(heal * 0.35) + 5));
  }

  function mpPickupDistance(scene, p){
    if(!scene || !scene.player || !p) return 999999;
    const dx = Math.abs(scene.player.x - p.x);
    const dy = Math.abs(scene.player.y - p.y);
    return dx + dy * 1.25;
  }

  Game.prototype.getNearestCarryablePickup = function(){
    if(!this.player) return null;

    let best = null;
    let bestScore = 999999;

    if(this.weaponPickups){
      this.weaponPickups.forEach(w=>{
        if(!w || w.pickedUp) return;
        if(w.platform !== this.platform) return;
        if(w.screenKey && this.getCurrentWeaponScreenKey && w.screenKey !== this.getCurrentWeaponScreenKey()) return;

        const dx = Math.abs(this.player.x - w.x);
        const dy = Math.abs(this.player.y - w.y);
        if(dx <= 70 && dy <= 54){
          const score = mpPickupDistance(this,w);
          if(score < bestScore){
            bestScore = score;
            best = { kind:"weapon", pickup:w };
          }
        }
      });
    }

    if(this.healthItemPickups){
      const currentScreen = (typeof mpHealthScreenKey === "function") ? mpHealthScreenKey(this) : null;

      this.healthItemPickups.forEach(item=>{
        if(!item || item.pickedUp) return;
        if(item.platform !== this.platform) return;
        if(currentScreen && item.screenKey !== currentScreen) return;

        const dx = Math.abs(this.player.x - item.x);
        const dy = Math.abs(this.player.y - item.y);
        if(dx <= 70 && dy <= 54){
          const score = mpPickupDistance(this,item);
          if(score < bestScore){
            bestScore = score;
            best = { kind:"health", pickup:item };
          }
        }
      });
    }

    return best;
  };

  Game.prototype.pickupHealthItemToHand = function(pickup){
    if(!pickup || pickup.pickedUp || this.heldHealthItem) return false;
    if(this.currentWeapon){
      if(this.zoneText) this.zoneText.setText("HANDS FULL");
      return false;
    }

    pickup.pickedUp = true;
    if(pickup.obj) pickup.obj.setVisible(false);
    if(pickup.label) pickup.label.setVisible(false);

    this.heldHealthItem = {
      id: Date.now() + "_item_" + Phaser.Math.Between(1000,9999),
      type: pickup.type,
      def: pickup.def,
      platform: pickup.platform,
      screenKey: pickup.screenKey
    };

    if(this.makeHealthItemSprite){
      this.heldHealthItemSprite = this.makeHealthItemSprite(
        pickup.type,
        this.player.x,
        this.player.y - 58
      );
    }

    if(this.heldHealthItemSprite){
      this.heldHealthItemSprite.setDepth(this.player.y + 140);
      this.heldHealthItemSprite.setVisible(true);
    }

    if(this.zoneText){
      this.zoneText.setText("PICKED UP: " + pickup.def.label);
    }

    return true;
  };

  Game.prototype.pickupNearestCarryable = function(){
    if(!mpIsPlaying(this)) return false;
    if(this.isClimbing || this.isJumping || this.playerBusy) return false;

    if(this.heldHealthItem){
      if(this.zoneText) this.zoneText.setText("ALREADY HOLDING ITEM");
      return false;
    }

    const target = this.getNearestCarryablePickup();
    if(!target){
      if(this.zoneText) this.zoneText.setText("NOTHING TO PICK UP");
      return false;
    }

    if(target.kind === "weapon"){
      if(this.pickupWeapon(target.pickup)){
        vibrate(VIBE.button);
        return true;
      }
      return false;
    }

    if(target.kind === "health"){
      if(this.pickupHealthItemToHand(target.pickup)){
        vibrate(VIBE.button);
        return true;
      }
      return false;
    }

    return false;
  };

  Game.prototype.updateHeldHealthItemVisual = function(){
    if(!this.heldHealthItem || !this.heldHealthItemSprite || !this.player) return;

    const dir = this.getFacingDir ? this.getFacingDir() : 1;
    const hidden = this.poseSprite && this.poseSprite.visible && !this.isBlocking;

    this.heldHealthItemSprite.setVisible(!hidden);
    this.heldHealthItemSprite.x = this.player.x + dir * 28;
    this.heldHealthItemSprite.y = this.player.y - 58;
    this.heldHealthItemSprite.setDepth(this.player.y + 145);

    if(this.heldHealthItemSprite.setRotation){
      this.heldHealthItemSprite.setRotation(-0.12 * dir);
    }
  };

  Game.prototype.useHeldHealthItem = function(){
    if(!this.heldHealthItem || !this.player) return false;
    if(!mpIsPlaying(this)) return false;
    if(this.playerBusy || this.isClimbing || this.isJumping) return false;

    const held = this.heldHealthItem;
    const def = held.def;
    mpClearHeldHealthItem(this);

    const before = this.playerHealth || 0;
    const maxHp = this.playerMaxHealth || (typeof MP_PLAYER_MAX_HEALTH !== "undefined" ? MP_PLAYER_MAX_HEALTH : 100);
    this.playerHealth = Phaser.Math.Clamp(before + (def.heal || 0), 0, maxHp);

    if(this.applyHealthItemBuff) this.applyHealthItemBuff(def);
    if(this.showHealthItemFX) this.showHealthItemFX({ def:def });

    if(this.zoneText){
      this.zoneText.setText(def.label + " USED +" + (def.heal || 0) + " HP");
    }

    vibrate(VIBE.button);
    return true;
  };

  Game.prototype.startHeldHealthItemThrowAction = function(){
    if(!this.heldHealthItem || !this.player) return false;
    if(!mpIsPlaying(this)) return false;
    if(this.playerBusy || this.isClimbing || this.isJumping) return false;

    this.playerBusy = true;
    this.busyUntil = this.time.now + 420;

    const throwAnim = this.getPlayerAnim ? this.getPlayerAnim("attack_heavy") : null;
    if(throwAnim && hasAnim(this, throwAnim) && hasTex(this, this.getPlayerAttackSheet())){
      this.positionAttackSprite("heavy");
      this.poseSprite.setVisible(true);
  this.lockHewPoseScale && this.lockHewPoseScale();
      this.player.setVisible(false);
      if(typeof replayAnim === "function") replayAnim(this.poseSprite, throwAnim);
      else safePlay(this.poseSprite, throwAnim);
    }else{
      this.player.setTint(0x66ffff);
    }

    this.time.delayedCall(120, ()=>{
      this.throwHeldHealthItem();
    });

    this.time.delayedCall(360, ()=>{
      if(this.player) this.player.clearTint();
      this.forcePlayerReady();
    });

    return true;
  };

  Game.prototype.throwHeldHealthItem = function(){
    if(!this.heldHealthItem || !this.player) return false;

    const held = this.heldHealthItem;
    const def = held.def;
    const dir = this.getFacingDir ? this.getFacingDir() : 1;

    if(this.heldHealthItemSprite && this.heldHealthItemSprite.destroy){
      this.heldHealthItemSprite.destroy();
    }

    this.heldHealthItem = null;
    this.heldHealthItemSprite = null;

    if(!this.thrownWeapons) this.thrownWeapons = [];

    const obj = this.makeHealthItemSprite
      ? this.makeHealthItemSprite(held.type, this.player.x + dir * 42, this.player.y - 58)
      : this.add.circle(this.player.x + dir * 42, this.player.y - 58, 12, 0x66ffff, 1);

    if(!obj) return false;

    obj.setDepth(this.player.y + 160);

    const thrown = {
      kind:"healthItem",
      item:{ type:held.type, def:def },
      obj,
      x:obj.x,
      y:obj.y,
      startY:obj.y,
      platform:this.platform,
      screenKey:held.screenKey,
      dir,
      vx:MP_HELD_ITEM_THROW_SPEED * dir,
      life:MP_HELD_ITEM_THROW_LIFE,
      hitEnemies:new Set(),
      falling:false,
      done:false,
      hitRange:MP_HELD_ITEM_HIT_RANGE,
      damage:mpHealthThrowDamage(def)
    };

    this.thrownWeapons.push(thrown);

    if(this.zoneText){
      this.zoneText.setText("THREW: " + def.label);
    }

    vibrate(VIBE.heavy);
    return true;
  };

  const MP_PICKUP_OLD_START_THROW_FALL = Game.prototype.startThrownWeaponFall;
  Game.prototype.startThrownWeaponFall = function(t){
    if(t && t.kind === "healthItem"){
      if(t.falling || t.done) return;
      t.falling = true;

      const groundY = (typeof mpHealthGroundY === "function")
        ? mpHealthGroundY(this, t.platform)
        : getPlatformY(t.platform);

      this.tweens.add({
        targets:t,
        y:groundY - 20,
        duration:260,
        ease:"Sine.easeIn",
        onUpdate:()=>{
          if(t.obj){
            t.obj.x = t.x;
            t.obj.y = t.y;
          }
        },
        onComplete:()=>{
          if(t.obj && t.obj.destroy) t.obj.destroy();
          if(this.spawnHealthItemPickup){
            this.spawnHealthItemPickup(t.item.type, t.x, groundY, t.platform, t.screenKey || (typeof mpHealthScreenKey === "function" ? mpHealthScreenKey(this) : null));
          }
          t.done = true;
        }
      });
      return;
    }

    if(MP_PICKUP_OLD_START_THROW_FALL){
      return MP_PICKUP_OLD_START_THROW_FALL.call(this,t);
    }
  };

  Game.prototype.damageEnemyFromThrownObject = function(e, damage, dir){
    if(!e || e.dead || e.invulnerable) return;
    const before = e.health;
    this.damageEnemy(e, damage, true);
    if(e && !e.dead && e.health < before){
      const resist = e.knockbackResist || 1;
      e.vx = Math.abs(e.vx || 210) * (dir || 1) * resist;
      e.knockbackTime = Math.max(e.knockbackTime || 0, 650);
      e.busy = true;
      e.state = "stagger";
      if(this.safeEnemyPlay) this.safeEnemyPlay(e,"knockback");
    }
  };

  Game.prototype.checkThrownWeaponEnemyHits = function(t){
    if(!t || !t.item || !this.enemies) return;

    const def = t.item.def || {};
    const isHealthItem = t.kind === "healthItem";
    const hitRange = isHealthItem ? (t.hitRange || MP_HELD_ITEM_HIT_RANGE) : (def.hitRange || 44);
    const damage = isHealthItem
      ? (t.damage || mpHealthThrowDamage(def))
      : Math.max(def.throwDamage || 0, (def.damage || def.throwDamage || 8) * 2);

    this.enemies.forEach(e=>{
      if(!e || e.dead || e.state === "dead") return;
      if(e.platform !== t.platform) return;
      if(e.invulnerable || e.grabbed) return;
      if(t.hitEnemies && t.hitEnemies.has(e)) return;

      const dx = Math.abs(e.x - t.x);
      const dy = Math.abs((e.y - 45) - t.y);

      if(dx <= hitRange && dy <= 58){
        if(!t.hitEnemies) t.hitEnemies = new Set();
        t.hitEnemies.add(e);
        this.damageEnemyFromThrownObject(e, damage, t.dir || 1);

        if(isHealthItem || t.item.type === "rock" || t.item.type === "bottle"){
          t.life = Math.min(t.life, 120);
        }
      }
    });
  };

  /* Enemy-only grab. This bypasses old pickup-on-grab behavior. */
  Game.prototype.startEnemyGrabOnly = function(){
    if(!mpIsPlaying(this)) return;
    if(this.playerBusy || this.isClimbing || this.playerHealth<=0) return;
    if(this.grabbedEnemy) return;

    let target = null;
    let bestDist = 9999;
    const facing = this.getFacingDir ? this.getFacingDir() : 1;

    this.enemies.forEach(e=>{
      if(!e || e.dead || e.state === "dead") return;
      if(e.canBeGrabbed === false || e.enemyType === "doorman") return;
      if(e.platform !== this.platform) return;
      if(e.grabbed || e.thrownTime > 0) return;

      const dx = e.x - this.player.x;
      const dy = Math.abs(this.player.y - e.y);
      const inFront = dx * facing > 0;
      const dist = Math.abs(dx);

      if(inFront && dist < 75 && dy < 45 && dist < bestDist){
        target = e;
        bestDist = dist;
      }
    });

    if(!target){
      this.enemies.forEach(e=>{
        if(!e || e.dead || e.state === "dead") return;
        if(e.canBeGrabbed === false || e.enemyType === "doorman") return;
        if(e.platform !== this.platform) return;
        if(e.grabbed || e.thrownTime > 0) return;

        const dx = Math.abs(this.player.x - e.x);
        const dy = Math.abs(this.player.y - e.y);
        if(dx < 55 && dy < 45 && dx < bestDist){
          target = e;
          bestDist = dx;
        }
      });
    }

    if(!target) return;

    this.clearGrabTimers();
    this.grabbedEnemy = target;
    this.grabMode = "hold";
    this.playerBusy = true;
    this.busyUntil = this.time.now + MP_CARRY_STUN_MS + 250;
    this.isBlocking = false;
    this.isCrouching = false;
    this.isJumping = false;

    target.grabbed = true;
    target.busy = true;
    target.state = "grabbed";
    target.knockbackTime = 0;
    target.attackCooldown = 9999;
    target.vx = 0;
    target.stunUntil = this.time.now + MP_CARRY_STUN_MS;

    if(this.safeEnemyPlay) this.safeEnemyPlay(target,"ko");
    this.showCarryPose();
    this.updateGrabbedEnemy();

    this.grabHoldEvent = this.time.delayedCall(MP_CARRY_STUN_MS, ()=>{
      if(this.grabbedEnemy && this.grabMode === "hold"){
        this.enemyBreakGrab();
      }
    });
  };

  Game.prototype.putDownGrabbedEnemy = function(){
    if(!this.grabbedEnemy) return false;

    const e = this.grabbedEnemy;
    this.clearGrabTimers();
    this.grabbedEnemy = null;
    this.grabMode = "none";

    e.grabbed = false;
    e.busy = true;
    e.state = "stunned";
    e.attackCooldown = MP_THROWN_ENEMY_STUN_MS;
    e.knockbackTime = 0;
    e.vx = 0;
    e.stunUntil = this.time.now + MP_THROWN_ENEMY_STUN_MS;

    if(this.safeEnemyPlay) this.safeEnemyPlay(e,"ko");
    if(this.updateEnemyVisuals) this.updateEnemyVisuals(e);

    this.playerBusy = false;
    this.busyUntil = 0;

    if(this.poseSprite){
      this.poseSprite.stop();
      this.poseSprite.setVisible(false);
    }
    if(this.player){
      this.player.setVisible(true);
      this.player.setScale(this.getPlayerMoveScale());
      safePlay(this.player,this.getPlayerAnim("idle_side"));
    }

    this.time.delayedCall(MP_THROWN_ENEMY_STUN_MS, ()=>{
      if(!e.dead && e.state === "stunned"){
        e.busy = false;
        e.state = "idle";
        e.vx = 0;
        if(this.safeEnemyPlay) this.safeEnemyPlay(e,"idle");
      }
    });

    if(this.zoneText) this.zoneText.setText("ENEMY PUT DOWN");
    return true;
  };

  Game.prototype.finishThrownEnemyStun = function(e){
    if(!e || e.dead) return;

    e.busy = true;
    e.state = "stunned";
    e.thrownTime = 0;
    e.vx = 0;
    e.attackCooldown = MP_THROWN_ENEMY_STUN_MS;
    e.stunUntil = this.time.now + MP_THROWN_ENEMY_STUN_MS;

    if(this.safeEnemyPlay) this.safeEnemyPlay(e,"ko");
    if(this.updateEnemyVisuals) this.updateEnemyVisuals(e);

    this.time.delayedCall(MP_THROWN_ENEMY_STUN_MS, ()=>{
      if(!e.dead && e.state === "stunned"){
        e.busy = false;
        e.state = "idle";
        e.vx = 0;
        if(this.safeEnemyPlay) this.safeEnemyPlay(e,"idle");
      }
    });
  };

  Game.prototype.startCarryEnemy = function(){
    if(!mpIsPlaying(this)) return;
    if(!this.grabbedEnemy) return;
    if(this.grabMode === "carry") return;

    this.clearGrabTimers();
    this.grabMode = "carry";
    this.playerBusy = false;
    this.busyUntil = 0;

    const e = this.grabbedEnemy;
    e.busy = true;
    e.state = "carried";
    e.attackCooldown = 9999;
    e.stunUntil = this.time.now + MP_CARRY_STUN_MS;

    if(this.safeEnemyPlay) this.safeEnemyPlay(e,"ko");
    this.showCarryPose();

    this.carryBreakEvent = this.time.delayedCall(MP_CARRY_STUN_MS, ()=>{
      if(this.grabbedEnemy && this.grabMode === "carry"){
        this.enemyBreakGrab();
      }
    });

    if(this.zoneText) this.zoneText.setText("CARRYING ENEMY");
  };

  Game.prototype.throwGrabbedEnemy = function(){
    if(!mpIsPlaying(this)) return;
    if(!this.grabbedEnemy) return;

    const e = this.grabbedEnemy;
    const dir = this.getFacingDir ? this.getFacingDir() : 1;

    this.clearGrabTimers();
    this.grabbedEnemy = null;
    this.grabMode = "none";
    this.playerBusy = false;
    this.busyUntil = 0;
    this.isBlocking = false;
    this.isCrouching = false;
    this.isJumping = false;

    if(this.poseSprite){
      this.poseSprite.stop();
      this.poseSprite.setVisible(false);
    }
    if(this.player){
      this.player.setVisible(true);
      this.player.setScale(this.getPlayerMoveScale());
      safePlay(this.player,this.getPlayerAnim("idle_side"));
    }

    e.grabbed = false;
    e.busy = true;
    e.state = "thrown";
    e.thrownTime = 850;
    e.thrownHit = new Set();
    e.knockbackTime = 850;
    e.attackCooldown = 1200;
    e.platform = this.platform;
    e.homeY = this.player.y;
    e.health -= THROW_DAMAGE;
    e.vx = dir * THROW_SPEED;

    this.createHitFX(e.x,e.y-55,"hit",THROW_DAMAGE);
    if(this.safeEnemyPlay) this.safeEnemyPlay(e,"knockback");
    if(this.updateEnemyHealthBar) this.updateEnemyHealthBar(e);

    if(e.health <= 0){
      this.killEnemy(e);
      e.thrownTime = 0;
      return;
    }

    if(this.zoneText) this.zoneText.setText("ENEMY THROWN");
  };

  Game.prototype.updateThrownEnemies = function(delta){
    const dt = (delta || 16.67) / 1000;

    this.enemies.forEach(e=>{
      if(!e || e.dead) return;
      if(!e.thrownTime || e.thrownTime <= 0) return;

      e.thrownTime -= delta;
      if(e.thrownTime < 0) e.thrownTime = 0;

      e.x += e.vx * dt;
      e.y = e.homeY;

      this.enemies.forEach(other=>{
        if(!other || other === e) return;
        if(other.dead || other.state === "dead") return;
        if(other.platform !== e.platform) return;
        if(other.grabbed) return;

        if(!e.thrownHit) e.thrownHit = new Set();
        if(e.thrownHit.has(other)) return;

        const dx = Math.abs(e.x - other.x);
        const dy = Math.abs(e.y - other.y);

        if(dx < 70 && dy < 45){
          e.thrownHit.add(other);
          this.damageEnemyFromThrownObject(other, THROW_COLLISION_DAMAGE, Math.sign(e.vx || 1));
        }
      });

      if(e.thrownTime <= 0 && !e.dead && e.state === "thrown"){
        this.finishThrownEnemyStun(e);
      }

      if(this.updateEnemyVisuals) this.updateEnemyVisuals(e);
    });
  };

  const MP_PICKUP_OLD_START_GRAB = Game.prototype.startGrab;
  Game.prototype.startGrab = function(){
    return this.startEnemyGrabOnly();
  };

  const MP_PICKUP_OLD_CONTEXT_B = Game.prototype.startContextB;
  Game.prototype.startContextB = function(){
    if(this.mpControlsOpen){
      if(window.mpDestroyControlsOverlay) window.mpDestroyControlsOverlay(this);
      return;
    }
    if(!mpIsPlaying(this)) return;
    this.recoverActionInput();

    if(this.grabbedEnemy && this.grabMode === "carry"){
      this.throwGrabbedEnemy();
      return;
    }

    if(this.grabbedEnemy && this.grabMode === "hold"){
      this.throwGrabbedEnemy();
      return;
    }

    if(mpDownHeld(this)){
      this.pickupNearestCarryable();
      return;
    }

    this.startEnemyGrabOnly();
  };

  const MP_PICKUP_OLD_START_ATTACK = Game.prototype.startAttack;
  Game.prototype.startAttack = function(type){
    if(this.grabbedEnemy){
      if(this.grabMode === "carry"){
        this.putDownGrabbedEnemy();
      }else{
        this.startCarryEnemy();
      }
      return;
    }

    if(this.heldHealthItem){
      if(type === "light"){
        this.useHeldHealthItem();
      }else{
        this.startHeldHealthItemThrowAction();
      }
      return;
    }

    return MP_PICKUP_OLD_START_ATTACK.call(this,type);
  };

  const MP_PICKUP_OLD_CONTEXT_Y = Game.prototype.startContextY;
  Game.prototype.startContextY = function(){
    if(this.heldHealthItem){
      this.startHeldHealthItemThrowAction();
      return;
    }
    if(this.currentWeapon){
      this.startWeaponThrowAction();
      return;
    }
    return MP_PICKUP_OLD_CONTEXT_Y.call(this);
  };

  const MP_PICKUP_OLD_CONTEXT_KICK = Game.prototype.startContextKick;
  Game.prototype.startContextKick = function(){
    if(this.heldHealthItem){
      this.startHeldHealthItemThrowAction();
      return;
    }
    if(this.currentWeapon){
      this.startWeaponThrowAction();
      return;
    }
    return MP_PICKUP_OLD_CONTEXT_KICK.call(this);
  };

  const MP_PICKUP_OLD_SAFE_UPDATE = Game.prototype.safeUpdate;
  Game.prototype.safeUpdate = function(time,delta){
    MP_PICKUP_OLD_SAFE_UPDATE.call(this,time,delta);
    this.updateHeldHealthItemVisual();
  };

  Game.prototype.tryEnemyBark = function(e){
    if(!e || e.dead) return;
    if(e.mpvCpuOpponent) return;
    if(this.time.now < (e.nextBarkTime || 0)) return;
    if(Phaser.Math.Between(1,100) > 28) return;

    const line = MP_ENEMY_BARKS[Phaser.Math.Between(0, MP_ENEMY_BARKS.length - 1)];
    e.nextBarkTime = this.time.now + Phaser.Math.Between(1800,3200);

    if(this.sayDoorman){
      this.sayDoorman(e,line,1250);
      return;
    }

    const txt = this.add.text(e.x, e.y - 118, line, {
      font:"13px monospace",
      fill:"#ffffff",
      backgroundColor:"#000000",
      stroke:"#ff4fc3",
      strokeThickness:2
    }).setOrigin(0.5).setDepth(16001);

    this.tweens.add({
      targets:txt,
      y:txt.y - 24,
      alpha:0,
      duration:900,
      onComplete:()=>txt.destroy()
    });
  };

  const MP_PICKUP_OLD_DAMAGE_ENEMY = Game.prototype.damageEnemy;
  Game.prototype.damageEnemy = function(e,damage,stagger=false){
    const before = e ? e.health : null;
    const result = MP_PICKUP_OLD_DAMAGE_ENEMY.call(this,e,damage,stagger);
    if(e && before !== null && e.health < before){
      this.tryEnemyBark(e);
    }
    return result;
  };

})();

/* =========================================================
   NON-VERSUS ZOOMED CAMERA UI PLACEMENT PATCH V1
   - Keeps Versus layout untouched
   - Repositions/scales mobile controls for zoomed Story/Rumble/Co-op screens
   - Moves player info/HUD text into the marked upper-left screen area
========================================================= */
(function(){
  if(window.MP_NONVERSUS_ZOOMED_UI_PATCH_V1) return;
  window.MP_NONVERSUS_ZOOMED_UI_PATCH_V1 = true;

  function mpNvIsVersus(){
    return String(window.selectedGameMode || "").toLowerCase() === "versus";
  }

  function mpNvZoom(scene){
    if(!scene || !scene.cameras || !scene.cameras.main) return 1;
    return scene.cameras.main.zoom || 1;
  }

  function mpNvScreenX(scene, x){
    return x / mpNvZoom(scene);
  }

  function mpNvScreenY(scene, y){
    return y / mpNvZoom(scene);
  }

  function mpNvPin(obj, screenX, screenY, baseScale){
    if(!obj) return;
    const scene = obj.scene;
    const z = mpNvZoom(scene);
    if(obj.setPosition) obj.setPosition(screenX / z, screenY / z);
    if(obj.setScrollFactor) obj.setScrollFactor(0);
    if(obj.setScale) obj.setScale((baseScale === undefined ? 1 : baseScale) / z);
    if(obj.setDepth && (obj.depth || 0) < 90000) obj.setDepth(90000);
  }

  function mpNvPinText(obj, screenX, screenY){
    if(!obj) return;
    const z = mpNvZoom(obj.scene);
    if(obj.setPosition) obj.setPosition(screenX / z, screenY / z);
    if(obj.setScrollFactor) obj.setScrollFactor(0);
    if(obj.setScale) obj.setScale(1 / z);
    if(obj.setDepth) obj.setDepth(92000);
  }

  function mpNvTrack(scene, obj){
    if(!scene.mpNvUiObjects) scene.mpNvUiObjects = [];
    if(obj) scene.mpNvUiObjects.push(obj);
    return obj;
  }

  function mpNvMakeCircle(scene, screenX, screenY, radius, color, alpha, depth){
    const z = mpNvZoom(scene);
    const obj = scene.add.circle(screenX / z, screenY / z, radius, color, alpha)
      .setDepth(depth)
      .setScrollFactor(0)
      .setScale(1 / z);
    obj.mpNvScreenX = screenX;
    obj.mpNvScreenY = screenY;
    obj.mpNvBaseScale = 1;
    return mpNvTrack(scene,obj);
  }

  function mpNvMakeText(scene, screenX, screenY, label, cfg, depth){
    const z = mpNvZoom(scene);
    const obj = scene.add.text(screenX / z, screenY / z, label, cfg)
      .setDepth(depth)
      .setScrollFactor(0)
      .setScale(1 / z);
    obj.mpNvScreenX = screenX;
    obj.mpNvScreenY = screenY;
    obj.mpNvBaseScale = 1;
    return mpNvTrack(scene,obj);
  }

  const MP_NV_OLD_MOBILE_BUTTON = Game.prototype.mobileButton;
  Game.prototype.mobileButton = function(x, y, label, color, down, up = null){
    if(mpNvIsVersus()){
      return MP_NV_OLD_MOBILE_BUTTON.call(this,x,y,label,color,down,up);
    }

    const size = v => v * CONTROL_ZOOM;
    const font = v => Math.round(v * CONTROL_ZOOM) + "px monospace";
    const z = mpNvZoom(this);
    const wx = x / z;
    const wy = y / z;
    const hitR = size(42);
    const faceR = size(25);
    const inv = 1 / z;

    const hit = this.add.circle(wx, wy, hitR, 0xffffff, 0.01)
      .setInteractive({ useHandCursor:true })
      .setDepth(96000)
      .setScrollFactor(0)
      .setScale(inv);

    const shadow = this.add.circle(wx + (2 / z), wy + (3 / z), faceR, 0x000000, 0.22)
      .setDepth(96001)
      .setScrollFactor(0)
      .setScale(inv);

    const face = this.add.circle(wx, wy, faceR, color, 0.82)
      .setStrokeStyle(2, 0xffffff, 0.50)
      .setDepth(96002)
      .setScrollFactor(0)
      .setScale(inv);

    const shine = this.add.circle(wx - (5 / z), wy - (5 / z), size(8), 0xffffff, 0.16)
      .setDepth(96003)
      .setScrollFactor(0)
      .setScale(inv);

    const text = this.add.text(wx, wy, label, {
      font: font(label.length > 1 ? 12 : 15),
      fill: "#ffffff",
      stroke: "#000000",
      strokeThickness: 3
    })
      .setOrigin(0.5)
      .setDepth(96004)
      .setScrollFactor(0)
      .setScale(inv);

    const btn = { hit, shadow, face, shine, text, label, mpNvScreenX:x, mpNvScreenY:y };

    [hit,shadow,face,shine,text].forEach(obj=>{
      obj.mpNvScreenX = x;
      obj.mpNvScreenY = y;
      obj.mpNvBaseScale = 1;
      mpNvTrack(this,obj);
    });

    hit.on("pointerdown", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      this.ensureRoundActive();
      this.readInput();
      this.recoverActionInput();
      vibrate(VIBE.button);
      if(down) down();
    });

    hit.on("pointerup", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      if(up) up();
    });

    hit.on("pointerout", () => {
      if(up) up();
    });

    if(!this.mobileButtons) this.mobileButtons = [];
    this.mobileButtons.push(btn);

    return btn;
  };

  const MP_NV_OLD_MAKE_MOBILE = Game.prototype.makeMobileControls;
  Game.prototype.makeMobileControls = function(){
    if(mpNvIsVersus()){
      return MP_NV_OLD_MAKE_MOBILE.call(this);
    }

    const size = v => v * CONTROL_ZOOM;
    const font = v => Math.round(v * CONTROL_ZOOM) + "px monospace";
    const z = mpNvZoom(this);
    const inv = 1 / z;

    this.mobileUI = {};
    this.mobileButtons = [];
    this.mpNvUiObjects = [];
    this.input.topOnly = false;

    // Non-versus screen positions. These are true screen coordinates and are corrected for camera zoom.
    const bx = 118;
    const by = H - 145;
    const baseR = size(46);
    const knobR = size(19);

    const stickBase = mpNvMakeCircle(this, bx, by, baseR, 0xffffff, 0.10, 94000)
      .setStrokeStyle(2, 0xffffff, 0.18);

    const knob = mpNvMakeCircle(this, bx, by, knobR, 0xffffff, 0.28, 94001)
      .setStrokeStyle(2, 0xffffff, 0.25);

    this.mobileUI.stickBase = stickBase;
    this.mobileUI.stickKnob = knob;

    let dragging = false;

    const moveStick = p => {
      const zoomNow = mpNvZoom(this);
      let dx = p.x - bx;
      let dy = p.y - by;
      const d = Math.sqrt(dx * dx + dy * dy);

      if(d > baseR){
        dx = (dx / d) * baseR;
        dy = (dy / d) * baseR;
      }

      knob.x = (bx + dx) / zoomNow;
      knob.y = (by + dy) / zoomNow;
      knob.setScale(1 / zoomNow);

      this.stickX = dx / baseR;
      this.stickY = dy / baseR;
    };

    this.input.on("pointerdown", p => {
      if(Phaser.Math.Distance.Between(p.x, p.y, bx, by) < size(84)){
        dragging = true;
        moveStick(p);
      }
    });

    this.input.on("pointermove", p => {
      if(dragging) moveStick(p);
    });

    const releaseStick = () => {
      dragging = false;
      const zoomNow = mpNvZoom(this);
      knob.x = bx / zoomNow;
      knob.y = by / zoomNow;
      knob.setScale(1 / zoomNow);
      this.stickX = 0;
      this.stickY = 0;
    };

    this.input.on("pointerup", releaseStick);
    this.input.on("pointerupoutside", releaseStick);

    // Diamond pad moved to the marked lower-right area, corrected for non-versus camera zoom.
    const diamondX = W - 112;
    const diamondY = H - 122;
    const gap = 46;

    this.mobileButton(diamondX, diamondY - gap, "X", 0x4d7cff, () => this.startAttack("light"));
    this.mobileButton(diamondX - gap, diamondY, "Y", 0x4fd35d, () => this.startContextY());
    this.mobileButton(diamondX + gap, diamondY, "A", 0xff5a5a, () => this.startContextKick());
    this.mobileButton(diamondX, diamondY + gap, "B", 0xffd84d, () => this.startContextB());

    this.mobileButton(diamondX - 64, diamondY - 68, "SP", 0x8f72ff, () => this.startAttack("heavy"));

    this.mobileButton(diamondX - 142, diamondY + 6, "CR", 0x8a8a8a, () => {
      this.recoverActionInput();
      this.startCrouch(true);
    });

    const menuX = CX;
    const menuY = H - 72;

    const menuHit = this.add.rectangle(menuX / z, menuY / z, size(96), size(30), 0x000000, 0.28)
      .setInteractive({ useHandCursor:true })
      .setDepth(95000)
      .setScrollFactor(0)
      .setScale(inv);

    const menuFace = this.add.rectangle(menuX / z, menuY / z, size(96), size(30), 0xffffff, 0.10)
      .setStrokeStyle(2, 0xffffff, 0.30)
      .setDepth(95001)
      .setScrollFactor(0)
      .setScale(inv);

    const menuText = this.add.text(menuX / z, menuY / z, "MENU", {
      font: font(13),
      fill: "#fff"
    })
      .setOrigin(0.5)
      .setDepth(95002)
      .setScrollFactor(0)
      .setScale(inv);

    [menuHit,menuFace,menuText].forEach(obj=>{
      obj.mpNvScreenX = menuX;
      obj.mpNvScreenY = menuY;
      obj.mpNvBaseScale = 1;
      mpNvTrack(this,obj);
    });

    this.mobileUI.menuHit = menuHit;
    this.mobileUI.menuFace = menuFace;
    this.mobileUI.menuText = menuText;

    menuHit.on("pointerdown", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      this.togglePauseMenu();
    });
  };

  function mpNvLayoutTextHud(scene){
    if(!scene || mpNvIsVersus()) return;

    const positions = [
      {prefix:"CHAR:", x:114, y:64},
      {prefix:"LEVEL:", x:114, y:88},
      {prefix:"COMBO:", x:114, y:112},
      {prefix:"HP:", x:114, y:136}
    ];

    if(scene.children && scene.children.list){
      scene.children.list.forEach(obj=>{
        if(!obj || typeof obj.text !== "string") return;
        const txt = obj.text.toUpperCase();
        const pos = positions.find(row => txt.indexOf(row.prefix) === 0);
        if(pos) mpNvPinText(obj,pos.x,pos.y);
      });
    }

    if(scene.zoneText){
      mpNvPinText(scene.zoneText, CX, 42);
      if(scene.zoneText.setOrigin) scene.zoneText.setOrigin(0.5,0);
      if(scene.zoneText.setDepth) scene.zoneText.setDepth(92000);
    }

    if(scene.comboText) mpNvPinText(scene.comboText,114,112);
    if(scene.playerHealthText) mpNvPinText(scene.playerHealthText,114,136);
    if(scene.debugInputText) mpNvPinText(scene.debugInputText,114,160);
  }

  function mpNvRelayoutUiObjects(scene){
    if(!scene || mpNvIsVersus()) return;
    const z = mpNvZoom(scene);

    if(scene.mpNvUiObjects && scene.mpNvUiObjects.length){
      scene.mpNvUiObjects.forEach(obj=>{
        if(!obj || obj.destroyed) return;
        if(obj === (scene.mobileUI && scene.mobileUI.stickKnob)) return;
        if(obj.mpNvScreenX !== undefined && obj.mpNvScreenY !== undefined){
          obj.x = obj.mpNvScreenX / z;
          obj.y = obj.mpNvScreenY / z;
          if(obj.setScale) obj.setScale((obj.mpNvBaseScale || 1) / z);
          if(obj.setScrollFactor) obj.setScrollFactor(0);
        }
      });
    }

    mpNvLayoutTextHud(scene);
  }

  const MP_NV_OLD_CREATE = Game.prototype.create;
  Game.prototype.create = function(){
    MP_NV_OLD_CREATE.call(this);
    if(!mpNvIsVersus()){
      this.time.delayedCall(60,()=>mpNvRelayoutUiObjects(this));
      this.time.delayedCall(180,()=>mpNvRelayoutUiObjects(this));
    }
  };

  const MP_NV_OLD_SAFE_UPDATE = Game.prototype.safeUpdate;
  if(MP_NV_OLD_SAFE_UPDATE){
    Game.prototype.safeUpdate = function(time,delta){
      MP_NV_OLD_SAFE_UPDATE.call(this,time,delta);
      if(!mpNvIsVersus()) mpNvRelayoutUiObjects(this);
    };
  }

  const MP_NV_OLD_UPDATE = Game.prototype.update;
  if(MP_NV_OLD_UPDATE){
    Game.prototype.update = function(time,delta){
      MP_NV_OLD_UPDATE.call(this,time,delta);
      if(!mpNvIsVersus()) mpNvRelayoutUiObjects(this);
    };
  }
})();

/* =========================================================
   ENDGAME PAUSE + 3-SLOT INVENTORY CONTROL PATCH V1
   - MENU works during victory/defeat/draw/end screens
   - Pause menu has Options, Inventory Menu, and Back to Title
   - Up + X stores the held/nearby item into inventory
   - Inventory X uses food or equips weapons
   - Inventory B drops the selected item
========================================================= */
(function(){
  if(window.MP_ENDGAME_PAUSE_INVENTORY_V1) return;
  window.MP_ENDGAME_PAUSE_INVENTORY_V1 = true;

  if(typeof Game === "undefined" || !Game.prototype) return;

  const MP_ENDMENU_DEPTH = 310000;
  const MP_ENDINV_DEPTH = 330000;
  const MP_FINAL_INV_MAX = 3;

  function mpInvMax(){
    return (typeof mpGetSharedInventoryMax === "function")
      ? mpGetSharedInventoryMax()
      : MP_FINAL_INV_MAX;
  }

  function mpIsFoodItem(item){
    if(typeof mpIsFoodInventoryItem === "function"){
      return mpIsFoodInventoryItem(item);
    }
    return !!(item && item.itemKind === "food");
  }

  function mpIsWeaponItem(item){
    if(typeof mpIsWeaponInventoryItem === "function"){
      return mpIsWeaponInventoryItem(item);
    }
    return !!(item && item.itemKind !== "food");
  }

  function mpLabel(item){
    return (item && (item.label || (item.def && item.def.label))) || "ITEM";
  }

  function mpNowId(prefix){
    const rand = (window.Phaser && Phaser.Math) ? Phaser.Math.Between(1000,9999) : Math.floor(Math.random()*9000+1000);
    return Date.now() + "_" + prefix + "_" + rand;
  }

  function mpPlayingOrEnded(scene){
    return !!(scene && (scene.matchStarted || scene.matchOver || scene.victoryShown || scene.playerHealth <= 0));
  }

  function mpDestroyPauseOnly(scene){
    if(!scene) return;
    if(scene.pauseItems && scene.pauseItems.length){
      scene.pauseItems.forEach(obj=>{
        if(obj && obj.destroy) obj.destroy();
      });
    }
    scene.pauseItems = [];
  }

  function mpDestroyInventoryOnly(scene){
    if(!scene) return;
    if(scene.inventoryItems && scene.inventoryItems.length){
      scene.inventoryItems.forEach(obj=>{
        if(obj && obj.destroy) obj.destroy();
      });
    }
    scene.inventoryItems = [];
    scene.inventoryRows = [];
    scene.inventoryOpen = false;
  }

  function mpCloseControlsIfOpen(scene){
    if(scene && scene.mpControlsOpen && window.mpDestroyControlsOverlay){
      window.mpDestroyControlsOverlay(scene);
    }
  }

  function mpUseFoodFromInventory(scene,index){
    if(!scene || !scene.inventory) return false;
    if(index < 0 || index >= scene.inventory.length) return false;

    const item = scene.inventory[index];
    if(!mpIsFoodItem(item)) return false;

    const def = item.def || {};
    const heal = Number(def.heal || 0);
    const maxHp = scene.playerMaxHealth || (typeof MP_PLAYER_MAX_HEALTH !== "undefined" ? MP_PLAYER_MAX_HEALTH : 100);

    scene.playerHealth = Phaser.Math.Clamp((scene.playerHealth || 0) + heal, 0, maxHp);

    if(scene.applyHealthItemBuff) scene.applyHealthItemBuff(def);

    if(scene.showHealthItemFX && scene.player){
      scene.showHealthItemFX({
        def:def,
        x:scene.player.x,
        y:scene.player.y,
        pickedUp:true
      });
    }

    scene.inventory.splice(index,1);

    if(index < (scene.currentWeaponIndex || 0)){
      scene.currentWeaponIndex--;
    }

    if(scene.zoneText){
      scene.zoneText.setText(mpLabel(item) + " USED +" + heal + " HP");
    }

    return true;
  }

  function mpUnequipWeaponButKeepInInventory(scene){
    if(!scene) return;

    scene.currentWeaponIndex = -1;
    scene.currentWeapon = null;

    if(scene.destroyHeldWeaponSprite){
      scene.destroyHeldWeaponSprite();
    }else if(scene.weaponSprite && scene.weaponSprite.destroy){
      scene.weaponSprite.destroy();
      scene.weaponSprite = null;
    }
  }

  Game.prototype.mpStoreHeldOrNearbyToInventory = function(){
    if(!this.inventory) this.inventory = [];

    if(this.inventory.length >= mpInvMax()){
      if(this.zoneText) this.zoneText.setText("INVENTORY FULL");
      return true;
    }

    // Store a health/food item currently held in the player's hand.
    if(this.heldHealthItem){
      const held = this.heldHealthItem;
      const def = held.def || {};

      if(this.heldHealthItemSprite && this.heldHealthItemSprite.destroy){
        this.heldHealthItemSprite.destroy();
      }

      this.heldHealthItem = null;
      this.heldHealthItemSprite = null;

      this.inventory.push({
        id: mpNowId("food"),
        itemKind: "food",
        type: held.type,
        label: def.label || held.type || "ITEM",
        def: def
      });

      if(this.zoneText){
        this.zoneText.setText("STORED: " + (def.label || held.type || "ITEM"));
      }

      return true;
    }

    // Put the currently equipped weapon away without removing it from inventory.
    if(this.currentWeapon){
      const label = mpLabel(this.currentWeapon);
      mpUnequipWeaponButKeepInInventory(this);

      if(this.zoneText){
        this.zoneText.setText("STORED: " + label);
      }

      return true;
    }

    // If standing over something, store it straight into inventory.
    const target = this.getNearestCarryablePickup ? this.getNearestCarryablePickup() : null;

    if(target && target.kind === "health" && target.pickup){
      if(this.pickupFoodToInventory){
        return this.pickupFoodToInventory(target.pickup);
      }

      const p = target.pickup;
      p.pickedUp = true;
      if(p.obj) p.obj.setVisible(false);
      if(p.label) p.label.setVisible(false);

      this.inventory.push({
        id: mpNowId("food"),
        itemKind: "food",
        type: p.type,
        label: p.def && p.def.label ? p.def.label : p.type,
        def: p.def || {}
      });

      if(this.zoneText) this.zoneText.setText("STORED: " + (p.def && p.def.label ? p.def.label : p.type));
      return true;
    }

    if(target && target.kind === "weapon" && target.pickup){
      const beforeLen = this.inventory.length;
      const ok = this.pickupWeapon ? this.pickupWeapon(target.pickup) : false;

      if(ok){
        // pickupWeapon equips automatically; Up+X means store, so unequip it.
        mpUnequipWeaponButKeepInInventory(this);

        const last = this.inventory[Math.max(0, beforeLen)];
        if(this.zoneText){
          this.zoneText.setText("STORED: " + mpLabel(last || target.pickup));
        }

        return true;
      }
    }

    if(this.zoneText){
      this.zoneText.setText("NOTHING TO STORE");
    }

    return true;
  };

  /* ---------------------------------------------------------
     Inventory actions
  --------------------------------------------------------- */

  Game.prototype.useOrEquipSelectedInventoryItem = function(){
    if(!this.inventoryOpen) return false;
    if(!this.inventory || this.inventory.length <= 0){
      if(this.zoneText) this.zoneText.setText("NO ITEMS");
      return false;
    }

    const index = Phaser.Math.Clamp(this.selectedInventoryIndex || 0, 0, this.inventory.length - 1);
    const item = this.inventory[index];

    if(mpIsFoodItem(item)){
      mpUseFoodFromInventory(this,index);
    }else{
      if(this.equipWeaponIndex){
        this.equipWeaponIndex(index);
      }
      if(this.zoneText){
        this.zoneText.setText("EQUIPPED: " + mpLabel(item));
      }
    }

    this.openInventoryMenu();
    return true;
  };

  Game.prototype.dropSelectedInventoryItem = function(){
    if(!this.inventoryOpen) return false;
    if(!this.inventory || this.inventory.length <= 0){
      if(this.zoneText) this.zoneText.setText("NO ITEMS");
      return false;
    }

    const index = Phaser.Math.Clamp(this.selectedInventoryIndex || 0, 0, this.inventory.length - 1);

    if(this.dropInventoryItem){
      this.dropInventoryItem(index);
    }else{
      this.inventory.splice(index,1);
    }

    this.selectedInventoryIndex = Phaser.Math.Clamp(
      this.selectedInventoryIndex || 0,
      0,
      Math.max(0, this.inventory.length - 1)
    );

    this.openInventoryMenu();
    return true;
  };

  Game.prototype.moveInventorySelection = function(dir){
    if(!this.inventoryOpen) return;
    if(!this.inventory || this.inventory.length <= 0) return;

    const len = this.inventory.length;
    this.selectedInventoryIndex = ((this.selectedInventoryIndex || 0) + dir + len) % len;
    this.openInventoryMenu();
  };

  /* ---------------------------------------------------------
     Inventory screen
  --------------------------------------------------------- */

  Game.prototype.clearInventoryUI = function(){
    mpDestroyInventoryOnly(this);
  };

  Game.prototype.openInventoryMenu = function(){
    mpDestroyInventoryOnly(this);
    mpDestroyPauseOnly(this);
    mpCloseControlsIfOpen(this);

    this.pauseMenuOpen = true;
    this.inventoryOpen = true;

    if(!this.inventory) this.inventory = [];

    if(this.inventory.length <= 0){
      this.selectedInventoryIndex = 0;
    }else{
      this.selectedInventoryIndex = Phaser.Math.Clamp(
        this.selectedInventoryIndex || 0,
        0,
        this.inventory.length - 1
      );
    }

    const items = [];
    this.inventoryItems = items;
    this.inventoryRows = [];

    const shade = this.add.rectangle(CX, CY, W, H, 0x000000, 0.74)
      .setDepth(MP_ENDINV_DEPTH)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor:true });

    const panel = this.add.rectangle(CX, CY, 620, 410, 0x111111, 0.97)
      .setStrokeStyle(4, 0xff4fc3)
      .setDepth(MP_ENDINV_DEPTH + 1)
      .setScrollFactor(0);

    const title = this.add.text(CX, 88, "INVENTORY MENU", {
      font:"36px monospace",
      fill:"#fff45c",
      stroke:"#000000",
      strokeThickness:6
    }).setOrigin(0.5).setDepth(MP_ENDINV_DEPTH + 2).setScrollFactor(0);

    const count = this.add.text(CX, 124, this.inventory.length + " / " + mpInvMax(), {
      font:"16px monospace",
      fill:"#7CFF6B",
      stroke:"#000000",
      strokeThickness:3
    }).setOrigin(0.5).setDepth(MP_ENDINV_DEPTH + 2).setScrollFactor(0);

    const help = this.add.text(CX, 456, "X = USE / EQUIP     B = DROP     UP / DOWN = SELECT", {
      font:"13px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:3
    }).setOrigin(0.5).setDepth(MP_ENDINV_DEPTH + 2).setScrollFactor(0);

    items.push(shade,panel,title,count,help);

    if(this.inventory.length <= 0){
      const empty = this.add.text(CX, 260, "NO ITEMS PICKED UP", {
        font:"24px monospace",
        fill:"#ffffff",
        stroke:"#000000",
        strokeThickness:4
      }).setOrigin(0.5).setDepth(MP_ENDINV_DEPTH + 2).setScrollFactor(0);
      items.push(empty);
    }else{
      this.inventory.forEach((item,index)=>{
        const y = 170 + index * 56;
        const isFood = mpIsFoodItem(item);
        const selected = index === this.selectedInventoryIndex;
        const equipped = !isFood && index === this.currentWeaponIndex;

        const row = this.add.rectangle(CX, y, 540, 44, selected ? 0x2c1028 : 0x000000, 0.92)
          .setStrokeStyle(selected ? 4 : 2, selected ? 0xfff45c : equipped ? 0x00eaff : isFood ? 0x7CFF6B : 0xff4fc3)
          .setDepth(MP_ENDINV_DEPTH + 2)
          .setScrollFactor(0)
          .setInteractive({ useHandCursor:true });

        const kind = isFood ? "ITEM" : "WEAPON";
        const equippedText = equipped ? "  EQUIPPED" : "";
        const arrow = selected ? "> " : "  ";

        const name = this.add.text(CX - 250, y, arrow + (index + 1) + ". " + mpLabel(item) + " [" + kind + "]" + equippedText, {
          font:"15px monospace",
          fill:selected ? "#fff45c" : "#ffffff",
          stroke:"#000000",
          strokeThickness:3
        }).setOrigin(0,0.5).setDepth(MP_ENDINV_DEPTH + 3).setScrollFactor(0);

        const useBtn = this.add.text(CX + 102, y, isFood ? "X USE" : "X EQUIP", {
          font:"14px monospace",
          fill:isFood ? "#7CFF6B" : "#00eaff",
          stroke:"#000000",
          strokeThickness:3,
          backgroundColor:"#101022"
        }).setOrigin(0.5).setDepth(MP_ENDINV_DEPTH + 4).setScrollFactor(0).setInteractive({ useHandCursor:true });

        const dropBtn = this.add.text(CX + 213, y, "B DROP", {
          font:"14px monospace",
          fill:"#ffffff",
          stroke:"#000000",
          strokeThickness:3,
          backgroundColor:"#220018"
        }).setOrigin(0.5).setDepth(MP_ENDINV_DEPTH + 4).setScrollFactor(0).setInteractive({ useHandCursor:true });

        row.on("pointerdown", ()=>{

          this.openInventoryMenu();
        });

        useBtn.on("pointerdown", ()=>{

        });

        dropBtn.on("pointerdown", ()=>{

          this.dropSelectedInventoryItem();
        });

        this.inventoryRows.push(row);
        items.push(row,name,useBtn,dropBtn);
      });
    }

    const backBtn = this.add.text(CX, 500, "BACK TO PAUSE MENU", {
      font:"18px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:4,
      backgroundColor:"#220018"
    }).setOrigin(0.5).setDepth(MP_ENDINV_DEPTH + 3).setScrollFactor(0).setInteractive({ useHandCursor:true });

    backBtn.on("pointerdown", ()=>{
      mpDestroyInventoryOnly(this);
      this.openPauseMenu();
    });

    items.push(backBtn);
  };

  /* ---------------------------------------------------------
     Pause / endgame menu
  --------------------------------------------------------- */

    }).setOrigin(0.5).setDepth(MP_ENDMENU_DEPTH + 2).setScrollFactor(0).setInteractive({ useHandCursor:true });

    const inventoryText = this.add.text(CX, 305, "INVENTORY MENU", {

      fill:"#7CFF6B",
      stroke:"#000000",
      strokeThickness:5
    }).setOrigin(0.5).setDepth(MP_ENDMENU_DEPTH + 2).setScrollFactor(0).setInteractive({ useHandCursor:true });

    const titleText = this.add.text(CX, 355, "BACK TO TITLE", {
      font:"26px monospace",
      fill:"#ff7b7b",
      stroke:"#000000",
      strokeThickness:5
    }).setOrigin(0.5).setDepth(MP_ENDMENU_DEPTH + 2).setScrollFactor(0).setInteractive({ useHandCursor:true });

    closeText.on("pointerdown", ()=>this.closePauseMenu());

    optionsText.on("pointerdown", ()=>{

        window.mpShowControlsOverlay(this);
      }else if(this.openControlsMenu){

      }
    });

    inventoryText.on("pointerdown", ()=>{
      mpDestroyPauseOnly(this);
      this.pauseMenuOpen = true;
      this.openInventoryMenu();
    });

    titleText.on("pointerdown", ()=>{
      this.closePauseMenu();
      if(typeof stopFightMusic === "function") stopFightMusic();
      this.scene.start("Title");
    });

    items.push(shade,panel,title,closeText,optionsText,inventoryText,titleText,hint);
  };

  Game.prototype.closePauseMenu = function(){
    mpCloseControlsIfOpen(this);
    mpDestroyPauseOnly(this);
    mpDestroyInventoryOnly(this);
    this.pauseMenuOpen = false;
  };

  Game.prototype.togglePauseMenu = function(){
    if(this.mpControlsOpen){
      mpCloseControlsIfOpen(this);
      return;
    }

    if(this.inventoryOpen){
      mpDestroyInventoryOnly(this);
      this.openPauseMenu();
      return;
    }

    if(this.pauseMenuOpen){
      this.closePauseMenu();
      return;
    }

    this.openPauseMenu();
  };

  /* ---------------------------------------------------------
     Control overrides
  --------------------------------------------------------- */

  const MP_ENDINV_OLD_START_ATTACK = Game.prototype.startAttack;
  Game.prototype.startAttack = function(type){
    // Inventory menu: X/light attack consumes food or equips weapons.
    if(this.inventoryOpen){
      this.useOrEquipSelectedInventoryItem();
      return;
    }

    // Gameplay: Up + X stores held/nearby item into the 3-slot inventory.
    if(type === "light" && this.isUpHeld && this.isUpHeld() && !this.pauseMenuOpen){
      if(this.mpStoreHeldOrNearbyToInventory()){
        return;
      }
    }

    return MP_ENDINV_OLD_START_ATTACK.call(this,type);
  };

  const MP_ENDINV_OLD_CONTEXT_B = Game.prototype.startContextB;
  Game.prototype.startContextB = function(){
    if(this.inventoryOpen){
      this.dropSelectedInventoryItem();
      return;
    }

    if(this.pauseMenuOpen){
      this.closePauseMenu();
      return;
    }

    return MP_ENDINV_OLD_CONTEXT_B.call(this);
  };

  const MP_ENDINV_OLD_CONTEXT_KICK = Game.prototype.startContextKick;
  Game.prototype.startContextKick = function(){
    if(this.inventoryOpen){
      this.useOrEquipSelectedInventoryItem();
      return;
    }

    return MP_ENDINV_OLD_CONTEXT_KICK.call(this);
  };

  const MP_ENDINV_OLD_CONTEXT_Y = Game.prototype.startContextY;
  Game.prototype.startContextY = function(){
    if(this.inventoryOpen){
      this.useOrEquipSelectedInventoryItem();
      return;
    }

    return MP_ENDINV_OLD_CONTEXT_Y.call(this);
  };

  const MP_ENDINV_OLD_MAKE_KEYBOARD = Game.prototype.makeKeyboard;
  Game.prototype.makeKeyboard = function(){
    MP_ENDINV_OLD_MAKE_KEYBOARD.call(this);

    if(this.mpEndInventoryKeyboardReady) return;
    this.mpEndInventoryKeyboardReady = true;

    this.input.keyboard.on("keydown-X", ()=>{
      if(this.inventoryOpen){
        this.useOrEquipSelectedInventoryItem();
        return;
      }
      this.startAttack("light");
    });

    this.input.keyboard.on("keydown-UP", ()=>{
      if(this.inventoryOpen) this.moveInventorySelection(-1);
    });

    this.input.keyboard.on("keydown-DOWN", ()=>{
      if(this.inventoryOpen) this.moveInventorySelection(1);
    });

    this.input.keyboard.on("keydown-W", ()=>{
      if(this.inventoryOpen) this.moveInventorySelection(-1);
    });

    this.input.keyboard.on("keydown-S", ()=>{
      if(this.inventoryOpen) this.moveInventorySelection(1);
    });

    this.input.keyboard.on("keydown-B", ()=>{
      if(this.inventoryOpen){
        this.dropSelectedInventoryItem();
        return;
      }
      if(this.pauseMenuOpen){
        this.closePauseMenu();
      }
    });

    this.input.keyboard.on("keydown-ESC", ()=>{
      if(this.inventoryOpen){
        mpDestroyInventoryOnly(this);
        this.openPauseMenu();
        return;
      }
      if(this.pauseMenuOpen){
        this.closePauseMenu();
      }
    });
  };

  const MP_ENDINV_OLD_CREATE = Game.prototype.create;
  Game.prototype.create = function(){

    if(!this.inventory) this.inventory = [];
    if(this.inventory.length > mpInvMax()){

    this.selectedInventoryIndex = 0;
  };
