function mpOutdoorIsActiveLevel(scene){
  return typeof selectedLevel !== "undefined" && selectedLevel === "outdoor";
}

function mpGetOutdoorScreenKey(scene){
  if(!scene) return MP_SCREEN_LEFTYS;
  return scene.mpOutdoorScreen || MP_SCREEN_LEFTYS;
}

function mpGetOutdoorScreenDef(screenKey){
  return MP_OUTDOOR_SCREENS[screenKey] || MP_OUTDOOR_SCREENS[MP_SCREEN_LEFTYS];
}

function mpGetOutdoorBounds(scene){
  var def = mpGetOutdoorScreenDef(mpGetOutdoorScreenKey(scene));
  return def && def.customBounds ? def.bounds : null;
}

function mpEnsureOutdoorBg(scene){
  if(!scene || !mpOutdoorIsActiveLevel(scene)) return;

  if(scene.mpOutdoorBg && !scene.mpOutdoorBg.destroyed){
    return;
  }

  var baseKey = hasTex(scene, "outdoor") ? "outdoor" : selectedLevel;

  scene.mpOutdoorBg = scene.add.image(CX, CY, baseKey)
    .setDisplaySize(W, H)
    .setDepth(1);
}

function mpSetOutdoorBg(scene, screenKey){
  if(!scene || !mpOutdoorIsActiveLevel(scene)) return;

  mpEnsureOutdoorBg(scene);

  var def = mpGetOutdoorScreenDef(screenKey);
  var assetKey = def.asset;

  if(scene.mpOutdoorBg){
    if(hasTex(scene, assetKey)){
      scene.mpOutdoorBg.setTexture(assetKey);
    }else{
      scene.mpOutdoorBg.setTexture(hasTex(scene, "outdoor") ? "outdoor" : selectedLevel);
    }

    scene.mpOutdoorBg
      .setDisplaySize(W, H)
      .setDepth(1);
  }
}

function mpSetVisibleDeep(obj, visible){
  if(!obj) return;

  if(obj.setVisible){
    obj.setVisible(visible);
  }

  if(obj.children && obj.children.each){
    obj.children.each(function(child){
      if(child && child.setVisible){
        child.setVisible(visible);
      }
    });
  }
}

function mpUpdateScreenObjects(scene){
  if(!scene) return;

  var screenKey = mpGetOutdoorScreenKey(scene);
  var onLeftys = screenKey === MP_SCREEN_LEFTYS;

  // Hide Lefty's-specific foreground objects on side maps.
  if(scene.barricadeFront){
    mpSetVisibleDeep(scene.barricadeFront, onLeftys);
  }

  // Screen-specific food/drink pickups.
  if(scene.healthItemPickups){
    scene.healthItemPickups.forEach(function(p){
      if(!p) return;

      var visible =
        !p.pickedUp &&
        (!p.screenKey || p.screenKey === screenKey);

      if(p.obj) p.obj.setVisible(visible);
      if(p.label) p.label.setVisible(visible);
    });
  }

  // Screen-specific weapons.
  if(scene.weaponPickups){
    scene.weaponPickups.forEach(function(p){
      if(!p) return;

      var visible =
        !p.pickedUp &&
        (!p.screenKey || p.screenKey === screenKey);

      if(p.obj) p.obj.setVisible(visible);
      if(p.label) p.label.setVisible(visible);
    });
  }
}

function mpMoveEnemiesToOutdoorScreen(scene, screenKey, spawn){
  if(!scene || !scene.enemies || !spawn) return;

  var def = mpGetOutdoorScreenDef(screenKey);
  var bounds = def.bounds || {minX:120,maxX:860,minY:390,maxY:390};

  scene.enemies.forEach(function(e){
    if(!e || e.dead || e.state === "dead") return;

    var enemyY = def.customBounds
      ? Phaser.Math.Clamp(spawn.y + Phaser.Math.Between(-35, 35), bounds.minY + 15, bounds.maxY - 15)
      : spawn.y;

    e.platform = def.platform;
    e.homeY = enemyY;
    e.y = enemyY;

    e.x = Phaser.Math.Clamp(
      spawn.x + Phaser.Math.Between(-260, 260),
      bounds.minX + 40,
      bounds.maxX - 40
    );

    e.vx = 0;
    e.busy = false;
    e.transitioning = false;
    e.attackCooldown = Phaser.Math.Between(450, 1100);

    if(scene.safeEnemyPlay){
      scene.safeEnemyPlay(e, "idle");
    }

    if(scene.updateEnemyVisuals){
      scene.updateEnemyVisuals(e);
    }
  });
}

function mpSwitchOutdoorScreen(scene, screenKey, spawnOverride){
  if(!scene || !mpOutdoorIsActiveLevel(scene)) return;

  var def = mpGetOutdoorScreenDef(screenKey);
  var spawn = spawnOverride || def.spawn || {x:470,y:390};

  scene.mpOutdoorScreen = def.key;

  mpSetOutdoorBg(scene, def.key);

    scene.player.y = spawn.y;

  if(scene.shadow){

  if(scene.zoneText){

if(typeof window.MP_STICK_FLOATING === "undefined"){
  try{
    window.MP_STICK_FLOATING =

if(typeof Game !== "undefined" && !Game.prototype.mpToggleStickWrapped){
  Game.prototype.mpToggleStickWrapped = true;

  var MP_OLD_MAKE_MOBILE_CONTROLS_TOGGLE_STICK =
    Game.prototype.makeMobileControls;

  Game.prototype.makeMobileControls = function(){
    MP_OLD_MAKE_MOBILE_CONTROLS_TOGGLE_STICK.call(this);

    var scene = this;
    var toggleX = 105;
    var toggleY = H - 245;

    var box = this.add.rectangle(toggleX, toggleY, 112, 32, 0x000000, 0.42)
      .setStrokeStyle(2, 0xffffff, 0.35)
      .setDepth(9600)
      .setScrollFactor(0)
      .setInteractive();

    var label = this.add.text(toggleX, toggleY, "", {
      font:"12px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:3
    })
      .setOrigin(0.5)
      .setDepth(9601)
      .setScrollFactor(0);

    function refreshStickLabel(){
      label.setText(window.MP_STICK_FLOATING ? "STICK: FLOAT" : "STICK: FIX");
    }

    refreshStickLabel();

    box.on("pointerdown", function(p){
      if(p && p.event && p.event.preventDefault){
        p.event.preventDefault();
      }

      window.MP_STICK_FLOATING = !window.MP_STICK_FLOATING;

      try{
        localStorage.setItem("MP_STICK_FLOATING", window.MP_STICK_FLOATING ? "1" : "0");
      }catch(e){}

      refreshStickLabel();
    });

    if(!this.mobileUI){
      this.mobileUI = {};
    }

    this.mobileUI.stickToggleBox = box;
    this.mobileUI.stickToggleLabel = label;

    var floatDragging = false;

    function moveFloatingStick(p){
      if(!scene.mobileUI || !scene.mobileUI.stickBase || !scene.mobileUI.stickKnob) return;

      var base = scene.mobileUI.stickBase;
      var knob = scene.mobileUI.stickKnob;

      var dx = p.x - base.x;
      var dy = p.y - base.y;

      var max = 44 * (typeof CONTROL_ZOOM !== "undefined" ? CONTROL_ZOOM : 1);
      var d = Math.sqrt(dx * dx + dy * dy);

      if(d > max){
        dx = (dx / d) * max;
        dy = (dy / d) * max;
      }

      knob.x = base.x + dx;
      knob.y = base.y + dy;

      scene.stickX = dx / max;
      scene.stickY = dy / max;
    }

    this.input.on("pointerdown", function(p){
      if(!window.MP_STICK_FLOATING) return;
      if(!p) return;

      // Only use floating stick on left half of screen.
      if(p.x > W * 0.42) return;

      // Ignore tap directly on toggle button.
      if(Math.abs(p.x - toggleX) < 75 && Math.abs(p.y - toggleY) < 45) return;

      if(!scene.mobileUI || !scene.mobileUI.stickBase || !scene.mobileUI.stickKnob) return;

      floatDragging = true;

      scene.mobileUI.stickBase.x = p.x;
      scene.mobileUI.stickBase.y = p.y;
      scene.mobileUI.stickKnob.x = p.x;
      scene.mobileUI.stickKnob.y = p.y;

      scene.stickX = 0;
      scene.stickY = 0;
    });

    this.input.on("pointermove", function(p){
      if(!window.MP_STICK_FLOATING) return;
      if(!floatDragging) return;

      moveFloatingStick(p);
    });

    this.input.on("pointerup", function(){
      if(!window.MP_STICK_FLOATING) return;

      floatDragging = false;

      if(scene.mobileUI && scene.mobileUI.stickBase && scene.mobileUI.stickKnob){
        scene.mobileUI.stickKnob.x = scene.mobileUI.stickBase.x;
        scene.mobileUI.stickKnob.y = scene.mobileUI.stickBase.y;
      }

      scene.stickX = 0;
      scene.stickY = 0;
    });

    this.input.on("pointerupoutside", function(){
      if(!window.MP_STICK_FLOATING) return;

      floatDragging = false;

      if(scene.mobileUI && scene.mobileUI.stickBase && scene.mobileUI.stickKnob){
        scene.mobileUI.stickKnob.x = scene.mobileUI.stickBase.x;
        scene.mobileUI.stickKnob.y = scene.mobileUI.stickBase.y;
      }

      scene.stickX = 0;
      scene.stickY = 0;
    });
  };
}

    if(!e || e.mpAggroTuned) return;

    e.mpAggroTuned = true;

    if(typeof e.chaseSpeed === "number"){
      e.chaseSpeed *= 1.08;
    }

    if(typeof e.speed === "number"){
      e.speed *= 1.06;
    }

    if(typeof e.attackCooldownMin === "number"){
      e.attackCooldownMin = Math.max(260, Math.floor(e.attackCooldownMin * 0.82));
    }

    if(typeof e.attackCooldownMax === "number"){
      e.attackCooldownMax = Math.max(520, Math.floor(e.attackCooldownMax * 0.86));
    }

    if(typeof e.thinkDelay === "number"){
      e.thinkDelay = Math.max(160, Math.floor(e.thinkDelay * 0.75));
    }

    if(typeof e.reactionDelay === "number"){
      e.reactionDelay = Math.max(120, Math.floor(e.reactionDelay * 0.75));
    }

    // Slightly closer/faster pressure, not huge long-range hits.
    if(typeof e.stopRange === "number"){
      e.stopRange = Math.max(28, Math.floor(e.stopRange * 0.92));
    }
  }

  function mpUpdateEnemyPickupAI(scene, time, dt){
    if(!scene || !scene.enemies) return;

    scene.enemies.forEach(function(e){
      if(!e || e.dead || e.state === "dead") return;

      mpTuneEnemyAggression(e);
      mpUpdateEnemyWeaponVisual(e);

      if(!e.mpNextLootCheck || time >= e.mpNextLootCheck){
        e.mpNextLootCheck = time + MP_ENEMY_LOOT_CHECK_MS + Phaser.Math.Between(0, 160);

        e.mpLootTarget = null;
        e.mpLootTargetKind = null;

        // Low-health enemies prioritize food/health.
        if(mpEnemyNeedsHealth(e)){
          var hpTarget = mpNearestHealthPickup(scene, e);

          if(hpTarget){
            e.mpLootTarget = hpTarget;
            e.mpLootTargetKind = "health";
          }
        }

        // Weaponless enemies look for nearby weapons.
        if(!e.mpLootTarget && !e.mpWeaponType){
          var weaponTarget = mpNearestWeaponPickup(scene, e);

          if(weaponTarget){
            e.mpLootTarget = weaponTarget;
            e.mpLootTargetKind = "weapon";
          }
        }
      }

      if(e.mpLootTarget && e.mpLootTarget.pickup && !e.mpLootTarget.pickup.pickedUp){
        var reached = mpEnemyWalkTowardPickup(scene, e, e.mpLootTarget, dt);

        if(reached){
          if(e.mpLootTargetKind === "health"){
            mpEnemyUseHealthPickup(scene, e, e.mpLootTarget.pickup);
          }else if(e.mpLootTargetKind === "weapon"){
            mpEnemyPickupWeapon(scene, e, e.mpLootTarget.pickup);
          }

          e.mpLootTarget = null;
          e.mpLootTargetKind = null;
        }
      }
    });
  }

  if(Game.prototype.spawnEnemyType && !Game.prototype.mpAggroSpawnWrapped){
    Game.prototype.mpAggroSpawnWrapped = true;

    var MP_OLD_SPAWN_ENEMY_AGGRO = Game.prototype.spawnEnemyType;

    Game.prototype.spawnEnemyType = function(type, x, y, platform){
      var e = MP_OLD_SPAWN_ENEMY_AGGRO.call(this, type, x, y, platform);
      mpTuneEnemyAggression(e);
      return e;
    };
  }

  /* =======================================================
     4) WRAP CREATE / UPDATE
  ======================================================= */

  var MP_OLD_CREATE_JT_BUS_ENEMY_AI = Game.prototype.create;

  Game.prototype.create = function(){
    MP_OLD_CREATE_JT_BUS_ENEMY_AI.call(this);

    mpApplyJTSize(this);
    mpFixAllArrowBuses(this);

    if(this.time){
      this.time.delayedCall(120, ()=>{
        mpApplyJTSize(this);
        mpFixAllArrowBuses(this);

        if(this.enemies){
          this.enemies.forEach(mpTuneEnemyAggression);
        }
      });
    }
  };

  var MP_OLD_UPDATE_JT_BUS_ENEMY_AI = Game.prototype.update;

  Game.prototype.update = function(time, delta){

    }

    mpApplyJTSize(this);
    mpFixAllArrowBuses(this);
    mpUpdateEnemyPickupAI(this, time || 0, delta || 16.67);
  };

})();

  function mpFixFoodVisible(obj, type){
    if(!obj || !obj.texture) return obj;

    var key = obj.texture.key || "";
    if(key.indexOf("item_") !== 0) return obj;

    type = type || mpFoodTypeFromKey(key);

    if(MP_FORCE_FOOD_CROP && obj.setCrop){
      try{
        var tex = obj.scene.textures.get(key);
        var src = tex && tex.source && tex.source[0];

        if(src && src.width && src.height){
          var w = src.width;
          var h = src.height;
          var cropW = w;
          var cropH = h;
          var ratio = w / h;

          // 4 horizontal frames
          if(ratio > 2.8){
            cropW = Math.floor(w / 4);
            cropH = h;
          }
          // 2 horizontal frames
          else if(ratio > 1.35){
            cropW = Math.floor(w / 2);
            cropH = h;
          }
          // 4 vertical frames
          else if(ratio < 0.38){
            cropW = w;
            cropH = Math.floor(h / 4);
          }
          // 2x2 sheet
          else{
            cropW = Math.floor(w / 2);
            cropH = Math.floor(h / 2);
          }

          obj.setCrop(0, 0, cropW, cropH);
        }
      }catch(e){}
    }

    if(obj.setDisplaySize){
      var size = mpIsBigFood(type)
        ? MP_BIG_FOOD_VISIBLE_SIZE
        : MP_FOOD_VISIBLE_SIZE;

      obj.setDisplaySize(size, size);

  function mpFindButtonDiamondCenter(scene){

        if(label === "A" || label === "B" || label === "X" || label === "Y"){
          found.push(btn.text);

    if(found.length > 0){

      var sy = 0;

      found.forEach(function(t){

        sy += t.y;
      });

      return {
        x: sx / found.length,

      };

          );

        mpRefreshStickToggle(scene);

    scene.mobileUI.stickToggleBox.y = toggleY;

    scene.mobileUI.stickToggleLabel.setText(
      window.MP_STICK_FLOATING ? "STICK: FLOAT" : "STICK: FIX"
    );

  /* =======================================================
     3) FLOATING STICK INPUT SAFETY
  ======================================================= */

  if(Game.prototype.makeMobileControls && !Game.prototype.mpMirrorStickInputWrapped){
    Game.prototype.mpMirrorStickInputWrapped = true;

    var MP_OLD_MAKE_MOBILE_MIRROR_STICK =

      MP_OLD_MAKE_MOBILE_MIRROR_STICK.call(this);

      var scene = this;
      var floatDragging = false;

      this.time.delayedCall(50, function(){
        mpCreateOrMoveStickToggle(scene);
      });

      function moveFloatingStick(p){
        if(!scene.mobileUI || !scene.mobileUI.stickBase || !scene.mobileUI.stickKnob) return;

        var base = scene.mobileUI.stickBase;
        var knob = scene.mobileUI.stickKnob;

        var dx = p.x - base.x;
        var dy = p.y - base.y;

        var max = 44 * (typeof CONTROL_ZOOM !== "undefined" ? CONTROL_ZOOM : 1);
        var d = Math.sqrt(dx * dx + dy * dy);

        if(d > max){
          dx = (dx / d) * max;
          dy = (dy / d) * max;
        }

        knob.x = base.x + dx;
        knob.y = base.y + dy;

        scene.stickX = dx / max;
        scene.stickY = dy / max;
      }

      this.input.on("pointerdown", function(p){
        if(!window.MP_STICK_FLOATING) return;
        if(!p) return;

        // Floating stick only on left half.
        if(p.x > W * 0.42) return;

        // Do not move stick when tapping toggle.
        if(scene.mobileUI && scene.mobileUI.stickToggleBox){
          var b = scene.mobileUI.stickToggleBox;

          if(Math.abs(p.x - b.x) < 80 && Math.abs(p.y - b.y) < 50){
            return;
          }
        }

        if(!scene.mobileUI || !scene.mobileUI.stickBase || !scene.mobileUI.stickKnob) return;

        floatDragging = true;

        scene.mobileUI.stickBase.x = p.x;
        scene.mobileUI.stickBase.y = p.y;
        scene.mobileUI.stickKnob.x = p.x;
        scene.mobileUI.stickKnob.y = p.y;

        scene.stickX = 0;
        scene.stickY = 0;
      });

      this.input.on("pointermove", function(p){
        if(!window.MP_STICK_FLOATING) return;
        if(!floatDragging) return;

        moveFloatingStick(p);
      });

      this.input.on("pointerup", function(){
        if(!window.MP_STICK_FLOATING) return;

        floatDragging = false;

        if(scene.mobileUI && scene.mobileUI.stickBase && scene.mobileUI.stickKnob){
          scene.mobileUI.stickKnob.x = scene.mobileUI.stickBase.x;
          scene.mobileUI.stickKnob.y = scene.mobileUI.stickBase.y;
        }

        scene.stickX = 0;
        scene.stickY = 0;
      });

      this.input.on("pointerupoutside", function(){
        if(!window.MP_STICK_FLOATING) return;

        floatDragging = false;

        if(scene.mobileUI && scene.mobileUI.stickBase && scene.mobileUI.stickKnob){
          scene.mobileUI.stickKnob.x = scene.mobileUI.stickBase.x;
          scene.mobileUI.stickKnob.y = scene.mobileUI.stickBase.y;
        }

        scene.stickX = 0;
        scene.stickY = 0;
      });
    };
  }

  /* =======================================================
     4) WRAP CREATE / UPDATE
  ======================================================= */

  var MP_OLD_CREATE_FOOD_STICK_VISIBLE = Game.prototype.create;

  function mpPlayerInZoneV3(scene, zone){

    return (

  function mpNearAnyZoneV3(scene, list, padX, padY){
    if(!scene || !scene.player || !list) return false;

    var px = scene.player.x;
    var py = scene.player.y;

    for(var i = 0; i < list.length; i++){
      var z = list[i];
      if(!z) continue;

      var x = z.x || z.centerX || z.left || z.minX || 0;
      var y = z.y || z.centerY || z.top || z.minY || 0;

      var w =
        z.w ||
        z.width ||
        ((typeof z.maxX === "number" && typeof z.minX === "number") ? z.maxX - z.minX : 80);

      var h =
        z.h ||
        z.height ||
        ((typeof z.maxY === "number" && typeof z.minY === "number") ? z.maxY - z.minY : 160);

      var minX = typeof z.minX === "number" ? z.minX : x - w * 0.5;
      var maxX = typeof z.maxX === "number" ? z.maxX : x + w * 0.5;
      var minY = typeof z.minY === "number" ? z.minY : y - h * 0.5;
      var maxY = typeof z.maxY === "number" ? z.maxY : y + h * 0.5;

      if(
        px >= minX - padX &&
        px <= maxX + padX &&
        py >= minY - padY &&

      scene.ladderZones,
      scene.climbZones,
      scene.stairs,
      scene.stairZones,
      scene.stairTriggers,
      scene.platformStairs

    if(MP_OLD_UPDATE_LEFTYS_DOWN_X_JUMP_V3){
      MP_OLD_UPDATE_LEFTYS_DOWN_X_JUMP_V3.call(this, time, delta);
    }

    if(!mpIsLeftysOutdoorScreenV3(this)) return;
    if(!this.player) return;
    if(this.playerBusy) return;

    // JUMP at the X = third/top platform.
    // This should not affect ladders/stairs.
    if(mpPlayerInZoneV3(this, MP_LEFTYS_X_JUMP_ZONE) && mpJumpPressedV3(this)){
      mpSnapToThirdPlatformV3(this);
      return;
    }

    // DOWN in lower fight lane = lower Lefty's screen,
    // BUT NOT near ladders or stairs.
    if(
      mpPlayerInZoneV3(this, MP_LEFTYS_DOWN_TO_LOWER_ZONE) &&
      mpInputDownV3(this) &&
      !mpNearLadderOrStairsV3(this)
    ){
      mpGoToLeftysLowerV3(this);
      return;
    }

    if(mpPlayerInZoneV3(this, MP_LEFTYS_X_JUMP_ZONE) && this.zoneText){
      this.zoneText.setText("PRESS JUMP: THIRD PLATFORM");
    }
  };

var ModeSelect = class ModeSelect extends Phaser.Scene{
  constructor(){
    super("ModeSelect");

    this.selectedIndex = 0;
    this.cards = [];
    this.cardBorders = [];
    this.cardLabels = [];
  }

  preload(){
    const v = typeof VERSION !== "undefined" ? VERSION : Date.now();

    if(!this.textures.exists("modeSelectBg")){
      this.load.image("modeSelectBg", "assets/levels/mode-select.png?v=" + v);
    }

    if(!this.textures.exists("mode_story")){
      this.load.image("mode_story", "assets/ui/modes/story_mode.png?v=" + v);
    }

    if(!this.textures.exists("mode_rumble")){
      this.load.image("mode_rumble", "assets/ui/modes/rumble_mode.png?v=" + v);
    }

    if(!this.textures.exists("mode_versus")){
      this.load.image("mode_versus", "assets/ui/modes/versus_mode.png?v=" + v);
    }

    if(!this.textures.exists("mode_coop")){
      this.load.image("mode_coop", "assets/ui/modes/coop_mode.png?v=" + v);
    }
  }

  create(){
    this.selectedIndex = 0;
    this.cards = [];
    this.cardBorders = [];
    this.cardLabels = [];

    this.modes = [
      { id:"story",  name:"STORY",  key:"mode_story"  },
      { id:"rumble", name:"RUMBLE", key:"mode_rumble" },
      { id:"versus", name:"VERSUS", key:"mode_versus" },
      { id:"coop",   name:"CO-OP",  key:"mode_coop"   }
    ];

    this.add.rectangle(CX, CY, W, H, 0x000000, 1).setDepth(0);

    if(hasTex(this, "modeSelectBg")){
      this.add.image(CX, CY, "modeSelectBg")
        .setDisplaySize(W, H)
        .setDepth(1);
    }else{
      this.add.text(CX, 60, "MODE SELECT", {
        font:"36px monospace",
        fill:"#00ffff",
        stroke:"#000000",
        strokeThickness:6
      }).setOrigin(0.5).setDepth(2);
    }

    this.buildCards();
    this.buildBackButton();
    this.buildInput();
    this.updateSelection();
  }

  sx(x){
    return x * (W / 960);
  }

  sy(y){
    return y * (H / 540);
  }

  buildCards(){
    /*
      These positions match the 4 numbered slots on mode-select.png.
      Only adjust these if the cards need tiny alignment changes.
    */
    const slots = [
      { x:166, y:286 },
      { x:381, y:286 },
      { x:596, y:286 },
      { x:811, y:286 }
    ];

    const cardW = 190 * (W / 960);
    const cardH = 300 * (H / 540);

    this.modes.forEach((mode, index)=>{
      const s = slots[index];
      const x = this.sx(s.x);
      const y = this.sy(s.y);

      let card;

      if(hasTex(this, mode.key)){
        card = this.add.image(x, y, mode.key)
          .setDisplaySize(cardW, cardH)
          .setDepth(20)
          .setInteractive({ useHandCursor:true });
      }else{
        card = this.add.rectangle(x, y, cardW, cardH, 0x080808, 0.86)
          .setStrokeStyle(3, 0x00ffff, 0.65)
          .setDepth(20)
          .setInteractive({ useHandCursor:true });

        const fallbackLabel = this.add.text(x, y, mode.name, {
          font:"24px monospace",
          fill:"#fff45c",
          stroke:"#000000",
          strokeThickness:5
        })
          .setOrigin(0.5)
          .setDepth(22);

        this.cardLabels.push(fallbackLabel);
      }

      const border = this.add.rectangle(x, y, cardW + 10, cardH + 10, 0x000000, 0)
        .setStrokeStyle(4, 0x00ffff, 0.55)
        .setDepth(30);

      card.on("pointerdown", ()=>{
        if(this.selectedIndex === index){
          this.selectMode();
        }else{
          this.selectedIndex = index;
          this.updateSelection();
        }
      });

      this.cards.push(card);
      this.cardBorders.push(border);
    });
  }

  buildBackButton(){
    const bx = this.sx(138);
    const by = this.sy(486);

    this.backButtonBox = this.add.rectangle(bx, by, this.sx(205), this.sy(48), 0x000000, 0.72)
      .setStrokeStyle(3, 0x00ffff, 0.75)
      .setDepth(60)
      .setInteractive({ useHandCursor:true });

    this.backButtonText = this.add.text(bx, by, "B  BACK", {
      font:"20px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5
    })
      .setOrigin(0.5)
      .setDepth(61);

    this.backButtonBox.on("pointerdown", ()=>{
      this.scene.start("Title");
    });
  }

  buildInput(){
    this.input.keyboard.on("keydown-LEFT", ()=>this.moveSelection(-1));
    this.input.keyboard.on("keydown-RIGHT", ()=>this.moveSelection(1));
    this.input.keyboard.on("keydown-UP", ()=>this.moveSelection(-1));
    this.input.keyboard.on("keydown-DOWN", ()=>this.moveSelection(1));

    this.input.keyboard.on("keydown-ENTER", ()=>this.selectMode());
    this.input.keyboard.on("keydown-SPACE", ()=>this.selectMode());
    this.input.keyboard.on("keydown-A", ()=>this.selectMode());

    this.input.keyboard.on("keydown-B", ()=>this.scene.start("Title"));
    this.input.keyboard.on("keydown-ESC", ()=>this.scene.start("Title"));
  }

  moveSelection(dir){
    this.selectedIndex += dir;

    if(this.selectedIndex < 0){
      this.selectedIndex = this.modes.length - 1;
    }

    if(this.selectedIndex >= this.modes.length){
      this.selectedIndex = 0;
    }

    this.updateSelection();
  }

  updateSelection(){
    const normalW = 190 * (W / 960);
    const normalH = 300 * (H / 540);
    const selectedW = 198 * (W / 960);
    const selectedH = 310 * (H / 540);

    this.cardBorders.forEach((border, index)=>{
      const selected = index === this.selectedIndex;

      border.setStrokeStyle(
        selected ? 7 : 4,
        selected ? 0xfff45c : 0x00ffff,
        selected ? 1 : 0.55
      );

      border.setSize(
        selected ? selectedW + 12 : normalW + 10,
        selected ? selectedH + 12 : normalH + 10
      );
    });

    this.cards.forEach((card, index)=>{
      const selected = index === this.selectedIndex;

      if(card.setAlpha){
        card.setAlpha(selected ? 1 : 0.72);
      }

      /*
        DO NOT use setScale() here.
        setScale(1) makes image cards jump back to original PNG size.
      */
      if(card.setDisplaySize){
        card.setDisplaySize(
          selected ? selectedW : normalW,
          selected ? selectedH : normalH
        );
      }
    });
  }

  selectMode(){
    const mode = this.modes[this.selectedIndex];

    window.selectedGameMode = mode.id;
    window.selectedGameModeName = mode.name;

    this.scene.start("CharacterSelect");
  }
};

      const oldCpu = scene.mpvCpu;

      if(oldCpu){
        if(scene.hideEnemyUI){
          scene.hideEnemyUI(oldCpu);
        }

        if(oldCpu.sprite && oldCpu.sprite.destroy){
          oldCpu.sprite.destroy();
        }

        if(oldCpu.shadow && oldCpu.shadow.destroy){
          oldCpu.shadow.destroy();
        }

        if(oldCpu.mpWeaponObj && oldCpu.mpWeaponObj.destroy){
          oldCpu.mpWeaponObj.destroy();
        }
      }

      if(scene.enemies){
        scene.enemies = scene.enemies.filter(e=>e !== oldCpu);
      }

      scene.mpvCpu = null;
    }

    function mpvCreateHud(scene){

        mpvDestroyList(scene.mpvHudItems);

      const x = W - 245;

        .setScrollFactor(0)
        .setDepth(65000);

      const grooveFill = scene.add.rectangle(x + 72,y + 70,124,4,0xff4fc3,1)

        .setDepth(65001);

      const tagBox = scene.add.rectangle(x + 132,y + 101,108,34,0x220018,0.88)
        .setStrokeStyle(3,0xfff45c,0.95)

        .setScrollFactor(0)
        .setDepth(65000);

      const tagText = scene.add.text(x + 132,y + 101,"Q TAG",{

      })

      const p2Text = scene.add.text(x,y + 124,"P2",{

      tagBox.on("pointerdown",()=>{

    function mpvUpdateHud(scene){
      if(!scene || !scene.mpvHud || !scene.mpvP1Team || !scene.mpvP2Team) return;

      const p1 = scene.mpvP1Team[scene.mpvP1Index];
      const p2 = scene.mpvP2Team[scene.mpvP2Index];

      if(p1){
        scene.mpvHud.p1Name.setText(
          p1.name + "  HP " + Math.max(0,Math.floor(scene.playerHealth || p1.hp))
        );

        const hpPct = Phaser.Math.Clamp((scene.playerHealth || 0) / (p1.maxHp || 100),0,1);
        scene.mpvHud.hpFill.setScale(hpPct,1);
      }

      const groovePct = Phaser.Math.Clamp((scene.rhythm || 0) / 10,0,1);
      scene.mpvHud.grooveFill.setScale(groovePct,1);

      scene.mpvHud.timer.setText("TIME " + mpvFormatTime(scene.mpvTimeLeft));

      if(p2){
        const p2Lines = scene.mpvP2Team.map((m,index)=>{
          const mark = index === scene.mpvP2Index ? ">" : " ";
          const ko = m.alive && m.hp > 0 ? "" : " KO";

          return mark + m.name + " " + Math.floor(Math.max(0,m.hp)) + ko;
        });

        scene.mpvHud.p2Text.setText("P2 TEAM\n" + p2Lines.join("\n"));
      }
    }

    function mpvApplyP1Fighter(scene,instant){
      if(!scene || !scene.mpvP1Team) return;

      const member = scene.mpvP1Team[scene.mpvP1Index];
      if(!member) return;

      mpvSetGlobalFighter(member.id);

      scene.playerHealth = Math.max(1,Math.floor(member.hp));

      if(scene.player){
        if(scene.getPlayerMoveSheet){
          scene.player.setTexture(scene.getPlayerMoveSheet());
        }

        scene.player.setOrigin(0.5,1);

        if(scene.getPlayerMoveScale){
          scene.player.setScale(scene.getPlayerMoveScale());
        }

        scene.player.setVisible(true);
        scene.player.clearTint();

        if(scene.getPlayerAnim){
          mpvSafePlay(scene.player,scene.getPlayerAnim("idle_down"));
        }
      }

      if(scene.poseSprite){
        scene.poseSprite.stop();
        scene.poseSprite.setVisible(false);
      }

      scene.playerBusy = false;
      scene.busyUntil = 0;
      scene.isJumping = false;
      scene.isCrouching = false;
      scene.isBlocking = false;

      if(scene.zoneText){
        scene.zoneText.setText("TAGGED IN: " + member.name);
      }

      if(!instant && scene.createHitFX && scene.player){
        scene.createHitFX(scene.player.x,scene.player.y - 58,"jump",5);
      }

      mpvUpdateHud(scene);
    }

    function mpvSpawnCpu(scene){
      if(!scene || !scene.mpvP2Team) return;

      mpvClearCpu(scene);

      const member = scene.mpvP2Team[scene.mpvP2Index];
      if(!member || !member.alive || member.hp <= 0) return;

      const bounds = scene.getCurrentPlatformBounds
        ? scene.getCurrentPlatformBounds()
        : (PLATFORM_BOUNDS[scene.platform] || PLATFORM_BOUNDS.middle);

      const spawnX = scene.player && scene.player.x < (bounds.minX + bounds.maxX) / 2
        ? bounds.maxX - 90
        : bounds.minX + 90;

      const spawnY = scene.player
        ? scene.player.y
        : ((bounds.minY + bounds.maxY) * 0.5);

      const enemyType = member.enemyType || mpvEnemyTypeForFighter(member.fighterId || member.id);

      const e = scene.spawnEnemyType(
        enemyType,
        spawnX,
        spawnY,
        scene.platform || "middle"
      );

      e.mpvCpuOpponent = true;
      e.mpvCpuMember = member;
      e.maxHealth = member.maxHp || MPV_MAX_HP;
      e.health = Math.max(1,Math.floor(member.hp));
      e.attackCooldown = 650;
      e.platform = scene.platform;
      e.homeY = spawnY;
      e.y = spawnY;

      if(e.nameText){
        e.nameText.setText(member.name);
      }

      if(e.authText){
        e.authText.setText("P2");
        e.authText.setFill("#ff9adf");
      }

      if(scene.updateEnemyHealthBar){
        scene.updateEnemyHealthBar(e);
      }

      if(scene.updateEnemyVisuals){
        scene.updateEnemyVisuals(e);
      }

      scene.mpvCpu = e;

      if(scene.zoneText){
        scene.zoneText.setText(member.name + " TAGGED IN");
      }

      mpvUpdateHud(scene);
    }

    function mpvSetupMatch(scene){
      if(!scene || scene.mpvSetupDone) return;

      scene.versus3v3 = true;
      scene.mpvSetupDone = true;
      scene.mpvStarted = false;
      scene.mpvOver = false;

      scene.mpvP1Team = mpvBuildP1Team();
      scene.mpvP2Team = mpvBuildP2Team();

      scene.mpvP1Index = 0;
      scene.mpvP2Index = 0;

      scene.mpvTimeLeft = MPV_MATCH_SECONDS;
      scene.mpvLastSecondTick = scene.time.now;
      scene.mpvLastHealTick = scene.time.now;
      scene.mpvNextTagTime = 0;
      scene.mpvNextCpuTagTime = 0;

      scene.enemies = [];
      scene.enemyWaves = [];
      scene.waveSpawning = false;
      scene.initialWaveStarted = true;
      scene.doormanSpawned = true;

      mpvCreateHud(scene);
      mpvApplyP1Fighter(scene,true);

      if(scene.input && scene.input.keyboard && !scene.mpvTagKeyReady){
        scene.mpvTagKeyReady = true;

        scene.input.keyboard.on("keydown-Q",()=>{
          mpvTagP1(scene);
        });
      }
    }

    function mpvStartMatch(scene){
      if(!scene || !scene.mpvSetupDone || scene.mpvStarted) return;

      scene.mpvStarted = true;
      scene.mpvOver = false;
      scene.enemies = [];

      // Start every versus match at a full 10:00 when player control unlocks.
      // This prevents the timer from catching up from the scene-create timestamp.
      scene.mpvTimeLeft = MPV_MATCH_SECONDS;
      scene.mpvLastSecondTick = scene.time.now;
      scene.mpvLastHealTick = scene.time.now;

      mpvSpawnCpu(scene);
      mpvUpdateHud(scene);

      if(scene.zoneText){
        scene.zoneText.setText("VERSUS 3v3");
      }
    }

    function mpvSyncActiveHp(scene){
      if(!scene || !scene.mpvP1Team || !scene.mpvP2Team) return;

      const p1 = scene.mpvP1Team[scene.mpvP1Index];

      if(p1){
        p1.hp = Phaser.Math.Clamp(scene.playerHealth || 0,0,p1.maxHp || MPV_MAX_HP);
        p1.alive = p1.hp > 0;
      }

      const p2 = scene.mpvP2Team[scene.mpvP2Index];

      if(p2 && scene.mpvCpu){
        p2.hp = Phaser.Math.Clamp(scene.mpvCpu.health || 0,0,p2.maxHp || MPV_MAX_HP);
        p2.alive = p2.hp > 0;
      }
    }

    function mpvTagP1(scene){
      if(!scene || !mpvIsVersus()) return;
      if(!scene.mpvSetupDone || scene.mpvOver) return;
      if(scene.time.now < scene.mpvNextTagTime) return;

      mpvSyncActiveHp(scene);

      const next = mpvNextAliveIndex(scene.mpvP1Team,scene.mpvP1Index);

      if(next < 0 || next === scene.mpvP1Index){
        if(scene.zoneText){
          scene.zoneText.setText("NO TAG AVAILABLE");
        }

        return;
      }

      scene.mpvP1Index = next;
      scene.mpvNextTagTime = scene.time.now + MPV_TAG_COOLDOWN;

      mpvApplyP1Fighter(scene,false);
    }

    function mpvCpuAutoTag(scene){
      if(!scene || !scene.mpvCpu || scene.mpvOver) return;
      if(scene.time.now < scene.mpvNextCpuTagTime) return;

      const member = scene.mpvP2Team[scene.mpvP2Index];

      if(!member) return;

      member.hp = Math.max(0,scene.mpvCpu.health || member.hp);

      const hpPct = member.hp / (member.maxHp || MPV_MAX_HP);

      if(hpPct > 0.25) return;

      const next = mpvNextAliveIndex(scene.mpvP2Team,scene.mpvP2Index);

      if(next < 0 || next === scene.mpvP2Index) return;

      scene.mpvP2Index = next;
      scene.mpvNextCpuTagTime = scene.time.now + 4500;

      mpvSpawnCpu(scene);
    }

    function mpvHandleP1Ko(scene){
      if(!scene || !scene.mpvP1Team || scene.mpvOver) return;

      const member = scene.mpvP1Team[scene.mpvP1Index];

      if(member){
        member.hp = 0;
        member.alive = false;
      }

      const next = mpvNextAliveIndex(scene.mpvP1Team,scene.mpvP1Index);

      if(next < 0){
        mpvFinishMatch(scene,"P2 WINS");
        return;
      }

      scene.mpvP1Index = next;

      scene.time.delayedCall(900,()=>{
        if(scene.mpvOver) return;

        mpvApplyP1Fighter(scene,false);
      });
    }

    function mpvHandleCpuKo(scene){
      if(!scene || !scene.mpvP2Team || scene.mpvOver) return;

      const member = scene.mpvP2Team[scene.mpvP2Index];

      if(member){
        member.hp = 0;
        member.alive = false;
      }

      const next = mpvNextAliveIndex(scene.mpvP2Team,scene.mpvP2Index);

      if(next < 0){
        mpvFinishMatch(scene,"P1 WINS");
        return;
      }

      scene.mpvP2Index = next;

      scene.time.delayedCall(900,()=>{
        if(scene.mpvOver) return;

        mpvSpawnCpu(scene);
      });
    }

    function mpvHealTaggedOut(scene){
      if(!scene || !scene.mpvP1Team || !scene.mpvP2Team) return;

      scene.mpvP1Team.forEach((m,index)=>{
        if(!m || !m.alive || index === scene.mpvP1Index) return;

        m.hp = Math.min(m.maxHp || MPV_MAX_HP,(m.hp || 0) + MPV_TAG_HEAL_PER_SECOND);
      });

      scene.mpvP2Team.forEach((m,index)=>{
        if(!m || !m.alive || index === scene.mpvP2Index) return;

        m.hp = Math.min(m.maxHp || MPV_MAX_HP,(m.hp || 0) + MPV_TAG_HEAL_PER_SECOND);
      });
    }

    function mpvCheckTimer(scene){
      if(!scene || scene.mpvOver) return;

      if(scene.time.now - scene.mpvLastSecondTick < 1000) return;

      scene.mpvLastSecondTick += 1000;
      scene.mpvTimeLeft = Math.max(0,(scene.mpvTimeLeft || 0) - 1);

      if(scene.mpvTimeLeft <= 0){
        mpvSyncActiveHp(scene);

        const p1Hp = mpvTeamTotalHp(scene.mpvP1Team);
        const p2Hp = mpvTeamTotalHp(scene.mpvP2Team);

        if(p1Hp > p2Hp){
          mpvFinishMatch(scene,"P1 WINS BY TIME");
        }else if(p2Hp > p1Hp){
          mpvFinishMatch(scene,"P2 WINS BY TIME");
        }else{
          mpvFinishMatch(scene,"DRAW");
        }
      }
    }

    function mpvFinishMatch(scene,resultText){
      if(!scene || scene.mpvOver) return;

      scene.mpvOver = true;
      scene.matchOver = true;

      mpvSyncActiveHp(scene);
      mpvUpdateHud(scene);

      scene.add.rectangle(CX,CY,W,H,0x000000,0.55)
        .setDepth(76000)
        .setScrollFactor(0);

      scene.add.text(CX,CY - 22,resultText,{
        font:"52px monospace",
        fill:"#fff45c",
        stroke:"#000000",
        strokeThickness:8
      })
        .setOrigin(0.5)
        .setDepth(76001)
        .setScrollFactor(0);

      scene.add.text(CX,CY + 50,"VERSUS COMPLETE",{
        font:"24px monospace",
        fill:"#ff4fc3",
        stroke:"#000000",
        strokeThickness:5
      })
        .setOrigin(0.5)
        .setDepth(76001)
        .setScrollFactor(0);

      if(scene.zoneText){
        scene.zoneText.setText(resultText);
      }
    }

    function mpvUpdate(scene,time,delta){
      if(!scene || !mpvIsVersus()) return;
      if(!scene.mpvSetupDone || !scene.mpvStarted || scene.mpvOver) return;

      mpvSyncActiveHp(scene);

      if(scene.time.now - scene.mpvLastHealTick >= 1000){
        scene.mpvLastHealTick += 1000;
        mpvHealTaggedOut(scene);
      }

      if(scene.playerHealth <= 0){
        mpvHandleP1Ko(scene);
        return;
      }

      if(scene.mpvCpu && (scene.mpvCpu.health <= 0 || scene.mpvCpu.dead || scene.mpvCpu.state === "dead")){
        mpvHandleCpuKo(scene);
        return;
      }

      mpvCpuAutoTag(scene);
      mpvCheckTimer(scene);
      mpvUpdateHud(scene);
    }

    /* -------------------------------------------------------
       Disable story waves/bosses in Versus
    ------------------------------------------------------- */

    const MPV_OLD_CREATE_ENEMIES = Game.prototype.createEnemies;

    Game.prototype.createEnemies = function(){
      if(mpvIsVersus()){
        this.enemies = [];
        this.enemyWaves = [];
        this.enemyWaveIndex = 0;
        this.waveSpawning = false;
        this.initialWaveStarted = true;
        this.doormanSpawned = true;
        return;
      }

      MPV_OLD_CREATE_ENEMIES.call(this);
    };

    if(Game.prototype.spawnEnemyWave){
      const MPV_OLD_SPAWN_WAVE = Game.prototype.spawnEnemyWave;

      Game.prototype.spawnEnemyWave = function(index){
        if(mpvIsVersus()){
          return false;
        }

        return MPV_OLD_SPAWN_WAVE.call(this,index);
      };
    }

    if(Game.prototype.advanceEnemyWaveOrBoss){
      const MPV_OLD_ADVANCE_WAVE = Game.prototype.advanceEnemyWaveOrBoss;

      Game.prototype.advanceEnemyWaveOrBoss = function(){
        if(mpvIsVersus()){
          return;
        }

        MPV_OLD_ADVANCE_WAVE.call(this);
      };
    }

    if(Game.prototype.checkVictory){
      const MPV_OLD_CHECK_VICTORY = Game.prototype.checkVictory;

      Game.prototype.checkVictory = function(){
        if(mpvIsVersus()){
          return;
        }

        MPV_OLD_CHECK_VICTORY.call(this);
      };
    }

    /* -------------------------------------------------------
       Hook Game create/unlock/update
    ------------------------------------------------------- */

    const MPV_OLD_GAME_CREATE = Game.prototype.create;

    Game.prototype.create = function(){
      MPV_OLD_GAME_CREATE.call(this);

      if(mpvIsVersus()){
        mpvSetupMatch(this);
      }
    };

    if(Game.prototype.unlockPlayerControl){
      const MPV_OLD_UNLOCK_PLAYER = Game.prototype.unlockPlayerControl;

      Game.prototype.unlockPlayerControl = function(){
        MPV_OLD_UNLOCK_PLAYER.call(this);

        if(mpvIsVersus()){
          mpvStartMatch(this);
        }
      };
    }

    if(Game.prototype.safeUpdate){
      const MPV_OLD_SAFE_UPDATE = Game.prototype.safeUpdate;

      Game.prototype.safeUpdate = function(time,delta){
        MPV_OLD_SAFE_UPDATE.call(this,time,delta);
        mpvUpdate(this,time || 0,delta || 16.67);
      };
    }

    /* -------------------------------------------------------
       Damage hooks
    ------------------------------------------------------- */

    if(Game.prototype.damagePlayer){
      const MPV_OLD_DAMAGE_PLAYER = Game.prototype.damagePlayer;

      Game.prototype.damagePlayer = function(amount,dir){
        MPV_OLD_DAMAGE_PLAYER.call(this,amount,dir);

        if(mpvIsVersus() && this.mpvSetupDone && this.mpvP1Team){
          const member = this.mpvP1Team[this.mpvP1Index];

          if(member){
            member.hp = Math.max(0,this.playerHealth || 0);
            member.alive = member.hp > 0;
          }

          if(this.playerHealth <= 0){
            mpvHandleP1Ko(this);
          }

          mpvUpdateHud(this);
        }
      };
    }

    if(Game.prototype.damageEnemy){
      const MPV_OLD_DAMAGE_ENEMY = Game.prototype.damageEnemy;

      Game.prototype.damageEnemy = function(e,damage,stagger){
        MPV_OLD_DAMAGE_ENEMY.call(this,e,damage,stagger);

        if(mpvIsVersus() && e && e.mpvCpuOpponent && this.mpvP2Team){
          const member = this.mpvP2Team[this.mpvP2Index];

          if(member){
            member.hp = Math.max(0,e.health || 0);
            member.alive = member.hp > 0;
          }

          if((e.health <= 0 || e.dead || e.state === "dead") && !e.mpvKoHandled){
            e.mpvKoHandled = true;
            mpvHandleCpuKo(this);
          }

          mpvUpdateHud(this);
        }
      };
    }

    /* -------------------------------------------------------
       Mobile button safety: make MENU/TAG stay visible
    ------------------------------------------------------- */

    if(Game.prototype.mpPutControllerOnTop){
      const MPV_OLD_PUT_CONTROLLER_TOP = Game.prototype.mpPutControllerOnTop;

      Game.prototype.mpPutControllerOnTop = function(){
        MPV_OLD_PUT_CONTROLLER_TOP.call(this);

        if(this.mpvHud && this.mpvHud.tagBox){
          this.mpvHud.tagBox.setDepth(90050);
          this.mpvHud.tagText.setDepth(90051);
        }
      };
    }
  }

})();

/* =========================================================
   END COMBINED VERSUS 3v3 + TAG + TEAM SELECT PREVIEW PATCH
========================================================= */
 /* =========================================================
   VERSUS FULLSCREEN HUD + TAG FACE BUTTON FIX
   - Pulls Versus camera back so full screen/HUD is visible
   - Rebuilds Versus HUD inside safe screen area
   - Moves TAG button to right side under P1 health/groove
   - TAG button shows next teammate sprite/head preview
   Paste AFTER combined Versus patch and ABOVE: const config = {
========================================================= */

(function(){
  if(window.MP_VERSUS_FULLSCREEN_TAG_FACE_FIX_V1) return;
  window.MP_VERSUS_FULLSCREEN_TAG_FACE_FIX_V1 = true;

  if(typeof Game === "undefined") return;

  const MPV_UI_VERSION = "tag_face_right_hud_v1";
  const MPV_TAG_COOLDOWN = 850;

  function mpvIsVersusMode(){
    return String(window.selectedGameMode || "").toLowerCase() === "versus";
  }

  function mpvCleanFighterId(id){
    id = String(id || "DONNY").toUpperCase();

    if(id === "DONNY") return "DONNY";
    if(id === "JT") return "JT";
    if(id === "HEW") return "HEW";
    if(id === "JACKSON") return "JACKSON";

    return id;
  }

  function mpvNextAliveIndex(team,currentIndex){
    if(!team || !team.length) return -1;

    for(let i = 1; i <= team.length; i++){
      const idx = (currentIndex + i) % team.length;
      const member = team[idx];

      if(member && member.alive !== false && member.hp > 0){
        return idx;
      }
    }

    return -1;
  }

  function mpvSetCurrentFighter(id){
    id = mpvCleanFighterId(id);

    window.selectedFighter = id;

    try{
      selectedFighter = id;
    }catch(e){}
  }

  function mpvPreviewConfig(id){
    id = mpvCleanFighterId(id);

    const map = {
      DONNY:{
        sheet:"donny_movement",
        frame:0,
        crop:{x:0,y:0,w:210,h:92}
      },
      JT:{
        sheet:"jt_movement",
        frame:0,
        crop:{x:0,y:0,w:204,h:78}
      },
      HEW:{
        sheet:"hew_movement",
        frame:0,
        crop:{x:0,y:0,w:250,h:105}
      },
      JACKSON:{
        sheet:"jackson_movement",
        frame:0,
        crop:{x:0,y:0,w:256,h:110}
      }
    };

    return map[id] || map.DONNY;
  }

  function mpvDestroy(obj){
    if(obj && obj.destroy){
      obj.destroy();
    }
  }

  function mpvDestroyList(list){
    if(!list) return;

    list.forEach(obj=>{
      mpvDestroy(obj);
    });
  }

  /* =======================================================
     FULL SCREEN / CAMERA PULLBACK
  ======================================================= */

  function mpvForceFullVersusCamera(scene){
    if(!scene || !mpvIsVersusMode()) return;
    if(!scene.cameras || !scene.cameras.main) return;

    const cam = scene.cameras.main;

    // This is the main fix for missing screen edges.
    // Versus should show the whole arena and full HUD.
    if(cam.zoom !== 1){
      cam.setZoom(1);
    }

    cam.setBounds(0,0,W,H);
    cam.roundPixels = true;

    if(scene.player && !scene.mpvCameraFixed){
      scene.mpvCameraFixed = true;
      cam.startFollow(scene.player,true,0.08,0.08);
    }

    // Keep page/canvas filling the visible browser area.
    try{
      document.documentElement.style.width = "100vw";
      document.documentElement.style.height = "100dvh";
      document.body.style.width = "100vw";
      document.body.style.height = "100dvh";

      const gameDiv = document.getElementById("game");
      if(gameDiv){
        gameDiv.style.width = "100vw";
        gameDiv.style.height = "100dvh";
      }

      document.querySelectorAll("canvas").forEach(canvas=>{
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.objectFit = "contain";
      });
    }catch(e){}
  }

  /* =======================================================
     LEFT HUD SAFETY
  ======================================================= */

  function mpvMoveLeftHudSafe(scene){
    if(!scene || !scene.children) return;

    const leftX = 44;
    const topY = 76;

    scene.children.list.forEach(obj=>{
      if(!obj || typeof obj.text !== "string") return;

      const txt = obj.text.toUpperCase();

      const isHud =
        txt.indexOf("CHAR:") === 0 ||
        txt.indexOf("LEVEL:") === 0 ||
        txt.indexOf("COMBO:") === 0 ||
        txt.indexOf("HP:") === 0 ||
        txt.indexOf("RHYTHM") >= 0 ||
        txt.indexOf("GROOVE") >= 0;

      if(!isHud) return;

      if(obj.x < leftX) obj.x = leftX;
      if(obj.y < topY) obj.y = topY;

      if(obj.setScrollFactor) obj.setScrollFactor(0);
      if(obj.setDepth) obj.setDepth(65000);
    });

    if(scene.comboText){
      scene.comboText.x = leftX;
      scene.comboText.y = topY + 48;
      scene.comboText.setScrollFactor(0).setDepth(65000);
    }

    if(scene.playerHealthText){
      scene.playerHealthText.x = leftX;
      scene.playerHealthText.y = topY + 72;
      scene.playerHealthText.setScrollFactor(0).setDepth(65000);
    }

    if(scene.debugInputText){
      scene.debugInputText.x = leftX;
      scene.debugInputText.y = topY + 98;
      scene.debugInputText.setScrollFactor(0).setDepth(65000);
    }
  }

  /* =======================================================
     TAG LOGIC FOR NEW BUTTON
  ======================================================= */

  function mpvTagPlayerOne(scene){
    if(!scene || !mpvIsVersusMode()) return;
    if(!scene.mpvP1Team || !scene.mpvP1Team.length) return;
    if(scene.mpvOver || scene.matchOver) return;

    if(scene.time && scene.time.now < (scene.mpvNextTagTime || 0)){
      if(scene.zoneText){
        scene.zoneText.setText("TAG COOLDOWN");
      }
      return;
    }

    const current = scene.mpvP1Team[scene.mpvP1Index || 0];

    if(current){
      current.hp = Phaser.Math.Clamp(
        scene.playerHealth || 0,
        0,
        current.maxHp || 100
      );

      current.alive = current.hp > 0;
    }

    const nextIndex = mpvNextAliveIndex(
      scene.mpvP1Team,
      scene.mpvP1Index || 0
    );

    if(nextIndex < 0 || nextIndex === scene.mpvP1Index){
      if(scene.zoneText){
        scene.zoneText.setText("NO TAG AVAILABLE");
      }
      return;
    }

    scene.mpvP1Index = nextIndex;
    scene.mpvNextTagTime = scene.time.now + MPV_TAG_COOLDOWN;

    const next = scene.mpvP1Team[scene.mpvP1Index];

    mpvSetCurrentFighter(next.id);

    scene.playerHealth = Phaser.Math.Clamp(
      next.hp || next.maxHp || 100,
      1,
      next.maxHp || 100
    );

    if(scene.poseSprite){
      scene.poseSprite.stop();
      scene.poseSprite.setVisible(false);
    }

    if(scene.player){
      scene.player.setVisible(true);
      scene.player.clearTint();

      if(scene.getPlayerMoveSheet){
        scene.player.setTexture(scene.getPlayerMoveSheet());
      }

      scene.player.setOrigin(0.5,1);

      if(scene.getPlayerMoveScale){
        scene.player.setScale(scene.getPlayerMoveScale());
      }

      if(scene.getPlayerAnim){
        const idle = scene.getPlayerAnim("idle_down");

        if(scene.anims && scene.anims.exists(idle)){
          scene.player.play(idle,true);
        }
      }
    }

    scene.playerBusy = false;
    scene.busyUntil = 0;
    scene.isJumping = false;
    scene.isCrouching = false;
    scene.isBlocking = false;

    if(scene.createHitFX && scene.player){
      scene.createHitFX(scene.player.x,scene.player.y - 58,"jump",5);
    }

    if(scene.zoneText){
      scene.zoneText.setText("TAGGED IN: " + next.name);
    }

    mpvUpdateTagFace(scene,true);
  }

  function mpvUpdateTagFace(scene,force){
    if(!scene || !scene.mpvHud || !scene.mpvP1Team) return;

    const nextIndex = mpvNextAliveIndex(
      scene.mpvP1Team,
      scene.mpvP1Index || 0
    );

    const next = nextIndex >= 0
      ? scene.mpvP1Team[nextIndex]
      : null;

    const nextId = next ? mpvCleanFighterId(next.id) : "NONE";

    if(!force && scene.mpvCurrentTagFaceId === nextId) return;

    scene.mpvCurrentTagFaceId = nextId;

    if(scene.mpvHud.tagFace){
      scene.mpvHud.tagFace.destroy();
      scene.mpvHud.tagFace = null;
    }

    if(scene.mpvHud.tagText){
      scene.mpvHud.tagText.setText(next ? "TAG" : "NO TAG");
    }

    if(scene.mpvHud.tagNextText){
      scene.mpvHud.tagNextText.setText(next ? next.name : "NONE");
    }

    if(!next) return;

    const cfg = mpvPreviewConfig(nextId);
    const x = scene.mpvHud.tagFaceBack.x;
    const y = scene.mpvHud.tagFaceBack.y + 11;

    if(scene.textures && scene.textures.exists(cfg.sheet)){
      const face = scene.add.sprite(x,y,cfg.sheet,cfg.frame)
        .setOrigin(0.5,0.5)
        .setScrollFactor(0)
        .setDepth(65003);

      if(face.setCrop && cfg.crop){
        face.setCrop(cfg.crop.x,cfg.crop.y,cfg.crop.w,cfg.crop.h);
      }

      face.setDisplaySize(34,34);

      scene.mpvHud.tagFace = face;
      scene.mpvHudItems.push(face);
    }else{
      const fallback = scene.add.text(x,y - 10,next.name.charAt(0),{
        font:"20px monospace",
        fill:"#fff45c",
        stroke:"#000000",
        strokeThickness:4
      })
        .setOrigin(0.5)
        .setScrollFactor(0)
        .setDepth(65003);

      scene.mpvHud.tagFace = fallback;
      scene.mpvHudItems.push(fallback);
    }
  }

  function mpvUpdateRightHudValues(scene){
    if(!scene || !scene.mpvHud || !mpvIsVersusMode()) return;

    const p1 = scene.mpvP1Team
      ? scene.mpvP1Team[scene.mpvP1Index || 0]
      : null;

    if(p1 && scene.mpvHud.p1Name){
      scene.mpvHud.p1Name.setText(
        p1.name + "  HP " + Math.max(0,Math.floor(scene.playerHealth || p1.hp || 0))
      );
    }

    if(scene.mpvHud.hpFill){
      const maxHp = p1 ? (p1.maxHp || 100) : 100;
      const pct = Phaser.Math.Clamp((scene.playerHealth || 0) / maxHp,0,1);
      scene.mpvHud.hpFill.setScale(pct,1);
    }

    if(scene.mpvHud.grooveFill){
      const groovePct = Phaser.Math.Clamp((scene.rhythm || 0) / 10,0,1);
      scene.mpvHud.grooveFill.setScale(groovePct,1);
    }

    if(scene.mpvHud.timer && typeof scene.mpvTimeLeft === "number"){
      const t = Math.max(0,Math.floor(scene.mpvTimeLeft));
      const m = Math.floor(t / 60);
      const s = String(t % 60).padStart(2,"0");
      scene.mpvHud.timer.setText("TIME " + m + ":" + s);
    }

    mpvUpdateTagFace(scene,false);
  }

  /* =======================================================
     HOOK GAME CREATE / UPDATE
  ======================================================= */

  const MPV_OLD_CREATE_FULLSCREEN_TAG_FIX = Game.prototype.create;

  Game.prototype.create = function(){
    MPV_OLD_CREATE_FULLSCREEN_TAG_FIX.call(this);

    if(mpvIsVersusMode()){
      mpvForceFullVersusCamera(this);
      mpvMoveLeftHudSafe(this);

      this.time.delayedCall(80,()=>{
        mpvForceFullVersusCamera(this);
        mpvMoveLeftHudSafe(this);
        mpvBuildRightVersusHud(this);
        mpvUpdateRightHudValues(this);
      });
    }
  };

  const MPV_OLD_UPDATE_FULLSCREEN_TAG_FIX = Game.prototype.update;

  Game.prototype.update = function(time,delta){
    if(MPV_OLD_UPDATE_FULLSCREEN_TAG_FIX){
      MPV_OLD_UPDATE_FULLSCREEN_TAG_FIX.call(this,time,delta);
    }

    if(!mpvIsVersusMode()) return;

    mpvForceFullVersusCamera(this);
    mpvMoveLeftHudSafe(this);
    mpvBuildRightVersusHud(this);
    mpvUpdateRightHudValues(this);
  };

  if(Game.prototype.safeUpdate){
    const MPV_OLD_SAFE_UPDATE_FULLSCREEN_TAG_FIX = Game.prototype.safeUpdate;

    Game.prototype.safeUpdate = function(time,delta){
      MPV_OLD_SAFE_UPDATE_FULLSCREEN_TAG_FIX.call(this,time,delta);

      if(!mpvIsVersusMode()) return;

      mpvForceFullVersusCamera(this);
      mpvMoveLeftHudSafe(this);
      mpvBuildRightVersusHud(this);
      mpvUpdateRightHudValues(this);
    };
  }

})();

(function () {

  /* =========================================================
     CONFIG

  const TITLE_SCENE_NAMES = [
    "TitleScreen",

    xRatio: 0.505,
    yRatio: 0.505,
    angle: -7,
    fontSize: 24,
    letterSpacing: 2
  };

  /* =========================================================
     HELPERS
  ========================================================= */
  function getSceneManagerKeys(scene) {
    try {
      return Object.keys(scene.scene.manager.keys || {});
    } catch (e) {
      return [];
    }
  }

  function findFirstExistingSceneKey(scene, candidates) {
    const keys = getSceneManagerKeys(scene);
    for (const key of candidates) {
      if (keys.includes(key)) return key;
    }
    return null;
  }

  function safeSetLetterSpacing(textObj, value) {
    if (textObj && typeof textObj.setLetterSpacing === "function") {
      textObj.setLetterSpacing(value);
    }
  }

  function patchCreate(Ctor, patchFn, flagName) {
    if (!Ctor || !Ctor.prototype) return false;
    if (Ctor.prototype[flagName]) return true;

    const oldCreate = Ctor.prototype.create;
    Ctor.prototype.create = function () {
      if (oldCreate) oldCreate.apply(this, arguments);
      patchFn(this);
    };

    Ctor.prototype[flagName] = true;
    return true;
  }

  function patchUpdate(Ctor, patchFn, flagName) {
    if (!Ctor || !Ctor.prototype) return false;
    if (Ctor.prototype[flagName]) return true;

    const oldUpdate = Ctor.prototype.update;
    Ctor.prototype.update = function () {
      if (oldUpdate) oldUpdate.apply(this, arguments);
      patchFn(this);
    };

    Ctor.prototype[flagName] = true;
    return true;
  }

  function patchMethod(Ctor, methodName, patchFn, flagName) {
    if (!Ctor || !Ctor.prototype || typeof Ctor.prototype[methodName] !== "function") return false;

    const protoFlag = `${flagName}_${methodName}`;
    if (Ctor.prototype[protoFlag]) return true;

    const oldMethod = Ctor.prototype[methodName];
    Ctor.prototype[methodName] = function () {
      const result = oldMethod.apply(this, arguments);
      patchFn(this, methodName);
      return result;
    };

    Ctor.prototype[protoFlag] = true;
    return true;
  }

  /* =========================================================
     TITLE PATCH - DES MOINES

  function tryPatchTitleScenes() {
    let installed = false;

    for (const sceneName of TITLE_SCENE_NAMES) {
      const Ctor = window[sceneName];
      if (!Ctor) continue;

      const ok = patchCreate(
        Ctor,

      );

      if (ok) installed = true;

    return installed;
  }

  /* =========================================================
     VERSUS END PROMPT PATCH
  ========================================================= */
  function getVersusResultText(scene) {
    if (scene.winnerText && typeof scene.winnerText === "string") {
      return scene.winnerText.toUpperCase();
    }

    if (scene.winnerName && typeof scene.winnerName === "string") {
      return `${scene.winnerName.toUpperCase()} WINS`;
    }

    if (scene.winningTeam && typeof scene.winningTeam === "string") {
      return `${scene.winningTeam.toUpperCase()} WINS`;
    }

    if (scene.player1Won) return "PLAYER 1 WINS";
    if (scene.player2Won) return "PLAYER 2 WINS";

    if (scene.timeUp) return "TIME UP";
    if (scene.matchDraw) return "DRAW";

    return "MATCH OVER";
  }

  function goToCharacterSelect(scene) {
    const charSelectKey = findFirstExistingSceneKey(scene, CHAR_SELECT_SCENE_NAMES);

    cleanupVersusEndPrompt(scene);

    if (charSelectKey) {
      scene.scene.start(charSelectKey);
    } else {
      console.warn("Character Select scene not found. Falling back to restart.");
      scene.scene.restart(scene.mpVersusRestartData || {});
    }
  }

  function retryVersusMatch(scene) {
    const data = scene.mpVersusRestartData || {};
    cleanupVersusEndPrompt(scene);
    scene.scene.restart(data);
  }

  function cleanupVersusEndPrompt(scene) {
    if (!scene) return;

    if (scene.mpVersusPromptContainer) {
      scene.mpVersusPromptContainer.destroy(true);
      scene.mpVersusPromptContainer = null;
    }

    if (scene.mpVersusPromptKeys) {
      scene.mpVersusPromptKeys.destroy();
      scene.mpVersusPromptKeys = null;
    }

    scene.mpVersusPromptShown = false;
    scene.mpVersusChoice = 0;

    if (scene.physics && scene.physics.world && scene.mpVersusPhysicsPaused) {
      scene.physics.world.resume();
      scene.mpVersusPhysicsPaused = false;
    }
  }

  function createPromptButton(scene, x, y, w, h, label, onClick) {
    const bg = scene.add.rectangle(x, y, w, h, 0x120812, 0.95)
      .setStrokeStyle(3, 0xff4ccf, 1)
      .setInteractive({ useHandCursor: true });

    const glow = scene.add.rectangle(x, y, w + 8, h + 8, 0xff4ccf, 0.10)
      .setStrokeStyle(1, 0xff95e9, 0.5);

      fontSize: "22px",
      color: "#ffffff",

    }).setOrigin(0.5);

  function refreshPromptSelection(scene) {
    if (!scene.mpVersusButtons) return;

    const activeIndex = scene.mpVersusChoice || 0;

    scene.mpVersusButtons.forEach((btn, i) => {
      const active = i === activeIndex;

      btn.bg.setFillStyle(active ? 0x351035 : 0x120812, 0.98);
      btn.bg.setStrokeStyle(active ? 4 : 3, active ? 0xffffff : 0xff4ccf, 1);
      btn.glow.setAlpha(active ? 0.20 : 0.10);

  function showVersusEndPrompt(scene, resultText) {
    if (!scene || scene.mpVersusPromptShown) return;
    if (!scene.add || !scene.cameras || !scene.cameras.main) return;

    scene.mpVersusPromptShown = true;
    scene.mpVersusChoice = 0;

    }).setOrigin(0.5);

      fontFamily: "Arial, sans-serif",

      color: "#ffd8f3",
      align: "center"
    }).setOrigin(0.5);

    const retryBtn = createPromptButton(scene, cx, cy + 28, 260, 52, "RETRY", () => {
      retryVersusMatch(scene);
    });

    const charBtn = createPromptButton(scene, cx, cy + 94, 260, 52, "CHARACTER SELECT", () => {
      goToCharacterSelect(scene);
    });

    const footer = scene.add.text(cx, cy + 138, "← / → or A / D to choose • ENTER to confirm", {
      fontFamily: "Arial, sans-serif",
      fontSize: "14px",
      color: "#bbbbbb",
      align: "center"
    }).setOrigin(0.5);

    scene.mpVersusButtons = [retryBtn, charBtn];

    const container = scene.add.container(0, 0, [
      overlay,
      panelGlow,
      panel,
      title,
      subtitle,
      retryBtn.glow,
      retryBtn.bg,
      retryBtn.txt,
      charBtn.glow,
      charBtn.bg,
      charBtn.txt,
      footer
    ]);

    container.setDepth(999999);

    scene.mpVersusPromptContainer = container;

    refreshPromptSelection(scene);

    const keys = scene.input.keyboard.addKeys({
      left: Phaser.Input.Keyboard.KeyCodes.LEFT,
      right: Phaser.Input.Keyboard.KeyCodes.RIGHT,
      up: Phaser.Input.Keyboard.KeyCodes.UP,
      down: Phaser.Input.Keyboard.KeyCodes.DOWN,
      a: Phaser.Input.Keyboard.KeyCodes.A,
      d: Phaser.Input.Keyboard.KeyCodes.D,
      enter: Phaser.Input.Keyboard.KeyCodes.ENTER,
      space: Phaser.Input.Keyboard.KeyCodes.SPACE,
      esc: Phaser.Input.Keyboard.KeyCodes.ESC
    });

    scene.mpVersusPromptKeys = keys;

    const keyHandler = () => {
      if (!scene.mpVersusPromptShown) return;

      const justPressed = Phaser.Input.Keyboard.JustDown;

      if (
        justPressed(keys.left) ||
        justPressed(keys.up) ||
        justPressed(keys.a)
      ) {
        scene.mpVersusChoice = 0;
        refreshPromptSelection(scene);
      }

      if (
        justPressed(keys.right) ||
        justPressed(keys.down) ||
        justPressed(keys.d)
      ) {
        scene.mpVersusChoice = 1;
        refreshPromptSelection(scene);
      }

      if (
        justPressed(keys.enter) ||
        justPressed(keys.space)
      ) {
        if (scene.mpVersusChoice === 0) {
          retryVersusMatch(scene);
        } else {
          goToCharacterSelect(scene);
        }
      }

      if (justPressed(keys.esc)) {
        goToCharacterSelect(scene);
      }
    };

    scene.events.on("update", keyHandler);

    scene.events.once("shutdown", () => {
      scene.events.off("update", keyHandler);
      cleanupVersusEndPrompt(scene);
    });

    scene.events.once("destroy", () => {
      scene.events.off("update", keyHandler);
      cleanupVersusEndPrompt(scene);
    });
  }

  function maybeShowVersusPrompt(scene) {
    if (!scene || scene.mpVersusPromptShown) return;

    const ended =
      !!scene.matchEnded ||
      !!scene.isMatchOver ||
      !!scene.versusEnded ||
      !!scene.fightOver ||
      !!scene.gameOverFlag ||
      !!scene.matchOver ||
      !!scene.roundOver ||
      !!scene.endOfMatch ||
      !!scene.winner ||
      !!scene.winnerName;

    if (!ended) return;

    showVersusEndPrompt(scene, getVersusResultText(scene));
  }

  function setupVersusScene(scene) {
    if (!scene || scene.mpVersusSetupDone) return;
    scene.mpVersusSetupDone = true;

    const data = (scene.scene && scene.scene.settings && scene.scene.settings.data) || {};
    scene.mpVersusRestartData = { ...data };
  }

  function tryPatchVersusScenes() {
    let installed = false;

    for (const sceneName of VERSUS_SCENE_NAMES) {
      const Ctor = window[sceneName];
      if (!Ctor) continue;

      const createPatched = patchCreate(
        Ctor,
        setupVersusScene,
        "mpVersusCreatePatched"
      );

      const updatePatched = patchUpdate(
        Ctor,
        maybeShowVersusPrompt,
        "mpVersusUpdatePatched"
      );

      const endMethodNames = [
        "endMatch",
        "finishMatch",
        "handleMatchEnd",
        "onMatchEnd",
        "gameOver",
        "showGameOver",
        "endRound"
      ];

      let anyMethodPatched = false;

      endMethodNames.forEach((methodName) => {
        const ok = patchMethod(
          Ctor,
          methodName,
          function (scene) {
            if (!scene || scene.mpVersusPromptShown) return;
            if (scene.time && typeof scene.time.delayedCall === "function") {
              scene.time.delayedCall(50, () => {
                showVersusEndPrompt(scene, getVersusResultText(scene));
              });
            } else {
              showVersusEndPrompt(scene, getVersusResultText(scene));
            }
          },
          "mpVersusEndMethodPatched"
        );
        if (ok) anyMethodPatched = true;
      });

      if (createPatched || updatePatched || anyMethodPatched) {
        installed = true;
      }
    }

    return installed;
  }

  /* =========================================================
     INSTALL
  ========================================================= */
  function tryInstallAllPatches() {
    const titleOk = tryPatchTitleScenes();
    const versusOk = tryPatchVersusScenes();
    return titleOk || versusOk;
  }

  let installed = tryInstallAllPatches();

  if (!installed) {
    const timer = setInterval(() => {
      installed = tryInstallAllPatches();
      if (installed) clearInterval(timer);
    }, 200);

    setTimeout(() => clearInterval(timer), 10000);
  }
})();

/* =========================================================
   10-MINUTE VERSUS TIMER + POST-MATCH OPTIONS PATCH
   - Forces 10:00 timer for every versus match
   - Resets timer at match start so it never drains during countdown/loading
   - Allows MENU / START after match over
========================================================= */
(function(){
  if(window.MP_TIMER_10_MIN_POST_MATCH_MENU_PATCH_V1) return;
  window.MP_TIMER_10_MIN_POST_MATCH_MENU_PATCH_V1 = true;

  const MP_FORCE_MATCH_SECONDS = 600;

  if(window.Game && Game.prototype){
    const oldTogglePauseMenu = Game.prototype.togglePauseMenu;
    if(oldTogglePauseMenu){
      Game.prototype.togglePauseMenu = function(){
        const wasMatchOver = !!this.matchOver;
        const oldMatchStarted = this.matchStarted;

        if(wasMatchOver && !this.matchStarted){
          this.matchStarted = true;
        }

        oldTogglePauseMenu.call(this);

        if(wasMatchOver){
          this.matchStarted = oldMatchStarted;
        }
      };
    }

    const oldOpenPauseMenu = Game.prototype.openPauseMenu;
    if(oldOpenPauseMenu){
      Game.prototype.openPauseMenu = function(){
        oldOpenPauseMenu.call(this);

        if(this.pauseItems && this.pauseItems.length){
          this.pauseItems.forEach(item=>{
            if(item && item.setDepth){
              const d = item.depth || 0;
              if(d < 100000) item.setDepth(d + 80000);
            }
          });
        }
      };
    }

    const oldCreateForTimer = Game.prototype.create;
    Game.prototype.create = function(){
      oldCreateForTimer.call(this);

      if(String(window.selectedGameMode || "").toLowerCase() === "versus"){
        this.mpvTimeLeft = MP_FORCE_MATCH_SECONDS;
        if(this.time) {
          this.mpvLastSecondTick = this.time.now;
          this.mpvLastHealTick = this.time.now;
        }
        if(this.mpvHud && this.mpvHud.timer){
          this.mpvHud.timer.setText("TIME 10:00");
        }
      }
    };

    const oldSafeUpdateForTimer = Game.prototype.safeUpdate;
    if(oldSafeUpdateForTimer){
      Game.prototype.safeUpdate = function(time,delta){
        if(String(window.selectedGameMode || "").toLowerCase() === "versus"){
          if(!this.mpvStarted && !this.mpvOver){
            this.mpvTimeLeft = MP_FORCE_MATCH_SECONDS;
            if(this.time){
              this.mpvLastSecondTick = this.time.now;
              this.mpvLastHealTick = this.time.now;
            }
          }
        }

        oldSafeUpdateForTimer.call(this,time,delta);
      };
    }
  }
})();

/* =========================================================

   - Removes the extra front card rail
   - Uses the normal/top character-select row
   - Keeps Amber, Johnny, and Greg in the top row as locked cards
   ========================================================= */
(() => {
  const CharacterSelectClass =
    typeof CharacterSelect !== "undefined" ? CharacterSelect : window.CharacterSelect;

  if (!CharacterSelectClass || CharacterSelectClass.__mpBackCarouselOnly) return;
  CharacterSelectClass.__mpBackCarouselOnly = true;

  // Preserve the existing selectFighter handler. In Versus mode this is the 3v3 team-pick handler.
  const oldSelectFighter = CharacterSelectClass.prototype.selectFighter || function () {};

  const oldPreload = CharacterSelectClass.prototype.preload || function () {};

  CharacterSelectClass.prototype.preload = function () {
    oldPreload.apply(this, arguments);

    const v = typeof VERSION !== "undefined" ? VERSION : Date.now();

    const cardLoads = [
      ["amber_card", "assets/cards/amber_card.png?v=" + v],
      ["johnny_card", "assets/cards/johnny_card.png?v=" + v],
      ["greg_card", "assets/cards/greg_card.png?v=" + v],
      ["buddy_harley_card", "assets/cards/buddy_harley_card.png?v=" + v]
    ];

    cardLoads.forEach(([key, src]) => {
      if (!this.textures.exists(key)) {
        this.load.image(key, src);
      }
    });
  };

  function normalizeTopFighters(scene) {
    const existing = Array.isArray(scene.fighters) ? scene.fighters : [];

    const byId = {};
    existing.forEach((fighter) => {
      if (!fighter || !fighter.id) return;
      byId[String(fighter.id).toLowerCase()] = fighter;
    });

    const defaults = {
      donny: {
        id: "donny",
        displayName: "DONNY",
        faction: "MOTEL PHEROMONES",
        role: "FRONTMAN / HYPE LEADER",
        weapon: "ANASTASIA",
        cardKey: "char_card_donny",
        unlocked: true
      },
      jt: {
        id: "jt",
        displayName: "JT",
        faction: "MOTEL PHEROMONES",
        role: "RHYTHM CONTROLLER / TEMPO ENGINE",
        weapon: "DRUMSTICKS",
        cardKey: "char_card_jt",
        unlocked: true
      },
      hew: {
        id: "hew",
        displayName: "HEW",
        faction: "MOTEL PHEROMONES",
        role: "TANK / CROWD CONTROL",
        weapon: "MEPHISTA BASS",
        cardKey: "char_card_hew",
        unlocked: true
      },
      jackson: {
        id: "jackson",
        displayName: "JACKSON",
        faction: "ROCKER BOYS",
        role: "LEAD GUITAR",
        weapon: "GRETSCHEN GOLDIE",
        cardKey: "char_card_jackson",
        unlocked: true
      },
      amber: {
        id: "amber",
        displayName: "AMBER",
        faction: "LMNOP",
        role: "LOCKED",
        weapon: "",
        cardKey: "amber_card",
        unlocked: false
      },
      johnny: {
        id: "johnny",
        displayName: "JOHNNY",
        faction: "LMNOP",
        role: "LOCKED",
        weapon: "",
        cardKey: "johnny_card",
        unlocked: false
      },
      greg: {
        id: "greg",
        displayName: "GREG",
        faction: "LMNOP",
        role: "LOCKED",
        weapon: "",
        cardKey: "greg_card",
        unlocked: false
      },
      buddy: {
        id: "buddy",
        displayName: "BUDDY HARLEY",
        faction: "",
        role: "LOCKED",
        weapon: "",
        cardKey: "buddy_harley_card",
        unlocked: false
      }
    };

    const order = ["donny", "jt", "hew", "jackson", "amber", "johnny", "greg", "buddy"];

    const clean = order.map((id) => ({
      ...defaults[id],
      ...(byId[id] || {}),
      id: defaults[id].id,
      displayName: defaults[id].displayName,
      cardKey: defaults[id].cardKey,
      unlocked: defaults[id].unlocked
    }));

    clean.push(
      {
        id: "empty_1",

        unlocked: false
      },
      {
        id: "empty_2",
        displayName: "EMPTY SLOT",
        faction: "",
        role: "LOCKED",
        weapon: "",
        cardKey: null,
        unlocked: false
      }
    );

    scene.fighters = clean;
  }

  CharacterSelectClass.prototype.buildCards = function () {
    normalizeTopFighters(this);

    const gameW = this.game && this.game.config ? this.game.config.width : W;
    const gameH = this.game && this.game.config ? this.game.config.height : H;
    const sx = gameW / 960;
    const sy = gameH / 540;

    const visibleSlots = 7;
    const cardW = Math.round(108 * sx);
    const cardH = Math.round(228 * sy);
    const gap = Math.round(126 * sx);
    const startX = Math.round(102 * sx);
    const y = Math.round(260 * sy);

    this.cardFrames = [];
    this.cardImages = [];
    this.nameTexts = [];
    this.cardSlots = [];
    this.cardScrollIndex = 0;

    this.fighters.forEach((fighter, index) => {
      const slot = this.add.container(0, 0).setDepth(45);

      const frame = this.add.rectangle(0, 0, cardW, cardH, 0x090009, 0.72)
        .setStrokeStyle(2, fighter.unlocked ? 0x7a225a : 0x444444)
        .setInteractive({ useHandCursor: true });

      let cardObj;

      if (fighter.cardKey && this.textures.exists(fighter.cardKey)) {
        cardObj = this.add.image(0, 0, fighter.cardKey)
          .setDisplaySize(cardW - 8, cardH - 8);
      } else {
        cardObj = this.makePlaceholderCard(0, 0, cardW, cardH, fighter, index);
      }

      const lockShade = this.add.rectangle(
        0,
        0,
        cardW - 8,
        cardH - 8,
        0x000000,
        fighter.unlocked ? 0 : 0.35
      );

      const nameText = this.add.text(0, -cardH / 2 - Math.round(18 * sy), fighter.displayName, {
        fontFamily: "monospace",
        fontSize: fighter.displayName.length > 7 ? Math.round(11 * sy) + "px" : Math.round(15 * sy) + "px",
        color: fighter.unlocked ? "#ffffff" : "#777777",

        strokeThickness: 3
      }).setOrigin(0.5);

      slot.add([frame, cardObj, lockShade, nameText]);

      slot.setInteractive(
        new Phaser.Geom.Rectangle(-cardW / 2, -cardH / 2, cardW, cardH),
        Phaser.Geom.Rectangle.Contains
      );

      slot.on("pointerdown", () => {
        this.selectedIndex = index;

        if (fighter.unlocked) {
          this.selectFighter();

      });

      this.cardFrames.push(frame);
      this.cardImages.push(cardObj);
      this.nameTexts.push(nameText);
      this.cardSlots.push({ slot, frame, cardObj, lockShade, nameText, fighter, index });
    });

    this.backCarouselLayout = {
      visibleSlots,
      cardW,
      cardH,
      gap,
      startX,
      y
    };
  };

  CharacterSelectClass.prototype.keepBackCarouselVisible = function () {
    const layout = this.backCarouselLayout || { visibleSlots: 7 };
    const visibleSlots = layout.visibleSlots || 7;

    if (this.selectedIndex < this.cardScrollIndex) {
      this.cardScrollIndex = this.selectedIndex;
    }

    if (this.selectedIndex > this.cardScrollIndex + visibleSlots - 1) {
      this.cardScrollIndex = this.selectedIndex - visibleSlots + 1;
    }

    this.cardScrollIndex = Phaser.Math.Clamp(
      this.cardScrollIndex || 0,
      0,
      Math.max(0, this.fighters.length - visibleSlots)
    );
  };

  CharacterSelectClass.prototype.moveSelection = function (direction) {
    if (!this.fighters || !this.fighters.length) return;

    this.selectedIndex += direction;

    if (this.selectedIndex < 0) this.selectedIndex = this.fighters.length - 1;
    if (this.selectedIndex >= this.fighters.length) this.selectedIndex = 0;

    this.keepBackCarouselVisible();
    this.updateSelection();
  };

  CharacterSelectClass.prototype.updateSelection = function () {
    if (!this.fighters || !this.fighters.length) return;

    this.keepBackCarouselVisible();

    const layout = this.backCarouselLayout || {
      visibleSlots: 7,
      cardW: 108,
      cardH: 228,
      gap: 126,
      startX: 102,
      y: 260
    };

    const selectedFighter = this.fighters[this.selectedIndex];

    if (this.cardSlots) {
      this.cardSlots.forEach((item) => {
        const fighter = this.fighters[item.index];
        const selected = item.index === this.selectedIndex;
        const unlocked = !!fighter.unlocked;
        const visibleIndex = item.index - this.cardScrollIndex;
        const visible = visibleIndex >= 0 && visibleIndex < layout.visibleSlots;
        const x = layout.startX + visibleIndex * layout.gap;

        item.slot.setVisible(visible);
        item.slot.setPosition(x, layout.y);
        item.slot.setScale(selected ? 1.08 : 1.0);

        item.frame.setStrokeStyle(
          selected ? 5 : 2,
          selected ? 0xff1493 : unlocked ? 0x7a225a : 0x444444,
          selected ? 1 : 0.85
        );

        item.frame.setFillStyle(
          unlocked ? 0x090009 : 0x111111,
          selected ? 0.96 : 0.72
        );

        item.lockShade.setAlpha(unlocked ? 0 : 0.35);
        item.nameText.setColor(selected ? "#ff4fc3" : unlocked ? "#ffffff" : "#777777");

        if (item.cardObj && item.cardObj.setAlpha) {
          item.cardObj.setAlpha(unlocked ? 1 : 0.55);
        }

        if (item.cardObj && item.cardObj.texture && item.cardObj.texture.key && item.cardObj.setDisplaySize) {
          item.cardObj.setDisplaySize(layout.cardW - 8, layout.cardH - 8);
        }
      });
    }

    if (this.infoName && selectedFighter) {
      this.infoName.setText(selectedFighter.displayName);
      this.infoFaction.setText("FACTION: " + (selectedFighter.faction || "LOCKED"));
      this.infoRole.setText("ROLE: " + selectedFighter.role);
      this.infoWeapon.setText("WEAPON: " + (selectedFighter.weapon || ""));
    }
  };

  CharacterSelectClass.prototype.selectFighter = function () {
    const fighter = this.fighters && this.fighters[this.selectedIndex];
    if (!fighter) return;

    if (!fighter.unlocked) {
      if (this.infoName) this.infoName.setText(fighter.displayName);
      if (this.infoFaction) this.infoFaction.setText("FACTION: " + (fighter.faction || "LOCKED"));
      if (this.infoRole) this.infoRole.setText("ROLE: LOCKED");
      if (this.infoWeapon) this.infoWeapon.setText("WEAPON: ");
      return;
    }

    // Delegate selection to the existing handler.
    // In Versus mode this populates P1/P2 teams; in non-versus it starts LevelSelect.
    oldSelectFighter.apply(this, arguments);
  };
})();

(function(){

    if(id === "HEW") return "HEW";

  function mpFinalFighterVisual(id, action){
    id = mpFinalCleanId(id);

    const base = {
      DONNY:{
        moveSheet:"donny_movement", attackSheet:"donny_attacks", actionSheet:"donny_actions", reactionSheet:"donny_reactions",

        prefix:"jackson"
      }
    }[id];

    let sheet = base.moveSheet;
    let scale = base.moveScale;
    let anim = base.prefix + "_idle_down";

    if(action === "walk"){
      sheet = base.moveSheet;
      scale = base.moveScale;
      anim = base.prefix + "_walk_down";
    }else if(action === "punch"){
      sheet = base.attackSheet;
      scale = base.attackScale;
      anim = base.prefix + "_attack_light";
    }else if(action === "kick"){
      sheet = base.attackSheet;
      scale = base.attackScale;
      anim = base.prefix + "_kick";
    }else if(action === "special"){
      sheet = base.actionSheet;
      scale = base.actionScale;
      anim = base.prefix + "_special";
    }else if(action === "taunt"){

      scale = base.actionScale;
      anim = base.prefix + "_taunt";
    }else if(action === "hurt"){
      sheet = base.reactionSheet;

      anim = base.prefix + "_hurt";
    }else if(action === "knockback"){
      sheet = base.reactionSheet;

    }else if(action === "ko"){
      sheet = base.reactionSheet;
