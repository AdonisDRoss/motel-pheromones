<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
body { margin:0; background:black; overflow:hidden; }
canvas { width:100vw !important; height:100vh !important; image-rendering:pixelated; }
</style>
</head>

<body>
<script>

const VERSION = 110;

class GameScene extends Phaser.Scene {
  constructor(){ super("GameScene"); }

  preload(){

    // LEVEL
    this.load.image("outdoor","assets/levels/outdoor.png?v="+VERSION);

    // JT SPRITE SHEET
    this.load.spritesheet("jt","assets/player/jt/jt-master.png?v="+VERSION,{
      frameWidth:128,
      frameHeight:128
    });
  }

  create(){

    // LEVEL BACKGROUND
    this.add.image(480,270,"outdoor").setDisplaySize(960,540);

    // UI TEXT
    this.add.text(20,20,"CHAR: GIGI",{font:"16px monospace",fill:"#fff"});
    this.add.text(20,45,"LEVEL: OUTDOOR",{font:"16px monospace",fill:"#ff4fc3"});

    // RAIN
    this.rain=[];
    for(let i=0;i<100;i++){
      const r=this.add.rectangle(
        Phaser.Math.Between(0,960),
        Phaser.Math.Between(0,540),
        2,14,0x77aaff,0.4
      );
      r.speed=Phaser.Math.Between(300,700);
      this.rain.push(r);
    }

    // FOG
    this.fog=this.add.rectangle(480,270,960,540,0xcccccc,0.06);
    this.tweens.add({
      targets:this.fog,
      alpha:{from:0.04,to:0.1},
      duration:3000,
      yoyo:true,
      repeat:-1
    });

    // SAFE ANIMATION
    this.anims.create({
      key:"idle",
      frames:this.anims.generateFrameNumbers("jt",{start:0,end:3}),
      frameRate:6,
      repeat:-1
    });

    // PLAYER
    this.player=this.physics.add.sprite(300,450,"jt",0);

    this.player.setOrigin(0.5,1);
    this.player.setScale(1.2);
    this.player.setDepth(10);

    this.player.play("idle");

    // SHADOW
    this.shadow=this.add.ellipse(300,452,40,12,0x000000,0.35);

    this.moveX=0;
    this.moveY=0;

    this.makeControls();
  }

  update(){

    // RAIN FALL
    this.rain.forEach(r=>{
      r.y += r.speed * 0.016;
      r.x -= 1.2;

      if(r.y>560){
        r.y=-20;
        r.x=Phaser.Math.Between(0,960);
      }
    });

    const speed=180;

    this.player.setVelocity(this.moveX*speed,this.moveY*speed);

    if(this.moveX!==0 || this.moveY!==0){
      this.player.play("idle",true);
    }

    if(this.moveX<0) this.player.setFlipX(true);
    if(this.moveX>0) this.player.setFlipX(false);

    this.shadow.x=this.player.x;
    this.shadow.y=this.player.y+2;
  }

  makeControls(){

    const baseX=120;
    const baseY=420;

    this.add.circle(baseX,baseY,60,0xffffff,0.1);

    let dragging=false;

    this.input.on("pointerdown",(p)=>{
      if(Phaser.Math.Distance.Between(p.x,p.y,baseX,baseY)<80){
        dragging=true;
      }
    });

    this.input.on("pointermove",(p)=>{
      if(!dragging) return;

      let dx=p.x-baseX;
      let dy=p.y-baseY;

      const len=Math.sqrt(dx*dx+dy*dy);

      if(len>60){
        dx/=len;
        dy/=len;
        dx*=60;
        dy*=60;
      }

      this.moveX=dx/60;
      this.moveY=dy/60;
    });

    this.input.on("pointerup",()=>{
      dragging=false;
      this.moveX=0;
      this.moveY=0;
    });

    // BUTTONS
    this.makeBtn(860,380,"X");
    this.makeBtn(800,450,"Y");
    this.makeBtn(920,450,"A");
    this.makeBtn(860,520,"B");
  }

  makeBtn(x,y,label){
    this.add.circle(x,y,30,0xffffff,0.2);
    this.add.text(x,y,label,{font:"18px monospace",fill:"#fff"}).setOrigin(0.5);
  }
}

const config={
  type:Phaser.AUTO,
  width:960,
  height:540,
  pixelArt:true,
  physics:{ default:"arcade" },
  scene:[GameScene]
};

new Phaser.Game(config);

</script>
</body>
</html>
