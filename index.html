/* =========================================================
   10-MINUTE VERSUS TIMER + POST-MATCH OPTIONS PATCH
   - Forces 10:00 timer for every versus match
   - Resets timer at match start so it never drains during countdown/loading
   - Allows MENU / START after match over
========================================================= */
(function(){
  if(window.MP_TIMER_10_MIN_POST_MATCH_MENU_PATCH_V1) return;
  window.MP_TIMER_10_MIN_POST_MATCH_MENU_PATCH_V1 = true;

  const MP_FORCE_MATCH_SECONDS = 600;

  if(window.Game && Game.prototype){
    const oldTogglePauseMenu = Game.prototype.togglePauseMenu;
    if(oldTogglePauseMenu){
      Game.prototype.togglePauseMenu = function(){
        const wasMatchOver = !!this.matchOver;
        const oldMatchStarted = this.matchStarted;

        if(wasMatchOver && !this.matchStarted){
          this.matchStarted = true;
        }

        oldTogglePauseMenu.call(this);

        if(wasMatchOver){
          this.matchStarted = oldMatchStarted;
        }
      };
    }

    const oldOpenPauseMenu = Game.prototype.openPauseMenu;
    if(oldOpenPauseMenu){
      Game.prototype.openPauseMenu = function(){
        oldOpenPauseMenu.call(this);

        if(this.pauseItems && this.pauseItems.length){
          this.pauseItems.forEach(item=>{
            if(item && item.setDepth){
              const d = item.depth || 0;
              if(d < 100000) item.setDepth(d + 80000);
            }
          });
        }
      };
    }

    const oldCreateForTimer = Game.prototype.create;
    Game.prototype.create = function(){
      oldCreateForTimer.call(this);

      if(String(window.selectedGameMode || "").toLowerCase() === "versus"){
        this.mpvTimeLeft = MP_FORCE_MATCH_SECONDS;
        if(this.time) {
          this.mpvLastSecondTick = this.time.now;
          this.mpvLastHealTick = this.time.now;
        }
        if(this.mpvHud && this.mpvHud.timer){
          this.mpvHud.timer.setText("TIME 10:00");
        }
      }
    };

    const oldSafeUpdateForTimer = Game.prototype.safeUpdate;
    if(oldSafeUpdateForTimer){
      Game.prototype.safeUpdate = function(time,delta){
        if(String(window.selectedGameMode || "").toLowerCase() === "versus"){
          if(!this.mpvStarted && !this.mpvOver){
            this.mpvTimeLeft = MP_FORCE_MATCH_SECONDS;
            if(this.time){
              this.mpvLastSecondTick = this.time.now;
              this.mpvLastHealTick = this.time.now;
            }
          }
        }

        oldSafeUpdateForTimer.call(this,time,delta);
      };
    }
  }
})();


/* =========================================================
   PLAYER SCALE / ATTACK SIZE / HUD FACE PATCH V2
   - Keeps attack/action/reaction sprites visually consistent with walk size
   - Fixes JT growing during attacks
   - Fixes Jackson shrinking during attacks/actions/reactions
   - Adds selected fighter face cutout to the PLAYER HUD panel
========================================================= */
(function(){
  function mpSelectedKey(){
    return String(window.selectedFighter || selectedFighter || "DONNY").toLowerCase();
  }

  const MP_VISUAL_SCALE = {
    jt:      { move:0.54, attack:0.40, action:0.54, reaction:0.54 },
    donny:   { move:0.45, attack:0.45, action:0.45, reaction:0.45 },
    hew:     { move:0.45, attack:0.45, action:0.45, reaction:0.45 },
    jackson: { move:0.42, attack:0.56, action:0.56, reaction:0.56 }
  };

  Game.prototype.getPlayerMoveScale = function(){
    const k = mpSelectedKey();
    return (MP_VISUAL_SCALE[k] && MP_VISUAL_SCALE[k].move) || 0.54;
  };

  Game.prototype.getPlayerAttackScale = function(){
    const k = mpSelectedKey();
    return (MP_VISUAL_SCALE[k] && MP_VISUAL_SCALE[k].attack) || 0.40;
  };

  Game.prototype.getPlayerActionScale = function(){
    const k = mpSelectedKey();
    return (MP_VISUAL_SCALE[k] && MP_VISUAL_SCALE[k].action) || 0.54;
  };

  Game.prototype.getPlayerReactionScale = function(){
    const k = mpSelectedKey();
    return (MP_VISUAL_SCALE[k] && MP_VISUAL_SCALE[k].reaction) || 0.54;
  };

  Game.prototype.createPlayerHudFace = function(){
    if(this.playerHudFaceGroup){
      this.playerHudFaceGroup.destroy(true);
      this.playerHudFaceGroup = null;
    }

    const fighter = mpSelectedKey();
    const texKey = "hud_face_" + fighter;
    const x = 48;
    const y = SAFE_TOP + 33;
    const size = 50;

    const group = this.add.container(x,y).setDepth(1205).setScrollFactor(0);
    const bg = this.add.rectangle(0,0,size+8,size+8,0x050005,0.96)
      .setStrokeStyle(2,0xffffff,0.85);
    group.add(bg);

    if(hasTex(this,texKey)){
      const img = this.add.image(0,0,texKey).setOrigin(0.5);
      const frame = this.textures.get(texKey).getSourceImage();
      const tw = frame && frame.width ? frame.width : 256;
      const th = frame && frame.height ? frame.height : 256;

      // Crop the upper portrait/card area so the HUD reads as a face cutout.
      const cropW = Math.floor(tw * 0.58);
      const cropH = Math.floor(th * 0.38);
      const cropX = Math.floor((tw - cropW) * 0.5);
      const cropY = Math.floor(th * 0.05);
      img.setCrop(cropX,cropY,cropW,cropH);
      img.setDisplaySize(size,size);
      group.add(img);
    }else{
      const initials = fighter === "jackson" ? "JX" : fighter.substring(0,2).toUpperCase();
      const txt = this.add.text(0,0,initials,{font:"18px monospace",fill:"#ffffff",backgroundColor:"#000000"})
        .setOrigin(0.5);
      group.add(txt);
    }

    this.playerHudFaceGroup = group;
  };

  // Wrap Game.create so the portrait appears after the HUD is built.
  const MP_OLD_GAME_CREATE_HUD_FACE = Game.prototype.create;
  Game.prototype.create = function(){
    MP_OLD_GAME_CREATE_HUD_FACE.call(this);
    this.createPlayerHudFace();
  };

  // Re-apply stable attack placement after all previous patches.
  Game.prototype.positionAttackSprite = function(type="light"){
    if(!this.player || !this.poseSprite) return;

    const fighter = mpSelectedKey();
    const dir = this.player.flipX ? -1 : 1;

    this.poseSprite.setTexture(this.getPlayerAttackSheet());

    let offsetX = -6 * dir;
    let offsetY = 0;

    if(fighter === "jt"){
      offsetX = (type === "heavy" ? 8 : type === "kick" ? 6 : 4) * dir;
      offsetY = 0;
    }else if(fighter === "jackson"){
      offsetX = (type === "heavy" ? 10 : type === "kick" ? 8 : 6) * dir;
      offsetY = 0;
    }

    this.poseSprite.x = this.player.x + offsetX;
    this.poseSprite.y = this.player.y + offsetY;
    this.poseSprite.flipX = this.player.flipX;
    this.poseSprite.setOrigin(0.5,1);
    this.poseSprite.setScale(this.getPlayerAttackScale());
  };
})();


/* =========================================================
   JT POWER MODE PATCH V758
   - Activation: SP + X
   - Requires full Groove / rhythm 100 / mpGrooveValue 10
   - Uses existing sprite/shape FX fallback, so it does not black-screen if asset files are missing.
   - Buffs JT damage, speed feel, hit stun, and combo groove gain while active.
========================================================= */
(function(){
  if(window.MP_JT_POWER_MODE_V758) return;
  window.MP_JT_POWER_MODE_V758 = true;

  if(typeof Game === "undefined" || !Game.prototype) return;

  const JT_POWER_DURATION = 15000;
  const JT_POWER_REQUIRED_GROOVE = 10;

  function mpSelectedFighter(){
    try{
      if(typeof getSelectedFighterId === "function"){
        return String(getSelectedFighterId()).toUpperCase();
      }
    }catch(e){}
    try{
      return String(selectedFighter || window.selectedFighter || "").toUpperCase();
    }catch(e){}
    return "";
  }

  function mpIsJT(){
    const id = mpSelectedFighter();
    return id === "JT" || id.indexOf("JT") >= 0;
  }

  function mpClamp(v,min,max){
    return Math.max(min,Math.min(max,v));
  }

  function mpGrooveFull(scene){
    if(!scene) return false;
    const groove = typeof scene.mpGrooveValue === "number" ? scene.mpGrooveValue : 0;
    const rhythm = typeof scene.rhythm === "number" ? scene.rhythm : 0;
    return groove >= JT_POWER_REQUIRED_GROOVE || rhythm >= 100;
  }

  function mpSetGrooveEmpty(scene){
    if(!scene) return;
    scene.mpGrooveValue = 0;
    scene.rhythm = 0;
    if(scene.refreshPlayerTrainingHUD) scene.refreshPlayerTrainingHUD();
  }

  function mpText(scene,x,y,text,color=0xffff66){
    if(!scene || !scene.add) return;
    const t = scene.add.text(x,y,text,{
      font:"17px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5,
      backgroundColor:"#000000",
      align:"center"
    }).setOrigin(0.5).setDepth(90000);
    t.setTint(color);
    scene.tweens.add({
      targets:t,
      y:y-28,
      alpha:0,
      duration:700,
      ease:"Sine.easeOut",
      onComplete:()=>t.destroy()
    });
  }

  Game.prototype.mpTryJTPowerMode = function(){
    if(!mpIsJT()) return false;
    if(this.mpJTPowerActive || this.powerMode) return false;
    if(!this.mpJTHeld) this.mpJTHeld = {SP:false,X:false};

    if(!this.mpJTHeld.SP || !this.mpJTHeld.X) return false;

    if(!mpGrooveFull(this)){
      mpText(this,this.player.x,this.player.y-112,"NEED FULL GROOVE",0xff4fc3);
      return false;
    }

    this.mpActivateJTPowerMode();
    return true;
  };

  Game.prototype.mpActivateJTPowerMode = function(){
    if(!mpIsJT()) return false;
    if(this.mpJTPowerActive) return false;

    this.mpJTPowerActive = true;
    this.mpJTPowerTimer = JT_POWER_DURATION;
    this.powerMode = true;
    this.powerModeTimer = JT_POWER_DURATION;

    mpSetGrooveEmpty(this);

    const x = this.player.x;
    const y = this.player.y;

    // Activation burst: use asset if it exists, otherwise draw safe fallback circles.
    if(hasTex(this,"jt_power_burst")){
      const burst = this.add.image(x,y,"jt_power_burst")
        .setDepth((this.player.depth || 200)-1)
        .setAlpha(0.95)
        .setScale(0.8);

      this.tweens.add({
        targets:burst,
        alpha:0,
        scale:1.9,
        duration:430,
        ease:"Quad.easeOut",
        onComplete:()=>burst.destroy()
      });
    }else{
      const burst1 = this.add.circle(x,y-48,42,0xfff45c,0.72)
        .setDepth((this.player.depth || 200)-1)
        .setBlendMode(Phaser.BlendModes.ADD);
      const burst2 = this.add.circle(x,y-48,22,0xff4fc3,0.9)
        .setDepth((this.player.depth || 200))
        .setBlendMode(Phaser.BlendModes.ADD);

      this.tweens.add({
        targets:[burst1,burst2],
        alpha:0,
        scale:3.2,
        duration:420,
        ease:"Quad.easeOut",
        onComplete:()=>{
          burst1.destroy();
          burst2.destroy();
        }
      });
    }

    // Persistent aura.
    if(this.mpJTPowerAura){
      this.mpJTPowerAura.destroy();
      this.mpJTPowerAura = null;
    }

    if(hasTex(this,"jt_power_aura")){
      this.mpJTPowerAura = this.add.image(x,y,"jt_power_aura")
        .setDepth((this.player.depth || 200)-1)
        .setAlpha(0.8)
        .setScale(0.82);
    }else{
      this.mpJTPowerAura = this.add.ellipse(x,y-46,92,130,0xfff45c,0.22)
        .setDepth((this.player.depth || 200)-1)
        .setBlendMode(Phaser.BlendModes.ADD);
    }

    this.tweens.add({
      targets:this.mpJTPowerAura,
      alpha:0.48,
      scaleX:1.12,
      scaleY:1.08,
      duration:360,
      yoyo:true,
      repeat:-1
    });

    if(this.cameras && this.cameras.main){
      this.cameras.main.shake(260,0.012);
    }

    try{ vibrate([85,40,85]); }catch(e){}

    mpText(this,x,y-130,"JT POWER MODE",0xffff66);

    return true;
  };

  Game.prototype.mpUpdateJTPowerMode = function(time,delta){
    if(!this.mpJTPowerActive) return;

    this.mpJTPowerTimer -= delta;

    if(this.mpJTPowerAura && this.player){
      this.mpJTPowerAura.x = this.player.x;
      this.mpJTPowerAura.y = this.player.y - 46;
    }

    const moving = Math.abs(this.stickX || 0) > 0.18 || Math.abs(this.stickY || 0) > 0.18;

    if(moving && time > (this.mpJTPowerStepAt || 0)){
      this.mpJTPowerStepAt = time + 115;

      if(hasTex(this,"jt_power_step_fx")){
        const step = this.add.image(this.player.x,this.player.y+2,"jt_power_step_fx")
          .setDepth((this.player.depth || 200)-2)
          .setScale(0.72)
          .setAlpha(0.78);

        this.tweens.add({
          targets:step,
          alpha:0,
          scale:1.35,
          duration:240,
          onComplete:()=>step.destroy()
        });
      }else{
        const step = this.add.ellipse(this.player.x,this.player.y+4,42,12,0xffff66,0.45)
          .setDepth((this.player.depth || 200)-2)
          .setBlendMode(Phaser.BlendModes.ADD);

        this.tweens.add({
          targets:step,
          alpha:0,
          scaleX:2.0,
          scaleY:1.5,
          duration:240,
          onComplete:()=>step.destroy()
        });
      }
    }

    if(this.mpJTPowerTimer <= 0){
      this.mpEndJTPowerMode();
    }
  };

  Game.prototype.mpEndJTPowerMode = function(){
    this.mpJTPowerActive = false;

    if(mpIsJT()){
      this.powerMode = false;
      this.powerModeTimer = 0;
    }

    if(this.mpJTPowerAura){
      this.mpJTPowerAura.destroy();
      this.mpJTPowerAura = null;
    }

    if(this.player){
      mpText(this,this.player.x,this.player.y-118,"POWER DOWN",0xffffff);
    }
  };

  // Hook SP and X touch buttons for SP+X detection.
  const oldMobileButton = Game.prototype.mobileButton;
  if(oldMobileButton && !Game.prototype.mpJTPowerMobileWrapped){
    Game.prototype.mpJTPowerMobileWrapped = true;

    Game.prototype.mobileButton = function(x,y,label,color,down,up=null){
      const btn = oldMobileButton.call(this,x,y,label,color,down,up);

      if(btn && btn.hit && (label === "SP" || label === "X")){
        if(!this.mpJTHeld) this.mpJTHeld = {SP:false,X:false};

        btn.hit.on("pointerdown",()=>{
          if(mpIsJT()){
            this.mpJTHeld[label] = true;
            this.btnSPHeld = label === "SP" ? true : this.btnSPHeld;
            this.btnXHeld = label === "X" ? true : this.btnXHeld;
            this.mpTryJTPowerMode();
          }
        });

        btn.hit.on("pointerup",()=>{
          if(mpIsJT()){
            this.mpJTHeld[label] = false;
            if(label === "SP") this.btnSPHeld = false;
            if(label === "X") this.btnXHeld = false;
          }
        });

        btn.hit.on("pointerout",()=>{
          if(mpIsJT()){
            this.mpJTHeld[label] = false;
            if(label === "SP") this.btnSPHeld = false;
            if(label === "X") this.btnXHeld = false;
          }
        });
      }

      return btn;
    };
  }

  // Keyboard: V = SP, X = heavy. Holding V+X activates JT power.
  const oldMakeKeyboard = Game.prototype.makeKeyboard;
  if(oldMakeKeyboard && !Game.prototype.mpJTPowerKeyboardWrapped){
    Game.prototype.mpJTPowerKeyboardWrapped = true;

    Game.prototype.makeKeyboard = function(){
      oldMakeKeyboard.call(this);

      if(this.mpJTPowerKeyboardReady) return;
      this.mpJTPowerKeyboardReady = true;

      if(!this.mpJTHeld) this.mpJTHeld = {SP:false,X:false};

      if(this.input && this.input.keyboard){
        this.input.keyboard.on("keydown-V",()=>{
          if(!mpIsJT()) return;
          this.mpJTHeld.SP = true;
          if(!this.mpTryJTPowerMode() && this.mpActivateJTSpecial){
            this.mpActivateJTSpecial();
          }
        });

        this.input.keyboard.on("keyup-V",()=>{
          if(!mpIsJT()) return;
          this.mpJTHeld.SP = false;
        });

        this.input.keyboard.on("keydown-X",()=>{
          if(!mpIsJT()) return;
          this.mpJTHeld.X = true;
          this.mpTryJTPowerMode();
        });

        this.input.keyboard.on("keyup-X",()=>{
          if(!mpIsJT()) return;
          this.mpJTHeld.X = false;
        });
      }
    };
  }

  // Damage buff while JT power active.
  const oldDamageEnemy = Game.prototype.damageEnemy;
  if(oldDamageEnemy && !Game.prototype.mpJTPowerDamageWrapped){
    Game.prototype.mpJTPowerDamageWrapped = true;

    Game.prototype.damageEnemy = function(enemy,damage,stagger){
      if(mpIsJT() && this.mpJTPowerActive){
        damage = Math.ceil(damage * 1.35);
        stagger = Math.ceil((stagger || 0) * 1.15);
      }

      return oldDamageEnemy.call(this,enemy,damage,stagger);
    };
  }

  // JT combo damage boost if JT combo patch exists.
  const oldApplyJTCombo = Game.prototype.mpApplyJTCombo;
  if(oldApplyJTCombo && !Game.prototype.mpJTPowerComboWrapped){
    Game.prototype.mpJTPowerComboWrapped = true;

    Game.prototype.mpApplyJTCombo = function(combo,enemy){
      if(combo && this.mpJTPowerActive){
        combo = Object.assign({},combo,{
          damage:Math.ceil((combo.damage || 10) * 1.4),
          stun:Math.ceil((combo.stun || 700) * 1.12),
          knockback:Math.ceil((combo.knockback || 260) * 1.25),
          shake:(combo.shake || 0.006) + 0.004
        });
      }

      return oldApplyJTCombo.call(this,combo,enemy);
    };
  }

  // Update loop.
  const oldSafeUpdate = Game.prototype.safeUpdate;
  if(oldSafeUpdate && !Game.prototype.mpJTPowerUpdateWrapped){
    Game.prototype.mpJTPowerUpdateWrapped = true;

    Game.prototype.safeUpdate = function(time,delta){
      const r = oldSafeUpdate.call(this,time,delta);
      this.mpUpdateJTPowerMode(time,delta || 16);
      return r;
    };
  }

  // Button glow when JT groove is full.
  const oldSafeUpdateGlow = Game.prototype.safeUpdate;
  if(oldSafeUpdateGlow && !Game.prototype.mpJTPowerGlowWrapped){
    Game.prototype.mpJTPowerGlowWrapped = true;

    Game.prototype.safeUpdate = function(time,delta){
      const r = oldSafeUpdateGlow.call(this,time,delta);

      if(mpIsJT() && this.mobileButtons){
        const ready = mpGrooveFull(this) && !this.mpJTPowerActive;
        ["SP","X"].forEach(k=>{
          const b = this.mobileButtons[k] || (this.mpHewPowerButtons && this.mpHewPowerButtons[k]);
          if(!b) return;
          try{
            if(b.face){
              b.face.setStrokeStyle(ready ? 4 : 2, ready ? 0xffff66 : 0xffffff, ready ? 1 : 0.45);
              b.face.setAlpha(ready ? 1 : 0.78);
            }
            if(b.text){
              b.text.setFill(ready ? "#ffff66" : "#ffffff");
            }
          }catch(e){}
        });
      }

      return r;
    };
  }

})();


/* =========================================================
   JACKSON MOVES + FX PATCH V760
   Assets expected in:
   /assets/fx/jackson/
   - jackson_afterimage_fx.png
   - jackson_riff_wave.png
   - jackson_power_burst.png
   - jackson_lonewolf_aura.png
   - jackson_phase_dash.png
   - jackson_fear_fx.png

   Controls:
   Y -> light
   X -> heavy
   A -> kick
   SP -> Step Away / Phase Dash
   Full Groove + SP + X -> Lone Wolf Mode

   Combos:
   Y Y X -> Razor String
   X X -> Broken Chord
   Y X A -> Dead Air
   Jump X -> Flying Riff
========================================================= */
(function(){
  if(window.MP_JACKSON_MOVES_FX_V760) return;
  window.MP_JACKSON_MOVES_FX_V760 = true;

  if(typeof Game === "undefined" || !Game.prototype) return;

  const JACKSON_COMBO_WINDOW = 780;
  const JACKSON_POWER_DURATION = 15000;

  function mpSelectedFighter(){
    try{
      if(typeof getSelectedFighterId === "function"){
        return String(getSelectedFighterId()).toUpperCase();
      }
    }catch(e){}
    try{
      return String(selectedFighter || window.selectedFighter || "").toUpperCase();
    }catch(e){}
    return "";
  }

  function mpIsJackson(){
    const id = mpSelectedFighter();
    return id === "JACKSON" || id.indexOf("JACKSON") >= 0;
  }

  function mpClamp(v,min,max){
    return Math.max(min,Math.min(max,v));
  }

  function mpGrooveFull(scene){
    if(!scene) return false;
    const groove = typeof scene.mpGrooveValue === "number" ? scene.mpGrooveValue : 0;
    const rhythm = typeof scene.rhythm === "number" ? scene.rhythm : 0;
    return groove >= 10 || rhythm >= 100;
  }

  function mpText(scene,x,y,text,color=0xffff66){
    if(!scene || !scene.add) return;
    const t = scene.add.text(x,y,text,{
      font:"16px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5,
      backgroundColor:"#000000",
      align:"center"
    }).setOrigin(0.5).setDepth(90000);
    t.setTint(color);

    scene.tweens.add({
      targets:t,
      y:y-28,
      alpha:0,
      duration:700,
      ease:"Sine.easeOut",
      onComplete:()=>t.destroy()
    });
  }

  function mpNearestEnemy(scene,range){
    if(!scene || !scene.enemies || !scene.player) return null;

    let best = null;
    let bestD = 999999;

    scene.enemies.forEach(e=>{
      if(!e || e.dead || e.state === "dead") return;
      if(e.platform && scene.platform && e.platform !== scene.platform) return;

      const dx = Math.abs(e.x - scene.player.x);
      const dy = Math.abs(e.y - scene.player.y);
      const d = dx + dy * 1.25;

      if(d < bestD && d <= (range || 320)){
        best = e;
        bestD = d;
      }
    });

    return best;
  }

  function mpEnemyList(scene,range){
    if(!scene || !scene.enemies || !scene.player) return [];
    return scene.enemies.filter(e=>{
      if(!e || e.dead || e.state === "dead") return false;
      if(e.platform && scene.platform && e.platform !== scene.platform) return false;
      const dx = Math.abs(e.x - scene.player.x);
      const dy = Math.abs(e.y - scene.player.y);
      return dx + dy * 1.25 <= (range || 320);
    });
  }

  Game.prototype.mpEnsureJacksonState = function(){
    if(!this.mpJacksonComboSeq) this.mpJacksonComboSeq = [];
    if(typeof this.mpJacksonLastComboTime !== "number") this.mpJacksonLastComboTime = 0;
    if(!this.mpJacksonHeld) this.mpJacksonHeld = {SP:false,X:false};
    if(typeof this.mpGrooveValue !== "number"){
      this.mpGrooveValue = Math.max(0, Math.min(10, (this.rhythm || 0) / 10));
    }
  };

  Game.prototype.mpSpawnJacksonFX = function(key,x,y,opts={}){
    if(!this.add || !hasTex(this,key)) return null;

    const fx = this.add.image(x,y,key)
      .setOrigin(opts.originX ?? 0.5, opts.originY ?? 0.5)
      .setDepth(opts.depth ?? 15000)
      .setAlpha(opts.alpha ?? 0.92)
      .setScale(opts.scale ?? 0.72);

    if(typeof opts.flipX === "boolean") fx.setFlipX(opts.flipX);

    this.tweens.add({
      targets:fx,
      alpha:opts.endAlpha ?? 0,
      scale:(opts.endScale ?? (opts.scale ?? 0.72) * 1.25),
      x:opts.endX ?? fx.x,
      y:opts.endY ?? fx.y,
      duration:opts.duration ?? 420,
      ease:opts.ease ?? "Quad.easeOut",
      onComplete:()=>fx.destroy()
    });

    return fx;
  };

  Game.prototype.mpApplyJacksonFear = function(enemy,duration=2200){
    if(!enemy || enemy.dead) return;

    enemy.jacksonFear = true;
    enemy.jacksonFearTimer = duration;
    enemy.attackCooldown = Math.max(enemy.attackCooldown || 0, duration);
    enemy.chaseSpeedBase = enemy.chaseSpeedBase || enemy.chaseSpeed || 90;
    enemy.chaseSpeed = Math.max(28, enemy.chaseSpeedBase * 0.55);

    if(hasTex(this,"jackson_fear_fx")){
      this.mpSpawnJacksonFX("jackson_fear_fx", enemy.x, enemy.y - 92, {
        scale:0.42,
        endScale:0.62,
        duration:duration,
        depth:(enemy.sprite ? enemy.sprite.depth : 200) + 4
      });
    }

    this.time.delayedCall(duration,()=>{
      if(!enemy || enemy.dead) return;
      enemy.jacksonFear = false;
      if(enemy.chaseSpeedBase) enemy.chaseSpeed = enemy.chaseSpeedBase;
    });
  };

  Game.prototype.mpJacksonPhaseDash = function(){
    if(!mpIsJackson()) return false;
    if(this.pauseMenuOpen || !this.matchStarted || this.matchOver) return false;
    if(this.mpJacksonPhaseLock && this.time.now < this.mpJacksonPhaseLock) return false;

    this.mpJacksonPhaseLock = this.time.now + 900;

    const enemy = mpNearestEnemy(this,340);
    const dir = this.getFacingDir ? this.getFacingDir() : (this.player.flipX ? -1 : 1);
    const oldX = this.player.x;
    const oldY = this.player.y;

    if(hasTex(this,"jackson_afterimage_fx")){
      this.mpSpawnJacksonFX("jackson_afterimage_fx", oldX, oldY - 55, {
        scale:0.52,
        endScale:0.76,
        duration:520,
        depth:(this.player.depth || 200) - 1,
        flipX:this.player.flipX
      });
    }

    if(hasTex(this,"jackson_phase_dash")){
      this.mpSpawnJacksonFX("jackson_phase_dash", oldX + dir * 70, oldY - 68, {
        scale:0.58,
        endScale:0.95,
        duration:420,
        depth:(this.player.depth || 200) + 2,
        flipX:dir < 0
      });
    }

    let targetX = oldX + dir * 145;
    let targetY = oldY;

    if(enemy){
      const behindDir = enemy.x < oldX ? -1 : 1;
      targetX = enemy.x + behindDir * 58;
      targetY = enemy.y;
      this.player.setFlipX(enemy.x < targetX);
    }

    const bounds = this.getCurrentPlatformBounds
      ? this.getCurrentPlatformBounds()
      : (PLATFORM_BOUNDS[this.platform] || PLATFORM_BOUNDS.middle);

    targetX = Phaser.Math.Clamp(targetX,bounds.minX,bounds.maxX);

    this.playerInvuln = Math.max(this.playerInvuln || 0, 620);
    this.playerBusy = true;
    this.busyUntil = this.time.now + 420;

    this.tweens.add({
      targets:this.player,
      x:targetX,
      y:targetY,
      duration:180,
      ease:"Quad.easeOut",
      onUpdate:()=>{
        if(this.shadow){
          this.shadow.x = this.player.x;
          this.shadow.y = this.player.y + 5;
        }
      },
      onComplete:()=>{
        this.playerBusy = false;
        this.busyUntil = 0;

        if(enemy && !enemy.dead){
          this.mpApplyJacksonFear(enemy,1600);
          if(this.createHitFX) this.createHitFX(enemy.x,enemy.y-70,"phase",4);
        }

        if(this.zoneText) this.zoneText.setText("STEP AWAY");
      }
    });

    if(this.cameras && this.cameras.main) this.cameras.main.shake(120,0.004);
    try{ vibrate([18,16,28]); }catch(e){}

    mpText(this, oldX, oldY - 120, "STEP AWAY", 0xffff66);

    if(this.mpRecordTrainingAction) this.mpRecordTrainingAction("special");

    return true;
  };

  Game.prototype.mpJacksonRiffWave = function(){
    if(!mpIsJackson()) return false;
    if(this.pauseMenuOpen || !this.matchStarted || this.matchOver) return false;

    const dir = this.getFacingDir ? this.getFacingDir() : (this.player.flipX ? -1 : 1);
    const startX = this.player.x + dir * 54;
    const startY = this.player.y - 72;
    const endX = startX + dir * 420;

    let wave = null;

    if(hasTex(this,"jackson_riff_wave")){
      wave = this.add.image(startX,startY,"jackson_riff_wave")
        .setOrigin(0.5,0.5)
        .setScale(0.58)
        .setDepth(15000)
        .setAlpha(0.95)
        .setFlipX(dir < 0);
    }else{
      wave = this.add.ellipse(startX,startY,64,22,0xffff66,0.72)
        .setDepth(15000);
    }

    const hitSet = new Set();

    this.tweens.add({
      targets:wave,
      x:endX,
      alpha:0.08,
      duration:520,
      ease:"Linear",
      onUpdate:()=>{
        this.enemies.forEach(e=>{
          if(!e || e.dead || hitSet.has(e)) return;
          if(e.platform && this.platform && e.platform !== this.platform) return;

          const dx = Math.abs(e.x - wave.x);
          const dy = Math.abs((e.y - 58) - wave.y);

          if(dx < 72 && dy < 52){
            hitSet.add(e);
            e.health -= this.mpJacksonPowerActive ? 16 : 11;
            e.vx = dir * (this.mpJacksonPowerActive ? 430 : 300);
            e.knockbackTime = 650;
            e.busy = true;
            e.state = "jackson_riff_hit";

            this.mpApplyJacksonFear(e, this.mpJacksonPowerActive ? 3200 : 2200);

            if(this.safeEnemyPlay) this.safeEnemyPlay(e,"knockback");
            if(this.updateEnemyHealthBar) this.updateEnemyHealthBar(e);
            if(this.createHitFX) this.createHitFX(e.x,e.y-70,"RIFF",12);

            if(e.health <= 0 && this.killEnemy){
              this.killEnemy(e);
            }else{
              this.time.delayedCall(650,()=>{
                if(e && !e.dead){
                  e.busy = false;
                  e.state = "idle";
                  e.vx = 0;
                  if(this.safeEnemyPlay) this.safeEnemyPlay(e,"idle");
                }
              });
            }
          }
        });
      },
      onComplete:()=>wave.destroy()
    });

    if(this.cameras && this.cameras.main) this.cameras.main.shake(100,0.004);
    try{ vibrate([20,18,36]); }catch(e){}

    mpText(this,this.player.x,this.player.y-120,"RIFF WAVE",0x66ccff);

    return true;
  };

  const JACKSON_COMBOS = [
    {
      id:"razor_string",
      name:"RAZOR STRING",
      seq:["light","light","heavy"],
      damage:13,
      stun:620,
      knockback:240,
      fear:false,
      label:"Y Y X"
    },
    {
      id:"broken_chord",
      name:"BROKEN CHORD",
      seq:["heavy","heavy"],
      damage:17,
      stun:760,
      knockback:340,
      fear:true,
      label:"X X"
    },
    {
      id:"dead_air",
      name:"DEAD AIR",
      seq:["light","heavy","kick"],
      damage:16,
      stun:720,
      knockback:300,
      fear:true,
      label:"Y X A"
    },
    {
      id:"flying_riff",
      name:"FLYING RIFF",
      seq:["jump","heavy"],
      damage:19,
      stun:820,
      knockback:420,
      fear:true,
      label:"JUMP X",
      riff:true
    }
  ];

  function mpSeqPrefix(seq,target){
    if(seq.length > target.length) return false;
    for(let i=0;i<seq.length;i++){
      if(seq[i] !== target[i]) return false;
    }
    return true;
  }

  function mpHasComboPrefix(seq){
    return JACKSON_COMBOS.some(c=>mpSeqPrefix(seq,c.seq));
  }

  function mpCompleteCombo(seq){
    return JACKSON_COMBOS.find(c=>c.seq.length === seq.length && mpSeqPrefix(seq,c.seq));
  }

  Game.prototype.mpRecordJacksonComboInput = function(action,enemy=null){
    if(!mpIsJackson() || !action) return;

    this.mpEnsureJacksonState();

    const now = this.time ? this.time.now : Date.now();

    if(this.mpJacksonLastComboTime && now - this.mpJacksonLastComboTime > JACKSON_COMBO_WINDOW){
      this.mpJacksonComboSeq = [];
    }

    this.mpJacksonLastComboTime = now;
    this.mpJacksonComboSeq.push(action);

    if(!mpHasComboPrefix(this.mpJacksonComboSeq)){
      this.mpJacksonComboSeq = mpHasComboPrefix([action]) ? [action] : [];
    }

    const combo = mpCompleteCombo(this.mpJacksonComboSeq);

    if(!combo) return;

    this.mpApplyJacksonCombo(combo,enemy);
    this.mpJacksonComboSeq = [];
    this.mpJacksonLastComboTime = 0;
  };

  Game.prototype.mpApplyJacksonCombo = function(combo,enemy){
    if(!mpIsJackson() || !combo) return false;

    enemy = enemy || mpNearestEnemy(this,330);
    if(!enemy || enemy.dead) return false;

    const dir = enemy.x < this.player.x ? -1 : 1;
    const resist = typeof enemy.knockbackResist === "number" ? enemy.knockbackResist : 1;
    const powerMult = this.mpJacksonPowerActive ? 1.38 : 1;

    enemy.health -= Math.ceil(combo.damage * powerMult);
    enemy.busy = true;
    enemy.state = "jackson_combo_hit";
    enemy.attackCooldown = Math.max(enemy.attackCooldown || 0, combo.stun);
    enemy.knockbackTime = combo.stun;
    enemy.vx = dir * combo.knockback * resist * (this.mpJacksonPowerActive ? 1.18 : 1);

    if(hasTex(this,"jackson_afterimage_fx")){
      this.mpSpawnJacksonFX("jackson_afterimage_fx", this.player.x, this.player.y - 58, {
        scale:0.45,
        endScale:0.64,
        duration:360,
        depth:(this.player.depth || 200)-1,
        flipX:this.player.flipX
      });
    }

    if(combo.riff){
      this.mpJacksonRiffWave();
    }else if(hasTex(this,"jackson_phase_dash")){
      this.mpSpawnJacksonFX("jackson_phase_dash", enemy.x, enemy.y - 68, {
        scale:0.42,
        endScale:0.75,
        duration:360,
        depth:(enemy.sprite ? enemy.sprite.depth : 200)+2,
        flipX:dir < 0
      });
    }

    if(combo.fear || this.mpJacksonPowerActive){
      this.mpApplyJacksonFear(enemy,this.mpJacksonPowerActive ? 3300 : 2200);
    }

    if(this.safeEnemyPlay) this.safeEnemyPlay(enemy,"knockback");
    if(this.updateEnemyHealthBar) this.updateEnemyHealthBar(enemy);
    if(this.createHitFX) this.createHitFX(enemy.x,enemy.y-70,combo.name,combo.damage);

    if(this.cameras && this.cameras.main){
      this.cameras.main.shake(140,this.mpJacksonPowerActive ? 0.010 : 0.006);
    }

    try{ vibrate(this.mpJacksonPowerActive ? [24,20,44] : [16,16,28]); }catch(e){}

    mpText(this,this.player.x,this.player.y-124,combo.name + "  " + combo.label,0xffff66);

    this.mpGrooveValue = mpClamp((this.mpGrooveValue || 0) + 0.48,0,10);
    this.rhythm = Math.max(this.rhythm || 0, Math.round(this.mpGrooveValue * 10));

    if(this.mpRecordTrainingAction) this.mpRecordTrainingAction(combo.id);

    if(enemy.health <= 0 && this.killEnemy){
      this.killEnemy(enemy);
      return true;
    }

    this.time.delayedCall(combo.stun,()=>{
      if(enemy && !enemy.dead){
        enemy.busy = false;
        enemy.state = "idle";
        enemy.vx = 0;
        if(this.safeEnemyPlay) this.safeEnemyPlay(enemy,"idle");
      }
    });

    return true;
  };

  Game.prototype.mpTryJacksonPowerMode = function(){
    if(!mpIsJackson()) return false;
    this.mpEnsureJacksonState();

    if(this.mpJacksonPowerActive) return false;
    if(!this.mpJacksonHeld.SP || !this.mpJacksonHeld.X) return false;

    if(!mpGrooveFull(this)){
      mpText(this,this.player.x,this.player.y-112,"NEED FULL GROOVE",0xffd400);
      return false;
    }

    return this.mpActivateJacksonPowerMode();
  };

  Game.prototype.mpActivateJacksonPowerMode = function(){
    if(!mpIsJackson()) return false;
    if(this.mpJacksonPowerActive) return false;

    this.mpJacksonPowerActive = true;
    this.mpJacksonPowerTimer = JACKSON_POWER_DURATION;
    this.powerMode = true;
    this.powerModeTimer = JACKSON_POWER_DURATION;

    this.mpGrooveValue = 0;
    this.rhythm = 0;

    if(hasTex(this,"jackson_power_burst")){
      this.mpSpawnJacksonFX("jackson_power_burst", this.player.x, this.player.y - 62, {
        scale:0.78,
        endScale:1.55,
        duration:520,
        depth:(this.player.depth || 200)+1
      });
    }else{
      const burst = this.add.circle(this.player.x,this.player.y-58,54,0xffff66,0.75)
        .setDepth((this.player.depth || 200)+1)
        .setBlendMode(Phaser.BlendModes.ADD);

      this.tweens.add({
        targets:burst,
        alpha:0,
        scale:3,
        duration:450,
        onComplete:()=>burst.destroy()
      });
    }

    if(this.mpJacksonAura && this.mpJacksonAura.destroy){
      this.mpJacksonAura.destroy();
      this.mpJacksonAura = null;
    }

    if(hasTex(this,"jackson_lonewolf_aura")){
      this.mpJacksonAura = this.add.image(this.player.x,this.player.y-58,"jackson_lonewolf_aura")
        .setDepth((this.player.depth || 200)-1)
        .setAlpha(0.85)
        .setScale(0.72);
    }else{
      this.mpJacksonAura = this.add.ellipse(this.player.x,this.player.y-58,94,132,0xffff66,0.23)
        .setDepth((this.player.depth || 200)-1)
        .setBlendMode(Phaser.BlendModes.ADD);
    }

    this.tweens.add({
      targets:this.mpJacksonAura,
      alpha:0.48,
      scaleX:1.08,
      scaleY:1.1,
      duration:360,
      yoyo:true,
      repeat:-1
    });

    if(this.cameras && this.cameras.main) this.cameras.main.shake(260,0.012);
    try{ vibrate([85,40,85]); }catch(e){}

    mpText(this,this.player.x,this.player.y-135,"LONE WOLF MODE",0xffff66);

    return true;
  };

  Game.prototype.mpUpdateJacksonPower = function(time,delta){
    if(!this.mpJacksonPowerActive) return;

    this.mpJacksonPowerTimer -= delta || 16;

    if(this.mpJacksonAura && this.player){
      this.mpJacksonAura.x = this.player.x;
      this.mpJacksonAura.y = this.player.y - 58;
    }

    const moving = Math.abs(this.stickX || 0) > 0.18 || Math.abs(this.stickY || 0) > 0.18;

    if(moving && time > (this.mpJacksonAfterimageAt || 0)){
      this.mpJacksonAfterimageAt = time + 125;

      if(hasTex(this,"jackson_afterimage_fx")){
        this.mpSpawnJacksonFX("jackson_afterimage_fx", this.player.x, this.player.y - 56, {
          scale:0.38,
          endScale:0.58,
          duration:300,
          depth:(this.player.depth || 200)-1,
          flipX:this.player.flipX
        });
      }
    }

    if(this.mpJacksonPowerTimer <= 0){
      this.mpEndJacksonPowerMode();
    }
  };

  Game.prototype.mpEndJacksonPowerMode = function(){
    this.mpJacksonPowerActive = false;

    if(mpIsJackson()){
      this.powerMode = false;
      this.powerModeTimer = 0;
    }

    if(this.mpJacksonAura && this.mpJacksonAura.destroy){
      this.mpJacksonAura.destroy();
      this.mpJacksonAura = null;
    }

    if(this.player){
      mpText(this,this.player.x,this.player.y-118,"LONE WOLF ENDED",0xffffff);
    }
  };

  // Speed and damage modifiers.
  const oldGetPlayerSpeedMod = Game.prototype.getPlayerSpeedMod;
  Game.prototype.getPlayerSpeedMod = function(){
    let base = oldGetPlayerSpeedMod ? oldGetPlayerSpeedMod.call(this) : 1;

    if(mpIsJackson()){
      base *= this.mpJacksonPowerActive ? 1.22 : 1.08;
    }

    return base;
  };

  const oldGetPlayerDamageMod = Game.prototype.getPlayerDamageMod;
  Game.prototype.getPlayerDamageMod = function(){
    let base = oldGetPlayerDamageMod ? oldGetPlayerDamageMod.call(this) : 1;

    if(mpIsJackson()){
      base *= this.mpJacksonPowerActive ? 1.25 : 0.96;
    }

    return base;
  };

  // Hook attack input and damage confirmation.
  const oldStartAttack = Game.prototype.startAttack;
  Game.prototype.startAttack = function(type){
    if(mpIsJackson()){
      this.mpJacksonPendingAttack = type;
      this.mpEnsureJacksonState();
    }

    return oldStartAttack ? oldStartAttack.call(this,type) : undefined;
  };

  const oldDamageEnemy = Game.prototype.damageEnemy;
  if(oldDamageEnemy){
    Game.prototype.damageEnemy = function(enemy,damage,stagger){
      const before = enemy ? enemy.health : null;
      const result = oldDamageEnemy.call(this,enemy,damage,stagger);

      if(mpIsJackson() && enemy && before !== null && before > (enemy.health || 0)){
        if(this.mpJacksonPendingAttack){
          this.mpRecordJacksonComboInput(this.mpJacksonPendingAttack,enemy);
        }

        if(this.mpJacksonPowerActive){
          this.mpApplyJacksonFear(enemy,2400);
        }
      }

      return result;
    };
  }

  const oldStartJump = Game.prototype.startJump;
  if(oldStartJump){
    Game.prototype.startJump = function(){
      const result = oldStartJump.apply(this,arguments);

      if(mpIsJackson()){
        this.mpRecordJacksonComboInput("jump",null);
      }

      return result;
    };
  }

  // SP and X touch controls.
  const oldMobileButton = Game.prototype.mobileButton;
  if(oldMobileButton && !Game.prototype.mpJacksonMobileWrapped){
    Game.prototype.mpJacksonMobileWrapped = true;

    Game.prototype.mobileButton = function(x,y,label,color,down,up=null){
      const btn = oldMobileButton.call(this,x,y,label,color,down,up);

      if(btn && btn.hit && (label === "SP" || label === "X")){
        btn.hit.on("pointerdown",()=>{
          if(!mpIsJackson()) return;

          this.mpEnsureJacksonState();
          this.mpJacksonHeld[label] = true;

          if(label === "SP"){
            if(!this.mpTryJacksonPowerMode()){
              if(this.mpJacksonPowerActive) this.mpJacksonRiffWave();
              else this.mpJacksonPhaseDash();
            }
          }

          if(label === "X"){
            this.mpTryJacksonPowerMode();
          }
        });

        btn.hit.on("pointerup",()=>{
          if(!mpIsJackson()) return;
          this.mpEnsureJacksonState();
          this.mpJacksonHeld[label] = false;
        });

        btn.hit.on("pointerout",()=>{
          if(!mpIsJackson()) return;
          this.mpEnsureJacksonState();
          this.mpJacksonHeld[label] = false;
        });
      }

      return btn;
    };
  }

  // Keyboard: V = SP, X = heavy. V+X activates Lone Wolf Mode.
  const oldMakeKeyboard = Game.prototype.makeKeyboard;
  if(oldMakeKeyboard && !Game.prototype.mpJacksonKeyboardWrapped){
    Game.prototype.mpJacksonKeyboardWrapped = true;

    Game.prototype.makeKeyboard = function(){
      oldMakeKeyboard.call(this);

      if(this.mpJacksonKeyboardReady) return;
      this.mpJacksonKeyboardReady = true;

      this.input.keyboard.on("keydown-V",()=>{
        if(!mpIsJackson()) return;

        this.mpEnsureJacksonState();
        this.mpJacksonHeld.SP = true;

        if(!this.mpTryJacksonPowerMode()){
          if(this.mpJacksonPowerActive) this.mpJacksonRiffWave();
          else this.mpJacksonPhaseDash();
        }
      });

      this.input.keyboard.on("keyup-V",()=>{
        if(!mpIsJackson()) return;
        this.mpEnsureJacksonState();
        this.mpJacksonHeld.SP = false;
      });

      this.input.keyboard.on("keydown-X",()=>{
        if(!mpIsJackson()) return;
        this.mpEnsureJacksonState();
        this.mpJacksonHeld.X = true;
        this.mpTryJacksonPowerMode();
      });

      this.input.keyboard.on("keyup-X",()=>{
        if(!mpIsJackson()) return;
        this.mpEnsureJacksonState();
        this.mpJacksonHeld.X = false;
      });
    };
  }

  const oldCreate = Game.prototype.create;
  Game.prototype.create = function(){
    const r = oldCreate ? oldCreate.call(this) : undefined;
    this.mpEnsureJacksonState && this.mpEnsureJacksonState();
    return r;
  };

  const oldSafeUpdate = Game.prototype.safeUpdate;
  if(oldSafeUpdate && !Game.prototype.mpJacksonUpdateWrapped){
    Game.prototype.mpJacksonUpdateWrapped = true;

    Game.prototype.safeUpdate = function(time,delta){
      const r = oldSafeUpdate.call(this,time,delta);
      this.mpUpdateJacksonPower(time,delta || 16);
      return r;
    };
  }

  // Training coach support, if the training patch exists.
  const oldCurrentTrainingMove = Game.prototype.mpCurrentTrainingMove;
  if(oldCurrentTrainingMove && !Game.prototype.mpJacksonTrainingWrapped){
    Game.prototype.mpJacksonTrainingWrapped = true;

    Game.prototype.mpCurrentTrainingMove = function(){
      if(mpIsJackson()){
        const jacksonMoves = [
          {id:"razor_string", text:"JACKSON: RAZOR STRING", command:"Y → Y → X", seq:["light","light","heavy"]},
          {id:"broken_chord", text:"JACKSON: BROKEN CHORD", command:"X → X", seq:["heavy","heavy"]},
          {id:"dead_air", text:"JACKSON: DEAD AIR", command:"Y → X → A", seq:["light","heavy","kick"]},
          {id:"flying_riff", text:"JACKSON: FLYING RIFF", command:"Jump → X", seq:["jump","heavy"]},
          {id:"step_away", text:"JACKSON: STEP AWAY", command:"SP", seq:["special"]},
          {id:"lone_wolf", text:"JACKSON: LONE WOLF MODE", command:"Full Groove + SP + X", seq:["power"]}
        ];

        return jacksonMoves[(this.mpTrainingStep || 0) % jacksonMoves.length];
      }

      return oldCurrentTrainingMove.call(this);
    };
  }

})();


/* =========================================================
   TRAINING LESSON MODE GATE V761
   Lessons only allowed in:
   - Training
   - Rumble

   All other modes:
   - no combo coach overlay
   - no forced lesson progression
   - normal/open combat
========================================================= */
(function(){
  if(window.MP_TRAINING_LESSON_GATE_V761) return;
  window.MP_TRAINING_LESSON_GATE_V761 = true;

  function mpSelectedModeText(){
    try{
      return String(
        window.selectedMode ||
        window.gameMode ||
        (typeof selectedMode !== "undefined" ? selectedMode : "") ||
        ""
      ).toLowerCase();
    }catch(e){
      return "";
    }
  }

  window.mpLessonsAllowedMode = function(scene){
    const mode = mpSelectedModeText();

    if(mode.indexOf("training") >= 0) return true;
    if(mode.indexOf("rumble") >= 0) return true;

    // Only allow if a scene is explicitly marked as training/rumble by a future mode select.
    if(scene && scene.trainingMode === true && mode.indexOf("story") < 0) return true;
    if(scene && scene.rumbleMode === true) return true;

    return false;
  };

  if(typeof Game !== "undefined" && Game.prototype){

    Game.prototype.mpLessonsAllowedMode = function(){
      return window.mpLessonsAllowedMode(this);
    };

    const oldMpInitTrainingCoach = Game.prototype.mpInitTrainingCoach;
    if(oldMpInitTrainingCoach){
      Game.prototype.mpInitTrainingCoach = function(){
        if(!this.mpLessonsAllowedMode || !this.mpLessonsAllowedMode()){
          this.trainingMode = false;
          this.isTrainingMode = false;
          this.rumbleMode = false;

          if(this.mpTrainingCoachText){
            this.mpTrainingCoachText.destroy();
            this.mpTrainingCoachText = null;
          }

          if(this.mpTrainingCoachSubText){
            this.mpTrainingCoachSubText.destroy();
            this.mpTrainingCoachSubText = null;
          }

          return;
        }

        return oldMpInitTrainingCoach.call(this);
      };
    }

    const oldMpRecordTrainingAction = Game.prototype.mpRecordTrainingAction;
    if(oldMpRecordTrainingAction){
      Game.prototype.mpRecordTrainingAction = function(action){
        if(!this.mpLessonsAllowedMode || !this.mpLessonsAllowedMode()) return;
        return oldMpRecordTrainingAction.call(this,action);
      };
    }

    const oldMpShowTrainingPrompt = Game.prototype.mpShowTrainingPrompt;
    if(oldMpShowTrainingPrompt){
      Game.prototype.mpShowTrainingPrompt = function(extra){
        if(!this.mpLessonsAllowedMode || !this.mpLessonsAllowedMode()) return;
        return oldMpShowTrainingPrompt.call(this,extra);
      };
    }

    // Cleanup any already-created coach overlay when entering non-lesson modes.
    const oldCreate = Game.prototype.create;
    Game.prototype.create = function(){
      const r = oldCreate ? oldCreate.call(this) : undefined;

      if(!this.mpLessonsAllowedMode || !this.mpLessonsAllowedMode()){
        this.trainingMode = false;
        this.isTrainingMode = false;
        this.rumbleMode = false;

        if(this.mpTrainingCoachText){
          this.mpTrainingCoachText.destroy();
          this.mpTrainingCoachText = null;
        }

        if(this.mpTrainingCoachSubText){
          this.mpTrainingCoachSubText.destroy();
          this.mpTrainingCoachSubText = null;
        }
      }

      return r;
    };

    // Do not let safeUpdate recreate lesson overlays in non-lesson modes.
    const oldSafeUpdate = Game.prototype.safeUpdate;
    if(oldSafeUpdate && !Game.prototype.mpLessonGateSafeUpdateWrapped){
      Game.prototype.mpLessonGateSafeUpdateWrapped = true;

      Game.prototype.safeUpdate = function(time,delta){
        const r = oldSafeUpdate.call(this,time,delta);

        if(!this.mpLessonsAllowedMode || !this.mpLessonsAllowedMode()){
          if(this.mpTrainingCoachText){
            this.mpTrainingCoachText.destroy();
            this.mpTrainingCoachText = null;
          }

          if(this.mpTrainingCoachSubText){
            this.mpTrainingCoachSubText.destroy();
            this.mpTrainingCoachSubText = null;
          }
        }

        return r;
      };
    }
  }
})();

      fx.mpFollowOffsetY = opts.followOffsetY ?? -58;
      this.mpJacksonLoopFX = fx;

      });

  };

  if(oldSpawnJacksonFX && !Game.prototype.mpJacksonPhaserReadyFXWrapped){

        }

        if(key === "jackson_lonewolf_aura" && hasAnim(this,"jackson_lonewolf_aura_anim")){
          return this.mpSpawnJacksonSheetFX("jackson_lonewolf_aura_anim","jackson_lonewolf_aura_sheet",x,y,opts);
        }

        if(key === "jackson_riff_wave" && hasAnim(this,"jackson_riff_wave_anim")){
          return this.mpSpawnJacksonSheetFX("jackson_riff_wave_anim","jackson_riff_wave_sheet",x,y,opts);

  Game.prototype.mpSpawnJacksonComboSheetFX = function(combo,enemy){

      razor_string:["jackson_razor_string_anim","jackson_razor_string_sheet"],
      broken_chord:["jackson_broken_chord_anim","jackson_broken_chord_sheet"],
      dead_air:["jackson_dead_air_anim","jackson_dead_air_sheet"],
      flying_riff:["jackson_flying_riff_anim","jackson_flying_riff_sheet"]

      flipX:dir < 0
    });

    return true;

  const oldApplyCombo = Game.prototype.mpApplyJacksonCombo;
  if(oldApplyCombo && !Game.prototype.mpJacksonComboSheetFXWrapped){
    Game.prototype.mpJacksonComboSheetFXWrapped = true;

    Game.prototype.mpApplyJacksonCombo = function(combo,enemy){
      const result = oldApplyCombo.call(this,combo,enemy);

      if(result && combo && enemy){
        this.mpSpawnJacksonComboSheetFX(combo,enemy);
      }

      return result;
    };
  }

  const oldRiffWave = Game.prototype.mpJacksonRiffWave;
  if(oldRiffWave && !Game.prototype.mpJacksonRiffWaveSheetWrapped){
    Game.prototype.mpJacksonRiffWaveSheetWrapped = true;

    Game.prototype.mpJacksonRiffWave = function(){
      if(!mpIsJackson() || !hasAnim(this,"jackson_riff_wave_anim")){
        return oldRiffWave.call(this);
      }

      const dir = this.getFacingDir ? this.getFacingDir() : (this.player.flipX ? -1 : 1);
      const startX = this.player.x + dir * 58;
      const startY = this.player.y - 72;
      const endX = startX + dir * 420;

      const wave = this.mpSpawnJacksonSheetFX("jackson_riff_wave_anim","jackson_riff_wave_sheet",startX,startY,{
        scale:0.72,
        duration:540,
        depth:15000,
        flipX:dir < 0
      });

      if(!wave){
        return oldRiffWave.call(this);
      }

      const hitSet = new Set();

      this.tweens.add({
        targets:wave,
        x:endX,
        alpha:0.10,
        duration:540,
        ease:"Linear",
        onUpdate:()=>{
          this.enemies.forEach(e=>{
            if(!e || e.dead || hitSet.has(e)) return;
            if(e.platform && this.platform && e.platform !== this.platform) return;

            const dx = Math.abs(e.x - wave.x);
            const dy = Math.abs((e.y - 58) - wave.y);

            if(dx < 84 && dy < 56){
              hitSet.add(e);
              e.health -= this.mpJacksonPowerActive ? 16 : 11;
              e.vx = dir * (this.mpJacksonPowerActive ? 430 : 300);
              e.knockbackTime = 650;
              e.busy = true;
              e.state = "jackson_riff_hit";

              if(this.mpApplyJacksonFear) this.mpApplyJacksonFear(e,this.mpJacksonPowerActive ? 3200 : 2200);
              if(this.safeEnemyPlay) this.safeEnemyPlay(e,"knockback");
              if(this.updateEnemyHealthBar) this.updateEnemyHealthBar(e);
              if(this.createHitFX) this.createHitFX(e.x,e.y-70,"RIFF",12);

              if(e.health <= 0 && this.killEnemy){
                this.killEnemy(e);
              }else{
                this.time.delayedCall(650,()=>{
                  if(e && !e.dead){
                    e.busy = false;
                    e.state = "idle";
                    e.vx = 0;
                    if(this.safeEnemyPlay) this.safeEnemyPlay(e,"idle");
                  }
                });
              }
            }
          });
        }
      });

      if(this.cameras && this.cameras.main) this.cameras.main.shake(100,0.004);
      try{ vibrate([20,18,36]); }catch(e){}

      return true;
    };
  }

  const oldActivatePower = Game.prototype.mpActivateJacksonPowerMode;
  if(oldActivatePower && !Game.prototype.mpJacksonPowerSheetAuraWrapped){
    Game.prototype.mpJacksonPowerSheetAuraWrapped = true;

    Game.prototype.mpActivateJacksonPowerMode = function(){
      const result = oldActivatePower.call(this);

      if(result && mpIsJackson() && hasAnim(this,"jackson_lonewolf_aura_anim")){
        if(this.mpJacksonAura && this.mpJacksonAura.destroy){
          this.mpJacksonAura.destroy();
        }

        this.mpJacksonAura = this.mpSpawnJacksonSheetFX(
          "jackson_lonewolf_aura_anim",
          "jackson_lonewolf_aura_sheet",
          this.player.x,
          this.player.y - 58,
          {
            scale:0.72,
            alpha:0.85,
            depth:(this.player.depth || 200)-1,
            loopFollowPlayer:true,
            followOffsetY:-58
          }
        );
      }

      return result;
    };
  }

  const oldSafeUpdate = Game.prototype.safeUpdate;
  if(oldSafeUpdate && !Game.prototype.mpJacksonSheetFXUpdateWrapped){
    Game.prototype.mpJacksonSheetFXUpdateWrapped = true;

    Game.prototype.safeUpdate = function(time,delta){
      const r = oldSafeUpdate.call(this,time,delta);

      if(this.mpJacksonLoopFX && this.player && this.mpJacksonLoopFX.active){
        this.mpJacksonLoopFX.x = this.player.x;
        this.mpJacksonLoopFX.y = this.player.y + (this.mpJacksonLoopFX.mpFollowOffsetY || -58);
      }

      if(!this.mpJacksonPowerActive && this.mpJacksonLoopFX){
        if(this.mpJacksonLoopFX.destroy) this.mpJacksonLoopFX.destroy();
        this.mpJacksonLoopFX = null;
      }

      return r;
    };
  }
})();


/* =========================================================
   ASPECT RATIO CANVAS ZOOM V764
   Preserves 16:9 scaling on mobile/desktop.
   No gameplay zoom; only display zoom.
========================================================= */
(function(){
  if(window.MP_ASPECT_CANVAS_ZOOM_V764) return;
  window.MP_ASPECT_CANVAS_ZOOM_V764 = true;

  window.mpFitCanvasToAspect = function(){
    const canvas = document.querySelector("#game canvas");
    if(!canvas) return;

    const vw = window.innerWidth || document.documentElement.clientWidth || 960;
    const vh = window.innerHeight || document.documentElement.clientHeight || 540;
    const target = 16 / 9;
    const screen = vw / vh;

    if(screen > target){
      canvas.style.width = "auto";
      canvas.style.height = "100dvh";
    }else{
      canvas.style.width = "100vw";
      canvas.style.height = "auto";
    }

    canvas.style.maxWidth = "100vw";
    canvas.style.maxHeight = "100dvh";
    canvas.style.objectFit = "contain";
  };

  window.addEventListener("resize",()=>setTimeout(window.mpFitCanvasToAspect,40));
  window.addEventListener("orientationchange",()=>setTimeout(window.mpFitCanvasToAspect,180));
  window.addEventListener("load",()=>setTimeout(window.mpFitCanvasToAspect,250));

  const oldRAF = window.requestAnimationFrame;
  window.requestAnimationFrame(function(){
    window.mpFitCanvasToAspect();
  });
})();

        cardKey: "char_card_jt",

      },
      hew: {

        faction: "MOTEL PHEROMONES",
        role: "TANK / CROWD CONTROL",
        weapon: "MEPHISTA BASS",
        cardKey: "char_card_hew",
        unlocked: true
      },
      jackson: {
        id: "jackson",

        faction: "ROCKER BOYS",
        role: "LEAD GUITAR",

    const clean = order.map((id) => ({

  CharacterSelectClass.prototype.buildCards = function () {
    normalizeTopFighters(this);

    const gameW = this.game && this.game.config ? this.game.config.width : W;
    const gameH = this.game && this.game.config ? this.game.config.height : H;
    const sx = gameW / 960;
    const sy = gameH / 540;

    const visibleSlots = 7;
    const cardW = Math.round(108 * sx);
    const cardH = Math.round(228 * sy);
    const gap = Math.round(126 * sx);

    this.cardFrames = [];

  CharacterSelectClass.prototype.keepBackCarouselVisible = function () {

    if (this.selectedIndex < this.cardScrollIndex) {
      this.cardScrollIndex = this.selectedIndex;
    }

    if (this.selectedIndex > this.cardScrollIndex + visibleSlots - 1) {
      this.cardScrollIndex = this.selectedIndex - visibleSlots + 1;
    }

    this.cardScrollIndex = Phaser.Math.Clamp(
      this.cardScrollIndex || 0,
      0,
      Math.max(0, this.fighters.length - visibleSlots)
    );

  CharacterSelectClass.prototype.moveSelection = function (direction) {

    this.selectedIndex += direction;

    if (this.selectedIndex < 0) this.selectedIndex = this.fighters.length - 1;
    if (this.selectedIndex >= this.fighters.length) this.selectedIndex = 0;

    this.keepBackCarouselVisible();
    this.updateSelection();
  };

  CharacterSelectClass.prototype.updateSelection = function () {
    if (!this.fighters || !this.fighters.length) return;

    this.keepBackCarouselVisible();

    const layout = this.backCarouselLayout || {
      visibleSlots: 7,
      cardW: 108,
      cardH: 228,
      gap: 126,
      startX: 102,
      y: 260
    };

    const selectedFighter = this.fighters[this.selectedIndex];

    if (this.cardSlots) {
      this.cardSlots.forEach((item) => {
        const fighter = this.fighters[item.index];
        const selected = item.index === this.selectedIndex;
        const unlocked = !!fighter.unlocked;
        const visibleIndex = item.index - this.cardScrollIndex;
        const visible = visibleIndex >= 0 && visibleIndex < layout.visibleSlots;
        const x = layout.startX + visibleIndex * layout.gap;

        item.slot.setVisible(visible);
        item.slot.setPosition(x, layout.y);
        item.slot.setScale(selected ? 1.08 : 1.0);

        item.frame.setStrokeStyle(
          selected ? 5 : 2,
          selected ? 0xff1493 : unlocked ? 0x7a225a : 0x444444,
          selected ? 1 : 0.85
        );

        item.frame.setFillStyle(
          unlocked ? 0x090009 : 0x111111,
          selected ? 0.96 : 0.72
        );

        item.lockShade.setAlpha(unlocked ? 0 : 0.35);
        item.nameText.setColor(selected ? "#ff4fc3" : unlocked ? "#ffffff" : "#777777");

        if (item.cardObj && item.cardObj.setAlpha) {
          item.cardObj.setAlpha(unlocked ? 1 : 0.55);
        }

        if (item.cardObj && item.cardObj.texture && item.cardObj.texture.key && item.cardObj.setDisplaySize) {
          item.cardObj.setDisplaySize(layout.cardW - 8, layout.cardH - 8);
        }
      });
    }

    if (this.infoName && selectedFighter) {
      this.infoName.setText(selectedFighter.displayName);
      this.infoFaction.setText("FACTION: " + (selectedFighter.faction || "LOCKED"));
      this.infoRole.setText("ROLE: " + selectedFighter.role);
      this.infoWeapon.setText("WEAPON: " + (selectedFighter.weapon || ""));
    }
  };

  CharacterSelectClass.prototype.selectFighter = function () {
    const fighter = this.fighters && this.fighters[this.selectedIndex];
    if (!fighter) return;

    if (!fighter.unlocked) {
      if (this.infoName) this.infoName.setText(fighter.displayName);
      if (this.infoFaction) this.infoFaction.setText("FACTION: " + (fighter.faction || "LOCKED"));
      if (this.infoRole) this.infoRole.setText("ROLE: LOCKED");
      if (this.infoWeapon) this.infoWeapon.setText("WEAPON: ");
      return;
    }

    // Delegate selection to the existing handler.
    // In Versus mode this populates P1/P2 teams; in non-versus it starts LevelSelect.
    oldSelectFighter.apply(this, arguments);
  };
})();

/* =========================================================

(function(){

  function mpFinalFighterVisual(id, action){
    id = mpFinalCleanId(id);
    action = action || "idle";

    const base = {
      DONNY:{
        moveSheet:(DONNY_USE_CUTOUT_MOVEMENT ? "donny_idle_cutout" : "donny_movement"), attackSheet:"donny_attacks", actionSheet:"donny_actions", reactionSheet:"donny_reactions",
        moveScale:DONNY_SCALE, attackScale:DONNY_SCALE, actionScale:DONNY_SCALE, reactionScale:DONNY_SCALE,

      },
      JT:{
        moveSheet:"jt_movement", attackSheet:"jt_attacks", actionSheet:"jt_actions", reactionSheet:"jt_actions",
        moveScale:PLAYER_MOVE_SCALE, attackScale:PLAYER_ATTACK_SCALE, actionScale:JT_ACTION_SCALE, reactionScale:JT_ACTION_SCALE,

      },

        prefix:"jackson"
      }
    }[id];

    let sheet = base.moveSheet;
    let scale = base.moveScale;
    let anim = base.prefix + "_idle_down";

    if(action === "walk"){
      sheet = base.moveSheet;
      scale = base.moveScale;
      anim = base.prefix + "_walk_down";
    }else if(action === "punch"){
      sheet = base.attackSheet;
      scale = base.attackScale;
      anim = base.prefix + "_attack_light";
    }else if(action === "kick"){

      scale = base.attackScale;
      anim = base.prefix + "_kick";
    }else if(action === "special"){
      sheet = base.actionSheet;
      scale = base.actionScale;
      anim = base.prefix + "_special";
    }else if(action === "taunt"){
      sheet = base.actionSheet;
      scale = base.actionScale;
      anim = base.prefix + "_taunt";
    }else if(action === "hurt"){
      sheet = base.reactionSheet;
      scale = base.reactionScale;
      anim = base.prefix + "_hurt";
    }else if(action === "knockback"){
      sheet = base.reactionSheet;
      scale = base.reactionScale;
      anim = base.prefix + "_knockback";
    }else if(action === "ko"){
      sheet = base.reactionSheet;
      scale = base.reactionScale;
      anim = base.prefix + "_ko";
    }

    return { id, sheet, scale, anim };
  }

  function mpFinalApplyCpuAction(scene,e,action){
    if(!scene || !e || !e.sprite || !e.mpvCpuOpponent) return false;

    const member = e.mpvCpuMember || {};
    const id = member.id || member.fighterId || e.fighterId || "JACKSON";
    const cfg = mpFinalFighterVisual(id, action || "idle");

    if(scene.textures && scene.textures.exists(cfg.sheet)){
      if(e.sprite.texture && e.sprite.texture.key !== cfg.sheet){
        e.sprite.setTexture(cfg.sheet);
      }
    }

    e.sprite.setOrigin(0.5,1);
    e.sprite.setScale(cfg.scale);
    e.sprite.clearTint();

    if(scene.anims && scene.anims.exists(cfg.anim)){
      if(action === "ko"){
        if(!e.mpFinalKoAnimStarted){
          e.mpFinalKoAnimStarted = true;
          e.sprite.stop();
          e.sprite.play(cfg.anim,false);
          e.sprite.once("animationcomplete",()=>{
            if(scene.lockEnemyKOFrame){
              scene.lockEnemyKOFrame(e);
            }
          });
        }
      }else{
        safePlay(e.sprite,cfg.anim);
      }
    }else{
      try{ e.sprite.setFrame(0); }catch(err){}
    }

    e.mpFinalSkinId = cfg.id;
    e.mpFinalSkinAction = action || "idle";
    return true;
  }

  const MP_FINAL_OLD_SAFE_ENEMY_PLAY = Game.prototype.safeEnemyPlay;
  Game.prototype.safeEnemyPlay = function(e,action){
    if(e && e.mpvCpuOpponent){
      if(mpFinalApplyCpuAction(this,e,action || "idle")) return;
    }

    if(MP_FINAL_OLD_SAFE_ENEMY_PLAY){
      return MP_FINAL_OLD_SAFE_ENEMY_PLAY.call(this,e,action);
    }
  };

  const MP_FINAL_OLD_FORCE_ENEMY_FRAME = Game.prototype.forceEnemyActionFrame;
  Game.prototype.forceEnemyActionFrame = function(e,action){
    if(e && e.mpvCpuOpponent){
      return mpFinalApplyCpuAction(this,e,action || "idle");
    }

    if(MP_FINAL_OLD_FORCE_ENEMY_FRAME){
      return MP_FINAL_OLD_FORCE_ENEMY_FRAME.call(this,e,action);
    }

    return false;
  };

  function mpFinalRefreshCpuSkin(scene){
    if(!scene || !scene.mpvCpu || !scene.mpvCpu.mpvCpuOpponent) return;

    const e = scene.mpvCpu;
    let action = "idle";

    if(e.dead || e.state === "dead") action = "ko";
    else if(e.state === "hurt") action = "hurt";
    else if(e.state === "knockback" || e.knockbackTime > 0) action = "knockback";
    else if(e.busy && e.state === "attack") action = "punch";
    else if(Math.abs(e.vx || 0) > 4) action = "walk";

    mpFinalApplyCpuAction(scene,e,action);
  }

  Game.prototype.mobileButton = function(x, y, label, color, down, up = null){
    const size = v => v * CONTROL_ZOOM;
    const font = v => Math.round(v * CONTROL_ZOOM) + "px monospace";

      this.ensureRoundActive();

      vibrate(VIBE.button);
      if(down) down();
    });

    hit.on("pointerup", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      if(up) up();
    });

    hit.on("pointerout", () => {
      if(up) up();
    });

    const btn = { hit, shadow, face, shine, text, label };

    if(!this.mobileButtons) this.mobileButtons = [];
    this.mobileButtons.push(btn);

  Game.prototype.makeMobileControls = function(){
    const size = v => v * CONTROL_ZOOM;
    const font = v => Math.round(v * CONTROL_ZOOM) + "px monospace";

    this.mobileUI = {};
    this.mobileButtons = [];
    this.input.topOnly = false;

    const bx = 105;
    const by = H - 145;
    const baseR = size(44);
    const knobR = size(18);

    const stickBase = this.add.circle(bx, by, baseR, 0xffffff, 0.10)
      .setStrokeStyle(2, 0xffffff, 0.18)
      .setDepth(94000)
      .setScrollFactor(0);

    const knob = this.add.circle(bx, by, knobR, 0xffffff, 0.28)
      .setStrokeStyle(2, 0xffffff, 0.25)
      .setDepth(94001)
      .setScrollFactor(0);

    this.mobileUI.stickBase = stickBase;
    this.mobileUI.stickKnob = knob;

    let dragging = false;

    const moveStick = p => {
      let dx = p.x - stickBase.x;
      let dy = p.y - stickBase.y;
      const d = Math.sqrt(dx * dx + dy * dy);

      if(d > baseR){
        dx = (dx / d) * baseR;
        dy = (dy / d) * baseR;
      }

      knob.x = stickBase.x + dx;
      knob.y = stickBase.y + dy;

      this.stickX = dx / baseR;
      this.stickY = dy / baseR;
    };

    this.input.on("pointerdown", p => {
      if(Phaser.Math.Distance.Between(p.x, p.y, stickBase.x, stickBase.y) < size(78)){
        dragging = true;
        moveStick(p);
      }
    });

    this.input.on("pointermove", p => {
      if(dragging) moveStick(p);
    });

    const releaseStick = () => {
      dragging = false;
      knob.x = stickBase.x;
      knob.y = stickBase.y;
      this.stickX = 0;
      this.stickY = 0;
    };

    this.input.on("pointerup", releaseStick);
    this.input.on("pointerupoutside", releaseStick);

    // Lower-right placement from the marked X.
    const diamondX = W - 155;
    const diamondY = H - 90;
    const gap = 42;

    this.mobileButton(diamondX, diamondY - gap, "X", 0x4d7cff, () => this.startAttack("light"));
    this.mobileButton(diamondX - gap, diamondY, "Y", 0x4fd35d, () => this.startContextY());
    this.mobileButton(diamondX + gap, diamondY, "A", 0xff5a5a, () => this.startContextKick());
    this.mobileButton(diamondX, diamondY + gap, "B", 0xffd84d, () => this.startContextB());

    this.mobileButton(diamondX - 70, diamondY - 70, "SP", 0x8f72ff, () => this.startAttack("heavy"));

    this.mobileButton(diamondX - 145, diamondY + 4, "CR", 0x8a8a8a, () => {
      this.recoverActionInput();
      this.startCrouch(true);
    });

    const menuX = CX;
    const menuY = H - 105;

    const menuHit = this.add.rectangle(menuX, menuY, size(96), size(30), 0x000000, 0.28)
      .setInteractive({ useHandCursor:true })
      .setDepth(95000)
      .setScrollFactor(0);

    const menuFace = this.add.rectangle(menuX, menuY, size(96), size(30), 0xffffff, 0.10)
      .setStrokeStyle(2, 0xffffff, 0.30)
      .setDepth(95001)
      .setScrollFactor(0);

    const menuText = this.add.text(menuX, menuY, "MENU", {
      font: font(13),
      fill: "#fff"
    })
      .setOrigin(0.5)
      .setDepth(95002)
      .setScrollFactor(0);

    this.mobileUI.menuHit = menuHit;
    this.mobileUI.menuFace = menuFace;
    this.mobileUI.menuText = menuText;

    menuHit.on("pointerdown", p => {
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      this.togglePauseMenu();
    });
  };

  function mpFinalMoveTextHud(scene){
    if(!scene || !scene.children) return;

    const rows = {
      "CHAR:": {x:20,y:104},
      "LEVEL:": {x:20,y:128},
      "COMBO:": {x:20,y:152},

    scene.children.list.forEach(obj=>{

          obj.x = rows[prefix].x;
          obj.y = rows[prefix].y;
          if(obj.setScrollFactor) obj.setScrollFactor(0);
          if(obj.setDepth) obj.setDepth(65010);
        }
      });
    });
  }

      hud.p1Name.setDepth(topDepth);
      hud.p1Name.setScrollFactor(0);
    }

    const items = scene.mpvHudItems || [];
    const hpBack = items[3];
    const hpFill = hud.hpFill || items[4];

    if(hpBack && hpBack.setPosition){
      hpBack.setPosition(150, 67);

    if(hpFill && hpFill.setPosition){
      hpFill.setPosition(152, 67);

      hpFill.setScrollFactor(0);
    }

    if(grooveBack && grooveBack.setPosition){

      grooveBack.setScrollFactor(0);
    }

    if(grooveFill && grooveFill.setPosition){
      grooveFill.setPosition(152, 82);
      grooveFill.setOrigin(0,0.5);
      grooveFill.setDepth(topDepth + 1);
      grooveFill.setScrollFactor(0);
    }

    // Left C-mark tag button.
    const tagX = 88;
    const tagY = 230;

    if(hud.tagBox){
      hud.tagBox.setPosition(tagX, tagY);
      hud.tagBox.setDepth(97000);
      hud.tagBox.setScrollFactor(0);

    }

    if(hud.tagText){
      hud.tagText.setPosition(tagX + 20, tagY - 8);

      hud.tagText.setDepth(97002);

    }

    if(hud.tagNextText){

      hud.tagNextText.setOrigin(0.5);
      hud.tagNextText.setDepth(97002);

    }

    if(hud.tagFaceBack){
      hud.tagFaceBack.setPosition(tagX - 52, tagY);
      hud.tagFaceBack.setDepth(97001);
      hud.tagFaceBack.setScrollFactor(0);
    }

    if(hud.tagFace){
      hud.tagFace.setPosition(tagX - 52, tagY + 11);
      hud.tagFace.setDepth(97003);
      hud.tagFace.setScrollFactor(0);
    }

    if(hud.p2Text){
      hud.p2Text.setPosition(W - 310, 210);
      hud.p2Text.setDepth(65020);
      hud.p2Text.setScrollFactor(0);
    }
  }

  const MP_FINAL_OLD_CREATE = Game.prototype.create;
  Game.prototype.create = function(){
    MP_FINAL_OLD_CREATE.call(this);

    if(mpFinalIsVersus()){
      this.time.delayedCall(120,()=>{
        mpFinalLayoutHud(this);
        mpFinalRefreshCpuSkin(this);
      });
    }
  };

  const MP_FINAL_OLD_UPDATE = Game.prototype.update;
  Game.prototype.update = function(time,delta){
    if(MP_FINAL_OLD_UPDATE){
      MP_FINAL_OLD_UPDATE.call(this,time,delta);
    }

    if(mpFinalIsVersus()){
      mpFinalLayoutHud(this);
      mpFinalRefreshCpuSkin(this);
    }
  };

  if(Game.prototype.safeUpdate){
    const MP_FINAL_OLD_SAFE_UPDATE = Game.prototype.safeUpdate;
    Game.prototype.safeUpdate = function(time,delta){
      MP_FINAL_OLD_SAFE_UPDATE.call(this,time,delta);

      if(mpFinalIsVersus()){
        mpFinalLayoutHud(this);
        mpFinalRefreshCpuSkin(this);
      }
    };
  }
})();

/* =========================================================
   CONTROLS IMAGE + BACK NAVIGATION PATCH V1
   - B / ESC backs out one screen on menus; Title has no back-out
   - START / OPTIONS opens controls image overlay
   - Game MENU / START opens the same controls image overlay
========================================================= */
(function(){
  if(window.MP_CONTROLS_BACK_NAV_PATCH_V1) return;
  window.MP_CONTROLS_BACK_NAV_PATCH_V1 = true;

  // Disabled embedded controls PNG to prevent mobile boot hang / black screen.
  // The controls screen is drawn in code instead.
  window.MP_CONTROLS_POPUP_DATA = "";


  function mpLoadControlsTexture(scene){
    // No embedded image is loaded during preload.
    // Loading the giant data-URI controls PNG caused a black-screen boot hang on mobile.
    return;
  }

  function mpDestroyControls(scene){
    if(!scene) return;

    if(scene.mpControlsKeyHandlers && scene.input && scene.input.keyboard){
      Object.keys(scene.mpControlsKeyHandlers).forEach(function(key){
        scene.input.keyboard.off(key, scene.mpControlsKeyHandlers[key]);
      });
    }

    scene.mpControlsKeyHandlers = null;

    if(scene.mpControlsItems && scene.mpControlsItems.length){
      scene.mpControlsItems.forEach(function(item){
        if(item && item.destroy) item.destroy();
      });
    }

    scene.mpControlsItems = [];
    scene.mpControlsOpen = false;
  }

  function mpShowControls(scene){
    if(!scene || !scene.add) return;

    if(scene.mpControlsOpen){
      mpDestroyControls(scene);
      return;
    }

    const depth = 250000;
    const items = [];

    const shade = scene.add.rectangle(CX, CY, W, H, 0x000000, 0.82)
      .setDepth(depth)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor:true });
    items.push(shade);

    let panel;

    if(scene.textures && scene.textures.exists("mp_controls_popup")){
      const maxW = Math.min(W * 0.94, 900);
      const maxH = Math.min(H * 0.92, 506);
      panel = scene.add.image(CX, CY, "mp_controls_popup")
        .setDisplaySize(maxW, maxH)
        .setDepth(depth + 1)
        .setScrollFactor(0);
    }else{
      panel = scene.add.rectangle(CX, CY, W * 0.92, H * 0.86, 0x080510, 0.96)
        .setStrokeStyle(4, 0xff2da8)
        .setDepth(depth + 1)
        .setScrollFactor(0);

      const controlsText =
        "CONTROLS\n\n" +
        "MOBILE / GAMEPAD\n" +
        "STICK / WASD / ARROWS: MOVE + AIM LANE\n" +
        "DOWN + B: PICK UP ITEM OR WEAPON\n" +
        "X: LIGHT ATTACK / WEAPON ATTACK / USE HELD ITEM\n" +
        "A OR Y: THROW HELD WEAPON OR ITEM\n" +
        "B: GRAB ENEMY / THROW CARRIED ENEMY / BACK\n" +
        "X WHILE GRABBING: CARRY ENEMY\n" +
        "X WHILE CARRYING: PUT ENEMY DOWN\n" +
        "SP: SPECIAL   CR: CROUCH   TAG: SWAP FIGHTER\n\n" +
        "KEYBOARD\n" +
        "J: LIGHT ATTACK   K: HEAVY   U: KICK   L: BLOCK / B-ACTION\n" +
        "SPACE: JUMP   C: CROUCH   Q: TAG   ESC/B: BACK OR CLOSE\n\n" +
        "START / OPTIONS OPENS THIS SCREEN";

      const fallback = scene.add.text(CX, CY, controlsText, {
        font:"17px monospace",
        fill:"#ffffff",
        align:"center",
        stroke:"#000000",
        strokeThickness:4,
        lineSpacing:4
      }).setOrigin(0.5).setDepth(depth + 2).setScrollFactor(0);
      items.push(fallback);
    }

    items.push(panel);

    const closeBg = scene.add.rectangle(CX, H - 34, 360, 34, 0x140014, 0.92)
      .setStrokeStyle(2, 0xff2da8)
      .setDepth(depth + 3)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor:true });

    const closeText = scene.add.text(CX, H - 34, "B / ESC / TAP CLOSE", {
      font:"18px monospace",
      fill:"#fff45c",
      stroke:"#000000",
      strokeThickness:4
    }).setOrigin(0.5).setDepth(depth + 4).setScrollFactor(0);

    items.push(closeBg, closeText);

    const close = function(){ mpDestroyControls(scene); };

    shade.on("pointerdown", close);
    closeBg.on("pointerdown", close);
    closeText.on("pointerdown", close);

    scene.mpControlsKeyHandlers = {
      "keydown-B": close,
      "keydown-ESC": close,
      "keydown-ENTER": close,
      "keydown-SPACE": close
    };

    if(scene.input && scene.input.keyboard){
      Object.keys(scene.mpControlsKeyHandlers).forEach(function(key){
        scene.input.keyboard.on(key, scene.mpControlsKeyHandlers[key]);
      });
    }

    scene.mpControlsItems = items;
    scene.mpControlsOpen = true;
  }

  window.mpShowControlsOverlay = mpShowControls;
  window.mpDestroyControlsOverlay = mpDestroyControls;

  function mpAddOptionsButton(scene){
    if(!scene || !scene.add || scene.mpOptionsButtonBuilt) return;
    scene.mpOptionsButtonBuilt = true;

    const x = W - 112;
    const y = H - 48;

    const hit = scene.add.rectangle(x, y, 180, 56, 0x000000, 0.01)
      .setDepth(240000)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor:true });

    const label = scene.add.text(x, y, "☰  OPTIONS", {
      font:"17px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5
    }).setOrigin(0.5).setDepth(240001).setScrollFactor(0);

    hit.on("pointerdown", function(){ mpShowControls(scene); });
    label.setInteractive({ useHandCursor:true }).on("pointerdown", function(){ mpShowControls(scene); });

    scene.mpOptionsButtonItems = [hit,label];
  }

  function mpAddBackButton(scene, targetScene){
    if(!scene || !scene.add || scene.mpBackButtonBuilt) return;
    scene.mpBackButtonBuilt = true;

    const x = 104;
    const y = H - 48;

    const hit = scene.add.rectangle(x, y, 170, 56, 0x000000, 0.01)
      .setDepth(240000)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor:true });

    const label = scene.add.text(x, y, "B  BACK", {
      font:"17px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5
    }).setOrigin(0.5).setDepth(240001).setScrollFactor(0);

    const goBack = function(){
      if(scene.mpControlsOpen){
        mpDestroyControls(scene);
        return;
      }
      scene.scene.start(targetScene);
    };

    hit.on("pointerdown", goBack);
    label.setInteractive({ useHandCursor:true }).on("pointerdown", goBack);

    if(scene.input && scene.input.keyboard){
      scene.input.keyboard.on("keydown-B", goBack);
      scene.input.keyboard.on("keydown-ESC", goBack);
    }

    scene.mpBackButtonItems = [hit,label];
  }

  function mpPatchSceneCreate(SceneClass, targetBackScene, includeBack){
    if(!SceneClass || !SceneClass.prototype || SceneClass.prototype.mpControlsBackNavPatched) return;
    SceneClass.prototype.mpControlsBackNavPatched = true;

    const oldPreload = SceneClass.prototype.preload;
    SceneClass.prototype.preload = function(){
      if(oldPreload) oldPreload.apply(this, arguments);
      mpLoadControlsTexture(this);
    };

    const oldCreate = SceneClass.prototype.create;
    SceneClass.prototype.create = function(){
      if(oldCreate) oldCreate.apply(this, arguments);

      if(includeBack && targetBackScene){
        mpAddBackButton(this, targetBackScene);
      }

      mpAddOptionsButton(this);

      if(this.input && this.input.keyboard){
        this.input.keyboard.on("keydown-M", ()=>mpShowControls(this));
        this.input.keyboard.on("keydown-O", ()=>mpShowControls(this));
        this.input.keyboard.on("keydown-TAB", ()=>mpShowControls(this));
      }
    };
  }

  if(typeof Boot !== "undefined" && Boot.prototype && !Boot.prototype.mpControlsTexturePatched){
    Boot.prototype.mpControlsTexturePatched = true;
    const oldBootPreload = Boot.prototype.preload;
    Boot.prototype.preload = function(){
      if(oldBootPreload) oldBootPreload.apply(this, arguments);
      mpLoadControlsTexture(this);
    };
  }

  // Title: options works, but B/ESC does not leave the title.
  mpPatchSceneCreate(typeof Title !== "undefined" ? Title : null, null, false);

  // Back chain: LevelSelect -> CharacterSelect -> ModeSelect -> Title.
  mpPatchSceneCreate(typeof ModeSelect !== "undefined" ? ModeSelect : null, "Title", true);
  mpPatchSceneCreate(typeof CharacterSelect !== "undefined" ? CharacterSelect : null, "ModeSelect", true);
  mpPatchSceneCreate(typeof LevelSelect !== "undefined" ? LevelSelect : null, "CharacterSelect", true);

  if(typeof CharacterSelect !== "undefined" && CharacterSelect.prototype){
    CharacterSelect.prototype.goBack = function(){
      if(this.mpControlsOpen){
        mpDestroyControls(this);
        return;
      }
      this.scene.start("ModeSelect");
    };
  }

  if(typeof LevelSelect !== "undefined" && LevelSelect.prototype){
    LevelSelect.prototype.goBack = function(){
      if(this.mpControlsOpen){
        mpDestroyControls(this);
        return;
      }
      this.scene.start("CharacterSelect");
    };
  }

  if(typeof Game !== "undefined" && Game.prototype && !Game.prototype.mpControlsMenuPatched){
    Game.prototype.mpControlsMenuPatched = true;

    Game.prototype.openControlsMenu = function(){
      mpShowControls(this);
    };

    Game.prototype.togglePauseMenu = function(){
      mpShowControls(this);
    };
  }
})();

   END CONTROLS IMAGE + BACK NAVIGATION PATCH V1
