<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones v0.4</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  width: 100vw;
  height: 100dvh;
  overflow: hidden;
  touch-action: none;
}

canvas {
  display: block;
  width: 100vw !important;
  height: 100dvh !important;
  object-fit: contain;
  image-rendering: pixelated;
}
</style>
</head>

<body>

<script>

// ================= TITLE =================
class TitleScene extends Phaser.Scene {
  constructor() { super("TitleScene"); }

  preload() {
    this.load.image("title", "assets/title-screen.png");
    this.load.image("characterSelect", "assets/character-select.png");
    this.load.image("levelSelect", "assets/level-select.png");
  }

  create() {
    this.add.image(480,270,"title").setDisplaySize(960,540);

    const start = this.add.text(480,470,"PRESS START",{
      fontSize:"28px",
      color:"#ff4fc3"
    }).setOrigin(0.5).setInteractive();

    this.tweens.add({targets:start,alpha:0.2,duration:700,yoyo:true,repeat:-1});

    start.on("pointerdown",()=>this.scene.start("CharacterSelectScene"));
  }
}

// ================= CHARACTER SELECT =================
class CharacterSelectScene extends Phaser.Scene {
  constructor(){ super("CharacterSelectScene"); }

  create(){
    this.add.image(480,270,"characterSelect").setDisplaySize(960,540);

    this.characters=["DONNY","JT","HEW"];
    this.index=1;

    this.text=this.add.text(480,420,"",{fontSize:"36px",color:"#fff"}).setOrigin(0.5);

    // OUTLINE
    this.charOutline=this.add.rectangle(480,270,240,360,0xff4fc3,0)
      .setStrokeStyle(4,0xff4fc3);

    this.updateChar();

    const makeZone=(x,y,w,h,i)=>{
      this.add.rectangle(x,y,w,h,0xff0000,0)
        .setInteractive()
        .on("pointerdown",()=>{
          this.index=i;
          this.updateChar();
        });
    };

    makeZone(300,270,210,340,0);
    makeZone(480,270,240,360,1);
    makeZone(690,270,210,340,2);

    this.add.text(480,500,"SELECT",{color:"#ff4fc3"})
      .setOrigin(0.5)
      .setInteractive()
      .on("pointerdown",()=>this.select());
  }

  updateChar(){
    this.text.setText(this.characters[this.index]);

    const spots=[
      {x:300,y:270,w:210,h:340},
      {x:480,y:270,w:240,h:360},
      {x:690,y:270,w:210,h:340}
    ];

    let s=spots[this.index];
    this.charOutline.setPosition(s.x,s.y);
    this.charOutline.setSize(s.w,s.h);
  }

  select(){
    this.scene.start("LevelSelectScene",{character:this.characters[this.index]});
  }
}

// ================= LEVEL SELECT =================
class LevelSelectScene extends Phaser.Scene {
  constructor(){ super("LevelSelectScene"); }

  create(data){
    this.selectedCharacter=data.character;

    this.add.image(480,270,"levelSelect").setDisplaySize(960,540);

    this.levelSpots=[
      {x:180,y:270,w:160,h:300,name:"HOUSE PARTY"},
      {x:340,y:270,w:160,h:300,name:"INDOOR"},
      {x:500,y:270,w:180,h:320,name:"OUTDOOR"},
      {x:660,y:270,w:160,h:300,name:"LMNOP"},
      {x:820,y:270,w:160,h:300,name:"CHICKEN"}
    ];

    this.levelIndex=0;

    this.levelOutline=this.add.rectangle(180,270,160,300,0xff4fc3,0)
      .setStrokeStyle(4,0xff4fc3);

    this.updateLevelOutline();

    this.levelSpots.forEach((s,i)=>{
      this.add.rectangle(s.x,s.y,s.w,s.h,0xff0000,0)
        .setInteractive()
        .on("pointerdown",()=>{
          this.levelIndex=i;
          this.updateLevelOutline();
          this.start(s.name);
        });
    });
  }

  updateLevelOutline(){
    let s=this.levelSpots[this.levelIndex];
    this.levelOutline.setPosition(s.x,s.y);
    this.levelOutline.setSize(s.w,s.h);
  }

  start(level){
    this.scene.start("GameScene",{
      character:this.selectedCharacter,
      level:level
    });
  }
}

// ================= GAME =================
class GameScene extends Phaser.Scene {
  constructor(){ super("GameScene"); }

  create(data){
    this.add.rectangle(480,270,960,540,0x111111);

    this.add.text(30,30,"GAME STARTED",{color:"#fff"});
    this.add.text(30,70,"CHAR: "+data.character,{color:"#ff4fc3"});
    this.add.text(30,100,"LEVEL: "+data.level,{color:"#fff"});
  }
}

// ================= CONFIG =================
const config={
  type:Phaser.AUTO,
  width:960,
  height:540,
  scale:{
    mode:Phaser.Scale.FIT,
    autoCenter:Phaser.Scale.CENTER_BOTH
  },
  physics:{
    default:"arcade"
  },
  scene:[TitleScene,CharacterSelectScene,LevelSelectScene,GameScene]
};

new Phaser.Game(config);

</script>

</body>
</html>
