<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
body { margin:0; background:black; overflow:hidden; }
canvas { width:100vw !important; height:100vh !important; image-rendering:pixelated; }
</style>
</head>

<body>
<script>

const VERSION = 107;

class Boot extends Phaser.Scene {
  constructor(){ super("Boot"); }

  preload(){

    // UI
    this.load.image("title","assets/title-screen.png?v="+VERSION);
    this.load.image("fighterSelect","assets/character-select.png?v="+VERSION);
    this.load.image("levelSelect","assets/levels/level-select.png?v="+VERSION);

    // LEVELS
    this.load.image("house","assets/levels/house-party.png?v="+VERSION);
    this.load.image("indoor","assets/levels/leftys-indoor.png?v="+VERSION);
    this.load.image("outdoor","assets/levels/outdoor.png?v="+VERSION);
    this.load.image("lmnop","assets/levels/Lmnop.png?v="+VERSION);
    this.load.image("chicken","assets/levels/Chicken-coupe.png?v="+VERSION);

    // PLAYER
    this.load.spritesheet("jt","assets/player/jt/jt-master.png?v="+VERSION,{
      frameWidth:128,
      frameHeight:128
    });
  }

  create(){
    this.scene.start("Title");
  }
}

class Title extends Phaser.Scene {
  constructor(){ super("Title"); }

  create(){
    this.add.image(480,270,"title").setDisplaySize(960,540);

    this.add.text(480,480,"TAP TO START",{
      font:"20px monospace",
      fill:"#ff4fc3"
    }).setOrigin(0.5)
      .setInteractive()
      .on("pointerdown",()=>{
        this.scene.start("FighterSelect");
      });
  }
}

class FighterSelect extends Phaser.Scene {
  constructor(){ super("FighterSelect"); }

  create(){
    this.add.image(480,270,"fighterSelect").setDisplaySize(960,540);

    const fighters=[
      {name:"DOTTIE",x:260,y:300},
      {name:"GIGI",x:480,y:300},
      {name:"JT",x:700,y:300}
    ];

    this.outline=this.add.rectangle(700,300,170,260,0xff4fc3,0)
      .setStrokeStyle(4,0xff4fc3);

    fighters.forEach(f=>{
      this.add.rectangle(f.x,f.y,170,260,0xffffff,0.01)
        .setInteractive()
        .on("pointerdown",()=>{
          this.outline.setPosition(f.x,f.y);
          this.scene.start("LevelSelect",{fighter:f.name});
        });
    });
  }
}

class LevelSelect extends Phaser.Scene {
  constructor(){ super("LevelSelect"); }

  create(data){
    this.fighter=data.fighter || "JT";

    this.add.image(480,270,"levelSelect").setDisplaySize(960,540);

    const levels=[
      {name:"HOUSE PARTY",key:"house",x:190,y:300},
      {name:"INDOOR",key:"indoor",x:360,y:300},
      {name:"OUTDOOR",key:"outdoor",x:520,y:300},
      {name:"LMNOP",key:"lmnop",x:690,y:300},
      {name:"CHICKEN",key:"chicken",x:850,y:300}
    ];

    this.outline=this.add.rectangle(520,300,180,280,0xff4fc3,0)
      .setStrokeStyle(5,0xff4fc3);

    levels.forEach(l=>{
      this.add.rectangle(l.x,l.y,170,260,0xffffff,0.01)
        .setInteractive()
        .on("pointerdown",()=>{
          this.outline.setPosition(l.x,l.y);

          this.scene.start("Game",{
            fighter:this.fighter,
            levelKey:l.key,
            levelName:l.name
          });
        });
    });
  }
}

class Game extends Phaser.Scene {
  constructor(){ super("Game"); }

  create(data){

    this.levelKey=data.levelKey || "outdoor";

    // BACKGROUND
    if(this.textures.exists(this.levelKey)){
      this.add.image(480,270,this.levelKey).setDisplaySize(960,540);
    } else {
      this.add.rectangle(480,270,960,540,0x333333);
    }

    // TEXT
    this.add.text(20,20,"CHAR: "+data.fighter,{font:"16px monospace",fill:"#fff"});
    this.add.text(20,45,"LEVEL: "+data.levelName,{font:"16px monospace",fill:"#ff4fc3"});

    // PLAYER
    this.player=this.physics.add.sprite(300,420,"jt",0);
    this.player.setScale(2);

    // ===== 🌧️ RAIN =====
    this.rain = this.add.particles(0,0,'jt', {
      frame: 0,
      x: {min:0, max:960},
      y: 0,
      lifespan: 500,
      speedY: {min:400,max:700},
      scale: {start:0.05,end:0.02},
      quantity: 4,
      blendMode: 'ADD'
    });

    // ===== 🌫️ FOG =====
    this.fog = this.add.rectangle(480,270,960,540,0xaaaaaa,0.08)
      .setDepth(100);

    this.tweens.add({
      targets:this.fog,
      alpha:{from:0.05,to:0.15},
      duration:3000,
      yoyo:true,
      repeat:-1
    });

    // ===== CONTROLS =====
    this.moveX=0;

    this.input.on("pointerdown",(p)=>{
      if(p.x<300) this.moveX=-1;
      else this.moveX=1;
    });

    this.input.on("pointerup",()=>{
      this.moveX=0;
    });
  }

  update(){
    this.player.setVelocityX(this.moveX*200);
  }
}

new Phaser.Game({
  type:Phaser.AUTO,
  width:960,
  height:540,
  physics:{default:"arcade"},
  scene:[Boot,Title,FighterSelect,LevelSelect,Game]
});

</script>
</body>
</html>
