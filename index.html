<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
* {
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
}

html,
body {
  margin: 0;
  padding: 0;
  background: #000;
  width: 100%;
  height: 100%;
  overflow: hidden;
  touch-action: none;
  overscroll-behavior: none;
}

body {
  position: fixed;
  inset: 0;
}

#game {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
</style>
</head>

<body>
<div id="game"></div>

<script>
const GAME_VERSION = "walk-fix-2026-05-23-v1";

const WIDTH = 960;
const HEIGHT = 540;

const ASSETS = {

  characterSelect: "assets/character-select.png",
  levelSelect: "assets/level-select.png",

  titleMusic: "assets/audio/title-theme.mp3",

    jackson: "assets/cards/jackson.png",
    phil: "assets/cards/Phil.png",
    jed: "assets/cards/Jed.png",
    trent: "assets/cards/Trent.png",
    sam: "assets/cards/Sam.png",
    bird: "assets/cards/Bird.png",
    leanna: "assets/cards/Leanna.png",
    putzie: "assets/cards/Putzie.png",
    danny: "assets/cards/Danny.png",
    stan: "assets/cards/Stan.png"
  },

  sprites: {
    jt: "assets/sprites/player/jt/jt-master.png",
    donny: "assets/sprites/player/donny/donny-master.png",
    hew: "assets/sprites/player/hew/hew-master.png",
    jackson: "assets/sprites/player/jackson/jackson-master.png"

const ROSTER = [
  {
    id: "jt",
    name: "JT",
    faction: "Motel Pheromones",
    locked: false,
    card: "card_jt",
    sprite: "spr_jt"
  },
  {
    id: "donny",
    name: "Donny",
    faction: "Motel Pheromones",
    locked: false,
    card: "card_donny",
    sprite: "spr_donny"
  },
  {
    id: "hew",
    name: "Hew",
    faction: "Motel Pheromones",
    locked: false,
    card: "card_hew",
    sprite: "spr_hew"
  },
  {
    id: "jackson",
    name: "Jackson",
    faction: "Motel Pheromones",
    locked: false,
    card: "card_jackson",
    sprite: "spr_jackson"
  },

  { id: "phil", name: "Phil", faction: "Locked", locked: true, card: "card_phil", sprite: null },
  { id: "jed", name: "Jed", faction: "Locked", locked: true, card: "card_jed", sprite: null },
  { id: "trent", name: "Trent", faction: "Locked", locked: true, card: "card_trent", sprite: null },
  { id: "sam", name: "Sam", faction: "Locked", locked: true, card: "card_sam", sprite: null },
  { id: "bird", name: "Bird", faction: "Locked", locked: true, card: "card_bird", sprite: null },
  { id: "leanna", name: "Leanna", faction: "Locked", locked: true, card: "card_leanna", sprite: null },
  { id: "putzie", name: "Putzie", faction: "Locked", locked: true, card: "card_putzie", sprite: null },
  { id: "danny", name: "Danny", faction: "Locked", locked: true, card: "card_danny", sprite: null },
  { id: "stan", name: "Stan", faction: "Locked", locked: true, card: "card_stan", sprite: null }
];

const LEVELS = [
  {
    id: "house_party",
    name: "House Party",
    locked: false
  },
  {
    id: "leftys_indoor",
    name: "Lefty's Live Indoor",
    locked: false
  },
  {
    id: "leftys_outdoor",
    name: "Lefty's Loud Outdoor",
    locked: false
  },
  {
    id: "lmnop",
    name: "LMNOP",
    locked: false
  },
  {
    id: "chicken_coupe",
    name: "Chicken Coupe",
    locked: false
  }
];

let SELECTED_CHARACTER = ROSTER[0];
let SELECTED_LEVEL = LEVELS[0];

function withVersion(path) {
  return `${path}?v=${GAME_VERSION}`;
}

class BootScene extends Phaser.Scene {
  constructor() {
    super("BootScene");
  }

  preload() {
    this.load.image("title_screen", withVersion(ASSETS.title));
    this.load.image("character_select_bg", withVersion(ASSETS.characterSelect));
    this.load.image("level_select_bg", withVersion(ASSETS.levelSelect));

    this.load.audio("title_music", withVersion(ASSETS.titleMusic));
    this.load.audio("fight_music", withVersion(ASSETS.fightMusic));

    for (const [id, path] of Object.entries(ASSETS.cards)) {
      this.load.image(`card_${id.toLowerCase()}`, withVersion(path));
    }

    this.load.spritesheet("spr_jt", withVersion(ASSETS.sprites.jt), {
      frameWidth: 128,
      frameHeight: 128,
      margin: 0,
      spacing: 0
    });

    this.load.spritesheet("spr_donny", withVersion(ASSETS.sprites.donny), {
      frameWidth: 128,
      frameHeight: 128,
      margin: 0,
      spacing: 0
    });

    this.load.spritesheet("spr_hew", withVersion(ASSETS.sprites.hew), {
      frameWidth: 128,
      frameHeight: 128,
      margin: 0,
      spacing: 0
    });

    this.load.spritesheet("spr_jackson", withVersion(ASSETS.sprites.jackson), {
      frameWidth: 128,
      frameHeight: 128,
      margin: 0,
      spacing: 0
    });
  }

  create() {
    this.createFallbackTextures();
    this.scene.start("TitleScene");
  }

  createFallbackTextures() {
    const makeRect = (key, w, h, color, label) => {
      if (this.textures.exists(key)) return;

      const g = this.add.graphics();
      g.fillStyle(color, 1);
      g.fillRoundedRect(0, 0, w, h, 12);
      g.lineStyle(4, 0xffffff, 1);
      g.strokeRoundedRect(0, 0, w, h, 12);
      g.generateTexture(key, w, h);
      g.destroy();
    };

    makeRect("title_screen", WIDTH, HEIGHT, 0x120014, "TITLE");
    makeRect("character_select_bg", WIDTH, HEIGHT, 0x101020, "CHARACTER");
    makeRect("level_select_bg", WIDTH, HEIGHT, 0x101020, "LEVEL");
  }
}

class TitleScene extends Phaser.Scene {
  constructor() {
    super("TitleScene");
  }

  create() {
    this.add.image(WIDTH / 2, HEIGHT / 2, "title_screen")
      .setDisplaySize(WIDTH, HEIGHT);

    this.add.rectangle(WIDTH / 2, HEIGHT / 2, WIDTH, HEIGHT, 0x000000, 0.35);

    this.add.text(WIDTH / 2, 145, "MOTEL PHEROMONES", {
      fontFamily: "Arial Black",
      fontSize: "48px",
      color: "#ffffff",
      stroke: "#000000",
      strokeThickness: 8
    }).setOrigin(0.5);

    this.add.text(WIDTH / 2, 205, "A beat-em-up brawler by Rocker Boys", {
      fontFamily: "Arial",
      fontSize: "22px",
      color: "#ffdd77",
      stroke: "#000000",
      strokeThickness: 4
    }).setOrigin(0.5);

    this.add.text(WIDTH / 2, 240, "2026", {
      fontFamily: "Arial",
      fontSize: "20px",
      color: "#ffffff"
    }).setOrigin(0.5);

    const startText = this.add.text(WIDTH / 2, 380, "TAP / CLICK TO START", {
      fontFamily: "Arial Black",
      fontSize: "28px",
      color: "#ffffff",
      backgroundColor: "#000000",
      padding: {
        x: 18,
        y: 10
      }
    }).setOrigin(0.5);

    this.tweens.add({
      targets: startText,
      alpha: 0.35,
      duration: 700,
      yoyo: true,
      repeat: -1
    });

    this.input.once("pointerdown", () => {
      this.scene.start("CharacterSelectScene");
    });

    this.input.keyboard.once("keydown-ENTER", () => {
      this.scene.start("CharacterSelectScene");
    });
  }
}

class CharacterSelectScene extends Phaser.Scene {
  constructor() {
    super("CharacterSelectScene");
  }

  create() {
    this.selectedIndex = 0;

    this.add.image(WIDTH / 2, HEIGHT / 2, "character_select_bg")
      .setDisplaySize(WIDTH, HEIGHT);

    this.add.rectangle(WIDTH / 2, HEIGHT / 2, WIDTH, HEIGHT, 0x000000, 0.45);

    this.add.text(WIDTH / 2, 42, "CHARACTER SELECT", {
      fontFamily: "Arial Black",
      fontSize: "34px",
      color: "#ffffff",
      stroke: "#000000",
      strokeThickness: 6
    }).setOrigin(0.5);

    this.nameText = this.add.text(WIDTH / 2, 455, "", {
      fontFamily: "Arial Black",
      fontSize: "30px",
      color: "#ffffff",
      stroke: "#000000",
      strokeThickness: 6
    }).setOrigin(0.5);

    this.infoText = this.add.text(WIDTH / 2, 492, "", {
      fontFamily: "Arial",
      fontSize: "18px",
      color: "#ffdd77"
    }).setOrigin(0.5);

    this.cardGroup = this.add.group();

    this.leftArrow = this.add.text(90, HEIGHT / 2, "◀", {
      fontFamily: "Arial Black",
      fontSize: "54px",
      color: "#ffffff"
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    this.rightArrow = this.add.text(WIDTH - 90, HEIGHT / 2, "▶", {
      fontFamily: "Arial Black",
      fontSize: "54px",
      color: "#ffffff"
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    this.leftArrow.on("pointerdown", () => this.move(-1));
    this.rightArrow.on("pointerdown", () => this.move(1));

    this.input.keyboard.on("keydown-LEFT", () => this.move(-1));
    this.input.keyboard.on("keydown-RIGHT", () => this.move(1));
    this.input.keyboard.on("keydown-ENTER", () => this.confirm());

    this.renderCards();
  }

  move(dir) {
    this.selectedIndex += dir;

    if (this.selectedIndex < 0) {
      this.selectedIndex = ROSTER.length - 1;
    }

    if (this.selectedIndex >= ROSTER.length) {
      this.selectedIndex = 0;
    }

    this.renderCards();
  }

  confirm() {
    const character = ROSTER[this.selectedIndex];

    if (character.locked) {
      this.cameras.main.shake(120, 0.004);
      return;
    }

    SELECTED_CHARACTER = character;
    this.scene.start("LevelSelectScene");
  }

  renderCards() {
    this.cardGroup.clear(true, true);

    const selected = ROSTER[this.selectedIndex];
    const centerX = WIDTH / 2;
    const centerY = 260;

    for (let offset = -2; offset <= 2; offset++) {
      const index = Phaser.Math.Wrap(this.selectedIndex + offset, 0, ROSTER.length);
      const character = ROSTER[index];

      const x = centerX + offset * 150;
      const scale = offset === 0 ? 0.88 : 0.58;
      const alpha = offset === 0 ? 1 : 0.55;

      let card;

      if (this.textures.exists(character.card)) {
        card = this.add.image(x, centerY, character.card);
        card.setDisplaySize(120 * scale * 1.8, 170 * scale * 1.8);
      } else {
        card = this.add.rectangle(x, centerY, 130 * scale, 180 * scale, 0x222222, 1);
      }

      card.setAlpha(alpha);
      card.setInteractive({ useHandCursor: true });
      card.on("pointerdown", () => {
        this.selectedIndex = index;
        this.renderCards();

        if (offset === 0) {
          this.confirm();
        }
      });

      this.cardGroup.add(card);

      if (character.locked) {
        const lock = this.add.text(x, centerY, "LOCKED", {
          fontFamily: "Arial Black",
          fontSize: `${22 * scale}px`,
          color: "#ff4444",
          stroke: "#000000",
          strokeThickness: 5
        }).setOrigin(0.5);

        this.cardGroup.add(lock);
      }

      if (offset === 0) {
        const outline = this.add.rectangle(x, centerY, 230, 325);
        outline.setStrokeStyle(5, 0xffdd55, 1);
        this.cardGroup.add(outline);
      }
    }

    this.nameText.setText(selected.name);
    this.infoText.setText(selected.locked ? "Locked character — sprite not ready" : selected.faction);
  }
}

      fontFamily: "Arial Black",
      fontSize: "34px",
      color: "#ffffff",
      stroke: "#000000",
      strokeThickness: 6
    }).setOrigin(0.5);

    this.levelName = this.add.text(WIDTH / 2, 235, "", {
      fontFamily: "Arial Black",
      fontSize: "40px",
      color: "#ffffff",
      stroke: "#000000",
      strokeThickness: 7
    }).setOrigin(0.5);

    this.helpText = this.add.text(WIDTH / 2, 460, "Tap level / press Enter to fight", {
      fontFamily: "Arial",
      fontSize: "20px",
      color: "#ffdd77"
    }).setOrigin(0.5);

    this.leftArrow = this.add.text(120, HEIGHT / 2, "◀", {
      fontFamily: "Arial Black",
      fontSize: "54px",
      color: "#ffffff"
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    this.rightArrow = this.add.text(WIDTH - 120, HEIGHT / 2, "▶", {
      fontFamily: "Arial Black",
      fontSize: "54px",
      color: "#ffffff"
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    this.levelButton = this.add.rectangle(WIDTH / 2, HEIGHT / 2, 520, 180, 0x111122, 0.9)
      .setStrokeStyle(4, 0xffdd55, 1)
      .setInteractive({ useHandCursor: true });

    this.leftArrow.on("pointerdown", () => this.move(-1));
    this.rightArrow.on("pointerdown", () => this.move(1));
    this.levelButton.on("pointerdown", () => this.confirm());

    this.input.keyboard.on("keydown-LEFT", () => this.move(-1));
    this.input.keyboard.on("keydown-RIGHT", () => this.move(1));
    this.input.keyboard.on("keydown-ENTER", () => this.confirm());

    this.renderLevel();
  }

  move(dir) {
    this.selectedIndex += dir;

    if (this.selectedIndex < 0) {
      this.selectedIndex = LEVELS.length - 1;
    }

    if (this.selectedIndex >= LEVELS.length) {
      this.selectedIndex = 0;
    }

    this.renderLevel();
  }

  renderLevel() {
    const level = LEVELS[this.selectedIndex];
    this.levelName.setText(level.name);
  }

  confirm() {
    const level = LEVELS[this.selectedIndex];

    if (level.locked) {
      this.cameras.main.shake(120, 0.004);
      return;
    }

    SELECTED_LEVEL = level;
    this.scene.start("GameScene");
  }
}

class GameScene extends Phaser.Scene {
  constructor() {
    super("GameScene");
  }

  create() {
    this.createWorld();
    this.createPlayer();
    this.createEnemies();
    this.createHUD();
    this.createControls();
    this.createKeyboard();
    this.createAnimations();

    this.input.keyboard.on("keydown-ESC", () => {
      this.scene.start("CharacterSelectScene");
    });
  }

  createWorld() {
    this.add.rectangle(WIDTH / 2, HEIGHT / 2, WIDTH, HEIGHT, 0x15151d, 1);

    this.add.text(WIDTH / 2, 28, SELECTED_LEVEL.name, {
      fontFamily: "Arial Black",
      fontSize: "22px",
      color: "#ffffff",
      stroke: "#000000",
      strokeThickness: 4
    }).setOrigin(0.5);

    this.groundY = 394;

    this.platforms = this.physics.add.staticGroup();

    const bottom = this.add.rectangle(WIDTH / 2, 430, 920, 42, 0x333333, 1);
    const mid = this.add.rectangle(WIDTH / 2, 310, 580, 34, 0x452850, 1);
    const top = this.add.rectangle(WIDTH / 2, 196, 390, 30, 0x263f52, 1);

    this.physics.add.existing(bottom, true);
    this.physics.add.existing(mid, true);
    this.physics.add.existing(top, true);

    this.platforms.add(bottom);
    this.platforms.add(mid);
    this.platforms.add(top);

    this.add.rectangle(WIDTH / 2, 374, 920, 4, 0xffffff, 0.25);
    this.add.rectangle(WIDTH / 2, 292, 580, 4, 0xffffff, 0.25);
    this.add.rectangle(WIDTH / 2, 180, 390, 4, 0xffffff, 0.25);

    this.ladders = [
      {
        x: 305,
        y1: 196,
        y2: 310,
        width: 46
      },
      {
        x: 655,
        y1: 310,
        y2: 430,
        width: 46
      }
    ];

    for (const ladder of this.ladders) {
      this.add.rectangle(
        ladder.x,
        (ladder.y1 + ladder.y2) / 2,
        ladder.width,
        Math.abs(ladder.y2 - ladder.y1),
        0x8b5a2b,
        0.65
      );
    }

    this.walkBounds = {
      minX: 35,
      maxX: WIDTH - 35,
      minY: 180,
      maxY: 430
    };
  }

  createPlayer() {
    const spriteKey = SELECTED_CHARACTER.sprite || "spr_jt";

    this.player = this.physics.add.sprite(180, this.groundY, spriteKey, 0);
    this.player.setOrigin(0.5, 1);
    this.player.setScale(2);
    this.player.setCollideWorldBounds(true);
    this.player.body.setSize(38, 72);
    this.player.body.setOffset(45, 48);
    this.player.speed = 175;
    this.player.isClimbing = false;
    this.player.isAttacking = false;
    this.player.currentCharacterId = SELECTED_CHARACTER.id;

    this.physics.add.collider(this.player, this.platforms);

    this.playerName = SELECTED_CHARACTER.name;
  }

  createEnemies() {
    this.enemies = this.physics.add.group();

    for (let i = 0; i < 3; i++) {
      const enemy = this.physics.add.sprite(620 + i * 65, this.groundY, "spr_jt", 0);
      enemy.setOrigin(0.5, 1);
      enemy.setScale(1.7);
      enemy.setTint(0xaa4444);
      enemy.body.setSize(38, 72);
      enemy.body.setOffset(45, 48);
      enemy.hp = 30;
      enemy.nextLineTime = 0;
      this.enemies.add(enemy);
    }

    this.physics.add.collider(this.enemies, this.platforms);
    this.physics.add.collider(this.player, this.enemies);
    this.physics.add.collider(this.enemies, this.enemies);
  }

  createHUD() {
    this.add.rectangle(112, 34, 190, 45, 0x000000, 0.65)
      .setStrokeStyle(2, 0xffffff, 0.7);

    this.add.text(28, 19, this.playerName, {
      fontFamily: "Arial Black",
      fontSize: "18px",
      color: "#ffffff"
    });

    this.hpBack = this.add.rectangle(215, 25, 190, 14, 0x330000, 1).setOrigin(0, 0.5);
    this.hpFill = this.add.rectangle(215, 25, 190, 14, 0x00cc44, 1).setOrigin(0, 0.5);

    this.grooveBack = this.add.rectangle(215, 48, 190, 10, 0x222222, 1).setOrigin(0, 0.5);
    this.grooveFill = this.add.rectangle(215, 48, 60, 10, 0x44aaff, 1).setOrigin(0, 0.5);

    this.comboDot1 = this.add.circle(430, 36, 8, 0x333333, 1)
      .setStrokeStyle(2, 0xffffff, 0.6);

    this.comboDot2 = this.add.circle(455, 36, 8, 0x333333, 1)
      .setStrokeStyle(2, 0xffffff, 0.6);
  }

  createKeyboard() {
    this.cursors = this.input.keyboard.createCursorKeys();

    this.keys = this.input.keyboard.addKeys({
      W: Phaser.Input.Keyboard.KeyCodes.W,
      A: Phaser.Input.Keyboard.KeyCodes.A,
      S: Phaser.Input.Keyboard.KeyCodes.S,
      D: Phaser.Input.Keyboard.KeyCodes.D,

      light: Phaser.Input.Keyboard.KeyCodes.Y,
      heavy: Phaser.Input.Keyboard.KeyCodes.X,
      kick: Phaser.Input.Keyboard.KeyCodes.A,
      jump: Phaser.Input.Keyboard.KeyCodes.B,
      interact: Phaser.Input.Keyboard.KeyCodes.E
    });
  }

  createControls() {
    this.joyVector = new Phaser.Math.Vector2(0, 0);
    this.buttons = {};

    this.stickBase = this.add.circle(96, HEIGHT - 88, 58, 0xffffff, 0.14)
      .setStrokeStyle(3, 0xffffff, 0.55)
      .setScrollFactor(0);

    this.stickKnob = this.add.circle(96, HEIGHT - 88, 25, 0xffffff, 0.32)
      .setStrokeFactor?.(0);

    this.stickKnob.setStrokeStyle(2, 0xffffff, 0.65);
    this.stickKnob.setScrollFactor(0);

    this.stickBase.setInteractive(
      new Phaser.Geom.Circle(96, HEIGHT - 88, 80),
      Phaser.Geom.Circle.Contains
    );

    this.stickPointerId = null;

    this.input.on("pointerdown", pointer => {
      const dist = Phaser.Math.Distance.Between(pointer.x, pointer.y, 96, HEIGHT - 88);

      if (dist <= 100 && this.stickPointerId === null) {
        this.stickPointerId = pointer.id;
        this.updateStick(pointer);
      }
    });

    this.input.on("pointermove", pointer => {
      if (pointer.id === this.stickPointerId) {
        this.updateStick(pointer);
      }
    });

    this.input.on("pointerup", pointer => {
      if (pointer.id === this.stickPointerId) {
        this.stickPointerId = null;
        this.joyVector.set(0, 0);
        this.stickKnob.setPosition(96, HEIGHT - 88);
      }
    });

    this.makeButton("Y", WIDTH - 154, HEIGHT - 118, "light");
    this.makeButton("X", WIDTH - 214, HEIGHT - 88, "heavy");
    this.makeButton("B", WIDTH - 94, HEIGHT - 88, "jump");
    this.makeButton("A", WIDTH - 154, HEIGHT - 58, "kick");

    this.makeButton("SP2", WIDTH - 82, HEIGHT - 172, "special2", 42);

    this.menuButton = this.add.text(WIDTH / 2, HEIGHT - 42, "MENU", {
      fontFamily: "Arial Black",
      fontSize: "16px",
      color: "#ffffff",
      backgroundColor: "#000000",
      padding: {
        x: 12,
        y: 8
      }
    }).setOrigin(0.5).setInteractive({ useHandCursor: true });

    this.menuButton.on("pointerdown", () => {
      this.scene.start("CharacterSelectScene");
    });
  }

  updateStick(pointer) {
    const baseX = 96;
    const baseY = HEIGHT - 88;
    const maxDist = 48;

    let dx = pointer.x - baseX;
    let dy = pointer.y - baseY;

    const len = Math.hypot(dx, dy);

    if (len > maxDist) {
      dx = (dx / len) * maxDist;
      dy = (dy / len) * maxDist;
    }

    this.stickKnob.setPosition(baseX + dx, baseY + dy);

    this.joyVector.set(dx / maxDist, dy / maxDist);

    if (Math.abs(this.joyVector.x) < 0.15) this.joyVector.x = 0;
    if (Math.abs(this.joyVector.y) < 0.15) this.joyVector.y = 0;
  }

  makeButton(label, x, y, action, radius = 34) {
    const circle = this.add.circle(x, y, radius, 0xffffff, 0.18)
      .setStrokeStyle(3, 0xffffff, 0.65)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor: true });

    const text = this.add.text(x, y, label, {
      fontFamily: "Arial Black",
      fontSize: label.length > 1 ? "14px" : "21px",
      color: "#ffffff"
    }).setOrigin(0.5).setScrollFactor(0);

    this.buttons[action] = {
      down: false,
      circle,
      text
    };

    circle.on("pointerdown", () => {
      this.buttons[action].down = true;
      circle.setAlpha(0.75);
    });

    circle.on("pointerup", () => {
      this.buttons[action].down = false;
      circle.setAlpha(1);
    });

    circle.on("pointerout", () => {
      this.buttons[action].down = false;
      circle.setAlpha(1);
    });
  }

  createAnimations() {
    const id = SELECTED_CHARACTER.id;
    const key = SELECTED_CHARACTER.sprite || "spr_jt";

    this.makeAnim(`${id}_idle`, key, 0, 3, 6, -1);

    /*
      WALK FIX:
      Your earlier map said walk is 16-21.
      This is the important part that prevents sliding.
    */
    this.makeAnim(`${id}_walk`, key, 16, 21, 10, -1);

    this.makeAnim(`${id}_jump`, key, 33, 35, 8, 0);
    this.makeAnim(`${id}_crouch`, key, 48, 50, 8, -1);
    this.makeAnim(`${id}_dash`, key, 64, 67, 12, 0);
    this.makeAnim(`${id}_climb`, key, 81, 84, 8, -1);

    this.makeAnim(`${id}_light`, key, 96, 99, 12, 0);
    this.makeAnim(`${id}_heavy`, key, 112, 115, 10, 0);
    this.makeAnim(`${id}_hurt`, key, 128, 131, 8, 0);

    this.playerAnimKeys = {
      idle: `${id}_idle`,
      walk: `${id}_walk`,
      jump: `${id}_jump`,
      crouch: `${id}_crouch`,
      climb: `${id}_climb`,
      light: `${id}_light`,
      heavy: `${id}_heavy`,
      hurt: `${id}_hurt`
    };

    this.playPlayerAnim(this.playerAnimKeys.idle);
  }

  makeAnim(animKey, textureKey, start, end, frameRate, repeat) {
    if (this.anims.exists(animKey)) return;

    const texture = this.textures.get(textureKey);
    const totalFrames = texture ? texture.frameTotal : 0;

    let safeStart = start;
    let safeEnd = end;

    if (!texture || totalFrames <= 1 || start >= totalFrames) {
      safeStart = 0;
      safeEnd = 0;
    } else if (end >= totalFrames) {
      safeEnd = totalFrames - 1;
    }

    this.anims.create({
      key: animKey,
      frames: this.anims.generateFrameNumbers(textureKey, {
        start: safeStart,
        end: safeEnd
      }),
      frameRate,
      repeat
    });
  }

  playPlayerAnim(key) {
    if (!this.player || !this.player.anims || !key) return;

    const current = this.player.anims.currentAnim;

    if (!current || current.key !== key) {
      this.player.anims.play(key, true);
    }
  }

  getInputVector() {
    let moveX = 0;
    let moveY = 0;

    if (this.cursors.left.isDown || this.keys.A.isDown) {
      moveX = -1;
    } else if (this.cursors.right.isDown || this.keys.D.isDown) {
      moveX = 1;
    }

    if (this.cursors.up.isDown || this.keys.W.isDown) {
      moveY = -1;
    } else if (this.cursors.down.isDown || this.keys.S.isDown) {
      moveY = 1;
    }

    if (this.joyVector) {
      if (Math.abs(this.joyVector.x) > 0.15) {
        moveX = this.joyVector.x;
      }

      if (Math.abs(this.joyVector.y) > 0.15) {
        moveY = this.joyVector.y;
      }
    }

    return {
      x: moveX,
      y: moveY
    };
  }

  isNearLadder() {
    for (const ladder of this.ladders) {
      const insideX = Math.abs(this.player.x - ladder.x) <= ladder.width;
      const insideY = this.player.y >= ladder.y1 - 18 && this.player.y <= ladder.y2 + 18;

      if (insideX && insideY) {
        return ladder;
      }
    }

    return null;
  }

  update() {
    if (!this.player || !this.player.body) return;

    const input = this.getInputVector();
    const ladder = this.isNearLadder();

    const wantsClimb = ladder && Math.abs(input.y) > 0.2;

    if (wantsClimb) {
      this.player.isClimbing = true;
      this.player.x = Phaser.Math.Linear(this.player.x, ladder.x, 0.35);
      this.player.body.allowGravity = false;
      this.player.setVelocity(0, input.y * this.player.speed);
      this.player.y = Phaser.Math.Clamp(this.player.y, ladder.y1, ladder.y2);

      this.playPlayerAnim(this.playerAnimKeys.climb);
      return;
    }

    if (this.player.isClimbing) {
      this.player.isClimbing = false;
      this.player.body.allowGravity = true;
      this.player.setVelocity(0, 0);
    }

    let moveX = input.x;
    let moveY = input.y;

    const isMoving = Math.abs(moveX) > 0.1 || Math.abs(moveY) > 0.1;

    if (this.buttons.light?.down || Phaser.Input.Keyboard.JustDown(this.keys.light)) {
      this.attack("light");
      return;
    }

    if (this.buttons.heavy?.down || Phaser.Input.Keyboard.JustDown(this.keys.heavy)) {
      this.attack("heavy");
      return;
    }

    if (isMoving) {
      const len = Math.hypot(moveX, moveY) || 1;

      this.player.setVelocity(
        (moveX / len) * this.player.speed,
        (moveY / len) * this.player.speed
      );

      if (moveX < -0.1) {
        this.player.setFlipX(true);
      }

      if (moveX > 0.1) {
        this.player.setFlipX(false);
      }

      /*
        WALK FIX:
        Walk is played only when moving.
        Idle is NOT allowed to overwrite it below.
      */
      this.playPlayerAnim(this.playerAnimKeys.walk);
    } else {
      this.player.setVelocity(0, 0);

      /*
        WALK FIX:
        Idle only plays when stopped.
      */
      this.playPlayerAnim(this.playerAnimKeys.idle);
    }

    this.clampPlayer();
    this.updateEnemies();
  }

  attack(type) {
    this.player.setVelocity(0, 0);

    if (type === "light") {
      this.playPlayerAnim(this.playerAnimKeys.light);
    } else {
      this.playPlayerAnim(this.playerAnimKeys.heavy);
    }

    this.time.delayedCall(260, () => {
      if (!this.player) return;
      this.playPlayerAnim(this.playerAnimKeys.idle);
    });
  }

  clampPlayer() {
    this.player.x = Phaser.Math.Clamp(
      this.player.x,
      this.walkBounds.minX,
      this.walkBounds.maxX
    );

    this.player.y = Phaser.Math.Clamp(
      this.player.y,
      this.walkBounds.minY,
      this.walkBounds.maxY
    );
  }

  updateEnemies() {
    const now = this.time.now;

    this.enemies.children.iterate(enemy => {
      if (!enemy || !enemy.body) return;

      const dx = this.player.x - enemy.x;
      const dy = this.player.y - enemy.y;
      const dist = Math.hypot(dx, dy);

      if (dist > 42) {
        enemy.setVelocity(
          Phaser.Math.Clamp(dx, -1, 1) * 80,
          Phaser.Math.Clamp(dy, -1, 1) * 55
        );
      } else {
        enemy.setVelocity(0, 0);

        if (now > enemy.nextLineTime) {
          enemy.nextLineTime = now + Phaser.Math.Between(1200, 2800);
          this.enemyLine(enemy);
        }
      }
    });
  }

  enemyLine(enemy) {
    const lines = [
      "Tons!",
      "Get him!",
      "You done!",
      "Come here!",
      "Watch it!"
    ];

    const text = this.add.text(enemy.x, enemy.y - 95, Phaser.Utils.Array.GetRandom(lines), {
      fontFamily: "Arial Black",
      fontSize: "15px",
      color: "#ffffff",
      stroke: "#000000",
      strokeThickness: 4
    }).setOrigin(0.5);

    this.tweens.add({
      targets: text,
      y: text.y - 26,
      alpha: 0,
      duration: 850,
      onComplete: () => text.destroy()
    });
  }
}

const config = {
  type: Phaser.AUTO,
  parent: "game",
  width: WIDTH,
  height: HEIGHT,
  backgroundColor: "#000000",
  pixelArt: true,
  roundPixels: true,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: WIDTH,
    height: HEIGHT
  },
  physics: {
    default: "arcade",
    arcade: {
      gravity: {
        y: 0
      },
      debug: false
    }
  },
  scene: [
    BootScene,
    TitleScene,
    CharacterSelectScene,
    LevelSelectScene,
    GameScene
  ]
};

window.addEventListener("load", () => {
  window.game = new Phaser.Game(config);
});
</script>
</body>
</html>
