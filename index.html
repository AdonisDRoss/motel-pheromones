<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  background:#000;
  width:100vw;
  height:100vh;
  overflow:hidden;
  touch-action:none;
}
canvas{
  width:100vw!important;
  height:100vh!important;
  object-fit:contain;
  image-rendering:pixelated;
}
</style>
</head>

<body>
<script>

const VERSION = 505;
const FRAME = 128;
const JT_BASE = "assets/sprites/player/jt";

function textureExists(scene,key){return scene.textures.exists(key);}
function animExists(scene,key){return scene.anims.exists(key);}
function safePlay(sprite,key){ if(animExists(sprite.scene,key)) sprite.play(key,true); }

// =======================
// LOAD
// =======================

function loadAssets(scene){

  scene.load.image("title","assets/levels/title-screen.png");
  scene.load.image("charSelect","assets/levels/character-select.png");
  scene.load.image("levelSelect","assets/levels/level-select.png");

  scene.load.image("outdoor","assets/levels/outdoor.png");

  scene.load.image("jtSingle","assets/player/jt/jt-single.png");

  scene.load.spritesheet("jt_movement", JT_BASE+"/movement.png", {
    frameWidth:128, frameHeight:128
  });

  scene.load.json("movement_json", JT_BASE+"/data/movement.json");

}

// =======================
// ANIMS
// =======================

function createMovementAnims(scene){
  const data = scene.cache.json.get("movement_json");
  if(!data) return;

  data.animations.forEach(anim=>{
    const key = "jt_"+anim.key;
    if(animExists(scene,key)) return;

    scene.anims.create({
      key:key,
      frames:scene.anims.generateFrameNumbers("jt_movement",{start:anim.start,end:anim.end}),
      frameRate:anim.frameRate,
      repeat:anim.repeat
    });
  });
}

// =======================
// BOOT
// =======================

class Boot extends Phaser.Scene{
  constructor(){super("Boot");}

  preload(){
    loadAssets(this);
  }

  create(){
    createMovementAnims(this);
    this.scene.start("Game");
  }
}

// =======================
// GAME
// =======================

class Game extends Phaser.Scene{
  constructor(){super("Game");}

  create(){

    this.add.image(480,270,"outdoor").setDisplaySize(960,540);

    this.player = this.physics.add.sprite(480,400,
      textureExists(this,"jt_movement") ? "jt_movement" : "jtSingle"
    );

    this.player.setOrigin(0.5,1);
    this.player.body.setAllowGravity(false);

    // INPUT SYSTEM FIX
    this.stickX=0;
    this.stickY=0;
    this.keyX=0;
    this.keyY=0;

    this.lastDir="down";

    this.makeKeyboard();
    this.makeMobile();

  }

  makeKeyboard(){
    this.keys=this.input.keyboard.addKeys({
      left:"LEFT", right:"RIGHT",
      up:"UP", down:"DOWN",
      a:"A", d:"D", w:"W", s:"S"
    });
  }

  makeMobile(){

    const baseX=120;
    const baseY=420;
    const r=60;

    const knob=this.add.circle(baseX,baseY,30,0xffffff,0.4).setDepth(1000);

    let dragging=false;

    this.input.on("pointerdown",(p)=>{
      if(Phaser.Math.Distance.Between(p.x,p.y,baseX,baseY)<80){
        dragging=true;
      }
    });

    this.input.on("pointermove",(p)=>{
      if(!dragging) return;

      let dx=p.x-baseX;
      let dy=p.y-baseY;

      const d=Math.sqrt(dx*dx+dy*dy);

      if(d>r){
        dx=dx/d*r;
        dy=dy/d*r;
      }

      knob.x=baseX+dx;
      knob.y=baseY+dy;

      this.stickX = dx/r;
      this.stickY = dy/r;
    });

    this.input.on("pointerup",()=>{
      dragging=false;
      knob.x=baseX;
      knob.y=baseY;
      this.stickX=0;
      this.stickY=0;
    });
  }

  update(){

    // RESET KEY INPUT
    this.keyX=0;
    this.keyY=0;

    if(this.keys){
      if(this.keys.left.isDown || this.keys.a.isDown) this.keyX=-1;
      if(this.keys.right.isDown || this.keys.d.isDown) this.keyX=1;
      if(this.keys.up.isDown || this.keys.w.isDown) this.keyY=-1;
      if(this.keys.down.isDown || this.keys.s.isDown) this.keyY=1;
    }

    // MERGE INPUT (FIXED)
    const moveX = this.stickX !==0 ? this.stickX : this.keyX;
    const moveY = this.stickY !==0 ? this.stickY : this.keyY;

    this.player.setVelocity(moveX*200,0);

    // DIRECTION
    if(Math.abs(moveX)>0.1){
      this.lastDir="side";
      this.player.setFlipX(moveX<0);
    } else if(moveY< -0.1){
      this.lastDir="up";
    } else if(moveY>0.1){
      this.lastDir="down";
    }

    // ANIMATION
    if(!textureExists(this,"jt_movement")) return;

    if(Math.abs(moveX)<0.1 && Math.abs(moveY)<0.1){
      safePlay(this.player,"jt_idle_"+this.lastDir);
    }else{
      safePlay(this.player,"jt_walk_"+this.lastDir);
    }

  }
}

// =======================

new Phaser.Game({
  type:Phaser.AUTO,
  width:960,
  height:540,
  pixelArt:true,
  physics:{ default:"arcade" },
  scene:[Boot,Game]
});

</script>
</body>
</html>
