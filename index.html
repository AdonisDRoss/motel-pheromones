<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Motel Pheromones Brawler</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  <style>
    body { margin:0; background:#000; overflow:hidden; }
    canvas { display:block; margin:auto; image-rendering: pixelated; }
  </style>
</head>
<body>

<script>
const GAME_W = 960;
const GAME_H = 540;

const ASSETS = {
  title: "levels/title-screen.png",
  levelOutdoor: "levels/outdoor.png",

  jtMovement: "sprites/jt/movement.png",
  jtActions: "sprites/jt/actions.png",

  enemyCorpo: "sprites/enemies/corpo_sellout.png"
};

let SELECTED_CHARACTER = "JT";
let SELECTED_LEVEL = "OUTDOOR";

class TitleScene extends Phaser.Scene {
  constructor() { super("TitleScene"); }

  preload() {
    this.load.image("title", ASSETS.title);
  }

  create() {
    this.add.image(GAME_W/2, GAME_H/2, "title").setDisplaySize(GAME_W, GAME_H);

    this.add.text(GAME_W/2, 420, "TAP / PRESS ENTER", {
      fontFamily: "monospace",
      fontSize: "28px",
      color: "#ffffff"
    }).setOrigin(0.5);

    this.input.keyboard.once("keydown-ENTER", () => {
      this.scene.start("CharacterSelectScene");
    });

    this.input.once("pointerdown", () => {
      this.scene.start("CharacterSelectScene");
    });
  }
}

class CharacterSelectScene extends Phaser.Scene {
  constructor() { super("CharacterSelectScene"); }

  create() {
    this.cameras.main.setBackgroundColor("#050505");

    this.add.text(GAME_W/2, 60, "CHARACTER SELECT", {
      fontFamily: "monospace",
      fontSize: "36px",
      color: "#ff4fd8"
    }).setOrigin(0.5);

    const jtBox = this.add.rectangle(GAME_W/2, 220, 240, 120, 0x111111, 1);
    jtBox.setStrokeStyle(3, 0x00eaff);

    this.add.text(GAME_W/2, 210, "JT", {
      fontFamily: "monospace",
      fontSize: "32px",
      color: "#ffffff"
    }).setOrigin(0.5);

    this.add.text(GAME_W/2, 260, "Rhythm of the Night", {
      fontFamily: "monospace",
      fontSize: "16px",
      color: "#00eaff"
    }).setOrigin(0.5);

    this.add.text(GAME_W/2, 420, "PRESS ENTER / TAP TO SELECT", {
      fontFamily: "monospace",
      fontSize: "22px",
      color: "#ffffff"
    }).setOrigin(0.5);

    this.input.keyboard.once("keydown-ENTER", () => {
      SELECTED_CHARACTER = "JT";
      this.scene.start("LevelSelectScene");
    });

    this.input.once("pointerdown", () => {
      SELECTED_CHARACTER = "JT";
      this.scene.start("LevelSelectScene");
    });
  }
}

class LevelSelectScene extends Phaser.Scene {
  constructor() { super("LevelSelectScene"); }

  create() {
    this.cameras.main.setBackgroundColor("#090018");

    this.add.text(GAME_W/2, 60, "LEVEL SELECT", {
      fontFamily: "monospace",
      fontSize: "36px",
      color: "#00eaff"
    }).setOrigin(0.5);

    const levelBox = this.add.rectangle(GAME_W/2, 230, 320, 140, 0x111111, 1);
    levelBox.setStrokeStyle(3, 0xff4fd8);

    this.add.text(GAME_W/2, 220, "OUTDOOR", {
      fontFamily: "monospace",
      fontSize: "32px",
      color: "#ffffff"
    }).setOrigin(0.5);

    this.add.text(GAME_W/2, 265, "Lefty's Rooftop / Street", {
      fontFamily: "monospace",
      fontSize: "16px",
      color: "#ffff55"
    }).setOrigin(0.5);

    this.add.text(GAME_W/2, 420, "PRESS ENTER / TAP TO START", {
      fontFamily: "monospace",
      fontSize: "22px",
      color: "#ffffff"
    }).setOrigin(0.5);

    this.input.keyboard.once("keydown-ENTER", () => {
      SELECTED_LEVEL = "OUTDOOR";
      this.scene.start("GameScene");
    });

    this.input.once("pointerdown", () => {
      SELECTED_LEVEL = "OUTDOOR";
      this.scene.start("GameScene");
    });
  }
}

class GameScene extends Phaser.Scene {
  constructor() {
    super("GameScene");
  }

  preload() {
    this.load.image("level_outdoor", ASSETS.levelOutdoor);

    this.load.spritesheet("jt_movement", ASSETS.jtMovement, {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("jt_actions", ASSETS.jtActions, {
      frameWidth: 128,
      frameHeight: 128
    });

    this.load.spritesheet("enemy_corpo", ASSETS.enemyCorpo, {
      frameWidth: 128,
      frameHeight: 128
    });
  }

  create() {
    this.started = true;
    this.busy = false;
    this.combo = 0;
    this.rhythm = 0;

    this.add.image(GAME_W/2, GAME_H/2, "level_outdoor").setDisplaySize(GAME_W, GAME_H);

    this.createAnimations();
    this.createPlayer();
    this.createEnemies();
    this.createControls();
    this.createHUD();
    this.createCollisions();
    this.createTouchControls();
  }

  createAnimations() {
    this.anims.create({
      key: "jt_idle",
      frames: this.anims.generateFrameNumbers("jt_movement", { start: 0, end: 7 }),
      frameRate: 8,
      repeat: -1
    });

    this.anims.create({
      key: "jt_walk",
      frames: this.anims.generateFrameNumbers("jt_movement", { start: 16, end: 23 }),
      frameRate: 10,
      repeat: -1
    });

    this.anims.create({
      key: "jt_punch",
      frames: this.anims.generateFrameNumbers("jt_actions", { start: 32, end: 39 }),
      frameRate: 14,
      repeat: 0
    });

    this.anims.create({
      key: "jt_kick",
      frames: this.anims.generateFrameNumbers("jt_actions", { start: 48, end: 55 }),
      frameRate: 12,
      repeat: 0
    });

    this.anims.create({
      key: "enemy_idle",
      frames: this.anims.generateFrameNumbers("enemy_corpo", { start: 0, end: 15 }),
      frameRate: 8,
      repeat: -1
    });

    this.anims.create({
      key: "enemy_walk",
      frames: this.anims.generateFrameNumbers("enemy_corpo", { start: 16, end: 31 }),
      frameRate: 10,
      repeat: -1
    });

    this.anims.create({
      key: "enemy_punch",
      frames: this.anims.generateFrameNumbers("enemy_corpo", { start: 32, end: 47 }),
      frameRate: 12,
      repeat: 0
    });

    this.anims.create({
      key: "enemy_hurt",
      frames: this.anims.generateFrameNumbers("enemy_corpo", { start: 64, end: 79 }),
      frameRate: 12,
      repeat: 0
    });

    this.anims.create({
      key: "enemy_ko",
      frames: this.anims.generateFrameNumbers("enemy_corpo", { start: 80, end: 95 }),
      frameRate: 8,
      repeat: 0
    });
  }

  createPlayer() {
    this.player = this.physics.add.sprite(480, 290, "jt_movement", 0);
    this.player.setScale(1.35);
    this.player.setCollideWorldBounds(true);
    this.player.play("jt_idle");

    this.player.hp = 100;
    this.player.facing = 1;
    this.player.isAttacking = false;

    // IMPORTANT: smaller body, not full 128x128 sprite
    this.player.body.setSize(40, 44);
    this.player.body.setOffset(44, 82);

    this.playerAttackHitbox = this.add.rectangle(0, 0, 56, 34, 0xff0000, 0);
    this.physics.add.existing(this.playerAttackHitbox);
    this.playerAttackHitbox.body.enable = false;
  }

  createEnemies() {
    this.enemies = this.physics.add.group();

    this.spawnEnemy(300, 380, "DIEGO", "CORPO");
    this.spawnEnemy(720, 300, "LENNY", "GOON");
    this.spawnEnemy(420, 245, "BUZZ", "PUNK");
  }

  spawnEnemy(x, y, name, type) {
    const enemy = this.physics.add.sprite(x, y, "enemy_corpo", 0);
    enemy.setScale(1.15);
    enemy.setCollideWorldBounds(true);
    enemy.play("enemy_idle");

    enemy.nameLabel = name;
    enemy.typeLabel = type;
    enemy.hp = 60;
    enemy.speed = 55;
    enemy.dead = false;
    enemy.attackCooldown = 0;

    // IMPORTANT: smaller body to stop bad collision
    enemy.body.setSize(38, 42);
    enemy.body.setOffset(45, 82);

    this.enemies.add(enemy);

    const typeText = this.add.text(x, y - 80, type, {
      fontFamily: "monospace",
      fontSize: "12px",
      color: "#00eaff",
      backgroundColor: "#000000"
    }).setOrigin(0.5);

    const nameText = this.add.text(x, y - 62, name, {
      fontFamily: "monospace",
      fontSize: "12px",
      color: "#ffff55"
    }).setOrigin(0.5);

    const hpBar = this.add.rectangle(x, y - 45, 48, 8, 0x00ff55);

    enemy.ui = { typeText, nameText, hpBar };

    return enemy;
  }

  createControls() {
    this.keys = this.input.keyboard.addKeys({
      up: "W",
      down: "S",
      left: "A",
      right: "D",
      punch: "J",
      kick: "K",
      special: "L"
    });

    this.cursors = this.input.keyboard.createCursorKeys();

    this.input.keyboard.on("keydown-J", () => this.playerPunch());
    this.input.keyboard.on("keydown-K", () => this.playerKick());
  }

  createHUD() {
    this.hud = this.add.text(16, 16, "", {
      fontFamily: "monospace",
      fontSize: "16px",
      color: "#ffffff"
    });

    this.debugText = this.add.text(16, 118, "", {
      fontFamily: "monospace",
      fontSize: "14px",
      color: "#66ff66",
      backgroundColor: "#000000"
    });
  }

  createCollisions() {
    // Physical blocking
    this.physics.add.collider(this.player, this.enemies);
    this.physics.add.collider(this.enemies, this.enemies);

    // Attack detection only
    this.physics.add.overlap(
      this.playerAttackHitbox,
      this.enemies,
      this.onPlayerHitEnemy,
      null,
      this
    );
  }

  update() {
    this.updatePlayer();
    this.updateEnemies();
    this.updateEnemyUI();
    this.updateHUD();
  }

  updatePlayer() {
    if (!this.player || this.player.hp <= 0) return;

    let vx = 0;
    let vy = 0;

    const left = this.keys.left.isDown || this.cursors.left.isDown;
    const right = this.keys.right.isDown || this.cursors.right.isDown;
    const up = this.keys.up.isDown || this.cursors.up.isDown;
    const down = this.keys.down.isDown || this.cursors.down.isDown;

    if (left) {
      vx = -150;
      this.player.facing = -1;
      this.player.setFlipX(true);
    }

    if (right) {
      vx = 150;
      this.player.facing = 1;
      this.player.setFlipX(false);
    }

    if (up) vy = -110;
    if (down) vy = 110;

    this.player.setVelocity(vx, vy);

    if (!this.player.isAttacking) {
      if (vx !== 0 || vy !== 0) {
        this.player.play("jt_walk", true);
      } else {
        this.player.play("jt_idle", true);
      }
    }
  }

  updateEnemies() {
    this.enemies.forEach(enemy => {
      if (!enemy || enemy.dead) return;

      enemy.attackCooldown -= this.game.loop.delta;

      const dist = Phaser.Math.Distance.Between(
        enemy.x, enemy.y,
        this.player.x, this.player.y
      );

      if (dist > 55) {
        const angle = Phaser.Math.Angle.Between(enemy.x, enemy.y, this.player.x, this.player.y);

        enemy.setVelocity(
          Math.cos(angle) * enemy.speed,
          Math.sin(angle) * enemy.speed
        );

        enemy.play("enemy_walk", true);
        enemy.setFlipX(this.player.x < enemy.x);
      } else {
        enemy.setVelocity(0, 0);

        if (enemy.attackCooldown <= 0) {
          enemy.play("enemy_punch", true);
          enemy.attackCooldown = 1200;

          if (dist < 60) {
            this.player.hp -= 5;
          }
        }
      }
    });
  }

  updateEnemyUI() {
    this.enemies.forEach(enemy => {
      if (!enemy || !enemy.ui) return;

      enemy.ui.typeText.setPosition(enemy.x, enemy.y - 80);
      enemy.ui.nameText.setPosition(enemy.x, enemy.y - 62);
      enemy.ui.hpBar.setPosition(enemy.x, enemy.y - 45);

      enemy.ui.hpBar.width = Math.max(0, enemy.hp / 60 * 48);

      if (enemy.dead) {
        enemy.ui.hpBar.visible = false;
      }
    });
  }

  updateHUD() {
    this.hud.setText(
      `CHAR: ${SELECTED_CHARACTER}\n` +
      `LEVEL: ${SELECTED_LEVEL}\n` +
      `COMBO: ${this.combo} | RHYTHM: ${this.rhythm}\n` +
      `HP: ${this.player.hp}`
    );

    this.debugText.setText(
      `STARTED: ${this.started} | BUSY: ${this.busy} | ` +
      `PLAYER X:${Math.round(this.player.x)} Y:${Math.round(this.player.y)}`
    );
  }

  playerPunch() {
    if (this.player.isAttacking) return;

    this.player.isAttacking = true;
    this.player.setVelocity(0, 0);
    this.player.play("jt_punch", true);

    this.activatePlayerHitbox(70, 36, 120);

    this.player.once("animationcomplete", () => {
      this.player.isAttacking = false;
      this.player.play("jt_idle", true);
    });
  }

  playerKick() {
    if (this.player.isAttacking) return;

    this.player.isAttacking = true;
    this.player.setVelocity(0, 0);
    this.player.play("jt_kick", true);

    this.activatePlayerHitbox(82, 40, 140);

    this.player.once("animationcomplete", () => {
      this.player.isAttacking = false;
      this.player.play("jt_idle", true);
    });
  }

  activatePlayerHitbox(width, height, duration) {
    const facing = this.player.facing || 1;

    this.playerAttackHitbox.setSize(width, height);
    this.playerAttackHitbox.setPosition(
      this.player.x + facing * 48,
      this.player.y + 8
    );

    this.playerAttackHitbox.body.setSize(width, height);
    this.playerAttackHitbox.body.enable = true;

    this.time.delayedCall(duration, () => {
      this.playerAttackHitbox.body.enable = false;
    });
  }

  onPlayerHitEnemy(hitbox, enemy) {
    if (!enemy || enemy.dead) return;

    enemy.hp -= 15;
    this.combo += 1;
    this.rhythm += 5;

    enemy.setVelocity(this.player.facing * 160, -20);

    if (enemy.hp <= 0) {
      enemy.dead = true;
      enemy.setVelocity(0, 0);
      enemy.play("enemy_ko", true);
      enemy.body.enable = false;
    } else {
      enemy.play("enemy_hurt", true);
    }
  }

  // SAFE texture switch helper — fixes bad loadTexture crashes
  safeSetTexture(sprite, textureKey, frame = 0) {
    if (!sprite) return;

    if (sprite.setTexture) {
      sprite.setTexture(textureKey, frame);
    } else {
      console.warn("Sprite has no setTexture method:", sprite);
    }
  }

  createTouchControls() {
    const alpha = 0.28;

    this.joy = this.add.circle(80, GAME_H - 90, 55, 0xffffff, alpha);
    this.joyText = this.add.text(80, GAME_H - 98, "MOVE", {
      fontFamily: "monospace",
      fontSize: "14px",
      color: "#ffffff"
    }).setOrigin(0.5);

    const buttons = [
      { label: "X", x: GAME_W - 125, y: GAME_H - 160, action: () => this.playerPunch() },
      { label: "Y", x: GAME_W - 170, y: GAME_H - 115, action: () => this.playerKick() },
      { label: "A", x: GAME_W - 80, y: GAME_H - 115, action: () => this.playerPunch() },
      { label: "B", x: GAME_W - 125, y: GAME_H - 70, action: () => this.playerKick() },
      { label: "SP", x: GAME_W - 210, y: GAME_H - 190, action: () => this.playerKick() }
    ];

    buttons.forEach(btn => {
      const c = this.add.circle(btn.x, btn.y, 36, 0xffffff, alpha);
      const t = this.add.text(btn.x, btn.y, btn.label, {
        fontFamily: "monospace",
        fontSize: "18px",
        color: "#ffffff"
      }).setOrigin(0.5);

      c.setInteractive();
      c.on("pointerdown", btn.action);
    });

    const menu = this.add.rectangle(GAME_W/2, GAME_H - 35, 120, 38, 0xffffff, 0.25);
    this.add.text(GAME_W/2, GAME_H - 43, "MENU", {
      fontFamily: "monospace",
      fontSize: "16px",
      color: "#ffffff"
    }).setOrigin(0.5);

    menu.setInteractive();
    menu.on("pointerdown", () => {
      this.scene.start("TitleScene");
    });
  }
}

const config = {
  type: Phaser.AUTO,
  width: GAME_W,
  height: GAME_H,
  backgroundColor: "#000000",
  physics: {
    default: "arcade",
    arcade: {
      debug: false,
      gravity: { y: 0 }
    }
  },
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: [
    TitleScene,
    CharacterSelectScene,
    LevelSelectScene,
    GameScene
  ]
};

new Phaser.Game(config);
</script>

</body>
</html>
