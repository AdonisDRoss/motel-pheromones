<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Motel Pheromones</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <style>
    body { margin:0; background:#000; overflow:hidden; }
    canvas { display:block; margin:0 auto; image-rendering: pixelated; }
  </style>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: 960,
  height: 540,
  backgroundColor: "#000",
  physics: {
    default: "arcade",
    arcade: { gravity: { y: 0 }, debug: false }
  },
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  scene: [TitleScene, GameScene]
};

let game = new Phaser.Game(config);

class TitleScene extends Phaser.Scene {
  constructor() {
    super("TitleScene");
  }

  preload() {
    this.load.image("title", "assets/title-screen.png");
  }

  create() {
    this.add.image(480, 270, "title").setDisplaySize(960, 540);

    this.add.text(480, 485, "PRESS ANY BUTTON TO START", {
      fontFamily: "monospace",
      fontSize: "26px",
      color: "#ff4fc3"
    }).setOrigin(0.5);

    this.input.keyboard.on("keydown", () => {
      this.scene.start("GameScene");
    });

    this.input.on("pointerdown", () => {
      this.scene.start("GameScene");
    });
  }
}

class GameScene extends Phaser.Scene {
  constructor() {
    super("GameScene");
  }

  create() {
    this.add.rectangle(480, 270, 960, 540, 0x151515);
    this.add.rectangle(480, 360, 960, 180, 0x333333);

    this.add.text(30, 25, "MOTEL PHEROMONES - GAME STARTED", {
      fontFamily: "monospace",
      fontSize: "22px",
      color: "#ffffff"
    });

    this.player = this.physics.add.rectangle(180, 330, 42, 70, 0x00ffcc);
    this.player.body.setCollideWorldBounds(true);

    this.enemies = this.physics.add.group();

    for (let i = 0; i < 5; i++) {
      let enemy = this.physics.add.rectangle(
        540 + i * 70,
        330 + Phaser.Math.Between(-45, 45),
        42,
        66,
        0xff3355
      );
      enemy.hp = 30;
      enemy.speed = 55;
      this.enemies.add(enemy);
    }

    this.cursors = this.input.keyboard.createCursorKeys();
    this.keys = this.input.keyboard.addKeys({
      W: "W",
      A: "A",
      S: "S",
      D: "D",
      J: "J",
      K: "K"
    });

    this.input.keyboard.on("keydown-J", () => this.attack(70, 10, 250));
    this.input.keyboard.on("keydown-K", () => this.attack(105, 20, 400));
  }

  update() {
    let speed = 200;
    this.player.body.setVelocity(0);

    if (this.cursors.left.isDown || this.keys.A.isDown) this.player.body.setVelocityX(-speed);
    if (this.cursors.right.isDown || this.keys.D.isDown) this.player.body.setVelocityX(speed);
    if (this.cursors.up.isDown || this.keys.W.isDown) this.player.body.setVelocityY(-speed);
    if (this.cursors.down.isDown || this.keys.S.isDown) this.player.body.setVelocityY(speed);

    this.player.depth = this.player.y;

    this.enemies.children.iterate(enemy => {
      if (!enemy || enemy.hp <= 0) return;

      enemy.depth = enemy.y;

      let dx = this.player.x - enemy.x;
      let dy = this.player.y - enemy.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 45) {
        enemy.body.setVelocity((dx / dist) * enemy.speed, (dy / dist) * enemy.speed);
      } else {
        enemy.body.setVelocity(0);
      }
    });
  }

  attack(range, damage, knockback) {
    let hitbox = this.add.rectangle(
      this.player.x + 45,
      this.player.y,
      range,
      50,
      0xffff00,
      0.25
    );

    this.time.delayedCall(90, () => hitbox.destroy());

    this.enemies.children.iterate(enemy => {
      if (!enemy || enemy.hp <= 0) return;

      let distance = Phaser.Math.Distance.Between(
        this.player.x,
        this.player.y,
        enemy.x,
        enemy.y
      );

      if (distance < range) {
        enemy.hp -= damage;
        enemy.setFillStyle(0xffff00);

        let dir = enemy.x > this.player.x ? 1 : -1;
        enemy.body.setVelocityX(dir * knockback);

        this.time.delayedCall(120, () => {
          if (enemy.hp > 0) enemy.setFillStyle(0xff3355);
        });

        if (enemy.hp <= 0) {
          enemy.setFillStyle(0x555555);
          enemy.body.setVelocity(0);
          enemy.body.enable = false;
        }
      }
    });
  }
}
</script>

</body>
</html>
