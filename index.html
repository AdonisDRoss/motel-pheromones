/* =========================================================
   MODE LOCK PATCH V1 — STORY + CO-OP NOT READY
   - Story and Co-op stay visible on Mode Select
   - Story and Co-op cannot start the next scene
   - Keyboard/controller cycling skips locked modes
   - Tapping a locked card shows NOT READY status
========================================================= */
(function(){
  if(window.MP_LOCK_STORY_COOP_MODES_V1) return;
  window.MP_LOCK_STORY_COOP_MODES_V1 = true;

  if(typeof ModeSelect === "undefined" || !ModeSelect.prototype) return;

  const MP_LOCKED_MODES = {
    story:"STORY MODE LOCKED — NOT READY",
    coop:"CO-OP MODE LOCKED — NOT READY"
  };

  function mpModeId(mode){
    return String(mode && mode.id ? mode.id : "").toLowerCase();
  }

  function mpModeLocked(mode){
    return !!MP_LOCKED_MODES[mpModeId(mode)];
  }

  function mpMarkModeLocks(scene){
    if(!scene || !Array.isArray(scene.modes)) return;

    scene.modes.forEach(mode=>{
      if(!mode) return;

      if(mpModeLocked(mode)){
        mode.locked = true;
        mode.ready = false;
        mode.status = MP_LOCKED_MODES[mpModeId(mode)];
      }else{
        mode.locked = false;
        mode.ready = true;
      }
    });
  }

  function mpFirstUnlockedIndex(scene){
    if(!scene || !Array.isArray(scene.modes)) return 0;

    for(let i = 0; i < scene.modes.length; i++){
      if(!mpModeLocked(scene.modes[i])){
        return i;
      }
    }

    return 0;
  }

  function mpEnsureLockStatus(scene){
    if(!scene || scene.mpModeLockStatus) return;

    scene.mpModeLockStatus = scene.add.text(CX, H - 30, "STORY + CO-OP LOCKED UNTIL READY", {
      font:"18px monospace",
      fill:"#fff45c",
      stroke:"#000000",
      strokeThickness:5
    })
      .setOrigin(0.5)
      .setDepth(9000);
  }

  function mpAddLockedOverlay(scene, index){
    if(!scene || !scene.cards || !scene.cards[index]) return;

    const mode = scene.modes[index];
    if(!mpModeLocked(mode)) return;

    if(!scene.mpModeLockOverlays){
      scene.mpModeLockOverlays = [];
    }

    if(scene.mpModeLockOverlays[index]){
      return;
    }

    const card = scene.cards[index];
    const x = card.x;
    const y = card.y;
    const cardW = 190 * (W / 960);
    const cardH = 300 * (H / 540);

    const group = scene.add.container(x, y).setDepth(8500);

    const shade = scene.add.rectangle(0, 0, cardW, cardH, 0x000000, 0.68)
      .setStrokeStyle(4, 0xff4fc3, 0.65);

    const locked = scene.add.text(0, -18 * (H / 540), "LOCKED", {
      font:"30px monospace",
      fill:"#ff4fc3",
      stroke:"#000000",
      strokeThickness:6
    }).setOrigin(0.5);

    const sub = scene.add.text(0, 22 * (H / 540), "NOT READY", {
      font:"18px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5
    }).setOrigin(0.5);

    group.add([shade, locked, sub]);

    group.mpShade = shade;
    group.mpLockedText = locked;
    group.mpSubText = sub;

    scene.mpModeLockOverlays[index] = group;
  }

  function mpPulseLocked(scene, mode){
    if(!scene) return;

    mpEnsureLockStatus(scene);

    const status = mode && mode.status ? mode.status : "MODE LOCKED — NOT READY";

    if(scene.mpModeLockStatus){
      scene.mpModeLockStatus.setText(status);
      scene.mpModeLockStatus.setFill("#ff4fc3");
    }

    const overlay = scene.mpModeLockOverlays && scene.mpModeLockOverlays[scene.selectedIndex];

    if(overlay){
      scene.tweens.add({
        targets:overlay,
        scale:1.08,
        duration:110,
        yoyo:true,
        ease:"Sine.easeInOut"
      });
    }

    if(scene.cameras && scene.cameras.main){
      scene.cameras.main.shake(120, 0.004);
    }
  }

  const MP_LOCK_OLD_CREATE = ModeSelect.prototype.create;

  ModeSelect.prototype.create = function(){
    MP_LOCK_OLD_CREATE.call(this);

    mpMarkModeLocks(this);
    mpEnsureLockStatus(this);

    if(Array.isArray(this.modes)){
      this.modes.forEach((mode,index)=>{
        if(mpModeLocked(mode)){
          mpAddLockedOverlay(this,index);
        }
      });
    }

    // Story is locked, so start the cursor on the first ready mode.
    if(mpModeLocked(this.modes && this.modes[this.selectedIndex])){
      this.selectedIndex = mpFirstUnlockedIndex(this);
    }

    this.updateSelection();
  };

  const MP_LOCK_OLD_UPDATE = ModeSelect.prototype.updateSelection;

  ModeSelect.prototype.updateSelection = function(){
    mpMarkModeLocks(this);

    MP_LOCK_OLD_UPDATE.call(this);

    if(!Array.isArray(this.modes)) return;

    this.modes.forEach((mode,index)=>{
      const locked = mpModeLocked(mode);
      const selected = index === this.selectedIndex;

      if(this.cards && this.cards[index] && locked && this.cards[index].setAlpha){
        this.cards[index].setAlpha(selected ? 0.56 : 0.32);
      }

      if(this.cardBorders && this.cardBorders[index] && locked){
        this.cardBorders[index].setStrokeStyle(
          selected ? 7 : 4,
          selected ? 0xff4fc3 : 0x555555,
          selected ? 1 : 0.55
        );
      }

      const overlay = this.mpModeLockOverlays && this.mpModeLockOverlays[index];

      if(overlay){
        overlay.setVisible(true);
        overlay.setAlpha(selected ? 0.95 : 0.76);
        overlay.setScale(selected ? 1.03 : 1.0);

        if(this.cards && this.cards[index]){
          overlay.x = this.cards[index].x;
          overlay.y = this.cards[index].y;
        }
      }
    });

    mpEnsureLockStatus(this);

    const current = this.modes[this.selectedIndex];

    if(this.mpModeLockStatus){
      if(mpModeLocked(current)){
        this.mpModeLockStatus.setText(current.status || "MODE LOCKED — NOT READY");
        this.mpModeLockStatus.setFill("#ff4fc3");
      }else{
        this.mpModeLockStatus.setText("SELECT " + String(current && current.name ? current.name : "MODE"));
        this.mpModeLockStatus.setFill("#fff45c");
      }
    }
  };

  ModeSelect.prototype.moveSelection = function(dir){
    if(!Array.isArray(this.modes) || !this.modes.length) return;

    let next = this.selectedIndex;

    for(let i = 0; i < this.modes.length; i++){
      next += dir;

      if(next < 0) next = this.modes.length - 1;
      if(next >= this.modes.length) next = 0;

      if(!mpModeLocked(this.modes[next])){
        this.selectedIndex = next;
        this.updateSelection();
        return;
      }
    }

    this.updateSelection();
  };

  const MP_LOCK_OLD_SELECT = ModeSelect.prototype.selectMode;

  ModeSelect.prototype.selectMode = function(){
    mpMarkModeLocks(this);

    const mode = this.modes && this.modes[this.selectedIndex];

    if(mpModeLocked(mode)){
      mpPulseLocked(this, mode);
      return;
    }

    MP_LOCK_OLD_SELECT.call(this);
  };
})();

/* =========================================================
   END MODE LOCK PATCH V1
========================================================= */



/* =========================================================
   USER MARKUP FIX: FIXED TOUCH CONTROL POSITIONS + MIDDLE TIER SIDEWALK BOUNDS V1
   - Keeps joystick, menu, and button diamond pinned to screen space at any camera zoom.
   - Restricts middle-tier enemies to the visible sidewalk strip so they cannot hover over lower tier.
========================================================= */
(function(){
  if(window.MP_USER_MARKUP_CONTROLS_AND_SIDEWALK_V1) return;
  window.MP_USER_MARKUP_CONTROLS_AND_SIDEWALK_V1 = true;

  if(typeof Game === "undefined" || !Game.prototype) return;

  const MP_MIDDLE_SIDEWALK_BOUNDS = {
    minX:118,
    maxX:878,
    minY:360,
    maxY:382
  };

  function mpIsOutdoorMainTierScene(scene){
    if(!scene) return false;
    if(typeof selectedLevel !== "undefined" && selectedLevel !== "outdoor") return false;
    if(scene.leftyScreen && typeof LEFTY_SCREEN_MAIN_V2 !== "undefined"){
      return scene.leftyScreen === LEFTY_SCREEN_MAIN_V2;
    }
    return true;
  }

  function mpApplyMiddleSidewalkBounds(scene){
    if(typeof PLATFORM_BOUNDS === "undefined") return;
    if(!PLATFORM_BOUNDS.middle) return;
    if(!mpIsOutdoorMainTierScene(scene)) return;

    PLATFORM_BOUNDS.middle.minX = MP_MIDDLE_SIDEWALK_BOUNDS.minX;
    PLATFORM_BOUNDS.middle.maxX = MP_MIDDLE_SIDEWALK_BOUNDS.maxX;
    PLATFORM_BOUNDS.middle.minY = MP_MIDDLE_SIDEWALK_BOUNDS.minY;
    PLATFORM_BOUNDS.middle.maxY = MP_MIDDLE_SIDEWALK_BOUNDS.maxY;
  }

  function mpClampMiddleTierEnemy(scene,e){
    if(!scene || !e || e.platform !== "middle") return;
    if(!mpIsOutdoorMainTierScene(scene)) return;

    mpApplyMiddleSidewalkBounds(scene);
    const b = MP_MIDDLE_SIDEWALK_BOUNDS;
    e.x = Phaser.Math.Clamp(e.x, b.minX, b.maxX);
    e.homeY = Phaser.Math.Clamp(e.homeY || e.y || getPlatformY("middle"), b.minY, b.maxY);
    e.y = Phaser.Math.Clamp(e.y || e.homeY, b.minY, b.maxY);

    if(e.sprite){
      e.sprite.x = e.x;
      e.sprite.y = e.y;
    }
  }

  const MP_MARKUP_OLD_GET_BOUNDS = Game.prototype.getCurrentPlatformBounds;
  Game.prototype.getCurrentPlatformBounds = function(){
    mpApplyMiddleSidewalkBounds(this);
    if(this.platform === "middle" && mpIsOutdoorMainTierScene(this)){
      return PLATFORM_BOUNDS.middle;
    }
    return MP_MARKUP_OLD_GET_BOUNDS ? MP_MARKUP_OLD_GET_BOUNDS.call(this) : (PLATFORM_BOUNDS[this.platform] || PLATFORM_BOUNDS.middle);
  };

  const MP_MARKUP_OLD_APPLY_BOUNDS = Game.prototype.applyPlatformBounds;
  Game.prototype.applyPlatformBounds = function(){
    mpApplyMiddleSidewalkBounds(this);
    const out = MP_MARKUP_OLD_APPLY_BOUNDS ? MP_MARKUP_OLD_APPLY_BOUNDS.call(this) : undefined;

    if(this.platform === "middle" && this.player && mpIsOutdoorMainTierScene(this)){
      const b = MP_MIDDLE_SIDEWALK_BOUNDS;
      this.player.x = Phaser.Math.Clamp(this.player.x, b.minX, b.maxX);
      this.player.y = Phaser.Math.Clamp(this.player.y, b.minY, b.maxY);
      if(this.shadow){
        this.shadow.x = this.player.x;
        this.shadow.y = this.player.y + 5;
      }
    }

    return out;
  };

  const MP_MARKUP_OLD_SYNC_ENEMY_LANE = Game.prototype.syncEnemyLane;
  Game.prototype.syncEnemyLane = function(e,delta){
    mpApplyMiddleSidewalkBounds(this);

    if(e && e.platform === "middle" && mpIsOutdoorMainTierScene(this)){
      const b = MP_MIDDLE_SIDEWALK_BOUNDS;
      const targetY = Phaser.Math.Clamp(
        (this.player ? this.player.y : getPlatformY("middle")) + (e.laneOffset || 0),
        b.minY,
        b.maxY
      );
      const follow = e.enemyType === "corpo_sellout" ? 0.045 : 0.035;
      e.homeY = Phaser.Math.Linear(e.homeY || targetY, targetY, follow);
      e.y = e.homeY;
      mpClampMiddleTierEnemy(this,e);
      return;
    }

    if(MP_MARKUP_OLD_SYNC_ENEMY_LANE) return MP_MARKUP_OLD_SYNC_ENEMY_LANE.call(this,e,delta);
  };

  const MP_MARKUP_OLD_FINISH_ENEMY_MOVE = Game.prototype.finishEnemyMove;
  Game.prototype.finishEnemyMove = function(e,dt){
    const out = MP_MARKUP_OLD_FINISH_ENEMY_MOVE ? MP_MARKUP_OLD_FINISH_ENEMY_MOVE.call(this,e,dt) : undefined;
    mpApplyMiddleSidewalkBounds(this);
    mpClampMiddleTierEnemy(this,e);
    if(e && this.updateEnemyVisuals) this.updateEnemyVisuals(e);
    return out;
  };

  const MP_MARKUP_OLD_SPAWN_ENEMY = Game.prototype.spawnEnemyType;
  Game.prototype.spawnEnemyType = function(type,x,y,platform){
    mpApplyMiddleSidewalkBounds(this);
    const e = MP_MARKUP_OLD_SPAWN_ENEMY.call(this,type,x,y,platform);
    if(e && e.platform === "middle" && mpIsOutdoorMainTierScene(this)){
      e.laneOffset = Phaser.Math.Between(-12,8);
      e.homeY = Phaser.Math.Clamp(e.homeY || e.y || getPlatformY("middle"), MP_MIDDLE_SIDEWALK_BOUNDS.minY, MP_MIDDLE_SIDEWALK_BOUNDS.maxY);
      e.y = e.homeY;
      mpClampMiddleTierEnemy(this,e);
    }
    return e;
  };

  const MP_MARKUP_OLD_MAKE_MOBILE = Game.prototype.makeMobileControls;
  Game.prototype.makeMobileControls = function(){
    const out = MP_MARKUP_OLD_MAKE_MOBILE ? MP_MARKUP_OLD_MAKE_MOBILE.call(this) : undefined;

    // Viewport/screen-space positions matching the user's marked circles.
    const stickX = 118;
    const stickY = H - 140;
    const menuX = CX;
    const menuY = H - 66;
    const diamondX = W - 118;
    const diamondY = H - 130;
    const gap = 46;

    function setScreen(obj,x,y){
      if(!obj) return;
      obj.mpNvScreenX = x;
      obj.mpNvScreenY = y;
      const z = (obj.scene && obj.scene.cameras && obj.scene.cameras.main) ? (obj.scene.cameras.main.zoom || 1) : 1;
      if(obj.setScrollFactor) obj.setScrollFactor(0);
      if(obj.setPosition) obj.setPosition(x / z, y / z);
      if(obj.setScale) obj.setScale((obj.mpNvBaseScale || 1) / z);
    }

    if(this.mobileUI){
      setScreen(this.mobileUI.stickBase, stickX, stickY);
      setScreen(this.mobileUI.stickKnob, stickX, stickY);
      setScreen(this.mobileUI.menuHit, menuX, menuY);
      setScreen(this.mobileUI.menuFace, menuX, menuY);
      setScreen(this.mobileUI.menuText, menuX, menuY);
    }

    const pos = {
      X:[diamondX, diamondY - gap],
      Y:[diamondX - gap, diamondY],
      A:[diamondX + gap, diamondY],
      B:[diamondX, diamondY + gap],
      SP:[diamondX - 64, diamondY - 68],
      CR:[diamondX - 142, diamondY + 6]
    };

    if(Array.isArray(this.mobileButtons)){
      this.mobileButtons.forEach(btn=>{
        if(!btn || !pos[btn.label]) return;
        const p = pos[btn.label];
        [btn.hit,btn.shadow,btn.face,btn.shine,btn.text].forEach(obj=>setScreen(obj,p[0],p[1]));
        btn.mpNvScreenX = p[0];
        btn.mpNvScreenY = p[1];
      });
    }

    return out;
  };

  const MP_MARKUP_OLD_SAFE_UPDATE = Game.prototype.safeUpdate;
  Game.prototype.safeUpdate = function(time,delta){
    mpApplyMiddleSidewalkBounds(this);
    const out = MP_MARKUP_OLD_SAFE_UPDATE ? MP_MARKUP_OLD_SAFE_UPDATE.call(this,time,delta) : undefined;

    if(this.enemies && this.platform){
      this.enemies.forEach(e=>mpClampMiddleTierEnemy(this,e));
    }

    return out;
  };
})();

  Game.prototype.makeMobileControls = function(){
    const size = v => v * CONTROL_ZOOM;
    const font = v => Math.round(v * CONTROL_ZOOM) + "px monospace";

    this.mobileUI = {};
    this.mobileButtons = [];
    this.mpNvUiObjects = [];
    this.input.topOnly = false;

    // LEFT SIDE: same large joystick placement as recovery/photo 1.
    const bx = 105;
    const by = H - 145;
    const baseR = size(44);
    const knobR = size(18);

    const stickBase = this.add.circle(bx, by, baseR, 0xffffff, 0.10)
      .setStrokeStyle(2, 0xffffff, 0.18)
      .setDepth(9000)
      .setScrollFactor(0);

    const knob = this.add.circle(bx, by, knobR, 0xffffff, 0.28)
      .setStrokeStyle(2, 0xffffff, 0.25)
      .setDepth(9001)
      .setScrollFactor(0);

    this.mobileUI.stickBase = stickBase;
    this.mobileUI.stickKnob = knob;

    let dragging = false;

    const moveStick = p => {
      let dx = p.x - stickBase.x;
      let dy = p.y - stickBase.y;
      const d = Math.sqrt(dx * dx + dy * dy);

      if(d > baseR){
        dx = (dx / d) * baseR;
        dy = (dy / d) * baseR;
      }

      knob.x = stickBase.x + dx;
      knob.y = stickBase.y + dy;
      this.stickX = dx / baseR;
      this.stickY = dy / baseR;
    };

    this.input.on("pointerdown", p => {
      if(Phaser.Math.Distance.Between(p.x, p.y, stickBase.x, stickBase.y) < size(72)){
        dragging = true;
        moveStick(p);
      }
    });

    this.input.on("pointermove", p => {
      if(dragging) moveStick(p);
    });

    const releaseStick = () => {
      dragging = false;
      knob.x = stickBase.x;
      knob.y = stickBase.y;
      this.stickX = 0;
      this.stickY = 0;
    };

    this.input.on("pointerup", releaseStick);

    const menuFace = this.add.rectangle(menuX, menuY, size(92), size(28), 0xffffff, 0.10)
      .setStrokeStyle(2, 0xffffff, 0.30)
      .setDepth(9501)
      .setScrollFactor(0);

    const menuText = this.add.text(menuX, menuY, "MENU", {
      font: font(13),
      fill: "#fff"
    })
      .setOrigin(0.5)
      .setDepth(9502)
      .setScrollFactor(0);

    this.mobileUI.menuHit = menuHit;
    this.mobileUI.menuFace = menuFace;

/* =========================================================
   DONNY REQUEST MERGE PATCH 2026-05-14
   - Circular touch stick lock
   - Platform/roof lane cleanup
   - X/Y/A/B reroute
   - directional floaty 1.5x double jump
   - grab/carry/throw with 3 second get-up
   - enemy taunt lines on hit
   - more aggressive enemies
   - pause menu Title Screen returns to Mode Select
   - locked carousel cards from assets/cards
========================================================= */
(function(){
  if(typeof Game === "undefined" || !Game.prototype) return;

  /* Keep upper-roof actors slightly above the purple roof line. */
  if(typeof PLATFORM_BOUNDS !== "undefined"){
    if(PLATFORM_BOUNDS.top){
      PLATFORM_BOUNDS.top.minY = 300;
      PLATFORM_BOUNDS.top.maxY = 300;
      PLATFORM_BOUNDS.top.minX = 190;
      PLATFORM_BOUNDS.top.maxX = 860;
    }
    if(PLATFORM_BOUNDS.topLeft){
      PLATFORM_BOUNDS.topLeft.minY = 300;
      PLATFORM_BOUNDS.topLeft.maxY = 300;
    }
    if(PLATFORM_BOUNDS.middle){
      PLATFORM_BOUNDS.middle.minY = 390;
      PLATFORM_BOUNDS.middle.maxY = 390;
    }
  }

  const MP_ROOF_Y = 300;
  const MP_MIDDLE_Y = 390;
  const MP_THROW_GETUP_TIME = 3000;
  const MP_THROW_FLY_TIME = 850;

  Game.prototype.mpPlatformY = function(platform){
    if(platform === "top" || platform === "topLeft") return MP_ROOF_Y;
    if(platform === "middle") return MP_MIDDLE_Y;
    if(typeof getPlatformY === "function") return getPlatformY(platform);
    return MP_MIDDLE_Y;
  };

  /* Hard-lock player to the current platform lane after normal movement.
     Ladder/stair tweens still work because this only applies during platform movement. */
  Game.prototype.applyPlatformBounds = function(){
    const bounds = (typeof PLATFORM_BOUNDS !== "undefined" && PLATFORM_BOUNDS[this.platform])
      ? PLATFORM_BOUNDS[this.platform]
      : {minX:120,maxX:860};

    this.player.x = Phaser.Math.Clamp(this.player.x, bounds.minX, bounds.maxX);
    this.player.y = this.mpPlatformY(this.platform);
  };

  Game.prototype.getPlatformCenterY = function(platform){
    return this.mpPlatformY(platform);
  };

  /* Spawn enemies on playable lanes instead of under the player. */
  Game.prototype.createEnemies = function(){
    this.enemies = [];
    this.enemyWaveIndex = 0;
    this.waveSpawning = false;
    this.initialWaveStarted = false;

    this.enemyWaves = [
      [
        { type:"corpo_wannabe", x:350, y:this.mpPlatformY("middle"), platform:"middle" },
        { type:"feral",        x:690, y:this.mpPlatformY("middle"), platform:"middle" }
      ],
      [
        { type:"sellout",       x:520, y:this.mpPlatformY("top"), platform:"top" },
        { type:"corpo_sellout", x:760, y:this.mpPlatformY("middle"), platform:"middle" },
        { type:"corpo_wannabe", x:260, y:this.mpPlatformY("middle"), platform:"middle" }
      ],
      [
        { type:"feral",         x:620, y:this.mpPlatformY("middle"), platform:"middle" },
        { type:"sellout",       x:760, y:this.mpPlatformY("top"), platform:"top" },
        { type:"corpo_sellout", x:305, y:this.mpPlatformY("middle"), platform:"middle" }
      ]
    ];
  };

  const MP_OLD_SPAWN_INTRO = Game.prototype.spawnIntroEnemy;
  Game.prototype.spawnIntroEnemy = function(sourceX,sourceY,spawn,delay,sourceKind){
    if(spawn && spawn.platform){
      spawn.y = this.mpPlatformY(spawn.platform);
    }
    return MP_OLD_SPAWN_INTRO.call(this,sourceX,sourceY,spawn,delay,sourceKind);
  };

  Game.prototype.syncEnemyLane = function(e,delta){
    if(!e || !this.player) return;
    if(e.platform === this.platform){
      e.homeY = this.player.y;
    }else{
      e.homeY = this.mpPlatformY(e.platform);
    }
    e.y = e.homeY;
  };

  Game.prototype.finishEnemyMove = function(e,dt){
    if(!e) return;
    e.vx = Phaser.Math.Clamp(e.vx || 0,-310,310);
    e.x += e.vx * dt;

    const bounds = (typeof PLATFORM_BOUNDS !== "undefined" && PLATFORM_BOUNDS[e.platform])
      ? PLATFORM_BOUNDS[e.platform]
      : {minX:120,maxX:860};

    e.x = Phaser.Math.Clamp(e.x, bounds.minX, bounds.maxX);
    e.y = this.mpPlatformY(e.platform);
    e.homeY = e.y;
    this.updateEnemyVisuals(e);
  };

  /* Controls:
     X = heavy, Y = light, A = kick/grab/throw/crouch, B = jump/double jump/sweep. */
  Game.prototype.startContextB = function(){
    if(!this.ensureRoundActive()) return;
    this.recoverActionInput();
    if(this.pauseMenuOpen || this.isClimbing || this.playerHealth <= 0) return;
    this.readInput();

    if(this.isDownHeld()){
      if(this.playerBusy && this.isCrouching) this.forcePlayerReady();
      this.startSweep();
      return;
    }

    this.startJump(true);
  };

  Game.prototype.startContextKick = function(){
    if(!this.ensureRoundActive()) return;
    this.recoverActionInput();
    if(this.pauseMenuOpen || this.isClimbing || this.playerHealth <= 0) return;
    this.readInput();

    if(this.grabbedEnemy){
      this.throwGrabbedEnemy();
      return;
    }

    if(this.isDownHeld()){
      this.startCrouch(true);
      return;
    }

    if(this.isForwardHeld()){
      this.startGrab();
      return;
    }

    this.startAttack("kick");
  };

  Game.prototype.startContextY = function(){
    if(!this.ensureRoundActive()) return;
    this.recoverActionInput();
    this.startAttack("heavy");
  };

  /* Directional floaty double jump: 1.5x height and longer hang time. */
  Game.prototype.startJump = function(force=false){
    if(!this.ensureRoundActive()) return;
    if(this.pauseMenuOpen) return;
    if(this.isClimbing || this.playerHealth <= 0) return;

    this.recoverActionInput();

    const alreadyJumping = this.isJumping;
    const wasCrouching = this.isCrouching;
    const crouchGroundY = this.crouchBaseY || this.player.y;

    if(typeof JUMP_LINKS !== "undefined"){
      for(const link of JUMP_LINKS){
        if(this.platform === link.from && this.player.x >= link.minX && this.player.x <= link.maxX){
          this.playerBusy = true;
          this.isJumping = true;
          this.tweens.add({
            targets:this.player,
            x:link.landX,
            y:link.landY,
            duration:320,
            ease:"Quad.easeOut",
            onUpdate:()=>{
              if(this.shadow) this.shadow.x = this.player.x;
              if(this.poseSprite){ this.poseSprite.x = this.player.x; this.poseSprite.y = this.player.y; }
            },
            onComplete:()=>{
              this.platform = link.to;
              this.player.y = this.mpPlatformY(link.to);
              if(this.shadow){ this.shadow.x = this.player.x; this.shadow.y = this.player.y + 5; }
              if(this.poseSprite){ this.poseSprite.x = this.player.x; this.poseSprite.y = this.player.y; }
              this.isJumping = false;
              this.playerBusy = false;
            }
          });
          return;
        }
      }
    }

    if(alreadyJumping && this.jumpCount >= this.maxJumps) return;
    if(this.playerBusy && !this.isJumping && !this.isCrouching && !force) return;

    if(this.playerBusy && !this.isJumping && force){
      if(this.crouchBaseY){
        this.player.y = this.crouchBaseY;
        this.crouchBaseY = null;
      }
      this.forcePlayerReady();
    }

    if(this.crouchEvent){
      this.crouchEvent.remove(false);
      this.crouchEvent = null;
    }

    this.playerBusy = true;
    this.isJumping = true;
    this.isCrouching = false;
    this.isBlocking = false;

    if(this.poseSprite){
      this.poseSprite.stop();
      this.poseSprite.setVisible(false);
    }
    this.player.setVisible(true);

    if(!alreadyJumping){
      this.jumpCount = 0;
      this.jumpGroundY = wasCrouching ? crouchGroundY : this.mpPlatformY(this.platform);
      this.player.y = this.jumpGroundY;
    }

    this.jumpCount++;

    if(this.activeJumpTween){
      this.activeJumpTween.stop();
      this.activeJumpTween = null;
    }

    const isDouble = this.jumpCount >= 2;
    const jumpDuration = isDouble ? Math.round(JUMP_TIME * 1.45) : JUMP_TIME;
    this.busyUntil = this.time.now + jumpDuration + 320;

    const jumpAnim = this.getPlayerAnim("jump");
    if(hasAnim(this,jumpAnim)){
      if(getSelectedFighterId() === "JACKSON" || getSelectedFighterId() === "DONNY"){
        this.player.setScale(this.getPlayerMoveScale());
      }else{
        this.player.setScale(typeof PLAYER_MOVE2_SCALE !== "undefined" ? PLAYER_MOVE2_SCALE : this.getPlayerMoveScale());
      }
      safePlay(this.player,jumpAnim);
    }else{
      this.player.setScale(this.getPlayerMoveScale());
      this.player.setTint(0x66ccff);
    }

    let height = JUMP_HEIGHT;
    if(wasCrouching) height *= CROUCH_JUMP_BOOST;
    if(isDouble) height *= 1.5;

    this.createHitFX(this.player.x,this.player.y-(isDouble ? 60 : 45),"jump",isDouble ? 6 : 4);
    vibrate(isDouble ? VIBE.doubleJump : VIBE.jump);

    const inputX = this.getLiveInputX ? this.getLiveInputX() : this.moveX;
    const jumpDirX = Math.abs(inputX) > JUMP_DIR_DEADZONE ? Math.sign(inputX) : 0;
    const jumpDistance = isDouble ? DOUBLE_JUMP_DIR_DISTANCE : JUMP_DIR_DISTANCE;
    const bounds = this.getCurrentPlatformBounds ? this.getCurrentPlatformBounds() : PLATFORM_BOUNDS[this.platform];
    const startX = this.player.x;
    const landX = Phaser.Math.Clamp(startX + jumpDirX * jumpDistance, bounds.minX, bounds.maxX);
    const peakX = Phaser.Math.Linear(startX, landX, 0.5);
    const peakY = this.player.y - height;
    const groundY = this.jumpGroundY;

    this.activeJumpTween = this.tweens.add({
      targets:this.player,
      x:peakX,
      y:peakY,
      duration:jumpDuration / 2,
      ease:isDouble ? "Sine.easeOut" : "Sine.easeOut",
      onUpdate:()=>{
        if(this.shadow) this.shadow.x = this.player.x;
        if(this.poseSprite){ this.poseSprite.x = this.player.x; this.poseSprite.y = this.player.y; }
      },
      onComplete:()=>{
        this.activeJumpTween = this.tweens.add({
          targets:this.player,
          x:landX,
          y:groundY,
          duration:jumpDuration / 2,
          ease:isDouble ? "Sine.easeInOut" : "Sine.easeIn",
          onUpdate:()=>{
            if(this.shadow) this.shadow.x = this.player.x;
            if(this.poseSprite){ this.poseSprite.x = this.player.x; this.poseSprite.y = this.player.y; }
          },
          onComplete:()=>{
            this.player.x = landX;
            this.player.y = groundY;
            this.player.setScale(this.getPlayerMoveScale());
            this.player.clearTint();
            this.isJumping = false;
            this.jumpCount = 0;
            this.activeJumpTween = null;
            this.forcePlayerReady();
          }
        });
      }
    });
  };

  Game.prototype.throwGrabbedEnemy = function(){
    if(this.pauseMenuOpen) return;
    if(!this.matchStarted || this.matchOver) return;
    if(!this.grabbedEnemy) return;

    const e = this.grabbedEnemy;
    const dir = this.getFacingDir();

    this.clearGrabTimers();
    this.grabbedEnemy = null;
    this.grabMode = "none";
    this.playerBusy = false;
    this.busyUntil = 0;
    this.isBlocking = false;
    this.isCrouching = false;
    this.isJumping = false;

    if(this.poseSprite){
      this.poseSprite.stop();
      this.poseSprite.setVisible(false);
    }
    if(this.player){
      this.player.setVisible(true);
      this.player.setScale(this.getPlayerMoveScale());
      safePlay(this.player,this.getPlayerAnim("idle_side"));
    }

    e.grabbed = false;
    e.busy = true;
    e.state = "thrown";
    e.thrownTime = MP_THROW_GETUP_TIME;
    e.throwFlyTime = MP_THROW_FLY_TIME;
    e.thrownHit = new Set();
    e.knockbackTime = MP_THROW_GETUP_TIME;
    e.attackCooldown = MP_THROW_GETUP_TIME + 400;
    e.platform = this.platform;
    e.homeY = this.player.y;
    e.y = e.homeY;
    e.health -= THROW_DAMAGE;
    e.vx = dir * THROW_SPEED;

    this.createHitFX(e.x,e.y-55,"hit",THROW_DAMAGE);
    this.safeEnemyPlay(e,"ko");
    this.updateEnemyHealthBar(e);

    if(e.health <= 0){
      this.killEnemy(e);
      e.thrownTime = 0;
      return;
    }
  };

  Game.prototype.updateThrownEnemies = function(delta){
    const dt = delta / 1000;
    this.enemies.forEach(e=>{
      if(!e || e.dead) return;
      if(!e.thrownTime || e.thrownTime <= 0) return;

      e.thrownTime -= delta;
      if(e.thrownTime < 0) e.thrownTime = 0;

      if(e.throwFlyTime && e.throwFlyTime > 0){
        e.throwFlyTime -= delta;
        e.x += e.vx * dt;
      }else{
        e.vx = 0;
      }

      e.y = e.homeY;
      e.platform = e.platform || this.platform;
      this.safeEnemyPlay(e,"ko");

      this.enemies.forEach(other=>{
        if(!other || other === e) return;
        if(other.dead || other.state === "dead") return;
        if(other.platform !== e.platform) return;
        if(other.grabbed) return;
        if(!e.thrownHit) e.thrownHit = new Set();
        if(e.thrownHit.has(other)) return;

        const dx = Math.abs(e.x - other.x);
        const dy = Math.abs(e.y - other.y);
        if(dx < 72 && dy < 45){
          e.thrownHit.add(other);
          this.damageEnemy(other,THROW_COLLISION_DAMAGE,true);
        }
      });

      if(e.thrownTime <= 0 && !e.dead && e.state === "thrown"){
        e.busy = false;
        e.state = "idle";
        e.thrownTime = 0;
        e.throwFlyTime = 0;
        e.vx = 0;
        e.knockbackTime = 0;
        this.safeEnemyPlay(e,"idle");
      }

      this.updateEnemyVisuals(e);
    });
  };

  Game.prototype.sayEnemyTaunt = function(e,text,duration=950){

      if(e.speechText){ e.speechText.destroy(); e.speechText = null; }
    });
  };

  Game.prototype.startEnemyAttack = function(e){
    if(!e || e.dead || e.busy) return;
    if(e.grabbed || e.thrownTime > 0) return;

    const dx = this.player.x - e.x;
    const dy = this.player.y - e.y;
    const dir = dx > 0 ? 1 : -1;
    const closeRange = this.getEnemyCloseAttackRange ? this.getEnemyCloseAttackRange(e) : 58;
    const laneRange = this.getEnemyLaneRange ? this.getEnemyLaneRange(e) : 36;

    if(Math.abs(dx) > closeRange || Math.abs(dy) > laneRange){
      e.attackCooldown = Phaser.Math.Between(160,360);
      if(this.assignEnemyTactic) this.assignEnemyTactic(e,true);
      return;
    }

    const useKick = Phaser.Math.Between(0,3) === 0;
    e.state = "attack";
    e.busy = true;
    e.attackCooldown = Phaser.Math.Between(e.attackCooldownMin || 420,e.attackCooldownMax || 900);
    e.vx = 0;
    e.sprite.setFlipX(dx < 0);
    this.safeEnemyPlay(e,useKick ? "kick" : "punch");

    this.time.delayedCall(235,()=>{
      if(!e || e.dead || e.state !== "attack") return;
      const hitDx = Math.abs(this.player.x - e.x);
      const hitDy = Math.abs(this.player.y - e.y);
      if(hitDx <= closeRange + (useKick ? 8 : 0) && hitDy <= laneRange){
        this.damagePlayer((e.attackDamage || 8) + (useKick ? 1 : 0),dir);
        this.sayEnemyTaunt(e);
      }
    });

    this.time.delayedCall(520,()=>{
      if(!e || e.dead) return;
      e.busy = false;
      e.state = "idle";
      e.vx = 0;
      if(this.assignEnemyTactic) this.assignEnemyTactic(e,true);
      this.safeEnemyPlay(e,"idle");
    });
  };

    const closeRange = this.getEnemyCloseAttackRange ? this.getEnemyCloseAttackRange(e) : 62;
    const laneRange = this.getEnemyLaneRange ? this.getEnemyLaneRange(e) : 36;

    if(Math.abs(dx) > closeRange || Math.abs(dy) > laneRange){

  Game.prototype.startFeralRush = function(e){
    if(!e || e.dead || e.busy) return;
    const dx = this.player.x - e.x;
    const dir = dx > 0 ? 1 : -1;
    e.state = "rush";
    e.busy = true;
    e.vx = dir * 210;
    e.attackCooldown = Phaser.Math.Between(650,1100);
    e.sprite.setFlipX(dx < 0);
    this.safeEnemyPlay(e,"walk");

    this.time.delayedCall(210,()=>{
      if(!e || e.dead || e.state !== "rush") return;
      const hitDx = Math.abs(this.player.x - e.x);
      const hitDy = Math.abs(this.player.y - e.y);
      if(hitDx <= 64 && hitDy <= 38){
        this.damagePlayer(e.attackDamage || 7,dir);
        this.sayEnemyTaunt(e);
      }
    });

    this.time.delayedCall(390,()=>{
      if(!e || e.dead) return;
      e.busy = false;
      e.state = "idle";
      e.vx = 0;
      if(this.assignEnemyTactic) this.assignEnemyTactic(e,true);
      this.safeEnemyPlay(e,"idle");

  /* Slightly more aggressive but still avoids instant stun-locking. */
  Game.prototype.normalizeEnemyCombatStats = function(e){
    if(!e) return;

    e.attackRange = this.getEnemyCloseAttackRange ? this.getEnemyCloseAttackRange(e) : 58;
    e.stopRange = this.getEnemyStopRange ? this.getEnemyStopRange(e) : 78;

    if(e.enemyType === "feral"){
      e.chaseSpeed = 150;
      e.attackCooldownMin = 420;
      e.attackCooldownMax = 900;
    }else if(e.enemyType === "corpo_sellout"){
      e.chaseSpeed = 106;
      e.attackCooldownMin = 500;
      e.attackCooldownMax = 1050;
    }else if(e.enemyType === "corpo_wannabe"){
      e.chaseSpeed = 92;
      e.attackCooldownMin = 440;
      e.attackCooldownMax = 960;
    }else if(e.enemyType === "sellout"){
      e.chaseSpeed = 88;
      e.attackCooldownMin = 470;
      e.attackCooldownMax = 1020;
    }

    e.tacticState = e.tacticState || "approach";
    e.tacticUntil = this.time.now + Phaser.Math.Between(240,650);
    e.smartSide = e.smartSide || (Phaser.Math.Between(0,1) === 0 ? -1 : 1);
    e.thinkDelay = Phaser.Math.Between(80,220);
  };

  Game.prototype.assignEnemyTactic = function(e,force=false){
    if(!e || e.dead) return;
    if(!force && e.tacticUntil && this.time.now < e.tacticUntil) return;

    const roll = Phaser.Math.Between(0,99);
    if(e.enemyType === "feral"){
      e.tacticState = roll < 55 ? "rush" : roll < 82 ? "circle" : "approach";
      e.tacticUntil = this.time.now + Phaser.Math.Between(260,720);
      return;
    }

    if(e.enemyType === "corpo_sellout"){
      e.tacticState = roll < 48 ? "approach" : roll < 76 ? "circle" : roll < 90 ? "backoff" : "wait";
      e.tacticUntil = this.time.now + Phaser.Math.Between(360,900);
      return;
    }

    e.tacticState = roll < 55 ? "approach" : roll < 78 ? "circle" : roll < 90 ? "wait" : "backoff";
    e.tacticUntil = this.time.now + Phaser.Math.Between(300,780);
  };

  /* Rebuild mobile controls with a circular stick and requested X/Y/A/B routes. */
  Game.prototype.makeMobileControls = function(){
    const size = v => v * CONTROL_ZOOM;
    const font = v => Math.round(v * CONTROL_ZOOM) + "px monospace";

    this.mobileUI = {};
    this.mobileButtons = [];

    const bx = 205;
    const by = H - 116;
    const baseR = size(50);
    const knobR = size(22);
    const touchR = size(86);

    const stickTouch = this.add.circle(bx,by,touchR,0xffffff,0.001).setInteractive().setDepth(8999).setScrollFactor(0);
    const stickBase = this.add.circle(bx,by,baseR,0x000000,0.34).setStrokeStyle(5,0xffffff,0.56).setDepth(9000).setScrollFactor(0);
    const stickMid = this.add.circle(bx,by,size(31),0xffffff,0.10).setStrokeStyle(2,0xffffff,0.28).setDepth(9001).setScrollFactor(0);
    const knob = this.add.circle(bx,by,knobR,0xffffff,0.46).setStrokeStyle(3,0xffffff,0.62).setDepth(9002).setScrollFactor(0);

    this.mobileUI.stickTouch = stickTouch;
    this.mobileUI.stickBase = stickBase;
    this.mobileUI.stickMid = stickMid;
    this.mobileUI.stickKnob = knob;

    let dragging = false;
    const resetStick = ()=>{
      dragging = false;
      knob.x = stickBase.x;
      knob.y = stickBase.y;
      this.stickX = 0;
      this.stickY = 0;
    };
    const moveStick = p=>{
      let dx = p.x - stickBase.x;
      let dy = p.y - stickBase.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if(d > baseR){ dx = (dx/d) * baseR; dy = (dy/d) * baseR; }
      knob.x = stickBase.x + dx;
      knob.y = stickBase.y + dy;
      this.stickX = dx / baseR;
      this.stickY = dy / baseR;
    };
    const startVirtualStick = p=>{
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      dragging = true;
      moveStick(p);
    };

    stickTouch.on("pointerdown",startVirtualStick);
    this.input.on("pointerdown",p=>{
      if(Phaser.Math.Distance.Between(p.x,p.y,stickBase.x,stickBase.y) <= touchR) startVirtualStick(p);
    });
    this.input.on("pointermove",p=>{ if(dragging) moveStick(p); });
    this.input.on("pointerup",resetStick);
    this.input.on("pointerupoutside",resetStick);

    const diamondX = W - 285;
    const diamondY = H - 118;
    const gap = size(55);

    this.mobileButton(diamondX, diamondY - gap, "X", 0x4d7cff, ()=>this.startAttack("heavy"));
    this.mobileButton(diamondX - gap, diamondY, "Y", 0x4fd35d, ()=>this.startAttack("light"));
    this.mobileButton(diamondX + gap, diamondY, "A", 0xff5a5a, ()=>this.startContextKick());
    this.mobileButton(diamondX, diamondY + gap, "B", 0xffd84d, ()=>this.startContextB());

    this.mobileButton(W - 355,H - 184,"SP",0x8f72ff,()=>this.playPlayerPose(this.getPlayerAnim("special"),750,this.getPlayerActionScale()));
    this.mobileButton(W - 455,H - 108,"CR",0x8a8a8a,()=>{ this.recoverActionInput(); this.startCrouch(true); });

    const menuX = CX;
    const menuY = H - 58;
    const menuHit = this.add.rectangle(menuX,menuY,size(105),size(33),0x000000,0.30).setInteractive().setDepth(9500).setScrollFactor(0);
    const menuFace = this.add.rectangle(menuX,menuY,size(105),size(33),0xffffff,0.10).setStrokeStyle(2,0xffffff,0.30).setDepth(9501).setScrollFactor(0);
    const menuText = this.add.text(menuX,menuY,"MENU",{font:font(13),fill:"#fff"}).setOrigin(0.5).setDepth(9502).setScrollFactor(0);
    this.mobileUI.menuHit = menuHit;
    this.mobileUI.menuFace = menuFace;
    this.mobileUI.menuText = menuText;
    menuHit.on("pointerdown",()=>this.togglePauseMenu());
  };
})();

      this.stickX = 0;
      this.stickY = 0;
    };

    const moveStick = p=>{
      let dx = p.x - bx;
      let dy = p.y - by;
      const d = Math.sqrt(dx * dx + dy * dy);
      if(d > baseR){
        dx = (dx / d) * baseR;
        dy = (dy / d) * baseR;
      }
      knob.x = bx + dx;
      knob.y = by + dy;
      this.stickX = dx / baseR;
      this.stickY = dy / baseR;
    };

    const startStick = p=>{
      if(p && p.event && p.event.preventDefault) p.event.preventDefault();
      dragging = true;
      pointerId = p.id;
      moveStick(p);
    };

    stickTouch.on("pointerdown", startStick);
    this.input.on("pointerdown", p=>{
      if(p.x > W * 0.45) return;
      if(Phaser.Math.Distance.Between(p.x,p.y,bx,by) <= touchR){
        startStick(p);
      }
    });
    this.input.on("pointermove", p=>{
      if(dragging && (pointerId === null || p.id === pointerId)) moveStick(p);
    });
    this.input.on("pointerup", p=>{
      if(pointerId === null || p.id === pointerId) resetStick();
    });
    this.input.on("pointerupoutside", p=>{
      if(pointerId === null || p.id === pointerId) resetStick();
    });

(function(){
  if(window.MP_WOODY_SLICE_FIX_V5) return;

      const v = typeof VERSION !== "undefined" ? VERSION : Date.now();

      // IMPORTANT: use woody_fixed instead of woody.
      // The older patch loaded woody as 128x128, which slices this 1304x820 sheet wrong.
      if(!scene.textures.exists("woody_fixed")){
        scene.load.spritesheet("woody_fixed", "assets/sprites/enemies/woody.png?v=" + v, {
          frameWidth: WOODY_FRAME_W,
          frameHeight: WOODY_FRAME_H,

        });

      attackCooldownMax:999999,
      attackDamage:0,
      canBeGrabbed:true,
      knockbackResist:0.25
    };

  function makeWoodyAnimSet(scene){

    [
      "woody_idle","woody_walk","woody_punch","woody_kick",
      "woody_hurt","woody_knockback","woody_ko","woody_taunt","woody_special"
    ].forEach(key=>{
      try{
        if(scene.anims.exists(key)) scene.anims.remove(key);

    });

    // Uploaded sheet layout:

    // Row 4 frames 24-31 hurt / recoil
    // Row 5 frames 32-39 down / KO
    makeAnim(scene,"woody_idle",      "woody_fixed", 0, 7, 8, -1);

    makeAnim(scene,"woody_kick",      "woody_fixed", 16, 23, 10, 0);
    makeAnim(scene,"woody_hurt",      "woody_fixed", 24, 31, 8, 0);

  }

  if(typeof createAllAnims === "function"){

    createAllAnims = function(scene){
      MP_OLD_CREATE_ALL_ANIMS_WOODY_SLICE_V5(scene);

  if(typeof Game !== "undefined" && Game.prototype){

    Game.prototype.spawnEnemyType = function(type,x,y,platform="middle"){

      if(type === "woody" && e && e.sprite){
        e.sprite.setTexture("woody_fixed", 0);
        e.sprite.setFrame(0);

        e.chaseSpeed = 0;
        e.vx = 0;
        e.busy = false;
        e.state = "idle";
        this.safeEnemyPlay(e,"idle");

    Game.prototype.createEnemies = function(){

   - No roof/platform snapping, ladders, stairs, or extra lanes in training.

/* =========================================================
   TRAINING FLOOR VISUAL + HUD METER PATCH V730
   - Fixes Jackson visual float by correcting movement/action origins.
   - Stops JT action growth by using stable action scale.
   - Keeps jump animation on the player sprite.
   - Rebuilds training HUD: face box, HP bar, groove bar, combo dots.
========================================================= */
(function(){
  if(window.MP_TRAINING_VISUAL_HUD_PATCH_V730) return;
  window.MP_TRAINING_VISUAL_HUD_PATCH_V730 = true;

  function mpvSel(){
    try{
      return String(getSelectedFighterId ? getSelectedFighterId() : (window.selectedFighter || "DONNY")).toLowerCase();
    }catch(e){
      return String(window.selectedFighter || "DONNY").toLowerCase();
    }
  }

  function mpvFaceKey(){
    const id = mpvSel();
    if(id === "jt") return "hud_face_jt";
    if(id === "hew") return "hud_face_hew";
    if(id === "jackson") return "hud_face_jackson";
    return "hud_face_donny";
  }

  function mpvApplySpriteVisualRules(scene){
    if(!scene || !scene.player) return;

    const id = mpvSel();

    // Jackson's movement sheet has extra bottom padding, so the sprite looks like it floats
    // unless the visual anchor is pulled upward.
    if(id === "jackson" && !scene.playerBusy && !scene.isJumping && !scene.isClimbing){
      scene.player.setOrigin(0.5, 0.88);
      scene.player.setScale(0.46);
    }else if(!scene.isJumping){
      scene.player.setOrigin(0.5, 1);
    }

    if(scene.poseSprite){
      if(id === "jackson"){
        scene.poseSprite.setOrigin(0.5, 0.88);
      }else{
        scene.poseSprite.setOrigin(0.5, 1);
      }
    }
  }

  // Stable visual scales. These override earlier scale passes without touching the asset loader.
  Game.prototype.getPlayerMoveScale = function(){
    const id = mpvSel();
    if(id === "hew") return 0.46;
    if(id === "donny") return 0.46;
    if(id === "jackson") return 0.46;
    return 0.54; // JT
  };

  Game.prototype.getPlayerAttackScale = function(){
    const id = mpvSel();
    if(id === "hew") return 0.46;
    if(id === "donny") return 0.46;
    if(id === "jackson") return 0.46;
    return 0.40; // JT attacks are visually larger inside their attack sheet.

  Game.prototype.getPlayerActionScale = function(){
    const id = mpvSel();
    if(id === "hew") return 0.46;
    if(id === "donny") return 0.46;

    return 0.44; // JT actions were growing; keep them below walk scale.

  const MP_OLD_POSITION_ATTACK_V730 = Game.prototype.positionAttackSprite;
  Game.prototype.positionAttackSprite = function(type){

  const MP_OLD_SHOW_POSE_V730 = Game.prototype.showPose;

    if(id === "jt") fixedScale = this.getPlayerActionScale();

  // Keep jump on the player sprite and use the character's own jump animation when present.
  const MP_OLD_START_JUMP_V730 = Game.prototype.startJump;
  Game.prototype.startJump = function(force){

  function mpvDestroyHud(scene){

      "mpHudFaceBox","mpHudFace","mpHudHpLabel","mpHudHpBack","mpHudHpFill",

    this.mpHudHpFill = addItem(this.add.rectangle(x + 60, y + 18, 160, 4, 0x7CFF6B, 1)

    this.mpHudGrooveLabel = addItem(this.add.text(x + 12, y + 40, "GROOVE", {

      .setOrigin(0,0.5)

  Game.prototype.refreshPlayerTrainingHUD = function(){
    if(!this.mpTrainingHudBuilt) return;
    mpvHideOldHudText(this);

    const hp = Phaser.Math.Clamp(this.playerHealth || 0, 0, 100);
    if(this.mpHudHpFill) this.mpHudHpFill.setScale(hp / 100, 1);

    if(typeof this.mpGrooveValue !== "number") this.mpGrooveValue = 0;
    const groove = Phaser.Math.Clamp(this.mpGrooveValue, 0, 10);
    if(this.mpHudGrooveFill) this.mpHudGrooveFill.setScale(groove / 10, 1);

    if(typeof this.mpComboMeter !== "number") this.mpComboMeter = 0;
    const comboMeter = Phaser.Math.Clamp(this.mpComboMeter, 0, 100);

  const MP_OLD_DAMAGE_ENEMY_V730 = Game.prototype.damageEnemy;
  Game.prototype.damageEnemy = function(e,damage,stagger){

    const ret = MP_OLD_DAMAGE_ENEMY_V730 ? MP_OLD_DAMAGE_ENEMY_V730.call(this,e,damage,stagger) : undefined;
    if(e && before !== null && before > (e.health || 0)){
      this.mpComboHitStreak = (this.mpComboHitStreak || 0) + 1;
      if(typeof this.mpComboMeter !== "number") this.mpComboMeter = 0;
      this.mpComboMeter = Phaser.Math.Clamp(this.mpComboMeter + 10, 0, 100);

      if(typeof this.mpGrooveValue !== "number") this.mpGrooveValue = 0;
      this.mpGrooveValue = Phaser.Math.Clamp(this.mpGrooveValue + 0.35, 0, 10);
    }
    return ret;
  };

  const MP_OLD_SAFE_UPDATE_V730 = Game.prototype.safeUpdate;
  Game.prototype.safeUpdate = function(time,delta){
    const ret = MP_OLD_SAFE_UPDATE_V730 ? MP_OLD_SAFE_UPDATE_V730.call(this,time,delta) : undefined;

    const dt = Math.min(delta || 16.67, 33.33) / 1000;
    if(typeof this.mpGrooveValue !== "number") this.mpGrooveValue = 0;

    // Slow passive groove fill over time.
    if(this.matchStarted && !this.matchOver && !this.pauseMenuOpen){
      this.mpGrooveValue = Phaser.Math.Clamp(this.mpGrooveValue + dt * 0.35, 0, 10);
    }

    mpvApplySpriteVisualRules(this);
    if(this.refreshPlayerTrainingHUD) this.refreshPlayerTrainingHUD();

    return ret;
  };

  const MP_OLD_CREATE_V730 = Game.prototype.create;
  Game.prototype.create = function(){
    const ret = MP_OLD_CREATE_V730 ? MP_OLD_CREATE_V730.call(this) : undefined;

    this.time.delayedCall(60,()=>{
      if(this.buildPlayerTrainingHUD) this.buildPlayerTrainingHUD();
      if(this.refreshPlayerTrainingHUD) this.refreshPlayerTrainingHUD();
      mpvApplySpriteVisualRules(this);
    });

    return ret;
  };
})();



/* =========================================================
   JT CHARACTER COMBO ENGINE PATCH V734
   - Uses jt_combos.png sheet.
   - Combo meter is 0-100 instead of two dots.
   - Landed hits fill combo meter by 10.
   - Any combo requires 50 meter and spends 50.
   - Confirmed combos trigger short slow-mo, enemy stun, and strength knockback.
========================================================= */
(function(){
  if(window.MP_JT_COMBO_ENGINE_PATCH_V734) return;
  window.MP_JT_COMBO_ENGINE_PATCH_V734 = true;

  const MP_JT_COMBO_WINDOW = 650;
  const MP_COMBO_COST = 50;

  const MP_JT_COMBOS = [
    {
      id:"jt_hi_hat_havoc",
      name:"HI-HAT HAVOC",
      seq:["light","light","heavy"],
      inputLabel:"Y, Y, X",
      anim:"jt_combo_1",
      bonusDamage:9,
      stun:760,
      knockback:210,
      hitStop:300,
      color:0xffdd55,
      type:"strike"
    },
    {
      id:"jt_pink_slip_kick",
      name:"PINK SLIP KICK",
      seq:["light","kick","heavy"],
      inputLabel:"Y, A, X",
      anim:"jt_combo_2",
      bonusDamage:11,
      stun:860,
      knockback:275,
      hitStop:340,
      color:0xff4fc3,
      type:"kick"
    },
    {
      id:"jt_stick_rocket",
      name:"STICK ROCKET",
      seq:["jumpLight","light","heavy"],
      inputLabel:"B, Y, X",
      anim:"jt_air_combo",
      bonusDamage:12,
      stun:960,
      knockback:335,
      hitStop:380,
      color:0xff4fc3,
      type:"projectile"
    },
    {
      id:"jt_yellowline_rush",
      name:"YELLOWLINE RUSH",
      seq:["light","light","special"],
      inputLabel:"Y, Y, SP",
      anim:"jt_combo_finisher",
      bonusDamage:16,
      stun:1120,
      knockback:410,
      hitStop:430,
      color:0xffdd55,
      type:"finisher"
    }
  ];
  function mpJtSelected(){
    try{
      return String(getSelectedFighterId ? getSelectedFighterId() : window.selectedFighter || "").toUpperCase() === "JT";
    }catch(e){
      return String(window.selectedFighter || "").toUpperCase() === "JT";
    }
  }

  function mpArrayStartsWith(a,b){
    if(!a || !b || b.length > a.length) return false;
    for(let i=0;i<b.length;i++){
      if(a[i] !== b[i]) return false;
    }
    return true;
  }

  function mpJtHasComboPrefix(seq){
    return MP_JT_COMBOS.some(c=>mpArrayStartsWith(c.seq,seq));
  }

  function mpJtGetCompleteCombo(seq){
    return MP_JT_COMBOS.find(c=>c.seq.length === seq.length && mpArrayStartsWith(c.seq,seq));
  }

  function mpJtGetNearestLiveEnemy(scene){
    if(!scene || !scene.enemies || !scene.player) return null;
    let best = null;
    let bestDist = 999999;
    scene.enemies.forEach(e=>{
      if(!e || e.dead) return;
      const dx = Math.abs(e.x - scene.player.x);
      const dy = Math.abs(e.y - scene.player.y);
      const d = dx + dy * 1.25;
      if(d < bestDist){ best = e; bestDist = d; }
    });
    return best;
  }

  function mpJtShowComboName(scene, combo){
    if(!scene || !combo) return;

    if(scene.mpJtComboText && scene.mpJtComboText.destroy){
      scene.mpJtComboText.destroy();
    }

    const x = scene.player ? scene.player.x : CX;
    const y = scene.player ? scene.player.y - 122 : SAFE_TOP + 120;

    scene.mpJtComboText = scene.add.text(x, y, combo.name + (combo.inputLabel ? "  " + combo.inputLabel : ""), {
      font:"20px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:5,
      backgroundColor:"#000000"
    }).setOrigin(0.5).setDepth(90000);

    scene.tweens.add({
      targets:scene.mpJtComboText,
      y:y-24,
      alpha:0,
      duration:760,
      ease:"Sine.easeOut",
      onComplete:()=>{
        if(scene.mpJtComboText && scene.mpJtComboText.destroy){
          scene.mpJtComboText.destroy();
          scene.mpJtComboText = null;
        }
      }
    });
  }

  function mpJtSlowMo(scene, duration){
    if(!scene) return;

    try{ scene.time.timeScale = 0.45; }catch(e){}
    try{ scene.tweens.timeScale = 0.45; }catch(e){}
    try{ scene.anims.globalTimeScale = 0.65; }catch(e){}

    window.setTimeout(()=>{
      try{ scene.time.timeScale = 1; }catch(e){}
      try{ scene.tweens.timeScale = 1; }catch(e){}
      try{ scene.anims.globalTimeScale = 1; }catch(e){}
    }, duration || 300);
  }

  function mpJtPlayComboAnimation(scene, combo){
    if(!scene || !combo || !scene.poseSprite || !scene.player) return;
    if(!hasAnim(scene, combo.anim)) return;

    scene.playerBusy = true;
    scene.busyUntil = Math.max(scene.busyUntil || 0, (scene.time ? scene.time.now : Date.now()) + 620);

    scene.poseSprite.setTexture("jt_combos");
    scene.poseSprite.setOrigin(0.5,1);
    scene.poseSprite.setScale(typeof JT_COMBO_SCALE === "number" ? JT_COMBO_SCALE : 0.86);
    scene.poseSprite.setPosition(scene.player.x, scene.player.y);
    scene.poseSprite.setFlipX(scene.player.flipX);
    scene.poseSprite.setDepth((scene.player.depth || 200) + 1);
    scene.poseSprite.setVisible(true);
    scene.player.setVisible(false);
    safePlay(scene.poseSprite, combo.anim);

    const dur = (combo.id === "jt_yellowline_rush" || combo.id === "jt_stick_rocket") ? 920 : 820;
    scene.time.delayedCall(dur,()=>{
      if(scene.poseSprite){
        scene.poseSprite.setVisible(false);
        scene.poseSprite.setTexture(scene.getPlayerAttackSheet ? scene.getPlayerAttackSheet() : "jt_attacks");
      }
      if(scene.player) scene.player.setVisible(true);
      scene.playerBusy = false;
    });
  }

  function mpJtSpendComboMeter(scene){
    if(!scene) return false;
    if(typeof scene.mpComboMeter !== "number") scene.mpComboMeter = 0;
    if(scene.mpComboMeter < MP_COMBO_COST) return false;
    scene.mpComboMeter = Phaser.Math.Clamp(scene.mpComboMeter - MP_COMBO_COST, 0, 100);
    if(scene.refreshPlayerTrainingHUD) scene.refreshPlayerTrainingHUD();
    return true;
  }

  function mpJtApplyComboBonus(scene,e,combo){
    if(!scene || !combo) return;
    if(!mpJtSpendComboMeter(scene)){
      if(scene.createHitFX && scene.player){
        scene.createHitFX(scene.player.x, scene.player.y - 105, "NEED 50% COMBO", 0);
      }
      return;
    }

    e = e || mpJtGetNearestLiveEnemy(scene);
    if(!e || e.dead) return;

    mpJtSlowMo(scene, combo.hitStop || 300);
    mpJtPlayComboAnimation(scene, combo);

    e.health -= combo.bonusDamage;
    scene.combo = (scene.combo || 0) + 1;
    scene.rhythm = Math.min(10,(scene.rhythm || 0) + 1);

    if(typeof scene.mpGrooveValue !== "number") scene.mpGrooveValue = 0;
    scene.mpGrooveValue = Phaser.Math.Clamp(scene.mpGrooveValue + 0.75, 0, 10);

    if(scene.createHitFX){
      scene.createHitFX(e.x, e.y - 70, combo.name, combo.bonusDamage);
    }

    // Projectile-style visual for Stick Rocket.
    if(combo.type === "projectile" && scene.add && scene.player){
      const dir = (e.x < scene.player.x) ? -1 : 1;
      const proj = scene.add.ellipse(scene.player.x + 28 * dir, scene.player.y - 58, 34, 12, combo.color || 0xff4fc3, 0.95)
        .setDepth(89999);
      scene.tweens.add({
        targets:proj,
        x:e.x,
        y:e.y - 58,
        alpha:0.15,
        scaleX:1.8,
        duration:220,
        ease:"Quad.easeOut",
        onComplete:()=>{ if(proj && proj.destroy) proj.destroy(); }
      });
    }

    e.busy = true;
    e.state = "combo_stunned";
    e.knockbackTime = combo.stun || 700;
    e.attackCooldown = Math.max(e.attackCooldown || 0, combo.stun || 700);

    const dir = (e.x < scene.player.x) ? -1 : 1;
    const resist = typeof e.knockbackResist === "number" ? e.knockbackResist : 1;
    e.vx = dir * (combo.knockback || 200) * resist;
    e.vy = 0;

    if(scene.safeEnemyPlay) scene.safeEnemyPlay(e,"knockback");

    if(e.health <= 0){
      if(scene.killEnemy) scene.killEnemy(e);
      return;
    }

    if(scene.updateEnemyHealthBar) scene.updateEnemyHealthBar(e);
    mpJtShowComboName(scene,combo);
  }

  function mpJtRecordComboHit(scene, action, enemy){
    if(!scene || !mpJtSelected() || !action) return;

    const now = scene.time ? scene.time.now : Date.now();
    if(!Array.isArray(scene.mpJtComboSeq)) scene.mpJtComboSeq = [];

    if(scene.mpJtLastComboTime && now - scene.mpJtLastComboTime > MP_JT_COMBO_WINDOW){
      scene.mpJtComboSeq = [];
    }

    scene.mpJtLastComboTime = now;
    scene.mpJtComboSeq.push(action);

    if(!mpJtHasComboPrefix(scene.mpJtComboSeq)){
      scene.mpJtComboSeq = mpJtHasComboPrefix([action]) ? [action] : [];
    }

    const combo = mpJtGetCompleteCombo(scene.mpJtComboSeq);
    if(combo){
      mpJtApplyComboBonus(scene,enemy,combo);
      scene.mpJtComboSeq = [];
      scene.mpJtLastComboTime = 0;
    }
  }

  const MP_OLD_CREATE_JT_COMBO_V734 = Game.prototype.create;
  Game.prototype.create = function(){
    const ret = MP_OLD_CREATE_JT_COMBO_V734 ? MP_OLD_CREATE_JT_COMBO_V734.call(this) : undefined;
    this.mpJtComboSeq = [];
    this.mpJtLastComboTime = 0;
    this.mpPendingAttackInput = null;
    this.mpPendingAttackWasJumping = false;
    this.mpComboMeter = typeof this.mpComboMeter === "number" ? this.mpComboMeter : 0;
    return ret;
  };

  const MP_OLD_START_ATTACK_JT_COMBO_V734 = Game.prototype.startAttack;
  Game.prototype.startAttack = function(type){
    this.mpPendingAttackInput = type;
    this.mpPendingAttackWasJumping = !!this.isJumping;
    return MP_OLD_START_ATTACK_JT_COMBO_V734 ? MP_OLD_START_ATTACK_JT_COMBO_V734.call(this,type) : undefined;
  };

  const MP_OLD_DAMAGE_ENEMY_JT_COMBO_V734 = Game.prototype.damageEnemy;
  Game.prototype.damageEnemy = function(e,damage,stagger){
    const before = e ? e.health : null;
    const ret = MP_OLD_DAMAGE_ENEMY_JT_COMBO_V734 ? MP_OLD_DAMAGE_ENEMY_JT_COMBO_V734.call(this,e,damage,stagger) : undefined;

    if(e && before !== null && before > (e.health || 0)){
      let action = this.mpPendingAttackInput;
      if(action === "light" && this.mpPendingAttackWasJumping){
        action = "jumpLight";
      }
      mpJtRecordComboHit(this, action, e);
    }

    return ret;
  };

  const MP_OLD_PLAYER_DAMAGE_JT_COMBO_RESET_V734 = Game.prototype.damagePlayer;
  if(MP_OLD_PLAYER_DAMAGE_JT_COMBO_RESET_V734){
    Game.prototype.damagePlayer = function(amount){
      this.mpJtComboSeq = [];
      this.mpJtLastComboTime = 0;
      return MP_OLD_PLAYER_DAMAGE_JT_COMBO_RESET_V734.call(this,amount);
    };
  }

  const MP_OLD_KEY_CREATE_SPECIAL_COMBO_V734 = Game.prototype.create;
  Game.prototype.create = function(){
    const ret = MP_OLD_KEY_CREATE_SPECIAL_COMBO_V734 ? MP_OLD_KEY_CREATE_SPECIAL_COMBO_V734.call(this) : undefined;
    if(this.input && this.input.keyboard){
      this.input.keyboard.on("keydown-V",()=>{
        if(!mpJtSelected()) return;
        this.mpPendingAttackInput = "special";
        this.mpPendingAttackWasJumping = false;
        mpJtRecordComboHit(this,"special",mpJtGetNearestLiveEnemy(this));
      });
    }
    return ret;
  };
})();




/* =========================================================
   TRAINING WOODY SIZE + ON/OFF FIGHTBACK PATCH V734
   - Makes Woody taller/larger in training.
   - Adds a screen-fixed ON/OFF button opposite the player HUD.
   - OFF: Woody stands still and does not respond.
   - ON: Woody aggressively chases and hits hard.
========================================================= */
(function(){
  if(window.MP_TRAINING_WOODY_TOGGLE_V734) return;
  window.MP_TRAINING_WOODY_TOGGLE_V734 = true;

  const MP_WOODY_TRAIN_SCALE_X = 0.44;
  const MP_WOODY_TRAIN_SCALE_Y = 0.50;
  const MP_WOODY_OFF_TINT = 0xffffff;
  const MP_WOODY_ON_TINT = 0xffdd55;

  function mpTrainingActive734(){
    return String(window.selectedGameMode || '').toLowerCase() === 'training' ||
           String(selectedLevel || '').toLowerCase() === 'training_dojo' ||
           String(selectedLevelName || '').toLowerCase().indexOf('training') >= 0;
  }

  function mpFindWoody(scene){
    if(!scene || !scene.enemies) return null;
    return scene.enemies.find(e=>e && e.enemyType === 'woody' && !e.dead) ||
           scene.enemies.find(e=>e && e.trainingDummy && !e.dead) || null;
  }

  function mpSizeWoody(scene,e){
    if(!scene || !e || !e.sprite) return;
    e.sprite.setOrigin(0.5,1);
    e.sprite.setScale(MP_WOODY_TRAIN_SCALE_X, MP_WOODY_TRAIN_SCALE_Y);
    e.enemyType = 'woody';
    e.enemyName = 'WOODY';
    e.enemyAuth = 'TRAIN';
    e.maxHealth = Math.max(e.maxHealth || 100, 120);
    e.health = Math.min(e.health || e.maxHealth, e.maxHealth);
    e.canBeGrabbed = true;
    e.knockbackResist = 0.2;
    if(e.nameText) e.nameText.setText('WOODY');
    if(e.authText) e.authText.setText('TRAIN');
    if(scene.updateEnemyHealthBar) scene.updateEnemyHealthBar(e);
    if(scene.updateEnemyVisuals) scene.updateEnemyVisuals(e);
  }

  function mpSetWoodyPassive(scene,e){
    if(!scene || !e) return;
    e.trainingDummy = true;
    e.woodyFightsBack = false;
    e.vx = 0;
    e.busy = false;
    e.state = 'idle';
    e.chaseSpeed = 0;
    e.attackRange = 0;
    e.stopRange = 0;
    e.attackDamage = 0;
    e.attackCooldown = 999999;
    e.attackCooldownMin = 999999;
    e.attackCooldownMax = 999999;
    if(e.sprite){
      e.sprite.clearTint();
      e.sprite.setTint(MP_WOODY_OFF_TINT);
      e.sprite.setOrigin(0.5,1);
      e.sprite.setScale(MP_WOODY_TRAIN_SCALE_X, MP_WOODY_TRAIN_SCALE_Y);
    }
    if(scene.safeEnemyPlay) scene.safeEnemyPlay(e,'idle');
    if(scene.updateEnemyVisuals) scene.updateEnemyVisuals(e);
  }

  function mpSetWoodyAggro(scene,e){
    if(!scene || !e) return;
    e.trainingDummy = true;
    e.woodyFightsBack = true;
    e.chaseSpeed = 185;
    e.attackRange = 104;
    e.stopRange = 86;
    e.attackDamage = 22;
    e.attackCooldownMin = 260;
    e.attackCooldownMax = 520;
    e.attackCooldown = Math.min(e.attackCooldown || 0, 160);
    e.knockbackResist = 0.16;
    if(e.sprite){
      e.sprite.clearTint();
      e.sprite.setTint(MP_WOODY_ON_TINT);
      e.sprite.setOrigin(0.5,1);
      e.sprite.setScale(MP_WOODY_TRAIN_SCALE_X, MP_WOODY_TRAIN_SCALE_Y);
    }
    if(scene.updateEnemyVisuals) scene.updateEnemyVisuals(e);
  }

  function mpRefreshWoodyButton(scene){
    if(!scene || !scene.mpWoodyToggleText || !scene.mpWoodyToggleBox) return;
    const on = !!scene.woodyAIOn;
    scene.mpWoodyToggleText.setText(on ? 'WOODY: ON' : 'WOODY: OFF');
    scene.mpWoodyToggleText.setFill(on ? '#000000' : '#ffffff');
    scene.mpWoodyToggleBox.setFillStyle(on ? 0xffdd55 : 0x111111, 0.92);
    scene.mpWoodyToggleBox.setStrokeStyle(3, on ? 0xfff45c : 0xffffff, 0.9);
  }

  function mpBuildWoodyToggle(scene){
    if(!scene || scene.mpWoodyToggleBuilt || !mpTrainingActive734()) return;
    scene.mpWoodyToggleBuilt = true;
    scene.woodyAIOn = false;

    const x = W - 112;
    const y = SAFE_TOP + 24;
    const w = 168;
    const h = 42;

    const box = scene.add.rectangle(x,y,w,h,0x111111,0.92)
      .setStrokeStyle(3,0xffffff,0.9)
      .setDepth(60000)
      .setScrollFactor(0)
      .setInteractive({useHandCursor:true});

    const txt = scene.add.text(x,y,'WOODY: OFF',{
      font:'16px monospace',
      fill:'#ffffff',
      stroke:'#000000',
      strokeThickness:4
    }).setOrigin(0.5).setDepth(60001).setScrollFactor(0);

    scene.mpWoodyToggleBox = box;
    scene.mpWoodyToggleText = txt;

    const toggle = ()=>{
      scene.woodyAIOn = !scene.woodyAIOn;
      const woody = mpFindWoody(scene);
      if(woody){
        if(scene.woodyAIOn) mpSetWoodyAggro(scene,woody);
        else mpSetWoodyPassive(scene,woody);
      }
      mpRefreshWoodyButton(scene);
    };

    box.on('pointerdown', toggle);
    txt.setInteractive({useHandCursor:true}).on('pointerdown', toggle);
    mpRefreshWoodyButton(scene);
  }

  if(typeof ENEMY_TYPES !== 'undefined'){
    ENEMY_TYPES.woody = Object.assign({}, ENEMY_TYPES.woody || {}, {
      key:'woody_fixed',
      prefix:'woody',
      label:'TRAIN',
      maxHealth:120,
      scale:MP_WOODY_TRAIN_SCALE_Y,
      chaseSpeed:0,
      attackRange:0,
      stopRange:0,
      attackCooldownMin:999999,
      attackCooldownMax:999999,
      attackDamage:0,
      canBeGrabbed:true,
      knockbackResist:0.2
    });
  }

  if(typeof Game === 'undefined' || !Game.prototype) return;

  const MP_OLD_CREATE_WOODY_TOGGLE_V734 = Game.prototype.create;
  Game.prototype.create = function(){
    MP_OLD_CREATE_WOODY_TOGGLE_V734.call(this);
    if(mpTrainingActive734()){
      mpBuildWoodyToggle(this);
      const woody = mpFindWoody(this);
      if(woody){
        mpSizeWoody(this,woody);
        mpSetWoodyPassive(this,woody);
      }
    }
  };

  const MP_OLD_CREATE_ENEMIES_WOODY_TOGGLE_V734 = Game.prototype.createEnemies;
  Game.prototype.createEnemies = function(){
    const result = MP_OLD_CREATE_ENEMIES_WOODY_TOGGLE_V734.call(this);
    if(mpTrainingActive734()){
      const woody = mpFindWoody(this);
      if(woody){
        mpSizeWoody(this,woody);
        if(this.woodyAIOn) mpSetWoodyAggro(this,woody);
        else mpSetWoodyPassive(this,woody);
      }
    }
    return result;
  };

  const MP_OLD_UPDATE_ENEMY_AI_WOODY_TOGGLE_V734 = Game.prototype.updateEnemyAI;
  Game.prototype.updateEnemyAI = function(delta){
    if(!mpTrainingActive734()){
      return MP_OLD_UPDATE_ENEMY_AI_WOODY_TOGGLE_V734.call(this,delta);
    }

    if(!this.enemies) return;
    const dt = Math.min(delta || 16.67,33.33) / 1000;

    this.enemies.forEach(e=>{
      if(!e || e.dead || e.state === 'dead') return;
      if(e.enemyType !== 'woody' && !e.trainingDummy) return;

      mpSizeWoody(this,e);
      e.platform = 'middle';
      e.homeY = e.y;

      if(e.attackCooldown > 0){
        e.attackCooldown -= delta;
        if(e.attackCooldown < 0) e.attackCooldown = 0;
      }

      if(!this.woodyAIOn){
        mpSetWoodyPassive(this,e);
        return;
      }

      mpSetWoodyAggro(this,e);

      if(e.grabbed || e.thrownTime > 0 || e.knockbackTime > 0){
        e.vx = 0;
        if(this.updateEnemyVisuals) this.updateEnemyVisuals(e);
        return;
      }

      if(e.busy){
        if(this.finishEnemyMove) this.finishEnemyMove(e,dt);
        return;
      }

      const dx = this.player.x - e.x;
      const dy = this.player.y - e.y;
      const dist = Math.abs(dx);
      const absDy = Math.abs(dy);
      const dir = dx >= 0 ? 1 : -1;

      if(e.sprite) e.sprite.setFlipX(dx < 0);

      if(absDy > 52){
        e.y += Math.sign(dy) * Math.min(Math.abs(dy), 65 * dt);
      }

      if(dist <= 112 && absDy <= 60 && e.attackCooldown <= 0){
        if(this.startEnemyAttack) this.startEnemyAttack(e);
        if(this.finishEnemyMove) this.finishEnemyMove(e,dt);
        return;
      }

      if(dist > 86){
        e.state = 'chase';
        e.vx = dir * 185;
        if(this.safeEnemyPlay) this.safeEnemyPlay(e,'walk');
      }else{
        e.state = 'idle';
        e.vx = 0;
        if(this.safeEnemyPlay) this.safeEnemyPlay(e,'idle');
      }

      if(this.finishEnemyMove) this.finishEnemyMove(e,dt);
      if(this.updateEnemyVisuals) this.updateEnemyVisuals(e);
    });
  };

  const MP_OLD_DAMAGE_ENEMY_WOODY_TOGGLE_V734 = Game.prototype.damageEnemy;
  Game.prototype.damageEnemy = function(e,damage,stagger){
    MP_OLD_DAMAGE_ENEMY_WOODY_TOGGLE_V734.call(this,e,damage,stagger);
    if(mpTrainingActive734() && e && (e.enemyType === 'woody' || e.trainingDummy)){
      this.time.delayedCall(80,()=>{
        if(!e || !e.sprite) return;
        mpSizeWoody(this,e);
        if(this.woodyAIOn) mpSetWoodyAggro(this,e);
        else mpSetWoodyPassive(this,e);
      });
    }
  };
})();



/* =========================================================
   JT TIMING + IMPACT POLISH PATCH V737
   - Slows JT combo rows slightly so 12-frame sheets read clearly.
   - Adds stronger hit stop, camera punch, flash, screen shake, and enemy stun feel.
   - Keeps existing controls, combo meter, Woody toggle, HUD, and game flow unchanged.
========================================================= */
(function(){
  if(window.MP_JT_TIMING_IMPACT_PATCH_V737) return;
  window.MP_JT_TIMING_IMPACT_PATCH_V737 = true;

  const MP_JT_COMBO_ANIMS = [
    {key:'jt_combo_1', sheet:'jt_combos', start:0, end:11, rate:12},
    {key:'jt_combo_2', sheet:'jt_combos', start:12, end:23, rate:12},
    {key:'jt_combo_finisher', sheet:'jt_combos', start:24, end:35, rate:11},
    {key:'jt_air_combo', sheet:'jt_combos', start:36, end:47, rate:12}
  ];

  const MP_JT_COMBO_NAMES = {
    'HI-HAT HAVOC':true,
    'PINK SLIP KICK':true,
    'STICK ROCKET':true,
    'YELLOWLINE RUSH':true
  };

  function mpImpactSelectedJT(){
    try{
      return String(getSelectedFighterId ? getSelectedFighterId() : window.selectedFighter || '').toUpperCase() === 'JT';
    }catch(e){
      return String(window.selectedFighter || '').toUpperCase() === 'JT';
    }
  }

  function mpImpactIsComboName(type){
    return !!MP_JT_COMBO_NAMES[String(type || '').toUpperCase()];
  }

  function mpImpactRebuildJtComboAnims(scene){
    if(!scene || !scene.anims || !hasTex(scene,'jt_combos')) return;

    MP_JT_COMBO_ANIMS.forEach(def=>{
      try{
        if(scene.anims.exists(def.key)) scene.anims.remove(def.key);
      }catch(e){}

      const frames=[];
      for(let i=def.start;i<=def.end;i++){
        if(textureHasFrame(scene,def.sheet,i)) frames.push({key:def.sheet,frame:i});
      }
      if(frames.length<=0) return;

      scene.anims.create({
        key:def.key,
        frames:frames,
        frameRate:def.rate,
        repeat:0
      });
    });
  }

  function mpImpactFreeze(scene, ms, scale){
    if(!scene) return;
    ms = ms || 90;
    scale = scale || 0.18;

    try{ scene.time.timeScale = scale; }catch(e){}
    try{ scene.tweens.timeScale = Math.max(scale,0.25); }catch(e){}
    try{ scene.anims.globalTimeScale = Math.max(scale,0.38); }catch(e){}

    window.setTimeout(()=>{
      try{ scene.time.timeScale = 1; }catch(e){}
      try{ scene.tweens.timeScale = 1; }catch(e){}
      try{ scene.anims.globalTimeScale = 1; }catch(e){}
    },ms);
  }


  function mpImpactFixedUiObjects(scene){
    const out=[];
    if(!scene) return out;
    const push=o=>{ if(o && !out.includes(o) && o.setScrollFactor && o.setScale) out.push(o); };

    [
      scene.zoneText,scene.comboText,scene.playerHealthText,scene.debugInputText,
      scene.playerHudBox,scene.mpHudFaceBox,scene.mpHudFace,
      scene.mpHudHpLabel,scene.mpHudHpBack,scene.mpHudHpFill,
      scene.mpHudGrooveLabel,scene.mpHudGrooveBack,scene.mpHudGrooveFill,
      scene.mpHudComboLabel,scene.mpHudComboBack,scene.mpHudComboFill,
      scene.mpWoodyToggleBox,scene.mpWoodyToggleText
    ].forEach(push);

    if(Array.isArray(scene.mpTrainingHudItems)){
      scene.mpTrainingHudItems.forEach(push);
    }

    if(scene.mobileUI){
      Object.keys(scene.mobileUI).forEach(k=>push(scene.mobileUI[k]));
    }

    if(Array.isArray(scene.mobileButtons)){
      scene.mobileButtons.forEach(btn=>{
        if(!btn) return;
        if(btn.setScale) push(btn);
        if(typeof btn === 'object'){
          Object.keys(btn).forEach(k=>push(btn[k]));
        }
      });
    }

    return out;
  }

  function mpImpactPulseFixedUi(scene, scale, duration){
    if(!scene || !scene.tweens) return;
    scale = scale || 1.04;
    duration = duration || 170;

    mpImpactFixedUiObjects(scene).forEach(obj=>{
      if(!obj || obj.destroyed) return;

      if(typeof obj.__mpImpactBaseX !== 'number') obj.__mpImpactBaseX = obj.x;
      if(typeof obj.__mpImpactBaseY !== 'number') obj.__mpImpactBaseY = obj.y;
      if(typeof obj.__mpImpactBaseScaleX !== 'number') obj.__mpImpactBaseScaleX = obj.scaleX || 1;
      if(typeof obj.__mpImpactBaseScaleY !== 'number') obj.__mpImpactBaseScaleY = obj.scaleY || 1;

      const bx = obj.__mpImpactBaseX;
      const by = obj.__mpImpactBaseY;
      const sx = obj.__mpImpactBaseScaleX;
      const sy = obj.__mpImpactBaseScaleY;

      try{ scene.tweens.killTweensOf(obj); }catch(e){}
      try{
        obj.x = CX + (bx - CX) * scale;
        obj.y = CY + (by - CY) * scale;
        obj.setScale(sx * scale, sy * scale);

        scene.tweens.add({
          targets:obj,
          x:bx,
          y:by,
          scaleX:sx,
          scaleY:sy,
          duration:duration,
          ease:'Quad.easeOut'
        });
      }catch(e){}
    });
  }
  function mpImpactCameraPunch(scene, strength){
    if(!scene || !scene.cameras || !scene.cameras.main) return;
    const cam = scene.cameras.main;

    // V740: no zoom punch until mobile HUD/control scaling is finalized.
    // Keep impact feel using shake + flash only so controls never get cut off.
    try{ cam.shake(120,0.009 + (strength || 0.04) * 0.05); }catch(e){}
    try{ cam.flash(70,255,244,92,false); }catch(e){}
  }

  function mpImpactBurst(scene,x,y,color,big){
    if(!scene || !scene.add) return;
    color = color || 0xffdd55;

    const ring = scene.add.circle(x,y,big ? 34 : 24,color,0.18)
      .setStrokeStyle(big ? 5 : 3,color,0.95)
      .setDepth(91000)
      .setBlendMode(Phaser.BlendModes.ADD);

    scene.tweens.add({
      targets:ring,
      scale:big ? 3.1 : 2.1,
      alpha:0,
      duration:big ? 260 : 170,
      ease:'Quad.easeOut',
      onComplete:()=>{ if(ring.destroy) ring.destroy(); }
    });

    const sparkCount = big ? 14 : 7;
    for(let i=0;i<sparkCount;i++){
      const a = (Math.PI * 2 / sparkCount) * i;
      const len = big ? Phaser.Math.Between(28,62) : Phaser.Math.Between(16,36);
      const sx = x + Math.cos(a) * 4;
      const sy = y + Math.sin(a) * 4;
      const spark = scene.add.rectangle(sx,sy,big ? 24 : 14,3,(i%2===0?0xffdd55:0xff4fc3),0.95)
        .setRotation(a)
        .setDepth(91001)
        .setBlendMode(Phaser.BlendModes.ADD);
      scene.tweens.add({
        targets:spark,
        x:sx + Math.cos(a) * len,
        y:sy + Math.sin(a) * len,
        alpha:0,
        scaleX:0.2,
        duration:big ? 260 : 150,
        ease:'Quad.easeOut',

  const MP_OLD_CREATE_ALL_ANIMS_IMPACT_V737 = window.createAllAnims;

  if(typeof Game !== 'undefined' && Game.prototype){

      const ret = MP_OLD_DAMAGE_ENEMY_IMPACT_V737 ? MP_OLD_DAMAGE_ENEMY_IMPACT_V737.call(this,e,damage,stagger) : undefined;
