 /* =========================================================
   ENEMY CLOSE-RANGE + TACTICAL AI PATCH
   - Enemies must get closer before attacks connect
   - Enemies pause / strafe / back off instead of all rushing
   - Only attacks when actually in hitting range
========================================================= */

const ENEMY_TACTICAL_DEBUG = false;

Game.prototype.getEnemyCloseAttackRange = function(e){
  if(!e) return 52;

  if(e.enemyType === "feral") return 58;
  if(e.enemyType === "corpo_sellout") return 62;
  if(e.enemyType === "corpo_wannabe") return 54;
  if(e.enemyType === "sellout") return 56;
  if(e.enemyType === "doorman") return 72;

  return 56;
};

Game.prototype.getEnemyStopRange = function(e){
  if(!e) return 70;

  if(e.enemyType === "feral") return 78;
  if(e.enemyType === "corpo_sellout") return 92;
  if(e.enemyType === "corpo_wannabe") return 78;
  if(e.enemyType === "sellout") return 84;
  if(e.enemyType === "doorman") return 88;

  return 82;
};

Game.prototype.getEnemyLaneRange = function(e){
  if(!e) return 34;

  if(e.enemyType === "doorman") return 42;
  if(e.enemyType === "feral") return 38;

  return 34;
};

Game.prototype.assignEnemyTactic = function(e, force=false){
  if(!e || e.dead) return;

  if(!force && e.tacticUntil && this.time.now < e.tacticUntil){
    return;
  }

  const roll = Phaser.Math.Between(0, 99);

  if(e.enemyType === "feral"){
    if(roll < 48){
      e.tacticState = "circle";
      e.tacticUntil = this.time.now + Phaser.Math.Between(450, 950);
    }else if(roll < 78){
      e.tacticState = "rush";
      e.tacticUntil = this.time.now + Phaser.Math.Between(350, 700);
    }else{
      e.tacticState = "wait";
      e.tacticUntil = this.time.now + Phaser.Math.Between(280, 650);
    }
    return;
  }

  if(e.enemyType === "corpo_sellout"){
    if(roll < 35){
      e.tacticState = "circle";
      e.tacticUntil = this.time.now + Phaser.Math.Between(700, 1300);
    }else if(roll < 60){
      e.tacticState = "backoff";
      e.tacticUntil = this.time.now + Phaser.Math.Between(420, 850);
    }else if(roll < 82){
      e.tacticState = "approach";
      e.tacticUntil = this.time.now + Phaser.Math.Between(650, 1200);
    }else{
      e.tacticState = "wait";
      e.tacticUntil = this.time.now + Phaser.Math.Between(350, 800);
    }
    return;
  }

  if(roll < 38){
    e.tacticState = "approach";
    e.tacticUntil = this.time.now + Phaser.Math.Between(550, 1000);
  }else if(roll < 62){
    e.tacticState = "circle";
    e.tacticUntil = this.time.now + Phaser.Math.Between(550, 1000);
  }else if(roll < 78){
    e.tacticState = "wait";
    e.tacticUntil = this.time.now + Phaser.Math.Between(300, 750);
  }else{
    e.tacticState = "backoff";
    e.tacticUntil = this.time.now + Phaser.Math.Between(350, 750);
  }
};

Game.prototype.normalizeEnemyCombatStats = function(e){
  if(!e) return;

  e.attackRange = this.getEnemyCloseAttackRange(e);
  e.stopRange = this.getEnemyStopRange(e);

  if(e.enemyType === "feral"){
    e.chaseSpeed = 118;
    e.attackCooldownMin = 520;
    e.attackCooldownMax = 1050;
  }

  if(e.enemyType === "corpo_sellout"){
    e.chaseSpeed = 82;
    e.attackCooldownMin = 650;
    e.attackCooldownMax = 1300;
  }

  if(e.enemyType === "corpo_wannabe"){
    e.chaseSpeed = 70;
    e.attackCooldownMin = 560;
    e.attackCooldownMax = 1150;
  }

  if(e.enemyType === "sellout"){
    e.chaseSpeed = 68;
    e.attackCooldownMin = 600;
    e.attackCooldownMax = 1250;
  }

  e.tacticState = e.tacticState || "approach";
  e.tacticUntil = this.time.now + Phaser.Math.Between(350, 900);
  e.smartSide = e.smartSide || (Phaser.Math.Between(0,1) === 0 ? -1 : 1);
  e.thinkDelay = Phaser.Math.Between(120, 420);
};

/* Patch spawn so every enemy gets tactical values */
const MP_ORIGINAL_SPAWN_ENEMY_TYPE_TACTICAL = Game.prototype.spawnEnemyType;

Game.prototype.spawnEnemyType = function(type,x,y,platform="middle"){
  const e = MP_ORIGINAL_SPAWN_ENEMY_TYPE_TACTICAL.call(this,type,x,y,platform);

  this.normalizeEnemyCombatStats(e);
  this.assignEnemyTactic(e,true);

  return e;
};

/* Replace personality override so old wide ranges do not come back */
Game.prototype.applyEnemyPersonality = function(e){
  if(!e) return;

  e.laneOffset = Phaser.Math.Between(-14,14);
  e.transitioning = false;
  e.pathCooldown = 0;
  e.smartSide = Phaser.Math.Between(0,1) === 0 ? -1 : 1;
  e.smartSwitchTime = this.time.now + Phaser.Math.Between(900,1800);

  this.normalizeEnemyCombatStats(e);
};

/* Close-range normal attack only */
Game.prototype.startEnemyAttack = function(e){
  if(!e || e.dead || e.busy) return;
  if(e.grabbed || e.thrownTime > 0) return;

  const dx = this.player.x - e.x;
  const dy = this.player.y - e.y;
  const dir = dx > 0 ? 1 : -1;

  const closeRange = this.getEnemyCloseAttackRange(e);
  const laneRange = this.getEnemyLaneRange(e);

  if(Math.abs(dx) > closeRange || Math.abs(dy) > laneRange){
    e.attackCooldown = Phaser.Math.Between(220, 520);
    this.assignEnemyTactic(e,true);
    return;
  }

  const useKick = Phaser.Math.Between(0,3) === 0;

  e.state = "attack";
  e.busy = true;
  e.attackCooldown = Phaser.Math.Between(
    e.attackCooldownMin || 600,
    e.attackCooldownMax || 1200
  );
  e.vx = 0;
  e.sprite.setFlipX(dx < 0);

  this.safeEnemyPlay(e, useKick ? "kick" : "punch");

  this.time.delayedCall(245, ()=>{
    if(!e || e.dead || e.state !== "attack") return;

    const hitDx = Math.abs(this.player.x - e.x);
    const hitDy = Math.abs(this.player.y - e.y);
    const finalRange = closeRange + (useKick ? 8 : 0);

    if(hitDx <= finalRange && hitDy <= laneRange){
      this.damagePlayer((e.attackDamage || 8) + (useKick ? 1 : 0), dir);
    }
  });

  this.time.delayedCall(560, ()=>{
    if(!e || e.dead) return;

    e.busy = false;
    e.state = "idle";
    e.vx = 0;
    this.assignEnemyTactic(e,true);
    this.safeEnemyPlay(e,"idle");
  });
};

/* Smarter corpo attack: close only */
Game.prototype.startSmartEnemyAttack = function(e){
  if(!e || e.dead || e.busy) return;

  const dx = this.player.x - e.x;
  const dy = this.player.y - e.y;
  const dir = dx > 0 ? 1 : -1;

  const closeRange = this.getEnemyCloseAttackRange(e);
  const laneRange = this.getEnemyLaneRange(e);

  if(Math.abs(dx) > closeRange || Math.abs(dy) > laneRange){
    e.attackCooldown = Phaser.Math.Between(260, 620);
    this.assignEnemyTactic(e,true);
    return;
  }

  const useKick = Phaser.Math.Between(0,1) === 1;

  e.state = "attack";
  e.busy = true;
  e.vx = 0;
  e.attackCooldown = Phaser.Math.Between(850,1500);
  e.sprite.setFlipX(dx < 0);

  this.safeEnemyPlay(e, useKick ? "kick" : "punch");

  this.time.delayedCall(280, ()=>{
    if(!e || e.dead || e.state !== "attack") return;

    const hitDx = Math.abs(this.player.x - e.x);
    const hitDy = Math.abs(this.player.y - e.y);

    if(hitDx <= closeRange + (useKick ? 10 : 0) && hitDy <= laneRange){
      this.damagePlayer((e.attackDamage || 8) + (useKick ? 2 : 0), dir);
    }
  });

  this.time.delayedCall(640, ()=>{
    if(!e || e.dead) return;

    e.busy = false;
    e.state = "idle";
    e.vx = 0;
    this.assignEnemyTactic(e,true);
    this.safeEnemyPlay(e,"idle");
  });
};

/* Feral rush is now shorter and must connect close */
Game.prototype.startFeralRush = function(e){
  if(!e || e.dead || e.busy) return;

  const dx = this.player.x - e.x;
  const dir = dx > 0 ? 1 : -1;

  e.state = "rush";
  e.busy = true;
  e.vx = dir * 170;
  e.attackCooldown = Phaser.Math.Between(950,1500);
  e.sprite.setFlipX(dx < 0);

  this.safeEnemyPlay(e,"walk");

  this.time.delayedCall(220, ()=>{
    if(!e || e.dead || e.state !== "rush") return;

    const hitDx = Math.abs(this.player.x - e.x);
    const hitDy = Math.abs(this.player.y - e.y);

    if(hitDx <= 62 && hitDy <= 38){
      this.damagePlayer(e.attackDamage || 7,dir);
    }
  });

  this.time.delayedCall(420, ()=>{
    if(!e || e.dead) return;

    e.busy = false;
    e.state = "idle";
    e.vx = 0;
    this.assignEnemyTactic(e,true);
    this.safeEnemyPlay(e,"idle");
  });
};

/* Main tactical AI replacement */
Game.prototype.updateEnemyAI = function(delta){
  const dt = delta / 1000;

  this.enemies.forEach(e=>{
    if(!e) return;

    if(e.grabbed || e.thrownTime > 0){
      this.updateEnemyVisuals(e);
      return;
    }

    if(e.attackCooldown > 0){
      e.attackCooldown -= delta;
      if(e.attackCooldown < 0) e.attackCooldown = 0;
    }

    if(e.knockbackTime > 0){
      e.knockbackTime -= delta;
      if(e.knockbackTime < 0) e.knockbackTime = 0;
    }

    if(e.specialCooldown > 0){
      e.specialCooldown -= delta;
      if(e.specialCooldown < 0) e.specialCooldown = 0;
    }

    if(e.dead || e.state === "dead"){
      e.dead = true;
      e.state = "dead";
      e.vx = 0;
      this.updateEnemyVisuals(e);
      return;
    }

    if(e.transitioning){
      this.updateEnemyVisuals(e);
      return;
    }

    if(e.knockbackTime > 0){
      e.y = e.homeY;
      this.finishEnemyMove(e,dt);
      return;
    }

    if(e.platform !== this.platform){
      e.y = e.homeY;
      this.updateEnemyNavigation(e,delta);
      this.finishEnemyMove(e,dt);
      return;
    }

    this.syncEnemyLane(e,delta);

    if(e.busy){
      this.finishEnemyMove(e,dt);
      return;
    }

    if(e.enemyType === "doorman"){
      this.updateDoormanAI(e,delta);
      this.finishEnemyMove(e,dt);
      return;
    }

    if(this.playerHealth <= 0){
      e.state = "idle";
      e.vx = 0;
      this.safeEnemyPlay(e,"idle");
      this.finishEnemyMove(e,dt);
      return;
    }

    if(!e.tacticState || !e.tacticUntil || this.time.now > e.tacticUntil){
      this.assignEnemyTactic(e,true);
    }

    const dx = this.player.x - e.x;
    const dy = this.player.y - e.y;
    const dist = Math.abs(dx);
    const absDy = Math.abs(dy);
    const dir = dx > 0 ? 1 : -1;

    const closeRange = this.getEnemyCloseAttackRange(e);
    const stopRange = this.getEnemyStopRange(e);
    const laneRange = this.getEnemyLaneRange(e);

    e.sprite.setFlipX(dx < 0);

    // Do not dogpile: enemies near other enemies hesitate or strafe.
    let crowdPenalty = 0;
    this.enemies.forEach(other=>{
      if(!other || other === e || other.dead) return;
      if(other.platform !== e.platform) return;

      const gap = Math.abs(other.x - e.x);
      const sameLane = Math.abs(other.y - e.y) < 38;

      if(gap < 82 && sameLane){
        crowdPenalty++;
      }
    });

    if(crowdPenalty >= 2 && e.tacticState !== "backoff"){
      e.tacticState = Phaser.Math.Between(0,1) === 0 ? "circle" : "wait";
      e.tacticUntil = this.time.now + Phaser.Math.Between(350,800);
    }

    // Too far vertically: line up first, do not swing from far away.
    if(absDy > laneRange + 20){
      e.vx = dir * 48;
      this.safeEnemyPlay(e,"walk");
      this.finishEnemyMove(e,dt);
      return;
    }

    // Feral has rush chance, but only after thinking and only from medium range.
    if(e.enemyType === "feral"){
      if(
        e.tacticState === "rush" &&
        e.attackCooldown <= 0 &&
        dist > closeRange &&
        dist <= 145 &&
        absDy <= laneRange
      ){
        this.startFeralRush(e);
        this.finishEnemyMove(e,dt);
        return;
      }
    }

    // Close enough: only then attack.
    if(dist <= closeRange && absDy <= laneRange && e.attackCooldown <= 0){
      if(e.enemyType === "corpo_sellout"){
        this.startSmartEnemyAttack(e);
      }else{
        this.startEnemyAttack(e);
      }

      this.finishEnemyMove(e,dt);
      return;
    }

    // Tactical movement states.
    if(e.tacticState === "wait"){
      e.vx = 0;
      this.safeEnemyPlay(e,"idle");

      this.finishEnemyMove(e,dt);
      return;
    }

    if(e.tacticState === "backoff"){
      if(dist < stopRange + 25){
        e.vx = -dir * 65;
        this.safeEnemyPlay(e,"walk");
      }else{
        e.vx = 0;
        this.safeEnemyPlay(e,"idle");
      }

      this.finishEnemyMove(e,dt);
      return;
    }

    if(e.tacticState === "circle"){
      if(dist > stopRange + 35){
        e.vx = dir * (e.chaseSpeed || 70);
      }else{
        e.vx = (e.smartSide || 1) * 45;
      }

      this.safeEnemyPlay(e,"walk");
      this.applyEnemySeparation(e);
      this.finishEnemyMove(e,dt);
      return;
    }

    // Default approach: move in, but stop outside striking range.
    if(dist > stopRange){
      e.state = "chase";
      e.vx = dir * (e.chaseSpeed || 70);
      this.safeEnemyPlay(e,"walk");
    }else if(dist > closeRange){
      e.state = "measure";
      e.vx = dir * 24;
      this.safeEnemyPlay(e,"walk");
    }else{
      e.state = "idle";
      e.vx = 0;
      this.safeEnemyPlay(e,"idle");
    }

    this.applyEnemySeparation(e);
    this.finishEnemyMove(e,dt);
  });
};

/* Optional debug: shows enemy tactic above their heads */
Game.prototype.updateEnemyTacticalDebug = function(){
  if(!ENEMY_TACTICAL_DEBUG || !this.enemies) return;

  this.enemies.forEach(e=>{
    if(!e || e.dead) return;

    if(!e.tacticText){
      e.tacticText = this.add.text(e.x, e.y - 154, "", {
        font:"10px monospace",
        fill:"#7CFF6B",
        backgroundColor:"#000000"
      }).setOrigin(0.5).setDepth(16000);
    }

    e.tacticText.setText(e.tacticState || "");
    e.tacticText.x = e.x;
    e.tacticText.y = e.y - 154;
  });
};

const MP_ORIGINAL_SAFE_UPDATE_TACTICAL = Game.prototype.safeUpdate;

Game.prototype.safeUpdate = function(time,delta){
  MP_ORIGINAL_SAFE_UPDATE_TACTICAL.call(this,time,delta);
  this.updateEnemyTacticalDebug();
};

Game.prototype.getWaveDifficulty = function(index){
  return WAVE_DIFFICULTY[index] || WAVE_DIFFICULTY[WAVE_DIFFICULTY.length - 1];
};

Game.prototype.applyWaveScalingToEnemy = function(e, spawnData){
  if(!e || e.enemyType === "doorman") return;

  const waveIndex = this.enemyWaveIndex || 0;
  const diff = this.getWaveDifficulty(waveIndex);
  const elite = spawnData && spawnData.elite;

  const eliteHpBonus = elite ? 1.25 : 1.0;
  const eliteDmgBonus = elite ? 1.12 : 1.0;

  const oldMax = e.maxHealth || 20;

  e.maxHealth = Math.round(oldMax * diff.hp * eliteHpBonus);
  e.health = e.maxHealth;

  e.attackDamage = Math.max(
    1,
    Math.round((e.attackDamage || 7) * diff.dmg * eliteDmgBonus)
  );

  e.chaseSpeed = Math.round((e.chaseSpeed || 70) * diff.speed);

  e.attackCooldownMin = Math.max(
    220,
    Math.round((e.attackCooldownMin || 600) * diff.cooldown)
  );

  e.attackCooldownMax = Math.max(
    e.attackCooldownMin + 120,
    Math.round((e.attackCooldownMax || 1200) * diff.cooldown)
  );

  e.attackCooldown = Phaser.Math.Between(
    e.attackCooldownMin,
    e.attackCooldownMax
  );

  // Elite enemies get a small visual cue.
  if(elite && e.sprite){
    e.sprite.setTint(0xfff45c);
    this.time.delayedCall(800, ()=>{
      if(e && e.sprite && !e.dead){
        e.sprite.clearTint();
      }
    });
  }

  if(elite){
    e.enemyAuth = "ELITE";
    if(e.authText){
      e.authText.setText("ELITE");
      e.authText.setFill("#fff45c");
    }
  }

  if(this.updateEnemyHealthBar){
    this.updateEnemyHealthBar(e);
  }
};

/* Override intro enemy spawn so wave scaling applies cleanly */
Game.prototype.spawnIntroEnemy = function(sourceX, sourceY, spawn, delay, sourceKind){
  this.time.delayedCall(delay, ()=>{
    const e = this.spawnEnemyType(
      spawn.type,
      sourceX,
      sourceY,
      spawn.platform
    );

    this.applyWaveScalingToEnemy(e, spawn);

    e.busy = true;
    e.transitioning = true;
    e.invulnerable = true;
    e.state = "intro";
    e.vx = 0;
    e.attackCooldown = 999999;
    e.homeY = sourceY;

    this.safeEnemyPlay(e,"knockback");

    const startX = sourceX;
    const startY = sourceY;
    const endX = spawn.x;
    const endY = spawn.y;

    const jumpHeight = sourceKind === "helicopter" ? 35 : 70;
    const duration = sourceKind === "helicopter" ? 760 : 560;

    this.tweens.addCounter({
      from:0,
      to:1,
      duration:duration,
      ease:"Linear",
      onUpdate:tween=>{
        const t = tween.getValue();

        e.x = Phaser.Math.Linear(startX, endX, t);
        e.y = Phaser.Math.Linear(startY, endY, t) - Math.sin(t * Math.PI) * jumpHeight;
        e.homeY = e.y;

        this.updateEnemyVisuals(e);
      },
      onComplete:()=>{
        e.x = endX;
        e.y = endY;
        e.homeY = endY;
        e.platform = spawn.platform;
        e.vx = 0;
        e.busy = false;
        e.transitioning = false;
        e.invulnerable = false;
        e.state = "idle";

        e.attackCooldown = Phaser.Math.Between(
          e.attackCooldownMin || 500,
          e.attackCooldownMax || 950
        );

        if(this.assignEnemyTactic){
          this.assignEnemyTactic(e,true);
        }

        this.safeEnemyPlay(e,"idle");
        this.updateEnemyVisuals(e);
        this.createHitFX(e.x, e.y - 50, "jump", 5);
      }
    });
  });
};

/* Cleaner wave status text */
const MP_ORIGINAL_SPAWN_ENEMY_WAVE_9WAVES = Game.prototype.spawnEnemyWave;

Game.prototype.spawnEnemyWave = function(index){
  if(!this.enemyWaves || index >= this.enemyWaves.length){
    return false;
  }

  this.enemyWaveIndex = index;

  const diff = this.getWaveDifficulty(index);
  const waveName = diff.label || ("WAVE " + (index + 1));

  if(this.zoneText){
    this.zoneText.setText(waveName + " INCOMING");
  }

  return MP_ORIGINAL_SPAWN_ENEMY_WAVE_9WAVES.call(this,index);
};

/* Better transition text between waves */
Game.prototype.advanceEnemyWaveOrBoss = function(){
  if(this.waveSpawning) return;

  const aliveNormalEnemies = this.getAliveNormalEnemyCount();

  if(aliveNormalEnemies > 0){
    return;
  }

  const nextWave = this.enemyWaveIndex + 1;

  if(this.enemyWaves && nextWave < this.enemyWaves.length){
    this.waveSpawning = true;

    const diff = this.getWaveDifficulty(nextWave);
    const waveName = diff.label || ("WAVE " + (nextWave + 1));

    if(this.zoneText){
      this.zoneText.setText(waveName + " INCOMING");
    }

    this.time.delayedCall(1000, ()=>{
      this.spawnEnemyWave(nextWave);
    });

    return;
  }

  // After wave 9, spawn Doorman.
  if(!this.doormanSpawned){
    if(DISABLE_DOORMAN_FOR_TEST){
      this.showVictory();
    }else{
      if(this.zoneText){
        this.zoneText.setText("DOORMAN APPROACHING");
      }

      this.time.delayedCall(900, ()=>{
        this.spawnDoormanIntro();
      });
    }
  }
};

/* =========================================================
   LEFTY LOWER STREET SCREEN PATCH — AREA DEFINED VERSION
   - Main Lefty's/outdoor screen -> lower street screen
   - Lower screen has defined top/middle/bottom combat areas
   - Enemies follow between screens and keep fighting
   - Top area = street for future cars/buses
   - Middle/bottom = open fighting space
========================================================= */

const LEFTY_SCREEN_MAIN_V2 = "lefty_main";
const LEFTY_SCREEN_LOWER_V2 = "lefty_lower";

/*
  LOWER STREET AREA MAP
  H = 540

  top:
    upper street / crossing area
    wide enough for future cars and buses

  middle:
    main lower combat floor

  bottom:
    front lower combat lane

  left stair:
    connects upper street to lower combat floor
*/
function getLeftyLowerBounds(){
  return {
    top: {
      minX: 70,
      maxX: W - 70,
      minY: 150,
      maxY: 150
    },
    middle: {
      minX: 80,
      maxX: W - 80,
      minY: 382,
      maxY: 382
    },
    bottom: {
      minX: 85,
      maxX: W - 85,
      minY: 505,
      maxY: 505
    }
  };
}

function getLeftyLowerPlatformY(platform){
  const b = getLeftyLowerBounds()[platform] || getLeftyLowerBounds().middle;
  return Math.round((b.minY + b.maxY) * 0.5);
}

const LEFTY_LOWER_STAIR = {
  name: "lower_left_stair",
  x: 112,
  y: 285,
  w: 140,
  h: 260,

  topX: 115,
  topY: 150,
  topPlatform: "top",

  middleX: 145,
  middleY: 382,
  bottomPlatform: "middle"
};

Game.prototype.isLeftyOutdoorLevel = function(){
  return selectedLevel === "outdoor";
};

Game.prototype.isLeftyLowerScreen = function(){
  return this.isLeftyOutdoorLevel && this.isLeftyOutdoorLevel() &&
    this.leftyScreen === LEFTY_SCREEN_LOWER_V2;
};

Game.prototype.getLeftyScreenTexture = function(){
  if(this.leftyScreen === LEFTY_SCREEN_LOWER_V2 && hasTex(this,"lefty_lower_street")){
    return "lefty_lower_street";
  }

  return hasTex(this,"outdoor") ? "outdoor" : selectedLevel;
};

Game.prototype.setupLeftyScreenSystem = function(){
  if(!this.isLeftyOutdoorLevel()) return;

  this.leftyScreen = LEFTY_SCREEN_MAIN_V2;
  this.leftyScreenTransitioning = false;
  this.lowerLaneShiftBusy = false;

  this.leftyScreenBg = this.add.image(CX, CY, this.getLeftyScreenTexture())
    .setDisplaySize(W, H)
    .setDepth(1);

  this.leftyScreenPrompt = this.add.text(CX, H - 92, "", {
    font: "16px monospace",
    fill: "#7CFF6B",
    backgroundColor: "#000000",
    stroke: "#000000",
    strokeThickness: 3
  })
    .setOrigin(0.5)
    .setDepth(12000)
    .setScrollFactor(0);
};

const MP_ORIGINAL_GAME_CREATE_LEFTY_SCREEN_V2 = Game.prototype.create;

Game.prototype.create = function(){
  MP_ORIGINAL_GAME_CREATE_LEFTY_SCREEN_V2.call(this);

const MP_ORIGINAL_GET_CURRENT_PLATFORM_BOUNDS_V2 = Game.prototype.getCurrentPlatformBounds;

Game.prototype.getCurrentPlatformBounds = function(){
  if(this.isLeftyLowerScreen()){
    const bounds = getLeftyLowerBounds();
    return bounds[this.platform] || bounds.middle;
  }

  if(MP_ORIGINAL_GET_CURRENT_PLATFORM_BOUNDS_V2){
    return MP_ORIGINAL_GET_CURRENT_PLATFORM_BOUNDS_V2.call(this);
  }

  return PLATFORM_BOUNDS[this.platform] || PLATFORM_BOUNDS.middle;
};

Game.prototype.applyPlatformBounds = function(){
  const bounds = this.getCurrentPlatformBounds();

  this.player.x = Phaser.Math.Clamp(
    this.player.x,
    bounds.minX,
    bounds.maxX
  );

  if(this.isLeftyLowerScreen()){
    this.player.y = getLeftyLowerPlatformY(this.platform);
  }else{
    this.player.y = getPlatformY(this.platform);
  }
};

/* =========================================================
   SCREEN TRANSITION
========================================================= */

Game.prototype.updateLeftyScreenPrompt = function(){
  if(!this.isLeftyOutdoorLevel()) return;
  if(!this.leftyScreenPrompt || !this.player) return;

  if(this.leftyScreenTransitioning || this.pauseMenuOpen || this.matchOver){
    this.leftyScreenPrompt.setText("");
    return;
  }

  if(this.leftyScreen === LEFTY_SCREEN_MAIN_V2 && this.platform === "bottom"){
    this.leftyScreenPrompt.setText("HOLD DOWN: CROSS STREET");
    return;
  }

  if(this.leftyScreen === LEFTY_SCREEN_LOWER_V2){
    if(this.platform === "top"){
      this.leftyScreenPrompt.setText("HOLD UP: BACK TO LEFTY'S    HOLD DOWN NEAR STAIRS");
      return;
    }

    if(this.platform === "middle"){
      this.leftyScreenPrompt.setText("DOWN: FRONT LANE    UP NEAR STAIRS: STREET");
      return;
    }

    if(this.platform === "bottom"){
      this.leftyScreenPrompt.setText("UP: MAIN FIGHT LANE");
      return;
    }
  }

  this.leftyScreenPrompt.setText("");
};

Game.prototype.checkLeftyScreenTransition = function(){
  if(!this.isLeftyOutdoorLevel()) return;
  if(this.leftyScreenTransitioning) return;
  if(!this.matchStarted || this.matchOver || this.pauseMenuOpen) return;
  if(this.waveSpawning || this.doormanIntroActive) return;
  if(this.playerBusy || this.isClimbing || this.isJumping) return;

  // Main Lefty's screen -> lower street.
  if(this.leftyScreen === LEFTY_SCREEN_MAIN_V2){
    if(this.platform === "bottom" && this.moveY > 0.65){
      this.startLeftyScreenTransition(LEFTY_SCREEN_LOWER_V2);
      return;
    }
  }

  // Lower street -> back to Lefty's screen.
  if(this.leftyScreen === LEFTY_SCREEN_LOWER_V2){
    if(this.platform === "top" && this.moveY < -0.65){
      this.startLeftyScreenTransition(LEFTY_SCREEN_MAIN_V2);
      return;
    }
  }
};

Game.prototype.startLeftyScreenTransition = function(targetScreen){
  if(this.leftyScreenTransitioning) return;

  this.leftyScreenTransitioning = true;
  this.playerBusy = true;
  this.busyUntil = this.time.now + 900;

  if(this.clearGrabTimers){
    this.clearGrabTimers();
  }

  if(this.grabbedEnemy){
    this.grabbedEnemy.grabbed = false;
    this.grabbedEnemy.busy = false;
    this.grabbedEnemy = null;
    this.grabMode = "none";
  }

  const fade = this.add.rectangle(CX, CY, W, H, 0x000000, 0)
    .setDepth(30000)
    .setScrollFactor(0);

  const labelText = targetScreen === LEFTY_SCREEN_LOWER_V2
    ? "CROSSING STREET"
    : "LEFTY'S";

  const label = this.add.text(CX, CY, labelText, {
    font: "42px monospace",
    fill: "#ff4fc3",
    stroke: "#000000",
    strokeThickness: 7
  })
    .setOrigin(0.5)
    .setAlpha(0)
    .setDepth(30001)
    .setScrollFactor(0);

  this.tweens.add({
    targets: [fade, label],
    alpha: 1,
    duration: 220,
    ease: "Linear",
    onComplete: ()=>{
      this.finishLeftyScreenSwap(targetScreen);

      this.tweens.add({
        targets: [fade, label],
        alpha: 0,
        duration: 260,
        delay: 150,
        ease: "Linear",
        onComplete: ()=>{
          fade.destroy();
          label.destroy();

          this.leftyScreenTransitioning = false;
          this.forcePlayerReady();
        }
      });
    }
  });
};

Game.prototype.finishLeftyScreenSwap = function(targetScreen){
  this.leftyScreen = targetScreen;

  if(this.leftyScreenBg){
    this.leftyScreenBg.setTexture(this.getLeftyScreenTexture());
    this.leftyScreenBg.setDisplaySize(W, H);
    this.leftyScreenBg.setDepth(1);
  }

  // Hide original Lefty's foreground-only overlay on lower street.
  if(this.barricadeFront){
    this.barricadeFront.setVisible(targetScreen === LEFTY_SCREEN_MAIN_V2);
  }

  if(targetScreen === LEFTY_SCREEN_LOWER_V2){
    // Enter on the upper street so it feels like crossing from Lefty's.
    this.platform = "top";
    this.player.x = Phaser.Math.Clamp(this.player.x, 180, W - 180);
    this.player.y = getLeftyLowerPlatformY("top");

    if(this.zoneText){
      this.zoneText.setText("UPPER STREET");
    }
  }else{
    // Return to original outdoor screen on bottom lane.
    this.platform = "bottom";
    this.player.x = Phaser.Math.Clamp(this.player.x, 180, W - 180);
    this.player.y = getPlatformY("bottom");

    if(this.zoneText){
      this.zoneText.setText("LEFTY'S OUTSIDE");
    }
  }

  if(this.shadow){
    this.shadow.x = this.player.x;
    this.shadow.y = this.player.y + 5;
  }

  this.moveLivingEnemiesToLeftyScreen(targetScreen);
};

Game.prototype.moveLivingEnemiesToLeftyScreen = function(targetScreen){
  if(!this.enemies || !this.player) return;

  const aliveEnemies = this.enemies.filter(e=>{
    return e && !e.dead && e.state !== "dead" && e.health > 0;
  });

  this.enemies.forEach(e=>{
    if(!e) return;

    if(e.dead || e.state === "dead" || e.health <= 0){
      if(this.hideEnemyUI) this.hideEnemyUI(e);
      if(e.sprite && e.sprite.destroy) e.sprite.destroy();
      if(e.shadow && e.shadow.destroy) e.shadow.destroy();
    }
  });

  this.enemies = aliveEnemies;

  const enemyPlatform = targetScreen === LEFTY_SCREEN_LOWER_V2 ? "top" : "bottom";
  const enemyY = targetScreen === LEFTY_SCREEN_LOWER_V2
    ? getLeftyLowerPlatformY("top")
    : getPlatformY("bottom");

  aliveEnemies.forEach((e, index)=>{
    const side = index % 2 === 0 ? -1 : 1;
    const spread = 95 + Math.floor(index / 2) * 58;

    e.platform = enemyPlatform;
    e.homeY = enemyY;
    e.y = enemyY;
    e.x = Phaser.Math.Clamp(this.player.x + side * spread, 140, W - 140);

    e.vx = 0;
    e.busy = false;
    e.transitioning = false;
    e.grabbed = false;
    e.thrownTime = 0;
    e.knockbackTime = 0;
    e.state = "idle";
    e.attackCooldown = Phaser.Math.Between(650, 1300);

    if(this.assignEnemyTactic){
      this.assignEnemyTactic(e, true);
    }

    this.safeEnemyPlay(e, "idle");

    if(this.updateEnemyHealthBar){
      this.updateEnemyHealthBar(e);
    }

    this.updateEnemyVisuals(e);
  });
};

/* =========================================================
   LOWER STREET AREA TRANSITIONS
========================================================= */

Game.prototype.isNearLowerStreetStairs = function(){
  if(!this.player) return false;

  return (
    Math.abs(this.player.x - LEFTY_LOWER_STAIR.x) < 75 &&
    (
      this.platform === "top" ||
      this.platform === "middle"
    )
  );
};

Game.prototype.startLowerStreetStairTravel = function(direction){
  if(!this.isLeftyLowerScreen()) return;
  if(this.lowerLaneShiftBusy) return;
  if(this.playerBusy || this.isClimbing || this.isJumping || this.playerHealth <= 0) return;

  this.lowerLaneShiftBusy = true;
  this.playerBusy = true;
  this.busyUntil = this.time.now + 760;

  const fromX = this.player.x;
  const fromY = this.player.y;

  const toX = direction === "down"
    ? LEFTY_LOWER_STAIR.middleX
    : LEFTY_LOWER_STAIR.topX;

  const toY = direction === "down"
    ? LEFTY_LOWER_STAIR.middleY
    : LEFTY_LOWER_STAIR.topY;

  this.lastDir = "side";
  this.player.setFlipX(direction === "up");

  safePlay(this.player, this.getPlayerAnim("walk_side"));

  this.tweens.addCounter({
    from: 0,
    to: 1,
    duration: 620,
    ease: "Sine.easeInOut",
    onUpdate: tween=>{
      const t = tween.getValue();
      this.player.x = Phaser.Math.Linear(fromX, toX, t);
      this.player.y = Phaser.Math.Linear(fromY, toY, t);

      if(this.shadow){
        this.shadow.x = this.player.x;
        this.shadow.y = this.player.y + 5;
      }
    },
    onComplete: ()=>{
      if(direction === "down"){
        this.platform = "middle";
        this.player.x = toX;
        this.player.y = getLeftyLowerPlatformY("middle");

        if(this.zoneText){
          this.zoneText.setText("LOWER COMBAT FLOOR");
        }
      }else{
        this.platform = "top";
        this.player.x = toX;
        this.player.y = getLeftyLowerPlatformY("top");

        if(this.zoneText){
          this.zoneText.setText("UPPER STREET");
        }
      }

      this.lowerLaneShiftBusy = false;
      this.forcePlayerReady();
    }
  });
};

Game.prototype.startLowerStreetLaneShift = function(targetPlatform){
  if(!this.isLeftyLowerScreen()) return;
  if(this.lowerLaneShiftBusy) return;
  if(this.playerBusy || this.isClimbing || this.isJumping || this.playerHealth <= 0) return;

  this.lowerLaneShiftBusy = true;
  this.playerBusy = true;
  this.busyUntil = this.time.now + 420;

  const fromY = this.player.y;
  const toY = getLeftyLowerPlatformY(targetPlatform);

  safePlay(this.player, this.getPlayerAnim("walk_down"));

  this.tweens.add({
    targets: this.player,
    y: toY,
    duration: 320,
    ease: "Sine.easeInOut",
    onUpdate: ()=>{
      if(this.shadow){
        this.shadow.x = this.player.x;
        this.shadow.y = this.player.y + 5;
      }
    },
    onComplete: ()=>{
      this.platform = targetPlatform;
      this.player.y = toY;

      if(this.zoneText){
        this.zoneText.setText(
          targetPlatform === "middle"
            ? "LOWER COMBAT FLOOR"
            : "FRONT COMBAT LANE"
        );
      }

      this.lowerLaneShiftBusy = false;
      this.forcePlayerReady();
    }
  });
};

const MP_ORIGINAL_HANDLE_PLATFORM_TRANSITIONS_V2 = Game.prototype.handlePlatformTransitions;

Game.prototype.handlePlatformTransitions = function(){
  if(this.isLeftyLowerScreen()){
    if(this.playerBusy || this.isClimbing || this.isJumping){
      return;
    }

    // Upper street -> lower combat floor through left stairs.
    if(this.platform === "top" && this.moveY > 0.65 && this.isNearLowerStreetStairs()){
      this.startLowerStreetStairTravel("down");
      return;
    }

    // Lower combat floor -> upper street through left stairs.
    if(this.platform === "middle" && this.moveY < -0.65 && this.isNearLowerStreetStairs()){
      this.startLowerStreetStairTravel("up");
      return;
    }

    // Lower open combat floor -> front combat lane.
    if(this.platform === "middle" && this.moveY > 0.65){
      this.startLowerStreetLaneShift("bottom");
      return;
    }

    // Front combat lane -> lower open combat floor.
    if(this.platform === "bottom" && this.moveY < -0.65){
      this.startLowerStreetLaneShift("middle");
      return;
    }

    return;
  }

  MP_ORIGINAL_HANDLE_PLATFORM_TRANSITIONS_V2.call(this);
};

/* =========================================================
   ENEMY ROUTING ON LOWER STREET
========================================================= */

const MP_ORIGINAL_GET_ENEMY_ROUTE_V2 = Game.prototype.getEnemyRoute;

Game.prototype.getEnemyRoute = function(e){
  if(this.isLeftyLowerScreen()){
    if(!e || e.platform === this.platform) return null;

    // Enemy on upper street must use the left stairs to reach lower floor.
    if(e.platform === "top"){
      return {
        kind: "stair",
        x: LEFTY_LOWER_STAIR.x,
        to: "middle",
        destY: getLeftyLowerPlatformY("middle")
      };
    }

    // Enemy on lower floor needs street: use stairs.
    if(e.platform === "middle" && this.platform === "top"){
      return {
        kind: "stair",
        x: LEFTY_LOWER_STAIR.x,
        to: "top",
        destY: getLeftyLowerPlatformY("top")
      };
    }

    // Enemy on front lane needs main lower floor.
    if(e.platform === "bottom"){
      return {
        kind: "lane",
        x: e.x,
        to: "middle",
        destY: getLeftyLowerPlatformY("middle")
      };
    }

    // Enemy on middle floor needs front lane.
    if(e.platform === "middle" && this.platform === "bottom"){
      return {
        kind: "lane",
        x: e.x,
        to: "bottom",
        destY: getLeftyLowerPlatformY("bottom")
      };
    }

    return null;
  }

  return MP_ORIGINAL_GET_ENEMY_ROUTE_V2.call(this, e);
};

const MP_ORIGINAL_GET_PLATFORM_CENTER_Y_V2 = Game.prototype.getPlatformCenterY;

Game.prototype.getPlatformCenterY = function(platform){
  if(this.isLeftyLowerScreen()){
    return getLeftyLowerPlatformY(platform);
  }

  if(MP_ORIGINAL_GET_PLATFORM_CENTER_Y_V2){
    return MP_ORIGINAL_GET_PLATFORM_CENTER_Y_V2.call(this, platform);
  }

  return getPlatformY(platform);
};

const MP_ORIGINAL_FINISH_ENEMY_MOVE_V2 = Game.prototype.finishEnemyMove;

Game.prototype.finishEnemyMove = function(e, dt){
  if(this.isLeftyLowerScreen()){
    if(!e) return;

    e.vx = Phaser.Math.Clamp(e.vx || 0, -260, 260);
    e.x += e.vx * dt;

    const bounds = getLeftyLowerBounds()[e.platform] || getLeftyLowerBounds().middle;
    e.x = Phaser.Math.Clamp(e.x, bounds.minX, bounds.maxX);

    this.updateEnemyVisuals(e);
    return;
  }

  MP_ORIGINAL_FINISH_ENEMY_MOVE_V2.call(this, e, dt);
};

const MP_ORIGINAL_SYNC_ENEMY_LANE_V2 = Game.prototype.syncEnemyLane;

Game.prototype.syncEnemyLane = function(e, delta){
  if(this.isLeftyLowerScreen()){
    if(!e || !this.player) return;

    const bounds = getLeftyLowerBounds()[e.platform] || getLeftyLowerBounds().middle;

    const targetY = Phaser.Math.Clamp(
      this.player.y + (e.laneOffset || 0),
      bounds.minY,
      bounds.maxY
    );

    const follow = e.enemyType === "corpo_sellout" ? 0.045 : 0.035;

    e.homeY = Phaser.Math.Linear(e.homeY, targetY, follow);
    e.y = e.homeY;

    return;
  }

  MP_ORIGINAL_SYNC_ENEMY_LANE_V2.call(this, e, delta);
};

   UPDATE HOOK
========================================================= */

const MP_ORIGINAL_SAFE_UPDATE_LEFTY_SCREEN_V2 = Game.prototype.safeUpdate;

Game.prototype.safeUpdate = function(time, delta){
  MP_ORIGINAL_SAFE_UPDATE_LEFTY_SCREEN_V2.call(this, time, delta);

  this.updateLeftyScreenPrompt();
  this.checkLeftyScreenTransition();
};

/* =========================================================
   ARROW BUS ROAD HAZARD PATCH — SMALLER / HIGHER ROAD VERSION
   - Lower Lefty's screen only
   - Bus drives right -> left every 20 seconds
   - Bus stays on the upper road area
   - Smaller visual size so it fits the road
   - Hits player only on the upper street lane
========================================================= */

const ARROW_BUS_INTERVAL = 20000;
const ARROW_BUS_DAMAGE = 8;

// Player is knocked left because bus travels right -> left.
const ARROW_BUS_KNOCKBACK_X = -85;
const ARROW_BUS_KNOCKBACK_Y = 0;

// In the lower Lefty's area patch:
// top = upper road / street.
const ARROW_BUS_ROAD_PLATFORM = "top";

// Higher road placement.
// If still too low, lower this number to 125.
// If too high, raise it to 145.
const ARROW_BUS_WORLD_Y = 134;

// Smaller than before.
const ARROW_BUS_DISPLAY_W = 330;
const ARROW_BUS_DISPLAY_H = 92;

// Fair hitbox. Smaller than the visible bus.
const ARROW_BUS_HITBOX_W = 285;
const ARROW_BUS_HITBOX_H = 46;

// Bus travel speed.
const ARROW_BUS_TRAVEL_TIME = 5200;

Game.prototype.setupArrowBusHazard = function(){
  if(!this.isLeftyOutdoorLevel || !this.isLeftyOutdoorLevel()) return;

  this.arrowBusActive = false;
  this.arrowBus = null;
  this.arrowBusHitbox = null;
  this.arrowBusLastHitTime = 0;

  if(this.arrowBusTimer){
    this.arrowBusTimer.remove(false);
    this.arrowBusTimer = null;
  }

  this.arrowBusTimer = this.time.addEvent({
    delay: ARROW_BUS_INTERVAL,
    loop: true,
    callback: ()=>{
      this.spawnArrowBusHazard();
    }
  });
};

const MP_ORIGINAL_GAME_CREATE_ARROW_BUS_V2 = Game.prototype.create;

Game.prototype.create = function(){
  MP_ORIGINAL_GAME_CREATE_ARROW_BUS_V2.call(this);
  this.setupArrowBusHazard();
};

Game.prototype.canSpawnArrowBusHazard = function(){
  if(!this.isLeftyLowerScreen || !this.isLeftyLowerScreen()) return false;
  if(this.arrowBusActive) return false;
  if(this.leftyScreenTransitioning) return false;
  if(this.pauseMenuOpen || this.matchOver) return false;

  return true;
};

Game.prototype.spawnArrowBusHazard = function(){
  if(!this.canSpawnArrowBusHazard()) return;

  this.arrowBusActive = true;
  this.arrowBusLastHitTime = 0;

  const startX = W + 220;
  const endX = -220;
  const y = ARROW_BUS_WORLD_Y;

  let bus;

  if(hasTex(this,"arrow_bus")){
    bus = this.add.image(startX, y, "arrow_bus")
      .setOrigin(0.5, 0.55)
      .setDisplaySize(ARROW_BUS_DISPLAY_W, ARROW_BUS_DISPLAY_H)
      .setDepth(175);
  }else{
    bus = this.add.rectangle(
      startX,
      y,
      ARROW_BUS_DISPLAY_W,
      ARROW_BUS_DISPLAY_H,
      0x5c1c7a,
      0.95
    )
      .setStrokeStyle(4, 0xffffff, 0.35)
      .setDepth(175);

    const missingText = this.add.text(startX, y, "ARROW", {
      font:"22px monospace",
      fill:"#ffffff",
      stroke:"#000000",
      strokeThickness:4
    }).setOrigin(0.5).setDepth(176);

    bus._missingText = missingText;
  }

  this.arrowBus = bus;

  this.arrowBusHitbox = this.add.rectangle(
    startX,
    y + 8,
    ARROW_BUS_HITBOX_W,
    ARROW_BUS_HITBOX_H,
    0xff0000,
    0
  ).setDepth(9999);

  if(this.zoneText){
    this.zoneText.setText("BUS INCOMING");
  }

  this.time.delayedCall(700, ()=>{
    if(this.zoneText && this.isLeftyLowerScreen && this.isLeftyLowerScreen()){
      this.zoneText.setText("UPPER STREET");
    }
  });

  const tweenTargets = bus._missingText
    ? [bus, bus._missingText, this.arrowBusHitbox]
    : [bus, this.arrowBusHitbox];

  this.tweens.add({
    targets: tweenTargets,
    x: endX,
    duration: ARROW_BUS_TRAVEL_TIME,
    ease: "Linear",
    onUpdate: ()=>{
      this.checkArrowBusPlayerHit();
    },
    onComplete: ()=>{
      this.cleanupArrowBusHazard();
    }
  });
};

Game.prototype.checkArrowBusPlayerHit = function(){
  if(!this.arrowBusActive) return;
  if(!this.arrowBusHitbox || !this.player) return;
  if(!this.isLeftyLowerScreen || !this.isLeftyLowerScreen()) return;
  if(this.playerHealth <= 0 || this.matchOver) return;

  // Bus only hits on the upper road.
  if(this.platform !== ARROW_BUS_ROAD_PLATFORM) return;

  // Avoid repeated frame-by-frame damage.
  if(this.time.now - this.arrowBusLastHitTime < 950) return;

  const busBox = this.arrowBusHitbox.getBounds();

  const playerBox = new Phaser.Geom.Rectangle(
    this.player.x - 22,
    this.player.y - 78,
    44,
    72
  );

  if(!Phaser.Geom.Intersects.RectangleToRectangle(busBox, playerBox)){
    return;
  }

  this.arrowBusLastHitTime = this.time.now;
  this.hitPlayerWithArrowBus();
};

Game.prototype.hitPlayerWithArrowBus = function(){
  if(!this.player) return;

  const oldInvuln = this.playerInvuln || 0;

  this.playerInvuln = 0;
  this.damagePlayer(ARROW_BUS_DAMAGE, -1);
  this.playerInvuln = Math.max(oldInvuln, 1150);

  this.player.x += ARROW_BUS_KNOCKBACK_X;
  this.player.y += ARROW_BUS_KNOCKBACK_Y;

  this.applyPlatformBounds();

  if(this.createHitFX){
    this.createHitFX(this.player.x, this.player.y - 60, "hit", ARROW_BUS_DAMAGE);
  }

  if(this.cameras && this.cameras.main){
    this.cameras.main.shake(180, 0.006);
  }

  if(typeof vibrate === "function"){
    vibrate([45, 35, 70]);
  }

  if(this.zoneText){
    this.zoneText.setText("HIT BY BUS");
  }

  this.time.delayedCall(650, ()=>{
    if(this.zoneText && this.isLeftyLowerScreen && this.isLeftyLowerScreen()){
      this.zoneText.setText("UPPER STREET");
    }
  });
};

Game.prototype.cleanupArrowBusHazard = function(){
  if(this.arrowBus){
    if(this.arrowBus._missingText && this.arrowBus._missingText.destroy){
      this.arrowBus._missingText.destroy();
    }

    if(this.arrowBus.destroy){
      this.arrowBus.destroy();
    }
  }

  if(this.arrowBusHitbox && this.arrowBusHitbox.destroy){
    this.arrowBusHitbox.destroy();
  }

  this.arrowBus = null;
  this.arrowBusHitbox = null;
  this.arrowBusActive = false;
};

/* Manual test key: press O to spawn bus immediately */
const MP_ORIGINAL_MAKE_KEYBOARD_ARROW_BUS_V2 = Game.prototype.makeKeyboard;

Game.prototype.makeKeyboard = function(){
  MP_ORIGINAL_MAKE_KEYBOARD_ARROW_BUS_V2.call(this);

  this.input.keyboard.on("keydown-O", ()=>{

};

    }
  }

  this.inventory = [];
  this.currentWeaponIndex = -1;
  this.currentWeapon = null;
  this.weaponSprite = null;

/* =========================================================
   PICKUPS / INVENTORY DATA
========================================================= */

Game.prototype.makeWeaponObject = function(type, x, y, held=false){
  const def = MP_WEAPON_DEFS[type];
  if(!def) return null;

  const scale = held ? def.scale : def.pickupScale;

  if(hasTex(this, def.key)){
    return this.add.image(x, y, def.key)
      .setOrigin(0.5, 0.5)
      .setScale(scale);
  }

  if(type === "rock"){
    return this.add.circle(x, y, 13, 0x777777, 1)
      .setStrokeStyle(2, 0x222222);
  }

  if(type === "chain"){
    return this.add.rectangle(x, y, 58, 10, 0xa0a0a0, 1)
      .setStrokeStyle(2, 0x222222)
      .setRotation(-0.15);
  }

  return this.add.rectangle(x, y, 54, 12, 0xc0c0c0, 1)
    .setStrokeStyle(2, 0x000000)
    .setRotation(-0.25);
};

Game.prototype.spawnWeaponPickup = function(type, x, y, platform="middle"){
  const def = MP_WEAPON_DEFS[type];
  if(!def) return null;

  const obj = this.makeWeaponObject(type, x, y - 20, false);
  if(!obj) return null;

  obj.setDepth(y + 30);

  const label = this.add.text(x, y - 54, def.label, {
    font: "12px monospace",
    fill: "#fff45c",
    stroke: "#000000",
    strokeThickness: 3
  }).setOrigin(0.5).setDepth(y + 31);

  const pickup = {
    type,
    def,
    obj,
    label,
    x,
    y,
    platform,
    pickedUp: false
  };

  this.weaponPickups.push(pickup);
  return pickup;
};

Game.prototype.getNearestWeaponPickup = function(){
  if(!this.weaponPickups || !this.player) return null;

  let best = null;
  let bestDist = 9999;

  this.weaponPickups.forEach(w=>{
    if(!w || w.pickedUp) return;
    if(w.platform !== this.platform) return;

    const dx = Math.abs(this.player.x - w.x);
    const dy = Math.abs(this.player.y - w.y);

    if(dx < 64 && dy < 48 && dx < bestDist){
      best = w;
      bestDist = dx;
    }
  });

  return best;
};

Game.prototype.pickupWeapon = function(pickup){
  if(!pickup || pickup.pickedUp) return false;

  if(this.inventory.length >= MP_INVENTORY_MAX){
    if(this.zoneText) this.zoneText.setText("INVENTORY FULL");
    return false;
  }

  pickup.pickedUp = true;

  if(pickup.obj) pickup.obj.setVisible(false);
  if(pickup.label) pickup.label.setVisible(false);

  const item = {
    id: Date.now() + "_" + Phaser.Math.Between(1000,9999),
    type: pickup.type,
    def: pickup.def
  };

  this.inventory.push(item);
  this.equipWeaponIndex(this.inventory.length - 1);

  if(this.zoneText){
    this.zoneText.setText("PICKED UP: " + pickup.def.label);
  }

  return true;
};

Game.prototype.equipWeaponIndex = function(index){
  if(index < 0 || index >= this.inventory.length){
    this.currentWeaponIndex = -1;
    this.currentWeapon = null;
    this.destroyHeldWeaponSprite();
    return;
  }

  this.currentWeaponIndex = index;
  this.currentWeapon = this.inventory[index];

  this.destroyHeldWeaponSprite();

  const def = this.currentWeapon.def;

  this.weaponSprite = this.makeWeaponObject(
    this.currentWeapon.type,
    this.player.x,
    this.player.y - 60,
    true
  );

  if(this.weaponSprite){
    this.weaponSprite.setDepth(12000);

    if(this.weaponSprite.setRotation){
      this.weaponSprite.setRotation(def.rotation);
    }
  }

  if(this.zoneText){
    this.zoneText.setText("EQUIPPED: " + def.label);
  }
};

Game.prototype.destroyHeldWeaponSprite = function(){
  if(this.weaponSprite && this.weaponSprite.destroy){
    this.weaponSprite.destroy();
  }

  this.weaponSprite = null;
};

Game.prototype.removeCurrentWeaponFromInventory = function(){
  if(this.currentWeaponIndex < 0) return null;
  if(this.currentWeaponIndex >= this.inventory.length) return null;

  const item = this.inventory.splice(this.currentWeaponIndex, 1)[0];

  if(this.inventory.length <= 0){
    this.currentWeaponIndex = -1;
    this.currentWeapon = null;
    this.destroyHeldWeaponSprite();
  }else{
    const next = Phaser.Math.Clamp(this.currentWeaponIndex, 0, this.inventory.length - 1);
    this.equipWeaponIndex(next);
  }

  return item;
};

Game.prototype.dropCurrentWeapon = function(){
  if(!this.currentWeapon || !this.player) return;

  const item = this.removeCurrentWeaponFromInventory();
  if(!item) return;

  const x = Phaser.Math.Clamp(
    this.player.x + this.getFacingDir() * 38,
    80,
    W - 80
  );

  const y = mpGetWeaponGroundY(this, this.platform);

  this.spawnWeaponPickup(item.type, x, y, this.platform);

  if(this.zoneText){
    this.zoneText.setText("DROPPED: " + item.def.label);
  }
};

/* =========================================================
   HELD WEAPON VISUAL
========================================================= */

Game.prototype.updateHeldWeaponVisual = function(){
  if(!this.weaponSprite || !this.currentWeapon || !this.player) return;

  const def = this.currentWeapon.def;
  const dir = this.getFacingDir();

  const hideForPose =
    this.poseSprite &&
    this.poseSprite.visible &&
    !this.isBlocking &&
    !this.weaponSwinging;

  if(hideForPose){
    this.weaponSprite.setVisible(false);
    return;
  }

  this.weaponSprite.setVisible(true);

  let ox = def.handOffsetX;
  let oy = def.handOffsetY;
  let rot = def.rotation;

  if(this.weaponSwinging){
    ox += 18;
    oy += 2;
    rot -= 0.55;
  }

  this.weaponSprite.x = this.player.x + ox * dir;
  this.weaponSprite.y = this.player.y + oy;

  if(this.weaponSprite.setRotation){
    this.weaponSprite.setRotation(rot * dir);
  }

  if(this.weaponSprite.setFlipX){
    this.weaponSprite.setFlipX(dir < 0);
  }

  this.weaponSprite.setDepth(this.player.y + 130);
};

Game.prototype.showWeaponSwingFX = function(){
  if(!this.currentWeapon || !this.player) return;

  const dir = this.getFacingDir();

  this.weaponSwinging = true;

  this.time.delayedCall(180, ()=>{
    this.weaponSwinging = false;
  });

  const arc = this.add.arc(
    this.player.x + dir * 66,
    this.player.y - 56,
    this.currentWeapon.type === "chain" ? 54 : 40,
    -60,
    60,
    false,
    0xfff45c,
    0.32
  )
    .setScale(dir, 1)
    .setDepth(14000);

  this.tweens.add({
    targets: arc,
    alpha: 0,
    scaleX: dir * 1.4,
    scaleY: 1.4,
    duration: 140,
    onComplete: ()=>{
      arc.destroy();
    }
  });
};

/* =========================================================
   THROW WEAPON
========================================================= */

Game.prototype.throwCurrentWeapon = function(){
  if(!this.currentWeapon || !this.player) return false;

  const item = this.removeCurrentWeaponFromInventory();
  if(!item) return false;

  const def = item.def;
  const dir = this.getFacingDir();

  const obj = this.makeWeaponObject(
    item.type,
    this.player.x + dir * 42,
    this.player.y - 58,
    true
  );

  if(!obj) return false;

  obj.setDepth(this.player.y + 160);

  if(obj.setFlipX){
    obj.setFlipX(dir < 0);
  }

  const thrown = {
    item,
    obj,
    x: obj.x,
    y: obj.y,
    startY: obj.y,
    platform: this.platform,
    dir,
    vx: def.throwSpeed * dir,
    life: def.throwLife,
    hitEnemies: new Set(),
    falling: false,
    done: false
  };

  this.thrownWeapons.push(thrown);

  if(this.zoneText){
    this.zoneText.setText("THREW: " + def.label);
  }

  return true;
};

Game.prototype.startWeaponThrowAction = function(){
  if(!this.currentWeapon) return false;
  if(this.pauseMenuOpen) return false;
  if(!this.matchStarted || this.matchOver) return false;
  if(this.playerBusy || this.isClimbing || this.playerHealth <= 0) return false;

  this.playerBusy = true;
  this.busyUntil = this.time.now + 420;

  const throwAnim = this.getPlayerAnim("attack_heavy");

  if(hasAnim(this, throwAnim) && hasTex(this, this.getPlayerAttackSheet())){
    this.positionAttackSprite("heavy");
    this.poseSprite.setVisible(true);
    this.player.setVisible(false);

    if(typeof replayAnim === "function"){
      replayAnim(this.poseSprite, throwAnim);
    }else{
      safePlay(this.poseSprite, throwAnim);
    }
  }else{
    this.player.setTint(0xffff66);
  }

  this.time.delayedCall(120, ()=>{
    this.throwCurrentWeapon();
  });

  this.time.delayedCall(360, ()=>{
    if(this.player){
      this.player.clearTint();
    }

    this.forcePlayerReady();
  });

  return true;
};

Game.prototype.updateThrownWeapons = function(delta){
  if(!this.thrownWeapons || this.thrownWeapons.length <= 0) return;

  const dt = delta / 1000;

  this.thrownWeapons.forEach(t=>{
    if(!t || !t.obj || t.done) return;

    if(t.falling){
      return;
    }

    t.life -= delta;
    t.x += t.vx * dt;
    t.y = t.startY + Math.sin(this.time.now / 70) * 5;

    if(t.obj.setRotation){
      t.obj.rotation += 0.22 * t.dir;
    }

    t.obj.x = t.x;
    t.obj.y = t.y;

    this.checkThrownWeaponEnemyHits(t);

    if(t.life <= 0 || t.x < -120 || t.x > W + 120){
      this.startThrownWeaponFall(t);
    }
  });

  this.thrownWeapons = this.thrownWeapons.filter(t=>t && !t.done);
};

Game.prototype.startThrownWeaponFall = function(t){
  if(!t || t.falling || t.done) return;

  t.falling = true;

  const groundY = mpGetWeaponGroundY(this, t.platform);

  this.tweens.add({
    targets: t,
    y: groundY - 20,
    duration: 260,
    ease: "Sine.easeIn",
    onUpdate: ()=>{
      if(t.obj){
        t.obj.x = t.x;
        t.obj.y = t.y;
      }
    },
    onComplete: ()=>{
      if(t.obj && t.obj.destroy){
        t.obj.destroy();
      }

      this.spawnWeaponPickup(t.item.type, t.x, groundY, t.platform);
      t.done = true;
    }
  });
};

Game.prototype.checkThrownWeaponEnemyHits = function(t){
  if(!t || !t.item || !this.enemies) return;

  const def = t.item.def;

  this.enemies.forEach(e=>{
    if(!e || e.dead || e.state === "dead") return;
    if(e.platform !== t.platform) return;
    if(e.invulnerable || e.grabbed) return;
    if(t.hitEnemies.has(e)) return;

    const dx = Math.abs(e.x - t.x);
    const dy = Math.abs((e.y - 45) - t.y);

    if(dx <= def.hitRange && dy <= 58){
      t.hitEnemies.add(e);
      this.damageEnemy(e, def.throwDamage, true);

      if(t.item.type === "rock" || t.item.type === "bottle"){
        t.life = Math.min(t.life, 120);
      }
    }
  });
};

/* =========================================================
   ATTACK PATCHES
========================================================= */

const MP_ORIGINAL_GET_ATTACK_DATA_WEAPON_V2 = Game.prototype.getAttackData;

Game.prototype.getAttackData = function(type){
  const data = MP_ORIGINAL_GET_ATTACK_DATA_WEAPON_V2.call(this, type);
  if(!data) return data;

  if(this.currentWeapon && type === "light"){
    const def = this.currentWeapon.def;

    data.damage += def.damage;
    data.range += def.rangeBonus;
    data.offsetX += 12;
  }

  return data;
};

const MP_ORIGINAL_START_ATTACK_WEAPON_V2 = Game.prototype.startAttack;

Game.prototype.startAttack = function(type){
  if(this.currentWeapon && type !== "light"){
    this.startWeaponThrowAction();
    return;
  }

  const hadWeapon = !!this.currentWeapon;

  MP_ORIGINAL_START_ATTACK_WEAPON_V2.call(this, type);

  if(hadWeapon && type === "light"){
    this.time.delayedCall(70, ()=>{
      this.showWeaponSwingFX();
    });
  }
};

const MP_ORIGINAL_START_CONTEXT_Y_WEAPON_V2 = Game.prototype.startContextY;

Game.prototype.startContextY = function(){
  if(this.grabbedEnemy){
    MP_ORIGINAL_START_CONTEXT_Y_WEAPON_V2.call(this);
    return;
  }

  if(this.currentWeapon){
    this.startWeaponThrowAction();
    return;
  }

  MP_ORIGINAL_START_CONTEXT_Y_WEAPON_V2.call(this);
};

const MP_ORIGINAL_START_CONTEXT_KICK_WEAPON_V2 = Game.prototype.startContextKick;

Game.prototype.startContextKick = function(){
  if(this.grabbedEnemy){
    MP_ORIGINAL_START_CONTEXT_KICK_WEAPON_V2.call(this);
    return;
  }

  if(this.currentWeapon){
    this.startWeaponThrowAction();
    return;
  }

  MP_ORIGINAL_START_CONTEXT_KICK_WEAPON_V2.call(this);
};

const MP_ORIGINAL_START_GRAB_WEAPON_V2 = Game.prototype.startGrab;

Game.prototype.startGrab = function(){
  if(this.currentWeapon && this.isDownHeld && this.isDownHeld()){
    this.dropCurrentWeapon();
    return;
  }

  const weapon = this.getNearestWeaponPickup();

  if(weapon && !this.grabbedEnemy){
    this.pickupWeapon(weapon);
    return;
  }

  MP_ORIGINAL_START_GRAB_WEAPON_V2.call(this);
};

Game.prototype.clearInventoryUI = function(){
  if(this.inventoryItems && this.inventoryItems.length){
    this.inventoryItems.forEach(item=>{
      if(item && item.destroy) item.destroy();
    });
  }

  this.inventoryItems = [];
  this.inventoryOpen = false;
};

Game.prototype.openInventoryMenu = function(){
  this.clearInventoryUI();
  this.inventoryOpen = true;

  const shade = this.add.rectangle(CX, CY, W, H, 0x000000, 0.68)
    .setDepth(40000)
    .setScrollFactor(0);

  const panel = this.add.rectangle(CX, CY, 520, 360, 0x111111, 0.96)
    .setStrokeStyle(4, 0xff4fc3)
    .setDepth(40001)
    .setScrollFactor(0);

  const title = this.add.text(CX, 120, "INVENTORY", {
    font: "38px monospace",
    fill: "#fff45c",
    stroke: "#000000",
    strokeThickness: 6
  }).setOrigin(0.5).setDepth(40002).setScrollFactor(0);

  this.inventoryItems.push(shade, panel, title);

  if(!this.inventory || this.inventory.length <= 0){
    const empty = this.add.text(CX, 245, "NO WEAPONS", {
      font: "24px monospace",
      fill: "#ffffff",
      stroke: "#000000",
      strokeThickness: 4
    }).setOrigin(0.5).setDepth(40002).setScrollFactor(0);

    this.inventoryItems.push(empty);
  }else{
    this.inventory.forEach((item, index)=>{
      const y = 175 + index * 38;
      const equipped = index === this.currentWeaponIndex;

      const row = this.add.rectangle(CX, y, 390, 30, equipped ? 0x351028 : 0x000000, 0.88)
        .setStrokeStyle(2, equipped ? 0xfff45c : 0xff4fc3)
        .setDepth(40002)
        .setScrollFactor(0)
        .setInteractive();

      const text = this.add.text(CX, y, (equipped ? "> " : "  ") + item.def.label, {
        font: "18px monospace",
        fill: equipped ? "#fff45c" : "#ffffff",
        stroke: "#000000",
        strokeThickness: 3
      }).setOrigin(0.5).setDepth(40003).setScrollFactor(0);

      row.on("pointerdown", ()=>{
        this.equipWeaponIndex(index);
        this.openInventoryMenu();
      });

      this.inventoryItems.push(row, text);
    });
  }

  const dropBtn = this.add.text(CX - 130, 390, "DROP HELD", {
    font: "18px monospace",
    fill: "#ffffff",
    stroke: "#000000",
    strokeThickness: 4,
    backgroundColor: "#220018"

  dropBtn.on("pointerdown", ()=>{

    this.openInventoryMenu();

  const backBtn = this.add.text(CX + 130, 390, "BACK", {
    font: "18px monospace",
    fill: "#ffffff",
    stroke: "#000000",
    strokeThickness: 4,
    backgroundColor: "#220018"
  }).setOrigin(0.5).setDepth(40003).setScrollFactor(0).setInteractive();

  backBtn.on("pointerdown", ()=>{
    this.clearInventoryUI();
    this.openPauseMenu();
  });

  this.inventoryItems.push(dropBtn, backBtn);
};

  if(this.pauseMenuOpen) return;

  this.pauseMenuOpen = true;
  this.clearInventoryUI();

  const shade = this.add.rectangle(CX, CY, W, H, 0x000000, 0.55)
    .setDepth(30000)
    .setScrollFactor(0);

  const panel = this.add.rectangle(480, 270, 460, 310, 0x111111, 0.94)

    font: "46px monospace",

    stroke: "#000000",

  }).setOrigin(0.5).setDepth(30002).setScrollFactor(0);

  const continueText = this.add.text(480, 225, "CONTINUE", {
    font: "28px monospace",
    fill: "#ffffff",
    stroke: "#000000",
    strokeThickness: 5
  }).setOrigin(0.5).setDepth(30002).setScrollFactor(0).setInteractive();

  const inventoryText = this.add.text(480, 275, "INVENTORY", {

    fill: "#7CFF6B",
    stroke: "#000000",
    strokeThickness: 5
  }).setOrigin(0.5).setDepth(30002).setScrollFactor(0).setInteractive();

    font: "28px monospace",
    fill: "#ffffff",
    stroke: "#000000",

  }).setOrigin(0.5).setDepth(30002).setScrollFactor(0).setInteractive();

Game.prototype.closePauseMenu = function(){

/* =========================================================
   CHAIN SWING SPRITE SWAP PATCH
   - Curved chain when held
   - Straight chain during light attack swing
   - No new player sprites needed
========================================================= */

if(typeof MP_WEAPON_DEFS !== "undefined" && MP_WEAPON_DEFS.chain){
  MP_WEAPON_DEFS.chain.swingKey = "weapon_chain_straight";
  MP_WEAPON_DEFS.chain.swingScale = 0.34;
  MP_WEAPON_DEFS.chain.swingOffsetX = 72;
  MP_WEAPON_DEFS.chain.swingOffsetY = -58;
  MP_WEAPON_DEFS.chain.swingRotation = 0.02;
  MP_WEAPON_DEFS.chain.rangeBonus = 75;
  MP_WEAPON_DEFS.chain.damage = 12;
}

Game.prototype.startChainSwingVisual = function(){
  if(!this.currentWeapon) return false;
  if(this.currentWeapon.type !== "chain") return false;
  if(!this.weaponSprite) return false;

  const def = this.currentWeapon.def;

  this.weaponSwinging = true;
  this.chainSwinging = true;

  if(hasTex(this, def.swingKey)){
    this.weaponSprite.setTexture(def.swingKey);
    this.weaponSprite.setScale(def.swingScale || def.scale);
  }

  this.time.delayedCall(210, ()=>{
    this.chainSwinging = false;
    this.weaponSwinging = false;

    if(this.weaponSprite && this.currentWeapon && hasTex(this, this.currentWeapon.def.key)){
      this.weaponSprite.setTexture(this.currentWeapon.def.key);
      this.weaponSprite.setScale(this.currentWeapon.def.scale);
    }
  });

  return true;
};

const MP_ORIGINAL_UPDATE_HELD_WEAPON_CHAIN_SWING = Game.prototype.updateHeldWeaponVisual;

Game.prototype.updateHeldWeaponVisual = function(){
  if(!this.weaponSprite || !this.currentWeapon || !this.player){
    return;
  }

  if(this.currentWeapon.type !== "chain" || !this.chainSwinging){
    MP_ORIGINAL_UPDATE_HELD_WEAPON_CHAIN_SWING.call(this);
    return;
  }

  const def = this.currentWeapon.def;
  const dir = this.getFacingDir();

  this.weaponSprite.setVisible(true);

  this.weaponSprite.x = this.player.x + (def.swingOffsetX || 72) * dir;
  this.weaponSprite.y = this.player.y + (def.swingOffsetY || -58);

  if(this.weaponSprite.setRotation){
    this.weaponSprite.setRotation((def.swingRotation || 0) * dir);
  }

  if(this.weaponSprite.setFlipX){
    this.weaponSprite.setFlipX(dir < 0);
  }

  this.weaponSprite.setDepth(this.player.y + 150);
};

const MP_ORIGINAL_SHOW_WEAPON_SWING_CHAIN = Game.prototype.showWeaponSwingFX;

Game.prototype.showWeaponSwingFX = function(){
  if(this.currentWeapon && this.currentWeapon.type === "chain"){
    this.startChainSwingVisual();

    const dir = this.getFacingDir();

    const arc = this.add.arc(
      this.player.x + dir * 92,
      this.player.y - 58,
      62,
      -45,
      45,
      false,
      0xfff45c,
      0.24
    )
      .setScale(dir, 1)
      .setDepth(14000);

    this.tweens.add({
      targets: arc,
      alpha: 0,
      scaleX: dir * 1.25,
      scaleY: 1.25,
      duration: 150,
      onComplete: ()=>{
        arc.destroy();
      }
    });

    return;
  }

  MP_ORIGINAL_SHOW_WEAPON_SWING_CHAIN.call(this);
};

Game.prototype.pickRandomWeaponType = function(){
  const list = MP_RANDOM_WEAPON_TYPES.filter(type=>{
    return typeof MP_WEAPON_DEFS !== "undefined" && MP_WEAPON_DEFS[type];
  });

  if(list.length <= 0) return "pipe";

  return list[Phaser.Math.Between(0, list.length - 1)];
};

Game.prototype.shuffleArrayCopy = function(arr){
  const copy = arr.slice();

  for(let i = copy.length - 1; i > 0; i--){
    const j = Phaser.Math.Between(0, i);
    const temp = copy[i];
    copy[i] = copy[j];
    copy[j] = temp;
  }

  return copy;
};

Game.prototype.populateRandomWeaponsForScreen = function(screenKey){
  if(!screenKey) screenKey = this.getCurrentWeaponScreenKey();

  if(!this.weaponPopulatedScreens){
    this.weaponPopulatedScreens = {};
  }

  if(this.weaponPopulatedScreens[screenKey]){
    return;
  }

  this.weaponPopulatedScreens[screenKey] = true;

  const points = this.shuffleArrayCopy(
    this.getRandomWeaponSpawnPoints(screenKey)
  );

  const count = Phaser.Math.Between(
    MP_RANDOM_WEAPON_MIN,
    MP_RANDOM_WEAPON_MAX
  );

  for(let i = 0; i < count && i < points.length; i++){
    const p = points[i];
    const type = this.pickRandomWeaponType();

    this.spawnWeaponPickup(
      type,
      p.x + Phaser.Math.Between(-18, 18),
      p.y,
      p.platform,
      screenKey
    );
  }
};

/* Patch spawnWeaponPickup so every pickup knows which screen it belongs to */
const MP_ORIGINAL_SPAWN_WEAPON_PICKUP_RANDOM = Game.prototype.spawnWeaponPickup;

Game.prototype.spawnWeaponPickup = function(type, x, y, platform="middle", screenKey=null){
  const pickup = MP_ORIGINAL_SPAWN_WEAPON_PICKUP_RANDOM.call(
    this,
    type,
    x,
    y,
    platform
  );

  if(!pickup) return pickup;

  pickup.screenKey = screenKey || this.getCurrentWeaponScreenKey();

  this.updateWeaponPickupVisibility(pickup);

  return pickup;
};

Game.prototype.updateWeaponPickupVisibility = function(pickup){
  if(!pickup) return;

  const visible =
    !pickup.pickedUp &&
    pickup.screenKey === this.getCurrentWeaponScreenKey();

  if(pickup.obj){
    pickup.obj.setVisible(visible);
  }

  if(pickup.label){
    pickup.label.setVisible(visible);
  }
};

Game.prototype.updateAllWeaponPickupVisibility = function(){
  if(!this.weaponPickups) return;

  this.weaponPickups.forEach(pickup=>{
    this.updateWeaponPickupVisibility(pickup);
  });
};

/* Patch nearest pickup so you cannot grab hidden weapons from another screen */
Game.prototype.getNearestWeaponPickup = function(){
  if(!this.weaponPickups || !this.player) return null;

  const currentScreen = this.getCurrentWeaponScreenKey();

  let best = null;
  let bestDist = 9999;

  this.weaponPickups.forEach(w=>{
    if(!w || w.pickedUp) return;
    if(w.screenKey !== currentScreen) return;
    if(w.platform !== this.platform) return;

    const dx = Math.abs(this.player.x - w.x);
    const dy = Math.abs(this.player.y - w.y);

    if(dx < 64 && dy < 48 && dx < bestDist){
      best = w;
      bestDist = dx;
    }
  });

  return best;
};

/* When crossing between Lefty's screens, populate that screen once */
const MP_ORIGINAL_FINISH_LEFTY_SCREEN_SWAP_RANDOM_WEAPONS =
  Game.prototype.finishLeftyScreenSwap;

Game.prototype.finishLeftyScreenSwap = function(targetScreen){
  MP_ORIGINAL_FINISH_LEFTY_SCREEN_SWAP_RANDOM_WEAPONS.call(this, targetScreen);

  this.populateRandomWeaponsForScreen(this.getCurrentWeaponScreenKey());
  this.updateAllWeaponPickupVisibility();
};

/* Update visibility every frame in case screen changes */
const MP_ORIGINAL_SAFE_UPDATE_RANDOM_WEAPONS = Game.prototype.safeUpdate;

Game.prototype.safeUpdate = function(time, delta){
  MP_ORIGINAL_SAFE_UPDATE_RANDOM_WEAPONS.call(this, time, delta);

  if(this.populateRandomWeaponsForScreen){
    this.populateRandomWeaponsForScreen(this.getCurrentWeaponScreenKey());
  }

  this.updateAllWeaponPickupVisibility();
};

    const j = Phaser.Math.Between(0, i);
    const temp = copy[i];
    copy[i] = copy[j];
    copy[j] = temp;
  }

  return copy;
};

Game.prototype.populateHealthItemsForScreen = function(screenKey){
  if(!screenKey) screenKey = mpHealthScreenKey(this);

  if(!this.healthItemPopulatedScreens){
    this.healthItemPopulatedScreens = {};
  }

  if(this.healthItemPopulatedScreens[screenKey]){
    return;
  }

  this.healthItemPopulatedScreens[screenKey] = true;

  const points = this.shuffleHealthArrayCopy(
    this.getHealthItemSpawnPoints(screenKey)
  );

  const count = Phaser.Math.Between(
    MP_HEALTH_ITEM_MIN,
    MP_HEALTH_ITEM_MAX
  );

  for(let i = 0; i < count && i < points.length; i++){
    const p = points[i];
    const type = this.pickWeightedHealthItemType();

    this.spawnHealthItemPickup(
      type,
      p.x + Phaser.Math.Between(-14,14),
      p.y,
      p.platform,
      screenKey
    );
  }
};

/* =========================================================
   PICKUP OBJECTS
========================================================= */

Game.prototype.makeHealthItemSprite = function(type, x, y){
  const def = MP_HEALTH_ITEM_DEFS[type];
  if(!def) return null;

  if(hasTex(this, def.key)){
    return this.add.image(x, y, def.key)
      .setOrigin(0.5, 0.5)
      .setScale(def.scale);
  }

  // Fallback placeholders if asset is missing.
  if(type === "pizza"){
    return this.add.triangle(x, y, -16, 12, 16, 12, 0, -14, 0xffcc55, 1)
      .setStrokeStyle(2, 0x000000);
  }

  if(type === "chicken"){
    return this.add.circle(x, y, 16, 0xd28a3c, 1)
      .setStrokeStyle(2, 0x000000);
  }

  if(type === "drink" || type === "soda" || type === "energy_drink" || type === "water"){
    return this.add.rectangle(x, y, 18, 32, 0x55ccff, 1)
      .setStrokeStyle(2, 0x000000);
  }

  if(type === "spliff"){
    return this.add.rectangle(x, y, 34, 8, 0xe8e0c8, 1)
      .setStrokeStyle(2, 0x000000)
      .setRotation(-0.25);
  }

  return this.add.circle(x, y, 14, 0xffd35a, 1)
    .setStrokeStyle(2, 0x000000);
};

Game.prototype.spawnHealthItemPickup = function(type, x, y, platform="middle", screenKey=null){
  const def = MP_HEALTH_ITEM_DEFS[type];
  if(!def) return null;

  const obj = this.makeHealthItemSprite(type, x, y - 20);
  if(!obj) return null;

  obj.setDepth(y + 32);

  const label = this.add.text(x, y - 52, "+" + def.heal + " " + def.label, {
    font: "11px monospace",
    fill: "#7CFF6B",
    stroke: "#000000",
    strokeThickness: 3
  }).setOrigin(0.5).setDepth(y + 33);

  const pickup = {
    type,
    def,
    obj,
    label,
    x,
    y,
    platform,
    screenKey: screenKey || mpHealthScreenKey(this),
    pickedUp: false
  };

  this.healthItemPickups.push(pickup);
  this.updateHealthItemVisibility(pickup);

  return pickup;
};

Game.prototype.updateHealthItemVisibility = function(pickup){
  if(!pickup) return;

  const visible =
    !pickup.pickedUp &&
    pickup.screenKey === mpHealthScreenKey(this);

  if(pickup.obj) pickup.obj.setVisible(visible);
  if(pickup.label) pickup.label.setVisible(visible);
};

Game.prototype.updateAllHealthItemVisibility = function(){
  if(!this.healthItemPickups) return;

  this.healthItemPickups.forEach(p=>{
    this.updateHealthItemVisibility(p);
  });
};

Game.prototype.getNearestHealthItemPickup = function(){
  if(!this.healthItemPickups || !this.player) return null;

  const currentScreen = mpHealthScreenKey(this);

  let best = null;
  let bestDist = 9999;

  this.healthItemPickups.forEach(item=>{
    if(!item || item.pickedUp) return;
    if(item.screenKey !== currentScreen) return;
    if(item.platform !== this.platform) return;

    const dx = Math.abs(this.player.x - item.x);
    const dy = Math.abs(this.player.y - item.y);

    if(dx < 62 && dy < 48 && dx < bestDist){
      best = item;
      bestDist = dx;
    }
  });

  return best;
};

/* =========================================================
   CONSUME / APPLY EFFECTS
========================================================= */

Game.prototype.consumeHealthItemPickup = function(pickup){
  if(!pickup || pickup.pickedUp) return false;

  pickup.pickedUp = true;

  if(pickup.obj) pickup.obj.setVisible(false);
  if(pickup.label) pickup.label.setVisible(false);

  const before = this.playerHealth || 0;
  const maxHp = this.playerMaxHealth || MP_PLAYER_MAX_HEALTH;

  this.playerHealth = Phaser.Math.Clamp(
    before + pickup.def.heal,
    0,
    maxHp
  );

  this.applyHealthItemBuff(pickup.def);

  this.showHealthItemFX(pickup);

  if(this.zoneText){
    this.zoneText.setText(
      pickup.def.label + " +" + pickup.def.heal + " HP"
    );
  }

  return true;
};

Game.prototype.applyHealthItemBuff = function(def){
  if(!def || !def.buff) return;

  if(!this.playerBuffs){
    this.playerBuffs = {
      speedUntil: 0,
      speedMult: 1,
      damageUntil: 0,
      damageMult: 1,
      guardUntil: 0,
      guardMult: 1
    };
  }

  const buff = def.buff;

  if(buff.type === "speed"){
    this.playerBuffs.speedUntil = this.time.now + buff.duration;
    this.playerBuffs.speedMult = buff.amount;
  }

  if(buff.type === "damage"){
    this.playerBuffs.damageUntil = this.time.now + buff.duration;
    this.playerBuffs.damageMult = buff.amount;
  }

  if(buff.type === "guard"){
    this.playerBuffs.guardUntil = this.time.now + buff.duration;
    this.playerBuffs.guardMult = buff.amount;
  }

  if(buff.type === "rhythm"){
    this.rhythm = Math.min(10, (this.rhythm || 0) + buff.amount);
  }

  if(this.zoneText && buff.text){
    this.time.delayedCall(300, ()=>{
      this.zoneText.setText(buff.text);
    });
  }
};

Game.prototype.showHealthItemFX = function(pickup){
  if(!pickup) return;

  const fx = this.add.text(this.player.x, this.player.y - 95, "+" + pickup.def.heal + " HP", {
    font: "18px monospace",
    fill: "#7CFF6B",
    stroke: "#000000",
    strokeThickness: 4
  }).setOrigin(0.5).setDepth(15000);

  this.tweens.add({
    targets: fx,
    y: fx.y - 32,
    alpha: 0,
    duration: 650,
    onComplete: ()=>{
      fx.destroy();
    }
  });

  const glow = this.add.circle(this.player.x, this.player.y - 54, 24, 0x7CFF6B, 0.35)
    .setDepth(14999)
    .setBlendMode(Phaser.BlendModes.ADD);

  this.tweens.add({
    targets: glow,
    scale: 2.2,
    alpha: 0,
    duration: 360,
    onComplete: ()=>{
      glow.destroy();
    }
  });
};

/* =========================================================
   HOOK PICKUP CONTROL
   E/G near health item = consume it
   Otherwise previous startGrab behavior continues
========================================================= */

const MP_ORIGINAL_START_GRAB_HEALTH_ITEMS = Game.prototype.startGrab;

Game.prototype.startGrab = function(){
  const healthPickup = this.getNearestHealthItemPickup();

  if(healthPickup){
    this.consumeHealthItemPickup(healthPickup);
    return;
  }

  MP_ORIGINAL_START_GRAB_HEALTH_ITEMS.call(this);
};

/* =========================================================
   BUFF HOOKS
========================================================= */

const MP_ORIGINAL_GET_PLAYER_SPEED_MOD_HEALTH_ITEMS = Game.prototype.getPlayerSpeedMod;

Game.prototype.getPlayerSpeedMod = function(){
  let base = 1;

  if(MP_ORIGINAL_GET_PLAYER_SPEED_MOD_HEALTH_ITEMS){
    base = MP_ORIGINAL_GET_PLAYER_SPEED_MOD_HEALTH_ITEMS.call(this);
  }

  if(this.playerBuffs && this.time.now < this.playerBuffs.speedUntil){
    base *= this.playerBuffs.speedMult || 1;
  }

  return base;
};

const MP_ORIGINAL_GET_PLAYER_DAMAGE_MOD_HEALTH_ITEMS = Game.prototype.getPlayerDamageMod;

Game.prototype.getPlayerDamageMod = function(){
  let base = 1;

  if(MP_ORIGINAL_GET_PLAYER_DAMAGE_MOD_HEALTH_ITEMS){
    base = MP_ORIGINAL_GET_PLAYER_DAMAGE_MOD_HEALTH_ITEMS.call(this);
  }

  if(this.playerBuffs && this.time.now < this.playerBuffs.damageUntil){
    base *= this.playerBuffs.damageMult || 1;
  }

  return base;
};

const MP_ORIGINAL_DAMAGE_PLAYER_HEALTH_ITEMS = Game.prototype.damagePlayer;

Game.prototype.damagePlayer = function(amount, dir){
  let finalAmount = amount;

  if(this.playerBuffs && this.time.now < this.playerBuffs.guardUntil){
    finalAmount = Math.ceil(amount * (this.playerBuffs.guardMult || 1));
  }

  MP_ORIGINAL_DAMAGE_PLAYER_HEALTH_ITEMS.call(this, finalAmount, dir);
};

/* =========================================================
   SCREEN / UPDATE HOOKS
========================================================= */

const MP_ORIGINAL_FINISH_LEFTY_SCREEN_SWAP_HEALTH_ITEMS =
  Game.prototype.finishLeftyScreenSwap;

if(MP_ORIGINAL_FINISH_LEFTY_SCREEN_SWAP_HEALTH_ITEMS){
  Game.prototype.finishLeftyScreenSwap = function(targetScreen){
    MP_ORIGINAL_FINISH_LEFTY_SCREEN_SWAP_HEALTH_ITEMS.call(this, targetScreen);

    this.populateHealthItemsForScreen(mpHealthScreenKey(this));
    this.updateAllHealthItemVisibility();
  };
}

const MP_ORIGINAL_SAFE_UPDATE_HEALTH_ITEMS = Game.prototype.safeUpdate;

Game.prototype.safeUpdate = function(time, delta){
  MP_ORIGINAL_SAFE_UPDATE_HEALTH_ITEMS.call(this, time, delta);

  this.populateHealthItemsForScreen(mpHealthScreenKey(this));
  this.updateAllHealthItemVisibility();
};

Game.prototype.populateHealthItemsForScreen = function(screenKey){
  if(!screenKey){
    screenKey = mpHealthScreenKey(this);
  }

  if(!this.healthItemPopulatedScreens){
    this.healthItemPopulatedScreens = {};
  }

  if(this.healthItemPopulatedScreens[screenKey]){

  this.healthItemPopulatedScreens[screenKey] = true;

  const points = this.shuffleHealthArrayCopy(
    this.getHealthItemSpawnPoints(screenKey)

  const count = Phaser.Math.Between(

  for(let i = 0; i < count && i < points.length; i++){

    this.spawnHealthItemPickup(

};
