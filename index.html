<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Motel Pheromones - JT</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
}
canvas {
  display: block;
  margin: 0 auto;
  image-rendering: pixelated;
}
</style>
</head>

<body>

<script>

class GameScene extends Phaser.Scene {
  constructor() {
    super("GameScene");
  }

  preload() {

    this.load.image("bg", "assets/levels/leftys.png");

    this.load.spritesheet("jt_idle", "assets/sprites/jt/jt_idle.png", {
      frameWidth: 128,
      frameHeight: 128,
      endFrame: 3
    });

    this.load.spritesheet("jt_walk_down", "assets/sprites/jt/jt_walk_down.png", {
      frameWidth: 128,
      frameHeight: 128,
      endFrame: 7
    });

    this.load.spritesheet("jt_walk_up", "assets/sprites/jt/jt_walk_up.png", {
      frameWidth: 128,
      frameHeight: 128,
      endFrame: 7
    });

    this.load.spritesheet("jt_walk_left", "assets/sprites/jt/jt_walk_left.png", {
      frameWidth: 128,
      frameHeight: 128,
      endFrame: 7
    });

    this.load.spritesheet("jt_walk_right", "assets/sprites/jt/jt_walk_right.png", {
      frameWidth: 128,
      frameHeight: 128,
      endFrame: 7
    });

    this.load.spritesheet("jt_attack_light", "assets/sprites/jt/jt_attack_light.png", {
      frameWidth: 128,
      frameHeight: 128,
      endFrame: 3
    });

    this.load.spritesheet("jt_attack_heavy", "assets/sprites/jt/jt_attack_heavy.png", {
      frameWidth: 128,
      frameHeight: 128,
      endFrame: 5
    });

    this.load.spritesheet("jt_taunt", "assets/sprites/jt/jt_taunt.png", {
      frameWidth: 128,
      frameHeight: 128,
      endFrame: 2
    });
  }

  create() {

    this.add.image(640, 360, "bg").setDisplaySize(1280, 720);

    this.createAnimations();

    this.player = this.physics.add.sprite(640, 560, "jt_idle");

    this.player.setOrigin(0.5, 1);
    this.player.setDisplaySize(128, 128); // 🔥 HARD LOCK SIZE
    this.player.setCollideWorldBounds(true);
    this.player.play("jt-idle");

    this.keys = this.input.keyboard.addKeys({
      up: 'W',
      down: 'S',
      left: 'A',
      right: 'D',
      light: 'J',
      heavy: 'K',
      taunt: 'T'
    });

    this.isBusy = false;
    this.facing = "down";

    this.makeTouchControls();
  }

  createAnimations() {

    this.anims.create({
      key: "jt-idle",
      frames: this.anims.generateFrameNumbers("jt_idle", { start: 0, end: 3 }),
      frameRate: 5,
      repeat: -1
    });

    ["down","up","left","right"].forEach(dir => {
      this.anims.create({
        key: "jt-walk-" + dir,
        frames: this.anims.generateFrameNumbers("jt_walk_" + dir, { start: 0, end: 7 }),
        frameRate: 10,
        repeat: -1
      });
    });

    this.anims.create({
      key: "jt-light",
      frames: this.anims.generateFrameNumbers("jt_attack_light", { start: 0, end: 3 }),
      frameRate: 12
    });

    this.anims.create({
      key: "jt-heavy",
      frames: this.anims.generateFrameNumbers("jt_attack_heavy", { start: 0, end: 5 }),
      frameRate: 10
    });

    this.anims.create({
      key: "jt-taunt",
      frames: this.anims.generateFrameNumbers("jt_taunt", { start: 0, end: 2 }),
      frameRate: 6
    });
  }

  update() {

    if (this.isBusy) return;

    let vx = 0;
    let vy = 0;

    const speed = 180;

    if (this.keys.left.isDown || this.touchLeft) {
      vx = -speed;
      this.facing = "left";
    }
    else if (this.keys.right.isDown || this.touchRight) {
      vx = speed;
      this.facing = "right";
    }

    if (this.keys.up.isDown || this.touchUp) {
      vy = -speed;
      this.facing = "up";
    }
    else if (this.keys.down.isDown || this.touchDown) {
      vy = speed;
      this.facing = "down";
    }

    this.player.setVelocity(vx, vy);

    if (Phaser.Input.Keyboard.JustDown(this.keys.light) || this.touchLight) {
      this.touchLight = false;
      this.playAction("jt-light");
      return;
    }

    if (Phaser.Input.Keyboard.JustDown(this.keys.heavy) || this.touchHeavy) {
      this.touchHeavy = false;
      this.playAction("jt-heavy");
      return;
    }

    if (Phaser.Input.Keyboard.JustDown(this.keys.taunt) || this.touchTaunt) {
      this.touchTaunt = false;
      this.playAction("jt-taunt");
      return;
    }

    if (vx !== 0 || vy !== 0) {
      this.player.play("jt-walk-" + this.facing, true);
    } else {
      this.player.play("jt-idle", true);
    }
  }

  playAction(key) {
    this.isBusy = true;
    this.player.setVelocity(0, 0);
    this.player.play(key);

    this.player.once("animationcomplete", () => {
      this.isBusy = false;
      this.player.play("jt-idle");
    });
  }

  makeTouchControls() {

    this.touchUp = false;
    this.touchDown = false;
    this.touchLeft = false;
    this.touchRight = false;
    this.touchLight = false;
    this.touchHeavy = false;
    this.touchTaunt = false;

    const hold = (x,y,label,prop) => {
      const btn = this.add.circle(x,y,30,0xffffff,0.15).setInteractive();
      const txt = this.add.text(x,y,label).setOrigin(0.5);

      btn.on("pointerdown",()=>this[prop]=true);
      btn.on("pointerup",()=>this[prop]=false);
      btn.on("pointerout",()=>this[prop]=false);
    };

    const tap = (x,y,label,prop) => {
      const btn = this.add.circle(x,y,35,0xffffff,0.2).setInteractive();
      const txt = this.add.text(x,y,label).setOrigin(0.5);

      btn.on("pointerdown",()=>this[prop]=true);
    };

    hold(100,600,"←","touchLeft");
    hold(180,600,"→","touchRight");
    hold(140,550,"↑","touchUp");
    hold(140,650,"↓","touchDown");

    tap(1100,600,"X","touchLight");
    tap(1180,650,"A","touchHeavy");
    tap(1020,650,"Y","touchTaunt");
  }
}

const config = {
  type: Phaser.AUTO,
  width: 1280,
  height: 720,
  pixelArt: true,
  render: {
    pixelArt: true,
    roundPixels: true
  },
  physics: {
    default: "arcade",
    arcade: { debug: false }
  },
  scene: GameScene,
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  }
};

new Phaser.Game(config);

</script>
</body>
</html>
